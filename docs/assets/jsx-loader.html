<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Component</title>
<!--
  Vendor loading strategy:
  1. Try local vendor/ files first (for offline/air-gapped environments)
  2. Fall back to CDN if local files are not available
  Run `make vendor-download` to populate docs/assets/vendor/ for offline use.
-->
<script>
  // Detect if local vendor files are available
  (function() {
    var vendorBase = 'vendor/';
    var cdn = {
      tailwind:  'https://cdn.tailwindcss.com',
      react:     'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
      reactDom:  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      babel:     'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js',
      lucide:    'https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.min.js'
    };
    var local = {
      tailwind:  vendorBase + 'tailwindcss.js',
      react:     vendorBase + 'react.production.min.js',
      reactDom:  vendorBase + 'react-dom.production.min.js',
      babel:     vendorBase + 'babel.min.js',
      lucide:    vendorBase + 'lucide-react.min.js'
    };
    // Probe local vendor via sync XHR (fast, same-origin only)
    var useLocal = false;
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('HEAD', local.react, false);
      xhr.send();
      useLocal = (xhr.status === 200);
    } catch(e) { useLocal = false; }
    window.__DA_VENDOR = useLocal ? local : cdn;
    if (useLocal) console.log('[DA] Using local vendor files (offline mode)');
  })();
</script>
<script>document.write('<scr'+'ipt src="'+window.__DA_VENDOR.tailwind+'"><\/scr'+'ipt>')</script>
<script>
  // Configure Tailwind to use class-based dark mode
  tailwind.config = { darkMode: 'class' };
  // Apply dark mode on load if system prefers dark
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  }
</script>
<script>document.write('<scr'+'ipt src="'+window.__DA_VENDOR.react+'"><\/scr'+'ipt>')</script>
<script>document.write('<scr'+'ipt src="'+window.__DA_VENDOR.reactDom+'"><\/scr'+'ipt>')</script>
<script>document.write('<scr'+'ipt src="'+window.__DA_VENDOR.babel+'"><\/scr'+'ipt>')</script>
<script>document.write('<scr'+'ipt src="'+window.__DA_VENDOR.lucide+'" onerror="console.warn(\'lucide-react unavailable, using fallback icons\')"><\/scr'+'ipt>')</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8fafc;
    color: #1e293b;
    min-height: 100vh;
  }
  #loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 80vh; gap: 16px;
  }
  #loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading .label {
    font-size: 0.95rem; color: #64748b; font-weight: 500;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error {
    display: none; padding: 32px; margin: 20vh auto;
    max-width: 480px; text-align: center;
    background: #fef2f2;
    border: 1px solid #fecaca; border-radius: 12px; color: #991b1b;
  }
  #error .error-icon { font-size: 2rem; margin-bottom: 12px; }
  #error .error-msg { font-size: 0.95rem; line-height: 1.5; }
  #error .error-hint {
    margin-top: 12px; font-size: 0.82rem; color: #b91c1c;
    padding-top: 12px; border-top: 1px solid #fecaca;
  }
  /* Back-to-home link */
  .back-home {
    position: fixed; top: 12px; left: 12px; z-index: 50;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    font-size: 0.78rem; font-weight: 500;
    color: #64748b; background: rgba(255,255,255,0.9);
    border: 1px solid #e2e8f0; border-radius: 8px;
    text-decoration: none;
    backdrop-filter: blur(8px);
    transition: color 0.15s, border-color 0.15s;
  }
  .back-home:hover { color: #3b82f6; border-color: #3b82f6; }
  /* Dark mode toggle */
  .theme-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 50;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    background: rgba(255,255,255,0.9); border: 1px solid #e2e8f0;
    border-radius: 8px; cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.15s, border-color 0.15s;
  }
  .theme-toggle:hover { border-color: #3b82f6; }
  /* Dark mode overrides when .dark is on html */
  html.dark body { background: #0f172a; color: #e2e8f0; }
  html.dark .back-home { color: #94a3b8; background: rgba(15,23,42,0.9); border-color: #334155; }
  html.dark .back-home:hover { color: #60a5fa; border-color: #60a5fa; }
  html.dark .theme-toggle { background: rgba(15,23,42,0.9); border-color: #334155; }
  html.dark .theme-toggle:hover { border-color: #60a5fa; }
  html.dark #loading .label { color: #94a3b8; }
  html.dark #loading .spinner { border-color: #334155; border-top-color: #60a5fa; }
</style>
</head>
<body>
<a class="back-home" href="../interactive/index.html">← Tools</a>
<button class="theme-toggle" id="kbd-hint" title="Keyboard shortcuts (?)" style="right:100px;font-size:0.75rem;width:auto;padding:0 10px" onclick="document.getElementById('kbd-overlay').style.display='flex'">?</button>
<button class="theme-toggle" id="lang-toggle" title="切換語言 / Switch language" style="right:56px;font-size:0.75rem;width:auto;padding:0 10px">EN</button>
<button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
<div id="loading"><div class="spinner"></div><div class="label">Loading component…</div></div>
<div id="error"></div>
<div id="root"></div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var componentPath = params.get('component');

  // Detect language: ?lang=zh, or navigator.language, default 'en'
  var langParam = params.get('lang');
  var detectedLang = langParam || (navigator.language && navigator.language.startsWith('zh') ? 'zh' : 'en');
  window.__DA_LANG = detectedLang;
  // Expose a helper components can import: window.__t(zhText, enText)
  window.__t = function(zh, en) { return window.__DA_LANG === 'zh' ? zh : en; };

  if (!componentPath) {
    showError('No component specified. Use ?component=playground.jsx');
    return;
  }

  // Update page title from component name
  var name = componentPath.split('/').pop().replace('.jsx', '');
  document.title = name.replace(/-/g, ' ').replace(/\b\w/g, function(c) {
    return c.toUpperCase();
  }) + ' — Dynamic Alerting';

  fetch(componentPath)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + componentPath);
      return r.text();
    })
    .then(function(jsx) {
      document.getElementById('loading').style.display = 'none';
      renderJSX(jsx);
    })
    .catch(function(err) {
      showError('Failed to load component: ' + err.message);
    });

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    var el = document.getElementById('error');
    el.style.display = 'block';
    el.innerHTML = '<div class="error-icon">⚠</div>' +
      '<div class="error-msg">' + msg + '</div>' +
      '<div class="error-hint">Check the browser console for details, or ' +
      '<a href="../interactive/index.html" style="color:#2563eb">return to tools</a>.</div>';
  }

  /**
   * Transform raw JSX source (with front matter + ES imports + export default)
   * into something Babel standalone can execute in a <script type="text/babel">.
   */
  function renderJSX(source) {
    // 0) Extract front matter for related tools before stripping
    var frontMatter = '';
    var fmMatch = source.match(/^---\n([\s\S]*?)\n---/);
    if (fmMatch) frontMatter = fmMatch[1];
    var relatedTools = [];
    var relMatch = frontMatter.match(/related:\s*\[([^\]]*)\]/);
    if (relMatch) {
      relMatch[1].split(',').forEach(function(item) {
        var trimmed = item.trim().replace(/['"]/g, '');
        if (trimmed) relatedTools.push(trimmed);
      });
    }

    // 1) Strip YAML front matter (--- ... ---)
    source = source.replace(/^---[\s\S]*?---\s*\n?/, '');

    // 2) Replace ES imports with global references
    //    React is already global via UMD script tags
    source = source.replace(
      /^import\s+React\s*,?\s*\{([^}]*)\}\s*from\s*['"]react['"];?\s*$/gm,
      function(_, names) {
        var items = names.split(',').map(function(n) { return n.trim(); }).filter(Boolean);
        return 'const { ' + items.join(', ') + ' } = React;';
      }
    );
    source = source.replace(
      /^import\s+\{([^}]*)\}\s*from\s*['"]react['"];?\s*$/gm,
      function(_, names) {
        var items = names.split(',').map(function(n) { return n.trim(); }).filter(Boolean);
        return 'const { ' + items.join(', ') + ' } = React;';
      }
    );
    source = source.replace(
      /^import\s+React\s+from\s*['"]react['"];?\s*$/gm, ''
    );

    // lucide-react: use global lucideReact or provide SVG fallbacks
    source = source.replace(
      /^import\s+\{([^}]*)\}\s*from\s*['"]lucide-react['"];?\s*$/gm,
      function(_, names) {
        var items = names.split(',').map(function(n) { return n.trim(); }).filter(Boolean);
        var lines = items.map(function(icon) {
          return 'const ' + icon + ' = (window.lucideReact && window.lucideReact.' + icon +
                 ') || window.__iconFallback("' + icon + '");';
        });
        return lines.join('\n');
      }
    );

    // 3) Replace `export default function Name(` with `function Name(`
    //    and capture the name for rendering
    var componentName = null;
    source = source.replace(
      /^export\s+default\s+function\s+(\w+)/m,
      function(_, name) { componentName = name; return 'function ' + name; }
    );
    // Also handle: export default Name;
    if (!componentName) {
      source = source.replace(
        /^export\s+default\s+(\w+)\s*;?\s*$/m,
        function(_, name) { componentName = name; return ''; }
      );
    }

    if (!componentName) {
      document.getElementById('root').textContent =
        'Error: component has no export default function';
      return;
    }

    // 4) Append render call
    source += '\n;ReactDOM.createRoot(document.getElementById("root")).render(' +
              'React.createElement(' + componentName + '));';

    // 5) Create script tag for Babel to process
    var script = document.createElement('script');
    script.type = 'text/babel';
    script.textContent = source;
    document.body.appendChild(script);
    window.Babel.transformScriptTags();

    // Render related tools footer if front matter has related field
    if (relatedTools.length > 0) {
      var TOOL_META = {
        'playground': { title: 'YAML Playground', desc: 'Validate & preview YAML', path: '../playground.jsx' },
        'rule-pack-selector': { title: 'Rule Pack Selector', desc: 'Pick your Rule Packs', path: '../rule-pack-selector.jsx' },
        'threshold-calculator': { title: 'Threshold Calculator', desc: 'Compute thresholds from percentiles', path: '../threshold-calculator.jsx' },
        'alert-simulator': { title: 'Alert Simulator', desc: 'Simulate what-if scenarios', path: '../alert-simulator.jsx' },
        'config-lint': { title: 'Config Lint', desc: 'Best-practice validation', path: '../config-lint.jsx' },
        'config-diff': { title: 'Config Diff', desc: 'Compare YAML configs', path: '../config-diff.jsx' },
        'glossary': { title: 'Glossary', desc: 'Platform terminology', path: '../glossary.jsx' },
        'schema-explorer': { title: 'Schema Explorer', desc: 'Browse all YAML keys', path: '../schema-explorer.jsx' },
        'rule-pack-detail': { title: 'Rule Pack Details', desc: 'Recording & alert rules', path: '../rule-pack-detail.jsx' },
        'rule-pack-matrix': { title: 'Rule Pack Matrix', desc: 'Compare all 15 packs', path: '../rule-pack-matrix.jsx' },
        'capacity-planner': { title: 'Capacity Planner', desc: 'Estimate resources', path: '../capacity-planner.jsx' },
        'migration-simulator': { title: 'Migration Simulator', desc: 'PromQL to YAML preview', path: '../migration-simulator.jsx' },
        'alert-timeline': { title: 'Alert Timeline', desc: 'Animated alert replay', path: '../alert-timeline.jsx' },
        'runbook-viewer': { title: 'Runbook Viewer', desc: 'Diagnose → Fix → Verify', path: '../runbook-viewer.jsx' },
        'dependency-graph': { title: 'Dependency Graph', desc: 'Rule Pack dependencies', path: '../dependency-graph.jsx' },
        'architecture-quiz': { title: 'Architecture Quiz', desc: 'Find your deployment pattern', path: '../architecture-quiz.jsx' },
        'promql-tester': { title: 'PromQL Tester', desc: 'Test queries & find rules', path: '../promql-tester.jsx' },
        'onboarding-checklist': { title: 'Onboarding Checklist', desc: 'Step-by-step from zero', path: '../onboarding-checklist.jsx' },
        'health-dashboard': { title: 'Health Dashboard', desc: 'Simulated tenant health', path: '../health-dashboard.jsx' },
        'template-gallery': { title: 'Template Gallery', desc: 'Ready-made YAML configs', path: '../template-gallery.jsx' },
        'cli-playground': { title: 'CLI Playground', desc: 'Build da-tools commands', path: '../cli-playground.jsx' },
        'wizard': { title: 'Getting Started Wizard', desc: 'Find your learning path', path: '../getting-started/wizard.jsx' },
        'platform-demo': { title: 'Platform Demo', desc: 'Interactive make demo walkthrough', path: '../platform-demo.jsx' }
      };
      var footer = document.createElement('div');
      footer.style.cssText = 'max-width:72rem;margin:2rem auto;padding:0 2rem';
      footer.innerHTML = '<div style="border-top:1px solid #e2e8f0;padding-top:1.5rem">' +
        '<h3 style="font-size:0.875rem;font-weight:600;color:#64748b;margin-bottom:0.75rem">' +
        (window.__DA_LANG === 'zh' ? '推薦下一步' : 'You might also like') + '</h3>' +
        '<div style="display:flex;gap:0.75rem;flex-wrap:wrap">' +
        relatedTools.map(function(key) {
          var m = TOOL_META[key];
          if (!m) return '';
          return '<a href="?component=' + m.path + '" style="display:block;padding:0.75rem 1rem;' +
            'background:#f8fafc;border:1px solid #e2e8f0;border-radius:0.75rem;text-decoration:none;' +
            'min-width:180px;transition:border-color 0.2s" ' +
            'onmouseover="this.style.borderColor=\'#3b82f6\'" onmouseout="this.style.borderColor=\'#e2e8f0\'">' +
            '<div style="font-size:0.8125rem;font-weight:600;color:#1e293b">' + m.title + '</div>' +
            '<div style="font-size:0.6875rem;color:#64748b;margin-top:0.25rem">' + m.desc + '</div></a>';
        }).join('') +
        '</div></div>';
      document.body.appendChild(footer);
    }
  }
})();

// Language toggle
(function() {
  var btn = document.getElementById('lang-toggle');
  function updateLbl() { btn.textContent = window.__DA_LANG === 'zh' ? '中' : 'EN'; }
  updateLbl();
  btn.addEventListener('click', function() {
    window.__DA_LANG = window.__DA_LANG === 'zh' ? 'en' : 'zh';
    updateLbl();
    // Reload component with new lang
    var url = new URL(window.location.href);
    url.searchParams.set('lang', window.__DA_LANG);
    window.location.href = url.toString();
  });
})();

// Dark mode toggle
(function() {
  var btn = document.getElementById('theme-toggle');
  function updateIcon() {
    btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  }
  updateIcon();
  btn.addEventListener('click', function() {
    document.documentElement.classList.toggle('dark');
    updateIcon();
  });
})();

// Global keyboard shortcuts
(function() {
  // Overlay element
  var overlay = document.createElement('div');
  overlay.id = 'kbd-overlay';
  overlay.style.cssText = 'display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);align-items:center;justify-content:center';
  overlay.innerHTML = '<div style="background:#1e293b;color:#e2e8f0;border-radius:12px;padding:32px 40px;max-width:380px;width:90%;font-family:system-ui,sans-serif">' +
    '<h3 style="margin:0 0 16px;font-size:1.1rem;font-weight:700;color:#38bdf8">Keyboard Shortcuts</h3>' +
    '<div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:0.88rem">' +
    '<kbd style="background:#334155;padding:2px 8px;border-radius:4px;font-family:monospace;text-align:center">?</kbd><span>Show this help</span>' +
    '<kbd style="background:#334155;padding:2px 8px;border-radius:4px;font-family:monospace;text-align:center">d</kbd><span>Toggle dark mode</span>' +
    '<kbd style="background:#334155;padding:2px 8px;border-radius:4px;font-family:monospace;text-align:center">l</kbd><span>Toggle language</span>' +
    '<kbd style="background:#334155;padding:2px 8px;border-radius:4px;font-family:monospace;text-align:center">h</kbd><span>Go to Hub</span>' +
    '<kbd style="background:#334155;padding:2px 8px;border-radius:4px;font-family:monospace;text-align:center">Esc</kbd><span>Close overlay</span>' +
    '</div>' +
    '<p style="margin-top:16px;font-size:0.75rem;color:#64748b">Press <kbd style="background:#334155;padding:1px 6px;border-radius:3px;font-family:monospace">?</kbd> or <kbd style="background:#334155;padding:1px 6px;border-radius:3px;font-family:monospace">Esc</kbd> to close</p>' +
    '</div>';
  document.body.appendChild(overlay);

  function toggleOverlay() {
    overlay.style.display = overlay.style.display === 'none' ? 'flex' : 'none';
  }

  document.addEventListener('keydown', function(e) {
    // Skip if user is typing in an input/textarea
    var tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.contentEditable === 'true') return;

    if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
      e.preventDefault();
      toggleOverlay();
    } else if (e.key === 'Escape') {
      overlay.style.display = 'none';
    } else if (e.key === 'd' && !e.ctrlKey && !e.metaKey) {
      document.getElementById('theme-toggle').click();
    } else if (e.key === 'l' && !e.ctrlKey && !e.metaKey) {
      document.getElementById('lang-toggle').click();
    } else if (e.key === 'h' && !e.ctrlKey && !e.metaKey) {
      window.location.href = '../interactive/index.html';
    }
  });

  // Close overlay on click outside
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.style.display = 'none';
  });
})();

// Fallback SVG icons when lucide-react CDN is unavailable
window.__iconFallback = function(name) {
  var paths = {
    Copy: 'M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2 M8 2h8v4H8z',
    RefreshCw: 'M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15',
    ChevronDown: 'M6 9l6 6 6-6',
    ChevronUp: 'M18 15l-6-6-6 6',
    Check: 'M20 6L9 17l-5-5',
    AlertTriangle: 'M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01',
  };
  return function(props) {
    var size = (props && props.size) || 16;
    return React.createElement('svg', {
      width: size, height: size, viewBox: '0 0 24 24',
      fill: 'none', stroke: 'currentColor', strokeWidth: 2,
      strokeLinecap: 'round', strokeLinejoin: 'round',
      className: props && props.className,
      style: props && props.style,
    }, React.createElement('path', { d: paths[name] || 'M12 12h.01' }));
  };
};
</script>
</body>
</html>
