# ============================================================
# tool-registry.yaml — Interactive Tools 單一真相源
# ============================================================
# 所有互動工具的 metadata 集中管理。
# CI 驗證腳本 (lint_tool_consistency.py) 從此檔案反向檢查：
#   - Hub index.html 卡片一致性
#   - jsx-loader.html TOOL_META 一致性
#   - JSX frontmatter 一致性
#   - Markdown 文件引用完整性
#
# 變更此檔案後請執行: make lint-docs
# ============================================================

tools:
  - key: wizard
    title: { en: "Getting Started Wizard", zh: "入門精靈" }
    file: getting-started/wizard.jsx
    audience: [platform, domain, tenant]
    icon: wizard
    tags: [onboarding, guided, 3 min]
    desc: { en: "Find your learning path", zh: "找到你的學習路徑" }
    related: [onboarding-checklist, architecture-quiz, rule-pack-selector]
    hub_section: interactive
    appears_in:
      - docs/getting-started/for-tenants.md

