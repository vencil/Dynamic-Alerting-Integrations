# Pre-commit hooks for documentation & config drift prevention
# Install: pip install pre-commit && pre-commit install
# Manual:  pre-commit run --all-files
#
# These hooks run the lightweight CI checks locally before each commit,
# catching drift issues early (tool-map, rule-pack stats, glossary, etc.).
#
# Stage policy: default to pre-commit only. pre-commit v3 without
# `default_stages` runs every hook at ALL git stages (pre-commit, pre-push,
# pre-merge-commit, ...), which meant `git push` triggered full drift checks
# and blocked pushes on pre-existing drift unrelated to the current commits
# (observed on PR #21: bilingual-structure-check firing during pre-push).
# Locking default to `[pre-commit]` keeps CI parity (CI invokes hooks by name)
# while keeping `git push` fast and non-blocking. Hooks that legitimately
# need a different stage must opt in explicitly via `stages: [manual]` or
# `stages: [pre-push]`.

# Python UTF-8 mode: all python3 entries below use -X utf8 (PEP 540) to
# prevent UnicodeEncodeError on Windows consoles (cp950/cp932/cp1252).
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      # --- File hygiene auto-fixer (runs first) ---
      - id: file-hygiene
        name: Fix null bytes & EOF newline
        entry: python3 -X utf8 scripts/tools/lint/fix_file_hygiene.py
        language: python
        types: [text]
        files: \.(md|yaml|yml|py|jsx|json)$
        # Exclude git symlinks (mode 120000) whose "content" is literally
        # the target path — appending an EOF newline turns `../README.md`
        # into `../README.md\n`, which readlink() then cannot resolve on
        # Linux CI. The fixer also has an os.path.islink() guard, but on
        # Windows clones (core.symlinks=false) the symlink is a plain text
        # file so the runtime guard doesn't fire; the exclude pattern below
        # is the Windows-side safety net.
        # TRK-242 add-on: tenant-api OpenAPI artifacts are auto-generated by
        # `swag init` (Go Tests CI step). Generator output has no trailing
        # newline; if file-hygiene adds one, the next CI run regenerates
        # without newline and the drift check fails. Exclude both swagger.{json,yaml}.
        exclude: '^(docs/(README-root(\.en)?|CHANGELOG)\.md|components/tenant-api/docs/swagger\.(json|yaml))$'

      # --- Protect main branch (pre-push only) ---
      - id: protect-main-push
        name: "Guard: block direct push to main"
        entry: bash scripts/ops/protect_main_push.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      # --- Preflight gate (pre-push only) ---
      # Refuses `git push` to non-main branches unless `make pr-preflight`
      # touched `.git/.preflight-ok.<HEAD>` marker. Prevents pushing commits
      # that CI will reject. Escape hatch: GIT_PREFLIGHT_BYPASS=1.
      # See v2.8.0 Plan C.
      - id: require-preflight-pass
        name: "Guard: require make pr-preflight before push"
        entry: bash scripts/ops/require_preflight_pass.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      # --- MkDocs strict semantic gate (pre-push only) ---
      # Catches site-root-vs-filesystem-path link errors that pre-commit
      # check_doc_links.py misses (different semantic model). Hit 5+ PRs
      # in close succession (#391/#375/#400/#406/#411) before this hook
      # was added. Issue #412 documents the recurrence pattern.
      #
      # Tier 1: native mkdocs → run + block on failure
      # Tier 2: no mkdocs → WARN, don't block (CI is backstop)
      #
      # Escape hatch: MKDOCS_STRICT_BYPASS=1 git push
      - id: mkdocs-strict-pre-push
        name: "Guard: mkdocs strict (site-root semantic check) when docs changed"
        entry: bash scripts/ops/pre_push_mkdocs_strict.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      # --- sed -i damage detection (after hygiene fixer) ---
      - id: sed-damage-guard
        name: "Guard: detect sed -i damage"
        entry: python3 -X utf8 scripts/tools/lint/detect_sed_damage.py
        language: python
        types: [text]
        files: \.(md|yaml|yml|py|jsx|json)$

      # --- L1 secret-scan (#445 AC i) ---
      # trufflehog filesystem mode on staged text files only. Runs offline
      # (--no-verification); the L2 server-side workflow (secret-scan.yml,
      # #445 AC ii / Chunk 4) does the verified-API counterpart. False-
      # positive escapes via `.trufflehogignore` (path regex) or inline
      # `# trufflehog:ignore` comments. ⛔ `git commit --no-verify` to
      # bypass is forbidden — L2 will catch the same finding on push and
      # the SOP's Rotate-First rule already started ticking. See
      # docs/internal/secret-leak-remediation-sop.md.
      - id: secrets-scan-staged
        name: "🔐 L1 secret-scan (trufflehog on staged files)"
        entry: bash scripts/tools/lint/check_secrets_staged.sh
        language: system
        types: [text]
        # Exclude the .trufflehogignore file itself (it contains regex
        # examples in comments that some scanners flag).
        exclude: ^\.trufflehogignore$

      # --- Container/k8s IaC SAST Layer 1 (#448 / TRK-311) ---
      # Hybrid policy: hadolint engine + Vibe wrapper. The wrapper drives
      # hadolint (binary on PATH, else `docker run hadolint/hadolint`) over
      # every Dockerfile, applies the epic #448 severity->action mapping
      # (error=BLOCK / warning=baseline-WARN), and adds project rules:
      # HEALTHCHECK-or-rationale, no over-broad COPY, and .dockerignore
      # baseline at each build-context root. BLOCK findings fail the commit;
      # WARN/INFO are recorded in docs/internal/iac-lint-baseline.md.
      # Layers 2-4 (Helm template / values / k8s manifest) land via TRK-312
      # ~ TRK-314. CI wires this in .github/workflows/ci.yml (Lint job).
      - id: iac-sast-check
        name: "Container SAST L1: Dockerfile (hadolint + Vibe wrapper)"
        entry: python3 -X utf8 scripts/tools/lint/check_iac_vibe_rules.py --ci
        language: python
        pass_filenames: false
        files: '(^|/)Dockerfile$|(^|/)\.dockerignore$|^\.hadolint\.yaml$|^scripts/tools/lint/check_iac_vibe_rules\.py$'
        additional_dependencies: ['pathspec']

      # --- Container/k8s IaC SAST Layer 2 (#448 / TRK-312) ---
      # Helm template security: `helm template <chart> | kube-linter` (Mode B)
      # + source scan for ALLOW_EMPTY/INSECURE (Mode A) + capabilities.add
      # rule. Severity->action with a CENTRALIZED exemption registry (in
      # check_iac_helm.py; mirrored to docs/internal/iac-lint-baseline.md).
      # MANUAL stage on purpose: rendering 9 charts via helm+kube-linter is
      # ~1-2 min — too slow for every commit. The hard gate is the dedicated
      # CI job "Container SAST L2 (Helm)" in ci.yml; run locally on demand:
      #   pre-commit run iac-helm-sast-check --hook-stage manual --all-files
      # Engines: helm + kube-linter on PATH (CI), else Docker fallback.
      - id: iac-helm-sast-check
        name: "Container SAST L2: Helm template (kube-linter + Vibe wrapper)"
        entry: python3 -X utf8 scripts/tools/lint/check_iac_helm.py --ci
        # language: python (not system) so `python3` resolves to pre-commit's
        # venv interpreter — `system` would hit the MS Store python3 shim on
        # Windows hosts (windows-mcp-playbook trap #63). No deps: pure stdlib.
        language: python
        pass_filenames: false
        files: '(^|/)helm/.*\.(ya?ml|tpl)$|^\.kube-linter\.yaml$|^scripts/tools/lint/check_iac_helm\.py$'
        stages: [manual]

      # --- Container/k8s IaC SAST Layer 3 (#448 / TRK-313) ---
      # Helm values secret-shape: catches a key NAMED like a secret
      # (password/token/apiKey/secret/clientSecret) set to a non-empty literal.
      # Pure-Python class-(b) lint (no engine) — fast, so default stage +
      # diff-only (lint-policy.md §3). Complements #445 trufflehog (entropy);
      # this catches the YAML *shape* regardless of entropy. Ships at 0 (every
      # current match is whitelisted: empty / ${VAR} / {{ .Values }} /
      # placeholder / bool / duration / k8s-ref). Bypass via PR body.
      - id: helm-values-secrets-check
        name: "Container SAST L3: Helm values secret-shape (diff-only)"
        entry: python3 -X utf8 scripts/tools/lint/check_helm_values_secrets.py --ci
        language: python
        pass_filenames: false
        # Any helm YAML (values + ALL templates incl ConfigMaps + top-level
        # overlays) + raw k8s/ manifests — the wrapper scopes precisely; this
        # just decides when to run. ConfigMaps are the prime leak vector (#594
        # self/Gemini review); raw k8s/ Secrets added in TRK-314 (the grafana
        # admin/admin literal lived there, unscanned by any layer).
        files: '^helm/.*\.ya?ml$|^k8s/.*\.ya?ml$|^scripts/tools/lint/check_helm_values_secrets\.py$'

      # --- ADR-022 Layer 4: forbid the dev-auth-bypass switch in manifests ---
      # tenant-api's --dev-bypass-auth / TA_DEV_BYPASS_AUTH is a LOCAL-DEV-ONLY
      # identity bypass; it must NEVER reach a deploy manifest. Deploy-time
      # complement to the runtime k8s poison pill (the binary panics if the flag
      # is set in-cluster) — and covers NON-k8s manifests the runtime cannot see.
      # HARD block: no bypass tag.
      - id: dev-bypass-manifest-guard
        name: "ADR-022 L4: forbid TA_DEV_BYPASS_AUTH in deploy manifests"
        entry: python3 -X utf8 scripts/tools/lint/check_dev_bypass_manifest.py --ci
        language: python
        pass_filenames: false
        files: '^helm/.*\.ya?ml$|^k8s/.*\.ya?ml$|^operator-manifests/.*\.ya?ml$|^scripts/tools/lint/check_dev_bypass_manifest\.py$'

      # --- Container/k8s IaC SAST Layer 4 (#448 / TRK-314) ---
      # Raw k8s manifest security: `kube-linter lint k8s/` (no helm render —
      # the files are concrete objects). Reuses L2's kube-linter engine +
      # severity classification; applies the SAME centralized exemption model
      # (its own (path, check) registry in check_k8s_manifests.py, mirrored to
      # docs/internal/iac-lint-baseline.md). The ticket scoped this as a stub
      # ("0 raw manifests") but k8s/ holds 42 real ones, so it's a real layer.
      # MANUAL stage like L2 (needs the engine; ~3-5s). Hard gate is the CI
      # step in the "Container SAST L2 (Helm)" job; run locally on demand:
      #   pre-commit run k8s-manifests-sast-check --hook-stage manual --all-files
      - id: k8s-manifests-sast-check
        name: "Container SAST L4: raw k8s manifests (kube-linter + Vibe wrapper)"
        entry: python3 -X utf8 scripts/tools/lint/check_k8s_manifests.py --ci
        # language: python (not system) — `system` would hit the MS Store
        # python3 shim on Windows hosts (windows-mcp-playbook trap #63).
        language: python
        pass_filenames: false
        files: '^k8s/.*\.ya?ml$|^\.kube-linter\.yaml$|^scripts/tools/lint/check_(k8s_manifests|iac_helm)\.py$'
        stages: [manual]

      # --- Fast drift checks (< 5s each) ---
      - id: tool-map-check
        name: Tool map coverage
        entry: python3 -X utf8 scripts/tools/dx/generate_tool_map.py --check
        language: python
        pass_filenames: false
        files: ^scripts/tools/.*\.py$

      - id: devrules-size-check
        name: "Guard: dev-rules.md line-count cap (500)"
        entry: python3 -X utf8 scripts/tools/lint/check_devrules_size.py
        language: python
        pass_filenames: false
        files: ^docs/internal/dev-rules\.md$

      - id: ad-hoc-git-scripts-check
        name: "Guard: no ad-hoc _*.bat / _*.ps1 outside scripts/ops/"
        entry: python3 -X utf8 scripts/tools/lint/check_ad_hoc_git_scripts.py
        language: python
        pass_filenames: false
        files: \.(bat|ps1|cmd)$

      - id: bat-ascii-purity-check
        name: "Guard: scripts/ops/*.bat must be ASCII + CRLF + no-BOM (pitfall #45)"
        entry: python3 -X utf8 scripts/tools/lint/check_bat_ascii_purity.py
        language: python
        pass_filenames: true
        files: ^scripts/ops/.*\.bat$

      - id: doc-map-check
        name: Doc map coverage
        entry: python3 -X utf8 scripts/tools/dx/generate_doc_map.py --check
        language: python
        pass_filenames: false
        files: ^docs/.*\.(md|jsx)$

      - id: adr-index-check
        name: ADR index drift in architecture-and-design.md
        entry: python3 -X utf8 scripts/dx/generate_adr_index.py --check
        language: python
        pass_filenames: false
        files: ^(docs/adr/[0-9].*\.md|docs/architecture-and-design\.md|scripts/dx/generate_adr_index\.py)$
        additional_dependencies: ['pyyaml']

      - id: planning-index-check
        name: Planning index drift in docs/internal/planning-index.md
        entry: python3 -X utf8 scripts/dx/generate_planning_index.py --check
        language: python
        pass_filenames: false
        files: ^(docs/.*\.md|flaky-tests\.yaml|scripts/dx/generate_planning_index\.py|docs/internal/planning-index\.md)$
        additional_dependencies: ['pyyaml']

      - id: rule-pack-stats-check
        name: Rule Pack stats drift
        entry: python3 -X utf8 scripts/tools/dx/generate_rule_pack_stats.py --check
        language: python
        pass_filenames: false
        files: ^(rule-packs/|k8s/03-monitoring/).*\.yaml$
        additional_dependencies: ['pyyaml']

      - id: glossary-check
        name: Glossary abbreviation sync
        entry: python3 -X utf8 scripts/tools/dx/sync_glossary_abbr.py --check
        language: python
        pass_filenames: false
        files: ^docs/.*\.md$
        additional_dependencies: ['pyyaml']

      - id: changelog-lint
        name: Changelog format
        entry: python3 -X utf8 scripts/tools/dx/generate_changelog.py --check
        language: python
        pass_filenames: false
        files: ^CHANGELOG.*\.md$
        additional_dependencies: ['pyyaml']

      - id: version-consistency
        name: Version/count consistency
        entry: python3 -X utf8 scripts/tools/lint/validate_docs_versions.py --ci
        language: python
        pass_filenames: false
        files: \.(md|yaml|jsx|html)$
        additional_dependencies: ['pyyaml']

      - id: doc-k8s-refs
        name: Doc k8s manifest refs (path + workload kind)
        entry: python3 -X utf8 scripts/tools/lint/check_doc_k8s_refs.py --ci
        language: python
        pass_filenames: false
        files: ^(docs/.*\.md|k8s/.*\.ya?ml)$

      - id: doc-datools-cmds
        name: Doc da-tools wrapper subcommands valid
        entry: python3 -X utf8 scripts/tools/lint/check_doc_datools_cmds.py --ci
        language: python
        pass_filenames: false
        files: ^(docs/.*\.md|scripts/tools/ops/.*_dispatch\.py)$

      - id: design-token-usage
        name: Design token compliance (JSX)
        entry: python3 -X utf8 scripts/tools/lint/check_design_token_usage.py --ci
        language: python
        pass_filenames: false
        files: \.jsx$
        # PR #387: refactored to diff-only (lint-policy.md §3 class b);
        # promoted from [manual] to default pre-commit stage to match
        # other class (b) lints and let CI Lint job invoke directly.

      # WCAG 1.4.1 / 3.3.2 / 4.1.2 floor — auto-runs on changed JSX files,
      # exit 1 if any new violation surfaces. Codifies the WCAG cleanup
      # finished in PRs #298 / #300 / #303 / #309 / #310 / #311; the scanner
      # currently reports 0 violations across all 56 portal JSX files
      # (Cat A / B / C / D all clean). This hook prevents regressions.
      - id: axe-lite-static
        name: WCAG static a11y scan (axe-lite-static heuristic)
        entry: python3 -X utf8 scripts/tools/dx/axe_lite_static.py
        language: python
        files: ^tools/portal/src/.*\.jsx$
        # pass_filenames: true (default) — only re-scans the JSX files
        # touched by the commit, keeping the hook fast (<100ms typical).

      # TRK-010 observability layer (PR #325/#326 follow-up): validates
      # flaky-tests.yaml schema + expire_at lifecycle. Fires when either
      # the registry or CHANGELOG.md changes (CHANGELOG bumps shift the
      # current-shipped version, which can flip an entry from valid to
      # EXPIRED — catching that at commit time avoids a CI surprise).
      - id: flaky-registry-check
        name: Flaky-test registry schema + expire_at lifecycle (TRK-010)
        entry: python3 -X utf8 scripts/tools/lint/check_flaky_registry.py --ci
        language: python
        pass_filenames: false
        files: ^(flaky-tests\.yaml|CHANGELOG\.md)$
        additional_dependencies: ['pyyaml']

      # Property-pilot coverage drift: every top-level function in the
      # in-scope modules must be triaged (covered with a property test
      # OR excluded with a reason). Catches the "I added a new pure
      # helper but forgot to property-test it" failure mode at commit
      # time. Fires when any in-scope source, the manifest, or the
      # property test file changes.
      - id: property-coverage-check
        name: Property-pilot coverage drift detector (Gap 2)
        entry: python3 -X utf8 scripts/tools/lint/check_property_coverage.py --ci
        language: python
        pass_filenames: false
        files: ^(tests/shared/property-coverage\.yaml|tests/shared/test_property_tools\.py|scripts/tools/(_lib_.*\.py|dx/(generate_doc_map|generate_changelog|axe_lite_static)\.py|ops/(generate_rule_pack_split|_grar_merge|_grar_validate)\.py|lint/(_lint_helpers|check_flaky_registry)\.py))$
        additional_dependencies: ['pyyaml']

      - id: includes-sync
        name: Include snippet zh/en sync
        entry: python3 -X utf8 scripts/tools/lint/check_includes_sync.py --check
        language: python
        pass_filenames: false
        files: ^docs/includes/

      - id: platform-data-check
        name: Platform data drift (platform-data.json vs YAML source)
        entry: python3 -X utf8 scripts/tools/dx/generate_platform_data.py --check
        language: python
        pass_filenames: false
        files: ^(rule-packs/|k8s/03-monitoring/|docs/assets/platform-data\.json|scripts/tools/ops/scaffold_tenant\.py)
        additional_dependencies: ['pyyaml']

      - id: repo-name-check
        name: Repo name guard (no vibe-k8s-lab in GitHub URLs)
        entry: python3 -X utf8 scripts/tools/lint/check_repo_name.py --ci
        language: python
        pass_filenames: false
        files: \.(md|yaml|yml|py|jsx|html|json)$

      - id: codename-leak-check
        name: Codename leak guard (Phase .c / Track A / TD-NNN in user-facing files)
        entry: python3 -X utf8 scripts/tools/lint/check_codename_leak.py --ci
        language: python
        pass_filenames: false
        # Re-run only when files in the path-allowlist (DEFAULT_SCAN_PATHS in
        # the script) actually change. Match the same set here so unrelated
        # commits don't pay the cost.
        files: ^(README(\.en)?\.md|components/(da-tools|da-portal|threshold-exporter|tenant-api)/README\.md|components/da-tools/app/entrypoint\.py)$

      - id: commit-scope-doc-drift
        name: Commit scope drift (commit-convention.md vs .commitlintrc.yaml)
        entry: python3 -X utf8 scripts/tools/lint/check_commit_scope_doc.py --ci
        language: python
        pass_filenames: false
        files: ^(\.commitlintrc\.yaml|docs/internal/commit-convention\.md)$
        additional_dependencies: ['pyyaml']

      - id: tool-consistency-check
        name: Tool registry ↔ Hub ↔ TOOL_META ↔ JSX ↔ Markdown links
        entry: python3 -X utf8 scripts/tools/lint/lint_tool_consistency.py
        language: python
        pass_filenames: false
        files: ^docs/(assets/(tool-registry\.yaml|jsx-loader\.html)|interactive/(index\.html|tools/.*\.jsx)|getting-started/wizard\.jsx|.*\.md)$

      - id: structure-check
        name: Project structure enforcement
        entry: python3 -X utf8 scripts/tools/lint/check_structure.py --ci
        language: python
        pass_filenames: false
        files: \.(py|jsx|yaml)$

      - id: doc-links-check
        name: Documentation link validation
        entry: python3 -X utf8 scripts/tools/lint/check_doc_links.py --ci
        language: python
        pass_filenames: false
        files: ^docs/.*\.md$

      - id: html-doc-links-check
        name: Raw HTML doc-link validation (MkDocs-aware)
        entry: python3 -X utf8 scripts/tools/lint/lint_html_doc_links.py --ci
        language: python
        pass_filenames: false
        files: ^docs/.*\.html$

      - id: head-blob-hygiene
        name: HEAD blob hygiene (NUL bytes / truncated structured files)
        entry: python3 -X utf8 scripts/tools/lint/check_head_blob_hygiene.py --ci
        language: python
        pass_filenames: false
        # Runs once per commit regardless of which files are staged —
        # scans the full HEAD tree for NUL bytes and truncated YAML/JSON.
        # Lightweight (<1s for the whole repo). Strict-mode EOF newline
        # scan runs only in CI to avoid blocking commits on pre-existing drift.
        always_run: true

      - id: routing-profiles-check
        name: Routing profiles & domain policies lint
        entry: python3 -X utf8 scripts/tools/lint/check_routing_profiles.py --config-dir components/threshold-exporter/config/conf.d
        language: python
        pass_filenames: false
        files: ^(components/threshold-exporter/config/|scripts/tools/lint/check_routing_profiles)
        additional_dependencies: ['pyyaml']

      # --- v2.4.0 Phase A: 防守工具補強 ---
      - id: build-completeness-check
        name: build.sh ↔ COMMAND_MAP bidirectional sync
        entry: python3 -X utf8 scripts/tools/lint/check_build_completeness.py --ci
        language: python
        pass_filenames: false
        files: ^components/da-tools/app/(entrypoint\.py|build\.sh)$

      - id: cli-coverage-check
        name: CLI command coverage (cheat-sheet ↔ cli-reference ↔ component README ↔ COMMAND_MAP)
        entry: python3 -X utf8 scripts/tools/lint/check_cli_coverage.py --ci
        language: python
        pass_filenames: false
        files: ^(components/da-tools/(app/entrypoint\.py|README\.md)|docs/(cheat-sheet|cli-reference)(\.en)?\.md)$

      - id: bilingual-structure-check
        name: ZH/EN document structure sync
        entry: python3 -X utf8 scripts/tools/lint/check_bilingual_structure.py --ci
        language: python
        pass_filenames: false
        files: \.(en|zh)\.md$

      - id: jsx-i18n-check
        name: JSX TOOL_META ↔ CUSTOM_FLOW_MAP ↔ i18n sync
        entry: python3 -X utf8 scripts/tools/lint/check_jsx_i18n.py --ci
        language: python
        pass_filenames: false
        files: ^docs/(assets/jsx-loader\.html|interactive/tools/.*\.jsx|getting-started/wizard\.jsx)$

      - id: makefile-targets-check
        name: DX tools ↔ Makefile/pre-commit reachability
        entry: python3 -X utf8 scripts/tools/lint/check_makefile_targets.py --ci
        language: python
        pass_filenames: false
        files: ^(Makefile|scripts/tools/dx/.*\.py|\.pre-commit-config\.yaml)$

      - id: metric-dictionary-check
        name: Metric Dictionary ↔ Rule Pack cross-validation
        entry: python3 -X utf8 scripts/tools/lint/check_metric_dictionary.py --ci
        language: python
        pass_filenames: false
        files: ^(scripts/tools/metric-dictionary\.yaml|rule-packs/.*\.yaml|k8s/03-monitoring/.*\.yaml)$
        additional_dependencies: ['pyyaml']

      # --- v2.7.0 Harness Audit: 啟用原本未掛入的防守工具 ---
      - id: bilingual-content-check
        name: Bilingual content purity (CJK ratio in .en.md / zh docs)
        entry: python3 -X utf8 scripts/tools/lint/check_bilingual_content.py --ci
        language: python
        pass_filenames: false
        files: ^docs/.*\.md$

      - id: bilingual-annotations-check
        name: Rule Pack bilingual annotation pairs (summary_zh / description_zh)
        entry: python3 -X utf8 scripts/tools/lint/check_bilingual_annotations.py --ci
        language: python
        pass_filenames: false
        files: ^(rule-packs/.*\.yaml|k8s/03-monitoring/.*\.yaml)$
        additional_dependencies: ['pyyaml']

      # --- Optional heavier checks (enable with SKIP= override) ---
      - id: schema-check
        name: Go→JSON Schema drift
        entry: python3 -X utf8 scripts/tools/dx/sync_schema.py --check
        language: python
        pass_filenames: false
        files: ^(components/|docs/)
        stages: [manual]

      - id: translation-check
        name: Bilingual structure consistency
        entry: python3 -X utf8 scripts/tools/lint/check_translation.py
        language: python
        pass_filenames: false
        files: \.(en|zh)\.md$
        stages: [manual]

      - id: flow-e2e-check
        name: Guided Flow E2E smoke test
        entry: python3 -X utf8 tests/test_flows_e2e.py
        language: python
        pass_filenames: false
        files: ^docs/(assets/(flows\.json|jsx-loader\.html)|interactive/index\.html)
        stages: [manual]
        additional_dependencies: ['pyyaml']

      - id: jsx-babel-check
        name: JSX Babel standalone parse validation
        entry: python3 -X utf8 scripts/tools/lint/lint_jsx_babel.py --ci
        language: python
        pass_filenames: false
        files: ^tools/portal/src/(interactive/tools|getting-started)/.*\.jsx$
        # Promoted from manual → auto (docs/harness-hardening):
        # catches NUL bytes, browser-mode Babel incompatibilities, and
        # broken JSX syntax before they reach HEAD. Skips silently if
        # Node.js unavailable (~0s), otherwise ~2-4s against cached @babel/standalone.

      - id: jsx-babel-check-strict-linecount
        name: JSX line-count soft-cap regression gate
        entry: python3 -X utf8 scripts/tools/lint/lint_jsx_babel.py --ci --strict-linecount
        language: python
        pass_filenames: false
        files: ^tools/portal/src/(interactive/tools|getting-started)/.*\.jsx$
        # Auto-stage (NOT manual) — runs on every commit to catch
        # line-count regressions immediately. Locks in the progress
        # from PR-2d (#153 Phase 1+2+3 / S#69-S#72): codebase had 0
        # soft-cap line-count warnings as of S#72, this keeps it that
        # way. Pre-existing ~330 `style={{}}` warnings stay non-fatal
        # because `--strict-linecount` is granular (NOT `--strict`).
        # Separate cleanup track will eventually activate
        # `--strict-static` once all 330 cleared. See PR #160 / S#71
        # for the granular-flag design rationale.
        # Initially proposed as `stages: [manual]` but PR #162 first
        # CI run failed with "No hook with id ... in stage pre-commit"
        # — empirically the codebase's CI-invoked hooks are auto-stage,
        # not manual-stage. Aligning with that convention now.

      - id: dev-rules-enforcement-check
        name: dev-rules.md ↔ pre-commit-config.yaml drift check
        entry: python3 -X utf8 scripts/tools/lint/check_dev_rules_enforcement.py --ci
        language: python
        pass_filenames: false
        files: ^(docs/internal/dev-rules\.md|\.pre-commit-config\.yaml)$
        # Auto-stage, FATAL on drift (not warn-only). Codifies the
        # lesson from closed PR #168: snapshot audit doc finds drift
        # once but goes stale; lint catches drift continuously. No
        # granular --strict flag because the violation count after
        # PR #169's re-wording is 0 — we ship strict from day 1.
        # Per-line escape via `<!-- enforcement-claim: ignore -->`
        # for third-party tools (bandit etc) not in our config.

      - id: subprocess-timeout-audit
        name: subprocess timeout= kwarg audit (S#74 codify, FATAL)
        entry: python3 -X utf8 scripts/tools/lint/check_subprocess_timeout.py --ci --strict-subprocess-timeout
        language: python
        pass_filenames: false
        files: ^(scripts|components/da-tools|tests)/.*\.py$
        # FATAL on findings (activated S#84 PR after Issue #167 cleanup
        # track lands all 90 violations from PR #166 audit). Production
        # tooling has explicit `timeout=N` per call site (git=30s/60s,
        # docker/k8s/network=60s/120s, dispatch=600s); test fixtures use
        # per-line `# subprocess-timeout: ignore` markers because they
        # subprocess local git ops on bounded fixtures.
        # See S#74 (testing-playbook.md v2.8.0 Lessons §4) + PR #164
        # / PR #165 / PR #166 / S#84 for the underlying Popen deadlock
        # motivation and cleanup arc.

      - id: open-encoding-audit
        name: open() encoding= kwarg audit (PR-2.5 portability, warn-only)
        entry: python3 -X utf8 scripts/tools/lint/check_open_encoding.py --ci
        language: python
        pass_filenames: false
        files: ^(scripts|components/da-tools|tests)/.*\.py$
        # Warn-only because ~72 latent sites remain in test files that
        # don't currently exercise non-ASCII content (no failing tests).
        # PR-2.5 cleaned the 33 sites + 15 subprocess.run sites that
        # were causing actual UnicodeDecodeError on cp950 / shift_jis /
        # POSIX-locale dev hosts. Flip to --strict-open-encoding once
        # the residual cleanup track lands. See PR-2.5 description.

