        # `Page` / `Locator` — runtime `TypeError` (PR #184 first-CI-fail).
        # Comment lines (`//` and JSDoc ` *`) and inline backtick code-spans
        # auto-skipped; per-line escape `// playwright-rtl-drift: ignore`
