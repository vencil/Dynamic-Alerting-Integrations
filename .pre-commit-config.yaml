      - id: playwright-lint
        name: Playwright spec lint (test.fixme/skip guard, A-13)
        # A-13 enforcement: block new `test.fixme()` / `test.skip()` (bare
        # form) from landing in E2E specs. Scoped to tests/e2e/*.spec.*.
        # Conditional `test.skip(!isLinux, 'reason')` still allowed.
        # Matches the narrow ESLint config at tests/e2e/eslint.config.mjs.
        entry: bash -c 'cd tests/e2e && npm run --silent lint'
        language: system
        pass_filenames: false
        files: ^tests/e2e/.*\.spec\.(ts|js)$

      - id: hardcode-tenant-check
        name: Detect hardcoded tenant literals in PromQL label selectors (Rule #2)
        entry: python3 -X utf8 scripts/tools/lint/check_hardcode_tenant.py --ci
        language: python
        pass_filenames: false
        files: ^(components|cmd|internal|pkg|scripts|rule-packs|helm/templates)/.*\.(go|py|yaml|yml|tpl)$
        # Auto-stage, FATAL on findings (default for new lints when
        # post-rewrite violation count is 0; mirrors PR #169 / #170).
        # If existing codebase has violations, add granular `--strict-hardcode_tenant`
        # flag and ship warn-only first (PR #166 pattern).
        # Per-line escape via `<!-- hardcode-tenant: ignore -->` for legitimate
        # exceptions / illustrative quotes.

      - id: ha-max-threshold-aggregation
        name: "HA invariant: user_threshold must aggregate with max not sum (high-availability.md §4.3)"
        entry: python3 -X utf8 scripts/tools/lint/check_ha_threshold_aggregation.py --ci
        language: python
        additional_dependencies: ['pyyaml']
        pass_filenames: false
        files: ^(rule-packs/|operator-manifests/|k8s/03-monitoring/configmap-rules-).*\.ya?ml$
        # FATAL: a `sum by(...)(user_threshold)` DOUBLES the threshold under the
        # default HA topology (replicaCount=2, no leader-election) → alert never
        # fires. Checks the OPERATOR only (must be max); does NOT constrain by()
        # labels so dimensional thresholds (env/version/tablespace_re) keep their
        # dimensions. Caught a ~2-month silent prod drift in 4 packs (ADR-024).

      - id: ksm-version-allowlist
        name: "ADR-024: kube-state-metrics must allowlist app.kubernetes.io/version (test/rulepack-e2e)"
        entry: python3 -X utf8 scripts/tools/lint/check_ksm_version_allowlist.py --ci
        language: python
        additional_dependencies: ['pyyaml']
        pass_filenames: false
        files: ^k8s/.*kube-state-metrics.*\.ya?ml$
        # The kubernetes rule pack's (0a) version join needs
        # kube_pod_labels{label_app_kubernetes_io_version}, which KSM emits only
        # with --metric-labels-allowlist=pods=[app.kubernetes.io/version]. Static
        # guard for the partial-misconfig (allowlist set to a DIFFERENT label) that
        # the runtime VersionAwareThresholdInert sentinel cannot see (Gemini Pass-4).

      - id: changelog-no-tbd-check
        name: Detect TBD/TODO placeholders in CHANGELOG (Self-review Gap A.c)
