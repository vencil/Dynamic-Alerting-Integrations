      - id: window-x-no-fallback-check
        name: Forbid module-scope `const X = window.__X;` no-fallback reads (dev-rules.md §S6, TRK-237)
        entry: python3 -X utf8 scripts/tools/lint/check_window_x_no_fallback.py --ci
        language: python
        pass_filenames: false
        files: ^tools/portal/src/(interactive|getting-started)/.*\.(jsx|js)$
        # Auto-stage, FATAL on findings. Codebase audit at scaffold time
        # showed 0 violations (TRK-233/034 cleared all instances). Per-line
