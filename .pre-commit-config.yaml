# Pre-commit hooks for documentation & config drift prevention
# Install: pip install pre-commit && pre-commit install
# Manual:  pre-commit run --all-files
#
# These hooks run the lightweight CI checks locally before each commit,
# catching drift issues early (tool-map, rule-pack stats, glossary, etc.).

repos:
  - repo: local
    hooks:
      # --- Fast drift checks (< 5s each) ---
      - id: tool-map-check
        name: Tool map coverage
        entry: python3 scripts/tools/dx/generate_tool_map.py --check
        language: python
        pass_filenames: false
        files: ^scripts/tools/.*\.py$

      - id: doc-map-check
        name: Doc map coverage
        entry: python3 scripts/tools/dx/generate_doc_map.py --check --include-adr
        language: python
        pass_filenames: false
        files: ^docs/.*\.(md|jsx)$

      - id: rule-pack-stats-check
        name: Rule Pack stats drift
        entry: python3 scripts/tools/dx/generate_rule_pack_stats.py --check
        language: python
        pass_filenames: false
        files: ^(rule-packs/|k8s/03-monitoring/).*\.yaml$
        additional_dependencies: ['pyyaml']

      - id: glossary-check
        name: Glossary abbreviation sync
        entry: python3 scripts/tools/dx/sync_glossary_abbr.py --check
        language: python
        pass_filenames: false
        files: ^docs/.*\.md$
        additional_dependencies: ['pyyaml']

      - id: changelog-lint
        name: Changelog format
        entry: python3 scripts/tools/dx/generate_changelog.py --check
        language: python
        pass_filenames: false
        files: ^CHANGELOG.*\.md$
        additional_dependencies: ['pyyaml']

      - id: version-consistency
        name: Version/count consistency
        entry: python3 scripts/tools/lint/validate_docs_versions.py --ci
        language: python
        pass_filenames: false
        files: \.(md|yaml|jsx)$
        additional_dependencies: ['pyyaml']

      - id: includes-sync
        name: Include snippet zh/en sync
        entry: python3 scripts/tools/lint/check_includes_sync.py --check
        language: python
        pass_filenames: false
        files: ^docs/includes/

      - id: platform-data-check
        name: Platform data drift (platform-data.json vs YAML source)
        entry: python3 scripts/tools/dx/generate_platform_data.py --check
        language: python
        pass_filenames: false
        files: ^(rule-packs/|k8s/03-monitoring/|docs/assets/platform-data\.json|scripts/tools/ops/scaffold_tenant\.py)
        additional_dependencies: ['pyyaml']

      - id: repo-name-check
        name: Repo name guard (no vibe-k8s-lab in GitHub URLs)
        entry: python3 scripts/tools/lint/check_repo_name.py --ci
        language: python
        pass_filenames: false
        files: \.(md|yaml|yml|py|jsx|html|json)$

      - id: tool-consistency-check
        name: Tool registry ↔ Hub ↔ TOOL_META ↔ JSX ↔ Markdown links
        entry: python3 scripts/tools/lint/lint_tool_consistency.py
        language: python
        pass_filenames: false
        files: ^docs/(assets/(tool-registry\.yaml|jsx-loader\.html)|interactive/(index\.html|tools/.*\.jsx)|getting-started/wizard\.jsx|.*\.md)$

      - id: structure-check
        name: Project structure enforcement
        entry: python3 scripts/tools/lint/check_structure.py --ci
        language: python
        pass_filenames: false
        files: \.(py|jsx|yaml)$

      - id: doc-links-check
        name: Documentation link validation
        entry: python3 scripts/tools/lint/check_doc_links.py --ci
        language: python
        pass_filenames: false
        files: ^docs/.*\.md$

      - id: routing-profiles-check
        name: Routing profiles & domain policies lint
        entry: python3 scripts/tools/lint/check_routing_profiles.py --config-dir components/threshold-exporter/config/conf.d
        language: python
        pass_filenames: false
        files: ^(components/threshold-exporter/config/|scripts/tools/lint/check_routing_profiles)
        additional_dependencies: ['pyyaml']

      # --- v2.4.0 Phase A: 防守工具補強 ---
      - id: build-completeness-check
        name: build.sh ↔ COMMAND_MAP bidirectional sync
        entry: python3 scripts/tools/lint/check_build_completeness.py --ci
        language: python
        pass_filenames: false
        files: ^components/da-tools/app/(entrypoint\.py|build\.sh)$

      - id: cli-coverage-check
        name: CLI command coverage (cheat-sheet ↔ cli-reference ↔ COMMAND_MAP)
        entry: python3 scripts/tools/lint/check_cli_coverage.py --ci
        language: python
        pass_filenames: false
        files: ^(components/da-tools/app/entrypoint\.py|docs/(cheat-sheet|cli-reference)(\.en)?\.md)$

      - id: bilingual-structure-check
        name: ZH/EN document structure sync
        entry: python3 scripts/tools/lint/check_bilingual_structure.py --ci
        language: python
        pass_filenames: false
        files: \.en\.md$

      - id: jsx-i18n-check
        name: JSX TOOL_META ↔ CUSTOM_FLOW_MAP ↔ i18n sync
        entry: python3 scripts/tools/lint/check_jsx_i18n.py --ci
        language: python
        pass_filenames: false
        files: ^docs/(assets/jsx-loader\.html|interactive/tools/.*\.jsx|getting-started/wizard\.jsx)$

      - id: makefile-targets-check
        name: DX tools ↔ Makefile/pre-commit reachability
        entry: python3 scripts/tools/lint/check_makefile_targets.py --ci
        language: python
        pass_filenames: false
        files: ^(Makefile|scripts/tools/dx/.*\.py|\.pre-commit-config\.yaml)$

      - id: metric-dictionary-check
        name: Metric Dictionary ↔ Rule Pack cross-validation
        entry: python3 scripts/tools/lint/check_metric_dictionary.py --ci
        language: python
        pass_filenames: false
        files: ^(scripts/tools/metric-dictionary\.yaml|rule-packs/.*\.yaml|k8s/03-monitoring/.*\.yaml)$
        additional_dependencies: ['pyyaml']

      # --- Optional heavier checks (enable with SKIP= override) ---
      - id: schema-check
        name: Go→JSON Schema drift
        entry: python3 scripts/tools/dx/sync_schema.py --check
        language: python
        pass_filenames: false
        files: ^(components/|docs/)
        stages: [manual]

      - id: translation-check
        name: Bilingual structure consistency
        entry: python3 scripts/tools/lint/check_translation.py
        language: python
        pass_filenames: false
        files: \.en\.md$
        stages: [manual]

      - id: flow-e2e-check
        name: Guided Flow E2E smoke test
        entry: python3 tests/test_flows_e2e.py
        language: python
        pass_filenames: false
        files: ^docs/(assets/(flows\.json|jsx-loader\.html)|interactive/index\.html)
        stages: [manual]
        additional_dependencies: ['pyyaml']

      - id: jsx-babel-check
        name: JSX Babel standalone parse validation
        entry: python3 scripts/tools/lint/lint_jsx_babel.py --ci
        language: python
        pass_filenames: false
        files: ^docs/(interactive/tools|getting-started)/.*\.jsx$
        stages: [manual]

      - id: i18n-coverage-check
        name: i18n coverage report
        entry: python3 scripts/tools/lint/check_i18n_coverage.py
        language: python
        pass_filenames: false
        files: ^(docs/(interactive/tools|getting-started)/.*\.jsx|rule-packs/.*\.yaml|scripts/tools/.*\.py|components/da-tools/app/entrypoint\.py)$
        stages: [manual]
        additional_dependencies: ['pyyaml']

      - id: check-doc-reading-time
        name: Check document reading time (>15 min = needs split)
        entry: python3 scripts/tools/lint/check_doc_reading_time.py --ci
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$
        stages: [manual]

      - id: check-doc-freshness
        name: Check document freshness (>90 days = stale)
        entry: python3 scripts/tools/lint/check_doc_freshness.py --ci
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$
        stages: [manual]

      - id: check-doc-template
        name: Check document template compliance
        entry: python3 scripts/tools/lint/check_doc_template.py
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$
        stages: [manual]

      - id: check-portal-i18n
        name: Check Portal JSX i18n coverage
        entry: python3 scripts/tools/lint/check_portal_i18n.py --ci
        language: system
        pass_filenames: false
        files: ^docs/(interactive/tools|getting-started)/.*\.jsx$
        stages: [manual]
