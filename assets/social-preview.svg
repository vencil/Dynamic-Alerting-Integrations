<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Architecture diagram (simplified) -->
  <g transform="translate(720, 140)">
    <!-- Tenant boxes -->
    <rect x="0" y="0" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="500">db-a.yaml</text>
    <rect x="140" y="0" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="200" y="25" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="500">db-b.yaml</text>
    <rect x="280" y="0" width="120" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="340" y="25" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="500">_defaults</text>

    <!-- Arrow down -->
    <line x1="200" y1="44" x2="200" y2="74" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Exporter -->
    <rect x="80" y="78" width="240" height="44" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="200" y="98" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="14" font-weight="600">threshold-exporter</text>
    <text x="200" y="114" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">SHA-256 Hot-Reload · HA ×2</text>

    <!-- Arrow down -->
    <line x1="200" y1="126" x2="200" y2="156" stroke="#475569" stroke-width="1.5"/>

    <!-- Prometheus -->
    <rect x="60" y="160" width="280" height="44" rx="6" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="200" y="180" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="14" font-weight="600">Prometheus</text>
    <text x="200" y="196" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">15 Rule Packs · group_left</text>

    <!-- Arrow down -->
    <line x1="200" y1="208" x2="200" y2="238" stroke="#475569" stroke-width="1.5"/>

    <!-- Alertmanager -->
    <rect x="80" y="242" width="240" height="44" rx="6" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="200" y="262" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="14" font-weight="600">Alertmanager</text>
    <text x="200" y="278" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">Dynamic Routing · Severity Dedup</text>
  </g>

  <!-- Title -->
  <text x="80" y="180" fill="#e2e8f0" font-family="system-ui" font-size="48" font-weight="700" letter-spacing="-1">Dynamic Alerting</text>
  <text x="80" y="230" fill="#e2e8f0" font-family="system-ui" font-size="48" font-weight="700" letter-spacing="-1">Integrations</text>

  <!-- Subtitle -->
  <text x="80" y="280" fill="#94a3b8" font-family="system-ui" font-size="18">Multi-Tenant Config-Driven Alerting Platform</text>

  <!-- Stats bar -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="100" height="56" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="50" y="26" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="22" font-weight="700">15</text>
    <text x="50" y="44" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.5">RULE PACKS</text>

    <rect x="120" y="0" width="100" height="56" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="170" y="26" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="22" font-weight="700">238</text>
    <text x="170" y="44" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.5">TOTAL RULES</text>

    <rect x="240" y="0" width="100" height="56" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="290" y="26" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="22" font-weight="700">50</text>
    <text x="290" y="44" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.5">CLI TOOLS</text>

    <rect x="360" y="0" width="100" height="56" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="410" y="26" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="22" font-weight="700">O(M)</text>
    <text x="410" y="44" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="0.5">COMPLEXITY</text>
  </g>

  <!-- Tags -->
  <g transform="translate(80, 420)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
    <text x="60" y="19" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="500">Zero PromQL</text>

    <rect x="136" y="0" width="140" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
    <text x="206" y="19" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="500">Config-Driven</text>

    <rect x="292" y="0" width="100" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
    <text x="342" y="19" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="500">HA Ready</text>

    <rect x="408" y="0" width="130" height="28" rx="14" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
    <text x="473" y="19" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="500">Hot-Reload</text>
  </g>

  <!-- Footer -->
  <text x="80" y="560" fill="#475569" font-family="system-ui" font-size="14">github.com/vencil/Dynamic-Alerting-Integrations</text>
  <text x="80" y="584" fill="#334155" font-family="system-ui" font-size="12">MIT License · v2.0.0-preview.2</text>

  <!-- Open Source badge -->
  <rect x="80" y="100" width="110" height="26" rx="13" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="135" y="118" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="11" font-weight="600" letter-spacing="1">OPEN SOURCE</text>
</svg>
