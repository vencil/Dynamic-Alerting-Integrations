[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-x --tb=short"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.coverage.run]
source = ["scripts/tools"]
omit = [
    "scripts/tools/_lib_python.py",
    "scripts/tools/validate_all.py",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
skip_covered = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    "pass",
]
