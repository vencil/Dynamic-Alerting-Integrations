apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-custom-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: custom-alerts-normalization
    interval: 15s
    rules:
    - record: custom:threshold:rate__mysql_global_status_slow_queries__gt__w5m__for1m
      expr: label_replace(max by(tenant, version, severity, name, mode) (user_threshold{component="custom",
        metric="mysql_global_status_slow_queries", recipe_id="rate__mysql_global_status_slow_queries__gt__w5m__for1m"}),
        "version", "default", "version", "^$")
    - record: custom:metric:rate__mysql_global_status_slow_queries__gt__w5m__for1m
      expr: label_replace(sum by(tenant, version) (rate(mysql_global_status_slow_queries[5m])),
        "version", "default", "version", "^$")
    - record: custom:rate__mysql_global_status_slow_queries__gt__w5m__for1m:warning:core
      expr: "(\n  (\n    custom:metric:rate__mysql_global_status_slow_queries__gt__w5m__for1m\n\
        \    > on(tenant, version) group_left(name, mode)\n      custom:threshold:rate__mysql_global_status_slow_queries__gt__w5m__for1m{severity=\"\
        warning\"}\n  )\n  or\n  (\n    (\n      custom:metric:rate__mysql_global_status_slow_queries__gt__w5m__for1m\n\
        \      unless on(tenant, version)\n        custom:threshold:rate__mysql_global_status_slow_queries__gt__w5m__for1m{severity=\"\
        warning\"}\n    )\n    > on(tenant) group_left(name, mode)\n      custom:threshold:rate__mysql_global_status_slow_queries__gt__w5m__for1m{version=\"\
        default\", severity=\"warning\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)"
    - record: custom:threshold:threshold__mysql_global_status_threads_connected__gt__w5m__for1m
      expr: label_replace(max by(tenant, version, severity, name, mode) (user_threshold{component="custom",
        metric="mysql_global_status_threads_connected", recipe_id="threshold__mysql_global_status_threads_connected__gt__w5m__for1m"}),
        "version", "default", "version", "^$")
    - record: custom:metric:threshold__mysql_global_status_threads_connected__gt__w5m__for1m
      expr: label_replace(max by(tenant, version) (mysql_global_status_threads_connected),
        "version", "default", "version", "^$")
    - record: custom:threshold__mysql_global_status_threads_connected__gt__w5m__for1m:warning:core
      expr: "(\n  (\n    custom:metric:threshold__mysql_global_status_threads_connected__gt__w5m__for1m\n\
        \    > on(tenant, version) group_left(name, mode)\n      custom:threshold:threshold__mysql_global_status_threads_connected__gt__w5m__for1m{severity=\"\
        warning\"}\n  )\n  or\n  (\n    (\n      custom:metric:threshold__mysql_global_status_threads_connected__gt__w5m__for1m\n\
        \      unless on(tenant, version)\n        custom:threshold:threshold__mysql_global_status_threads_connected__gt__w5m__for1m{severity=\"\
        warning\"}\n    )\n    > on(tenant) group_left(name, mode)\n      custom:threshold:threshold__mysql_global_status_threads_connected__gt__w5m__for1m{version=\"\
        default\", severity=\"warning\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)"
  - name: custom-alerts-info
    interval: 1m
    rules:
    - record: custom_recipe_info
      expr: vector(1)
      labels:
        recipe_id: rate__mysql_global_status_slow_queries__gt__w5m__for1m
        recipe: rate
        status: active
    - record: custom_recipe_info
      expr: vector(1)
      labels:
        recipe_id: threshold__mysql_global_status_threads_connected__gt__w5m__for1m
        recipe: threshold
        status: active
  - name: custom-alerts
    rules:
    - alert: CustomRecipeSilent
      expr: max by(tenant, name) (user_threshold{component="custom", mode="silent"})
      labels:
        severity: none
        component: sentinel
        tenant: '{{ $labels.tenant }}'
        name: '{{ $labels.name }}'
      annotations:
        summary: Custom recipe [{{ $labels.name }}] is silent for {{ $labels.tenant
          }}
        summary_zh: '{{ $labels.tenant }} 的自訂告警 [{{ $labels.name }}] 處於靜默模式'
        description: The recipe is still evaluated and visible as an ALERTS series
          (dashboard-only); its notifications are suppressed via inhibit, not deleted.
        description_zh: 此自訂告警仍會評估並可於監控面板（ALERTS series）查看，通知經 inhibit 抑制而非刪除。
    - alert: Custom_rate__mysql_global_status_slow_queries__gt__w5m__for1m
      expr: "(\n  custom:rate__mysql_global_status_slow_queries__gt__w5m__for1m:warning:core\n\
        \  * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  custom:rate__mysql_global_status_slow_queries__gt__w5m__for1m:warning:core\n\
        \  unless on(tenant) tenant_metadata_info\n)"
      for: 1m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
        recipe: rate
        component: custom
        mode: '{{ $labels.mode }}'
      annotations:
        summary: Custom alert [{{ $labels.name }}] for {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的自訂告警 [{{ $labels.name }}] 觸發'
        description: 'rate on mysql_global_status_slow_queries: value {{ $value |
          printf "%.2f" }} crossed the configured threshold'
        description_zh: 'mysql_global_status_slow_queries 的 rate: 值 {{ $value | printf
          "%.2f" }} 已越過設定閾值'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: Custom_threshold__mysql_global_status_threads_connected__gt__w5m__for1m
      expr: "(\n  custom:threshold__mysql_global_status_threads_connected__gt__w5m__for1m:warning:core\n\
        \  * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  custom:threshold__mysql_global_status_threads_connected__gt__w5m__for1m:warning:core\n\
        \  unless on(tenant) tenant_metadata_info\n)"
      for: 1m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
        recipe: threshold
        component: custom
        mode: '{{ $labels.mode }}'
      annotations:
        summary: Custom alert [{{ $labels.name }}] for {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的自訂告警 [{{ $labels.name }}] 觸發'
        description: 'threshold on mysql_global_status_threads_connected: value {{
          $value | printf "%.2f" }} crossed the configured threshold'
        description_zh: 'mysql_global_status_threads_connected 的 threshold: 值 {{ $value
          | printf "%.2f" }} 已越過設定閾值'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
