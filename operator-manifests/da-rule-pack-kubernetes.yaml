apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-kubernetes
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: kubernetes-container-normalization
    interval: 15s
    rules:
    - record: tenant:container_cpu_percent:by_container
      expr: "label_replace(\n  (\n    (\n      sum by(namespace, pod, container) (\n\
        \        rate(container_cpu_usage_seconds_total{namespace=~\"db-.+\", container!=\"\
        \", container!=\"POD\"}[5m])\n      )\n      /\n      sum by(namespace, pod,\
        \ container) (\n        kube_pod_container_resource_limits{resource=\"cpu\"\
        , namespace=~\"db-.+\"}\n      )\n      * 100\n    )\n    * on(namespace,\
        \ pod) group_left(version)\n      label_replace(\n        kube_pod_labels{namespace=~\"\
        db-.+\"},\n        \"version\", \"$1\", \"label_app_kubernetes_io_version\"\
        , \"(.+)\"\n      )\n  ),\n  \"tenant\", \"$1\", \"namespace\", \"(.*)\"\n\
        )\n"
    - record: tenant:pod_cpu_node_share:limitless
      expr: "label_replace(\n  (\n    (\n      (\n        sum by(namespace, pod) (\n\
        \          sum by(namespace, pod, container) (\n            rate(container_cpu_usage_seconds_total{namespace=~\"\
        db-.+\", container!=\"\", container!=\"POD\"}[5m])\n          )\n        \
        \  unless on(namespace, pod, container)\n          sum by(namespace, pod,\
        \ container) (\n            kube_pod_container_resource_limits{resource=\"\
        cpu\", namespace=~\"db-.+\"}\n          )\n        )\n      )\n      /\n \
        \     max by(namespace, pod) (\n        max by(node) (kube_node_status_allocatable{resource=\"\
        cpu\"})\n        * on(node) group_right()\n          kube_pod_info{namespace=~\"\
        db-.+\"}\n      )\n      * 100\n    )\n    * on(namespace, pod) group_left(version)\n\
        \      label_replace(\n        kube_pod_labels{namespace=~\"db-.+\"},\n  \
        \      \"version\", \"$1\", \"label_app_kubernetes_io_version\", \"(.+)\"\n\
        \      )\n  ),\n  \"tenant\", \"$1\", \"namespace\", \"(.*)\"\n)\n"
    - record: tenant:container_memory_percent:by_container
      expr: "label_replace(\n  (\n    (\n      sum by(namespace, pod, container) (\n\
        \        container_memory_working_set_bytes{namespace=~\"db-.+\", container!=\"\
        \", container!=\"POD\"}\n      )\n      /\n      sum by(namespace, pod, container)\
        \ (\n        kube_pod_container_resource_limits{resource=\"memory\", namespace=~\"\
        db-.+\"}\n      )\n      * 100\n    )\n    * on(namespace, pod) group_left(version)\n\
        \      label_replace(\n        kube_pod_labels{namespace=~\"db-.+\"},\n  \
        \      \"version\", \"$1\", \"label_app_kubernetes_io_version\", \"(.+)\"\n\
        \      )\n  ),\n  \"tenant\", \"$1\", \"namespace\", \"(.*)\"\n)\n"
    - record: tenant:pod_weakest_cpu_percent:max
      expr: "max by(tenant, pod, version) (\n  tenant:container_cpu_percent:by_container\n\
        \  or\n  tenant:pod_cpu_node_share:limitless\n)\n"
    - record: tenant:pod_weakest_memory_percent:max
      expr: max by(tenant, pod, version) (tenant:container_memory_percent:by_container)
    - record: tenant:container_cpu_throttle_percent:by_container
      expr: "label_replace(\n  (\n    (\n      sum by(namespace, pod, container) (\n\
        \        rate(container_cpu_cfs_throttled_periods_total{namespace=~\"db-.+\"\
        , container!=\"\", container!=\"POD\"}[5m])\n      )\n      /\n      (\n \
        \       sum by(namespace, pod, container) (\n          rate(container_cpu_cfs_periods_total{namespace=~\"\
        db-.+\", container!=\"\", container!=\"POD\"}[5m])\n        ) > 0\n      )\n\
        \      * 100\n    )\n    * on(namespace, pod) group_left(version)\n      label_replace(\n\
        \        kube_pod_labels{namespace=~\"db-.+\"},\n        \"version\", \"$1\"\
        , \"label_app_kubernetes_io_version\", \"(.+)\"\n      )\n  ),\n  \"tenant\"\
        , \"$1\", \"namespace\", \"(.*)\"\n)\n"
    - record: tenant:pod_weakest_cpu_throttle_percent:max
      expr: "max by(tenant, pod, version) (\n  tenant:container_cpu_throttle_percent:by_container\n\
        \  and on(namespace, pod, container)\n  (tenant:container_cpu_percent:by_container\
        \ > 20)\n)\n"
  - name: kubernetes-state-matching
    interval: 15s
    rules:
    - record: tenant:container_waiting_reason:count
      expr: "label_replace(\n  count by(namespace, reason) (\n    kube_pod_container_status_waiting_reason{namespace=~\"\
        db-.+\"} > 0\n  ),\n  \"tenant\", \"$1\", \"namespace\", \"(.*)\"\n)\n"
  - name: kubernetes-threshold-normalization
    interval: 15s
    rules:
    - record: tenant_version:alert_threshold:container_cpu
      expr: "label_replace(\n  max by(tenant, version, severity) (\n    user_threshold{component=\"\
        container\", metric=\"cpu\"}\n  ),\n  \"version\", \"default\", \"version\"\
        , \"^$\"\n)\n"
    - record: tenant_version:pod_weakest_cpu_percent:vlabeled
      expr: "label_replace(\n  max by(tenant, version) (tenant:pod_weakest_cpu_percent:max),\n\
        \  \"version\", \"default\", \"version\", \"^$\"\n)\n"
    - record: tenant_version:alert_threshold:container_memory
      expr: "label_replace(\n  max by(tenant, version, severity) (\n    user_threshold{component=\"\
        container\", metric=\"memory\"}\n  ),\n  \"version\", \"default\", \"version\"\
        , \"^$\"\n)\n"
    - record: tenant_version:pod_weakest_memory_percent:vlabeled
      expr: "label_replace(\n  max by(tenant, version) (tenant:pod_weakest_memory_percent:max),\n\
        \  \"version\", \"default\", \"version\", \"^$\"\n)\n"
    - record: tenant_version:alert_threshold:container_cpu_throttle
      expr: "label_replace(\n  max by(tenant, version, severity) (\n    user_threshold{component=\"\
        container\", metric=\"cpu_throttle\"}\n  ),\n  \"version\", \"default\", \"\
        version\", \"^$\"\n)\n"
    - record: tenant_version:pod_weakest_cpu_throttle_percent:vlabeled
      expr: "label_replace(\n  max by(tenant, version) (tenant:pod_weakest_cpu_throttle_percent:max),\n\
        \  \"version\", \"default\", \"version\", \"^$\"\n)\n"
    - record: rule_pack_kubernetes:pod_container_high_cpu_warning:core
      expr: "(\n  (\n    tenant_version:pod_weakest_cpu_percent:vlabeled\n    > on(tenant,\
        \ version) group_left()\n      tenant_version:alert_threshold:container_cpu{severity=\"\
        warning\"}\n  )\n  or\n  (\n    (\n      tenant_version:pod_weakest_cpu_percent:vlabeled\n\
        \      unless on(tenant, version)\n        tenant_version:alert_threshold:container_cpu{severity=\"\
        warning\"}\n    )\n    > on(tenant) group_left()\n      tenant_version:alert_threshold:container_cpu{version=\"\
        default\", severity=\"warning\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)\n"
    - record: rule_pack_kubernetes:pod_container_high_cpu_critical:core
      expr: "(\n  (\n    tenant_version:pod_weakest_cpu_percent:vlabeled\n    > on(tenant,\
        \ version) group_left()\n      tenant_version:alert_threshold:container_cpu{severity=\"\
        critical\"}\n  )\n  or\n  (\n    (\n      tenant_version:pod_weakest_cpu_percent:vlabeled\n\
        \      unless on(tenant, version)\n        tenant_version:alert_threshold:container_cpu{severity=\"\
        critical\"}\n    )\n    > on(tenant) group_left()\n      tenant_version:alert_threshold:container_cpu{version=\"\
        default\", severity=\"critical\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)\n"
    - record: rule_pack_kubernetes:pod_container_high_memory_warning:core
      expr: "(\n  (\n    tenant_version:pod_weakest_memory_percent:vlabeled\n    >\
        \ on(tenant, version) group_left()\n      tenant_version:alert_threshold:container_memory{severity=\"\
        warning\"}\n  )\n  or\n  (\n    (\n      tenant_version:pod_weakest_memory_percent:vlabeled\n\
        \      unless on(tenant, version)\n        tenant_version:alert_threshold:container_memory{severity=\"\
        warning\"}\n    )\n    > on(tenant) group_left()\n      tenant_version:alert_threshold:container_memory{version=\"\
        default\", severity=\"warning\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)\n"
    - record: rule_pack_kubernetes:pod_container_high_memory_critical:core
      expr: "(\n  (\n    tenant_version:pod_weakest_memory_percent:vlabeled\n    >\
        \ on(tenant, version) group_left()\n      tenant_version:alert_threshold:container_memory{severity=\"\
        critical\"}\n  )\n  or\n  (\n    (\n      tenant_version:pod_weakest_memory_percent:vlabeled\n\
        \      unless on(tenant, version)\n        tenant_version:alert_threshold:container_memory{severity=\"\
        critical\"}\n    )\n    > on(tenant) group_left()\n      tenant_version:alert_threshold:container_memory{version=\"\
        default\", severity=\"critical\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)\n"
    - record: rule_pack_kubernetes:pod_cpu_throttled_warning:core
      expr: "(\n  (\n    tenant_version:pod_weakest_cpu_throttle_percent:vlabeled\n\
        \    > on(tenant, version) group_left()\n      tenant_version:alert_threshold:container_cpu_throttle{severity=\"\
        warning\"}\n  )\n  or\n  (\n    (\n      tenant_version:pod_weakest_cpu_throttle_percent:vlabeled\n\
        \      unless on(tenant, version)\n        tenant_version:alert_threshold:container_cpu_throttle{severity=\"\
        warning\"}\n    )\n    > on(tenant) group_left()\n      tenant_version:alert_threshold:container_cpu_throttle{version=\"\
        default\", severity=\"warning\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)\n"
    - record: rule_pack_kubernetes:pod_cpu_throttled_critical:core
      expr: "(\n  (\n    tenant_version:pod_weakest_cpu_throttle_percent:vlabeled\n\
        \    > on(tenant, version) group_left()\n      tenant_version:alert_threshold:container_cpu_throttle{severity=\"\
        critical\"}\n  )\n  or\n  (\n    (\n      tenant_version:pod_weakest_cpu_throttle_percent:vlabeled\n\
        \      unless on(tenant, version)\n        tenant_version:alert_threshold:container_cpu_throttle{severity=\"\
        critical\"}\n    )\n    > on(tenant) group_left()\n      tenant_version:alert_threshold:container_cpu_throttle{version=\"\
        default\", severity=\"critical\"}\n  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)\n"
  - name: kubernetes-container-alerts
    rules:
    - alert: PodContainerHighCPU
      expr: "(\n  rule_pack_kubernetes:pod_container_high_cpu_warning:core\n  * on(tenant)\
        \ group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n)\nor\n\
        (\n  rule_pack_kubernetes:pod_container_high_cpu_warning:core\n  unless on(tenant)\
        \ tenant_metadata_info\n)\n"
      for: 60s
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: High container CPU in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的容器 CPU 使用率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: container CPU
          pressure — evaluate resource limits'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 容器 CPU 壓力過高
          — 請評估資源限制'
        description: 'Max container CPU usage: {{ $value | printf "%.1f" }}% (threshold
          exceeded)'
        description_zh: '最大容器 CPU 使用率: {{ $value | printf "%.1f" }}% (超過閾值)'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PodContainerHighCPUCritical
      expr: "(\n  rule_pack_kubernetes:pod_container_high_cpu_critical:core\n  * on(tenant)\
        \ group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n)\nor\n\
        (\n  rule_pack_kubernetes:pod_container_high_cpu_critical:core\n  unless on(tenant)\
        \ tenant_metadata_info\n)\n"
      for: 60s
      labels:
        severity: critical
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: CRITICAL container CPU in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的容器 CPU 使用率達臨界'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: container CPU
          CRITICAL — evaluate resource limits'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 容器 CPU 達臨界
          — 請評估資源限制'
        description: 'Max container CPU usage: {{ $value | printf "%.1f" }}% (critical
          threshold exceeded)'
        description_zh: '最大容器 CPU 使用率: {{ $value | printf "%.1f" }}% (超過臨界閾值)'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PodContainerHighMemory
      expr: "(\n  rule_pack_kubernetes:pod_container_high_memory_warning:core\n  *\
        \ on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  rule_pack_kubernetes:pod_container_high_memory_warning:core\n\
        \  unless on(tenant) tenant_metadata_info\n)\n"
      for: 60s
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: High container memory in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的容器記憶體使用率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: container memory
          pressure — evaluate resource limits'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 容器記憶體壓力過高
          — 請評估資源限制'
        description: 'Max container memory usage: {{ $value | printf "%.1f" }}% (threshold
          exceeded)'
        description_zh: '最大容器記憶體使用率: {{ $value | printf "%.1f" }}% (超過閾值)'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PodContainerHighMemoryCritical
      expr: "(\n  rule_pack_kubernetes:pod_container_high_memory_critical:core\n \
        \ * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  rule_pack_kubernetes:pod_container_high_memory_critical:core\n\
        \  unless on(tenant) tenant_metadata_info\n)\n"
      for: 60s
      labels:
        severity: critical
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: CRITICAL container memory in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的容器記憶體使用率達臨界'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: container memory
          CRITICAL — evaluate resource limits'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 容器記憶體達臨界
          — 請評估資源限制'
        description: 'Max container memory usage: {{ $value | printf "%.1f" }}% (critical
          threshold exceeded)'
        description_zh: '最大容器記憶體使用率: {{ $value | printf "%.1f" }}% (超過臨界閾值)'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PodContainerCPUThrottled
      expr: "(\n  rule_pack_kubernetes:pod_cpu_throttled_warning:core\n  * on(tenant)\
        \ group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n)\nor\n\
        (\n  rule_pack_kubernetes:pod_cpu_throttled_warning:core\n  unless on(tenant)\
        \ tenant_metadata_info\n)\n"
      for: 15m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Chronic CPU throttling in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的容器 CPU 遭核心持續掐頸'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: sustained CFS
          throttling — raise the container cpu limit or spread the burst; drill down
          via tenant:container_cpu_throttle_percent:by_container'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: CFS 持續掐頸
          — 請提高容器 cpu limit 或攤平突發負載；以 tenant:container_cpu_throttle_percent:by_container
          定位容器'
        description: '{{ $value | printf "%.1f" }}% of the container''s active CFS
          periods were throttled (sustained; usage may look fine — this is quota enforcement,
          see also PodContainerHighCPU)'
        description_zh: 容器活躍 CFS 週期中有 {{ $value | printf "%.1f" }}% 被核心限流（持續發生；平均使用率可能看似正常
          — 這是配額壓制，另見 PodContainerHighCPU）
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PodContainerCPUThrottledCritical
      expr: "(\n  rule_pack_kubernetes:pod_cpu_throttled_critical:core\n  * on(tenant)\
        \ group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n)\nor\n\
        (\n  rule_pack_kubernetes:pod_cpu_throttled_critical:core\n  unless on(tenant)\
        \ tenant_metadata_info\n)\n"
      for: 15m
      labels:
        severity: critical
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: CRITICAL CPU throttling in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的容器 CPU 掐頸達臨界'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: CFS throttling
          CRITICAL — raise the container cpu limit now; drill down via tenant:container_cpu_throttle_percent:by_container'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: CFS 掐頸達臨界
          — 請立即提高容器 cpu limit；以 tenant:container_cpu_throttle_percent:by_container
          定位容器'
        description: '{{ $value | printf "%.1f" }}% of the container''s active CFS
          periods were throttled (critical threshold exceeded; quota enforcement,
          see also PodContainerHighCPU)'
        description_zh: 容器活躍 CFS 週期中有 {{ $value | printf "%.1f" }}% 被核心限流（超過臨界閾值；配額壓制，另見
          PodContainerHighCPU）
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
  - name: kubernetes-pod-state-alerts
    rules:
    - alert: ContainerCrashLoop
      expr: "(\n  (\n    (\n      (\n        tenant:container_waiting_reason:count{reason=\"\
        CrashLoopBackOff\"}\n        * on(tenant) group_left\n        user_state_filter{filter=\"\
        container_crashloop\"}\n      ) > 0\n    )\n    unless on(tenant)\n    (user_state_filter{filter=\"\
        maintenance\"} == 1)\n  )\n  * on(tenant) group_left(runbook_url, owner, tier)\n\
        \    tenant_metadata_info\n)\nor\n(\n  (\n    (\n      (\n        tenant:container_waiting_reason:count{reason=\"\
        CrashLoopBackOff\"}\n        * on(tenant) group_left\n        user_state_filter{filter=\"\
        container_crashloop\"}\n      ) > 0\n    )\n    unless on(tenant)\n    (user_state_filter{filter=\"\
        maintenance\"} == 1)\n  )\n  unless on(tenant) tenant_metadata_info\n)\n"
      for: 30s
      labels:
        severity: critical
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Container crash loop detected in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 偵測到容器崩潰迴圈'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: crash loop detected
          — check deployment and image health'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 偵測到崩潰迴圈 —
          請檢查部署和映像檔案狀態'
        description: '{{ $value }} container(s) in CrashLoopBackOff state'
        description_zh: '{{ $value }} 個容器處於 CrashLoopBackOff 狀態'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: ContainerImagePullFailure
      expr: "(\n  (\n    (\n      (\n        tenant:container_waiting_reason:count{reason=~\"\
        ImagePullBackOff|InvalidImageName\"}\n        * on(tenant) group_left\n  \
        \      user_state_filter{filter=\"container_imagepull\"}\n      ) > 0\n  \
        \  )\n    unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"\
        } == 1)\n  )\n  * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  (\n    (\n      (\n        tenant:container_waiting_reason:count{reason=~\"\
        ImagePullBackOff|InvalidImageName\"}\n        * on(tenant) group_left\n  \
        \      user_state_filter{filter=\"container_imagepull\"}\n      ) > 0\n  \
        \  )\n    unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"\
        } == 1)\n  )\n  unless on(tenant) tenant_metadata_info\n)\n"
      for: 30s
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Image pull failure detected in {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 偵測到映像檔案拉取失敗'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: image pull failing
          — verify registry and image availability'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 映像檔案拉取失敗
          — 請檢查 registry 和映像檔案可用性'
        description: '{{ $value }} container(s) in ImagePullBackOff/InvalidImageName
          state'
        description_zh: '{{ $value }} 個容器處於 ImagePullBackOff/InvalidImageName 狀態'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
  - name: kubernetes-version-aware-sentinel
    rules:
    - alert: VersionAwareThresholdInert
      expr: '(count(max by(tenant, version, severity) (user_threshold{component="container",
        metric="cpu", version=~".+"})) or vector(0)) > 0

        and

        (count(kube_pod_info{namespace=~"db-.+"}) or vector(0)) > 0

        and

        (count(kube_pod_labels{namespace=~"db-.+"}) or vector(0)) == 0

        '
      for: 10m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Version-aware thresholds declared but kube-state-metrics exposes
          no pod labels — feature inert
        summary_zh: 已宣告版本專屬閾值，但 kube-state-metrics 未暴露 pod 標籤 — 功能靜默失效
        description: '{{ $value | printf "%.0f" }} version-specific container CPU
          threshold(s) declared and tenant pods are running, but kube-state-metrics
          emits no pod labels at all. Set KSM --metric-labels-allowlist=pods=[app.kubernetes.io/version].'
        description_zh: 已宣告 {{ $value | printf "%.0f" }} 個版本專屬容器 CPU 閾值且租戶 Pod 正在運行，但
          kube-state-metrics 完全未暴露 pod 標籤。請為 KSM 設定 --metric-labels-allowlist=pods=[app.kubernetes.io/version]。
        runbook_url: https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/scenarios/version-aware-thresholds.md#for-platform-operators-ksm-allowlist-remediation
  - name: kubernetes-custom-disk-recipe-sentinel
    rules:
    - alert: CustomRecipeDiskInert
      expr: "(\n  max by(tenant) (\n    user_threshold{component=\"custom\", metric=\"\
        kubelet_volume_stats_available_bytes\"}\n    or\n    user_threshold{component=\"\
        custom\", metric=\"kubelet_volume_stats_used_bytes\"}\n  )\n  and on(tenant)\n\
        \  count by(tenant) (\n    label_replace(kube_pod_status_phase{namespace=~\"\
        db-.+\", phase=\"Running\"} == 1, \"tenant\", \"$1\", \"namespace\", \"(.+)\"\
        )\n  )\n)\nunless on(tenant)\n(\n  count by(tenant) (kubelet_volume_stats_available_bytes{tenant=~\"\
        .+\"})\n  and on(tenant)\n  count by(tenant) (kubelet_volume_stats_capacity_bytes{tenant=~\"\
        .+\"})\n)\nunless on(tenant)\n(user_state_filter{filter=\"maintenance\"} ==\
        \ 1)\n"
      for: 15m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Disk alert declared but no disk data is visible for {{ $labels.tenant
          }}
        summary_zh: 已設定磁碟告警，但偵測不到 {{ $labels.tenant }} 的磁碟資料
        platform_summary: '[SRE] {{ $labels.tenant }} disk recipe inert — volume-stats
          absent. Check in order: (1) tenant mounts no PVC (most common, tenant-side);
          (2) kubelet volume-stats scrape job + namespace→tenant relabel; (3) CSI
          NodeGetVolumeStats support (kind''s default local-path does not).'
        platform_summary_zh: '[SRE] 租戶 {{ $labels.tenant }} disk recipe inert — volume-stats
          缺席。依序查:(1) 租戶根本沒掛 PVC(最常見、屬租戶端);(2) kubelet volume-stats scrape job 是否帶
          namespace→tenant relabel;(3) CSI 是否實作 NodeGetVolumeStats(kind 預設 local-path
          不實作)。'
        description: You declared a disk-fill custom alert, but the platform sees
          no disk (volume) metrics for your workload, so the alert can never fire.
          This usually means your service mounts no PersistentVolumeClaim — check
          your deployment. If you DO use a PVC, contact the platform team to investigate
          disk-metric collection.
        description_zh: 您設定了磁碟填滿告警，但平台偵測不到您工作負載的磁碟(volume)指標，該告警永遠不會觸發。這通常表示您的服務沒有掛載
          PersistentVolumeClaim — 請確認您的部署。若您確實使用 PVC，請聯繫平台團隊排查磁碟指標收集。
        runbook_url: https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/integration/byo-prometheus-integration.md
  - name: kubernetes-node-health
    rules:
    - record: tenant:node_owner:info
      expr: "max by(node, tenant) (\n  label_replace(\n    kube_pod_info{namespace=~\"\
        db-.+\"}\n    and on(namespace, pod, uid)\n      (kube_pod_status_phase{phase=\"\
        Running\"} == 1),\n    \"tenant\", \"$1\", \"namespace\", \"(.*)\"\n  )\n\
        )\n"
    - record: rule_pack_kubernetes:node_not_ready:core
      expr: "(\n  tenant:node_owner:info\n  and on(node)\n    (kube_node_status_condition{condition=\"\
        Ready\", status=\"true\"} == 0)\n)\nunless on(tenant)\n(user_state_filter{filter=\"\
        maintenance\"} == 1)\n"
    - alert: NodeNotReady
      expr: "(\n  rule_pack_kubernetes:node_not_ready:core\n  * on(tenant) group_left(runbook_url,\
        \ owner, tier)\n    tenant_metadata_info\n)\nor\n(\n  rule_pack_kubernetes:node_not_ready:core\n\
        \  unless on(tenant) tenant_metadata_info\n)\n"
      for: 3m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
        node: '{{ $labels.node }}'
      annotations:
        summary: Kubernetes node {{ $labels.node }} NotReady — affects {{ $labels.tenant
          }}
        summary_zh: Kubernetes 節點 {{ $labels.node }} NotReady — 影響 {{ $labels.tenant
          }}
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: node {{ $labels.node
          }} NotReady — check node health / pod rescheduling'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 節點 {{ $labels.node
          }} NotReady — 請檢查節點健康 / Pod 重新調度'
        description: A Kubernetes node hosting this tenant's running pod(s) is NotReady;
          the workload may be rescheduled or unavailable.
        description_zh: 承載此租戶運行中 Pod 的 Kubernetes 節點處於 NotReady 狀態；工作負載可能被重新調度或無法使用。
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
  - name: kubernetes-ha-replicas
    rules:
    - record: rule_pack_kubernetes:ha_replicas_degraded:core
      expr: "(\n  max by(tenant) (\n    label_replace(\n      (\n        kube_statefulset_status_replicas_ready{namespace=~\"\
        db-.+\"}\n        < kube_statefulset_status_replicas{namespace=~\"db-.+\"\
        }\n      )\n      and on(namespace, statefulset)\n        (changes(kube_statefulset_status_replicas_updated{namespace=~\"\
        db-.+\"}[10m]) == 0)\n      and on(namespace, statefulset)\n        (kube_statefulset_replicas{namespace=~\"\
        db-.+\"} >= 2),\n      \"tenant\", \"$1\", \"namespace\", \"(.+)\"\n    )\n\
        \  )\n  or\n  max by(tenant) (\n    label_replace(\n      (\n        kube_deployment_status_replicas_available{namespace=~\"\
        db-.+\"}\n        < kube_deployment_spec_replicas{namespace=~\"db-.+\"}\n\
        \      )\n      and on(namespace, deployment)\n        (changes(kube_deployment_status_replicas_updated{namespace=~\"\
        db-.+\"}[10m]) == 0)\n      and on(namespace, deployment)\n        (kube_deployment_spec_replicas{namespace=~\"\
        db-.+\"} >= 2),\n      \"tenant\", \"$1\", \"namespace\", \"(.+)\"\n    )\n\
        \  )\n)\nunless on(tenant)\n(user_state_filter{filter=\"maintenance\"} ==\
        \ 1)\n"
    - alert: TenantHAReplicasDegraded
      expr: "(\n  rule_pack_kubernetes:ha_replicas_degraded:core\n  * on(tenant) group_left(runbook_url,\
        \ owner, tier)\n    tenant_metadata_info\n)\nor\n(\n  rule_pack_kubernetes:ha_replicas_degraded:core\n\
        \  unless on(tenant) tenant_metadata_info\n)\n"
      for: 15m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: HA workload for {{ $labels.tenant }} is running with reduced redundancy
        summary_zh: '{{ $labels.tenant }} 的 HA 工作負載正以降級（失去備援）狀態運行'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: ready replicas
          < desired on an HA set (≥2) — a replica is missing or not-ready. A vanished
          or stuck-rescheduled pod is invisible to the value-based DB liveness rules
          (#875), so this is the K8s-layer complement. Check kube_statefulset/deployment
          status + node health / scheduling.'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: HA 工作負載（≥2）就緒副本數
          < 期望數 — 有副本消失或未就緒。消失或重排卡住的 pod 對 value-based DB 存活規則（#875）不可見，故為 K8s 層互補。請查
          kube_statefulset/deployment 狀態 + 節點健康 / 排程。'
        description: Your HA database has fewer ready replicas than desired — redundancy
          is reduced or lost (at zero ready the workload is down, with a critical
          alert also firing). A node/pod failure or a stuck reschedule is the usual
          cause; one more failure could take the service down.
        description_zh: 您的 HA 資料庫就緒副本數少於期望值 — 備援已降低或失去（就緒數為 0 時工作負載已中斷，並應同時有 critical
          告警）。通常成因是節點/Pod 故障或排程卡住；再壞一個就可能導致服務中斷。
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
