apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-liveness
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: tenant-liveness
    rules:
    - alert: TenantExporterAbsent
      expr: tenant_expected_exporter unless on(tenant) (up{job="tenant-exporters"}
        == 1)
      for: 3m
      labels:
        severity: critical
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Exporter absent for tenant {{ $labels.tenant }} ({{ $labels.db_type
          }})
        summary_zh: 租戶 {{ $labels.tenant }} ({{ $labels.db_type }}) 的 exporter 缺席
        description: No healthy up{job="tenant-exporters"}==1 target for tenant {{
          $labels.tenant }} (db_type={{ $labels.db_type }}) for 3m. Either the exporter
          pod is down (up=0, Service alive) or the tenant's scrape target was removed
          (series absent). If this tenant was de-provisioned, ensure its conf.d _metadata
          was removed too (otherwise this is a stale-config false positive).
        description_zh: 租戶 {{ $labels.tenant }} (db_type={{ $labels.db_type }}) 已
          3 分鐘沒有健康的 up{job="tenant-exporters"}==1 目標。可能是 exporter pod 掛了 (up=0、Service
          還在) 或租戶的 scrape target 被移除 (series 缺席)。若此租戶已退租，請確認 conf.d _metadata 也一併移除
          (否則這是殘留組態造成的假陽性)。
