apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-postgresql
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: postgresql-normalization
    interval: 15s
    rules:
    - record: tenant:pg_connection_usage:ratio
      expr: '100 * max by(tenant) (pg_stat_activity_count)

        / on(tenant)

        clamp_min(max by(tenant) (pg_settings_max_connections), 1)

        '
    - record: tenant:pg_connections:max
      expr: max by(tenant) (pg_stat_activity_count)
    - record: tenant:pg_replication_lag:max
      expr: max by(tenant) (pg_replication_lag)
    - record: tenant:pg_deadlocks:rate5m
      expr: sum by(tenant) (rate(pg_stat_database_deadlocks[5m]))
    - record: tenant:pg_transactions:rate5m
      expr: 'sum by(tenant) (rate(pg_stat_database_xact_commit[5m]))

        + sum by(tenant) (rate(pg_stat_database_xact_rollback[5m]))

        '
    - record: tenant:pg_rollback_ratio:rate5m
      expr: "sum by(tenant) (rate(pg_stat_database_xact_rollback[5m]))\n/ on(tenant)\n\
        clamp_min(\n  sum by(tenant) (rate(pg_stat_database_xact_commit[5m]))\n  +\
        \ sum by(tenant) (rate(pg_stat_database_xact_rollback[5m])),\n  1\n)\n"
    - record: tenant:pg_uptime:hours
      expr: '(time() - min by(tenant) (pg_postmaster_start_time_seconds)) / 3600

        '
  - name: postgresql-threshold-normalization
    interval: 15s
    rules:
    - record: tenant:alert_threshold:pg_connections
      expr: max by(tenant) (user_threshold{metric="pg_connections", severity="warning"})
    - record: tenant:alert_threshold:pg_connections_critical
      expr: max by(tenant) (user_threshold{metric="pg_connections", severity="critical"})
    - record: tenant:alert_threshold:pg_replication_lag
      expr: max by(tenant) (user_threshold{metric="pg_replication_lag", severity="warning"})
    - record: tenant:alert_threshold:pg_replication_lag_critical
      expr: max by(tenant) (user_threshold{metric="pg_replication_lag", severity="critical"})
  - name: postgresql-alerts
    rules:
    - alert: PostgreSQLDown
      expr: pg_up == 0
      for: 15s
      labels:
        severity: critical
      annotations:
        summary: PostgreSQL instance {{ $labels.instance }} is DOWN
        summary_zh: PostgreSQL 實例 {{ $labels.instance }} 已關閉
        description: pg_up=0 for 15s on {{ $labels.instance }}
        description_zh: pg_up=0，持續 15 秒，實例：{{ $labels.instance }}
    - alert: PostgreSQLExporterAbsent
      expr: absent(pg_up{job="tenant-exporters"})
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: postgres_exporter target missing
        summary_zh: postgres_exporter 目標缺失
        description: No pg_up metric found for 30s
        description_zh: 找不到 pg_up 指標，持續 30 秒
    - alert: PostgreSQLHighConnections
      expr: "(\n  (\n    tenant:pg_connection_usage:ratio\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:pg_connections\n  )\n  unless on(tenant)\n  (user_state_filter{filter=\"\
        maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url, owner, tier)\n\
        \  tenant_metadata_info\n"
      for: 30s
      labels:
        severity: warning
        metric_group: pg_connections
      annotations:
        summary: High connection usage on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 連線使用率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: connection usage
          high — review max_connections and pool sizing'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：連線使用率過高 —
          檢查 max_connections 與連線集區大小設定'
        description: '{{ $value | printf "%.1f" }}% of max_connections used (warning
          threshold exceeded)'
        description_zh: 已使用 {{ $value | printf "%.1f" }}% 的 max_connections（超過警告閾值）
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PostgreSQLHighConnectionsCritical
      expr: "(\n  (\n    tenant:pg_connection_usage:ratio\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:pg_connections_critical\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 30s
      labels:
        severity: critical
        metric_group: pg_connections
      annotations:
        summary: Critical connection usage on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 連線使用率嚴重過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: critical connection
          saturation — immediate action needed'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：連線飽和 — 需立即採取行動'
        description: '{{ $value | printf "%.1f" }}% of max_connections used (critical
          threshold exceeded)'
        description_zh: 已使用 {{ $value | printf "%.1f" }}% 的 max_connections（超過嚴重閾值）
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PostgreSQLHighReplicationLag
      expr: "(\n  (\n    tenant:pg_replication_lag:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:pg_replication_lag\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 30s
      labels:
        severity: warning
        metric_group: pg_replication_lag
      annotations:
        summary: High replication lag on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 複寫延遲過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: replication
          lag elevated — check replica health'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：複寫延遲升高 — 檢查副本健態'
        description: '{{ $value | printf "%.1f" }}s replication lag (warning threshold
          exceeded)'
        description_zh: 複寫延遲 {{ $value | printf "%.1f" }}s（超過警告閾值）
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PostgreSQLHighReplicationLagCritical
      expr: "(\n  (\n    tenant:pg_replication_lag:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:pg_replication_lag_critical\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 30s
      labels:
        severity: critical
        metric_group: pg_replication_lag
      annotations:
        summary: Critical replication lag on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 複寫延遲嚴重'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: critical replication
          lag — failover risk, escalate'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：複寫延遲嚴重 — 有容錯移轉風險，需升級處理'
        description: '{{ $value | printf "%.1f" }}s replication lag (critical threshold
          exceeded)'
        description_zh: 複寫延遲 {{ $value | printf "%.1f" }}s（超過嚴重閾值）
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PostgreSQLHighDeadlocks
      expr: "(\n  tenant:pg_deadlocks:rate5m > 0.1\n  unless on(tenant)\n  (user_state_filter{filter=\"\
        maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url, owner, tier)\n\
        \  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Deadlocks detected on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 偵測到死鎖'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: deadlocks detected
          — application-level lock contention'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：偵測到死鎖 — 應用層鎖競爭'
        description: '{{ $value | printf "%.2f" }} deadlocks/sec over 5m'
        description_zh: '{{ $value | printf "%.2f" }} 次死鎖／秒（5 分鐘內）'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PostgreSQLHighRollbackRatio
      expr: "(\n  tenant:pg_rollback_ratio:rate5m > 0.05\n  unless on(tenant)\n  (user_state_filter{filter=\"\
        maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url, owner, tier)\n\
        \  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: High rollback ratio on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 回滾比率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: high rollback
          ratio — application error pattern'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：回滾比率過高 — 應用程式錯誤樣式'
        description: '{{ $value | humanizePercentage }} of transactions are rollbacks'
        description_zh: '{{ $value | humanizePercentage }} 的交易已回滾'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: PostgreSQLRecentRestart
      expr: '(time() - pg_postmaster_start_time_seconds) < 300

        '
      for: 0s
      labels:
        severity: info
      annotations:
        summary: '{{ $labels.instance }} restarted recently'
        summary_zh: '{{ $labels.instance }} 最近已重新啟動'
        description: PostgreSQL uptime is only {{ $value | printf "%.0f" }}s (< 5
          min)
        description_zh: PostgreSQL 運行時間僅 {{ $value | printf "%.0f" }}s（少於 5 分鐘）
