apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-mariadb
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: mariadb-normalization
    interval: 15s
    rules:
    - record: tenant:mysql_cpu_usage:rate5m
      expr: sum by(tenant) (rate(mysql_global_status_threads_running[5m]))
    - record: tenant:mysql_threads_connected:max
      expr: max by(tenant) (mysql_global_status_threads_connected)
    - record: tenant:mysql_connection_usage:ratio
      expr: 'sum by(tenant) (mysql_global_status_threads_connected)

        / sum by(tenant) (mysql_global_variables_max_connections)

        '
    - record: tenant:mysql_uptime:hours
      expr: min by(tenant) (mysql_global_status_uptime) / 3600
    - record: tenant:mysql_slow_queries:rate5m
      expr: sum by(tenant) (rate(mysql_global_status_slow_queries[5m]))
    - record: tenant:mysql_aborted_connections:rate5m
      expr: sum by(tenant) (rate(mysql_global_status_aborted_connects[5m]))
    - record: tenant:mysql_buffer_pool_usage:ratio
      expr: 'sum by(tenant) (mysql_global_status_innodb_buffer_pool_pages_data)

        / sum by(tenant) (mysql_global_status_innodb_buffer_pool_pages_total)

        '
  - name: mariadb-threshold-normalization
    interval: 15s
    rules:
    - record: tenant:alert_threshold:mysql_connections
      expr: max by(tenant) (user_threshold{component="mysql", metric="connections",
        severity="warning"})
    - record: tenant:alert_threshold:mysql_cpu
      expr: max by(tenant) (user_threshold{component="mysql", metric="cpu", severity="warning"})
    - record: tenant:alert_threshold:mysql_connections_critical
      expr: max by(tenant) (user_threshold{component="mysql", metric="connections",
        severity="critical"})
    - record: tenant:alert_threshold:mysql_cpu_critical
      expr: max by(tenant) (user_threshold{component="mysql", metric="cpu", severity="critical"})
  - name: mariadb-alerts
    rules:
    - alert: MariaDBDown
      expr: '(mysql_up == 0)

        unless on(tenant)

        (user_state_filter{filter="maintenance"} == 1)

        '
      for: 15s
      labels:
        severity: warning
        metric_group: liveness
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: MariaDB instance {{ $labels.instance }} is down (tenant {{ $labels.tenant
          }})
        summary_zh: MariaDB 實例 {{ $labels.instance }} 停機（租戶 {{ $labels.tenant }}）
        description: mysql_up=0 on {{ $labels.instance }}. One replica down in a primary-replica
          set keeps the service available (warning). Total outage escalates to MariaDBClusterDown
          (critical); loss of the writable primary to MariaDBNoPrimary (critical).
        description_zh: '{{ $labels.instance }} 的 mysql_up=0。primary-replica 架構下單一
          replica 停機時服務仍可用（warning）。整體中斷會升級為 MariaDBClusterDown（critical）；失去可寫 primary
          則為 MariaDBNoPrimary（critical）。'
    - alert: MariaDBClusterDown
      expr: max by(tenant) (mysql_up{job="tenant-exporters"}) == 0
      for: 30s
      labels:
        severity: critical
        metric_group: liveness
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: 'MariaDB: ALL instances down for tenant {{ $labels.tenant }}'
        summary_zh: MariaDB：租戶 {{ $labels.tenant }} 的所有實例皆停機
        description: No mysqld reports up=1 for tenant {{ $labels.tenant }} — total
          service outage, not a single-replica failover. For a planned single-instance
          drain, silence via the Alertmanager Silence API (no maintenance-window opt-out
          by design; a tenant's silent-critical sentinel still suppresses it).
        description_zh: 租戶 {{ $labels.tenant }} 沒有任何 mysqld 回報 up=1 — 整體服務中斷，非單一 replica
          failover。若為計畫性單實例維護，請用 Alertmanager Silence API 靜音（刻意不提供維護窗 opt-out；租戶的
          silent-critical sentinel 仍會壓制此告警）。
    - alert: MariaDBNoPrimary
      expr: 'count by(tenant) (mysql_global_variables_read_only{job="tenant-exporters"})

        unless

        count by(tenant) (mysql_global_variables_read_only{job="tenant-exporters"}
        == 0)

        '
      for: 2m
      labels:
        severity: critical
        metric_group: liveness
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: 'MariaDB: no writable primary for tenant {{ $labels.tenant }}'
        summary_zh: MariaDB：租戶 {{ $labels.tenant }} 沒有可寫 primary
        description: All instances are read_only for tenant {{ $labels.tenant }} —
          no writable primary (failover stuck / primary lost) → writes rejected. Unlike
          MariaDBClusterDown this fires while replicas are still up.
        description_zh: 租戶 {{ $labels.tenant }} 的所有實例皆為 read_only — 沒有可寫 primary（failover
          卡住／primary 遺失）→ 寫入被拒。與 MariaDBClusterDown 不同，此告警在 replica 仍存活時就會觸發。
    - alert: MariaDBExporterAbsent
      expr: absent(mysql_up{job="tenant-exporters"})
      for: 30s
      labels:
        severity: critical
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: mysqld-exporter target missing
        summary_zh: mysqld-exporter 目標缺失
        description: No mysql_up metric found for 30s
        description_zh: 找不到 mysql_up 指標，持續 30 秒
    - alert: MariaDBHighConnections
      expr: "(\n  (\n    (\n      tenant:mysql_threads_connected:max\n      > on(tenant)\
        \ group_left\n      tenant:alert_threshold:mysql_connections\n    )\n    unless\
        \ on(tenant)\n    (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n\
        \  * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  (\n    (\n      tenant:mysql_threads_connected:max\n      > on(tenant)\
        \ group_left\n      tenant:alert_threshold:mysql_connections\n    )\n    unless\
        \ on(tenant)\n    (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n\
        \  unless on(tenant) tenant_metadata_info\n)\n"
      for: 30s
      labels:
        severity: warning
        metric_group: connections
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: High connections on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 連線數過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: connection threshold
          breached — review connection pool sizing'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：連線數閾值超出 —
          檢查連線集區大小設定'
        description: '{{ $value }} threads connected (warning threshold exceeded)'
        description_zh: '{{ $value }} 個執行緒已連接（超過警告閾值）'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: MariaDBHighConnectionsCritical
      expr: "(\n  (\n    (\n      tenant:mysql_threads_connected:max\n      > on(tenant)\
        \ group_left\n      tenant:alert_threshold:mysql_connections_critical\n  \
        \  )\n    unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"\
        } == 1)\n  )\n  * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  (\n    (\n      tenant:mysql_threads_connected:max\n      > on(tenant)\
        \ group_left\n      tenant:alert_threshold:mysql_connections_critical\n  \
        \  )\n    unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"\
        } == 1)\n  )\n  unless on(tenant) tenant_metadata_info\n)\n"
      for: 30s
      labels:
        severity: critical
        metric_group: connections
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Critical connections on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 連線數嚴重過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: critical connection
          saturation — immediate capacity action needed'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：連線數飽和 — 需立即採取容量擴增行動'
        description: '{{ $value }} threads connected (critical threshold exceeded)'
        description_zh: '{{ $value }} 個執行緒已連接（超過嚴重閾值）'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: MariaDBHighCPU
      expr: "(\n  (\n    (\n      tenant:mysql_cpu_usage:rate5m\n      > on(tenant)\
        \ group_left\n      tenant:alert_threshold:mysql_cpu\n    )\n    unless on(tenant)\n\
        \    (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n  * on(tenant)\
        \ group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n)\nor\n\
        (\n  (\n    (\n      tenant:mysql_cpu_usage:rate5m\n      > on(tenant) group_left\n\
        \      tenant:alert_threshold:mysql_cpu\n    )\n    unless on(tenant)\n  \
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n  unless on(tenant)\
        \ tenant_metadata_info\n)\n"
      for: 30s
      labels:
        severity: warning
        metric_group: cpu
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: High CPU on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} CPU 過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: CPU threshold
          breached — review running-thread load'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：CPU 閾值超出 —
          檢查執行緒負載'
        description: '{{ $value }} running threads (warning threshold exceeded)'
        description_zh: '{{ $value }} 個執行中執行緒（超過警告閾值）'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: MariaDBHighCPUCritical
      expr: "(\n  (\n    (\n      tenant:mysql_cpu_usage:rate5m\n      > on(tenant)\
        \ group_left\n      tenant:alert_threshold:mysql_cpu_critical\n    )\n   \
        \ unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"} == 1)\n\
        \  )\n  * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  (\n    (\n      tenant:mysql_cpu_usage:rate5m\n      > on(tenant)\
        \ group_left\n      tenant:alert_threshold:mysql_cpu_critical\n    )\n   \
        \ unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"} == 1)\n\
        \  )\n  unless on(tenant) tenant_metadata_info\n)\n"
      for: 30s
      labels:
        severity: critical
        metric_group: cpu
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: Critical CPU on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} CPU 嚴重過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: critical CPU
          saturation — immediate investigation needed'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：CPU 飽和 — 需立即調查'
        description: '{{ $value }} running threads (critical threshold exceeded)'
        description_zh: '{{ $value }} 個執行中執行緒（超過嚴重閾值）'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: MariaDBSystemBottleneck
      expr: "(\n  (\n    (\n      (\n        tenant:mysql_threads_connected:max\n\
        \        > on(tenant) group_left\n        tenant:alert_threshold:mysql_connections\n\
        \      )\n      and on(tenant)\n      (\n        tenant:mysql_cpu_usage:rate5m\n\
        \        > on(tenant) group_left\n        tenant:alert_threshold:mysql_cpu\n\
        \      )\n    )\n    unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"\
        } == 1)\n  )\n  * on(tenant) group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n\
        )\nor\n(\n  (\n    (\n      (\n        tenant:mysql_threads_connected:max\n\
        \        > on(tenant) group_left\n        tenant:alert_threshold:mysql_connections\n\
        \      )\n      and on(tenant)\n      (\n        tenant:mysql_cpu_usage:rate5m\n\
        \        > on(tenant) group_left\n        tenant:alert_threshold:mysql_cpu\n\
        \      )\n    )\n    unless on(tenant)\n    (user_state_filter{filter=\"maintenance\"\
        } == 1)\n  )\n  unless on(tenant) tenant_metadata_info\n)\n"
      for: 60s
      labels:
        severity: critical
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: System bottleneck on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 系統瓶頸'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: CPU + connections
          both exceeded — multi-resource bottleneck, escalate'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：CPU 與連線皆超出
          — 多資源瓶頸，需升級處理'
        description: Both connections AND CPU thresholds exceeded simultaneously
        description_zh: CPU 與連線數閾值同時超出
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: MariaDBRecentRestart
      expr: mysql_global_status_uptime < 300
      for: 0s
      labels:
        severity: info
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: '{{ $labels.instance }} restarted recently'
        summary_zh: '{{ $labels.instance }} 最近已重新啟動'
        description: Uptime is only {{ $value }}s (< 5 min)
        description_zh: 運行時間僅 {{ $value }}s（少於 5 分鐘）
    - alert: MariaDBHighSlowQueries
      expr: "(\n  (\n    tenant:mysql_slow_queries:rate5m > 1\n    unless on(tenant)\n\
        \    (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n  * on(tenant)\
        \ group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n)\nor\n\
        (\n  (\n    tenant:mysql_slow_queries:rate5m > 1\n    unless on(tenant)\n\
        \    (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n  unless on(tenant)\
        \ tenant_metadata_info\n)\n"
      for: 5m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: High slow query rate on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 慢查詢率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: slow query rate
          elevated — query optimization review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：慢查詢率升高 — 需進行查詢最佳化檢查'
        description: '{{ $value | printf "%.2f" }} slow queries/sec'
        description_zh: '{{ $value | printf "%.2f" }} 次慢查詢／秒'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: MariaDBHighAbortedConnections
      expr: "(\n  (\n    tenant:mysql_aborted_connections:rate5m > 5\n    unless on(tenant)\n\
        \    (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n  * on(tenant)\
        \ group_left(runbook_url, owner, tier)\n    tenant_metadata_info\n)\nor\n\
        (\n  (\n    tenant:mysql_aborted_connections:rate5m > 5\n    unless on(tenant)\n\
        \    (user_state_filter{filter=\"maintenance\"} == 1)\n  )\n  unless on(tenant)\
        \ tenant_metadata_info\n)\n"
      for: 5m
      labels:
        severity: warning
        tenant: '{{ $labels.tenant }}'
      annotations:
        summary: High aborted connections on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 中止的連線數過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: aborted connection
          rate elevated — check client connectivity'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：中止連線率升高 —
          檢查客戶端連線狀態'
        description: '{{ $value | printf "%.2f" }} aborted connections/sec'
        description_zh: '{{ $value | printf "%.2f" }} 次中止連線／秒'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
