[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: 執行較慢的測試（benchmark, property-based）
    integration: 跨模組整合測試
    benchmark: 效能基線測試（需 pytest-benchmark）
    regression: 已知 bug 回歸測試
    snapshot: 輸出格式穩定性快照測試

[coverage:run]
source =
    scripts/tools
    components/da-tools/app
omit =
    tests/*
    */__pycache__/*
    */vendor/*

[coverage:report]
show_missing = true
precision = 1
skip_empty = true
fail_under = 80
exclude_lines =
    pragma: no cover
    if __name__ == .__main__
    raise NotImplementedError
    pass

[coverage:html]
directory = .build/htmlcov
