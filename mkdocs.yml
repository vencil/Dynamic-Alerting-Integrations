site_name: Dynamic Alerting Platform
site_description: Enterprise-grade Multi-Tenant Dynamic Alerting Platform for Kubernetes
site_author: Vencil Contributors
site_url: https://vencil.github.io/Dynamic-Alerting-Integrations/
repo_url: https://github.com/vencil/Dynamic-Alerting-Integrations
repo_name: vencil/Dynamic-Alerting-Integrations
edit_uri: edit/main/

copyright: Copyright &copy; 2025 Vencil. Licensed under Apache 2.0.

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  features:
    # Navigation & Discovery
    - navigation.instant
    - navigation.instant.loading
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    # Content Discovery
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    # Page Content
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # UI Features
    - announce.dismiss

  palette:
    # Light mode
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 深色模式
    # Dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 淺色模式

  font:
    text: Roboto
    code: Roboto Mono

  # Icon customizations
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags: {}
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: zh
          name: 中文
          default: true
          build: true
          nav_translations:
            Home: 首頁
            Getting Started: 快速入門
            Core Architecture: 核心架構
            Integration Guides: 整合指南
            Migration: 遷移
            Governance & Security: 治理與安全
            Scenarios: 場景
            Reference: 參考
        - locale: en
          name: English
          build: true
          nav_translations:
            首頁: Home
            快速入門: Getting Started
            核心架構: Core Architecture
            整合指南: Integration Guides
            遷移: Migration
            治理與安全: Governance & Security
            場景: Scenarios
            參考: Reference
            架構與設計: Architecture & Design
            Context 圖: Context Diagram
            性能基準: Performance Benchmarks
            GitOps 部署: GitOps Deployment
            遷移指南: Migration Guide
            遷移引擎: Migration Engine
            Custom Rule 治理: Custom Rule Governance
            進階場景: Advanced Scenarios
            Shadow Monitoring 切換: Shadow Monitoring Cutover
            多叢集 Federation: Multi-cluster Federation
            Tenant 生命週期: Tenant Lifecycle
            API 端點: API Endpoints
            Alert 速查: Alert Reference
            故障排查: Troubleshooting
            術語表: Glossary
            架構決策 (ADR): Architecture Decisions (ADR)
            總覽: Overview
            CLI 速查表: CLI Cheat Sheet
            互動式工具: Interactive Tools

markdown_extensions:
  # Tables
  - tables
  # Admonitions (notes, warnings, etc.)
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Code highlighting
  - pymdownx.highlight:
      use_pygments: true
      pygments_style: material
      anchor_linenums: true
      line_anchors: ''
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  # Lists & Tabs
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  # Emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  # Other
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html
  - footnotes
  - abbr

extra:
  # Alternate language links
  alternate:
    - name: 中文
      lang: zh
      link: /Dynamic-Alerting-Integrations/
    - name: English
      lang: en
      link: /Dynamic-Alerting-Integrations/en/

  # Analytics (uncomment and configure for your provider)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
  #   feedback:
  #     title: 這個頁面對你有幫助嗎？
  #     ratings:
  #       - icon: material/emoticon-happy-outline
  #         name: 有幫助
  #         data: 1
  #         note: 感謝回饋！
  #       - icon: material/emoticon-sad-outline
  #         name: 需改進
  #         data: 0
  #         note: 感謝回饋！我們會持續改進。

  # Social links
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vencil/Dynamic-Alerting-Integrations
      name: GitHub

  # Platform version — single source of truth for docs
  # Access in templates via {{ config.extra.platform_version }}
  # bump_docs.py updates this field automatically
  platform_version: "2.3.0"
  exporter_version: "2.3.0"
  tools_version: "2.3.0"

  # Version info
  version:
    provider: mike

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js
  - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js

