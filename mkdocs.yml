      - ADR-001 Severity Dedup via Inhibit: docs/adr/001-severity-dedup-via-inhibit.md
      - ADR-002 OCI Registry: docs/adr/002-oci-registry-over-chartmuseum.md
      - ADR-003 Sentinel Alert Pattern: docs/adr/003-sentinel-alert-pattern.md
      - ADR-004 Federation Scenario A First: docs/adr/004-federation-scenario-a-first.md
      - ADR-005 Projected Volume: docs/adr/005-projected-volume-for-rule-packs.md
  - 整合指南:
    - BYO Prometheus: docs/byo-prometheus-integration.md
    - BYO Alertmanager: docs/byo-alertmanager-integration.md
    - Federation: docs/federation-integration.md
    - GitOps 部署: docs/gitops-deployment.md
  - 遷移:
    - 遷移指南: docs/migration-guide.md
    - 遷移引擎: docs/migration-engine.md
    - Shadow Monitoring SOP: docs/shadow-monitoring-sop.md
  - 治理與安全:
    - 治理與安全: docs/governance-security.md
    - Custom Rule 治理: docs/custom-rule-governance.md
  - 場景:
    - Alert Routing Split: docs/scenarios/alert-routing-split.md
    - 進階場景: docs/scenarios/advanced-scenarios.md
    - Shadow Monitoring 切換: docs/scenarios/shadow-monitoring-cutover.md
    - 多叢集 Federation: docs/scenarios/multi-cluster-federation.md
    - Tenant 生命週期: docs/scenarios/tenant-lifecycle.md
  - 參考:
    - da-tools CLI: docs/cli-reference.md
    - CLI 速查表: docs/cheat-sheet.md
    - 互動式工具: docs/interactive-tools.md
