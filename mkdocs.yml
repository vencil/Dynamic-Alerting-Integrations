site_name: Dynamic Alerting Platform
site_description: Enterprise-grade Multi-Tenant Dynamic Alerting Platform for Kubernetes
site_author: Vencil Contributors
site_url: https://vencil.github.io/vibe-k8s-lab/
repo_url: https://github.com/vencil/vibe-k8s-lab
repo_name: vencil/vibe-k8s-lab
edit_uri: edit/main/

copyright: Copyright &copy; 2025 Vencil. Licensed under Apache 2.0.

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  favicon: docs/assets/favicon.ico
  logo: docs/assets/logo.svg
  features:
    # Navigation & Discovery
    - navigation.instant
    - navigation.instant.loading
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    # Content Discovery
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    # Page Content
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # UI Features
    - announce.dismiss

  palette:
    # Light mode
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 深色模式
    # Dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 淺色模式

  font:
    text: Roboto
    code: Roboto Mono

  # Icon customizations
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      prebuild_index: true
  - tags:
      tags_file: docs/tags.md
  - i18n:
      default_language: zh
      languages:
        zh:
          name: 中文
          build: true
        en:
          name: English
          build: true
      nav_translations:
        en:
          首頁: Home
          快速入門: Getting Started
          核心架構: Core Architecture
          整合指南: Integration Guides
          遷移: Migration
          治理與安全: Governance & Security
          場景: Scenarios
          參考: Reference
          Platform Engineers: Platform Engineers
          Domain Experts: Domain Experts
          Tenants: Tenants
          架構與設計: Architecture & Design
          Context 圖: Context Diagram
          性能基準: Performance Benchmarks
          BYO Prometheus: BYO Prometheus
          BYO Alertmanager: BYO Alertmanager
          Federation: Federation
          GitOps 部署: GitOps Deployment
          遷移指南: Migration Guide
          遷移引擎: Migration Engine
          Shadow Monitoring SOP: Shadow Monitoring SOP
          治理與安全: Governance & Security
          Custom Rule 治理: Custom Rule Governance
          Alert Routing Split: Alert Routing Split
          進階場景: Advanced Scenarios
          Shadow Monitoring 切換: Shadow Monitoring Cutover
          多叢集 Federation: Multi-cluster Federation
          Tenant 生命週期: Tenant Lifecycle
          da-tools CLI: da-tools CLI
          API 端點: API Endpoints
          Grafana Dashboards: Grafana Dashboards
          Rule Packs: Rule Packs
          Alert 速查: Alert Reference
          故障排查: Troubleshooting
          術語表: Glossary
          架構決策 (ADR): Architecture Decisions (ADR)
          總覽: Overview
          CLI 速查表: CLI Cheat Sheet
          互動式工具: Interactive Tools
          JSON Schema: JSON Schema
          Changelog: Changelog

markdown_extensions:
  # Tables
  - tables
  # Admonitions (notes, warnings, etc.)
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Code highlighting
  - pymdownx.highlight:
      use_pygments: true
      pygments_style: material
      anchor_linenums: true
      line_anchors: ''
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  # Lists & Tabs
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  # Emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  # Other
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html
  - footnotes
  - abbr

extra:
  # Alternate language links
  alternate:
    - name: 中文
      lang: zh
      link: /vibe-k8s-lab/
    - name: English
      lang: en
      link: /vibe-k8s-lab/en/

  # Analytics (uncomment and configure for your provider)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
  #   feedback:
  #     title: 這個頁面對你有幫助嗎？
  #     ratings:
  #       - icon: material/emoticon-happy-outline
  #         name: 有幫助
  #         data: 1
  #         note: 感謝回饋！
  #       - icon: material/emoticon-sad-outline
  #         name: 需改進
  #         data: 0
  #         note: 感謝回饋！我們會持續改進。

  # Social links
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vencil/vibe-k8s-lab
      name: GitHub

  # Platform version — single source of truth for docs
  # Access in templates via {{ config.extra.platform_version }}
  # bump_docs.py updates this field automatically
  platform_version: "1.13.0"
  exporter_version: "1.9.0"
  tools_version: "1.13.0"

  # Version info
  version:
    provider: mike

extra_css:
  - docs/assets/extra.css

extra_javascript:
  - docs/assets/extra.js
  - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js

nav:
