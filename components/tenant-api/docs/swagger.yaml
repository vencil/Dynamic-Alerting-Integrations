basePath: /api/v1
definitions:
  config.EffectiveConfig:
    properties:
      defaults_chain:
        items:
          type: string
        type: array
      effective_config:
        additionalProperties: {}
        type: object
      merged_hash:
        type: string
      source_file:
        type: string
      source_hash:
        type: string
      tenant_id:
        type: string
      warnings:
        items:
          type: string
        type: array
    type: object
  config.ResolvedThreshold:
    properties:
      component:
        type: string
      customLabels:
        additionalProperties:
          type: string
        description: dimensional labels from {key="value"} syntax
        type: object
      metric:
        type: string
      regexLabels:
        additionalProperties:
          type: string
        description: regex labels from {key=~"pattern"} syntax
        type: object
      severity:
        type: string
      tenant:
        type: string
      value:
        format: float64
        type: number
    type: object
  github_com_vencil_tenant-api_internal_federation_fedpolicy.Config:
    properties:
      whitelist:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_federation_fedpolicy.WhitelistEntry'
        type: array
    type: object
  github_com_vencil_tenant-api_internal_federation_fedpolicy.Subset:
    properties:
      metrics:
        items:
          type: string
        type: array
    type: object
  github_com_vencil_tenant-api_internal_federation_fedpolicy.WhitelistEntry:
    properties:
      metric:
        type: string
    type: object
  github_com_vencil_tenant-api_internal_platform.MergeableState:
    enum:
    - ""
    - mergeable
    - conflict
    type: string
    x-enum-varnames:
    - MergeableUnknown
    - MergeableOK
    - MergeableConflict
  github_com_vencil_tenant-api_internal_platform.PRInfo:
    properties:
      created_at:
        description: ISO 8601 timestamp
        type: string
      head_ref:
        description: Source branch name
        type: string
      mergeable:
        allOf:
        - $ref: '#/definitions/github_com_vencil_tenant-api_internal_platform.MergeableState'
        description: |-
          Mergeable is the conflict-visibility tri-state (#646). GitLab populates
          it from the list-MR response's detailed_merge_status (free); GitHub
          leaves it MergeableUnknown (list-PRs API omits it). See MergeableState.
      number:
        description: GitHub PR number or GitLab MR IID
        type: integer
      state:
        description: '"open"/"opened", "closed", "merged"'
        type: string
      tenant_id:
        description: Extracted from branch name
        type: string
      title:
        description: PR/MR title
        type: string
      web_url:
        description: Browser-accessible URL
        type: string
    type: object
  internal_handler.BatchOperation:
    properties:
      patch:
        additionalProperties:
          type: string
        description: 'key → value to set (e.g., "_silent_mode": "warning")'
        type: object
      tenant_id:
        maxLength: 256
        minLength: 1
        type: string
    required:
    - tenant_id
    type: object
  internal_handler.BatchRequest:
    properties:
      operations:
        items:
          $ref: '#/definitions/internal_handler.BatchOperation'
        maxItems: 1000
        minItems: 1
        type: array
    required:
    - operations
    type: object
  internal_handler.BatchResponse:
    properties:
      message:
        description: 'v2.6.0: human-readable message'
        type: string
      pr_number:
        description: 'v2.6.0: PR/MR number in PR mode'
        type: integer
      pr_url:
        description: 'v2.6.0: PR/MR URL in PR mode'
        type: string
      results:
        items:
          $ref: '#/definitions/internal_handler.BatchResult'
        type: array
      status:
        description: '"completed" | "pending_review" (PR mode)'
        type: string
      summary:
        description: e.g., "5 succeeded, 1 failed"
        type: string
      task_id:
        description: async task ID
        type: string
    type: object
  internal_handler.BatchResult:
    properties:
      message:
        type: string
      status:
        description: '"ok" | "error"'
        type: string
      tenant_id:
        type: string
    type: object
  internal_handler.DiffRequest:
    properties:
      proposed:
        description: proposed YAML content
        type: string
    type: object
  internal_handler.DiffResponse:
    properties:
      diff:
        type: string
      has_diff:
        type: boolean
      tenant_id:
        type: string
    type: object
  internal_handler.DiscoverMetricsResponse:
    properties:
      metrics:
        description: Metrics is the sorted list of metric names visible to this tenant.
        items:
          type: string
        type: array
      truncated:
        description: |-
          Truncated is true when the result hit the server-side cap; the
          caller should narrow with a longer prefix.
        type: boolean
    type: object
  internal_handler.ErrorResponse:
    properties:
      action:
        type: string
      code:
        type: string
      error:
        type: string
      help:
        type: string
      request_id:
        type: string
      retry_after_s:
        type: integer
      violations:
        items:
          $ref: '#/definitions/internal_handler.Violation'
        type: array
    type: object
  internal_handler.GroupBatchRequest:
    properties:
      patch:
        additionalProperties:
          type: string
        description: 'key → value (e.g., "_silent_mode": "warning")'
        type: object
    type: object
  internal_handler.GroupBatchResponse:
    properties:
      group_id:
        type: string
      results:
        items:
          $ref: '#/definitions/internal_handler.BatchResult'
        type: array
      status:
        type: string
      summary:
        description: e.g., "5 succeeded, 1 failed"
        type: string
      task_id:
        type: string
    type: object
  internal_handler.GroupResponse:
    properties:
      description:
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      id:
        type: string
      label:
        type: string
      members:
        items:
          type: string
        type: array
    type: object
  internal_handler.MeResponse:
    properties:
      accessible_domains:
        description: nil = all
        items:
          type: string
        type: array
      accessible_environments:
        description: nil = all
        items:
          type: string
        type: array
      accessible_tenants:
        items:
          type: string
        type: array
      email:
        type: string
      groups:
        items:
          type: string
        type: array
      permissions:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      user:
        type: string
    type: object
  internal_handler.PRListResponse:
    properties:
      count:
        type: integer
      pending_prs:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_platform.PRInfo'
        type: array
    type: object
  internal_handler.PutCustomAlertsRequest:
    properties:
      base_hash:
        description: |-
          BaseHash is the source_hash the client got from GET. REQUIRED —
          optimistic concurrency is the safe default, not opt-in: an empty
          base_hash would silently disable clobber protection (self-review F2).
        type: string
      custom_alerts:
        description: |-
          CustomAlerts is the desired FULL recipe list (collection-replace —
          the client owns the array, having loaded it via GET). A POINTER so an
          ABSENT field (nil) is rejected — a truncated/buggy request must NOT
          be read as "delete every recipe" (self-review F1, a data-loss
          footgun). An explicit empty array `[]` IS the intentional delete-all
          (Reef 2).
        items:
          additionalProperties: {}
          type: object
        type: array
    type: object
  internal_handler.PutCustomAlertsResponse:
    properties:
      source_hash:
        description: new hash post-write (for the next edit)
        type: string
      status:
        type: string
      tenant_id:
        type: string
    type: object
  internal_handler.PutGroupRequest:
    properties:
      description:
        maxLength: 4096
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      label:
        maxLength: 256
        minLength: 1
        type: string
      members:
        items:
          type: string
        maxItems: 1000
        type: array
    required:
    - label
    type: object
  internal_handler.PutTenantResponse:
    properties:
      message:
        type: string
      pr_number:
        type: integer
      pr_url:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      warnings:
        items:
          type: string
        type: array
    type: object
  internal_handler.PutViewRequest:
    properties:
      description:
        maxLength: 1024
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      label:
        maxLength: 256
        minLength: 1
        type: string
    required:
    - filters
    - label
    type: object
  internal_handler.TenantDetail:
    properties:
      id:
        type: string
      raw_yaml:
        type: string
      resolved_thresholds:
        items:
          $ref: '#/definitions/config.ResolvedThreshold'
        type: array
      source_hash:
        description: |-
          SourceHash is SHA-256[:16] of the raw tenant file. Clients echo it
          back as `base_hash` on PUT .../custom-alerts for optimistic-
          concurrency (ADR-024 §S6b-2): the write 409s if the file changed
          underneath them.
        type: string
      validation_warnings:
        items:
          type: string
        type: array
    type: object
  internal_handler.TenantSummary:
    properties:
      db_type:
        type: string
      domain:
        type: string
      environment:
        type: string
      groups:
        items:
          type: string
        type: array
      id:
        type: string
      maintenance:
        type: string
      owner:
        type: string
      profile:
        type: string
      region:
        type: string
      silent_mode:
        type: string
      tags:
        items:
          type: string
        type: array
      tier:
        type: string
    type: object
  internal_handler.ValidateResponse:
    properties:
      valid:
        type: boolean
      warnings:
        items:
          type: string
        type: array
    type: object
  internal_handler.ViewResponse:
    properties:
      created_by:
        type: string
      description:
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      id:
        type: string
      label:
        type: string
    type: object
  internal_handler.Violation:
    properties:
      field:
        type: string
      reason:
        type: string
    type: object
  internal_handler_federation.CreateFederationTokenRequest:
    properties:
      description:
        maxLength: 256
        type: string
      tenant_id:
        maxLength: 128
        minLength: 1
        type: string
    required:
    - tenant_id
    type: object
  internal_handler_federation.CreateFederationTokenResponse:
    properties:
      record:
        $ref: '#/definitions/internal_handler_federation.FederationTokenRecord'
      token:
        type: string
    type: object
  internal_handler_federation.FederationTokenRecord:
    properties:
      description:
        type: string
      expires_at:
        type: string
      issued_at:
        type: string
      issued_by:
        type: string
      tenant_id:
        type: string
      token_id:
        type: string
    type: object
  internal_handler_federation.PutFederationPolicyRequest:
    properties:
      force:
        type: boolean
      reason:
        type: string
      whitelist:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_federation_fedpolicy.WhitelistEntry'
        type: array
    type: object
info:
  contact: {}
  description: |-
    Multi-tenant configuration management API for the Dynamic Alerting Platform.
    Provides CRUD over per-tenant alert thresholds, RBAC-scoped writes, and async batch operations.
    Auth is enforced by the oauth2-proxy sidecar and forwarded via X-Forwarded-Email / X-Forwarded-Groups.
  license:
    name: See repository LICENSE
  title: Tenant API
  version: v2.8.0
paths:
  /api/v1/federation/policy:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vencil_tenant-api_internal_federation_fedpolicy.Config'
      summary: Get the platform federation whitelist
      tags:
      - federation
    put:
      consumes:
      - application/json
      parameters:
      - description: Whitelist + optional admission force/reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_federation.PutFederationPolicyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Replace the platform federation whitelist
      tags:
      - federation
  /api/v1/federation/tokens:
    get:
      description: Returns the non-expired federation token records for the tenant
        named by the tenant_id query parameter. Requires admin permission on that
        tenant. The signed JWTs themselves are not returned.
      parameters:
      - description: Tenant ID
        in: query
        name: tenant_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler_federation.FederationTokenRecord'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List a tenant's federation tokens
      tags:
      - federation
    post:
      consumes:
      - application/json
      description: Mints a short-lived RS256 JWT for the named tenant (ADR-020). Requires
        admin permission on the tenant. The signed token is returned once and is not
        retrievable afterwards.
      parameters:
      - description: Token request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_federation.CreateFederationTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler_federation.CreateFederationTokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Issue a tenant federation token
      tags:
      - federation
  /api/v1/federation/tokens/{id}:
    delete:
      description: 'Revokes a federation token — removes its record and adds it to
        the gateway revoked set. NOTE: revocation is eventually consistent and propagates
        to the gateway within ~1-2 minutes (ADR-020 Posture B). Requires admin permission
        on the token''s tenant.'
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Revoke a federation token
      tags:
      - federation
  /api/v1/groups:
    get:
      description: Returns tenant groups visible to the authenticated user, filtered
        by RBAC.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.GroupResponse'
            type: array
      summary: List all custom groups
      tags:
      - groups
  /api/v1/groups/{id}:
    delete:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a group
      tags:
      - groups
    get:
      description: Returns a tenant group by ID.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.GroupResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a single group
      tags:
      - groups
    put:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Group definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.PutGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create or update a group
      tags:
      - groups
  /api/v1/groups/{id}/batch:
    post:
      consumes:
      - application/json
      description: Apply a patch to all tenants in a group.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Patch to apply
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.GroupBatchRequest'
      - description: Enable async mode (true/false)
        in: query
        name: async
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.GroupBatchResponse'
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Batch operation on group members
      tags:
      - groups
  /api/v1/me:
    get:
      description: Returns the authenticated user's email, groups, accessible tenants,
        and permissions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.MeResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current user identity and permissions
      tags:
      - identity
  /api/v1/prs:
    get:
      description: Returns pending pull/merge requests created by tenant-api, filtered
        by caller's tenant RBAC.
      parameters:
      - description: Filter by tenant ID
        in: query
        name: tenant
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.PRListResponse'
      summary: List pending PRs/MRs
      tags:
      - prs
  /api/v1/tenants:
    get:
      description: Returns tenants visible to the authenticated user, filtered by
        RBAC.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.TenantSummary'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List tenants
      tags:
      - tenants
  /api/v1/tenants/{id}:
    get:
      description: Returns the raw YAML and resolved thresholds for a single tenant.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.TenantDetail'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get tenant config
      tags:
      - tenants
    put:
      consumes:
      - application/yaml
      description: Validates, writes, and commits a tenant's YAML configuration.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: Tenant YAML content
        in: body
        name: body
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.PutTenantResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update tenant config
      tags:
      - tenants
  /api/v1/tenants/{id}/custom-alerts:
    put:
      consumes:
      - application/json
      description: |-
        Merges the supplied recipe array into the tenant's
        `_custom_alerts` (comment-preserving AST edit), validates
        (S5 Go validator), and commits. Optimistic concurrency via
        base_hash (409 on drift). Empty array deletes the key.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: Desired recipe list + base_hash
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.PutCustomAlertsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.PutCustomAlertsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Replace a tenant's custom-alert recipes
      tags:
      - tenants
  /api/v1/tenants/{id}/diff:
    post:
      consumes:
      - application/json
      description: Returns unified diff between current file and proposed content.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: Proposed YAML
        in: body
        name: body
        required: true
