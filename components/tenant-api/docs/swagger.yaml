basePath: /api/v1
definitions:
  ErrorResponse:
    properties:
      action:
        type: string
      code:
        type: string
      error:
        type: string
      help:
        type: string
      request_id:
        type: string
      retry_after_s:
        type: integer
      violations:
        items:
          $ref: '#/definitions/Violation'
        type: array
    type: object
  Violation:
    properties:
      field:
        type: string
      reason:
        type: string
    type: object
  config.EffectiveConfig:
    properties:
      defaults_chain:
        items:
          type: string
        type: array
      effective_config:
        additionalProperties: {}
        type: object
      merged_hash:
        type: string
      source_file:
        type: string
      source_hash:
        type: string
      tenant_id:
        type: string
      warnings:
        items:
          type: string
        type: array
    type: object
  config.ResolvedThreshold:
    properties:
      component:
        type: string
      customLabels:
        additionalProperties:
          type: string
        description: dimensional labels from {key="value"} syntax
        type: object
      metric:
        type: string
      regexLabels:
        additionalProperties:
          type: string
        description: regex labels from {key=~"pattern"} syntax
        type: object
      severity:
        type: string
      tenant:
        type: string
      value:
        format: float64
        type: number
    type: object
  github_com_vencil_tenant-api_internal_federation_fedpolicy.Config:
    properties:
      whitelist:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_federation_fedpolicy.WhitelistEntry'
        type: array
    type: object
  github_com_vencil_tenant-api_internal_federation_fedpolicy.Subset:
    properties:
      metrics:
        items:
          type: string
        type: array
    type: object
  github_com_vencil_tenant-api_internal_federation_fedpolicy.WhitelistEntry:
    properties:
      metric:
        type: string
    type: object
  github_com_vencil_tenant-api_internal_platform.MergeableState:
    enum:
    - ""
    - mergeable
    - conflict
    type: string
    x-enum-varnames:
    - MergeableUnknown
    - MergeableOK
    - MergeableConflict
  github_com_vencil_tenant-api_internal_platform.PRInfo:
    properties:
      created_at:
        description: ISO 8601 timestamp
        type: string
      head_ref:
        description: Source branch name
        type: string
      mergeable:
        allOf:
        - $ref: '#/definitions/github_com_vencil_tenant-api_internal_platform.MergeableState'
        description: |-
          Mergeable is the conflict-visibility tri-state (#646). GitLab populates
          it from the list-MR response's detailed_merge_status (free); GitHub
          leaves it MergeableUnknown (list-PRs API omits it). See MergeableState.
      number:
        description: GitHub PR number or GitLab MR IID
        type: integer
      state:
        description: '"open"/"opened", "closed", "merged"'
        type: string
      tenant_id:
        description: Extracted from branch name
        type: string
      title:
        description: PR/MR title
        type: string
      web_url:
        description: Browser-accessible URL
        type: string
    type: object
  github_com_vencil_tenant-api_internal_rbac.BoolProvenance:
    properties:
      source:
        type: string
      value:
        type: boolean
    type: object
  github_com_vencil_tenant-api_internal_rbac.CoverageGap:
    properties:
      status:
        type: string
      surface:
        type: string
    type: object
  github_com_vencil_tenant-api_internal_rbac.EffectivePerms:
    properties:
      admin:
        type: boolean
      read:
        type: boolean
      write:
        type: boolean
    type: object
  github_com_vencil_tenant-api_internal_rbac.Permission:
    enum:
    - read
    - write
    - admin
    type: string
    x-enum-varnames:
    - PermRead
    - PermWrite
    - PermAdmin
  github_com_vencil_tenant-api_internal_rbac.ReverseCompleteness:
    properties:
      covers:
        items:
          type: string
        type: array
      not_covered:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.CoverageGap'
        type: array
    type: object
  github_com_vencil_tenant-api_internal_rbac.ReverseConfigAnchor:
    properties:
      rbac_sha256:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.StringProvenance'
      tenant_orgs_sha256:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.StringProvenance'
    type: object
  github_com_vencil_tenant-api_internal_rbac.ReverseFlags:
    properties:
      metadata_scope_enforce:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.BoolProvenance'
      org_scope_enforce:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.BoolProvenance'
    type: object
  github_com_vencil_tenant-api_internal_rbac.ReverseGrant:
    properties:
      constraints_not_evaluated:
        description: |-
          ConstraintsNotEvaluated is the fixed machine-readable declaration that
          this report transcribes environments/domains but never evaluates them
          against the tenant's actual labels (axis-2 decision 2b) — a reader must
          not treat a transcribed constraint as a verified restriction.
        items:
          type: string
        type: array
      domains:
        items:
          type: string
        type: array
      domains_count:
        description: redacted view only
        type: integer
      effective:
        allOf:
        - $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.EffectivePerms'
        description: ruleGrants expansion
      environments:
        description: |-
          Environments/Domains transcribe the rule verbatim; NOT evaluated against
          tenant labels (axis 2). The redacted view STRIPS the verbatim strings —
          they are free-form text that can carry customer-recognizable markers, and
          the redacted audience is wider than platform admins — keeping the keys
          (emptied) and carrying the sizes in EnvironmentsCount/DomainsCount
          (redacted view only, mirroring who.groups_count/claims_count).
        items:
          type: string
        type: array
      environments_count:
        description: redacted view only
        type: integer
      index:
        type: integer
      org_gate:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseOrgGate'
      pattern_kind:
        description: 'redacted view only: literal|prefix|wildcard'
        type: string
      permissions:
        description: rule verbatim
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.Permission'
        type: array
      platform_wide:
        description: |-
          PlatformWide is RULE-level: true iff ANY pattern in the rule's tenant
          list is the literal "*" (the same tenantMatches(rule.Tenants, "*") borrow
          the endpoint bar runs) — NOT a property of the first-hit TenantPattern,
          which stays the narrower member on a mixed list like ["db-team-1","*"].
        type: boolean
      rule:
        description: stripped in the redacted view
        type: string
      surfaces:
        items:
          type: string
        type: array
      tenant_pattern:
        description: the pattern that hit X; stripped when redacted
        type: string
      who:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseWho'
    type: object
  github_com_vencil_tenant-api_internal_rbac.ReverseOrgGate:
    properties:
      claim_key:
        type: string
      outcome_enforce:
        type: string
      outcome_shadow:
        type: string
      passing_org_values:
        description: opt-in (IncludeOrgValues); sorted
        items:
          type: string
        type: array
      required:
        type: boolean
      unsatisfiable:
        type: boolean
    type: object
  github_com_vencil_tenant-api_internal_rbac.ReverseReport:
    properties:
      advisory:
        type: string
      completeness:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseCompleteness'
      config_anchor:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseConfigAnchor'
      flags:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseFlags'
      generated_at:
        type: string
      grants:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseGrant'
        type: array
      mode:
        type: string
      schema_version:
        type: integer
      tenant:
        $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseTenant'
      verdict:
        type: string
    type: object
  github_com_vencil_tenant-api_internal_rbac.ReverseTenant:
    properties:
      id:
        type: string
      org_status:
        type: string
      orgs:
        description: opt-in; sorted; absent by default
        items:
          type: string
        type: array
    type: object
  github_com_vencil_tenant-api_internal_rbac.ReverseWho:
    properties:
      claims_all_of:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      claims_count:
        description: redacted view only
        type: integer
      groups_any_of:
        items:
          type: string
        type: array
      groups_count:
        description: redacted view only
        type: integer
      kind:
        type: string
      legacy_group:
        type: string
    type: object
  github_com_vencil_tenant-api_internal_rbac.StringProvenance:
    properties:
      source:
        type: string
      value:
        type: string
    type: object
  internal_handler.AccessResponse:
    properties:
      allow:
        description: Allow is always true in a 200 response (see the type doc).
        type: boolean
      permission:
        description: Permission is the permission level that was checked.
        type: string
      tenant:
        description: Tenant echoes the authorized tenant ID.
        type: string
    type: object
  internal_handler.BatchOperation:
    properties:
      patch:
        additionalProperties:
          type: string
        description: 'key → value to set (e.g., "_silent_mode": "warning")'
        type: object
      tenant_id:
        maxLength: 256
        minLength: 1
        type: string
    required:
    - tenant_id
    type: object
  internal_handler.BatchRequest:
    properties:
      operations:
        items:
          $ref: '#/definitions/internal_handler.BatchOperation'
        maxItems: 1000
        minItems: 1
        type: array
    required:
    - operations
    type: object
  internal_handler.BatchResponse:
    properties:
      message:
        description: 'v2.6.0: human-readable message'
        type: string
      pr_number:
        description: 'v2.6.0: PR/MR number in PR mode'
        type: integer
      pr_url:
        description: 'v2.6.0: PR/MR URL in PR mode'
        type: string
      results:
        items:
          $ref: '#/definitions/internal_handler.BatchResult'
        type: array
      status:
        description: '"completed" | "pending_review" (PR mode)'
        type: string
      summary:
        description: e.g., "5 succeeded, 1 failed"
        type: string
      task_id:
        description: async task ID
        type: string
    type: object
  internal_handler.BatchResult:
    properties:
      message:
        type: string
      status:
        description: '"ok" | "error"'
        type: string
      tenant_id:
        type: string
    type: object
  internal_handler.DiffRequest:
    properties:
      proposed:
        description: proposed YAML content
        type: string
    type: object
  internal_handler.DiffResponse:
    properties:
      diff:
        type: string
      has_diff:
        type: boolean
      tenant_id:
        type: string
    type: object
  internal_handler.DiscoverMetricsResponse:
    properties:
      metrics:
        description: Metrics is the sorted list of metric names visible to this tenant.
        items:
          type: string
        type: array
      truncated:
        description: |-
          Truncated is true when the result hit the server-side cap; the
          caller should narrow with a longer prefix.
        type: boolean
    type: object
  internal_handler.GroupBatchRequest:
    properties:
      patch:
        additionalProperties:
          type: string
        description: 'key → value (e.g., "_silent_mode": "warning")'
        type: object
    type: object
  internal_handler.GroupBatchResponse:
    properties:
      group_id:
        type: string
      results:
        items:
          $ref: '#/definitions/internal_handler.BatchResult'
        type: array
      status:
        type: string
      summary:
        description: e.g., "5 succeeded, 1 failed"
        type: string
      task_id:
        type: string
    type: object
  internal_handler.GroupResponse:
    properties:
      description:
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      id:
        type: string
      label:
        type: string
      members:
        items:
          type: string
        type: array
    type: object
  internal_handler.MeResponse:
    properties:
      accessible_domains:
        description: nil = all
        items:
          type: string
        type: array
      accessible_environments:
        description: nil = all
        items:
          type: string
        type: array
      accessible_tenants:
        items:
          type: string
        type: array
      claims:
        additionalProperties:
          type: string
        description: |-
          Claims are the named verified claims carried by the request principal
          (ADR-027 / LD-6 P2; declared via --identity-claim-headers). omitempty:
          with no claim axes declared (nil map) the key is absent, keeping the
          zero-config response body byte-identical to pre-P2. Go serialises map
          keys sorted, so the rendering is deterministic.
        type: object
      email:
        type: string
      groups:
        items:
          type: string
        type: array
      permissions:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      user:
        type: string
    type: object
  internal_handler.PRListResponse:
    properties:
      count:
        type: integer
      pending_prs:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_platform.PRInfo'
        type: array
    type: object
  internal_handler.PutCustomAlertsRequest:
    properties:
      base_hash:
        description: |-
          BaseHash is the source_hash the client got from GET. REQUIRED —
          optimistic concurrency is the safe default, not opt-in: an empty
          base_hash would silently disable clobber protection (self-review F2).
        type: string
      custom_alerts:
        description: |-
          CustomAlerts is the desired FULL recipe list (collection-replace —
          the client owns the array, having loaded it via GET). A POINTER so an
          ABSENT field (nil) is rejected — a truncated/buggy request must NOT
          be read as "delete every recipe" (self-review F1, a data-loss
          footgun). An explicit empty array `[]` IS the intentional delete-all
          (Reef 2).
        items:
          additionalProperties: {}
          type: object
        type: array
    type: object
  internal_handler.PutCustomAlertsResponse:
    properties:
      source_hash:
        description: new hash post-write (for the next edit)
        type: string
      status:
        type: string
      tenant_id:
        type: string
    type: object
  internal_handler.PutGroupRequest:
    properties:
      description:
        maxLength: 4096
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      label:
        maxLength: 256
        minLength: 1
        type: string
      members:
        items:
          type: string
        maxItems: 1000
        type: array
    required:
    - label
    type: object
  internal_handler.PutTenantResponse:
    properties:
      message:
        type: string
      pr_number:
        type: integer
      pr_url:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      warnings:
        items:
          type: string
        type: array
    type: object
  internal_handler.PutViewRequest:
    properties:
      description:
        maxLength: 1024
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      label:
        maxLength: 256
        minLength: 1
        type: string
    required:
    - filters
    - label
    type: object
  internal_handler.TenantDetail:
    properties:
      custom_alerts:
        description: |-
          CustomAlerts is the tenant's `_custom_alerts` recipes as structured
          JSON (ADR-024 §S6b-2). The portal recipe modal reads this directly so
          the client never parses YAML — the backend owns the round-trip on both
          read and write. Empty slice when the tenant has none.
        items:
          additionalProperties: {}
          type: object
        type: array
      id:
        type: string
      raw_yaml:
        type: string
      resolved_thresholds:
        items:
          $ref: '#/definitions/config.ResolvedThreshold'
        type: array
      source_hash:
        description: |-
          SourceHash is SHA-256[:16] of the raw tenant file. Clients echo it
          back as `base_hash` on PUT .../custom-alerts for optimistic-
          concurrency (ADR-024 §S6b-2): the write 409s if the file changed
          underneath them.
        type: string
      validation_warnings:
        items:
          type: string
        type: array
    type: object
  internal_handler.TenantSummary:
    properties:
      db_type:
        type: string
      domain:
        type: string
      environment:
        type: string
      groups:
        items:
          type: string
        type: array
      id:
        type: string
      maintenance:
        type: string
      owner:
        type: string
      profile:
        type: string
      region:
        type: string
      silent_mode:
        type: string
      tags:
        items:
          type: string
        type: array
      tier:
        type: string
    type: object
  internal_handler.ValidateResponse:
    properties:
      valid:
        type: boolean
      warnings:
        items:
          type: string
        type: array
    type: object
  internal_handler.ViewResponse:
    properties:
      created_by:
        type: string
      description:
        type: string
      filters:
        additionalProperties:
          type: string
        type: object
      id:
        type: string
      label:
        type: string
    type: object
  internal_handler_federation.BackfillAccountsResponse:
    properties:
      allocated:
        description: |-
          Allocated lists the tenants that received a NEW account_id, in
          allocation (id-ascending) order.
        items:
          type: string
        type: array
      allocated_count:
        description: AllocatedCount is len(Allocated) — convenient for the operator.
        type: integer
      already_present:
        description: |-
          AlreadyPresent is how many scanned tenants already held an id (so a
          re-run shows 0 newly allocated and every tenant already present).
        type: integer
      status:
        type: string
    type: object
  internal_handler_federation.CreateFederationTokenRequest:
    properties:
      capability:
        enum:
        - metrics
        - logs
        type: string
      description:
        maxLength: 256
        type: string
      tenant_id:
        maxLength: 128
        minLength: 1
        type: string
    required:
    - tenant_id
    type: object
  internal_handler_federation.CreateFederationTokenResponse:
    properties:
      record:
        $ref: '#/definitions/internal_handler_federation.FederationTokenRecord'
      token:
        type: string
    type: object
  internal_handler_federation.FederationTokenRecord:
    properties:
      account_id:
        type: integer
      capability:
        type: string
      description:
        type: string
      expires_at:
        type: string
      issued_at:
        type: string
      issued_by:
        type: string
      tenant_id:
        type: string
      token_id:
        type: string
    type: object
  internal_handler_federation.PutFederationPolicyRequest:
    properties:
      force:
        type: boolean
      reason:
        type: string
      whitelist:
        items:
          $ref: '#/definitions/github_com_vencil_tenant-api_internal_federation_fedpolicy.WhitelistEntry'
        type: array
    type: object
info:
  contact: {}
  description: |-
    Multi-tenant configuration management API for the Dynamic Alerting Platform.
    Provides CRUD over per-tenant alert thresholds, RBAC-scoped writes, and async batch operations.
    Auth is enforced by the oauth2-proxy sidecar and forwarded via X-Forwarded-Email / X-Forwarded-Groups.
  license:
    name: See repository LICENSE
  title: Tenant API
  version: v2.8.0
paths:
  /api/v1/audit/tenants/{id}/access-report:
    get:
      description: |-
        Enumerates the live RBAC config with the SAME predicates the
        forward gates run and reports, per rule, who is granted what on
        tenant {id} under which org-gate conditions (both shadow and
        enforce outcomes). Audit-only: authorization decisions remain
        with the forward gates. Requires a NON-org-scoped platform
        admin grant; all other callers receive a constant 403
        regardless of {id} (no tenant-enumeration oracle). Note the
        redacted view cannot remove the org-membership inference carried
        by a grant entry's mere existence: for a value-pinned org rule,
        the grant entry itself is weakly identifying.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: Opt-in expansions
        enum:
        - org_values
        in: query
        name: include
        type: string
      - default: full
        description: Report projection
        enum:
        - full
        - redacted
        in: query
        name: view
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vencil_tenant-api_internal_rbac.ReverseReport'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: 'Reverse access report: who can access this tenant (audit-only)'
      tags:
      - audit
  /api/v1/federation/accounts/backfill:
    post:
      description: Assigns a monotonic account_id (ADR-021) to every conf.d tenant
        lacking one, in one committed registry write. Idempotent. Requires platform
        admin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler_federation.BackfillAccountsResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Backfill account IDs for all existing tenants
      tags:
      - federation
  /api/v1/federation/policy:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_vencil_tenant-api_internal_federation_fedpolicy.Config'
      summary: Get the platform federation whitelist
      tags:
      - federation
    put:
      consumes:
      - application/json
      parameters:
      - description: Whitelist + optional admission force/reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_federation.PutFederationPolicyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Replace the platform federation whitelist
      tags:
      - federation
  /api/v1/federation/tokens:
    get:
      description: Returns the non-expired federation token records for the tenant
        named by the tenant_id query parameter. Requires admin permission on that
        tenant. The signed JWTs themselves are not returned.
      parameters:
      - description: Tenant ID
        in: query
        name: tenant_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler_federation.FederationTokenRecord'
            type: array
        "400":
          description: Bad Request
          schema:
