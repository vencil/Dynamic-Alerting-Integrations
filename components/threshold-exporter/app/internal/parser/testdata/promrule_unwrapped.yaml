# Legacy / VM-operator unwrapped form: bare `groups:` with no
# apiVersion / kind / spec wrapper. Parser must accept both shapes.
groups:
  - name: legacy-style
    rules:
      - alert: DiskFull
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.05
        for: 1m
        labels:
          severity: critical
