# db-b.yaml — Tenant-managed thresholds (DEVELOPMENT EXAMPLE)
# ⚠️  此檔為開發參考範本，不會被包含在發布的 Helm chart 或 Docker image 中。
tenants:
  db-b:
    mysql_connections: "100"
    mysql_cpu: "60"
    container_memory: "90"
    _state_container_crashloop: "disable"
    # v1.2.0 Silent Mode: alerts fire (TSDB records) but notifications suppressed
    # Options: "warning" | "critical" | "all" | "disable"
    _silent_mode: "warning"
    # v1.3.0 Alert Routing: tenant-managed notification destination
    # Receiver types: webhook | email | slack | teams
    # Use generate_alertmanager_routes.py to produce Alertmanager config fragment
    _routing:
      receiver:
        type: "webhook"
        url: "https://webhook.db-b.example.com/alerts"
      group_by: ["alertname", "severity"]
      group_wait: "30s"
      repeat_interval: "4h"
