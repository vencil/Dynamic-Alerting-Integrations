# db-b.yaml — Tenant-managed thresholds (DEVELOPMENT EXAMPLE)
# ⚠️  此檔為開發參考範本，不會被包含在發布的 Helm chart 或 Docker image 中。
tenants:
  db-b:
    mysql_connections: "100"
    mysql_cpu: "60"
    container_memory: "90"
    _state_container_crashloop: "disable"
    # v1.2.0 Silent Mode: alerts fire (TSDB records) but notifications suppressed
    # Options: "warning" | "critical" | "all" | "disable"
    _silent_mode: "warning"
    # v1.3.0 Alert Routing: tenant-managed notification destination
    # Receiver types: webhook | email | slack | teams | rocketchat | pagerduty
    # Use generate_alertmanager_routes.py to produce Alertmanager config fragment
    _routing:
      receiver:
        type: "webhook"
        url: "https://webhook.db-b.example.com/alerts"
      group_by: ["alertname", "severity"]
      group_wait: "30s"
      repeat_interval: "4h"
    # v2.9.0 Custom Alerts (ADR-024 能力 B, #741): tenant-authored declarative
    # alerts via platform recipes — never write PromQL. The compiler vectorizes
    # these into rule-pack-custom-alerts.yaml; the exporter emits the matching
    # user_threshold{component="custom",...} series so the rules join real data.
    _custom_alerts:
      # threshold (page): MariaDB connection count climbing toward the cap.
      - recipe: threshold
        name: mariadb_conns_high
        metric: mysql_global_status_threads_connected
        op: ">"
        window: 5m
        threshold: "150:warning"
        mode: page
      # rate (silent → dashboard-only): slow-query rate watch. Visible via the
      # ALERTS series for Grafana, but the CustomRecipeSilent sentinel + inhibit
      # (S7/S8) suppress its notification — no page. Demonstrates silent mode.
      - recipe: rate
        name: mariadb_slow_query_rate
        metric: mysql_global_status_slow_queries
        op: ">"
        window: 5m
        threshold: "1:warning"
        mode: silent
