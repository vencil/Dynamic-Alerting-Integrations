# _defaults.yaml — Platform-managed global settings (DEVELOPMENT EXAMPLE)
# ⚠️  此檔為開發參考範本，不會被包含在發布的 Helm chart 或 Docker image 中。
#     生產環境請透過 Helm values 或 GitOps 注入。
# Loaded first (underscore prefix sorts before letters).
# Only this file should contain 'defaults', 'state_filters', and '_routing_defaults'.
defaults:
  mysql_connections: 80
  mysql_cpu: 30      # running-thread SATURATION warning (threads_running, NOT host CPU%); 80→30 = PMM/Nichter "high" tier (#944)
  pg_connections: 80
  pg_replication_lag: 30
  container_cpu: 80
  container_memory: 85

state_filters:
  container_crashloop:
    reasons: ["CrashLoopBackOff"]
    severity: "critical"
  container_imagepull:
    reasons: ["ImagePullBackOff", "InvalidImageName"]
    severity: "warning"
  maintenance:
    reasons: []
    severity: "info"
    default_state: "disable"

# v1.4.0 Routing Defaults: domain expert sets default notification config.
# Tenants inherit these defaults unless they override with _routing in their YAML.
# {{tenant}} placeholder is replaced with the tenant name at merge time.
_routing_defaults:
  receiver:
    type: "email"
    to: ["dba-oncall@example.com"]
    # 'from' is REQUIRED on an email receiver unless a global smtp_from is set.
    # The deployed base (k8s/03-monitoring/configmap-alertmanager.yaml) has no
    # global smtp_* block — SMTP is configured per-receiver here (smarthost) — so
    # an email receiver without 'from' renders a config Alertmanager rejects with
    # "no global SMTP from set" (amtool check-config). Keep this set.
    from: "alerting@example.com"
    smarthost: "smtp.example.com:587"
  group_by: ["alertname", "tenant"]
  group_wait: "30s"
  group_interval: "5m"
  repeat_interval: "4h"

# v1.7.0 Platform Enforced Routing: NOC always receives critical alerts.
