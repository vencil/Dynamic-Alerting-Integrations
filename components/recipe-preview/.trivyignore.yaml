# Trivy ignore / VEX-style risk register — bundled promtool binary only.
#
# recipe-preview is a PYTHON service; ALL of these HIGH findings live in the
# Prometheus `promtool` Go binary it bundles (PROM_VERSION pinned in the
# Dockerfile), NOT in any first-party code. They cannot be cleared by a
# first-party dependency bump.
#
# EVIDENCE: govulncheck (binary-mode, real call-graph) against the actual
# promtool v3.12.0 binary — committed alongside as ./promtool.openvex.json.
# Regenerate after any promtool re-pin:
#   docker create --name t <recipe-preview-image>; docker cp t:/usr/local/bin/promtool ./promtool
#   govulncheck -mode binary -format openvex ./promtool > components/recipe-preview/promtool.openvex.json
#
# GOVERNANCE: per-CVE, each with an expiry. Re-validate against a fresh
# govulncheck run whenever PROM_SHA256 changes (promtool re-pin) or an entry
# expires. This is consumed by the release.yaml + nightly-image-scan Trivy
# steps via the `trivyignores:` input. The hard gate (exit-code 1) is unchanged
# — only these evidence-backed, time-boxed entries are waived.

vulnerabilities:
  # ── Group A — golang.org/x/crypto/ssh — NOT AFFECTED ────────────────────────
  # govulncheck verdict: not_affected / vulnerable_code_not_present. promtool is
  # a rule-linting CLI; it opens no SSH, so the Go linker dead-code-eliminates
  # x/crypto/ssh out of the binary entirely (the symbols are not even present).
  # Strongest justification class. Expiry 90d → re-confirm on next promtool re-pin.
  - id: CVE-2026-39827
    statement: "promtool: x/crypto/ssh DCE'd out of binary — govulncheck not_affected/vulnerable_code_not_present (promtool.openvex.json)"
    expired_at: 2026-09-25
