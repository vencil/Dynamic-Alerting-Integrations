  # ── Group B — Go stdlib (crypto/x509, mime/textproto) — RISK ACCEPTANCE ──────
  # govulncheck verdict: AFFECTED (reachable — promtool query/push use TLS+HTTP).
  # This is NOT a not_affected claim. It is a time-boxed risk acceptance:
  # recipe-preview invokes ONLY offline `promtool check rules` + `test rules`
  # (_recipe_preview.py:332/342) — no TLS handshake, no MIME parsing — so the
  # affected x509-hostname-verify / MIME-decode paths are never exercised by this
  # service. Both are DoS / quadratic-complexity (not RCE). Fixed in Go 1.26.4 /
  # 1.25.11; promtool v3.12.0 was built with Go 1.26.3.
  # TRIGGER (delete these two entries): bump PROM_VERSION once Prometheus ships a
  # 3.12.x patch / 3.13.0 GA built with Go >= 1.26.4 (prometheus/golang-builder is
  # already on 1.26.4 — next routine release inherits it). Expiry 60d (short).
  - id: CVE-2026-27145
    statement: "stdlib crypto/x509: reachable in promtool but recipe-preview runs only offline check/test rules (no TLS); fixed Go 1.26.4, promtool built 1.26.3; risk-accepted until upstream Go>=1.26.4 rebuild"
    expired_at: 2026-08-26
  - id: CVE-2026-42504
    statement: "stdlib mime/textproto: reachable in promtool but recipe-preview runs only offline check/test rules (no MIME); fixed Go 1.26.4, promtool built 1.26.3; risk-accepted until upstream Go>=1.26.4 rebuild"
    expired_at: 2026-08-26
