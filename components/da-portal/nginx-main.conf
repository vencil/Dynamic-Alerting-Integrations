# nginx-main.conf — da-portal main nginx configuration (ADR-027 D2-B O1).
#
# The stock nginx:alpine main config loads NO dynamic modules, so the image
# carries its own main config to load ngx_http_js_module (njs — kept by the
# hardening apk-del in the Dockerfile) for the relay-token injector
# (conf.d js_set — see relay_token.js). Everything below the load_module line
# replicates the stock /etc/nginx/nginx.conf of the base image
# (nginx:1.30-alpine3.23) — keep it in lockstep when bumping the base image.
#
# NOTE (helm): the da-portal chart's configmap covers /etc/nginx/conf.d only;
# THIS file always comes from the image. That is what makes the relay-token
# feature image-coupled: portal.relayToken.enabled needs the portal image that
# ships this file — older images fail loud at startup on the js_import
# directive (unknown directive), never silently.

load_module modules/ngx_http_js_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;
}
