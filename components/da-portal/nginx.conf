server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        interactive/index.html;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options            "DENY"             always;
    add_header X-Content-Type-Options     "nosniff"           always;
    add_header X-XSS-Protection           "1; mode=block"     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'self'" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # ── Static assets caching ─────────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── YAML / JSON data (allow volume-mount override) ────────
    location ~* \.(json|yaml)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # ── Reverse proxy to tenant-api (v2.5.0) ────────────────
    # Routes /api/v1/* requests to tenant-api for CORS-free access.
    # In Helm deployment, upstream URL is injected via ConfigMap.
    # For standalone Docker, override via volume mount or env.
    location /api/v1/ {
        proxy_pass http://tenant-api.monitoring.svc.cluster.local:8080/api/v1/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass oauth2-proxy identity headers to tenant-api
        proxy_set_header X-Forwarded-Email  $http_x_forwarded_email;
        proxy_set_header X-Forwarded-User   $http_x_forwarded_user;
        proxy_set_header X-Forwarded-Groups $http_x_forwarded_groups;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /interactive/index.html;
    }

    # ── Health check (for K8s readinessProbe) ─────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Deny access to sensitive files ────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
