server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        interactive/index.html;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"       always;
    add_header X-Content-Type-Options     "nosniff"           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'self'" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # ── Static assets caching ─────────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── YAML / JSON data (allow volume-mount override) ────────
    location ~* \.(json|yaml)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # ── Reverse proxy placeholder for tenant Prometheus ───────
    # Uncomment and set upstream to enable CORS-free Prometheus access:
    #
    # location /api/v1/ {
    #     proxy_pass http://prometheus.internal:9090/api/v1/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /interactive/index.html;
    }

    # ── Health check (for K8s readinessProbe) ─────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
