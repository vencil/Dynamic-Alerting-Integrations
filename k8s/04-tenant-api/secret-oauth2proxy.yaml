# ⚠️  PLACEHOLDER SECRET — do NOT commit real values.
#
# Before deploying, copy this file (don't edit it), fill in the values, and apply:
#   kubectl apply -f secret-oauth2proxy-ACTUAL.yaml
#
# Generate cookie secret (must be 16, 24, or 32 bytes base64-encoded):
#   openssl rand -base64 32
#
# GitHub OAuth App:
#   1. Go to https://github.com/settings/applications/new
#   2. Set Authorization callback URL to:
#      https://<your-ingress-host>/oauth2/callback
#   3. Copy Client ID and Client Secret below.
#
# For Google OIDC or generic OIDC, see:
#   https://oauth2-proxy.github.io/oauth2-proxy/configuration/providers/
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secrets
  namespace: tenant-api
  labels:
    app: tenant-api
    app.kubernetes.io/part-of: dynamic-alerting
type: Opaque
stringData:
  # openssl rand -base64 32
  OAUTH2_PROXY_COOKIE_SECRET: "REPLACE_WITH_32_BYTE_BASE64_SECRET"
  # OAuth2 provider client ID
  OAUTH2_PROXY_CLIENT_ID: "REPLACE_WITH_CLIENT_ID"
  # OAuth2 provider client secret
  OAUTH2_PROXY_CLIENT_SECRET: "REPLACE_WITH_CLIENT_SECRET"
