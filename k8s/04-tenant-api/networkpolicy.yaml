# NetworkPolicy: restrict who can reach tenant-api's internal port (8080).
# The oauth2-proxy port (4180) is open to all within the cluster (Ingress/Portal).
# The raw API port (8080) is restricted to the monitoring namespace only (Prometheus scrape).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-api-netpol
  namespace: tenant-api
  labels:
    app: tenant-api
    app.kubernetes.io/part-of: dynamic-alerting
spec:
  podSelector:
    matchLabels:
      app: tenant-api
  policyTypes:
    - Ingress
  ingress:
    # Allow intra-pod traffic (oauth2-proxy → tenant-api on localhost — handled by loopback)
    # Allow oauth2-proxy port from anywhere in the cluster (Portal, browser via Ingress)
    - ports:
        - port: 4180
          protocol: TCP

    # Allow Prometheus scrape on internal port (monitoring namespace only)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
