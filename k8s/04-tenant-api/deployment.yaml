# tenant-api Deployment — ADR-009: commit-on-write GitOps + oauth2-proxy sidecar auth.
#
# Pod layout:
#   initContainer  git-clone   — clones conf.d/ repo into shared emptyDir volume
#   container      tenant-api  — Go API server (localhost:8080, not exposed externally)
#   sidecar        oauth2-proxy — authenticates requests, forwards to localhost:8080 (port 4180)
#   (RBAC hot-reload handled by tenant-api's built-in 30s poll — no sidecar needed)
#
# For local dev on Kind, replace the emptyDir with a hostPath pointing to your workspace.
# See the "Dev overlay" comment in the volumes section below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-api
  namespace: tenant-api
  labels:
    app: tenant-api
    app.kubernetes.io/part-of: dynamic-alerting
    app.kubernetes.io/version: "2.4.0"
spec:
  # ADR-023 single-writer invariant: replicaCount MUST stay 1 (per-process write
  # lock + in-memory PR tracker do not coordinate across pods).
  replicas: 1
  # Recreate (not the default RollingUpdate): a rollout must NOT surge a second
  # Ready pod that overlaps the old one as a phantom writer pushing to the same
  # git plane (#677 / TRK-324). Mirrors helm/tenant-api/templates/deployment.yaml;
  # kept in sync by check_single_writer_invariant.py (ADR-023 layer-2 lint).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tenant-api
  template:
    metadata:
      labels:
        app: tenant-api
        app.kubernetes.io/version: "2.4.0"
      annotations:
        # Force rolling restart when RBAC config changes
        checksum/rbac: "placeholder-updated-by-helm"
    spec:
      serviceAccountName: tenant-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      # ── Init: clone the tenant config git repository ──────────────────────────
      # Replace GIT_REPO_URL with your actual repo. For Kind dev, skip this init
      # container and use a hostPath volume instead (see volumes section).
      initContainers:
        - name: git-clone
          image: alpine/git:v2.54.0@sha256:697cb1c85aefc5724febaec2202a974e0d66f6abb6be91a9a86d0c8757af692a
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # git needs to write .git/
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              if [ -z "${GIT_REPO_URL:-}" ]; then
                echo "GIT_REPO_URL not set — skipping git clone (dev mode)"
                exit 0
              fi
              if [ -d /conf.d/.git ]; then
                echo "Repo exists, pulling latest..."
                git -C /conf.d pull --ff-only
              else
                echo "Cloning $GIT_REPO_URL..."
                git clone "$GIT_REPO_URL" /conf.d
              fi
          env:
            - name: GIT_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: tenant-api-config
                  key: GIT_REPO_URL
                  optional: true
          volumeMounts:
            - name: conf-dir
              mountPath: /conf.d
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      containers:
        # ── Primary: tenant-api ────────────────────────────────────────────────
        - name: tenant-api
          image: ghcr.io/vencil/tenant-api:v2.7.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem: false — must write YAML files and run git
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          args:
            - --addr=:8080
            - --config-dir=/conf.d
            - --git-dir=/conf.d
            - --rbac=/etc/rbac/_rbac.yaml
            - --reload-interval=30s
            # ADR-027 D2-B (GHSA-3g2h-rf85-5rrv L7 root-cause series): human-plane
            # Unix socket. When enabled, tenant-api serves the same router on a
            # pod-internal socket that the oauth2-proxy sidecar targets as its
            # upstream, so browser traffic never touches the network 8080 plane.
            # Commented out by default because it REQUIRES a tenant-api image that
            # carries the --human-socket flag (raw-manifest users may still run an
            # older image; the Helm chart gates this behind humanSocket.enabled).
            # To enable, uncomment BOTH lines here AND the four commented UDS
            # blocks below (volumeMount here, sidecar upstream + volumeMount, and
            # the human-sock volume), matching helm/tenant-api render with
            # humanSocket.enabled=true.
            #   - --human-socket=/run/ta-human/human.sock
          env:
            # Committer identity for git commits (author comes from X-Forwarded-Email)
            - name: GIT_COMMITTER_NAME
              value: "da-portal"
            - name: GIT_COMMITTER_EMAIL
              value: "da-portal@dynamic-alerting.local"
            # In-lock base fetch timeout (TRK-318 / ADR-023 §B). Before each PR write
            # the binary runs `git fetch --prune origin <base>` to anchor the branch
            # on the freshest origin/<base> — the git-clone initContainer above only
            # pulls once at pod start, so a long-lived pod's base would otherwise go
            # stale after a remote merge and silently roll back shared-file edits.
            # Separate, aggressive deadline (default 5s) so a degraded forge fast-fails
            # to 503 instead of pinning the write lock. Raise for a slow on-prem forge.
            - name: TA_GIT_FETCH_TIMEOUT
              value: "5s"
            # Write-plane load-shedding queue depth (TRK-320 / ADR-023 §C). The
            # write plane is a single writer; bounds writes queued behind the one
            # in-flight write. Past it → 503 + Retry-After instead of unbounded
            # goroutine pileup + orphan writes after the client timed out. Total
            # admitted = 1 in-flight + this. Default 5; tune for burst tolerance.
            - name: TA_WRITE_QUEUE_DEPTH
              value: "5"
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: conf-dir
              mountPath: /conf.d
            - name: rbac-config
              mountPath: /etc/rbac
              readOnly: true
            # git needs a writable HOME for config; tmpfs is enough
            - name: git-tmp
              mountPath: /tmp
            # ADR-027 D2-B: shared dir for the human-plane Unix socket (uncomment
            # with --human-socket above + the sidecar/volume blocks below).
            #   - name: human-sock
            #     mountPath: /run/ta-human
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

        # ── Sidecar: oauth2-proxy ──────────────────────────────────────────────
        # Listens on :4180, authenticates via GitHub/OIDC, forwards to localhost:8080.
        # Injects X-Forwarded-Email and X-Forwarded-Groups headers consumed by tenant-api RBAC.
        - name: oauth2-proxy
          # Pinned by digest (#902 L2) — same digest as the helm charts' oauth2-proxy.
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3@sha256:10a1165743a192e1940b4708fb9647027185ce11a681a1c5519b442ff7f1f561
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            # Provider — change to "oidc" for Google/Keycloak/generic OIDC.
            - --provider=github
            # Self-hosted GitLab CE SSO: set provider=gitlab and uncomment the
            # flags below (issuer = bare instance URL). Groups arrive from
            # /oauth/userinfo under the openid scope as full paths (org/subteam);
            # map them in _rbac.yaml. See docs/integration/gitlab-ce-sso.md.
            #   - --provider=gitlab
            #   - --oidc-issuer-url=https://gitlab.acme.internal
            #   - --scope=openid profile email
            #   - --gitlab-group=acme/sre          # optional group restriction (repeatable)
            #   - --cookie-expire=4h               # revocation-lag guard (see docs)
            #   - --cookie-refresh=1h
            # Forward to tenant-api (only accessible within the pod)
            # ADR-027 D2-B: to route the human plane over the pod-internal Unix
            # socket instead of the network 8080 plane, REPLACE the line below with
            #   - --upstream=unix:///run/ta-human/human.sock
            # (and enable --human-socket + the volume/mount blocks). oauth2-proxy's
            # --flush-interval defaults to 1s (< SSE 25s heartbeat), so streaming
            # is not buffered — spike-verified against this exact proxy digest.
            - --upstream=http://localhost:8080
            - --http-address=0.0.0.0:4180
            # Redirect URL must match your Ingress host
            - --redirect-url=http://tenant-api.example.com/oauth2/callback
            # Accept any email domain; restrict further via _rbac.yaml groups
            - --email-domain=*
            # Inject user identity headers into upstream requests
            - --pass-user-headers=true
            - --set-xauthrequest=true
            # Skip auth for health/readiness probes
            - --skip-auth-route=^/health$
            - --skip-auth-route=^/ready$
            # Cookie settings
            - --cookie-secure=false   # set to true when using HTTPS
            - --cookie-name=_tenant_api_session
          env:
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: OAUTH2_PROXY_CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: OAUTH2_PROXY_CLIENT_SECRET
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          # ADR-027 D2-B: mount the shared human-sock dir (readOnly) so oauth2-proxy
          # can dial the Unix socket when --upstream=unix://… is used above.
          #   volumeMounts:
          #     - name: human-sock
          #       mountPath: /run/ta-human
          #       readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        # conf-dir: holds tenant YAML files and the git repository.
        # For production: replace emptyDir with a PersistentVolumeClaim.
        # For Kind dev: replace emptyDir with hostPath pointing to your workspace conf.d/
        #
        # Dev overlay example (add to your kind-dev-values.yaml):
        #   volumes:
        #     - name: conf-dir
        #       hostPath:
        #         path: /workspaces/vibe-k8s-lab/k8s/conf.d
        #         type: DirectoryOrCreate
        - name: conf-dir
          emptyDir: {}

        - name: rbac-config
          configMap:
            name: rbac-config

        # tmpfs for git temporary files (HOME/.gitconfig etc.)
        - name: git-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi

        # ADR-027 D2-B: pod-internal tmpfs dir for the human-plane Unix socket.
        # Shared by tenant-api (binds) + oauth2-proxy (dials); pod-level fsGroup
        # 65534 makes it group-writable to both. Uncomment with the --human-socket
        # flag + upstream=unix://… + the two volumeMounts above.
        #   - name: human-sock
        #     emptyDir:
        #       medium: Memory
        #       sizeLimit: 1Mi
