apiVersion: v1
kind: Service
metadata:
  name: tenant-api
  namespace: tenant-api
  labels:
    app: tenant-api
    app.kubernetes.io/part-of: dynamic-alerting
  annotations:
    # Expose Prometheus metrics from tenant-api (bypasses oauth2-proxy via cluster-internal port)
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: tenant-api
  ports:
    # Primary port: oauth2-proxy — all external traffic goes through here.
    - name: http
      port: 80
      targetPort: 4180
      protocol: TCP
    # Internal port: direct access to tenant-api (skip oauth2-proxy).
    # Restrict with NetworkPolicy to monitoring namespace only.
    - name: api-internal
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
