apiVersion: v1
kind: Secret
metadata:
  name: watchdog-heartbeat
  namespace: monitoring
  labels:
    app: alertmanager
    # ADR-025 D1 / #838: external dead-man's-switch heartbeat URL.
type: Opaque
stringData:
  # ⚠️ Placeholder — the operator MUST overwrite this with their EXTERNAL
  # dead-man's-switch ingest URL before relying on the heartbeat. The URL embeds
  # a token/UUID → it is a SECRET; never commit the real value (it would trip the
  # secret-scan four-layer defence and leak). Mounted by deployment-alertmanager.yaml
  # at /etc/alertmanager/secrets/watchdog-heartbeat-url and referenced via the
  # watchdog-heartbeat receiver's webhook_configs[].url_file (configmap-alertmanager.yaml).
  #
  # Recommended (out-of-band, do not commit):
  #   kubectl create secret generic watchdog-heartbeat \
  #     --from-literal=watchdog-heartbeat-url="https://<dms-host>/api/heartbeat/<token>" \
  #     -n monitoring --dry-run=client -o yaml | kubectl apply -f -
  #
  # The external TTL must be LONGER than the route's repeat_interval (3m) — e.g.
  # 5m — to absorb network jitter AND Prometheus rule-evaluation lag under load,
  # plus a first-heartbeat grace period to survive a Prometheus restart cold start
  # (~60s blind window). See the alerting-plane self-liveness runbook.
  #
  # Leaving this placeholder in place is a DOCUMENTED blind spot: the heartbeat
  # will not reach an external monitor, and AlertmanagerWebhookNotificationsFailing
  # fires as the internal "configure me" signal.
  watchdog-heartbeat-url: REPLACE_WITH_EXTERNAL_DEAD_MANS_SWITCH_URL
