apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      # Federation chargeback (#539 Phase 2). Each PromQL query is
      # logged as one JSON line with params.query / params.start_time /
      # stats.samples.totalQueryableSamples / stats.timings.* — the
      # accurate per-tenant cost signal (#552 records why the gateway
      # access-log count of *requests* is insufficient: a heavy and a
      # light query bill identically there). Writing to /dev/stderr
      # interleaves with Prometheus's own stderr; Vector demuxes by
      # JSON-shape (presence of `params.query`) → log_type=
      # prometheus_query_log stream in VictoriaLogs. tenant_id is
      # recoverable because federation-proxy has already injected
      # {tenant_id="X"} into params.query by the time Prometheus
      # logs it (the platform's own rule evaluations have no
      # tenant_id selector — distinguishable at offline aggregation).
      query_log_file: /dev/stderr

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager.monitoring.svc.cluster.local:9093"

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    scrape_configs:
      # -------------------------------------------------------
      # Self-monitoring (static)
      # -------------------------------------------------------
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # -------------------------------------------------------
      # Annotation-based Service Discovery
      # Any Service with prometheus.io/scrape: "true" is auto-discovered.
      # New tenants or components no longer require Prometheus config changes.
      # -------------------------------------------------------

      # Tenant DB exporters (db-a, db-b, db-c, ...)
      # Discovers services in db-* namespaces.
      # 'tenant' label is derived from the namespace.
      - job_name: "tenant-exporters"
        scrape_interval: 10s
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          # Only keep services with prometheus.io/scrape annotation
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Only keep services in db-* namespaces
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: "db-.+"
          # Use the annotated port
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          # Use annotated metrics path
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Set tenant label from namespace
          - source_labels: [__meta_kubernetes_namespace]
            target_label: tenant
          # Set instance label from namespace (backward compat)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: instance
          # Add env label
          - target_label: env
            replacement: "test"

      # Monitoring namespace services
      # Auto-discovers: kube-state-metrics, threshold-exporter,
      # and any future component with the annotation.
      - job_name: "monitoring-components"
        scrape_interval: 15s
        kubernetes_sd_configs:
          - role: service
            namespaces:
              names: ["monitoring"]
        relabel_configs:
          # Only keep annotated services
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Use the annotated port
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          # Use annotated metrics path
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Set job label from service name for clarity
          - source_labels: [__meta_kubernetes_service_name]
            target_label: job

      # -------------------------------------------------------
      # Scenario B: kubelet cAdvisor metrics (container-level CPU/memory)
      # Uses K8s API proxy to avoid direct kubelet TLS issues in Kind.
      # Provides: container_cpu_usage_seconds_total, container_memory_working_set_bytes
      # -------------------------------------------------------
      - job_name: "kubelet-cadvisor"
        scrape_interval: 15s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        metric_relabel_configs:
          # Only keep container metrics from tenant namespaces
          - source_labels: [namespace]
            action: keep
            regex: "db-.+"
          # Drop high-cardinality metrics we don't need
          - source_labels: [__name__]
            action: keep
            regex: "container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_memory_usage_bytes"

      # -------------------------------------------------------
      # Scenario C: kubelet volume-stats (per-PVC disk capacity) — #692 P0③
      # Powers tenant self-service disk-fill custom alerts (forecast/ratio over
      # kubelet_volume_stats_*). Scrapes the kubelet /metrics endpoint via the API
      # proxy (same TLS/token idiom as kubelet-cadvisor, but the main metrics path,
      # NOT /metrics/cadvisor — volume-stats live there).
      #
      # ⚠ REQUIRES a CSI driver implementing NodeGetVolumeStats. Kind's default
      # local-path provisioner emits ZERO kubelet_volume_stats_* (proven in
      # test/disk-stats-spike/). On a non-CSI cluster this job scrapes fine but
      # keeps 0 series (harmless) — and the CustomRecipeDiskInert sentinel
      # (configmap-rules-kubernetes.yaml) fires for any tenant that declared a disk
      # recipe, telling SRE the prerequisite is unmet. byo_check.py prometheus
      # verifies the live flow; compile_custom_alerts.py warns at author-time.
      # NOTE: it still pulls the full kubelet /metrics payload each scrape before the
      # metric_relabel keeps drop everything — a deployment with no CSI volume-stats
      # provider (and no disk recipes) may safely omit this job to save that scrape.
      # -------------------------------------------------------
      - job_name: "kubelet-volume-stats"
        scrape_interval: 30s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
        metric_relabel_configs:
          # Keep only volume-stats from tenant (db-*) namespaces. The namespace is a
          # NATIVE label on the kubelet metric (not an SD meta label), so the
          # tenant attribution is a metric_relabel, not a relabel.
          - source_labels: [namespace]
            action: keep
            regex: "db-.+"
          - source_labels: [__name__]
            action: keep
            regex: "kubelet_volume_stats_.*"
          # 1:1 namespace→tenant attribution (ADR-006 §Addendum: infra metrics are
          # 1:1 only). MUST mirror the tenant-exporters relabel above — disk recipes'
          # user_threshold carries `tenant`, and the `group_left`/`unless on(tenant)`
          # joins (and the inert sentinel) need this side to carry the same `tenant`.
          - source_labels: [namespace]
            target_label: tenant

  # ============================================================
  # Recording Rules & Alert Rules — DECOUPLED (v0.4.1)
  # Rules are now in separate ConfigMaps (configmap-rules-*.yaml)
  # mounted via projected volume in deployment-prometheus.yaml.
  # Each team (DBA, K8s infra, Search, Analytics) maintains their own ConfigMap.
  # See: configmap-rules-{mariadb,kubernetes,redis,mongodb,elasticsearch,oracle,db2,clickhouse,platform}.yaml
  # ============================================================
