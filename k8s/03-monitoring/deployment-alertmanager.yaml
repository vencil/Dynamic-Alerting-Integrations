apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          # ADR-025 D1 / #838: the watchdog-heartbeat receiver uses
          # webhook_configs[].url_file, which Alertmanager has supported for the
          # generic webhook since v0.26.0 (PR prometheus/alertmanager#3223). The
          # pin below (a current stable release) is well past that floor — keep any
          # future bump ≥ v0.26.0 so the heartbeat secret keeps loading.
          image: prom/alertmanager:v0.32.0@sha256:58e117eabccebbff04e6643a3432d6315a2cc3a8c24ab5849bc628886bf08857
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            # ⚠️ 安全注意：啟用 lifecycle 會暴露 /-/reload 和 /-/quit 端點（無認證）。
            # 生產環境請搭配 NetworkPolicy 限制僅允許 configmap-reload sidecar 存取，
            # 或使用 auth proxy 保護。
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
            # ADR-025 D1 / #838: the Watchdog dead-man's-switch URL (a secret —
            # embeds a token/UUID) is mounted here and referenced via the
            # watchdog-heartbeat receiver's url_file. Read-only; compatible with
            # readOnlyRootFilesystem (a separate volume mount, not the root fs).
            - name: watchdog-secret
              mountPath: /etc/alertmanager/secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: config-reloader
          image: ghcr.io/jimmidyson/configmap-reload:v0.15.0@sha256:b578b7599d65c0279f6e1aad201bba737b9b15e6a4f308281d9e26f765e6657f
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - "--volume-dir=/etc/alertmanager"
            - "--webhook-url=http://localhost:9093/-/reload"
            - "--webhook-method=POST"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
        # ADR-025 D1 / #838: external dead-man's-switch URL (secret-watchdog-
        # heartbeat.yaml). optional:true so Alertmanager still starts if the
        # Secret has not been applied yet — the heartbeat then fails to egress and
        # AlertmanagerWebhookNotificationsFailing fires, rather than taking the
        # whole alerting plane down on a missing Secret.
        - name: watchdog-secret
          secret:
            secretName: watchdog-heartbeat
            optional: true
