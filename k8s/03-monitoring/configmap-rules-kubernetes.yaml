    \"} == 1)\\n  )\\n  unless on(tenant) tenant_metadata_info\\n)\\n\"\n    for:\
    \ 30s\n    labels:\n      severity: warning\n      tenant: '{{ $labels.tenant\
    \ }}'\n    annotations:\n      summary: Image pull failure detected in {{ $labels.tenant\
    \ }}\n      summary_zh: '{{ $labels.tenant }} 偵測到映像檔案拉取失敗'\n      platform_summary:\
    \ '[{{ $labels.tier }}] {{ $labels.tenant }}: image pull failing — verify registry\
    \ and image availability'\n      platform_summary_zh: '[{{ $labels.tier }}] {{\
    \ $labels.tenant }}: 映像檔案拉取失敗 — 請檢查 registry 和映像檔案可用性'\n      description: '{{\
    \ $value }} container(s) in ImagePullBackOff/InvalidImageName state'\n      description_zh:\
    \ '{{ $value }} 個容器處於 ImagePullBackOff/InvalidImageName 狀態'\n      runbook_url:\
    \ '{{ $labels.runbook_url }}'\n      owner: '{{ $labels.owner }}'\n      tier:\
    \ '{{ $labels.tier }}'\n- name: kubernetes-version-aware-sentinel\n  rules:\n\
    \  - alert: VersionAwareThresholdInert\n    expr: '(count(max by(tenant, version,\
    \ severity) (user_threshold{component=\"container\", metric=\"cpu\", version=~\"\
    .+\"})) or vector(0)) > 0\n\n      and\n\n      (count(kube_pod_info{namespace=~\"\
    db-.+\"}) or vector(0)) > 0\n\n      and\n\n      (count(kube_pod_labels{namespace=~\"\
    db-.+\"}) or vector(0)) == 0\n\n      '\n    for: 10m\n    labels:\n      severity:\
    \ warning\n      tenant: '{{ $labels.tenant }}'\n    annotations:\n      summary:\
    \ Version-aware thresholds declared but kube-state-metrics exposes no pod labels\
    \ — feature inert\n      summary_zh: 已宣告版本專屬閾值，但 kube-state-metrics 未暴露 pod 標籤\
    \ — 功能靜默失效\n      description: '{{ $value | printf \"%.0f\" }} version-specific\
    \ container CPU threshold(s) declared and tenant pods are running, but kube-state-metrics\
    \ emits no pod labels at all. Set KSM --metric-labels-allowlist=pods=[app.kubernetes.io/version].'\n\
    \      description_zh: 已宣告 {{ $value | printf \"%.0f\" }} 個版本專屬容器 CPU 閾值且租戶 Pod\
    \ 正在運行，但 kube-state-metrics 完全未暴露 pod 標籤。請為 KSM 設定 --metric-labels-allowlist=pods=[app.kubernetes.io/version]。\n\
    \      runbook_url: https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/scenarios/version-aware-thresholds.md#for-platform-operators-ksm-allowlist-remediation\n\
    - name: kubernetes-custom-disk-recipe-sentinel\n  rules:\n  - alert: CustomRecipeDiskInert\n\
    \    expr: \"(\\n  max by(tenant) (\\n    user_threshold{component=\\\"custom\\\
    \", metric=\\\"kubelet_volume_stats_available_bytes\\\"}\\n    or\\n    user_threshold{component=\\\
    \"custom\\\", metric=\\\"kubelet_volume_stats_used_bytes\\\"}\\n  )\\n  and on(tenant)\\\
    n  count by(tenant) (\\n    label_replace(kube_pod_status_phase{namespace=~\\\"\
    db-.+\\\", phase=\\\"Running\\\"} == 1, \\\"tenant\\\", \\\"$1\\\", \\\"namespace\\\
    \", \\\"(.+)\\\")\\n  )\\n)\\nunless on(tenant)\\n(\\n  count by(tenant) (kubelet_volume_stats_available_bytes{tenant=~\\\
    \".+\\\"})\\n  and on(tenant)\\n  count by(tenant) (kubelet_volume_stats_capacity_bytes{tenant=~\\\
    \".+\\\"})\\n)\\nunless on(tenant)\\n(user_state_filter{filter=\\\"maintenance\\\
    \"} == 1)\\n\"\n    for: 15m\n    labels:\n      severity: warning\n      tenant:\
    \ '{{ $labels.tenant }}'\n    annotations:\n      summary: Disk alert declared\
    \ but no disk data is visible for {{ $labels.tenant }}\n      summary_zh: 已設定磁碟告警，但偵測不到\
    \ {{ $labels.tenant }} 的磁碟資料\n      platform_summary: '[SRE] {{ $labels.tenant\
    \ }} disk recipe inert — volume-stats absent. Check in order: (1) tenant mounts\
    \ no PVC (most common, tenant-side); (2) kubelet volume-stats scrape job + namespace→tenant\
    \ relabel; (3) CSI NodeGetVolumeStats support (kind''s default local-path does\
    \ not).'\n      platform_summary_zh: '[SRE] 租戶 {{ $labels.tenant }} disk recipe\
    \ inert — volume-stats 缺席。依序查:(1) 租戶根本沒掛 PVC(最常見、屬租戶端);(2) kubelet volume-stats\
    \ scrape job 是否帶 namespace→tenant relabel;(3) CSI 是否實作 NodeGetVolumeStats(kind\
    \ 預設 local-path 不實作)。'\n      description: You declared a disk-fill custom alert,\
    \ but the platform sees no disk (volume) metrics for your workload, so the alert\
    \ can never fire. This usually means your service mounts no PersistentVolumeClaim\
    \ — check your deployment. If you DO use a PVC, contact the platform team to investigate\
    \ disk-metric collection.\n      description_zh: 您設定了磁碟填滿告警，但平台偵測不到您工作負載的磁碟(volume)指標，該告警永遠不會觸發。這通常表示您的服務沒有掛載\
    \ PersistentVolumeClaim — 請確認您的部署。若您確實使用 PVC，請聯繫平台團隊排查磁碟指標收集。\n      runbook_url:\
    \ https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/integration/byo-prometheus-integration.md\n\
    - name: kubernetes-node-health\n  rules:\n  - record: tenant:node_owner:info\n\
    \    expr: \"max by(node, tenant) (\\n  label_replace(\\n    kube_pod_info{namespace=~\\\
    \"db-.+\\\"}\\n    and on(namespace, pod, uid)\\n      (kube_pod_status_phase{phase=\\\
    \"Running\\\"} == 1),\\n    \\\"tenant\\\", \\\"$1\\\", \\\"namespace\\\", \\\"\
    (.*)\\\"\\n  )\\n)\\n\"\n  - record: rule_pack_kubernetes:node_not_ready:core\n\
    \    expr: \"(\\n  tenant:node_owner:info\\n  and on(node)\\n    (kube_node_status_condition{condition=\\\
    \"Ready\\\", status=\\\"true\\\"} == 0)\\n)\\nunless on(tenant)\\n(user_state_filter{filter=\\\
    \"maintenance\\\"} == 1)\\n\"\n  - alert: NodeNotReady\n    expr: \"(\\n  rule_pack_kubernetes:node_not_ready:core\\\
    n  * on(tenant) group_left(runbook_url, owner, tier)\\n    tenant_metadata_info\\\
    n)\\nor\\n(\\n  rule_pack_kubernetes:node_not_ready:core\\n  unless on(tenant)\
    \ tenant_metadata_info\\n)\\n\"\n    for: 3m\n    labels:\n      severity: warning\n\
    \      tenant: '{{ $labels.tenant }}'\n      node: '{{ $labels.node }}'\n    annotations:\n\
    \      summary: Kubernetes node {{ $labels.node }} NotReady — affects {{ $labels.tenant\
    \ }}\n      summary_zh: Kubernetes 節點 {{ $labels.node }} NotReady — 影響 {{ $labels.tenant\
    \ }}\n      platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: node\
    \ {{ $labels.node }} NotReady — check node health / pod rescheduling'\n      platform_summary_zh:\
    \ '[{{ $labels.tier }}] {{ $labels.tenant }}: 節點 {{ $labels.node }} NotReady —\
    \ 請檢查節點健康 / Pod 重新調度'\n      description: A Kubernetes node hosting this tenant's\
    \ running pod(s) is NotReady; the workload may be rescheduled or unavailable.\n\
    \      description_zh: 承載此租戶運行中 Pod 的 Kubernetes 節點處於 NotReady 狀態；工作負載可能被重新調度或無法使用。\n\
    \      runbook_url: '{{ $labels.runbook_url }}'\n      owner: '{{ $labels.owner\
    \ }}'\n      tier: '{{ $labels.tier }}'\n- name: kubernetes-ha-replicas\n  rules:\n\
    \  - record: rule_pack_kubernetes:ha_replicas_degraded:core\n    expr: \"(\\n\
    \  max by(tenant) (\\n    label_replace(\\n      (\\n        kube_statefulset_status_replicas_ready{namespace=~\\\
    \"db-.+\\\"}\\n        < kube_statefulset_status_replicas{namespace=~\\\"db-.+\\\
    \"}\\n      )\\n      and on(namespace, statefulset)\\n        (changes(kube_statefulset_status_replicas_updated{namespace=~\\\
    \"db-.+\\\"}[10m]) == 0)\\n      and on(namespace, statefulset)\\n        (kube_statefulset_replicas{namespace=~\\\
    \"db-.+\\\"} >= 2),\\n      \\\"tenant\\\", \\\"$1\\\", \\\"namespace\\\", \\\"\
    (.+)\\\"\\n    )\\n  )\\n  or\\n  max by(tenant) (\\n    label_replace(\\n   \
    \   (\\n        kube_deployment_status_replicas_available{namespace=~\\\"db-.+\\\
    \"}\\n        < kube_deployment_spec_replicas{namespace=~\\\"db-.+\\\"}\\n   \
    \   )\\n      and on(namespace, deployment)\\n        (changes(kube_deployment_status_replicas_updated{namespace=~\\\
    \"db-.+\\\"}[10m]) == 0)\\n      and on(namespace, deployment)\\n        (kube_deployment_spec_replicas{namespace=~\\\
    \"db-.+\\\"} >= 2),\\n      \\\"tenant\\\", \\\"$1\\\", \\\"namespace\\\", \\\"\
    (.+)\\\"\\n    )\\n  )\\n)\\nunless on(tenant)\\n(user_state_filter{filter=\\\"\
    maintenance\\\"} == 1)\\n\"\n  - alert: TenantHAReplicasDegraded\n    expr: \"\
    (\\n  rule_pack_kubernetes:ha_replicas_degraded:core\\n  * on(tenant) group_left(runbook_url,\
    \ owner, tier)\\n    tenant_metadata_info\\n)\\nor\\n(\\n  rule_pack_kubernetes:ha_replicas_degraded:core\\\
    n  unless on(tenant) tenant_metadata_info\\n)\\n\"\n    for: 15m\n    labels:\n\
    \      severity: warning\n      tenant: '{{ $labels.tenant }}'\n    annotations:\n\
    \      summary: HA workload for {{ $labels.tenant }} is running with reduced redundancy\n\
    \      summary_zh: '{{ $labels.tenant }} 的 HA 工作負載正以降級（失去備援）狀態運行'\n      platform_summary:\
    \ '[{{ $labels.tier }}] {{ $labels.tenant }}: ready replicas < desired on an HA\
    \ set (≥2) — a replica is missing or not-ready. A vanished or stuck-rescheduled\
    \ pod is invisible to the value-based DB liveness rules (#875), so this is the\
    \ K8s-layer complement. Check kube_statefulset/deployment status + node health\
    \ / scheduling.'\n      platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant\
    \ }}: HA 工作負載（≥2）就緒副本數 < 期望數 — 有副本消失或未就緒。消失或重排卡住的 pod 對 value-based DB 存活規則（#875）不可見，故為\
    \ K8s 層互補。請查 kube_statefulset/deployment 狀態 + 節點健康 / 排程。'\n      description:\
    \ Your HA database has fewer ready replicas than desired — redundancy is reduced\
    \ or lost (at zero ready the workload is down, with a critical alert also firing).\
    \ A node/pod failure or a stuck reschedule is the usual cause; one more failure\
    \ could take the service down.\n      description_zh: 您的 HA 資料庫就緒副本數少於期望值 — 備援已降低或失去（就緒數為\
    \ 0 時工作負載已中斷，並應同時有 critical 告警）。通常成因是節點/Pod 故障或排程卡住；再壞一個就可能導致服務中斷。\n      runbook_url:\
    \ '{{ $labels.runbook_url }}'\n      owner: '{{ $labels.owner }}'\n      tier:\
    \ '{{ $labels.tier }}'\n"
