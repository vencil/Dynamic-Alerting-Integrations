apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    # v2.0.0 Bilingual Templates (i18n)
    # Alertmanager notification templates with fallback logic:
    # - Prefer *_zh annotations when available (Chinese)
    # - Fall back to English if *_zh is not set
    # Pattern: {{ or .CommonAnnotations.annotation_zh .CommonAnnotations.annotation }}
    # Receiver-specific templates override the defaults below
    templates: []  # Built-in templates only, no custom template files in this MVP

    route:
      group_by: ["alertname", "tenant"]
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: "default"
      routes:
        # ── ADR-025 D1 / #838: Watchdog liveness (MUST be routes[0]) ─────
        # The always-firing Watchdog alert (configmap-rules-platform.yaml) ships
        # to an operator-supplied EXTERNAL dead-man's-switch on a fixed cadence.
        # This MUST be the FIRST route (highest priority) so no broader earlier
        # route with continue:false can swallow the heartbeat. group_by:[alertname]
        # pins zero-extra-aggregation (NOT inheriting root [alertname,tenant],
        # which would mangle cadence); group_wait:0s + repeat_interval:3m keep the
        # beat steady; continue:false keeps it OFF every human channel. The
        # external TTL must be LONGER than repeat_interval (e.g. 5m) to absorb
        # network jitter AND rule-eval lag — see the self-liveness runbook.
        # ⚠️ generate_alertmanager_routes.py RE-INJECTS this route at index 0 on
        # every regen (route.routes is REPLACED on --apply); this hand-authored
        # copy keeps the committed base self-consistent.
        - matchers:
            - alertname="Watchdog"
          group_by: ["alertname"]
          group_wait: 0s
          group_interval: 1m
          repeat_interval: 3m
          receiver: "watchdog-heartbeat"
          continue: false
        # ── #741 S7/S8: Custom Alerts isolation ──────────────────────────
        # Tenant-authored custom alerts carry a static component="custom" label
        # (set on every Custom_* rule). Intercept them HERE, before the platform
        # default, so a tenant alert storm can never flood the platform NOC.
        # continue:false keeps them fully contained in this subtree (per-tenant
        # channel routing is a deferred follow-up). A dedicated debounce window
        # decouples their batching pace from core alerts. mode="silent" is NOT
        # blackholed here — it is suppressed by the CustomRecipeSilent sentinel +
        # inhibit below (ADR-003 pattern), staying a dashboard-only ALERTS series.
        - matchers:
            - component="custom"
          group_by: ["tenant", "alertname"]
          group_wait: 30s
          group_interval: 5m
          receiver: "custom-alerts-firehose"
          continue: false

    receivers:
      - name: "default"
        # 測試環境 — 空 receiver，只記 log 不發通知
        # (移除 localhost:5001 webhook 避免 Connection refused 噪音)
      - name: "watchdog-heartbeat"
        # ADR-025 D1 / #838: ships the always-firing Watchdog beat to an EXTERNAL
        # dead-man's-switch. The DMS webhook URL embeds a token/UUID → it is a
        # SECRET and MUST NOT be inlined here (would trip secret-scan L1/L2 and
        # leak). url_file points at a mounted Secret (secret-watchdog-heartbeat.yaml
        # → /etc/alertmanager/secrets), read lazily at send time so rotation needs
        # no config reload. Capability: webhook url_file has shipped since
        # Alertmanager v0.26.0 (PR prometheus/alertmanager#3223); the deployed
        # image (deployment-alertmanager.yaml) is well past that.
        # ⚠️ Until the operator populates the Secret, sends fail and
        # AlertmanagerWebhookNotificationsFailing fires as a "configure me" signal.
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/watchdog-heartbeat-url
            send_resolved: false
      - name: "custom-alerts-firehose"
        # #741 S7/S8: page-mode custom alerts land here, ISOLATED from the
        # platform "default" receiver. MVP = no outbound notifier (custom alerts
        # stay visible via the AM UI + the Prometheus ALERTS series); silent-mode
        # recipes are inhibited before reaching any notifier.
        # ⚠ When wiring outbound delivery, use a WEBHOOK ADAPTER → log/event
        # backend (e.g. VictoriaLogs via a small AM-payload→bulk bridge), NOT a
        # rate-limited IM (Slack/PagerDuty): a cross-tenant storm hits the IM 429
        # limit → AM retry/queue backlog → OOM → platform P0 alerts blocked. On
        # that webhook_config set send_resolved:false + max_alerts:100 (a lossy
        # truncation cap; the ALERTS series stays the source of truth).

    inhibit_rules:
      # v1.2.0 Severity Dedup: per-tenant inhibit rules
      # Generated by: generate_alertmanager_routes.py --config-dir conf.d/
      # Each tenant with _severity_dedup: "enable" (default) gets a dedicated rule.
      # Tenants with _severity_dedup: "disable" are excluded → both notifications sent.
      # Append generated inhibit_rules section here.
      - source_matchers:
          - severity="critical"
          - metric_group=~".+"
          - tenant="db-a"
        target_matchers:
          - severity="warning"
          - metric_group=~".+"
          - tenant="db-a"
        equal: ["metric_group"]
      - source_matchers:
          - severity="critical"
          - metric_group=~".+"
          - tenant="db-b"
        target_matchers:
          - severity="warning"
          - metric_group=~".+"
          - tenant="db-b"
        equal: ["metric_group"]

      # v1.2.0 Silent Mode: 壓制 warning 通知
      # TenantSilentWarning sentinel 觸發時，該 tenant 的 warning alert 不通知
      # alert 仍寫入 TSDB（Grafana 可查），僅攔截 Alertmanager 通知
      - source_matchers:
          - alertname="TenantSilentWarning"
        target_matchers:
          - severity="warning"
        equal: ["tenant"]

      # v1.2.0 Silent Mode: 壓制 critical 通知
      # TenantSilentCritical sentinel 觸發時，該 tenant 的 critical alert 不通知
      - source_matchers:
          - alertname="TenantSilentCritical"
        target_matchers:
          - severity="critical"
        equal: ["tenant"]

      # v2.9.0 #741 S7/S8: per-recipe Custom Alert silent mode.
      # The CustomRecipeSilent sentinel (severity=none, emitted once per silent
      # (tenant,name) by rule-pack-custom-alerts.yaml) suppresses THAT recipe's
      # notification while Prometheus keeps evaluating it — a dashboard-only
      # ALERTS series. equal:[tenant,name] scopes suppression to the exact recipe,
      # so a page-mode recipe of the same vectorized shape still notifies.
      # Rides the same ADR-003 Sentinel+Inhibit paradigm as the tenant-level
      # Silent rules above (NOT an Alertmanager route-to-null receiver).
      - source_matchers:
          - alertname="CustomRecipeSilent"
        target_matchers:
          - component="custom"
        equal: ["tenant", "name"]

  # v2.0.0 Bilingual Notification Templates (i18n)
  # Templates with fallback logic: prefer Chinese (*_zh) → fall back to English
  # Pattern: {{ $var := or .CommonAnnotations.annotation_zh .CommonAnnotations.annotation }}
  #
  # These templates are used by receivers (email, webhook, slack, teams, pagerduty).
  # Alertmanager evaluates templates at notification time, using the {{or}} function
  # to prefer Chinese annotations when available.
  #
  # Receiver-specific usage:
  #   - Email: use in 'headers' and 'text'/'html' fields
  #   - Webhook: use in custom request body (tenant-defined JSON)
  #   - Slack: use in 'title' and 'text' fields
  #   - Teams: use in 'title' and 'text' fields
  #   - PagerDuty: use in 'description' field
  #
  # Example email_template.html:
  #   {{ $summary := or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}
  #   {{ $description := or .CommonAnnotations.description_zh .CommonAnnotations.description }}
  #   {{ $platformSummary := or .CommonAnnotations.platform_summary_zh .CommonAnnotations.platform_summary }}
  #   <h2>{{ $summary }}</h2>
  #   <p>{{ $description }}</p>
  #   <p><strong>Platform Perspective:</strong> {{ $platformSummary }}</p>
  #
  # Rules for Rule Pack authors:
  #   - Always provide 'summary' and 'description' (English)
  #   - Optionally add 'summary_zh' and 'description_zh' (Chinese)
  #   - For platform-level alerts, add 'platform_summary' and optionally 'platform_summary_zh'
  #
  # Backward compatibility: Without *_zh annotations, templates fall back to English automatically.
  alertmanager-templates.md: |
    # Bilingual Alertmanager Templates

    ## Annotation Fallback Pattern

    For each annotation, use the Go template `or` function to prefer Chinese:

    ```
    {{ $summary := or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}
    {{ $description := or .CommonAnnotations.description_zh .CommonAnnotations.description }}
    {{ $platformSummary := or .CommonAnnotations.platform_summary_zh .CommonAnnotations.platform_summary }}
    ```

    ## Receiver-Specific Examples

    ### Email (text)
    ```
    Summary: {{ or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}
    Description: {{ or .CommonAnnotations.description_zh .CommonAnnotations.description }}
    Platform View: {{ or .CommonAnnotations.platform_summary_zh .CommonAnnotations.platform_summary }}
    Severity: {{ .GroupLabels.severity }}
    Tenant: {{ .GroupLabels.tenant }}
    ```

    ### Slack
    ```
    title: "{{ or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}"
    text: |
      *Severity:* {{ .GroupLabels.severity | toUpper }}
      *Tenant:* {{ .GroupLabels.tenant }}
      *Description:* {{ or .CommonAnnotations.description_zh .CommonAnnotations.description }}
      *Platform Summary:* {{ or .CommonAnnotations.platform_summary_zh .CommonAnnotations.platform_summary }}
    ```

    ### Webhook (JSON)
    ```json
    {
      "alert": "{{ .GroupLabels.alertname }}",
      "summary": "{{ or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}",
      "description": "{{ or .CommonAnnotations.description_zh .CommonAnnotations.description }}",
      "platform_summary": "{{ or .CommonAnnotations.platform_summary_zh .CommonAnnotations.platform_summary }}",
      "severity": "{{ .GroupLabels.severity }}",
      "tenant": "{{ .GroupLabels.tenant }}"
    }
    ```

    ## Rule Pack Annotation Guidelines

    All new rules must include English annotations. Chinese translations are optional but recommended for tenant-facing alerts:

    ```yaml
    - alert: MyAlert
      expr: ...
      annotations:
        summary: "English summary here"
        description: "Detailed English description"
        summary_zh: "中文摘要"
        description_zh: "詳細的中文描述"
        platform_summary: "Platform/NOC view (English)"
        platform_summary_zh: "平台/NOC 檢視（中文）"
    ```

    ## Testing the Fallback

    1. Alert with only English annotations → uses English text
    2. Alert with both → uses Chinese text
    3. Alert with *_zh but missing English → falls back to English (may be empty)

    For safety, always provide English as the baseline.

  alertmanager-receiver-examples.yaml: |
    # v2.0.0 Example Receivers with Bilingual Template Support
    #
    # These examples show how to configure different receiver types
    # to use the bilingual annotation fallback pattern.
    #
    # Pattern: {{ or .CommonAnnotations.annotation_zh .CommonAnnotations.annotation }}
    #
    # Copy these examples to your tenant YAML _routing configuration.

    # ========================================================
    # Webhook Example (JSON)
    # ========================================================
    # Use case: Send alerts to a custom webhook endpoint
    # The webhook receives JSON with bilingual annotations
    #
    # Usage in tenant YAML:
    #   _routing:
    #     receiver:
    #       type: webhook
    #       url: https://webhook.example.com/alerts
    #       send_resolved: true
    #
    # Generated payload example:
    # {
    #   "status": "firing",
    #   "alerts": [
    #     {
    #       "status": "firing",
    #       "labels": { "alertname": "HighConnections", "severity": "warning", "tenant": "db-a" },
    #       "annotations": {
    #         "summary": "MariaDB connections exceeded",
    #         "summary_zh": "MariaDB 連線數超出",
    #         "description": "...",
    #         "description_zh": "..."
    #       }
    #     }
    #   ]
    # }

    # Webhook sends all annotations as-is. Receiver-side filtering:
    # - If client supports zh_CN locale → use summary_zh
    # - Otherwise → use summary (automatic via Go template or client logic)

    # ========================================================
    # Email Example with Text Template
    # ========================================================
    # Use case: Send alerts via email with bilingual subject/body
    #
    # Usage in tenant YAML:
    #   _routing:
    #     receiver:
    #       type: email
    #       to: ops@example.com
    #       smarthost: smtp.example.com:587
    #       from: alerts@example.com
    #       auth_username: user
    #       auth_password: pass
    #       text: |
    #         Summary: {{ or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}
    #         Severity: {{ .GroupLabels.severity }}
    #         Tenant: {{ .GroupLabels.tenant }}
    #         Description: {{ or .CommonAnnotations.description_zh .CommonAnnotations.description }}
    #
    # The {{ or }} function is evaluated by Alertmanager:
    # - If summary_zh exists and is non-empty → use it
    # - Otherwise → use summary (English)

    # ========================================================
    # Slack Example
    # ========================================================
    # Use case: Send alerts to Slack with bilingual text
    #
    # Usage in tenant YAML:
    #   _routing:
    #     receiver:
    #       type: slack
    #       api_url: https://hooks.slack.com/services/T/B/xxxxx
    #       channel: "#alerts"
    #       title: |
    #         [{{ .GroupLabels.severity | toUpper }}] {{ or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}
    #       text: |
    #         *Tenant:* {{ .GroupLabels.tenant }}
    #         *Severity:* {{ .GroupLabels.severity }}
    #         *Description:* {{ or .CommonAnnotations.description_zh .CommonAnnotations.description }}
    #         *Platform View:* {{ or .CommonAnnotations.platform_summary_zh .CommonAnnotations.platform_summary }}
    #
    # Slack renders Markdown. Use ** for bold, _ for italics, ` for monospace.

    # ========================================================
    # Teams Example
    # ========================================================
    # Use case: Send alerts to Microsoft Teams
    #
    # Usage in tenant YAML:
    #   _routing:
    #     receiver:
    #       type: teams
    #       webhook_url: https://outlook.webhook.office.com/webhookb2/...
    #       title: |
    #         {{ or .CommonAnnotations.summary_zh .CommonAnnotations.summary }}
    #       text: |
    #         **Tenant:** {{ .GroupLabels.tenant }}
    #         **Severity:** {{ .GroupLabels.severity }}
    #         **Description:** {{ or .CommonAnnotations.description_zh .CommonAnnotations.description }}
    #
    # Teams supports Markdown formatting.

    # ========================================================
    # PagerDuty Example
    # ========================================================
    # Use case: Send critical alerts to PagerDuty
    #
    # Usage in tenant YAML:
    #   _routing:
    #     receiver:
    #       type: pagerduty
    #       service_key: <pagerduty_integration_key>
    #       description: |
    #         {{ or .CommonAnnotations.summary_zh .CommonAnnotations.summary }} ({{ .GroupLabels.tenant }})
    #       severity: "{{ .GroupLabels.severity }}"
    #       client: "Dynamic Alerting Platform"
    #
    # PagerDuty automatically creates incidents based on description.

    # ========================================================
    # Locale Detection (Client-Side)
    # ========================================================
    #
    # For webhook and custom integrations, you can detect locale server-side:
    #
    #   def get_alert_text(alert):
    #       locale = detect_client_locale()  # From HTTP header Accept-Language
    #       if locale.startswith('zh'):
    #           return alert['annotations'].get('summary_zh', alert['annotations'].get('summary'))
    #       else:
    #           return alert['annotations'].get('summary')
    #
    # Alertmanager handles fallback automatically via {{ or }}. Client code
    # should mirror this logic for consistency.
