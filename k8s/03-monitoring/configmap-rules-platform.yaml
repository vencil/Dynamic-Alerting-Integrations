# ============================================================
# Platform Rule Pack — Self-Monitoring Alert Rules
# Monitors the health of the Dynamic Alerting platform itself.
# Maintained by: Platform / SRE Team
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules-platform
  namespace: monitoring
  labels:
    app: prometheus
    rule-pack: platform
data:
  platform-alert.yml: |
    groups:
      - name: platform-self-monitoring
        rules:
          # --- Alerting-Plane Self-Liveness (ADR-025 D1 / #838) ---
          # The "who watches the watcher" gap: Prometheus + Alertmanager are
          # single-replica, and every alert below is evaluated by THIS Prometheus
          # — if it (or Alertmanager) dies, all of them silently stop firing and
          # nobody is paged. Watchdog is an ALWAYS-FIRING alert (expr: vector(1)).
          # A dedicated TOP-OF-TREE Alertmanager route (group_by:[alertname],
          # group_wait:0s, repeat_interval:3m, continue:false → watchdog-heartbeat
          # receiver — injected by generate_alertmanager_routes so it survives the
          # route-REPLACE on regen) ships it on a fixed cadence to an operator-
          # supplied EXTERNAL dead-man's-switch. The external monitor alarms when
          # the beat STOPS, so Prometheus-dead, Alertmanager-dead, or egress-broken
          # all surface from OUTSIDE the platform (the only place that survives the
          # platform's own death). severity:none keeps it off severity-targeted
          # inhibits and out of the human severity channels — but that is NOT
          # inhibition immunity (Alertmanager has no such primitive): the guarantee
          # is the no-inhibit-targets-Watchdog lint (generate_alertmanager_routes)
          # + the no-Silence operator rule (see the alerting-plane self-liveness
          # runbook). ⚠️ KEEP IN SYNC with tests/rulepacks/platform-watchdog.rules.yaml.
          - alert: Watchdog
            expr: vector(1)
            labels:
              severity: none
            annotations:
              summary: "Alerting pipeline heartbeat — if this stops reaching the external monitor, Prometheus/Alertmanager is down"
              description: |
                Always-firing alert that certifies the whole alerting pipeline
                (Prometheus rule evaluation → Alertmanager routing → external
                egress) is functional. An external dead-man's-switch expects it on
                a fixed cadence and alarms when it STOPS. Do NOT Silence this
                alert, and do NOT add an inhibit rule whose target_matchers match
                alertname="Watchdog" (ADR-025).

          # --- Watchdog egress health (ADR-025 §4 / #838) ---
          # Internal complement to the EXTERNAL dead-man's-switch. If Alertmanager
          # is alive and evaluating but its webhook notifications are FAILING, the
          # Watchdog heartbeat is not actually leaving the cluster (bad/empty
          # url_file, expired DMS token, egress firewall). This fires from INSIDE
          # before the external TTL lapses, distinguishing "platform dead" (no
          # internal signal either) from "heartbeat pipe broken" (this fires while
          # the rest of the platform stays healthy). The metric has no per-receiver
          # label so it covers ALL webhook receivers, but the Watchdog egress is the
          # operationally critical one. NOTE: a demo/lab left on the unconfigured
          # url_file placeholder WILL trip this — that is the intended "configure
          # me" signal, not a false positive. ⚠️ KEEP IN SYNC with
          # tests/rulepacks/platform-watchdog.rules.yaml.
          - alert: AlertmanagerWebhookNotificationsFailing
            expr: increase(alertmanager_notifications_failed_total{integration="webhook"}[10m]) > 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Alertmanager webhook notifications are failing — Watchdog heartbeat may not be egressing"
              description: |
                Alertmanager logged webhook notification failures over the last
                10m. The Watchdog heartbeat (and any other webhook receiver) may
                not be reaching its external endpoint, so the external
                dead-man's-switch could false-alarm "platform dead". Check the
                watchdog-heartbeat url_file Secret (populated? valid URL? token
                live?) and the egress/firewall path to the heartbeat endpoint. If
                the url_file is still the deploy placeholder, populate the Secret.

          # --- Exporter Health ---
          - alert: ThresholdExporterDown
            expr: up{job="threshold-exporter"} == 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Threshold exporter instance {{ $labels.instance }} is DOWN"
              description: "up=0 for 1m — partial HA degradation"

          - alert: ThresholdExporterAbsent
            expr: absent(up{job="threshold-exporter"} == 1)
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "All threshold-exporter instances are unreachable"
              description: "No healthy threshold-exporter target found for 1m — alerting pipeline broken"

          # --- HA Replica Health ---
          - alert: ThresholdExporterTooFewReplicas
            expr: count(up{job="threshold-exporter"} == 1) < 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Threshold exporter HA degraded"
              description: "Only {{ $value }} healthy replica(s) — expected at least 2"

          # --- Pod Restart Storm ---
          - alert: ThresholdExporterHighRestarts
            expr: |
              increase(
                kube_pod_container_status_restarts_total{
                  container="threshold-exporter",
                  namespace="monitoring"
                }[1h]
              ) > 3
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "Threshold exporter {{ $labels.pod }} restarting frequently"
              description: "{{ $value | printf \"%.0f\" }} restarts in the last hour"

          # --- Config Blast Radius (v2.8.0, Issue #61) ---
          # Fires when a defaults change ripples to >500 tenants in p99
          # over a 5-minute window. effect="applied" filter excludes
          # cosmetic edits and override-shadowed events that are NOT
          # operationally impactful — without this filter the alert
          # would page on safe noise (operator formatter run, tenant
          # override absorbing a default change).
          - alert: ConfigBlastRadiusHighImpact
            expr: |
              histogram_quantile(
                0.99,
                sum by (le) (
                  rate(da_config_blast_radius_tenants_affected_bucket{effect="applied"}[5m])
                )
              ) > 500
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Config change rippled to >500 tenants (p99, 5m)"
              description: |
                A defaults / source change has been propagating to a large
                fraction of tenants. Investigate whether this is intentional
                (planned global rollout) or accidental (operator pushed
                wrong-scope edit). Dashboard: blast-radius heatmap by
                (reason, scope, effect).

          # --- Config Override-Shadow Surge (v2.8.0, Issue #61) ---
          # Info-level signal: lots of defaults edits being absorbed by
          # tenant overrides. Often indicates ops drift (operator keeps
          # tweaking a global default that nobody actually consumes).
          - alert: ConfigDefaultsShadowedSurge
            expr: rate(da_config_defaults_shadowed_total[1h]) > (10 / 3600)
            for: 30m
            labels:
              severity: info
            annotations:
              summary: "High rate of override-shadowed defaults edits"
              description: |
                Inheritance system blocked >10 defaults changes per hour over
                the last 30m. Not an outage, but suggests the platform's
                global defaults are diverging from how tenants actually
                consume them — investigate which defaults are being touched
                without effect.

          # --- Config Parse Failure (issue #643) ---
          # An invalid tenant or _defaults YAML increments
          # da_config_parse_failure_total and ERRORs in the exporter log
          # (config_debounce.go), but until this alert shipped the
          # failure was visible only in logs — the affected tenant
          # silently lost fresh rule evaluation. Two thresholds capture
          # the two failure modes the exporter's own help text + RCA
          # comments distinguish:
          #   - per-tenant file (warning, >5/h per basename — matches
          #     the metric Help: "Alert: >5/h for any single basename
          #     = page ops"),
          #   - _defaults.yaml (critical, fire-once sentinel — a single
          #     failure silently DROPS THE ENTIRE DEFAULTS CHAIN for
          #     every dependent tenant; much wider blast radius).
          - alert: ConfigParseFailure
            expr: increase(da_config_parse_failure_total{file_basename!="_defaults.yaml"}[1h]) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Tenant config YAML parse failures (file {{ $labels.file_basename }})"
              description: |
                The threshold-exporter has logged >5 YAML parse failures
                for `{{ $labels.file_basename }}` in the last hour. The
                tenant backed by that file is no longer getting fresh
                rule evaluation — fix the YAML (see the exporter ERROR
                logs for the parse error) and the alert clears
                automatically. Other tenants are unaffected.
                NOTE: this evaluates a 1-hour sliding window, so the
                alert may stay Firing for up to ~1h after the YAML is
                fixed (the old failures only drop out of the window as
                time passes) — that's expected, not a stuck alert.

          # `> 0.5` (not `> 0`) is the standard SRE-grade defence against
          # Prometheus `increase()` extrapolation noise: scrape misalignment
          # or a counter reset (exporter restart on rollout / OOM-kill / HPA)
          # can yield tiny floats like 0.0001 in an otherwise-empty window
          # and false-page this critical sentinel. 0.5 immunises the noise
          # while still firing on any real ≥1 increment.
          - alert: ConfigDefaultsParseFailure
            expr: increase(da_config_parse_failure_total{file_basename="_defaults.yaml"}[5m]) > 0.5
            labels:
              severity: critical
            annotations:
              summary: "_defaults.yaml parse failure — defaults chain dropped"
              description: |
                A `_defaults.yaml` parse failure occurred in the last
                5m. Per the inheritance design (ADR-017) this silently
                drops the ENTIRE defaults block for every tenant that
                depends on this chain — those tenants quietly lose any
                rule pulled from defaults. Fix the YAML immediately
                (see the exporter ERROR logs).

          # --- Config Reload Stuck (issue #631 H2) ---
          # Complements ConfigParseFailure: that pair catches BAD YAML
          # (parse errors logged + counter incremented). This alert
          # catches the orthogonal "phantom state" — fsnotify-driven
          # reload triggers fire (file changes seen) but the
          # diffAndReload pipeline never finishes, so the exporter
          # keeps emitting STALE config: Git says X, Prometheus emits
          # Y. The `lastReloadComplete` gauge Help text
          # (`config_metrics.go`) literally documents this pattern:
          # "Production use: alert on time() - <gauge> > N for
          # stuck-reloader detection."
          #
          # Expression rationale:
          #   - LHS `sum without (reason) (increase(...trigger_total[10m])) > 0`
          #     gates on EXPECTED reload activity. The `without (reason)`
          #     is load-bearing — `da_config_reload_trigger_total` has
          #     a `reason` label (source / defaults / new / delete /
          #     forced) and Prometheus auto-attaches K8s scrape labels
          #     (instance / job / namespace / pod) to every series.
          #     `sum without (reason)` collapses the reason fan-out
          #     while PRESERVING the topology labels so:
          #       (a) the `and` vector-matches against the RHS, which
          #           inherits the gauge's topology labels (`time()` is
          #           scalar; scalar-minus-vector keeps the vector's
          #           labels), and
          #       (b) the fired alert carries instance + pod, so on-call
          #           knows which exporter pod is wedged.
          #     Plain `sum()` (no `without`) strips ALL labels → LHS
          #     becomes {} while RHS has topology labels → `and` is
          #     empty → alert silently never fires in K8s. The lab-clean
          #     promtool dogfood missed this; Gemini external review
          #     caught it pre-merge, reproduced + fixed (commit body).
          #     Without this guard clause altogether the alert would
          #     false-page on an idle exporter (no edits, no git-sync
          #     → gauge ages indefinitely by design).
          #   - RHS `(time() - gauge) > 600` says no successful reload
          #     in 10m, well above the worst-case reload p99 (~30s
          #     histogram top bucket) + a generous safety margin for
          #     debounce-coalesced bursts.
          # `for: 2m` debounces a single missed scrape; the expression
          # is already sticky (counter + gauge move slowly), so no
          # longer hold-down is needed before paging.
          - alert: ConfigReloadStuck
            expr: |
              (sum without (reason) (increase(da_config_reload_trigger_total[10m])) > 0)
              and
              ((time() - da_config_last_reload_complete_unixtime_seconds) > 600)
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Threshold-exporter reload pipeline stuck — phantom config state"
              description: |
                Reload triggers fired in the last 10m but no successful
                `diffAndReload` has completed for >10m. The exporter is
                now emitting STALE config: changes that reached disk
                (git-sync, kubectl apply, Tenant API) are NOT being
                reflected in `user_threshold` gauges or per-tenant rule
                evaluation — the "phantom state" #631 H2 calls out
                (Git says X, Prometheus still emits Y). Inspect the
                exporter logs for a `diffAndReload` ERROR / panic /
                lock contention; restart the pod if no obvious cause.

          # --- Tenant Cardinality Cap Truncation (issue #652) ---
          # Companion to the v1.5.0 runtime per-tenant cardinality cap
          # (`pkg/config/resolve.go:189-195`): the cap *enforces* a 500-
          # metric ceiling per tenant, but the truncation itself was
          # only logged (`ERROR: tenant=... truncating to limit`) with
          # no Prometheus signal — operators had no way to be paged when
          # a tenant silently lost rule evaluation. Same silent-failure
          # class as #631 (phantom reload) and #643 (silent parse fail).
          #
          # Metric choice — Gauge, not Counter. ResolveAtWithStats runs
          # under every /metrics scrape (~15-30s), so a Counter would
          # scrape-frequency-couple (a tenant stuck 100-over-limit for
          # 1h would inflate ~12,000/h of pure scrape noise). The
          # state-coded gauge `da_tenant_metrics_over_limit{tenant}`
          # carries `max(0, count - limit)` — stable at the magnitude
          # while truncation persists, drops to 0 the moment the tenant
          # fits under the cap again. No `increase()` ⇒ immune to the
          # `> 0.5` extrapolation defence #647 needed for counters.
          #
          # Two-tier alerts mirror the #647 ConfigParseFailure +
          # ConfigDefaultsParseFailure split:
          #   - Per-tenant warning catches isolated tenant overgrowth.
          #   - Critical sentinel fires once when a `_defaults.yaml`
          #     change cascades through the ADR-017 inheritance chain
          #     and pushes many tenants over the cap simultaneously —
          #     attributing the storm to the defaults change directly
          #     instead of relying on on-call to correlate 50+ warning
          #     pages.
          - alert: TenantMetricsOverLimit
            expr: da_tenant_metrics_over_limit > 0
            for: 5m
            labels:
              severity: warning
              tenant: "{{ $labels.tenant }}"
            annotations:
              summary: "Tenant {{ $labels.tenant }} exceeded max metrics limit (truncated)"
              description: |
                Tenant `{{ $labels.tenant }}` is producing more
                thresholds than `max_metrics_per_tenant` allows
                ({{ $value }} excess). The runtime silently truncated
                the excess (`pkg/config/resolve.go`), so the rules
                falling outside the cap stop evaluating until the
                tenant either trims their config or raises the
                per-tenant limit.
                If `DefaultsTruncationStorm` is firing simultaneously
                treat this as a symptom — root cause is a
                `_defaults.yaml` change adding metric keys across the
                ADR-017 inheritance chain, not single-tenant
                overgrowth.

          # `count without (tenant)` (NOT bare `count()`) is load-bearing.
          # Same lesson as PR #651: bare aggregations strip ALL labels
          # including the K8s scrape-time topology (instance / job /
          # namespace / pod), so the fired alert's payload would lose
          # the exporter-pod attribution and on-call would not know
          # which replica to inspect. `without (tenant)` collapses only
          # the tenant fan-out and preserves topology labels.
          # threshold-exporter is single-replica by design (helm
          # replicaCount=1), so the count groups into one series per
          # exporter pod; > 50 means a single pod is seeing >50 tenants
          # over the cap at once — defaults-chain disaster class.
          - alert: DefaultsTruncationStorm
            expr: count without (tenant) (da_tenant_metrics_over_limit > 0) > 50
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Massive tenant metrics truncation ({{ $value }} tenants) — _defaults.yaml suspected"
              description: |
                More than 50 tenants are simultaneously over the
                per-tenant metric cap. The likely cause is a
                `_defaults.yaml` change that added metric keys across
                the ADR-017 inheritance chain, pushing dependent
                tenants past the limit. Roll back or trim the defaults
                change FIRST — remediating individual tenants without
                addressing the defaults change will just re-fire the
                same storm next reload.

          # --- Prometheus Rule Evaluation Health (ADR-020 IV-2c, #508) ---
          # The federation blast-radius caps (--query.max-samples /
          # --query.timeout) are GLOBAL — they also bound this
          # Prometheus's own recording / alerting rule evaluation. A
          # cluster-wide aggregation rule can exceed the sample cap and
          # then fail SILENTLY: recording rules serve stale data and
          # alerts built on them stop firing. This alert is the tripwire
          # so that friendly-fire is never silent.
          - alert: PrometheusRuleEvaluationFailing
            expr: increase(prometheus_rule_evaluation_failures_total[10m]) > 0
            for: 15m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus rule evaluation failing in group {{ $labels.rule_group }}"
              description: |
                Rule group {{ $labels.rule_group }} has had evaluation
                failures for 15m. Recording rules then serve stale data,
                and alerts built on them silently stop firing — the
                platform goes blind. A likely cause is a rule query
                exceeding the global --query.max-samples cap (ADR-020
                IV-2c); inspect the failing rule on /rules and either
                optimise it or raise the cap + the Prometheus memory
                limit together.

          # --- tenant-api SSE reconnect-after-deploy guard (#740 / TRK-326) ---
          # #677 (TRK-324) set the tenant-api Deployment to `strategy: Recreate`
          # to kill the phantom-writer overlap. Side effect: every deploy hard-
          # drops all open `GET /api/v1/events` SSE streams. A single reconnect
          # is expected + self-healing (SSE clients auto-reconnect; the hub is
          # heartbeat-hardened, #143) — but nothing told operators whether
          # clients actually RECOVERED, or got stuck disconnected (broken
          # ingress / auth / DNS after the restart).
          #
          # This is the low-cost interim guard while #678 (TRK-325 read/write
          # CQRS split, the real zero-downtime fix) stays deferred. The SAME
          # `tenant_api_sse_clients` gauge is also #678's measurable defer-
          # trigger: sustained concurrent clients > N over 7d ⇒ "read HA is a
          # real requirement" ⇒ time to do TRK-325.
          #
          # Expr design (no false positives — behavioural contract in
          # tests/rulepacks/platform-sse-reconnect_test.yaml; KEEP IN SYNC):
          #   - `== 0`                         : no clients connected RIGHT NOW.
          #   - `uptime_seconds < 1800`        : the pod RESTARTED in the last 30m.
          #     This is the load-bearing clause — it scopes the alert to the
          #     post-deploy window. Without it the alert can't tell a reconnect
          #     FAILURE from a user simply CLOSING their Tenant-Manager tab during
          #     normal operation (both look like "had clients, now 0"), which on a
          #     low-frequency admin UI would be a constant false alarm.
          #   - `max_over_time([30m]) > 0`     : there WERE clients in the last 30m
          #     (so there's something to reconnect — not an idle deploy at 3am).
          #     max_over_time spans the restart gap, seeing the OLD pod's samples.
          #   - `for: 10m`                     : the 0-state has persisted 10m
          #     straight — a normal rolling reconnect recovers in seconds, so the
          #     `== 0` breaks and `for` resets well before this fires.
          # Auto-resolves when clients reconnect (gauge > 0), when uptime passes
          # 30m (no longer "post-deploy"), or after 30m of no clients. Pod-down /
          # scrape-absent is a separate concern (the series is ABSENT, not 0) — not
          # this alert's job; tenant-api has no general availability alert yet.
          #
          # WHY `sum/min without (pod, instance, endpoint)` + a subquery, not the
          # raw series: a Recreate deploy gives the NEW pod a different identity if
          # the scrape attaches per-pod labels (e.g. a ServiceMonitor / endpoints
          # role — already used elsewhere in this repo for threshold-exporter). The
          # new pod's `max_over_time([30m])` would then be all-0 (it never had
          # clients — those live on the OLD pod's now-stale series), and PromQL's
          # `and` needs EXACT label matches, so the alert would SILENTLY NEVER FIRE.
          # Aggregating the volatile labels away (safe — single-writer = one pod)
          # collapses old+new pods into ONE logical series whose history spans the
          # restart, making the alert correct under ANY scrape role. The `[30m:1m]`
          # subquery is required to run max_over_time over the aggregation result.
          - alert: TenantApiSSEReconnectFailure
            expr: |
              sum without (pod, instance, endpoint) (tenant_api_sse_clients{job="tenant-api"}) == 0
              and
              min without (pod, instance, endpoint) (tenant_api_uptime_seconds{job="tenant-api"}) < 1800
              and
              max_over_time(
                sum without (pod, instance, endpoint) (tenant_api_sse_clients{job="tenant-api"})[30m:1m]
              ) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "tenant-api SSE clients have not reconnected after a restart (10m)"
              description: |
                tenant-api had live `/api/v1/events` SSE clients within the last
                30m, but the connected count has been 0 for 10m straight. A
                deploy/restart (strategy: Recreate, #677) drops all streams; a
                healthy fleet reconnects within seconds. Sustained 0 means
                clients are NOT recovering — check the tenant-api pod readiness,
                the ingress/oauth2-proxy path to `/api/v1/events`, and recent
                deploys. Expected reconnect behaviour + the #678 (read/write
                split) trigger are documented in
                docs/api/tenant-api-hardening.md. Dashboard: tenant_api_sse_clients.

          # --- Tenant-exporter liveness: catastrophic fallback (#869) ---
          # Per-tenant TenantExporterAbsent (rule-pack-liveness.yaml) anti-joins
          # tenant_expected_exporter (LHS) against up==1. If the WHOLE
          # tenant-exporters job vanishes — Prometheus loses the scrape job, or
          # the threshold-exporter that PRODUCES tenant_expected_exporter itself
          # dies — the anti-join's LHS goes empty and the per-tenant rule cannot
          # fire (you can't anti-join nothing). This `absent()` over the raw job
          # is the dead-man's-switch for that catastrophe class. It lives HERE
          # (platform, hand-authored) not in rule-packs/ because it is platform-
          # scoped with NO tenant fan-out: absent() returns an empty-matcher
          # vector with no tenant label, which would (a) make rule-packs/'s
          # required_labels:[tenant] policy meaningless and (b) trip pint
          # alerts/template — exactly why the *ExporterAbsent class has always
          # been the absent()-sentinel exception. (`alerts/comparison` is globally
          # disabled in .pint.hcl for this absent()-always-firing-by-design class.)
          - alert: TenantExporterJobAbsent
            expr: absent(up{job="tenant-exporters"})
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Entire tenant-exporters scrape job is absent — per-tenant liveness is BLIND"
              description: |
                No `up{job="tenant-exporters"}` series exist at all. Either
                Prometheus lost the scrape job (SD/config regression) or the
                threshold-exporter that emits tenant_expected_exporter is down —
                in BOTH cases the per-tenant TenantExporterAbsent rule cannot fire
                (its anti-join LHS is empty), so this catastrophic fallback is the
                only signal. Check Prometheus /targets for the tenant-exporters job
                and the threshold-exporter Deployment.

          # --- Mass exporter outage: page-storm sentinel (#869, scale guard) ---
          # When a shared dependency (node pool, network partition, registry
          # outage on a rolling restart) knocks out MANY tenants' exporters at
          # once, TenantExporterAbsent fans out into one critical PER tenant — a
          # page storm. This single sentinel collapses that into ONE actionable
          # page. It mirrors the DefaultsTruncationStorm idiom (above): aggregate
          # the RAW anti-join expression (NOT the alertname — `count(...)(Foo)` is
          # not valid PromQL, and there is no ALERTS{} idiom in this repo), and use
          # `count without (tenant, db_type)` to collapse the per-tenant fan-out
          # into ONE global count. NB BOTH labels must be dropped on BOTH the
          # numerator AND the denominator: the anti-join result and
          # tenant_expected_exporter both carry db_type, so a bare `without (tenant)`
          # would split each count PER db_type and the ratio below would degrade into
          # per-db_type ratios. Dropping db_type too yields one mixed-DB count / one
          # mixed-DB total. Counting the raw expression (not ALERTS) also means it
          # fires WITHOUT waiting for TenantExporterAbsent's for:3m per tenant. The
          # `without(...)` form + no tenant label is exactly why this cannot live in
          # rule-packs/ (lint_custom_rules denies `without(tenant)` and mandates a
          # tenant label).
          #
          # RATIO + FLOOR (#880, replaces the provisional magic `> 10`): an absolute
          # threshold mis-scales at both ends. Small deployment (8 tenants, all 8
          # down < 10) → the sentinel never fires and on-call eats 8 individual
          # pages. Large deployment (a single node's ~15 exporters > 10) → a ROUTINE
          # node failure false-escalates to a machine-room incident. So fire only
          # when BOTH hold:
          #   (a) count(down) > 5                  — absolute floor: a handful down is
          #                                          fine as per-tenant pages.
          #   (b) count(down) / count(expected) > 0.1  — proportional: >10% of the
          #                                          fleet down ⇒ systemic, not N
          #                                          independent deaths.
          # `$value` is clause (a) (the down COUNT) because it is the LHS of the
          # top-level `and`, so the "{{ $value }} tenants" summary stays a count.
          # JOB-PRESENCE GATE (`unless on() absent(...)`): when the ENTIRE
          # tenant-exporters job is absent (all up series gone — SD / scrape-config
          # regression), every expected tenant looks "down", the ratio is 1.0, and
          # this would fire ON TOP OF TenantExporterJobAbsent — a duplicate critical
          # for one root cause. `unless on() absent(up{job="tenant-exporters"})`
          # suppresses this rule exactly when the job is wholly absent, leaving
          # JobAbsent as the single signal for that catastrophe. The rule still fires
          # for the case it OWNS — the job is PRESENT but many targets report up=0 (or
          # are individually absent), a shared-dependency outage JobAbsent does NOT
          # catch. `on()` matches globally: absent() carries only job=, which would
          # not line up with the threshold-exporter scrape labels on the LHS, so a
          # labelled match would never suppress. (CodeRabbit #882.)
          # CAVEAT: the denominator count(tenant_expected_exporter) goes EMPTY if the
          # threshold-exporter that emits it dies — then the whole expression is
          # empty and this sentinel cannot fire. That collector-death catastrophe is
          # deliberately NOT this rule's job; the job-absent / collector-down classes
          # are owned by TenantExporterJobAbsent + ThresholdExporterAbsent, so the
          # sentinel is never the sole dependency. Tune 5 / 0.1 to the deployment.
          - alert: MassExporterOutage
            expr: |
              (
                count without (tenant, db_type) (tenant_expected_exporter unless on(tenant) (up{job="tenant-exporters"} == 1)) > 5
                and
                (
                  count without (tenant, db_type) (tenant_expected_exporter unless on(tenant) (up{job="tenant-exporters"} == 1))
                  /
                  count without (tenant, db_type) (tenant_expected_exporter)
                ) > 0.1
              )
              unless on() absent(up{job="tenant-exporters"})
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Mass exporter outage ({{ $value }} tenants) — shared-dependency failure suspected"
              description: |
                More than 5 tenants AND over 10% of the expected-exporter fleet
                simultaneously have no healthy up{job="tenant-exporters"}==1 target.
                Both conditions together mean this is almost certainly a SHARED
                failure (node pool drained, network partition, image-pull outage on a
                rolling restart) rather than N independent exporter deaths or a
                routine single-node blip. Treat as ONE incident: inspect node health
                / network / recent cluster-wide changes FIRST — remediating tenants
                one by one will not address the common cause. Per-tenant detail is in
                the fanned-out TenantExporterAbsent alerts. If instead the WHOLE
                tenant-exporters job is gone, TenantExporterJobAbsent fires instead.

      # ============================================================
      # Federation Audit (ADR-020 IV-2f, issue #511)
      # Monitors the federation data plane via the metric
      # tenant_federation_requests_total{tenant,status}, emitted by the
      # mtail sidecar in helm/federation-gateway. status enum:
      # ok | rate_limited | auth_failed | bad_request | backend_error.
      # Actionable alerts (severity: warning) — the issue calls them
      # "sentinel alerts" loosely; they are not severity:none inhibit
      # sentinels.
      # ============================================================
      - name: federation-audit
        rules:
          # Tenant-side rejection surge: >50% of a tenant's federation
          # requests rejected (rate-limited / auth-failed / bad-request)
          # for 15m. The second clause floors it at ~1 rejection/min so a
          # single fluke on a near-idle tenant cannot trip it. The third
          # clause — `and on(tenant) tenant_metadata_info` — scopes the
          # alert to tenants still in conf.d (#550): an offboarded tenant
          # whose client keeps polling with a revoked-but-unexpired token
          # bills 100% auth_failed until the 4h TTL runs out, and without
          # this clause the alert pages platform ops about a tenant that
          # no longer exists. tenant_metadata_info is emitted (=1) by
          # threshold-exporter for every conf.d tenant, so a removed
          # tenant drops out of the join. Trade-off: if threshold-exporter
          # is down the join empties and this alert is silenced —
          # acceptable for a warning, and that outage is separately
          # alerted.
          - alert: FederationRejectionRateAnomaly
            expr: |
              (
                sum by (tenant) (
                  rate(tenant_federation_requests_total{status=~"rate_limited|auth_failed|bad_request"}[10m])
                )
                /
                sum by (tenant) (rate(tenant_federation_requests_total[10m]))
              ) > 0.5
              and
              sum by (tenant) (
                rate(tenant_federation_requests_total{status=~"rate_limited|auth_failed|bad_request"}[10m])
              ) > 0.0167
              and on (tenant)
              tenant_metadata_info
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Federation requests for {{ $labels.tenant }} are mostly rejected"
              description: |
                Over 50% of tenant {{ $labels.tenant }}'s federation requests
                have been rejected (rate-limited / auth-failed / bad-request)
                for 15m. Check the federation-audit dashboard — likely a
                leaked or misconfigured token, a tenant exceeding its rate
                limit, or whitelist / subset drift.

          # Platform-fault signal — 5xx from the storage backend, kept
          # separate from the tenant-side rejections above (a backend
          # error is the platform's fault, not the tenant's).
          - alert: FederationGatewayBackendErrors
            expr: |
              sum by (tenant) (
                rate(tenant_federation_requests_total{status="backend_error"}[10m])
              ) > 0.05
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Federation backend errors for {{ $labels.tenant }}"
              description: |
                The federation storage backend is returning 5xx for tenant
                {{ $labels.tenant }} (>3/min for 10m). This is a platform
                fault, not a tenant rejection — check the Layer 3 proxy and
                the storage backend.

          # ── Audit pipeline liveness (#566 X-4) ──────────────────────
          # `tenant_federation_requests_total` is emitted by the gateway
          # mtail sidecar (#511 IV-2f) every time a request lands. If the
          # metric goes absent for 10m something upstream is wrong — pod
          # crashloop / mtail-sidecar dead / network partition between
          # Prometheus and the gateway. A "0 audit rows in last 24h" CSV
          # in chargeback is otherwise ambiguous between "tenant didn't
          # use" / "audit pipeline broke" / "operator wiped data"; this
          # alert names the second case.
          - alert: FederationAuditPipelineSilent
            expr: absent_over_time(tenant_federation_requests_total[10m])
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Federation audit pipeline has produced zero rows for 10m"
              description: |
                No `tenant_federation_requests_total` samples in the last
                10m — federation gateway audit pipeline is broken. Check
                (a) gateway pods Running, (b) mtail-sidecar logs, (c) the
                Prometheus scrape target. If both gateway + sidecar are
                healthy the silence may indicate genuine zero traffic
                (suppress the alert during planned maintenance).

          # ── Vector buffer overflow → audit row loss (#566 T1-4) ─────
          # Requires Vector chart `metrics.enabled=true` + a Prometheus
          # scrape target on the headless Service. With buffers wired to
          # `when_full: drop_newest` (the §2-mandated default for fan-out
          # sinks), back-pressure cannot wedge VictoriaLogs — but it WILL
          # silently drop SIEM-bound events. Without this alert the only
          # signal is reading Vector logs.
          - alert: VectorBufferEventsDropped
            expr: |
              sum by (component_id) (
                rate(vector_buffer_discarded_events_total[5m])
              ) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Vector sink {{ $labels.component_id }} dropping events for 5m"
              description: |
                The Vector sink's buffer is overflowing — events are being
                dropped (drop_newest policy). Either downstream is too
                slow (scale the SIEM / VictoriaLogs replica), or
                upstream burst exceeds buffer size (increase
                `_buffer_max_events` for that sink in helm/vector
                values). For compliance-relevant streams this is an
                audit-trail integrity event — investigate immediately.
