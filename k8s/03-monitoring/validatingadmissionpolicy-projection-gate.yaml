# ValidatingAdmissionPolicy — anti-silent-disarm for the tenant-projection gate
# (ADR-021 Phase 2(a) / #908 PR-3). The K8s-native generalisation of the #945
# mtail-compile lesson: a security control that can be SILENTLY removed is fragile.
#
# WHAT IT GUARDS
# --------------
# The fail-closed projection gate (helm/vector) runs as a Vector DaemonSet
# init-container named `projection-gate`; it is the only un-bypassable point that
# stops a "unique-but-wrong" accountId from cross-tenant-leaking tenant logs. But
# nothing stops an operator from editing that init-container OUT of a live Vector
# DaemonSet (a `kubectl edit`, a Kustomize/GitOps overlay that drops it) while the
# tenant-routing plumbing stays — silently disarming the gate. This policy catches
# exactly that: a Vector log-shipper DaemonSet that still mounts the gate's
# `registry` volume (i.e. tenant projection is active) but no longer has the
# `projection-gate` init-container.
#
# ⚠️ WHY Warn+Audit, NOT Deny (Day-1 blast-radius discipline)
# ----------------------------------------------------------
# This is the repo's FIRST VAP and it cannot be validated against a real API
# server here (no cluster in the dev loop). A wrong CEL on a Deny binding would
# reject Vector DaemonSet applies CLUSTER-WIDE (fail-closed → cluster DoS). So the
# BINDING uses `validationActions: [Warn, Audit]`, which — verified against the
# K8s reference — NEVER blocks the request regardless of `failurePolicy` (even a
# CEL runtime error is reported, not enforced, when no `Deny` action is present).
# That makes this 100% safe to ship blind: a disarm surfaces as a kubectl warning
# + an audit event, with zero deploy risk. PROMOTE TO Deny (flip the binding's
# validationActions to [Deny]) only AFTER validating the CEL matches/allows
# correctly on a real cluster — see the runbook for the promotion checklist.
#
# THREAT MODEL (honest scope): operator good-faith mistake / accidental disarm of
# a LIVE gated DaemonSet — the init-container is edited out but the `registry`
# volume remains. A malicious cluster-admin who strips BOTH the volume and the
# init-container (or downgrades to a pre-gate chart that emits neither) is out of
# scope — no in-cluster admission policy binds an actor who controls the cluster.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: vector-projection-gate-anti-disarm
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    app.kubernetes.io/component: admission-policy
spec:
  # A CEL runtime error is governed by failurePolicy — but because the binding is
  # Warn+Audit (no Deny), even `Fail` here can NEVER block a request; it only
  # decides whether an eval error is surfaced (Fail = report it) or ignored.
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["daemonsets"]
  # Precondition: only evaluate DaemonSets that are actually running the gated
  # tenant projection, keyed on the gate's `registry` volume (rendered by
  # helm/vector ONLY when tenantProjections is set). A single-tenant Vector with
  # no projection has no `registry` volume → skipped (no false warning). The
  # `has()` guard keeps the CEL runtime-safe on a DaemonSet with no volumes.
  matchConditions:
    - name: gated-tenant-projection-active
      expression: >-
        has(object.spec.template.spec.volumes) &&
        object.spec.template.spec.volumes.exists(v, v.name == 'registry')
  validations:
    # The gate init-container MUST be present. `has()` guards a DaemonSet with no
    # initContainers at all (that IS the disarm case → expression false → warn).
    - expression: >-
        has(object.spec.template.spec.initContainers) &&
        object.spec.template.spec.initContainers.exists(c, c.name == 'projection-gate')
      reason: Forbidden
      message: >-
        Vector projection-gate init-container is missing from a tenant-projecting
        Vector DaemonSet (it mounts the conf.d registry but has no
        'projection-gate' init-container). The fail-closed cross-tenant-leak gate
        (#908) has been disarmed — restore the init-container. See
        platform-log-aggregation-runbook 8.9.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: vector-projection-gate-anti-disarm-binding
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    app.kubernetes.io/component: admission-policy
spec:
  policyName: vector-projection-gate-anti-disarm
  # ⛔ Warn+Audit, NOT Deny — see the policy header. This never blocks a deploy;
  # it emits a kubectl warning + an audit event. Promote to [Deny] only after
  # real-cluster validation (Deny and Warn are mutually exclusive — replace, not add).
  validationActions: ["Warn", "Audit"]
  matchResources:
    # Scope to Vector log-shipper DaemonSets only (the always-present chart labels
    # from helm/vector _helpers.tpl). Combined with the policy's matchConditions,
    # only a gated Vector DaemonSet is ever evaluated.
    objectSelector:
      matchLabels:
        app.kubernetes.io/name: vector
        app.kubernetes.io/component: log-shipper
