[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False

[mypy-scripts.tools._lib_*]
disallow_untyped_defs = True
warn_return_any = True

[mypy-scripts.tools.ops.validate_config]
disallow_untyped_defs = True
warn_return_any = True

[mypy-scripts.tools.ops.generate_alertmanager_routes]
disallow_untyped_defs = True
warn_return_any = True

[mypy-scripts.tools.ops.scaffold_tenant]
disallow_untyped_defs = True
warn_return_any = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-promql_parser.*]
ignore_missing_imports = True

[mypy-croniter.*]
ignore_missing_imports = True
