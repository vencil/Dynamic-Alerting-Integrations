# Test Prometheus config — federation E2E (ADR-020 IV-2j, #516).
# Scrapes only the fixture-exporter. honor_labels keeps the `tenant`
# label carried by the fixture series (Prometheus would otherwise not
# touch it, but honor_labels makes the intent explicit and also keeps
# any `job`/`instance` the fixture sets).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: fixture
    honor_labels: true
    static_configs:
      - targets: ["fixture-exporter:80"]
