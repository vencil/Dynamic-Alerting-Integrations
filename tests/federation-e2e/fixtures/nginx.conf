# Serve the fixture metrics file as Prometheus text exposition.
# The file (fixtures/metrics.prom) is mounted at
# /usr/share/nginx/html/metrics; `default_type text/plain` makes nginx
# serve that extension-less file with a content-type Prometheus's
# scraper accepts.
server {
    listen 80;
    server_name _;
    default_type text/plain;
    location / {
        root /usr/share/nginx/html;
    }
}
