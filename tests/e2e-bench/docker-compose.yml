# B-1 Phase 2 e2e alert fire-through harness — local-only (NOT in CI).
#
# Per design doc §3 (chose docker-compose over k3d/kind: K8s noise
# falls below the 5s scrape quantization, and we already cover symlink
# rotation in PR #54 unit tests).
#
# Usage:
#
#   cd tests/e2e-bench
#   # Pre-flight: generate fixture once (PR-1 tool):
#   python3 ../../scripts/tools/dx/generate_tenant_fixture.py \
#       --layout synthetic-v2 --count 1000 --with-defaults \
#       --output fixture/synthetic-v2/conf.d --seed 42
#   # Copy chosen fixture into the run-time active dir:
#   cp -r fixture/synthetic-v2/conf.d/* fixture/active/conf.d/
#   # Run the harness:
#   COUNT=30 docker compose up --build --abort-on-container-exit
#   # Per-run JSONs land in bench-results/.
#   docker compose down -v
#
# Driver runs INSIDE the compose stack so all timestamps share the
# host kernel clock (per design §2.4 — eliminates host-vs-container
# clock skew that would otherwise corrupt 5-anchor measurements).

services:
  threshold-exporter:
    build:
      context: ../../components/threshold-exporter/app
    volumes:
      # Driver writes new tenant YAMLs here mid-run; exporter watches
      # via its existing fsnotify path. Bind-mount over a Compose
      # volume so the host (and the driver service below) can read/
      # write the same dir.
      - ./fixture/active/conf.d:/etc/threshold-exporter/conf.d:rw
    command:
      - "--listen=:8080"
      - "--config=/etc/threshold-exporter/conf.d"
      # Production defaults are reload=30s, debounce=300ms — fine for
      # K8s ConfigMap rotation cadence. For the bench harness we need
      # MUCH faster change detection because the driver's per-run
      # POLL_TIMEOUT_S is 60s. With production reloadInterval=30s and
      # 1000-tenant scan time ~30s on slow CI runners, the next
      # WatchLoop tick after driver's fixture mutation can land at
      # T0+60s, exactly the polling deadline — race city.
      #
      # Override to 5s reload + 100ms debounce: WatchLoop catches
      # the mutation within 5s, debounce window collapses, diffAndReload
      # stamps the gauge well within driver's 60s budget.
      - "--reload-interval=5s"
      - "--scan-debounce=100ms"
    expose:
      - "8080"
    # Distroless base has no wget/curl/sh — use Prometheus's
    # service-discovery scrape success as health signal instead
    # (this service has no compose-level healthcheck; downstream
    # services depend on prometheus which scrapes this one).

  pushgateway:
    image: prom/pushgateway:v1.10.0
    expose:
      - "9091"

  prometheus:
    image: prom/prometheus:v3.11.2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
      # 5s evaluation matches the scrape interval — anything tighter
      # is wasted CPU; anything looser pushes stage C latency up.
      - "--storage.tsdb.retention.time=1h"
    expose:
      - "9090"
    depends_on:
      - threshold-exporter
      - pushgateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 2s
      timeout: 1s
      retries: 30

  alertmanager:
    image: prom/alertmanager:v0.32.0
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--web.listen-address=:9093"
    expose:
      - "9093"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/ready"]
      interval: 2s
      timeout: 1s
      retries: 30

  receiver:
    build:
      context: ./receiver
    expose:
      - "5001"

  driver:
    build:
      context: ./driver
    environment:
      EXPORTER_URL: "http://threshold-exporter:8080"
      PROMETHEUS_URL: "http://prometheus:9090"
      PUSHGATEWAY_URL: "http://pushgateway:9091"
      RECEIVER_URL: "http://receiver:5001"
      FIXTURE_ACTIVE: "/fixture/active/conf.d"
      RESULTS_DIR: "/results"
      E2E_FIXTURE_KIND: "${E2E_FIXTURE_KIND:-synthetic-v2}"
      COUNT: "${COUNT:-30}"
    volumes:
      - ./fixture/active/conf.d:/fixture/active/conf.d:rw
      - ./bench-results:/results:rw
    depends_on:
      alertmanager:
        condition: service_healthy
      receiver:
        condition: service_started
      # Pushgateway and threshold-exporter are dependencies of prometheus
      # (which alertmanager depends on), so they're started by the time
      # alertmanager is healthy. BUT compose's `service_started` only
      # means the container is up, NOT that the process inside is
      # listening. At CI scale (1000-tenant fixture mounted from slow
      # ubuntu-latest disk), the threshold-exporter's first config
      # load + the pushgateway's first :9091 listen can lag the driver's
      # first push by several seconds, producing
      # `urllib.error.URLError: <urlopen error [Errno 111] Connection
      # refused>` for runs 0..N. Local-scale (3-4 tenants) doesn't
      # trigger this because everything's ready instantly.
      #
      # Add explicit dependencies so compose waits for these too.
      # Pushgateway has no healthcheck so we use service_started; the
      # in-driver wait_for_services() loop (added in driver.py) covers
      # the listen-vs-up gap.
      pushgateway:
        condition: service_started
      threshold-exporter:
        condition: service_started
    # Driver exits naturally after COUNT+1 runs; abort-on-container-exit
    # in `docker compose up` brings the rest down.
