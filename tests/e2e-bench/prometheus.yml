# Prometheus config for e2e-bench. 5s scrape interval matches the
# `for: 0s` evaluation in alert-rules.yml — anything tighter is wasted
# CPU; anything looser pushes stage C latency above the design target.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: threshold-exporter
    static_configs:
      - targets:
          - "threshold-exporter:8080"

  - job_name: pushgateway
    # Pushgateway exposes pushed metrics under /metrics with the
    # `instance` and `job` labels of the pusher. Honor those labels
    # so our `actual_metric_value{tenant=...}` lands cleanly.
    honor_labels: true
    static_configs:
      - targets:
          - "pushgateway:9091"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
