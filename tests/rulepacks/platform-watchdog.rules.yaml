# Bare-rules promtool target for the platform self-liveness alerts: the
# alerting-plane heartbeat (ADR-025 D1 / #838) AND the governance CronJob
# dead-man's-switch (#656). promtool can't consume the deployed ConfigMap directly
# (it needs a top-level `groups:` document, not `data: platform-alert.yml: |`),
# so this is an EXTRACTED COPY of the alerts from
# k8s/03-monitoring/configmap-rules-platform.yaml.
#
# ⚠️ KEEP IN SYNC with that ConfigMap — expr / labels / `for` must match exactly.
# The `description` annotation is intentionally omitted here (promtool requires an
# EXACT annotation-set match against the test's exp_annotations, so the extracted
# copy carries only `summary`, like platform-sse-reconnect.rules.yaml). The
# behavioural contract (Watchdog ALWAYS firing; webhook-egress alert fires only on
# a SUSTAINED failure, not a transient blip or a healthy pipe) is exercised by
# platform-watchdog_test.yaml against this file.
groups:
  - name: platform-self-monitoring
    rules:
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "Alerting pipeline heartbeat — if this stops reaching the external monitor, Prometheus/Alertmanager is down"

      - alert: AlertmanagerWebhookNotificationsFailing
        expr: increase(alertmanager_notifications_failed_total{integration="webhook"}[10m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Alertmanager webhook notifications are failing — Watchdog heartbeat may not be egressing"

      # Governance CronJob dead-man's-switch (#656). expr / labels / `for` are an
      # EXACT copy of the ConfigMap rule; the `description` is omitted per this
      # file's convention. Behavioural contract (fires past `for`, projects the KSM
      # scrape labels away, cold-start-safe, suspend-suppressed) is in
      # platform-watchdog_test.yaml.
      - alert: ThresholdGovernanceStale
        expr: |
          (
            max by (cronjob, namespace) (
              time() - kube_cronjob_status_last_successful_time{cronjob="threshold-govern", namespace="monitoring"}
            ) > 691200
          )
          unless on (cronjob, namespace)
            kube_cronjob_spec_suspend{cronjob="threshold-govern", namespace="monitoring"} == 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Threshold-governance loop has not succeeded in 8 days"
