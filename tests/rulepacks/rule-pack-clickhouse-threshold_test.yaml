# promtool unit test — #731 exporter↔rule-pack metric-label contract (clickhouse).
# Proves the (multi-line) threshold recording rule resolves under the REAL exporter
# shape `user_threshold{component="clickhouse", metric="queries_rate"}` (was querying
# the full `metric="clickhouse_queries_rate"` → empty → silent before #731).
# Run: promtool test rules tests/rulepacks/rule-pack-clickhouse-threshold_test.yaml
rule_files:
  - ../../rule-packs/rule-pack-clickhouse.yaml

evaluation_interval: 15s

tests:
  - interval: 15s
    input_series:
      - series: 'user_threshold{tenant="t1", component="clickhouse", metric="queries_rate", severity="warning"}'
        values: '300x5'
    promql_expr_test:
      - expr: tenant:alert_threshold:clickhouse_queries_rate
        eval_time: 1m
        exp_samples:
          - labels: 'tenant:alert_threshold:clickhouse_queries_rate{tenant="t1"}'
            value: 300
