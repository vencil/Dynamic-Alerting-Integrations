# Bare-rules promtool/pint target for the TenantApiReadHANeeded alert
# (ADR-023 Deferred A4 / #678 / #788). promtool can't consume the deployed
# ConfigMap directly (it needs a top-level `groups:` document, not
# `data: platform-alert.yml: |`), so this is an EXTRACTED COPY of the alert from
# k8s/03-monitoring/configmap-rules-platform.yaml.
#
# ⚠️ KEEP IN SYNC with that ConfigMap. The behavioural contract (fire on a
# SUSTAINED multi-viewer read surface; NOT on a transient spike; bridges a
# Recreate pod-identity change) is exercised by platform-read-ha-trigger_test.yaml
# against this file.
groups:
  - name: platform-self-monitoring
    rules:
      - alert: TenantApiReadHANeeded
        expr: |
          avg_over_time(
            sum without (pod, instance, endpoint) (tenant_api_sse_clients{job="tenant-api"})[7d:1h]
          ) > 2
        labels:
          severity: info
        annotations:
          summary: "tenant-api read load sustained — revisit read/write CQRS split (ADR-023 A4)"
