# promtool unit test - #869/#880 platform-side tenant-liveness sentinels.
# Run: promtool test rules tests/rulepacks/tenant-liveness-platform_test.yaml
#
# Oracle for tenant-liveness-platform.rules.yaml (the EXTRACT of
# TenantExporterJobAbsent + MassExporterOutage from configmap-rules-platform.yaml).
#
#   JOB-ABSENT     whole tenant-exporters job gone -> TenantExporterJobAbsent fires.
#   JOB-PRESENT    at least one up series -> TenantExporterJobAbsent silent.
#
#   MassExporterOutage (#880 ratio+floor, replaces the provisional magic > 10;
#   plus an `unless on() absent(...)` job-presence gate, CodeRabbit #882):
#   fires iff  count(down) > 5  AND  count(down)/count(expected) > 0.1  AND the
#   tenant-exporters job is PRESENT (not wholly absent).
#     small-all-down  8 of 8 down via up==0 (job present, exporters unhealthy)
#                     -> FIRES. The headline #880 fix: the old `> 10` absolute floor
#                     MISSED an 8-tenant cluster going dark. Mixed db_types also prove
#                     `without (tenant, db_type)` collapses BOTH numerator and
#                     denominator to one mixed count.
#     job-absent-8    same 8 expected but NO up at all (whole job gone) -> SILENT.
#                     The gate hands this catastrophe to TenantExporterJobAbsent (which
#                     fires), instead of double-paging. CodeRabbit #882 regression.
#     floor-guard     5 of 8 down  -> silent. 5 is not > 5, so a handful down
#                     stays as per-tenant TenantExporterAbsent pages (ratio 0.625
#                     would pass; the floor is what holds it back).
#     ratio-guard     6 of 61 down -> silent. 6 > 5 passes the floor, but 9.8% is
#                     not > 10%, so a routine large-cluster blip (one node's worth
#                     of exporters) does NOT false-escalate to a mass page. This is
#                     the clause that the old absolute `> 10` could not express.
#     collector-dead  no tenant_expected_exporter at all -> MassExporterOutage
#                     emits nothing (empty numerator AND denominator; count over an
#                     empty vector is absent, not 0, so there is no 0/0 false fire).
#                     The job-absent dead-man's-switch is the catastrophe signal,
#                     so the ratio sentinel is never the sole dependency.
rule_files:
  - tenant-liveness-platform.rules.yaml

evaluation_interval: 30s

tests:
  - interval: 30s
    name: job-absent-fires
    input_series:
      # tenant_expected_exporter present but NO up{job="tenant-exporters"} at all.
      - series: 'tenant_expected_exporter{tenant="db-a", db_type="mariadb"}'
        values: '1x12'
    alert_rule_test:
      - eval_time: 4m
        alertname: TenantExporterJobAbsent
        exp_alerts:
          - exp_labels:
              severity: critical
              job: tenant-exporters
            exp_annotations:
              summary: "Entire tenant-exporters scrape job is absent — per-tenant liveness is BLIND"

  - interval: 30s
    name: job-present-silent
    input_series:
      - series: 'up{job="tenant-exporters", tenant="db-a", instance="db-a:9104"}'
        values: '1x12'
    alert_rule_test:
      - eval_time: 4m
        alertname: TenantExporterJobAbsent
        exp_alerts: []

  - interval: 30s
    name: mass-small-cluster-8-all-down-fires
    input_series:
      # 8 tenants expected, ALL reporting up==0 (a shared-dependency outage: targets
      # present + scraped, exporters unhealthy). The job is PRESENT (up series exist,
      # value 0) so the `unless on() absent(...)` gate does NOT suppress; up==0 is not
      # up==1 so all 8 stay in the anti-join. count(down)=8 > 5 and ratio 8/8 = 1.0 >
      # 0.1 -> fires. The old `> 10` floor would MISS this small cluster. Mixed
      # db_types prove the without(tenant,db_type) collapse on both num and denom.
      - series: 'tenant_expected_exporter{tenant="s01", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s02", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s03", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s04", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s05", db_type="postgresql"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s06", db_type="postgresql"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s07", db_type="redis"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s08", db_type="redis"}'
        values: '1x12'
      - series: 'up{job="tenant-exporters", tenant="s01", instance="s01:9104"}'
        values: '0x12'
      - series: 'up{job="tenant-exporters", tenant="s02", instance="s02:9104"}'
        values: '0x12'
      - series: 'up{job="tenant-exporters", tenant="s03", instance="s03:9104"}'
        values: '0x12'
      - series: 'up{job="tenant-exporters", tenant="s04", instance="s04:9104"}'
        values: '0x12'
      - series: 'up{job="tenant-exporters", tenant="s05", instance="s05:9104"}'
        values: '0x12'
      - series: 'up{job="tenant-exporters", tenant="s06", instance="s06:9104"}'
        values: '0x12'
      - series: 'up{job="tenant-exporters", tenant="s07", instance="s07:9104"}'
        values: '0x12'
      - series: 'up{job="tenant-exporters", tenant="s08", instance="s08:9104"}'
        values: '0x12'
    alert_rule_test:
      - eval_time: 4m
        alertname: MassExporterOutage
        exp_alerts:
          - exp_labels:
              severity: critical
            exp_annotations:
              summary: "Mass exporter outage (8 tenants) — shared-dependency failure suspected"

  - interval: 30s
    name: mass-job-absent-8-expected-silent-jobabsent-fires
    input_series:
      # Same 8 expected, but the WHOLE tenant-exporters job is gone (NO up series at
      # all) -> every expected tenant looks "down" (ratio 1.0, count 8 > 5). Without
      # the gate this would fire ON TOP OF TenantExporterJobAbsent (duplicate critical
      # for one root cause). The `unless on() absent(...)` gate suppresses
      # MassExporterOutage here, leaving JobAbsent as the single catastrophe signal.
      - series: 'tenant_expected_exporter{tenant="s01", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s02", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s03", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s04", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s05", db_type="postgresql"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s06", db_type="postgresql"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s07", db_type="redis"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="s08", db_type="redis"}'
        values: '1x12'
    alert_rule_test:
      - eval_time: 4m
        alertname: MassExporterOutage
        exp_alerts: []
      - eval_time: 4m
        alertname: TenantExporterJobAbsent
        exp_alerts:
          - exp_labels:
              severity: critical
              job: tenant-exporters
            exp_annotations:
              summary: "Entire tenant-exporters scrape job is absent — per-tenant liveness is BLIND"

  - interval: 30s
    name: mass-floor-5-down-silent
    input_series:
      # 8 expected, 3 healthy (up==1) -> 5 down. count(down)=5 is NOT > 5 (strict)
      # so the floor holds it silent even though ratio 5/8 = 0.625 > 0.1.
      - series: 'tenant_expected_exporter{tenant="f01", db_type="mariadb"}'
        values: '1x12'
      - series: 'tenant_expected_exporter{tenant="f02", db_type="mariadb"}'
