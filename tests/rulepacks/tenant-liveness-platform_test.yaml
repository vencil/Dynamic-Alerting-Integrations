      # up{job="prometheus"} filler does not match the tenant-exporters job, so
      # TenantExporterJobAbsent (absent(up{job="tenant-exporters"})) still fires --
      # the catastrophe signal, proving the ratio sentinel is not the sole dependency.
      - series: 'up{job="prometheus", instance="localhost:9090"}'
        values: '1x12'
    alert_rule_test:
      - eval_time: 4m
        alertname: MassExporterOutage
        exp_alerts: []
      - eval_time: 4m
        alertname: TenantExporterJobAbsent
        exp_alerts:
          - exp_labels:
              severity: critical
              job: tenant-exporters
            exp_annotations:
              summary: "Entire tenant-exporters scrape job is absent — per-tenant liveness is BLIND"
