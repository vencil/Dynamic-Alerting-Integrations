# ============================================================
# Runtime-Canary DEMO rule bundle — ADR-025 design-readiness (NOT the prod pack).
#
# Two parts:
#  1. The `custom-alerts*` groups below are the VERBATIM output of the REAL
#     compiler for one reserved-tenant recipe — proving the canary dogfoods the
#     exact live compile chain (regenerate with:
#       printf 'tenants:\n  platform-canary:\n    _custom_alerts:\n    - {recipe: threshold, name: pipeline_heartbeat, metric: canary_pipeline_heartbeat, op: ">", window: 5m, threshold: "0:warning", mode: silent}\n' > /tmp/cc/platform-canary.yaml
#       python3 scripts/tools/dx/compile_custom_alerts.py --config-dir /tmp/cc --out -  ).
#     The canary is an ALWAYS-FIRING threshold (heartbeat 1 > 0), mode:silent so
#     it never pages — it is a dashboard-only ALERTS series whose DISAPPEARANCE is
#     the signal.
#  2. `custom-alerts-pipeline-canary-meta` is a HAND-AUTHORED platform rule (NOT
#     compiler output): the dead-man's-switch that PAGES when the always-firing
#     canary stops — i.e. the custom-alert compile pipeline silently broke.
#
# This bundle is exercised by runtime-canary_test.yaml (promtool, CI-run). It is
# illustrative design-readiness, NOT deployed: see docs/design/runtime-canary.md.
# ============================================================
groups:
- name: custom-alerts-normalization
  interval: 15s
  rules:
  - record: custom:threshold:threshold__canary_pipeline_heartbeat__gt__w5m__for1m
    expr: label_replace(max by(tenant, version, severity, name, mode) (user_threshold{component="custom", metric="canary_pipeline_heartbeat", recipe_id="threshold__canary_pipeline_heartbeat__gt__w5m__for1m"}), "version", "default", "version", "^$")
  - record: custom:metric:threshold__canary_pipeline_heartbeat__gt__w5m__for1m
    expr: label_replace(max by(tenant, version) (canary_pipeline_heartbeat), "version", "default", "version", "^$")
  - record: custom:threshold__canary_pipeline_heartbeat__gt__w5m__for1m:warning:core
    expr: |-
      (
        (
          custom:metric:threshold__canary_pipeline_heartbeat__gt__w5m__for1m
          > on(tenant, version) group_left(name, mode)
            custom:threshold:threshold__canary_pipeline_heartbeat__gt__w5m__for1m{severity="warning"}
        )
        or
        (
          (
            custom:metric:threshold__canary_pipeline_heartbeat__gt__w5m__for1m
            unless on(tenant, version)
              custom:threshold:threshold__canary_pipeline_heartbeat__gt__w5m__for1m{severity="warning"}
          )
          > on(tenant) group_left(name, mode)
            custom:threshold:threshold__canary_pipeline_heartbeat__gt__w5m__for1m{version="default", severity="warning"}
        )
      )
      unless on(tenant)
      (user_state_filter{filter="maintenance"} == 1)
- name: custom-alerts-info
  interval: 1m
  rules:
  - record: custom_recipe_info
    expr: vector(1)
    labels:
      recipe_id: threshold__canary_pipeline_heartbeat__gt__w5m__for1m
      recipe: threshold
      status: active
- name: custom-alerts
  rules:
  - alert: CustomRecipeSilent
    expr: max by(tenant, name) (user_threshold{component="custom", mode="silent"})
    labels:
      severity: none
      tenant: '{{ $labels.tenant }}'
      name: '{{ $labels.name }}'
    annotations:
      summary: Custom recipe [{{ $labels.name }}] is silent for {{ $labels.tenant }}
      summary_zh: '{{ $labels.tenant }} 的自訂告警 [{{ $labels.name }}] 處於靜默模式'
      description: The recipe is still evaluated and visible as an ALERTS series (dashboard-only); its notifications are suppressed via inhibit, not deleted.
      description_zh: 此自訂告警仍會評估並可於監控面板（ALERTS series）查看，通知經 inhibit 抑制而非刪除。
  - alert: Custom_threshold__canary_pipeline_heartbeat__gt__w5m__for1m
    expr: |-
      (
        custom:threshold__canary_pipeline_heartbeat__gt__w5m__for1m:warning:core
        * on(tenant) group_left(runbook_url, owner, tier)
          tenant_metadata_info
      )
      or
      (
        custom:threshold__canary_pipeline_heartbeat__gt__w5m__for1m:warning:core
        unless on(tenant) tenant_metadata_info
      )
    for: 1m
    labels:
      severity: warning
      tenant: '{{ $labels.tenant }}'
      recipe: threshold
      component: custom
      mode: '{{ $labels.mode }}'
    annotations:
      summary: Custom alert [{{ $labels.name }}] for {{ $labels.tenant }}
      summary_zh: '{{ $labels.tenant }} 的自訂告警 [{{ $labels.name }}] 觸發'
      description: 'threshold on canary_pipeline_heartbeat: value {{ $value | printf "%.2f" }} crossed the configured threshold'
      description_zh: 'canary_pipeline_heartbeat 的 threshold: 值 {{ $value | printf "%.2f" }} 已越過設定閾值'
      runbook_url: '{{ $labels.runbook_url }}'
      owner: '{{ $labels.owner }}'
      tier: '{{ $labels.tier }}'

# ── HAND-AUTHORED platform dead-man's-switch (NOT compiler output) ──────────
# Watches the canary's CORE RECORDING RULE, not ALERTS{...}: (a) absent(ALERTS)
# leaks the matcher labels (alertstate="firing" + a nested alertname) onto the
# meta-alert, and a tenant-wide ALERTS matcher would also be satisfied by the
# CustomRecipeSilent sentinel (which fires off user_threshold alone) — masking a
# heartbeat-scrape break; (b) the core record is reliably materialised and absent
# exactly when ANY realistic silent-death mode hits — exporter stops emitting
# user_threshold, the heartbeat scrape gaps, or the compiler drifts the rule away.
- name: custom-alerts-pipeline-canary-meta
  rules:
  - alert: CustomAlertPipelineCanaryDown
    expr: absent(custom:threshold__canary_pipeline_heartbeat__gt__w5m__for1m:warning:core{tenant="platform-canary"})
    for: 5m
    labels:
      severity: critical
      component: platform-canary
    annotations:
      summary: "Custom-alert COMPILE PIPELINE canary is DOWN — the exporter -> compiler -> Prometheus -> route chain may be silently broken; tenant custom alerts may be failing to fire."
      summary_zh: "自訂告警編譯管線 canary 已停止 — exporter -> 編譯器 -> Prometheus -> 路由 鏈可能已靜默損壞；租戶自訂告警可能正在無聲失效。"
      description: "The always-firing platform-canary custom alert is no longer firing. Investigate the custom-alert pipeline end-to-end: threshold-exporter user_threshold emission, compile_custom_alerts drift, Prometheus rule load, scrape health."
      description_zh: "常駐必觸發的 platform-canary 自訂告警已不再觸發。請端到端檢查自訂告警管線：threshold-exporter 的 user_threshold 發送、compile_custom_alerts 漂移、Prometheus 規則載入、scrape 健康度。"
      runbook_url: "https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/design/runtime-canary.md"
