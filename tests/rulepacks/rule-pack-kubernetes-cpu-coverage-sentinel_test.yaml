# promtool unit test — #944: ContainerCpuSignalAbsent sentinel.
# Run: promtool test rules tests/rulepacks/rule-pack-kubernetes-cpu-coverage-sentinel_test.yaml
#
# Fires per-tenant ONLY when a tenant's db pods are running BUT BestEffort for CPU
# (NEITHER kube_pod_container_resource_limits NOR _requests for cpu) → the % rule
# tenant:container_cpu_percent divides by the limit, so it's empty and PodContainerHighCPU
# is blind for them (#944 saturation↔utilisation decoupling). NOT the opinionated "always
# set a limit" page: it fires ONLY for the BestEffort case (rare; a request is normally
# set), tenant-level (ANY bound on ANY container = covered → anti-flood, mirrors
# CustomRecipeDiskInert). Maintenance opt-out + PER-TENANT isolation (`unless on(tenant)`).
# `for: 15m` → eval at 16m. tenant=db-* (must match the namespace=~"db-.+" keep).
#   A) BESTEFFORT  → fires (db-a): running pod, NO cpu limit AND NO request. [full annotations]
#   B) HAS REQUEST → silent: running pod + cpu request present (request → future measurement).
#   C) HAS LIMIT   → silent: running pod + cpu limit present (→ PodContainerHighCPU covers it).
#   D) MULTI-TENANT→ ONLY db-b fires: db-a covered (request) + db-b BestEffort (no masking).
#   E) NO-PODS     → silent: no Running pod (the running-phase leg guards startup/scale-zero).
#   F) MAINTENANCE → silent: BestEffort but tenant in maintenance mode.
#   G) NON-DB SCOPE→ silent: shop-a (non-db namespace) suppressed by db-.+ scope.
#   H) PARTIAL     → silent (db-a): 2 pods, one BestEffort + one with a request → tenant-level
#                    ANY-bound=covered (documents the deliberate anti-flood granularity).
rule_files:
  - ../../rule-packs/rule-pack-kubernetes.yaml

evaluation_interval: 15s

tests:
  # ── A) BESTEFFORT: running pod, no cpu limit AND no request → FIRE ──
  - interval: 15s
    input_series:
      - series: 'kube_pod_status_phase{namespace="db-a", pod="mysql-0", phase="Running"}'
        values: '1x80'
      # NO kube_pod_container_resource_{limits,requests}{resource="cpu"} for db-a → BestEffort.
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts:
          - exp_labels:
              severity: warning
              tenant: db-a
            exp_annotations:
              summary: "DB pods run with no CPU request/limit on db-a — CPU% monitoring blind"
              summary_zh: "db-a 的 DB pod 未設 CPU request/limit — CPU% 監控盲區"
              platform_summary: "[SRE] db-a: db pods are BestEffort for CPU (no limit AND no request) → tenant:container_cpu_percent can't be computed and PodContainerHighCPU is blind for them. Running-thread saturation (MariaDBHighThreadsRunning) still covers query concurrency, but a heavy query pinning a core (low threads_running, high CPU) is invisible. Fix: set a CPU LIMIT — PodContainerHighCPU divides by the limit, so a request alone restores QoS and silences this sentinel but does NOT enable CPU% yet. Native limitless-pod CPU% measurement is tracked in the #944 key-PR."
              platform_summary_zh: "[SRE] db-a: db pod 為 CPU BestEffort（無 limit 也無 request）→ tenant:container_cpu_percent 算不出、PodContainerHighCPU 對其盲。執行緒飽和（MariaDBHighThreadsRunning）仍涵蓋查詢並發，但單一重查詢釘核（低 threads_running、高 CPU）不可見。修法：設 CPU LIMIT — PodContainerHighCPU 除以 limit，故只設 request 可恢復 QoS、靜默此哨兵，但今天仍無法啟用 CPU%。limitless pod 原生 CPU% 量測見 #944 key-PR。"
              description: "Your DB pods have no CPU limit or request set (BestEffort), so the platform cannot compute their CPU utilisation — the CPU% alert (PodContainerHighCPU) can never fire for them. Saturation alerting (running threads) still works. Set a CPU LIMIT to enable CPU% monitoring (PodContainerHighCPU measures usage as a % of the limit); a CPU request alone restores scheduling QoS but does not enable CPU% yet (limitless-pod CPU% is a follow-up)."
              description_zh: "您的 DB pod 未設定 CPU limit 或 request（BestEffort），平台無法計算其 CPU 使用率 — CPU% 告警（PodContainerHighCPU）對其永不觸發。飽和告警（執行緒數）仍有效。設 CPU LIMIT 才能啟用 CPU% 監控（PodContainerHighCPU 量的是 % of limit）；只設 CPU request 可恢復排程 QoS 但尚無法啟用 CPU%（limitless pod CPU% 為後續項目）。"
              runbook_url: "https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/integration/byo-prometheus-integration.md"

  # ── B) HAS REQUEST: running pod + cpu request present → SILENT ──
  - interval: 15s
    input_series:
      - series: 'kube_pod_status_phase{namespace="db-a", pod="mysql-0", phase="Running"}'
        values: '1x80'
      - series: 'kube_pod_container_resource_requests{namespace="db-a", pod="mysql-0", container="mysqld", resource="cpu"}'
        values: '0.5x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts: []

  # ── C) HAS LIMIT: running pod + cpu limit present → SILENT (PodContainerHighCPU covers it) ──
  - interval: 15s
    input_series:
      - series: 'kube_pod_status_phase{namespace="db-a", pod="mysql-0", phase="Running"}'
        values: '1x80'
      - series: 'kube_pod_container_resource_limits{namespace="db-a", pod="mysql-0", container="mysqld", resource="cpu"}'
        values: '2x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts: []

  # ── D) MULTI-TENANT (masking regression): db-a covered (request) + db-b BestEffort → ONLY db-b ──
  - interval: 15s
    input_series:
      # db-a: running + request → covered. A global count would mask db-b; per-tenant isolates.
      - series: 'kube_pod_status_phase{namespace="db-a", pod="mysql-0", phase="Running"}'
        values: '1x80'
      - series: 'kube_pod_container_resource_requests{namespace="db-a", pod="mysql-0", container="mysqld", resource="cpu"}'
        values: '0.5x80'
      # db-b: running + BestEffort → fires.
      - series: 'kube_pod_status_phase{namespace="db-b", pod="mysql-0", phase="Running"}'
        values: '1x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts:
          - exp_labels:
              severity: warning
              tenant: db-b
            exp_annotations:
              summary: "DB pods run with no CPU request/limit on db-b — CPU% monitoring blind"
              summary_zh: "db-b 的 DB pod 未設 CPU request/limit — CPU% 監控盲區"
              platform_summary: "[SRE] db-b: db pods are BestEffort for CPU (no limit AND no request) → tenant:container_cpu_percent can't be computed and PodContainerHighCPU is blind for them. Running-thread saturation (MariaDBHighThreadsRunning) still covers query concurrency, but a heavy query pinning a core (low threads_running, high CPU) is invisible. Fix: set a CPU LIMIT — PodContainerHighCPU divides by the limit, so a request alone restores QoS and silences this sentinel but does NOT enable CPU% yet. Native limitless-pod CPU% measurement is tracked in the #944 key-PR."
              platform_summary_zh: "[SRE] db-b: db pod 為 CPU BestEffort（無 limit 也無 request）→ tenant:container_cpu_percent 算不出、PodContainerHighCPU 對其盲。執行緒飽和（MariaDBHighThreadsRunning）仍涵蓋查詢並發，但單一重查詢釘核（低 threads_running、高 CPU）不可見。修法：設 CPU LIMIT — PodContainerHighCPU 除以 limit，故只設 request 可恢復 QoS、靜默此哨兵，但今天仍無法啟用 CPU%。limitless pod 原生 CPU% 量測見 #944 key-PR。"
              description: "Your DB pods have no CPU limit or request set (BestEffort), so the platform cannot compute their CPU utilisation — the CPU% alert (PodContainerHighCPU) can never fire for them. Saturation alerting (running threads) still works. Set a CPU LIMIT to enable CPU% monitoring (PodContainerHighCPU measures usage as a % of the limit); a CPU request alone restores scheduling QoS but does not enable CPU% yet (limitless-pod CPU% is a follow-up)."
              description_zh: "您的 DB pod 未設定 CPU limit 或 request（BestEffort），平台無法計算其 CPU 使用率 — CPU% 告警（PodContainerHighCPU）對其永不觸發。飽和告警（執行緒數）仍有效。設 CPU LIMIT 才能啟用 CPU% 監控（PodContainerHighCPU 量的是 % of limit）；只設 CPU request 可恢復排程 QoS 但尚無法啟用 CPU%（limitless pod CPU% 為後續項目）。"
              runbook_url: "https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/integration/byo-prometheus-integration.md"

  # ── E) NO-PODS: nothing Running → SILENT (running-phase leg guards) ──
  - interval: 15s
    input_series:
      - series: 'kube_pod_status_phase{namespace="db-a", pod="mysql-0", phase="Pending"}'
        values: '1x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts: []

  # ── F) MAINTENANCE: BestEffort but tenant in maintenance → SILENT (opt-out) ──
  - interval: 15s
    input_series:
      - series: 'kube_pod_status_phase{namespace="db-a", pod="mysql-0", phase="Running"}'
        values: '1x80'
      - series: 'user_state_filter{tenant="db-a", filter="maintenance"}'
        values: '1x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts: []

  # ── G) NON-DB SCOPE: shop-a (non-db namespace) BestEffort → SILENT (db-.+ scope) ──
  - interval: 15s
    input_series:
      - series: 'kube_pod_status_phase{namespace="shop-a", pod="web-0", phase="Running"}'
        values: '1x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts: []

  # ── H) PARTIAL (tenant-level anti-flood): db-a has one BestEffort pod + one with a request ──
  # → tenant-level ANY-bound=covered → SILENT. Documents the deliberate granularity choice
  # (mirrors CustomRecipeDiskInert "some coverage = covered" — avoids SRE flood). A future
  # per-container variant would flip this to firing; locking the decision here.
  - interval: 15s
    input_series:
      - series: 'kube_pod_status_phase{namespace="db-a", pod="mysql-0", phase="Running"}'
        values: '1x80'
      - series: 'kube_pod_status_phase{namespace="db-a", pod="sidecar-0", phase="Running"}'
        values: '1x80'
      # only sidecar-0 has a request; mysql-0 is BestEffort — tenant still counts as covered.
      - series: 'kube_pod_container_resource_requests{namespace="db-a", pod="sidecar-0", container="agent", resource="cpu"}'
        values: '0.1x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: ContainerCpuSignalAbsent
        exp_alerts: []
