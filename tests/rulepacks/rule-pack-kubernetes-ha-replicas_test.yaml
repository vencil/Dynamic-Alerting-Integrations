              tier: bronze

  # ── Deployment leg maintenance opt-out (only the StatefulSet leg was tested in
  #    maintenance-suppresses): a degraded HA Deployment in maintenance → suppressed. ──
  - interval: 15s
    name: deployment-maintenance-suppressed
    input_series:
      - series: 'kube_deployment_spec_replicas{namespace="db-b", deployment="mongo"}'
        values: '3x80'
      - series: 'kube_deployment_status_replicas_available{namespace="db-b", deployment="mongo"}'
        values: '2x80'
      - series: 'kube_deployment_status_replicas_updated{namespace="db-b", deployment="mongo"}'
        values: '3x80'
      - series: 'user_state_filter{tenant="db-b", filter="maintenance"}'
        values: '1x80'
    alert_rule_test:
      - eval_time: 16m
        alertname: TenantHAReplicasDegraded
        exp_alerts: []
