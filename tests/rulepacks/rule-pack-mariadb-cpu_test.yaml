# promtool unit test — mariadb running-thread SATURATION severity tiers.
# Run: promtool test rules tests/rulepacks/rule-pack-mariadb-cpu_test.yaml
#
# Semantic oracle for the standalone MariaDBHighThreadsRunning (warning) +
# MariaDBHighThreadsRunningCritical (critical) alerts — RENAMED from the misnamed
# MariaDBHighCPU/Critical in #944 (they always measured threads_running, never host
# CPU%; "CPU" was a v1.0 demo-scaffold misnomer). They consume the
# `tenant:alert_threshold:mysql_cpu` / `:mysql_cpu_critical` recording rules (the
# threshold KEY stays `mysql_cpu` this release — routing/config stability — and
# renames in the #944 key-PR). Covers, per severity:
#   - db-a: metadata present              → fires ENRICHED (branch A).
#   - db-b: NO metadata (onboarding vacuum) → STILL fires BARE (branch B).
#   - db-c: over threshold but maintenance  → suppressed.
#   - db-d: below threshold                → no alert.
# The observed series is tenant:mysql_threads_running:avg1m =
#   max by(tenant)(avg_over_time(mysql_global_status_threads_running[1m])). The leaf
# mysql_global_status_threads_running is a GAUGE (concurrent threads executing — a
# USE-method SATURATION proxy, NOT host CPU%; for true CPU UTILISATION see
# PodContainerHighCPU in rule-pack-kubernetes), 1m-SMOOTHED before thresholding to kill
# the spiky-gauge `for` reset-trap (see the 3rd test block). A stable 82 ⇒ avg = 82,
# which the %.0f-formatted annotation renders as "82" with a "(1m avg)" qualifier.
rule_files:
  - ../../rule-packs/rule-pack-mariadb.yaml

evaluation_interval: 15s

tests:
  # ── Warning tier: MariaDBHighThreadsRunning (threshold cpu=50, smoothed gauge 82 > 50) ──
  - interval: 15s
    input_series:
      # db-a: 82 running threads > 50 warning, metadata present → enriched fire.
      - series: 'mysql_global_status_threads_running{tenant="db-a"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-a", component="mysql", metric="cpu", severity="warning"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-a", runbook_url="http://rb/a", owner="team-a", tier="gold"}'
        values: '1x40'
      # db-b: 82 > 50, NO tenant_metadata_info → VACUUM-FIRE (branch B).
      - series: 'mysql_global_status_threads_running{tenant="db-b"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-b", component="mysql", metric="cpu", severity="warning"}'
        values: '50x40'
      # db-c: 82 > 50, metadata present, BUT maintenance active → suppressed.
      - series: 'mysql_global_status_threads_running{tenant="db-c"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-c", component="mysql", metric="cpu", severity="warning"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-c", runbook_url="http://rb/c", owner="team-c", tier="silver"}'
        values: '1x40'
      - series: 'user_state_filter{tenant="db-c", filter="maintenance"}'
        values: '1x40'
      # db-d: 82 < 100 warning threshold → no fire.
      - series: 'mysql_global_status_threads_running{tenant="db-d"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-d", component="mysql", metric="cpu", severity="warning"}'
        values: '100x40'

    alert_rule_test:
      - eval_time: 6m
        alertname: MariaDBHighThreadsRunning
        exp_alerts:
          # db-a: enriched (branch A) — carries runbook_url/owner/tier.
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-a
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
            exp_annotations:
              summary: "High running-thread saturation on db-a"
              summary_zh: "db-a 執行緒飽和過高"
              platform_summary: "[gold] db-a: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[gold] db-a：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, warning threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
          # db-b: VACUUM-FIRE (branch B) — fires WITHOUT enrichment labels.
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-b
            exp_annotations:
              summary: "High running-thread saturation on db-b"
              summary_zh: "db-b 執行緒飽和過高"
              platform_summary: "[] db-b: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[] db-b：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, warning threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: ""
              owner: ""
              tier: ""
        # db-c (maintenance) and db-d (below threshold) produce NO MariaDBHighThreadsRunning alert.

  # ── Critical tier: MariaDBHighThreadsRunningCritical (consumes the orphan cpu_critical) ──
  - interval: 15s
    input_series:
      # db-a: 82 > 50 critical, metadata present → enriched critical fire.
      - series: 'mysql_global_status_threads_running{tenant="db-a"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-a", component="mysql", metric="cpu", severity="critical"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-a", runbook_url="http://rb/a", owner="team-a", tier="gold"}'
        values: '1x40'
      # db-b: 82 > 50, NO tenant_metadata_info → VACUUM-FIRE (branch B).
      - series: 'mysql_global_status_threads_running{tenant="db-b"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-b", component="mysql", metric="cpu", severity="critical"}'
        values: '50x40'
      # db-c: 82 > 50, metadata present, BUT maintenance active → suppressed.
      - series: 'mysql_global_status_threads_running{tenant="db-c"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-c", component="mysql", metric="cpu", severity="critical"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-c", runbook_url="http://rb/c", owner="team-c", tier="silver"}'
        values: '1x40'
      - series: 'user_state_filter{tenant="db-c", filter="maintenance"}'
        values: '1x40'
      # db-d: 82 < 100 critical threshold → no critical fire.
      - series: 'mysql_global_status_threads_running{tenant="db-d"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-d", component="mysql", metric="cpu", severity="critical"}'
        values: '100x40'

    alert_rule_test:
      - eval_time: 6m
        alertname: MariaDBHighThreadsRunningCritical
        exp_alerts:
          # db-a: enriched (branch A) — carries runbook_url/owner/tier.
          - exp_labels:
              severity: critical
              metric_group: cpu
              tenant: db-a
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
            exp_annotations:
              summary: "Critical running-thread saturation on db-a"
              summary_zh: "db-a 執行緒飽和嚴重過高"
              platform_summary: "[gold] db-a: CRITICAL running-thread saturation (threads_running, NOT host CPU%) — immediate investigation (lock waits / runaway queries). True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[gold] db-a：執行緒飽和達臨界（threads_running，非主機 CPU%）— 需立即調查（鎖等待 / 失控查詢）。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, critical threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過嚴重閾值）"
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
          # db-b: VACUUM-FIRE (branch B) — fires WITHOUT enrichment labels.
          - exp_labels:
              severity: critical
              metric_group: cpu
              tenant: db-b
            exp_annotations:
              summary: "Critical running-thread saturation on db-b"
              summary_zh: "db-b 執行緒飽和嚴重過高"
              platform_summary: "[] db-b: CRITICAL running-thread saturation (threads_running, NOT host CPU%) — immediate investigation (lock waits / runaway queries). True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[] db-b：執行緒飽和達臨界（threads_running，非主機 CPU%）— 需立即調查（鎖等待 / 失控查詢）。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, critical threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過嚴重閾值）"
              runbook_url: ""
              owner: ""
              tier: ""
        # db-c (maintenance) and db-d (below threshold) produce NO MariaDBHighThreadsRunningCritical alert.

  # ── Smoothing regression (#943 / Gemini reset-trap review): rule reads the 1m AVG, not raw ──
  # At eval the INSTANTANEOUS gauge has dipped to 40 (BELOW the 80 threshold) but the 1m
  # AVERAGE is 100 (ABOVE) → MariaDBHighThreadsRunning FIRES. A pre-fix
  # `max by(tenant)(threads_running)` raw rule reads 40 and stays silent (and on genuinely
  # oscillating load its `for:` timer keeps resetting → deadlock-only) — that revert is
  # exactly what this guards.
  # ⚠ The leading 100 sample (= avg of the trailing 120,120,120,40) pins the 1m avg to 100
  # whether promtool's [1m] window is left-OPEN (4 samples, prom 3.x) or left-CLOSED (5
  # samples, 2.53.2) → the asserted value is VERSION-STABLE. (An oscillating window is NOT:
  # the same 120/120/120/60 input rendered 108 on 2.53.2 but 105 on CI's 3.x → flaky red.)
  - interval: 15s
    input_series:
      # idx 0..19 sustained 120 | 20 = 100 (boundary-stabiliser) | 21..23 = 120 | 24 = 40 (eval dip) | 25..27 = 120
      - series: 'mysql_global_status_threads_running{tenant="db-osc"}'
        values: '120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 100 120 120 120 40 120 120 120'
      - series: 'user_threshold{tenant="db-osc", component="mysql", metric="cpu", severity="warning"}'
        values: '80x27'
    alert_rule_test:
      - eval_time: 6m
        alertname: MariaDBHighThreadsRunning
        exp_alerts:
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-osc
            exp_annotations:
              summary: "High running-thread saturation on db-osc"
              summary_zh: "db-osc 執行緒飽和過高"
              platform_summary: "[] db-osc: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[] db-osc：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "100 running threads (1m avg, warning threshold exceeded)"
              description_zh: "100 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: ""
              owner: ""
              tier: ""
