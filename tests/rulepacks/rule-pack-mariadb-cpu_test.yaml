# promtool unit test — mariadb running-thread SATURATION severity tiers.
# Run: promtool test rules tests/rulepacks/rule-pack-mariadb-cpu_test.yaml
#
# Semantic oracle for the standalone MariaDBHighThreadsRunning (warning) +
# MariaDBHighThreadsRunningCritical (critical) alerts — RENAMED from the misnamed
# MariaDBHighCPU/Critical in #944 (they always measured threads_running, never host
# CPU%; "CPU" was a v1.0 demo-scaffold misnomer). They consume the
# `tenant:alert_threshold:mysql_cpu` / `:mysql_cpu_critical` recording rules (the
# threshold KEY stays `mysql_cpu` — config-contract stability; the metric + alert
# are correctly named, #944 closed on that basis). Covers, per severity:
#   - db-a: metadata present              → fires ENRICHED (branch A).
#   - db-b: NO metadata (onboarding vacuum) → STILL fires BARE (branch B).
#   - db-c: over threshold but maintenance  → suppressed.
#   - db-d: below threshold                → no alert.
#   - db-e: maintenance + NO metadata     → suppressed by the BARE arm's OWN
#     maintenance clause (#973-review hole: each arm hand-copies the clause, and
#     db-c gives the bare copy ZERO mutation coverage — delete that copy and
#     db-c is still excluded by the bare arm's `unless tenant_metadata_info` —
#     so deleting/typo-ing it stayed green until this tenant gave it teeth).
# The observed series is tenant:mysql_threads_running:avg1m =
#   max by(tenant)(avg_over_time(mysql_global_status_threads_running[1m])). The leaf
# mysql_global_status_threads_running is a GAUGE (concurrent threads executing — a
# USE-method SATURATION proxy, NOT host CPU%; for true CPU UTILISATION see
# PodContainerHighCPU in rule-pack-kubernetes), 1m-SMOOTHED before thresholding to kill
# the spiky-gauge `for` reset-trap (see the 3rd test block). A stable 82 ⇒ avg = 82,
# which the %.0f-formatted annotation renders as "82" with a "(1m avg)" qualifier.
rule_files:
  - ../../rule-packs/rule-pack-mariadb.yaml

evaluation_interval: 15s

tests:
  # ── Warning tier: MariaDBHighThreadsRunning (threshold cpu=50, smoothed gauge 82 > 50) ──
  - interval: 15s
    input_series:
      # db-a: 82 running threads > 50 warning, metadata present → enriched fire.
      - series: 'mysql_global_status_threads_running{tenant="db-a"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-a", component="mysql", metric="cpu", severity="warning"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-a", runbook_url="http://rb/a", owner="team-a", tier="gold"}'
        values: '1x40'
      # db-b: 82 > 50, NO tenant_metadata_info → VACUUM-FIRE (branch B).
      - series: 'mysql_global_status_threads_running{tenant="db-b"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-b", component="mysql", metric="cpu", severity="warning"}'
        values: '50x40'
      # db-c: 82 > 50, metadata present, BUT maintenance active → suppressed.
      - series: 'mysql_global_status_threads_running{tenant="db-c"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-c", component="mysql", metric="cpu", severity="warning"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-c", runbook_url="http://rb/c", owner="team-c", tier="silver"}'
        values: '1x40'
      - series: 'user_state_filter{tenant="db-c", filter="maintenance"}'
        values: '1x40'
      # db-d: 82 < 100 warning threshold → no fire.
      - series: 'mysql_global_status_threads_running{tenant="db-d"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-d", component="mysql", metric="cpu", severity="warning"}'
        values: '100x40'
      # db-e: 82 > 50, maintenance active, NO tenant_metadata_info → suppressed
      # by the BARE arm's own maintenance clause (the only tenant whose suppression depends on it).
      # WAVEFORM (Gemini #977 v2): maintenance ON through 6m15s, then the flag is pushed
      # as VALUE 0 (not absent) from 6m30s — the release path for the whole two-arm
      # class, pinned ONCE here (other fixtures keep a static flag; duplicating the
      # transition per fixture is test bloat). The 0-value release deliberately pins the
      # `== 1` VALUE contract: a bare presence-based `unless user_state_filter{...}`
      # (dropped `== 1`) would keep suppressing on the 0-valued series forever
      # (silent-FN trap) → the 8m firing assertion below turns red.
      - series: 'mysql_global_status_threads_running{tenant="db-e"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-e", component="mysql", metric="cpu", severity="warning"}'
        values: '50x40'
      - series: 'user_state_filter{tenant="db-e", filter="maintenance"}'
        values: '1x25 0x15'

    alert_rule_test:
      - eval_time: 6m
        alertname: MariaDBHighThreadsRunning
        exp_alerts:
          # db-a: enriched (branch A) — carries runbook_url/owner/tier.
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-a
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
            exp_annotations:
              summary: "High running-thread saturation on db-a"
              summary_zh: "db-a 執行緒飽和過高"
              platform_summary: "[gold] db-a: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[gold] db-a：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, warning threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
          # db-b: VACUUM-FIRE (branch B) — fires WITHOUT enrichment labels.
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-b
            exp_annotations:
              summary: "High running-thread saturation on db-b"
              summary_zh: "db-b 執行緒飽和過高"
              platform_summary: "[] db-b: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[] db-b：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, warning threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: ""
              owner: ""
              tier: ""
        # db-c (maintenance, enriched arm), db-d (below threshold) and db-e (maintenance
        # STILL ON at 6m, BARE arm — no metadata) produce NO MariaDBHighThreadsRunning alert.

      # Maintenance-window RELEASE (state transition): db-e's flag goes to 0 at ~6m30s →
      # the `== 1` filter drops the series → unless stops suppressing → for: 30s → db-e
      # fires BARE by 7m15s. Asserting at 8m proves (a) suppression actually RELEASES
      # (a broken lookback/offset that never un-suppresses fails here) and (b) the
      # 0-value semantics of the `== 1` contract (see the input-series note).
      - eval_time: 8m
        alertname: MariaDBHighThreadsRunning
        exp_alerts:
          # db-a: still firing enriched (unchanged steady breach).
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-a
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
            exp_annotations:
              summary: "High running-thread saturation on db-a"
              summary_zh: "db-a 執行緒飽和過高"
              platform_summary: "[gold] db-a: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[gold] db-a：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, warning threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
          # db-b: still firing bare (unchanged).
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-b
            exp_annotations:
              summary: "High running-thread saturation on db-b"
              summary_zh: "db-b 執行緒飽和過高"
              platform_summary: "[] db-b: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[] db-b：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, warning threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: ""
              owner: ""
              tier: ""
          # db-e: maintenance RELEASED → fires BARE (branch B) — the release-path pin.
          - exp_labels:
              severity: warning
              metric_group: cpu
              tenant: db-e
            exp_annotations:
              summary: "High running-thread saturation on db-e"
              summary_zh: "db-e 執行緒飽和過高"
              platform_summary: "[] db-e: running-thread saturation (threads_running, NOT host CPU%) breached — check lock waits / slow queries / IO stalls. True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[] db-e：執行緒飽和（threads_running，非主機 CPU%）超出 — 檢查鎖等待 / 慢查詢 / IO 停滯。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, warning threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過警告閾值）"
              runbook_url: ""
              owner: ""
              tier: ""
        # db-c stays suppressed (flag still 1); db-d stays below threshold.

  # ── Critical tier: MariaDBHighThreadsRunningCritical (consumes the orphan cpu_critical) ──
  - interval: 15s
    input_series:
      # db-a: 82 > 50 critical, metadata present → enriched critical fire.
      - series: 'mysql_global_status_threads_running{tenant="db-a"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-a", component="mysql", metric="cpu", severity="critical"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-a", runbook_url="http://rb/a", owner="team-a", tier="gold"}'
        values: '1x40'
      # db-b: 82 > 50, NO tenant_metadata_info → VACUUM-FIRE (branch B).
      - series: 'mysql_global_status_threads_running{tenant="db-b"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-b", component="mysql", metric="cpu", severity="critical"}'
        values: '50x40'
      # db-c: 82 > 50, metadata present, BUT maintenance active → suppressed.
      - series: 'mysql_global_status_threads_running{tenant="db-c"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-c", component="mysql", metric="cpu", severity="critical"}'
        values: '50x40'
      - series: 'tenant_metadata_info{tenant="db-c", runbook_url="http://rb/c", owner="team-c", tier="silver"}'
        values: '1x40'
      - series: 'user_state_filter{tenant="db-c", filter="maintenance"}'
        values: '1x40'
      # db-d: 82 < 100 critical threshold → no critical fire.
      - series: 'mysql_global_status_threads_running{tenant="db-d"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-d", component="mysql", metric="cpu", severity="critical"}'
        values: '100x40'
      # db-e: 82 > 50, maintenance active, NO tenant_metadata_info → suppressed
      # by the BARE arm's own maintenance clause (the only tenant whose suppression depends on it).
      # Static flag here — the maintenance-window RELEASE waveform (and the `== 1`
      # 0-value contract) is pinned ONCE for the whole two-arm class in the warning
      # block above; duplicating the transition per block is test bloat.
      - series: 'mysql_global_status_threads_running{tenant="db-e"}'
        values: '82x40'
      - series: 'user_threshold{tenant="db-e", component="mysql", metric="cpu", severity="critical"}'
        values: '50x40'
      - series: 'user_state_filter{tenant="db-e", filter="maintenance"}'
        values: '1x40'

    alert_rule_test:
      - eval_time: 6m
        alertname: MariaDBHighThreadsRunningCritical
        exp_alerts:
          # db-a: enriched (branch A) — carries runbook_url/owner/tier.
          - exp_labels:
              severity: critical
              metric_group: cpu
              tenant: db-a
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
            exp_annotations:
              summary: "Critical running-thread saturation on db-a"
              summary_zh: "db-a 執行緒飽和嚴重過高"
              platform_summary: "[gold] db-a: CRITICAL running-thread saturation (threads_running, NOT host CPU%) — immediate investigation (lock waits / runaway queries). True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[gold] db-a：執行緒飽和達臨界（threads_running，非主機 CPU%）— 需立即調查（鎖等待 / 失控查詢）。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, critical threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過嚴重閾值）"
              runbook_url: "http://rb/a"
              owner: team-a
              tier: gold
          # db-b: VACUUM-FIRE (branch B) — fires WITHOUT enrichment labels.
          - exp_labels:
              severity: critical
              metric_group: cpu
              tenant: db-b
            exp_annotations:
              summary: "Critical running-thread saturation on db-b"
              summary_zh: "db-b 執行緒飽和嚴重過高"
              platform_summary: "[] db-b: CRITICAL running-thread saturation (threads_running, NOT host CPU%) — immediate investigation (lock waits / runaway queries). True CPU% → PodContainerHighCPU."
              platform_summary_zh: "[] db-b：執行緒飽和達臨界（threads_running，非主機 CPU%）— 需立即調查（鎖等待 / 失控查詢）。真 CPU% 見 PodContainerHighCPU。"
              description: "82 running threads (1m avg, critical threshold exceeded)"
              description_zh: "82 個執行中執行緒（1m 平均，超過嚴重閾值）"
              runbook_url: ""
              owner: ""
              tier: ""
        # db-c (maintenance, enriched arm), db-d (below threshold) and db-e (maintenance,
        # BARE arm — no metadata) produce NO MariaDBHighThreadsRunningCritical alert.

  # ── Smoothing regression (#943 / Gemini reset-trap review): rule fires off the 1m AVG, not raw ──
  # Contract: at the 6m eval the INSTANTANEOUS gauge has dipped to 40 (BELOW the 80 threshold),
  # yet MariaDBHighThreadsRunning still FIRES — because the rule thresholds the 1m-SMOOTHED recording
  # rule tenant:mysql_threads_running:avg1m (= avg_over_time(...[1m])), not the raw gauge. A pre-fix
  # `max by(tenant)(threads_running)` raw rule reads 40 and stays silent (and on oscillating load
  # its `for:` timer keeps resetting → never fires) — that revert is exactly what this guards.
  #
  # ⚠ DETERMINISM (#943 flake fix, #949): assert the threshold-CROSSING (`> bool 80`), NOT the exact avg.
  # promtool evaluates the recording group (mariadb-normalization) and the consuming query in a
  # nondeterministic order within the eval tick, so a read of avg1m resolves to EITHER the eval
  # tick (t=360 → 100) or the previous tick (t=345 → 116 on 2.53.2 / 115 on CI's 3.x). All exceed
  # 80, so `> bool 80` is a stable 1, but an exact value (the old alert_rule_test's
  # `description: "100 …"`) is a coin-flip → flaky red. (A deterministic exact value is impossible
  # while a raw dip sits on the eval sample.) db-a/db-b above pin the exact rendered alert value.
  - interval: 15s
    input_series:
      # idx 0..19 sustained 120 | 20 = 100 | 21..23 = 120 | 24 = 40 (the 6m eval dip) | 25..27 = 120
      - series: 'mysql_global_status_threads_running{tenant="db-osc"}'
        values: '120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 120 100 120 120 120 40 120 120 120'
      - series: 'user_threshold{tenant="db-osc", component="mysql", metric="cpu", severity="warning"}'
        values: '80x27'
    promql_expr_test:
      # (1) raw instantaneous gauge at eval IS the dip — 40, below the 80 threshold.
      - expr: 'mysql_global_status_threads_running{tenant="db-osc"}'
        eval_time: 6m
        exp_samples:
          - labels: 'mysql_global_status_threads_running{tenant="db-osc"}'
            value: 40
      # (2) the 1m-smoothed recording rule still clears the threshold — value-agnostic: 100/116/115
      #     all > 80 ⇒ `> bool 80` is deterministically 1; a raw-gauge revert would read 40 ⇒ 0.
      - expr: 'tenant:mysql_threads_running:avg1m{tenant="db-osc"} > bool 80'
        eval_time: 6m
        exp_samples:
          - labels: '{tenant="db-osc"}'
            value: 1
      # (3) …and MariaDBHighThreadsRunning actually FIRES end-to-end for db-osc (so a rule rewired to
      #     read the RAW gauge, not just the recording rule, still fails here). `count()` keeps it both
      #     deterministic (1 regardless of which tick's avg the alert reads) AND backend-portable:
      #     it collapses the promtool↔vmalert ALERTS label-set difference (vmalert adds
      #     `alertgroup`, even with --disableAlertgroupLabel). Raw-gauge revert → silent → count≠1.
      - expr: 'count(ALERTS{alertname="MariaDBHighThreadsRunning", tenant="db-osc", alertstate="firing"})'
        eval_time: 6m
        exp_samples:
          - labels: '{}'
            value: 1
