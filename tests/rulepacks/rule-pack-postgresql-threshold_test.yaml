# promtool unit test — #731 exporter↔rule-pack metric-label contract (postgresql).
# Proves the threshold recording rules resolve under the REAL exporter shape
# `user_threshold{component="pg", metric="connections"}` (was querying the full
# `metric="pg_connections"` → empty → silent before #731). `connections` collides
# across pg/nginx/rabbitmq/mysql after stripping — `component="pg"` disambiguates
# (the latent cross-component bug #731 surfaced). Covers warning + `_critical`.
# Run: promtool test rules tests/rulepacks/rule-pack-postgresql-threshold_test.yaml
rule_files:
  - ../../rule-packs/rule-pack-postgresql.yaml

evaluation_interval: 15s

tests:
  - interval: 15s
    input_series:
      - series: 'user_threshold{tenant="t1", component="pg", metric="connections", severity="warning"}'
        values: '80x5'
      - series: 'user_threshold{tenant="t1", component="pg", metric="connections", severity="critical"}'
        values: '120x5'
      # Collision guard: nginx also strips to metric="connections"; component="pg"
      # must isolate the pg recording rule from it.
      - series: 'user_threshold{tenant="t1", component="nginx", metric="connections", severity="warning"}'
        values: '9999x5'
    promql_expr_test:
      - expr: tenant:alert_threshold:pg_connections
        eval_time: 1m
        exp_samples:
          - labels: 'tenant:alert_threshold:pg_connections{tenant="t1"}'
            value: 80
      - expr: tenant:alert_threshold:pg_connections_critical
        eval_time: 1m
        exp_samples:
          - labels: 'tenant:alert_threshold:pg_connections_critical{tenant="t1"}'
            value: 120
