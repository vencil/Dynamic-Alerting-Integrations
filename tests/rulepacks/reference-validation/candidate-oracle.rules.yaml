# Reference candidate rules — Oracle. DIRECT-PREDICATE form of the shipped
# rule-pack-oracle.yaml alerting logic (see candidate-oracle-min.rules.yaml header
# for why: production `max by(tenant)` aggregation strips the harness attribution
# labels; the direct predicate on the raw series preserves them and is fire/no-fire
# identical for single-signature injection). Thresholds are the SHIPPED DEFAULTS
# (_defaults.yaml, documented in the rule-pack header) inlined = a tenant with no
# custom override. `for:` durations are the shipped values.
#
# NOT covered here (deliberate — surfaces as MISS/FN in the report = coverage gaps):
#   - oracledb_activity_parse_count_total  → no shipped alert (exported-but-unalerted probe)
#
# OracleHighSessionUtilization (ratio): the companion oracledb_resource_limit inherits
# the injection identity labels + carries its own resource="sessions" label, so the
# division matches with `ignoring(resource)` and keeps the numerator's attribution labels.
# Threshold 0.85 is HARD-CODED in the shipped rule (not user_threshold).
groups:
  - name: oracle-ref
    interval: 30s
    rules:
      - alert: OracleDatabaseDown
        expr: oracledb_up == 0
        for: 15s
        labels: {severity: critical}
      - alert: OracleHighActiveSessions
        expr: oracledb_sessions_active > 200
        for: 5m
        labels: {severity: warning}
      - alert: OracleTablespaceAlmostFull
        expr: oracledb_tablespace_used_percent > 85
        for: 5m
        labels: {severity: warning}
      - alert: OracleHighWaitTime
        expr: rate(oracledb_wait_time_seconds_total[5m]) > 50
        for: 5m
        labels: {severity: warning}
      - alert: OracleHighProcessCount
        expr: oracledb_process_count > 300
        for: 5m
        labels: {severity: warning}
      - alert: OracleHighPGAUsage
        expr: oracledb_pga_allocated_bytes > 4294967296
        for: 10m
        labels: {severity: warning}
      - alert: OracleHighSessionUtilization
        expr: oracledb_sessions_active / ignoring(resource) oracledb_resource_limit{resource="sessions"} > 0.85
        for: 5m
        labels: {severity: warning}
