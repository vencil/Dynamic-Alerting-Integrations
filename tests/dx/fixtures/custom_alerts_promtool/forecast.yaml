# promtool unit test — Custom Alerts (ADR-024 Capability B, #741), FORECAST recipe.
# Proves the forecast lead-time semantics: a tenant whose disk headroom ratio
# (avail/capacity) is FALLING fires while it still has headroom (current ratio
# > floor), because predict_linear over the platform-derived 8h lookback says it
# will cross the 0.15 floor within the 4h horizon. A stable tenant (flat ratio)
# stays silent — the forecast is the signal, not the current value.
#
# Input series carry realistic K8s scrape labels (namespace / persistentvolumeclaim
# / instance / job). With group_by:[persistentvolumeclaim] the base record is
# `sum by(tenant, persistentvolumeclaim)` — it KEEPS the PVC dimension (so each
# volume is forecast separately) while collapsing namespace/instance/job (#651:
# lab-clean fixtures hide label-topology bugs). 1m evaluation interval keeps the
# 8h-lookback series tractable.
rule_files:
  - rule-pack-custom-alerts.yaml

evaluation_interval: 1m

tests:
  # ── shop-a (per-PVC, ADR-024 §Addendum): TWO PVCs prove group_by isolates each.
  #    data-shop-0:   avail falling -1.2/min, cap flat 1000 → current ratio ~0.18; the
  #      8h slope predicts < 0.15 within 4h → FIRES (lead time, for:30m satisfied).
  #      W1: predict_linear overshoots negative → clamped to 0; current ratio 0.18 is
  #      below the 0.5 sanity band → passes. Surfaced value is 0.00 (was gibberish -0.11).
  #    config-shop-0: large + flat (avail 9000 / cap 10000 = 0.9) → never fires.
  #    MASKING PROOF: WITHOUT group_by, sum(avail)/sum(cap) ≈ 0.89 (the 9000-byte
  #      config volume dwarfs the 800-byte data volume) → never crosses 0.15, so the
  #      about-to-fill data PVC is SILENTLY MASKED. Per-PVC fires it, named below. ──
  - interval: 1m
    input_series:
      - series: 'kubelet_volume_stats_available_bytes{tenant="shop-a", namespace="shop", persistentvolumeclaim="data-shop-0", instance="10.0.0.1:10250", job="kubelet"}'
        values: '800-1.2x540'
      - series: 'kubelet_volume_stats_capacity_bytes{tenant="shop-a", namespace="shop", persistentvolumeclaim="data-shop-0", instance="10.0.0.1:10250", job="kubelet"}'
        values: '1000+0x540'
      # healthy large volume that WOULD mask the data PVC under a by(tenant) sum.
      - series: 'kubelet_volume_stats_available_bytes{tenant="shop-a", namespace="shop", persistentvolumeclaim="config-shop-0", instance="10.0.0.1:10250", job="kubelet"}'
        values: '9000+0x540'
      - series: 'kubelet_volume_stats_capacity_bytes{tenant="shop-a", namespace="shop", persistentvolumeclaim="config-shop-0", instance="10.0.0.1:10250", job="kubelet"}'
        values: '10000+0x540'
      - series: 'user_threshold{component="custom", metric="kubelet_volume_stats_available_bytes", recipe_id="forecast__kubelet_volume_stats_available_bytes__lt__h4h__den_kubelet_volume_stats_capacity_bytes__for30m__gb_persistentvolumeclaim", tenant="shop-a", severity="warning", name="disk_will_fill", mode="page"}'
        values: '0.15+0x540'
      - series: 'tenant_metadata_info{tenant="shop-a", runbook_url="http://rb/shop", owner="team-shop", tier="gold"}'
        values: '1x540'
    alert_rule_test:
      - eval_time: 520m
        alertname: Custom_forecast__kubelet_volume_stats_available_bytes__lt__h4h__den_kubelet_volume_stats_capacity_bytes__for30m__gb_persistentvolumeclaim
        exp_alerts:
          - exp_labels:
              component: custom
              severity: warning
              tenant: shop-a
              recipe: forecast
              name: disk_will_fill
              mode: page
              version: default
              persistentvolumeclaim: data-shop-0
              runbook_url: "http://rb/shop"
              owner: team-shop
              tier: gold
            exp_annotations:
              summary: "Custom alert [disk_will_fill] for shop-a"
              summary_zh: "shop-a 的自訂告警 [disk_will_fill] 觸發"
              description: 'forecast on kubelet_volume_stats_available_bytes: value 0.00 crossed the configured threshold'
              description_zh: 'kubelet_volume_stats_available_bytes 的 forecast: 值 0.00 已越過設定閾值'
              runbook_url: "http://rb/shop"
              owner: team-shop
              tier: gold

  # ── stable-c: ratio flat at 0.5 with plenty of data → predicted ratio ≈ 0.5,
  #    never < 0.15 → MUST NOT fire (forecast is the signal, not a static level). ──
  - interval: 1m
    input_series:
      - series: 'kubelet_volume_stats_available_bytes{tenant="stable-c", namespace="stab", persistentvolumeclaim="data-stab-0", instance="10.0.0.2:10250", job="kubelet"}'
        values: '500+0x540'
      - series: 'kubelet_volume_stats_capacity_bytes{tenant="stable-c", namespace="stab", persistentvolumeclaim="data-stab-0", instance="10.0.0.2:10250", job="kubelet"}'
        values: '1000+0x540'
      - series: 'user_threshold{component="custom", metric="kubelet_volume_stats_available_bytes", recipe_id="forecast__kubelet_volume_stats_available_bytes__lt__h4h__den_kubelet_volume_stats_capacity_bytes__for30m__gb_persistentvolumeclaim", tenant="stable-c", severity="warning", name="disk_will_fill", mode="page"}'
        values: '0.15+0x540'
    alert_rule_test:
      - eval_time: 520m
        alertname: Custom_forecast__kubelet_volume_stats_available_bytes__lt__h4h__den_kubelet_volume_stats_capacity_bytes__for30m__gb_persistentvolumeclaim
        exp_alerts: []

  # ── burst-d (W1 anti-flap / cold-start guard — NON-VACUOUS): a freshly-mounted
  #    volume whose ~38 samples decline steeply from 0.90 but is STILL at 0.60 headroom
  #    now. The steep slope makes predict_linear extrapolate well below 0 (clamped to
  #    0 < 0.15) and — crucially — the firing condition holds long enough (≈33m) that
  #    `for:30m` IS satisfied: WITHOUT the band this WOULD fire (so the test is NOT
  #    vacuous — neither for:30m nor the `> 3` cold-start gate, which passes with 38
  #    samples, saves us here). The current-state band blocks it solely because the
  #    current ratio 0.60 ≥ 0.5: a disk that is still 60% free must not page on a
  #    transient initial-write burst. This is the exact FP the band adds. MUST NOT fire. ──
  - interval: 1m
    input_series:
      # _x483 → absent for the first 483m, then 38 samples falling 900→604 (ratio
      # 0.90→0.60), an 8h-lookback slope ≈ -0.008/min → predict_linear << 0 (clamped).
      - series: 'kubelet_volume_stats_available_bytes{tenant="burst-d", namespace="bd", persistentvolumeclaim="data-bd-0", instance="10.0.0.3:10250", job="kubelet"}'
        values: '_x483 900-8x37'
      - series: 'kubelet_volume_stats_capacity_bytes{tenant="burst-d", namespace="bd", persistentvolumeclaim="data-bd-0", instance="10.0.0.3:10250", job="kubelet"}'
        values: '_x483 1000+0x37'
      - series: 'user_threshold{component="custom", metric="kubelet_volume_stats_available_bytes", recipe_id="forecast__kubelet_volume_stats_available_bytes__lt__h4h__den_kubelet_volume_stats_capacity_bytes__for30m__gb_persistentvolumeclaim", tenant="burst-d", severity="warning", name="disk_will_fill", mode="page"}'
        values: '0.15+0x540'
    alert_rule_test:
      - eval_time: 520m
        alertname: Custom_forecast__kubelet_volume_stats_available_bytes__lt__h4h__den_kubelet_volume_stats_capacity_bytes__for30m__gb_persistentvolumeclaim
        exp_alerts: []
