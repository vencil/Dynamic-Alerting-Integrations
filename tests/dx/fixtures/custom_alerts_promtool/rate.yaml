# promtool unit test — Custom Alerts (#741), RATE recipe + LABEL SELECTORS.
# Run: promtool test rules tests/rulepacks/rule-pack-custom-alerts-rate_test.yaml
#
# The recipe declares selectors_re{status:"5.."} + selectors{method:"POST"}; the
# compiler assembled `http_requests_total{method="POST", status=~"5.."}`. Proves:
# (1) only matching series count → fires on 5xx-POST rate; (2) when the 5xx-POST
# rate is below threshold, a HUGE volume of 2xx/GET noise does NOT push it over
# (the selector correctly excludes non-matching series — no fire).
rule_files:
  - rule-pack-custom-alerts.yaml

evaluation_interval: 15s

tests:
  # ── 5xx POST rate = 1000/15 ≈ 66.7 > 50 → fires; noise series excluded ──
  - interval: 15s
    input_series:
      - series: 'http_requests_total{tenant="shop-a", method="POST", status="500", namespace="shop", pod="api-1"}'
        values: '0+1000x48'
      # noise that MUST be excluded by the selectors:
      - series: 'http_requests_total{tenant="shop-a", method="GET", status="500", namespace="shop", pod="api-1"}'
        values: '0+99000x48'
      - series: 'http_requests_total{tenant="shop-a", method="POST", status="200", namespace="shop", pod="api-1"}'
        values: '0+99000x48'
      - series: 'user_threshold{component="custom", metric="http_requests_total", recipe_id="rate__http_requests_total__s_method_POST__sre_status_5____gt__w5m__for1m", tenant="shop-a", severity="warning", name="http_5xx_spike"}'
        values: '50x48'
      - series: 'tenant_metadata_info{tenant="shop-a", runbook_url="http://rb/shop", owner="team-shop", tier="gold"}'
        values: '1x48'
    alert_rule_test:
      - eval_time: 11m
        alertname: Custom_rate__http_requests_total__s_method_POST__sre_status_5____gt__w5m__for1m
        exp_alerts:
          - exp_labels:
              severity: warning
              tenant: shop-a
              recipe: rate
              name: http_5xx_spike
              version: default
              runbook_url: "http://rb/shop"
              owner: team-shop
              tier: gold
            exp_annotations:
              summary: "Custom alert [http_5xx_spike] for shop-a"
              summary_zh: "shop-a 的自訂告警 [http_5xx_spike] 觸發"
              description: "rate on http_requests_total{method=\"POST\", status=~\"5..\"}: value 66.67 crossed the configured threshold"
              description_zh: "http_requests_total{method=\"POST\", status=~\"5..\"} 的 rate: 值 66.67 已越過設定閾值"
              runbook_url: "http://rb/shop"
              owner: team-shop
              tier: gold

  # ── 5xx POST rate = 300/15 = 20 < 50; huge 2xx/GET noise must NOT count → no fire
  - interval: 15s
    input_series:
      - series: 'http_requests_total{tenant="shop-a", method="POST", status="500", namespace="shop", pod="api-1"}'
        values: '0+300x48'
      - series: 'http_requests_total{tenant="shop-a", method="GET", status="500", namespace="shop", pod="api-1"}'
        values: '0+99000x48'
      - series: 'http_requests_total{tenant="shop-a", method="POST", status="200", namespace="shop", pod="api-1"}'
        values: '0+99000x48'
      - series: 'user_threshold{component="custom", metric="http_requests_total", recipe_id="rate__http_requests_total__s_method_POST__sre_status_5____gt__w5m__for1m", tenant="shop-a", severity="warning", name="http_5xx_spike"}'
        values: '50x48'
      - series: 'tenant_metadata_info{tenant="shop-a", runbook_url="http://rb/shop", owner="team-shop", tier="gold"}'
        values: '1x48'
    alert_rule_test:
      - eval_time: 11m
        alertname: Custom_rate__http_requests_total__s_method_POST__sre_status_5____gt__w5m__for1m
        exp_alerts: []
