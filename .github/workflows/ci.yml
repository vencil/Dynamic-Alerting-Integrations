name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CI-ROI wave 6C: path-scope the two critical-path test pillars (Go /
  # Python) so a provably-unrelated PR (docs-only, portal-only) stops
  # paying the full ~4 min Go+Python wall time AND frees their runner
  # slots for the queue. Same dorny/paths-filter REST-mode pattern as
  # validate.yaml's "Detect Validate Path Changes" job.
  #
  # Required-check safety (the "required check skipped → Expected forever"
  # trap, see validate.yaml's banner + memory Trap 17): the two names
  # branch protection requires — "Go Tests (1.26)" and "Python Tests
  # (3.13)" — are BOTH reported by always-run aggregate gate jobs below
  # (`if: always()`), never by a path-skipped job directly. A skipped leg
  # counts as PASS only when detect-changes said it was not needed; a leg
  # that RAN and failed, or a failed/cancelled detect job, fails the gate
  # (fail-closed). No branch-protection flip is needed: both check names
  # keep reporting on every PR and every push to main.
  #
  # Filter philosophy: CONSERVATIVE — skip only what is provably
  # unrelated; when in doubt, run. The path lists below include every
  # real-repo-tree path the suites actually read (verified by grep, see
  # the per-filter comments), and a change to THIS workflow file always
  # runs everything.
  detect-changes:
    name: Detect CI Path Changes
    runs-on: ubuntu-latest
    # pull-requests: read is for dorny/paths-filter@v3 REST-API mode
    # (same grant + rationale as validate.yaml's detect job).
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # push events (main) carry no PR file list — treat as "everything
      # changed" so main always runs the full suite (this also keeps the
      # coverage-py3.13 baseline artifact flowing for coverage-delta).
      go_changed: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.go }}
      python_changed: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.python }}
      portal_changed: ${{ github.event_name != 'pull_request' && 'true' || steps.filter.outputs.portal }}
    steps:
      # No actions/checkout: REST-API mode queries the changed-file list
      # via the GitHub API (see validate.yaml's identical note).
      # Accepted risk (same as validate.yaml's detect job): the REST
      # changed-files list caps at 3000 entries; a larger PR could
      # under-report. Isomorphic to the existing validate.yaml gate and
      # far beyond this repo's PR sizes — not mitigated here.
      - name: Filter changed paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # Go legs (threshold-exporter / tenant-api / am-inhibit):
            #   - components/{threshold-exporter,tenant-api}/** — the two
            #     module trees (code, go.mod/sum, embedded config/goldens;
            #     conf.d lives under threshold-exporter/config/**).
            #   - **/go.mod, **/go.sum — any module manifest, incl.
            #     tests/alertmanager-inhibit's own module.
            #   - tests/contract/** — schemathesis runner + fixtures run
            #     inside the tenant-api leg.
            #   - tests/alertmanager-inhibit/** — the am-inhibit leg; its
            #     tests also parse k8s/03-monitoring/configmap-alertmanager
            #     .yaml and try-local/alertmanager.yml (grep-verified) →
            #     those trees are in the filter too.
            #   - rule-packs/** — custom-alerts pack ↔ tenant-api goldens.
            #   - ci_flake_retry.py + flaky-tests.yaml — the retry wrapper
            #     both Go legs run under.
            go:
              - "components/threshold-exporter/**"
              - "components/tenant-api/**"
              - "**/go.mod"
              - "**/go.sum"
              - "tests/contract/**"
              - "tests/alertmanager-inhibit/**"
              - "rule-packs/**"
              - "k8s/03-monitoring/**"
              - "try-local/**"
              - "scripts/ops/ci_flake_retry.py"
              - "flaky-tests.yaml"
              - ".github/workflows/ci.yml"
            # Python Tests: pytest over tests/ + scripts/tools/ with real-
            # repo-tree reads well beyond *.py (grep-verified):
            #   - helm/** — tests/helm/* + tests/shared/test_helm_* render
            #     the real charts; the mtail gate compiles
            #     helm/federation-gateway/files/federation-audit.mtail.
            #   - k8s/** / try-local/** — routing-correctness + manifest
            #     tests parse the real manifests/compose files.
            #   - components/** — da-tools app is Python (coverage source),
            #     conf.d + exporter/tenant-api fixtures are read by tests.
            #   - rule-packs/** + operator-manifests/** — sync/parity
            #     suites read all three rule copies.
            #   - Makefile — test_check_makefile_targets reads the real
            #     Makefile; docs/glossary*.md — codename-gate tests read
            #     the real glossary. .pre-commit-config.yaml — hook-
            #     registration lint tests.
            #   - .github/workflows/** — several tests scan the REAL
            #     workflow tree (test_check_workflow_git_push_permissions
            #     scan_repo, nightly-scan matrix drift, promtool pin
            #     parity, release-tools entrypoint), so ANY workflow edit
            #     must run Python Tests.
            #   - renovate.json — test_renovate_config.py is its only
            #     offline safety net (customManager regex ↔ pin parity).
            #   - .devcontainer/** — promtool pin parity compares
            #     install-promtool.sh against ci.yml/Dockerfile; a
            #     devcontainer-side-only bump must not skip the guard.
            python:
              - "**/*.py"
              - "tests/**"
              - "scripts/**"
              - "components/**"
              - "rule-packs/**"
              - "operator-manifests/**"
              - "helm/**"
              - "k8s/**"
              - "try-local/**"
              - "pyproject.toml"
              - "Makefile"
              - ".pre-commit-config.yaml"
              - ".github/custom-rule-policy.yaml"
              - "docs/glossary.md"
              - "docs/glossary.en.md"
              - "flaky-tests.yaml"
              - "renovate.json"
              - ".devcontainer/**"
              - ".github/workflows/**"
            # Portal Tests: Vitest + esbuild build verification + committed-dist
            # freshness + the RBAC wizard drift byte-clamp. Runs when portal
            # source or its committed dist change, AND when the wizard testdata
            # fixtures change: those fixtures live under components/tenant-api/**
            # but the byte-clamp that binds them to the JS generator is a Vitest,
            # so a hand-edited fixture must run THIS leg or the JS end of the
            # two-ended tripwire is silently skipped. (ci.yml itself is included
            # so a change to this job's own config re-runs it — same as `go`.)
            portal:
              - "tools/portal/**"
              - "docs/assets/dist/**"
              - "components/tenant-api/internal/rbac/testdata/wizard/**"
              - ".github/workflows/ci.yml"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # changelog-lint calls `git describe --tags --abbrev=0` and
          # walks `<tag>..HEAD`. The default fetch-depth: 1 shallow
          # clone has neither tags nor history, so it falls back to
          # linting only the GitHub-generated PR merge commit (not a
          # conventional commit) and always fails. Need full history
          # and tags for the tag-boundary walk to work.
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements*.txt', '**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install pre-commit pyyaml -c requirements/ci-constraints.txt

      # Container SAST Layer 1 (#448 / TRK-311): the iac-sast-check hook drives
      # hadolint. Install the binary so the wrapper uses it directly (no docker
      # image pull on the runner). Pin matches HADOLINT_VERSION in
      # scripts/tools/lint/check_iac_vibe_rules.py and .hadolint.yaml.
      #
      # Download-cache pattern (CI-ROI wave, shared by every pinned-binary
      # install in this workflow): the artifact is stored in a cache dir
      # under a VERSIONED filename and only curl'd on a miss. The SHA-256
      # verification ALWAYS runs — on cached bytes too — so a poisoned/stale
      # cache entry fails the job instead of executing. The version in the
      # cache KEY must be kept in sync with the install step when re-pinning:
      # a stale key still EXACT-HITS the old entry, and since an exact hit
      # skips the post-save, the new versioned file never enters the cache —
      # the job then re-downloads EVERY run until the key is fixed.
      # Correctness is unaffected (versioned filenames + always-on checksum
      # mean the old binary is never silently used); only the cache benefit
      # is lost. Best-effort install steps (pint / kube-linter / vmutils)
      # additionally keep their cache dir absent until a download fully
      # succeeds — a job can go green around their failure, and post-save on
      # a missing path is a no-op, so a flake can never freeze a partial
      # entry under an exact-hit key.
      - name: Cache pinned binary downloads (hadolint)
        uses: actions/cache@v5
        with:
          path: ~/.cache/vibe-ci-downloads
          key: ${{ runner.os }}-vibe-dl-lint-hadolint-v2.12.0

      - name: Set up hadolint
        run: |
          HADOLINT_VERSION=v2.12.0
          # Pinned SHA-256 of hadolint-Linux-x86_64 @ v2.12.0 (upstream .sha256).
          HADOLINT_SHA256=56de6d5e5ec427e17b74fa48d51271c7fc0d61244bf5c90e828aab8362d55010
          DL="$HOME/.cache/vibe-ci-downloads"
          mkdir -p "$DL"
          if [ ! -f "$DL/hadolint-${HADOLINT_VERSION}" ]; then
            curl -fsSL -o "$DL/hadolint-${HADOLINT_VERSION}" \
              "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          fi
          bash scripts/ops/_verify_download.sh "$DL/hadolint-${HADOLINT_VERSION}" "$HADOLINT_SHA256"
          sudo install -m0755 "$DL/hadolint-${HADOLINT_VERSION}" /usr/local/bin/hadolint
          hadolint --version

      - name: Run pre-commit hooks
        # PR_BODY exposes the PR description body to bypass-aware lints.
        # check_codename_leak.py reads it for `bypass-lint: codename-leak`
        # tags per docs/internal/lint-policy.md §4. Empty string on push
        # events (not a PR) — bypass simply not applicable in that mode.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          pre-commit run tool-map-check --all-files
          pre-commit run doc-map-check --all-files
          pre-commit run rule-pack-stats-check --all-files
          pre-commit run glossary-check --all-files
          pre-commit run changelog-lint --all-files
          pre-commit run includes-sync --all-files
          pre-commit run platform-data-check --all-files
          pre-commit run repo-name-check --all-files
          # Codename-leak guard runs in diff-only mode by default (lint-policy
          # §3 (b) class). resolve_diff_base() auto-picks origin/$GITHUB_BASE_REF
          # so the fetch-depth: 0 above is sufficient — no extra env wiring.
          pre-commit run codename-leak-check --all-files
          # Codename gate Layer 2 (#469/#710 Phase B) — glossary-driven blocking. Runs
          # with --ci (entry in .pre-commit-config.yaml): hard-fails on confirmed
          # internal codename leaks (templates from docs/glossary.md). Full-scan,
          # deterministic, 0 FP. PR_BODY (set on the step) enables the
          # `bypass-lint: codename-gate` escape per lint-policy §4. NOT --strict:
          # unregistered shape tokens remain the #710 soak, not gated here.
          pre-commit run codename-gate-check --all-files
          # changelog-no-tbd-check refactored to diff-only in PR #383 (V-4 batch).
          # Was registered in .pre-commit-config.yaml since v2.7.x but never
          # wired to CI Lint job — only ran on contributor's local pre-commit.
          pre-commit run changelog-no-tbd-check --all-files
          # The next 3 (b) class lints completed V-4 in a follow-up PR.
          # Wired here for the same reason — pre-commit path filters might
          # not trigger on every PR, but lints should run always.
          pre-commit run ad-hoc-git-scripts-check --all-files
          pre-commit run bat-ascii-purity-check --all-files
          pre-commit run design-token-usage --all-files
          pre-commit run tool-consistency-check --all-files
          # CI-ROI 6C blind-spot fix: these 4 lints' live-dogfood pytest
          # twins (tests/lint/*::TestLiveRepo*) had "Python Tests" as
          # their ONLY CI enforcement point — but their scan surfaces
          # (tools/portal/src/**, docs/** jsx/js/css, dev-rules.md) are
          # exactly the path classes the detect-changes gate now skips
          # Python Tests for. Wiring them here (all four scripts scan
          # their FULL fixed surface on every run — none is diff-only)
          # keeps portal-only / docs-only PRs gated without paying the
          # whole pytest suite. Same hoisting rationale as
          # design-token-usage above.
          pre-commit run undefined-tokens-check --all-files
          pre-commit run jsx-loader-compat-check --all-files
          pre-commit run window-x-no-fallback-check --all-files
          pre-commit run dev-rules-enforcement-check --all-files
          pre-commit run portal-audience-enum-check --all-files
          pre-commit run structure-check --all-files
          pre-commit run routing-profiles-check --all-files
          # #880: conf.d tenant YAML vs tenant-config schema (db_type-typo guard).
          # Backstops the local pre-commit hook so a direct push / bypass cannot
          # land a dbType/db_typ key or maraidb value that silently drops a tenant
          # from liveness. Hook venv carries jsonschema via additional_dependencies.
          pre-commit run confd-schema-check --all-files
          # Gemini #1056 disposition 3b: admin meta-config (_rbac / _domain_policy /
          # _tenant_orgs) structural schema validation. Backstops the local hook so a
          # direct push / bypass cannot land a key-typo or bad-enum admin config that
          # the strict runtime parser would reject (startup fatal / last-good masking).
          # Hook venv carries jsonschema via additional_dependencies.
          pre-commit run admin-config-schema-check --all-files
          pre-commit run bilingual-content-check --all-files
          pre-commit run bilingual-annotations-check --all-files
          # Manual-stage line-count regression gate from PR #TBD —
          # locks in PR-2d (#153 Phase 1+2+3 / S#69-S#72) line-count
          # progress. Codebase has 0 soft-cap warnings as of S#72;
          # this hook keeps it that way going forward.
          pre-commit run jsx-babel-check-strict-linecount --all-files
          # Container SAST Layer 1 (#448 / TRK-311): hadolint + Vibe wrapper
          # over all Dockerfiles. BLOCK findings fail the Lint job; WARN/INFO
          # are recorded in docs/internal/iac-lint-baseline.md. hadolint binary
          # installed in the "Set up hadolint" step above (wrapper uses PATH).
          pre-commit run iac-sast-check --all-files
          # Container SAST Layer 3 (#448 / TRK-313): Helm values secret-shape
          # (pure-Python class-(b), diff-only). fetch-depth: 0 above gives the
          # diff base; PR_BODY env (set on this job) carries the bypass tag.
          pre-commit run helm-values-secrets-check --all-files
          # Cross-ns service-URL consistency (#1004): tenant-api pins its
          # dedicated `tenant-api` ns, recipe-preview pins `monitoring`, in
          # every Helm values / raw k8s manifest / portal nginx / try-local
          # URL. Wired unfiltered here (like the lints above) so a PR that
          # misses the hook's path filter still can't land namespace drift.
          pre-commit run cross-ns-url-check --all-files
          # ADR-022 Layer 4: forbid tenant-api's --dev-bypass-auth /
          # TA_DEV_BYPASS_AUTH switch from any deploy manifest (helm/k8s/
          # operator-manifests). Deploy-time complement to the runtime k8s
          # poison pill. HARD block.
          pre-commit run dev-bypass-manifest-guard --all-files
          # ADR-021/#609: forbid lowering _account_registry.yaml's
          # next_account_id across a commit (git-revert / hand-edit of an
          # onboarding → re-issues a monotonic account_id while the reverted
          # tenant's logs are still in the retention window = cross-tenant
          # leak). --ci auto-detects PR-vs-base from GITHUB_BASE_REF (the
          # fetch-depth: 0 above gives the base ref); no-ops when the registry
          # is absent/untracked (runtime conf.d state, not committed).
          pre-commit run account-registry-monotonic --all-files
          # Guards against the docs-ci.yaml dead-auto-commit bug (PR #983 review):
          # a `git push` in any workflow with no `contents: write` grant silently
          # no-ops. Wired here (not path-filtered) so editing ANY workflow file
          # is covered, matching the "Lint Rule Packs" hoisting rationale above.
          pre-commit run workflow-git-push-permission-check --all-files
          # CI-ROI 6C blind-spot fix, same class as the 4 lints hoisted
          # above: check_hub_badge_drift.py has NO pre-commit hook — its
          # live pytest twin (tests/lint/test_check_hub_badge_drift.py::
          # TestLiveRepoIsClean, reading docs/interactive/index.html) was
          # enforced only by "Python Tests", which docs-only PRs now
          # skip. Direct CLI call (stdlib-only, exit 0/1) mirroring the
          # check_retire_drift.py direct-step precedent in Lint Rule
          # Packs.
          python3 -X utf8 scripts/tools/lint/check_hub_badge_drift.py
          # GHA workflow lint (actionlint, OSS engine; #1021 follow-up).
          # Blocks the script-injection class (raw untrusted expression
          # interpolation spliced into run: scripts — GHA evaluates the
          # dollar-double-brace form even inside shell comments, so it is
          # not written out here) + syntax/type/deprecation errors.
          # language: golang hook — pre-commit builds it once with the
          # runner's preinstalled Go toolchain (cached under ~/.cache/pre-commit
          # for the job; no setup-go step needed). shellcheck/pyflakes are
          # pinned OFF in .pre-commit-config.yaml args for host/CI parity.
          pre-commit run actionlint --all-files

  lint-rule-packs:
    # Custom Prometheus rule-pack governance linter.
    #
    # Until v2.6.0 this only ran in validate.yaml, which is path-filtered
    # and NOT in the branch-protection required-check list. That left a
    # hole: a PR not touching any validate.yaml path could still merge
    # rule-pack YAML via unrelated codepaths (refactors, cross-file moves,
    # etc.) without running the deny-list / required-labels / max-range
    # checks. PR #11 surfaced the cost of that hole — 14 rule-packs had
    # accumulated 95 alerts missing the required `tenant` label because
    # the gate was advisory, not enforcing. See release-playbook lesson
    # #29 for the full governance-debt pattern.
    #
    # Hoisting the step into ci.yml (no path filter, runs on every PR
    # and push to main) guarantees the deny-list is enforced against the
    # actual HEAD tree on every PR, not just PRs whose diff happens to
    # land on a watched path. Add "Lint Rule Packs" to branch protection
    # required checks to lock it in.
    name: Lint Rule Packs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-rule-packs-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-rule-packs-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install pyyaml -c requirements/ci-constraints.txt

      - name: Lint custom rules (deny-list + required labels)
        run: |
          python scripts/tools/ops/lint_custom_rules.py \
            rule-packs/ \
            --policy .github/custom-rule-policy.yaml \
            --ci

      - name: RETIRE-ordering gate (#869 — no K8s-target delete with conf.d _metadata残留)
        # Unfiltered over HEAD (the pre-commit mirror's path filter can miss
        # delete-only PRs). Forbids stranding tenant_expected_exporter → a
        # false-positive TenantExporterAbsent critical against a de-provisioned tenant.
        run: |
          python scripts/tools/lint/check_retire_drift.py --ci

      # Download-caches for the 3 pinned tarballs this job curls every run
      # (promtool / vmutils / pint — see the Lint job's hadolint step for the
      # full pattern rationale: versioned filenames, always-on SHA-256 on
      # cached bytes, keep the key's version in sync when re-pinning).
      #
      # ONE CACHE ENTRY PER ARTIFACT, deliberately not a shared key: the
      # vmutils and pint install steps are best-effort (continue-on-error /
      # if-swallowed), so with a shared key a first-run download flake would
      # let the job go green and post-save a PARTIAL entry — which an exact
      # hit then never re-saves, leaving the flaked artifact re-downloading
      # on every subsequent run until someone bumps the key. Separate keys +
      # each best-effort step only materializing its cache dir on a fully
      # successful download (post-save on a missing path is a no-op) make a
      # flake cost exactly one run.
      #
      # promtool is a HARD step (its curl failure fails the job, so no
      # post-save can capture a partial state). vmutils' version lives in
      # the tests/rulepacks/vm_engine_version pins SSOT → hashFiles keys it.
      - name: Cache pinned binary downloads (promtool)
        uses: actions/cache@v5
        with:
          path: ~/.cache/vibe-ci-downloads
          key: ${{ runner.os }}-vibe-dl-promtool-3.12.0

      - name: Cache pinned binary downloads (vmutils)
        uses: actions/cache@v5
        with:
          path: ~/.cache/vibe-dl-vmutils
          key: ${{ runner.os }}-vibe-dl-vmutils-${{ hashFiles('tests/rulepacks/vm_engine_version') }}

      - name: Cache pinned binary downloads (pint)
        uses: actions/cache@v5
        with:
          path: ~/.cache/vibe-dl-pint
          key: ${{ runner.os }}-vibe-dl-pint-0.86.0

      - name: Install promtool
        run: |
          PROM_VERSION=3.12.0
          # Pinned SHA-256 of prometheus-3.12.0.linux-amd64.tar.gz (upstream sha256sums.txt).
          PROM_SHA256=20da47f8e5303f74aecb78edd7f7e39041dac08ac4939dba75efd7a900ae8867
          DL="$HOME/.cache/vibe-ci-downloads"
          mkdir -p "$DL"
          if [ ! -f "$DL/prometheus-${PROM_VERSION}.tgz" ]; then
            curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" -o "$DL/prometheus-${PROM_VERSION}.tgz"
          fi
          bash scripts/ops/_verify_download.sh "$DL/prometheus-${PROM_VERSION}.tgz" "$PROM_SHA256"
          tar xzf "$DL/prometheus-${PROM_VERSION}.tgz" -C /tmp
          sudo cp /tmp/prometheus-${PROM_VERSION}.linux-amd64/promtool /usr/local/bin/
          promtool --version

      - name: Rule-pack promtool unit tests (alert fire/no-fire contracts)
        run: |
          shopt -s nullglob
          for t in tests/rulepacks/*_test.yaml; do
            echo "::group::$t"
            promtool test rules "$t"
            echo "::endgroup::"
          done

      - name: Preview would-fire e2e (pinned promtool x verdict-signature contract)
        # The preview's firing/inactive verdict is version-bound: classify_promtool_result
        # (scripts/tools/dx/_recipe_preview.py) requires promtool's `FAILED:` + `got:[`
        # output signature. This is the ONLY CI spot where the PINNED promtool meets that
        # contract — the "Python Tests" job has no promtool, so the @_needs_promtool e2e
        # skips there. A promtool re-pin that changes the output format fails HERE, not
        # in front of a Domain Expert.
        run: |
          pip install pytest -c requirements/ci-constraints.txt
          python -m pytest tests/dx/test_recipe_preview.py tests/preview/ -q

      # CI blind-spot fix (CI-ROI wave): these 5 modules are promtool-gated
      # (`pytest.mark.skipif(shutil.which("promtool") is None)` or a
      # per-test promtool skip), and the "Python Tests" job has no promtool
      # — so until now they silently SKIPPED on every CI run and only the
      # dev container ever executed them (a compiler slug/recipe_id change
      # could rot the goldens with zero CI signal). This job installs
      # promtool as a HARD step above, so here the skip-guards never
      # trigger and the goldens are real gates:
      #   - test_custom_alerts_promtool.py — #741 S1+S2 compiler fire/no-fire
      #     behavioral goldens against the compiled example pack
      #   - test_federation_revocation_dashboard.py / test_fleet_threshold_
      #     dashboard.py / test_tenant_log_query_dashboard.py — Grafana
      #     dashboard PromQL regression goldens (queries read FROM the JSON)
      #   - test_waveform_compile.py — ADR-030 waveform compiler incl. the
      #     promtool round-trip tests; the module importorskips on
      #     jsonschema (hence the explicit install below — pyyaml+pytest
      #     alone would silently skip the WHOLE module), and
      #     WAVEFORM_PROMTOOL_REQUIRE=1 flips its round-trip skip-guard to
      #     hard-FAIL if promtool ever goes missing in this job.
      # -rs surfaces any residual skip in the log so a future re-gating of
      # these modules can't silently disarm the step again.
      - name: Promtool-gated blind-spot goldens (custom-alerts compiler + dashboards + waveform)
        env:
          WAVEFORM_PROMTOOL_REQUIRE: "1"
        run: |
          pip install jsonschema -c requirements/ci-constraints.txt
          python -m pytest \
            tests/dx/test_custom_alerts_promtool.py \
            tests/dx/test_federation_revocation_dashboard.py \
            tests/dx/test_fleet_threshold_dashboard.py \
            tests/dx/test_tenant_log_query_dashboard.py \
            tests/dx/test_waveform_compile.py \
            -q -rs

      - name: Install vmalert-tool (VictoriaMetrics MetricsQL unit-test engine)
        # REQUIRED provisioning for the promoted parity gate below (soak (a) met, #947).
        # NOT continue-on-error: a missing vmalert-tool makes the gate's pytest module
        # self-skip (skipif) → silent green → toothless. Fail-closed instead, so an absent
        # tool reddens the required job HERE, before the gate can vacuously pass. The curl
        # below carries --retry so a transient upstream blip doesn't flake the required
        # job; steady state is a cache hit (no download at all).
        run: |
          pip install pytest -c requirements/ci-constraints.txt
          # VM engine version comes from the single pins SSOT (tests/rulepacks/
          # vm_engine_version) shared with the equivalence anchor (test_vm_backend_parity.py)
          # so the gate's engine and the anchor-verified engine can't drift (pin-coupling guard).
          . tests/rulepacks/vm_engine_version
          # Pinned SHA-256 of vmutils-linux-amd64-v${VM_VERSION}.tar.gz (upstream release);
          # a version/hash mismatch fails _verify_download.sh below (couples SHA <-> version).
          VMUTILS_SHA256=ec597bc2168d0792638ab0dc847e37041bace57a358bafa0da034c9fd438efac
          # Download to /tmp; mkdir+mv into the cache dir ONLY on full curl success —
          # keeps the cache post-save from freezing an empty/partial entry under an
          # exact-hit key if the download is interrupted (the dir stays absent until
          # success, so the post-save no-ops rather than caching a corrupt tarball).
          # A hard curl/verify failure now reddens the required job (fail-closed;
          # --retry rides out transient blips first).
          DL="$HOME/.cache/vibe-dl-vmutils"
          if [ ! -f "$DL/vmutils-v${VM_VERSION}.tgz" ]; then
            curl -fsSL --retry 3 --retry-connrefused --retry-delay 5 "https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v${VM_VERSION}/vmutils-linux-amd64-v${VM_VERSION}.tar.gz" -o /tmp/vmutils.tgz.part
            mkdir -p "$DL"
            mv /tmp/vmutils.tgz.part "$DL/vmutils-v${VM_VERSION}.tgz"
          fi
          bash scripts/ops/_verify_download.sh "$DL/vmutils-v${VM_VERSION}.tgz" "$VMUTILS_SHA256"
          tar xzf "$DL/vmutils-v${VM_VERSION}.tgz" -C /tmp
          sudo cp /tmp/vmalert-tool-prod /usr/local/bin/vmalert-tool
          vmalert-tool --version

      - name: Rule-pack vmalert (MetricsQL) parity + deviation-catalog gate
        # VM-backend tenants run rules on vmalert (MetricsQL), which deviates from PromQL
        # by design (range-function cold-start; see docs/integration/victoriametrics-
        # integration.md §3.1). Runs EVERY promtool fixture through vmalert-tool; an
        # UNCATALOGUED divergence fails this step (catalog: tests/rulepacks/
        # vm_deviation_catalog.yaml). PROMOTED TO REQUIRED 2026-07-19 (#947): soak trigger
        # (a) met — >=2 weeks (2026-07-01 catalog freeze → 07-15) with zero unexplained NEW
        # divergences; the gate ran non-vacuously throughout (vmalert-tool install + the
        # teeth-test test_gate_detects_a_known_divergence verified green at head/mid/tail of
        # the window). "Lint Rule Packs" is a required status check, so a new uncatalogued
        # divergence now blocks merge until it is explained in vm_deviation_catalog.yaml.
        # Scope (unchanged): rule-eval parity (MetricsQL math + for:), NOT real-TSDB
        # staleness — see the test module docstring; storage-layer staleness parity is
        # characterized on-demand by test_vm_replay_staleness.py (vmalert -replay, Phase 2).
        run: python -m pytest tests/rulepacks/test_vm_alert_parity.py -v

      # pint (ADR-025 deferred item): static analysis of the rule-pack SOURCE.
      # The high-ROI check is alerts/template — it mechanically catches the
      # "aggregation strips a label the alert template uses → silent-forever alert"
      # class (burned this repo 5×, until now guarded only by hand-comments).
      # Config + the idiom-noisy-check disables + sentinel exemptions live in
      # .pint.hcl; baseline is 0 blocking findings (docs/internal/pint-lint-baseline.md).
      - name: Set up pint (best-effort; check_pint.py falls back to Docker)
        continue-on-error: true  # truly best-effort: a failed install must NOT
                                 # fail the job — check_pint.py uses the Docker fallback.
        run: |
          PINT=0.86.0
          # Pinned SHA-256 of pint-0.86.0-linux-amd64.tar.gz (upstream checksums.txt).
          PINT_SHA256=6166233a8d6d726d56345cb863f749a20f398cc9ffc01cd5c36410a76afa73bc
          # Best-effort: a download failure OR a checksum mismatch falls through to
          # check_pint.py's Docker fallback (the helper emits a ::error:: annotation
          # on a mismatch, so a tampered binary is surfaced and never executed here).
          # Download to /tmp; mkdir+mv into the cache dir ONLY on full curl
          # success: this step swallows failures, so the job — and the cache
          # post-save — can go green around a flake; keeping the dir absent
          # until success means the post-save no-ops (missing path) instead
          # of freezing an empty/partial entry under an exact-hit key.
          DL="$HOME/.cache/vibe-dl-pint"
          if { [ -f "$DL/pint-${PINT}.tar.gz" ] \
                || { curl -fsSL -o /tmp/pint.tar.gz.part \
                       "https://github.com/cloudflare/pint/releases/download/v${PINT}/pint-${PINT}-linux-amd64.tar.gz" \
                     && mkdir -p "$DL" \
                     && mv /tmp/pint.tar.gz.part "$DL/pint-${PINT}.tar.gz"; }; } \
              && bash scripts/ops/_verify_download.sh "$DL/pint-${PINT}.tar.gz" "$PINT_SHA256"; then
            tar -xzf "$DL/pint-${PINT}.tar.gz" -C /tmp
            # the tarball ships the binary as `pint-linux-amd64`, not `pint`.
            sudo install -m0755 /tmp/pint-linux-amd64 /usr/local/bin/pint
            pint --version
          else
            echo "::warning::pint binary unavailable/unverified; check_pint.py uses the Docker fallback"
          fi

      - name: Lint Prometheus rules (pint — alerts/template label-flow gate)
        run: python3 scripts/tools/lint/check_pint.py --ci

      # ADR-024 PR3-pre Commit 4: the configmap↔source copy is now a HARD gate.
      # The DEPLOYED configmaps (k8s/03-monitoring/configmap-rules-*.yaml, the
      # production source of truth via ADR-005 projected volume) must never drift
      # from rule-packs/ source again — that ~2-month silent drift is exactly what
      # caused the onboarding-vacuum bug (#709). Edit a rule pack → run
      # `make rulepack-configmaps` (or generate_rulepack_configmaps.py) → commit
      # both. The pre-commit `rulepack-configmap-drift` hook catches this locally.
      - name: "Rule-pack configmap drift (HARD gate — ADR-024 Commit 4)"
        run: python scripts/tools/dx/generate_rulepack_configmaps.py --check

      # ADR-024 PR3-pre: the 3rd copy (operator-manifests/ PrometheusRule CRDs)
      # is now a HARD gate too — PR3-pre is fully hard-gated. The operator
      # manifests were regenerated from the left-outer-join source (#709) and
      # the ~2-month drift synced, so all three copies (rule-packs/ ↔ configmap
      # ↔ operator) match semantically. They were previously audit-only because
      # they lagged the source; that excuse is gone. Edit a rule pack → run
      # `python scripts/tools/ops/operator_generate.py --components rules
      # --output-dir operator-manifests/` (CRDs) + `make rulepack-configmaps`
      # (configmaps) → commit all three. The pre-commit `rulepack-3copy-drift`
      # hook catches this locally before push.
      - name: "Rule-pack 3-copy sync incl. operator (HARD gate — ADR-024 PR3-pre)"
        run: python scripts/tools/lint/check_rulepack_sync.py --ci

      - name: "ConfigMap mount completeness (#869 dead-rule guard)"
        run: python scripts/tools/lint/check_configmap_mount_completeness.py --ci

      # #741 S3b: the deployed custom-alert pack is COMPILED from the live conf.d
      # _custom_alerts (not hand-edited). This is the source→pack drift gate that
      # sits upstream of the configmap/operator copies above — edit a tenant's
      # _custom_alerts → `make custom-alerts-compile` → commit pack+configmap+operator.
      - name: "Custom-alert pack matches live conf.d source (HARD gate — #741 S3b)"
        run: python scripts/tools/dx/compile_custom_alerts.py --check --config-dir components/threshold-exporter/config/conf.d

      # SEC-AUDIT #741: promtool-check the GENERATED custom-alert pack itself. The
      # drift gate above only compares STRUCTURE (source↔pack), and the unit-test
      # step (tests/rulepacks/*_test.yaml) never runs on this generated pack — so a
      # tenant-authored recipe that compiled to syntactically-invalid PromQL (F1 DoS
      # class: a bad `window`/`quantile` breaking the shared rule file on deploy)
      # would pass CI. The boundary charset validation (shape.py/custom_alert.go) is
      # the primary guard; this is the structural backstop that fails the build if any
      # invalid PromQL ever reaches the shared pack.
      - name: "Custom-alert generated pack is valid PromQL (SEC-AUDIT #741 F1 backstop)"
        run: promtool check rules rule-packs/rule-pack-custom-alerts.yaml

      # #741 #6 / ADR-024 §8 A1: recipe-status.json is DERIVED from shape.py
      # RECIPE_STATUS (SSOT) and consumed by the Go tenant-api via go:embed.
      # Edit a recipe status but forget `make recipe-status-json` → fail here.
      - name: "recipe-status.json matches RECIPE_STATUS SSOT (HARD gate — #741 #6)"
        run: python scripts/tools/dx/gen_recipe_status_json.py --check

  iac-helm-sast:
    # Container/k8s SAST Layers 2 + 4 (#448 / TRK-312 + TRK-314).
    #   L2 (Helm template): renders 10 charts via helm + kube-linter (~1-2 min).
    #   L4 (raw k8s): kube-linter on k8s/ raw manifests (no render, ~3-5s).
    # Both run in this one job because they share the kube-linter engine setup
    # below; dedicated (not folded into Lint) so the slow render doesn't gate
    # the fast Lint job. helm comes from setup-helm; kube-linter is installed
    # as a binary (best-effort) with the wrapper's Docker fallback as backstop.
    # AC5: this job is the Critical->BLOCK gate for L2+L4 — add it to branch
    # protection required checks (see docs/internal/iac-lint-baseline.md).
    name: Container SAST (Helm L2 + raw k8s L4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      # Download-cache for the kube-linter tarball (see the Lint job's
      # hadolint step for the pattern rationale): versioned filename +
      # always-on SHA-256 verification. Keep the version in the key in sync
      # with KL below — a stale key exact-hits the old entry and the new
      # versioned file never gets saved into it, so the job re-downloads
      # every run until the key is fixed (correctness unaffected; only the
      # cache benefit is lost).
      - name: Cache pinned binary downloads (kube-linter)
        uses: actions/cache@v5
        with:
          path: ~/.cache/vibe-dl-kube-linter
          key: ${{ runner.os }}-vibe-dl-kube-linter-v0.7.4

      - name: Set up kube-linter (best-effort; wrapper falls back to Docker)
        # Pin matches KUBE_LINTER_VERSION in scripts/tools/lint/check_iac_helm.py
        # + .kube-linter.yaml expectations. If the download ever 404s, the
        # wrapper's `docker run stackrox/kube-linter` fallback still runs Mode B.
        run: |
          KL=v0.7.4
          # Pinned SHA-256 of kube-linter-linux.tar.gz @ v0.7.4. This release
          # publishes a cosign .sig but NO sha256 file, so the digest is pinned
          # here (TOFU) rather than fetched. Like the pint step, this is best-effort:
          # a download failure OR a checksum mismatch falls through to the wrapper's
          # Docker fallback (the helper still emits a ::error:: annotation on a
          # mismatch, so a tampered binary is surfaced and never executed here).
          # Download to /tmp; mkdir+mv into the cache dir ONLY on full curl
          # success: the surrounding `if` swallows a curl failure, so the job
          # — and the cache post-save — can go green around a flake; keeping
          # the dir absent until success means the post-save no-ops (missing
          # path) instead of freezing an empty entry under an exact-hit key.
          KL_SHA256=1d050a5d03e3347cc1cf5b1513f646709c65d129f7aa6c2b1a6388ffb2694671
          DL="$HOME/.cache/vibe-dl-kube-linter"
          if { [ -f "$DL/kube-linter-${KL}.tar.gz" ] \
                || { curl -fsSL -o /tmp/kl.tar.gz.part \
                       "https://github.com/stackrox/kube-linter/releases/download/${KL}/kube-linter-linux.tar.gz" \
                     && mkdir -p "$DL" \
                     && mv /tmp/kl.tar.gz.part "$DL/kube-linter-${KL}.tar.gz"; }; } \
              && bash scripts/ops/_verify_download.sh "$DL/kube-linter-${KL}.tar.gz" "$KL_SHA256"; then
            tar -xzf "$DL/kube-linter-${KL}.tar.gz" -C /tmp
            sudo install -m0755 /tmp/kube-linter /usr/local/bin/kube-linter
            kube-linter version
          else
            echo "::warning::kube-linter binary unavailable/unverified; check_iac_helm.py uses the Docker fallback"
          fi

      - name: Run Container SAST Layer 2 (Helm)
        run: python3 scripts/tools/lint/check_iac_helm.py --ci

      - name: Install PyYAML (L4 PSS namespace-label rule, #1018)
        # The native PSS rule in check_k8s_manifests.py parses manifests with
        # PyYAML; setup-python builds don't bundle it. Without this the rule
        # degrades to an explicit WARN (never a silent skip) — installing it
        # here makes the informational findings actually visible in CI logs.
        run: python3 -m pip install --quiet pyyaml -c requirements/ci-constraints.txt

      - name: Run Container SAST Layer 4 (raw k8s manifests)
        # Real layer (NOT a stub): k8s/ holds 42 raw manifests. kube-linter
        # over the tree, reusing L2's severity + a (path, check) exemption
        # registry. 0 Critical / baseline-High exempt -> exit 0; a new Critical
        # or unregistered High -> exit 1 (fails this required-check job).
        # Also runs the native, WARN-only PSS namespace-label rule (#1018).
        run: python3 scripts/tools/lint/check_k8s_manifests.py --ci

  python-tests-run:
    # CI-ROI 6C: renamed from the required-check name "Python Tests
    # (3.13)" — that name is now reported by the always-run python-tests
    # gate job below (same pattern as go-tests), so this job can be
    # path-skipped without ever leaving the required check un-reported.
    name: Python Tests — run (${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed == 'true'
    # Least-privilege token (CodeQL: workflow-missing-permissions, same
    # class as the Go split jobs): tests + coverage-artifact upload need
    # nothing beyond repo read.
    permissions:
      contents: read
    strategy:
      matrix:
        python: ["3.13"]
      fail-fast: false
    # Fail-closed signal for the #908 mtail compile gate (guard against silent
    # disarmament): this job INSTALLS mtail below, so if mtail is missing at pytest
    # time the Install step regressed — test_mtail_present_when_required then FAILS
    # instead of letting the gated compile tests silently skip. Jobs that
    # legitimately run pytest without mtail (validate.yaml) don't set this.
    env:
      VIBE_REQUIRE_MTAIL: "1"
      # Same fail-closed pattern for docker-gated tests (amtool routing
      # tests, in-flight on a sibling branch): ubuntu-latest ships docker,
      # so if docker is missing at pytest time the runner image regressed —
      # the guard test then FAILS instead of letting docker-gated tests
      # silently skip. No-op until the consumer test lands (nothing reads
      # this env var on this branch yet — verified by grep).
      VIBE_REQUIRE_DOCKER: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # Helm chart invariant tests (tests/shared/test_helm_*.py) are gated
      # on `helm` being on PATH (shutil.which); without it they SILENTLY
      # SKIP in CI — the whole #539/#566 chart-test suite (NetworkPolicy
      # lockdown, VRL demux rules, buffer guards, egress allowlist, etc.)
      # would provide zero CI coverage. setup-helm makes them real gates.
      - name: Set up Helm
        uses: azure/setup-helm@v4

      # Vector CLI — same rationale as setup-Helm above. The ADR-021 #609
      # projection AC behavior gate (tests/shared/test_vector_projection_vrl.py
      # TestVectorValidateAndTest: `vector validate` + `vector test` proving
      # fail-closed tenant isolation, topology strip, parse-error→0:0) is gated
      # on `vector` being on PATH (shutil.which); without it those 3 SILENTLY
      # SKIP and the security-critical fan-out behavior gets zero CI coverage.
      # Pinned + checksum-verified, mirroring the promtool install above.
      #
      # Download-cache for the 2 pinned tarballs this job curls every run
      # (Vector ~50 MB is the single largest CI download; see the Lint job's
      # hadolint step for the pattern rationale). Versioned filenames +
      # always-on SHA-256 verification: a poisoned entry fails the job, an
      # old binary is never silently used. Keep the versions in the key in
      # sync with VECTOR_VERSION / MTAIL_VERSION below — a stale key
      # exact-hits the old entry and the new versioned files never get saved
      # into it, so the job re-downloads every run until the key is fixed
      # (correctness unaffected; only the cache benefit is lost). Both
      # installs here are HARD steps, so a download flake fails the job and
      # the post-save never captures a partial entry.
      - name: Cache pinned binary downloads (Vector / mtail)
        uses: actions/cache@v5
        with:
          path: ~/.cache/vibe-ci-downloads
          key: ${{ runner.os }}-vibe-dl-pytests-vector-0.55.0-mtail-3.0.8

      - name: Install Vector
        run: |
          VECTOR_VERSION=0.55.0
          # Pinned SHA-256 of vector-0.55.0-x86_64-unknown-linux-gnu.tar.gz (upstream SHA256SUMS).
          VECTOR_SHA256=e0221681b1cd1f93c46008fde19c5ac5811718d10a803a4e320ff4e72ab9e4a9
          DL="$HOME/.cache/vibe-ci-downloads"
          mkdir -p "$DL"
          if [ ! -f "$DL/vector-${VECTOR_VERSION}.tgz" ]; then
            curl -fsSL "https://github.com/vectordotdev/vector/releases/download/v${VECTOR_VERSION}/vector-${VECTOR_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o "$DL/vector-${VECTOR_VERSION}.tgz"
          fi
          bash scripts/ops/_verify_download.sh "$DL/vector-${VECTOR_VERSION}.tgz" "$VECTOR_SHA256"
          tar xzf "$DL/vector-${VECTOR_VERSION}.tgz" -C /tmp
          sudo cp /tmp/vector-x86_64-unknown-linux-gnu/bin/vector /usr/local/bin/
          vector --version

      # mtail CLI — same rationale as the Vector / Helm installs above. The #908
      # mtail-compile gate (tests/shared/test_federation_audit_mtail.py) compiles
      # helm/federation-gateway/files/federation-audit.mtail under the SAME mtail
      # the audit-sidecar deploys (3.0.8) — a syntax / type regression in the
      # program would otherwise surface only as a sidecar CrashLoop at deploy, not
      # in CI. Gated on `mtail` on PATH (shutil.which) → without this install the
      # gate SILENTLY SKIPS. Pinned + checksum-verified (identical digest to
      # helm/federation-gateway/audit-sidecar/Dockerfile).
      - name: Install mtail
        run: |
          MTAIL_VERSION=3.0.8
          # sha256 of mtail_3.0.8_linux_amd64.tar.gz (upstream release
          # checksums.txt); identical pin to audit-sidecar/Dockerfile.
          MTAIL_SHA256=123c2ee5f48c3eff12ebccee38befd2233d715da736000ccde49e3d5607724e4
          DL="$HOME/.cache/vibe-ci-downloads"
          mkdir -p "$DL"
          if [ ! -f "$DL/mtail-${MTAIL_VERSION}.tgz" ]; then
            curl -fsSL "https://github.com/google/mtail/releases/download/v${MTAIL_VERSION}/mtail_${MTAIL_VERSION}_linux_amd64.tar.gz" -o "$DL/mtail-${MTAIL_VERSION}.tgz"
          fi
          bash scripts/ops/_verify_download.sh "$DL/mtail-${MTAIL_VERSION}.tgz" "$MTAIL_SHA256"
          tar xzf "$DL/mtail-${MTAIL_VERSION}.tgz" -C /tmp mtail
          sudo install -m0755 /tmp/mtail /usr/local/bin/mtail
          mtail --version 2>&1 | head -n1 || true
          command -v mtail

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py${{ matrix.python }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py${{ matrix.python }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        # pytest-timeout: per-test wall-clock timeout to fast-fail
        # hangs (e.g. PR #165 deadlock-regression tests assert
        # _batch_cat_blobs returns; without pytest-timeout the test
        # would hang for the full CI workflow timeout if regressed)
        # pytest-xdist: parallelize across runner vCPUs. ubuntu-latest
        # has 4 vCPUs; local benchmark on 16-core showed 3.95x at -n
        # auto (160s -> 40s) and 2.51x at -n 4 (160s -> 63s). CI uses
        # -n auto which resolves to 4 here.
        # pathspec: check_iac_vibe_rules.py (Container SAST L1, #448/TRK-311)
        # uses it for .dockerignore baseline matching; its unit tests import
        # the module, so the dep must be explicit here (not relied on
        # transitively).
        # jsonschema: waveform_compile.py (ADR-030 fault-waveform packs) —
        # without it tests/dx/test_waveform_compile.py importorskips and the
        # governance-gate negative tests silently drop out of CI.
        run: pip install pyyaml croniter pytest pytest-cov pytest-timeout pytest-xdist promql-parser hypothesis pathspec jsonschema -c requirements/ci-constraints.txt

      - name: Collect tests
        # CI skips 3 slow/benchmark test suites for speed:
        #   test_property.py     — Hypothesis property-based tests (@slow)
        #   test_benchmark.py    — Performance baselines (@benchmark @slow)
        #   test_pipeline_integration.py — End-to-end pipeline test
        # These run locally via `make test` and are tracked in test-map.md.
        run: pytest tests/ scripts/tools/ --ignore=tests/shared/test_property.py --ignore=tests/ops/test_benchmark.py --ignore=tests/shared/test_pipeline_integration.py --ignore=tests/federation-e2e --tb=short -q --co -q

      - name: Run pytest with coverage
        # Coverage source is defined in pyproject.toml [tool.coverage.run]
        # Do NOT use --cov=<path> here — it overrides pyproject.toml source list
        # and would silently exclude components/da-tools/app from measurement.
        # -n auto: parallel execution via pytest-xdist (see Install step).
        # -x: explicit CI fail-fast (pyproject addopts no longer carries a
        # global -x — CI opts in on the command line).
        # --timeout=300: pytest-timeout was INSTALLED (see Install step
        # rationale re PR #165 deadlock regressions) but never armed
        # globally — a hung test still burned the whole workflow timeout.
        # 300s is a per-test backstop (the entire CI suite finishes in a
        # few minutes under -n auto; slow suites are --ignore'd); tighter
        # per-test @pytest.mark.timeout marks still override it. Command
        # line only, NOT pyproject addopts: local devs don't necessarily
        # have pytest-timeout installed, and an addopts flag from a missing
        # plugin makes bare `pytest` die with "unrecognized arguments".
        run: pytest tests/ --ignore=tests/shared/test_property.py --ignore=tests/ops/test_benchmark.py --ignore=tests/shared/test_pipeline_integration.py --ignore=tests/federation-e2e -x --tb=short --timeout=300 -n auto --cov --cov-report=xml --cov-fail-under=75

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          retention-days: 7

  python-tests:
    # Aggregation gate mirroring go-tests below: keeps reporting the
    # EXACT branch-protection required-check name "Python Tests (3.13)"
    # on every PR/push, whether the run job ran or was path-skipped.
    # Semantics (CI-ROI 6C):
    #   - run job succeeded              → PASS
    #   - run job skipped AND detect-changes said python not needed
    #                                    → PASS (skip-as-not-needed)
    #   - run job failed/cancelled, or skipped while detect said needed,
    #     or detect-changes itself did not succeed
    #                                    → FAIL (fail-closed: a broken
    #     detect job must never let tests silently skip to green).
    # If the Python matrix ever grows beyond 3.13, update this static
    # name together with the branch-protection entry (owner action).
    name: Python Tests (3.13)
    runs-on: ubuntu-latest
    # Pure result-aggregation gate — touches no repo content, needs no token.
    permissions: {}
    needs: [detect-changes, python-tests-run]
    # always(): without it a failed/skipped dependency SKIPS this job, and
    # a skipped check would satisfy branch protection unconditionally —
    # the gate must decide pass/fail itself.
    if: always()
    steps:
      - name: Verify Python test job succeeded or was skipped as not-needed
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          PY_CHANGED: ${{ needs.detect-changes.outputs.python_changed }}
          RUN_RESULT: ${{ needs.python-tests-run.result }}
        run: |
          echo "detect-changes: $DETECT_RESULT (python_changed=$PY_CHANGED)"
          echo "python-tests-run: $RUN_RESULT"
          if [ "$DETECT_RESULT" != "success" ]; then
            echo "::error::detect-changes did not succeed — refusing to treat skipped tests as green"
            exit 1
          fi
          if [ "$RUN_RESULT" = "success" ]; then
            exit 0
          fi
          if [ "$RUN_RESULT" = "skipped" ] && [ "$PY_CHANGED" != "true" ]; then
            echo "Python tests skipped: no Python-relevant paths changed."
            exit 0
          fi
          echo "::error::Python test job did not succeed (result=$RUN_RESULT)"
          exit 1

  # CI-ROI split: the former monolithic go-tests job serialized
  # threshold-exporter `go test -race`, tenant-api `go test -race`, the swag
  # OpenAPI drift check AND the schemathesis contract test in one ~10 min
  # job — the single long pole of the whole CI run. The two module test
  # suites share nothing at runtime, so they now run as two parallel jobs;
  # the `go-tests` gate job below keeps reporting the historical
  # "Go Tests (1.26)" check name for branch protection.
  go-tests-threshold-exporter:
    name: Go Tests — threshold-exporter (${{ matrix.go }})
    runs-on: ubuntu-latest
    # CI-ROI 6C: path-gated — the go-tests aggregate gate below (the
    # required check) treats this skip as PASS only when detect-changes
    # said Go was not needed.
    needs: detect-changes
    if: needs.detect-changes.outputs.go_changed == 'true'
    # Least-privilege token (CodeQL: workflow-missing-permissions). Tests +
    # coverage-artifact upload need nothing beyond repo read.
    permissions:
      contents: read
    strategy:
      matrix:
        go: ["1.26"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Cache Go modules + build cache
        # Module cache (~/go/pkg/mod) is the primary key; build cache rides
        # along. Key is shared with the tenant-api split job (same go.sum
        # hash) so both restore the same warm cache.
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-
            ${{ runner.os }}-go-

      # ci_flake_retry.py (TRK-010) needs pyyaml to parse flaky-tests.yaml.
      # ubuntu-latest ships python3 but not always pyyaml; install only
      # if missing (no-op on most runners since python3-yaml is widely
      # pre-installed). Apt is faster than pip for this single dep.
      - name: Install pyyaml for flake-retry wrapper
        run: |
          if ! python3 -c 'import yaml' 2>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends python3-yaml
          fi

      - name: Run threshold-exporter tests with race detector
        working-directory: components/threshold-exporter/app
        # Wrapped with ci_flake_retry.py (TRK-010, PR #325): consults
        # `flaky-tests.yaml` registry to retry only the listed tests; any
        # unlisted failure fails immediately (regression doesn't get
        # masked by retry). Pass-through behavior is identical when all
        # tests pass on first try, which is the normal case.
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/ops/ci_flake_retry.py" -- \
            go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-go${{ matrix.go }}-threshold-exporter
          path: components/threshold-exporter/app/coverage.out
          retention-days: 7

  go-tests-tenant-api:
    name: Go Tests — tenant-api (${{ matrix.go }})
    runs-on: ubuntu-latest
    # CI-ROI 6C: path-gated (see go-tests-threshold-exporter note).
    needs: detect-changes
    if: needs.detect-changes.outputs.go_changed == 'true'
    # Least-privilege token (CodeQL: workflow-missing-permissions). Tests,
    # swag drift check and schemathesis all run against the local checkout.
    permissions:
      contents: read
    strategy:
      matrix:
        go: ["1.26"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Cache Go modules + build cache
        # path expanded to include ~/.cache/go-build so `go install swag@latest`
        # below benefits from a warm build cache on cache-hit runs (saves ~5-8s
        # on the swag CLI install step). Module cache (~/go/pkg/mod) is the
        # primary key; build cache rides along.
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-
            ${{ runner.os }}-go-

      # ci_flake_retry.py (TRK-010) needs pyyaml to parse flaky-tests.yaml.
      - name: Install pyyaml for flake-retry wrapper
        run: |
          if ! python3 -c 'import yaml' 2>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends python3-yaml
          fi

      - name: Run tenant-api tests with race detector
        working-directory: components/tenant-api
        # Exclude ./docs: swag-generated package that imports github.com/swaggo/swag
        # (not a go.mod dependency). Only cmd/... and internal/... contain testable code.
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/ops/ci_flake_retry.py" -- \
            go test ./cmd/... ./internal/... -race -count=1 -coverprofile=coverage.out

      # #616: the forge_e2e real-forge E2E package is build-tag gated, so the
      # regular `go test ./...` above never compiles it. This step keeps it from
      # rotting (compile under the tag) AND asserts skip-safety: with no E2E_*
      # env in CI, every scenario must SKIP — never reaching a live forge. The
      # real runs are the nightly GitLab CE workflow + scripts/ops/forge_e2e_run.sh.
      - name: Compile-check forge_e2e package (build-tag gated)
        working-directory: components/tenant-api
        run: go test -tags forge_e2e -count=1 ./test/forgee2e/...

      # TRK-221 (#226): Verify generated OpenAPI spec is in sync
      # with the swag annotations in handler/*. Drift = annotation
      # changed but `make api-docs` not run + committed.
      - name: Install swag CLI
        # Pinned (was @latest) — swag generates swagger.json, which feeds
        # both the api-docs drift check AND the schemathesis contract test;
        # a swag bump could silently drift the spec (#1158). Keep in sync
        # with the Makefile api-docs target's pin (check_unpinned_deps gate).
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Generate OpenAPI spec from swag annotations
        working-directory: components/tenant-api
        run: swag init -g cmd/server/main.go -o ./docs --parseInternal --parseDependency

      - name: Verify OpenAPI spec is up-to-date (drift check)
        run: |
          if ! git diff --exit-code components/tenant-api/docs/; then
            echo "::error::OpenAPI spec drift detected. Run 'make api-docs' locally and commit components/tenant-api/docs/."
            exit 1
          fi

      # TRK-228 (#242): schemathesis contract test against the spec.
      # Builds tenant-api, starts on a random port, fuzzes ALL methods
      # (writes land in the runner's throwaway git-repo fixture) with
      # response_schema + status_code + content_type conformance checks.
      # CONTRACT_MAX_EXAMPLES=5 keeps CI runtime ~30-60s. The runner already
      # has timeout=600 + auth headers (X-Forwarded-Email/-Groups).
      - name: Cache pip packages (schemathesis)
        # Saves ~5-7s on the schemathesis install step on cache-hit runs.
        # The Lint and Python Tests jobs already have pip cache; this brings
        # parity to the Go Tests job which transitively pip-installs.
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          # Key on the pinned-requirements hash so the cache invalidates
          # automatically whenever the schemathesis pin is bumped (#1158),
          # instead of relying on a manual -vN suffix bump.
          key: ${{ runner.os }}-pip-go-tests-schemathesis-${{ hashFiles('tests/contract/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-go-tests-
            ${{ runner.os }}-pip-

      - name: Install schemathesis
        # Pinned version — see tests/contract/requirements.txt (#1158).
        run: pip install -r tests/contract/requirements.txt

      - name: Run schemathesis contract tests
        env:
          CONTRACT_MAX_EXAMPLES: "5"
        run: python3 tests/contract/run_contract_tests.py

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-go${{ matrix.go }}-tenant-api
          path: components/tenant-api/coverage.out
          retention-days: 7

  go-tests-am-inhibit:
    name: Go Tests — alertmanager inhibit semantics
    runs-on: ubuntu-latest
    # CI-ROI 6C: path-gated (see go-tests-threshold-exporter note). The
    # go filter includes k8s/03-monitoring/** + try-local/** because this
    # leg parses both hand-written Alertmanager configs.
    needs: detect-changes
    if: needs.detect-changes.outputs.go_changed == 'true'
    # Evaluates the two HAND-WRITTEN Alertmanager configs against Alertmanager's
    # own matcher implementation (#1132: amtool check-config is green on an
    # inhibit rule that silently eats notifications). Pure file parsing — no
    # services, no network beyond the module download, ~1s.
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Cache Go modules + build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          # Own key: this module's go.sum shares nothing with the two component
          # modules, so it must not collide with their warm cache.
          key: ${{ runner.os }}-go-am-inhibit-${{ hashFiles('tests/alertmanager-inhibit/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-am-inhibit-

      - name: Run Alertmanager inhibit-semantics tests
        working-directory: tests/alertmanager-inhibit
        run: go test ./... -count=1

  go-tests:
    # Aggregation gate for the split Go jobs above. The job name is kept
    # EXACTLY "Go Tests (1.26)" — the check name the former matrix job
    # reported — because branch protection required_status_checks matches by
    # check-run name: if this name stopped being reported, any PR would hang
    # forever on a permanently-pending required check (same failure class as
    # the validate.yaml banner comment). If the Go matrix ever grows beyond
    # 1.26, update this static name together with the branch-protection
    # entry (owner action).
    #
    # New split jobs join HERE rather than getting their own required check:
    # branch protection is owner-managed, so a new required name would sit
    # permanently pending until the owner adds it. Aggregating keeps the gate
    # enforcing from the first green run.
    name: Go Tests (1.26)
    runs-on: ubuntu-latest
    # Pure result-aggregation gate — touches no repo content, needs no token.
    permissions: {}
    needs: [detect-changes, go-tests-threshold-exporter, go-tests-tenant-api, go-tests-am-inhibit]
    # always(): without it a failed dependency SKIPS this job, and a skipped
    # check would satisfy branch protection — the gate must FAIL, not skip,
    # when any split job fails.
    if: always()
    steps:
      - name: Verify all Go test jobs succeeded (or were path-skipped as not-needed)
        # CI-ROI 6C semantics (mirrors the python-tests gate):
        #   success                                → PASS
        #   skipped AND detect said go not needed  → PASS
        #   anything else (failure/cancelled, or skipped while detect said
        #   needed, or detect-changes itself not green) → FAIL. A broken
        #   detect job must never let tests silently skip to green.
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          GO_CHANGED: ${{ needs.detect-changes.outputs.go_changed }}
          R_TE: ${{ needs.go-tests-threshold-exporter.result }}
          R_TA: ${{ needs.go-tests-tenant-api.result }}
          R_AM: ${{ needs.go-tests-am-inhibit.result }}
        run: |
          echo "detect-changes:     $DETECT_RESULT (go_changed=$GO_CHANGED)"
          echo "threshold-exporter: $R_TE"
          echo "tenant-api:         $R_TA"
          echo "am-inhibit:         $R_AM"
          if [ "$DETECT_RESULT" != "success" ]; then
            echo "::error::detect-changes did not succeed — refusing to treat skipped tests as green"
            exit 1
          fi
          for r in "$R_TE" "$R_TA" "$R_AM"; do
            if [ "$r" = "success" ]; then
              continue
            fi
            if [ "$r" = "skipped" ] && [ "$GO_CHANGED" != "true" ]; then
              continue
            fi
            echo "::error::a Go test job did not succeed (result=$r)"
            exit 1
          done
          echo "Go test gate satisfied."

  portal-tests-run:
    # TECH-DEBT-030a (#247): Vitest unit tests + esbuild build verification
    # for portal JSX tools. Foundation PR creates the harness with empty
    # manifest; subsequent PRs (TRK-230b..f) add tools to the manifest as
    # they migrate to ESM.
    #
    # CI-ROI: path-gated (mirrors the go-tests / python-tests split) so it does
    # not burn ~1 min on PRs that touch no portal file. The REQUIRED check is
    # the "Portal Tests" AGGREGATE GATE below (job key `portal-tests`), NOT this
    # job — a required check matched to a path-gated job would sit permanently
    # pending whenever it path-skips.
    name: Portal Tests Run
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.portal_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        # Pinned to Node 24 to match the dev container (where `make
        # portal-build` produces the committed dist). Keeping CI and the
        # canonical build env on the SAME major removes node/npm version as
        # a variable in the dist-reproducibility gate below — a fresh
        # `npm ci` under a different npm major can resolve a transitive dep
        # differently and re-hash a shared chunk, false-redding the gate.
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tools/portal/package-lock.json

      - name: Install dependencies
        working-directory: tools/portal
        run: npm ci

      - name: Verify portal build (manifest may be empty)
        working-directory: tools/portal
        run: npm run build

      - name: Verify committed dist matches fresh build (no stale dist)
        # Root-cause guard for repo-wide dist staleness (TRK-239 / #444):
        # production loads committed docs/assets/dist/ and mkdocs-deploy does
        # NOT rebuild, so a source change that never re-runs `make portal-build`
        # silently never reaches prod. build.mjs cleans + re-emits the dir, so
        # any drift (modified bundle, renamed chunk, orphan) shows as a staged
        # diff here. Build is byte-reproducible across the dev container and CI
        # (esbuild 0.24.2 linux-x64, pinned via package-lock) because both run
        # the SAME Node major (24) — so this gate does not false-red.
        run: |
          git add -A docs/assets/dist
          if ! git diff --cached --quiet -- docs/assets/dist; then
            echo "::error::docs/assets/dist/ is out of sync with source. Run 'make portal-build' in the dev container and commit the rebuilt bundles."
            git diff --cached --stat -- docs/assets/dist
            exit 1
          fi

      - name: Enforce portal bundle size budget (TRK-232a)
        # Per-tool 100 KB / shared chunk 200 KB / total 4 MB.
        # Calibrated headroom over current sizes — catches accidents
        # (full lodash bundle, etc.) without chasing micro-optimization.
        run: python3 scripts/tools/lint/check_portal_bundle_size.py --ci

      - name: Run Vitest unit tests
        working-directory: tools/portal
        run: npm run test

  portal-tests:
    # Aggregation gate for the path-gated portal-tests-run job above. The job
    # name is kept EXACTLY "Portal Tests" — the check-run name that branch
    # protection matches on — so it ALWAYS reports (even when the run job
    # path-skips) and CAN be made a required status check without the
    # permanently-pending deadlock a skipped path-gated required check causes.
    # Mirrors the go-tests / python-tests aggregation gates. If this name ever
    # changes, update the branch-protection required-checks entry together
    # (owner action). New portal test jobs should join HERE (add to needs +
    # the loop) rather than each getting their own required check.
    name: Portal Tests
    runs-on: ubuntu-latest
    # Pure result-aggregation gate — touches no repo content, needs no token.
    permissions: {}
    needs: [detect-changes, portal-tests-run]
    # always(): without it a skipped/failed dependency would SKIP this job, and
    # a skipped check would satisfy branch protection — the gate must run and
    # FAIL, not skip, when the run job did not succeed.
    if: always()
    steps:
      - name: Verify the portal test job succeeded (or was path-skipped as not-needed)
        # Mirrors the go-tests gate semantics exactly:
        #   success                                    → PASS
        #   skipped AND detect said portal not needed  → PASS
        #   anything else (failure/cancelled, or skipped while detect said
        #   needed, or detect-changes itself not green) → FAIL. A broken detect
        #   job must never let the test silently skip to green.
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          PORTAL_CHANGED: ${{ needs.detect-changes.outputs.portal_changed }}
          R_PORTAL: ${{ needs.portal-tests-run.result }}
        run: |
          echo "detect-changes:   $DETECT_RESULT (portal_changed=$PORTAL_CHANGED)"
          echo "portal-tests-run: $R_PORTAL"
          if [ "$DETECT_RESULT" != "success" ]; then
            echo "::error::detect-changes did not succeed — refusing to treat a skipped portal test as green"
            exit 1
          fi
          if [ "$R_PORTAL" = "success" ]; then
            echo "Portal test gate satisfied."
            exit 0
          fi
          if [ "$R_PORTAL" = "skipped" ] && [ "$PORTAL_CHANGED" != "true" ]; then
            echo "Portal test gate satisfied (path-skipped as not-needed)."
            exit 0
          fi
          echo "::error::the portal test job did not succeed (result=$R_PORTAL)"
          exit 1

  lint-docs:
    name: Lint Documentation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # make lint-docs runs validate_all.py --only ...,changelog,...
          # which calls generate_changelog.py --check, which walks
          # `<latest-tag>..HEAD` via git-describe. The default
          # fetch-depth: 1 shallow clone has no tags, so it falls
          # back to reading the single PR merge commit (auto-generated
          # by GitHub, not a conventional commit) and fails. Same root
          # cause as the Lint job fix in #9 — apply it here too.
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-docs-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-docs-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install pyyaml -c requirements/ci-constraints.txt

      - name: Check platform-data integrity
        run: python3 scripts/tools/dx/generate_platform_data.py --check

      - name: Lint documentation
        run: make lint-docs

  federation-e2e:
    name: Federation E2E (ADR-020 IV-2j)
    runs-on: ubuntu-latest
    # Dedicated job — the docker-compose federation request-path E2E
    # (#516). Runs parallel to the lint/unit jobs; it is NOT part of
    # `make test` / pre-commit and is excluded from the coverage gate.
    # The job only reads the repo (checkout -> render -> compose ->
    # pytest); cap GITHUB_TOKEN accordingly (CodeQL actions/missing-
    # workflow-permissions).
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # The runner is self-contained — it builds its own venv and runs
      # every Python step (render-extract, keygen, pytest) inside it.
      - name: Run federation E2E
        run: bash scripts/ops/federation_e2e_run.sh
