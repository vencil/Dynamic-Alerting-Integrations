name: Bench Gate (PR-time, Tier 1)

# Phase 2 — Tier 1 of bench gating redesign (issue #433, supersedes #67).
#
# Purpose: catch performance regression introduced BY THIS PR vs its merge-base.
# This is the "blame attribution correct" tier — answers the question
# "did this specific diff make things slower?" rather than "is main slower
# than the last release?" (that's Tier 2's job; release-time-only).
#
# Wall-time + reliability history:
#   - v1 (PR #435): parallel base+pr matrix → ~11 min wall, 2 runners.
#     Worked but found later to be inconsistent due to heterogeneous CPU
#     pool (AMD EPYC / Intel Xeon randomly assigned).
#   - v2 (PR #437): sharded base+pr into 3 shards × 2 sides = 6 runners.
#     Wall dropped to ~4-5 min but INCONCLUSIVE rate spiked to ~98%
#     because P(6 runners same CPU) ≈ 1.7% with the observed 3-CPU pool.
#   - v3/v4 (PR #440): added Ghost-Green race + Blanket-Immunity defenses
#     + INCONCLUSIVE enforcement on hetero CPU (closed silent false-neg).
#     Correct gate behavior surfaced the structural sharding problem.
#   - v5 (this file, PR #444): single-runner sequential bench.
#     P(homogeneous CPU) = 100% by construction (same VM for both runs).
#     Wall back up to ~20 min but DETERMINISTIC vs v2's stochastic re-runs.
#     Eliminates INCONCLUSIVE entirely. Cache-warmth bias between base/pr
#     bench mitigated by `drop_caches` between the two runs. CI minutes
#     same as v1 (~20 min total).
#
# Why this is the right design on free-tier runners:
#   - GH-hosted ubuntu-latest pool is heterogeneous (AMD EPYC 7763,
#     AMD EPYC 9V74, Intel Xeon 8370C observed). Any horizontally-
#     sharded design has structurally-low P(all-same-CPU) and gets
#     stuck on INCONCLUSIVE.
#   - Sequential same-runner has perfect CPU homogeneity by definition.
#   - Temporal locality on a single VM (10-min window) yields lower
#     noise floor than cross-VM comparison.
#   - The wall-time loss vs sharded is acceptable in exchange for
#     deterministic ~20 min vs stochastic 4-min-or-stuck.
#
# Override + governance defenses (UNCHANGED from v4):
#   - Override label `override: bench-regress-ok` (admin/maintain only)
#   - Event-scoped honor: skip honored ONLY on `labeled` event with our
#     specific label name AND admin/maintain sender role. Per-event,
#     per-commit-state semantics. Companion bench-override-audit.yaml
#     enforces role + auto-strips stale label on synchronize.
#   - Gemini round-7 (Ghost Green) + round-8 (Blanket Immunity) defenses
#     remain via the preflight check_override step.
#
# Regression detection (alpha + magnitude UNCHANGED from v4; metric scope
# added in #608):
#   - benchstat `-alpha=0.01` (NOT `-confidence` — that's the geomean CI
#     width knob, not the per-bench significance threshold).
#   - Plus magnitude floor: only fail on `|Δ| ≥ 5%`. Free-tier within-run
#     noise is ~1-3% — pure statistical significance is too sensitive
#     when noise exceeds the effect size.
#   - The 5% floor is tightenable to 3% when Larger Runners are adopted
#     (Tier 1 hardware-floor escalation path per bench-gate-rollout.md).
#   - Metric scope (#608): `-filter` restricts detection to deterministic
#     per-op metrics (sec/op, B/op, allocs/op). Non-deterministic process-
#     level custom metrics (MB-sys, MB-heap-after-gc) are GC high-water
#     noise that false-RED real Go PRs — excluded. See the Compare step.
#
# See: issue #433, issue #67 (closed/superseded), bench-record.yaml (nightly),
#      memory feedback `feedback_github_actions_workflow_gotchas.md`
#      (Traps 7-12 codify the SRE defenses learned across v1-v5).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      # Scope to benchmarkable changes only (issue #433 W3). Watching the
      # whole app dir fired the gate on PRs with no benchmarkable Go delta —
      # e.g. a `.dockerignore` change (#597) or a `*_test.go` deflake (#532),
      # both pure noise that a maintainer had to override. Limit to non-test
      # Go + module files, keeping rule-packs and this workflow's own edits.
      # ORDER-SENSITIVE: GitHub Actions includes a path when a positive
      # pattern matches AND no *later* `!` pattern excludes it, so the
      # `*_test.go` exclusion must follow the `**/*.go` include. `**/*.go`
      # is globstar (zero-or-more dirs), so it also matches non-test `.go`
      # files directly in app/ root (config_parse.go, collector.go, …) —
      # real-perf-PR coverage (e.g. #502) is preserved.
      - 'components/threshold-exporter/app/**/*.go'
      - '!components/threshold-exporter/app/**/*_test.go'
      - 'components/threshold-exporter/app/go.mod'
      - 'components/threshold-exporter/app/go.sum'
      - 'rule-packs/**'
      - '.github/workflows/bench-gate-pr.yaml'

concurrency:
  # Cancel in-flight runs for the same PR (rapid pushes shouldn't queue
  # bench runs; only the latest commit matters).
  group: bench-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # for posting the result comment

jobs:
  # Job 1: cheap preflight. Computes merge-base, checks override label.
  # Outputs feed the bench job.
  preflight:
    name: Preflight (override check + merge-base)
    # Filter out unrelated `labeled` events before spinning up the runner.
    # The workflow trigger includes `[labeled]` so we can honor a freshly-
    # applied override label, but a `labeled` event for some OTHER label
    # (e.g. `bug`, `needs-review`) shouldn't burn ~20 min of bench time —
    # no code changed, the result would be identical to the prior commit's
    # bench-gate run. Skip the whole workflow for those events.
    # [Gemini round-9 redundant-wait catch.]
    if: |
      github.event.action != 'labeled'
      || github.event.label.name == 'override: bench-regress-ok'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check_override.outputs.skip }}
      merge_base_sha: ${{ steps.merge_base.outputs.sha }}
    steps:
      # Override label honor logic — closes Ghost Green race (round-7) and
      # Blanket Immunity Trap (round-8) by event-scoped honor: skip only
      # when (a) THIS event is `labeled`, (b) the label is OUR override,
      # AND (c) the applier (sender on labeled event) has admin or maintain
      # role. Any other event treats the label as absent regardless of
      # whether it's still on the PR.
      - name: Check override label (event-scoped + applier-role verified)
        id: check_override
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_LABEL_NAME: ${{ github.event.label.name }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail

          if [ "$EVENT_ACTION" != "labeled" ]; then
            echo "Event action is '$EVENT_ACTION' (not 'labeled'). Override (if any) ignored."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_LABEL_NAME" != "override: bench-regress-ok" ]; then
            echo "Labeled event was for '$EVENT_LABEL_NAME' (different label). Override (if any) ignored."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The override label was JUST applied in THIS event. Verify role
          # of the applier. On `labeled` events, github.event.sender is the
          # actor who applied the label.
          if permission=$(gh api "repos/$REPO/collaborators/$SENDER/permission" \
                            --jq '.permission' 2>/dev/null); then
            echo "Sender $SENDER role: $permission"
          else
            echo "::warning::Could not fetch role for $SENDER (404 / API error). Treating as unauthorized."
            permission="none"
          fi

          if [ "$permission" = "admin" ] || [ "$permission" = "maintain" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Override accepted — $SENDER ($permission). Valid for THIS run only."
            {
              echo "## Bench Gate — SKIPPED via override label"
              echo ""
              echo "Label applied by \`$SENDER\` (role: \`$permission\`)."
              echo ""
              echo "**Per-event semantics**: This override is valid only for the bench-gate run"
              echo "triggered by this exact \`labeled\` event. Any subsequent push (\`synchronize\`)"
              echo "will force re-evaluation without this skip; the maintainer must re-apply the"
              echo "label after reviewing the new commits if the override should remain in effect."
              echo ""
              echo "Audit trail: this skip is permanently logged on the merge commit."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Override label applied by $SENDER ($permission) — not authorized. Ignoring."
            {
              echo "## Bench Gate — UNAUTHORIZED override ignored"
              echo ""
              echo "Label \`override: bench-regress-ok\` was applied by \`$SENDER\` (role: \`$permission\`),"
              echo "but only \`admin\` or \`maintain\` roles can authorize override. **Label is being ignored**"
              echo "and benches will run normally. The companion \`bench-override-audit.yaml\` workflow"
              echo "should auto-revert this label and post a comment with the proper request flow."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # CRITICAL: fetch-depth: 0 required for `git merge-base`. See
      # comments on the bench-job checkout for the same gotcha.
      - name: Checkout with full history
        if: steps.check_override.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # CRITICAL: compute merge-base ourselves. Two distinct gotchas:
      #
      # (1) Do NOT use origin/<base> HEAD as the base directly — that
      #     would mix in commits that landed on main AFTER the PR
      #     branched, attributing other authors' code to this PR.
      #
      # (2) Do NOT pass `HEAD` to `git merge-base` either. On the
      #     `pull_request` event, actions/checkout checks out a virtual
      #     merge commit (refs/pull/<num>/merge) whose two parents are
      #     (PR_HEAD, origin/<base> CURRENT). Calling `git merge-base
      #     HEAD origin/<base>` returns origin/<base> itself, because
      #     origin/<base> is a direct parent of the virtual merge ←
      #     defeats the Scapegoat Trap defense (Gemini round-3 catch).
      #
      # Correct: pass `${{ github.event.pull_request.head.sha }}`
      # explicitly — the ACTUAL PR head, not the virtual merge node —
      # so `git merge-base` walks back through the PR's commit ancestry
      # to find the true branching point.
      - name: Compute merge-base
        if: steps.check_override.outputs.skip != 'true'
        id: merge_base
        run: |
          base_ref="origin/${{ github.base_ref }}"
          pr_head="${{ github.event.pull_request.head.sha }}"
          base_sha=$(git merge-base "$pr_head" "$base_ref")
          if [ -z "$base_sha" ]; then
            echo "::error::Could not compute merge-base between $pr_head and $base_ref"
            exit 2
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "Merge-base (true PR divergence point): $base_sha"
          echo "  vs $base_ref"
          echo "  vs PR HEAD ($pr_head)"

  # Job 2: single runner sequential bench (base then pr) + compare.
  # See top-of-file comment for the v5 design rationale — the structural
  # answer to GH-hosted runner pool heterogeneity.
  bench:
    name: Bench + Compare (single-runner sequential)
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    # Budget: ~10 min base bench + ~10 min pr bench + ~3 min setup/checkout/
    # benchstat overhead = ~23 min nominal. 40 min cap gives headroom for
    # slow runners + Go module download flakes + Azure pool variance, AND
    # leaves enough buffer for the step summary + fail-gate steps to actually
    # render before a hard-kill. A tighter 30 min budget risks hard-killing
    # mid-output, which leaves the dev with a red check and no diagnostic.
    # [Gemini round-12 timeout-tightrope catch.]
    timeout-minutes: 40
    steps:
      - name: Checkout repo (full history for both base + pr commits)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need history to walk to merge-base

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # Cache BOTH Go module cache AND build cache. The latter ($HOME/.cache/
      # go-build) stores compiled package objects — restoring it saves the
      # 20–40s compile phase of the first `go test -bench`. The second bench
      # (pr) reuses what the first bench (base) added, so its compile is
      # near-instant. Go's build cache is content-addressed; safe across
      # PRs and across the base→pr checkout.
      - name: Cache Go modules + build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-
            ${{ runner.os }}-go-

      - name: Install benchstat (do early; cache the compiled binary)
        run: |
          # @latest acceptable: benchstat output format stable for ~2 years.
          # Pin to a specific version if a future release ever breaks either
          # the regression-detection grep/awk OR the `-filter` benchfilter
          # unit syntax `.unit:(sec/op OR B/op OR allocs/op)` (#608).
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat -h 2>&1 | head -5 || true

      # Stash the bench harness OUTSIDE the checkout so both base and pr
      # benches use the SAME wrapper script regardless of which commit's
      # tree is currently checked out. Without this, a PR that modifies
      # bench_wrapper.sh would cause the base bench to use the old wrapper
      # and the pr bench to use the new one — unfair comparison.
      - name: Stash bench harness (use same version on both sides)
        run: |
          mkdir -p "$RUNNER_TEMP/bench-harness"
          cp scripts/tools/ops/bench_wrapper.sh "$RUNNER_TEMP/bench-harness/"
          cp scripts/tools/ops/bench_filter.go "$RUNNER_TEMP/bench-harness/"
          # bench_wrapper.sh resolves SCRIPT_DIR via BASH_SOURCE; the filter
          # is referenced as $SCRIPT_DIR/bench_filter.go. Keeping them in
          # the same /tmp dir preserves that resolution.

      - name: Checkout merge-base for base bench
        run: git checkout ${{ needs.preflight.outputs.merge_base_sha }}

      - name: Run base benchmark
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bench-out"
          echo "[bench-base] running on commit $(git rev-parse HEAD)"
          cd components/threshold-exporter/app
          BENCH_OUT_DIR="$RUNNER_TEMP/bench-out" \
            bash "$RUNNER_TEMP/bench-harness/bench_wrapper.sh" \
            -bench='_1000(_|$)|MixedMode|Simulate_DeepChain' \
            -benchmem \
            -count=6 \
            -run='^$' \
            -timeout=15m \
            -benchtime=3s \
            ./...
          cp "$RUNNER_TEMP/bench-out/bench.out.txt" \
             "$RUNNER_TEMP/bench-out/bench-base.txt"
          echo "[bench-base] wrote $(wc -l < "$RUNNER_TEMP/bench-out/bench-base.txt") lines"

      # Cache-warmth mitigation: OS page cache holds files read during the
      # base bench; if not flushed, the pr bench gets warm-cache I/O and
      # systematically reports ~1-3% faster than it would on a cold start.
      # drop_caches=3 evicts pagecache + dentries + inodes. GH-hosted
      # runners have passwordless sudo. The `|| echo warning` keeps the
      # workflow running if drop_caches is unavailable (e.g., container
      # ran without proper capabilities) — bias would still be small
      # relative to the 5% magnitude floor, but should be flagged.
      - name: Drop OS caches between base and pr benches
        run: |
          sudo sh -c "sync; echo 3 > /proc/sys/vm/drop_caches" \
            && echo "::notice::OS page cache dropped between base and pr benches" \
            || echo "::warning::drop_caches failed — pr bench may show ~1-3% cache-warmth bias"

      # CRITICAL: clean the workspace before the second checkout.
      # `go test -bench` may modify tracked files (go.sum if a dep resolution
      # changes) or leave untracked files (benchmark temp dirs that didn't
      # clean up). A subsequent `git checkout <other-sha>` then fails with
      # "your local changes would be overwritten by checkout" → step fails,
      # whole gate dies on a Git hygiene issue rather than perf reasons.
      #
      # `git reset --hard HEAD` reverts any tracked-file modifications.
      # `git clean -fd` removes untracked files + directories (NOT ignored;
      # we don't pass -x because gitignored locations like ~/.cache/go-build
      # live in $HOME outside the workspace anyway, and we want to preserve
      # any .build/ contents in case future steps need them — though for v5
      # we write outputs to $RUNNER_TEMP/bench-out, outside the workspace).
      #
      # Safe to nuke aggressively because the bench harness itself is
      # already stashed in $RUNNER_TEMP/bench-harness (see earlier step).
      # [Gemini round-12 dirty-workspace-trap catch.]
      - name: Clean workspace between base and pr bench
        run: |
          git reset --hard HEAD
          git clean -fd
          git status --short || true  # diagnostic for debugging

      - name: Checkout PR head for pr bench
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Run pr benchmark
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bench-out"
          echo "[bench-pr] running on commit $(git rev-parse HEAD)"
          cd components/threshold-exporter/app
          BENCH_OUT_DIR="$RUNNER_TEMP/bench-out" \
            bash "$RUNNER_TEMP/bench-harness/bench_wrapper.sh" \
            -bench='_1000(_|$)|MixedMode|Simulate_DeepChain' \
            -benchmem \
            -count=6 \
            -run='^$' \
            -timeout=15m \
            -benchtime=3s \
            ./...
          cp "$RUNNER_TEMP/bench-out/bench.out.txt" \
             "$RUNNER_TEMP/bench-out/bench-pr.txt"
          echo "[bench-pr] wrote $(wc -l < "$RUNNER_TEMP/bench-out/bench-pr.txt") lines"

      - name: Compare with benchstat
        id: compare
        # IMPORTANT — benchstat has TWO distinct flags that look similar
        # but do entirely different things:
        #
        #   -alpha α       (default 0.05)  → significance threshold for
        #                                    the +/-/~ markers per-bench
        #   -confidence c  (default 0.95)  → width of the displayed
        #                                    geomean ± confidence interval
        #
        # Previous versions used `-confidence=0.99` thinking it tightened
        # regression flagging — IT DID NOT. Use `-alpha=0.01` to actually
        # tighten significance. Plus a 5% magnitude floor (industry-standard
        # dual-threshold) to filter sub-noise FPs. [PR #437 round-6 catch.]
        #
        # METRIC SCOPE — `-filter '.unit:(sec/op OR B/op OR allocs/op)'` [#608].
        # The detector greps the WHOLE benchstat output for `+N% (p<α)` rows,
        # so it must never see non-deterministic metrics. The bench emits
        # process-level custom metrics via b.ReportMetric (MB-sys, MB-heap-
        # after-gc, goroutines, affected-tenants). MB-sys / MB-heap-after-gc
        # are runtime/GC high-water readings that drift randomly BETWEEN
        # processes (sign-flips across runs of identical code) and pseudo-
        # replicate within a -count run → they read as "significant" and
        # false-RED real Go PRs (root cause of #502; corroborated by #459/
        # #606 finding sys_bytes creep is GC pacing, not code). Restrict the
        # gate to DETERMINISTIC per-op work only. benchstat normalizes the
        # time unit ns/op → sec/op, so the allowlist is `sec/op B/op
        # allocs/op`; the OR-separated value list is benchfilter syntax. This
        # allowlist auto-excludes any present/future non-deterministic custom
        # metric. The excluded metrics remain emitted + visible in the nightly
        # bench-record artifact (informational), just not gated.
        run: |
          set -euo pipefail
          benchstat -alpha=0.01 \
            -filter '.unit:(sec/op OR B/op OR allocs/op)' \
            "$RUNNER_TEMP/bench-out/bench-base.txt" \
            "$RUNNER_TEMP/bench-out/bench-pr.txt" \
            | tee "$RUNNER_TEMP/bench-out/benchstat.txt"

          # Fail-loud shape assertion (#611): the detector below greps for
          # `+N% (p=...)` rows AND relies on the `-filter` unit names. benchstat
          # is `@latest`, reinstalled every run — a future release that renames
          # a unit or changes the row format would make every grep miss →
          # regression=false → a GREEN gate that silently masks ALL regressions.
          # The `^cpu:` INCONCLUSIVE check can't catch this (cpu headers survive).
          # Require the filtered comparison to have produced recognizable output:
          # ≥1 metric-section header AND ≥1 per-bench result row, else fail loud.
          if ! grep -Eq 'sec/op|B/op|allocs/op' "$RUNNER_TEMP/bench-out/benchstat.txt"; then
            echo "::error::benchstat output shape changed — no metric-section header (sec/op / B/op / allocs/op) in the filtered comparison. The regression detector may be silently passing; pin benchstat to a known-good version (see the Install benchstat step)."
            exit 1
          fi
          if ! grep -Eq '±[[:space:]]*[0-9]+%' "$RUNNER_TEMP/bench-out/benchstat.txt"; then
            echo "::error::benchstat output shape changed — no per-bench result row (matching '± N%') in the filtered comparison. The regression detector may be silently passing; pin benchstat to a known-good version (see the Install benchstat step)."
            exit 1
          fi

          # Two-tier regression detection (metric scope already applied above
          # via benchstat -filter, so the grep only sees deterministic rows):
          # (1) benchstat already filters by α=0.01 (only `+` rows are
          #     statistically significant slowdowns).
          # (2) We additionally require |Δ| ≥ MAGNITUDE_FLOOR_PCT to
          #     filter out noise-floor false positives.
          # POSIX awk for portability. `|| true` tolerates "no matches"
          # (the happy path — zero regressions) so pipefail doesn't
          # crash the script.
          MAGNITUDE_FLOOR_PCT=5.0
          regressions=$(grep -E '[[:space:]]\+[0-9]+\.[0-9]+%[[:space:]]*\(p=' \
                          "$RUNNER_TEMP/bench-out/benchstat.txt" \
                        | grep -v geomean \
                        | awk -v floor="$MAGNITUDE_FLOOR_PCT" '{
                            if (match($0, /\+[0-9]+\.[0-9]+%/)) {
                              num = substr($0, RSTART + 1, RLENGTH - 2) + 0
                              if (num >= floor) print
                            }
                          }' || true)

          # Defensive INCONCLUSIVE check — single-runner sequential makes
          # this structurally impossible (same VM = same CPU by definition),
          # but the check is kept as defense-in-depth in case anything in
          # the runner provisioning changes. Cost is ~50ms.
          cpu_lines=$(grep -E '^cpu:' "$RUNNER_TEMP/bench-out/benchstat.txt" 2>/dev/null | sort -u || true)
          inconclusive=false
          if [ -n "$cpu_lines" ] && [ "$(echo "$cpu_lines" | wc -l)" -gt 1 ]; then
            inconclusive=true
            cpu_count=$(echo "$cpu_lines" | wc -l)
            echo "::error::Heterogeneous CPUs detected ($cpu_count distinct) IN A SINGLE-RUNNER JOB. This shouldn't be possible; investigate runner provisioning. CPUs observed:"
            echo "$cpu_lines"
            {
              echo "inconclusive_cpus<<__CPUEOF__"
              echo "$cpu_lines"
              echo "__CPUEOF__"
            } >> "$GITHUB_OUTPUT"
          fi
          echo "inconclusive=$inconclusive" >> "$GITHUB_OUTPUT"

          if [ -n "$regressions" ]; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
            {
              echo "regressions<<__EOF__"
              echo "$regressions"
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render step summary
        if: always()
        env:
          REGRESSION: ${{ steps.compare.outputs.regression }}
          REGRESSIONS_LIST: ${{ steps.compare.outputs.regressions }}
          INCONCLUSIVE: ${{ steps.compare.outputs.inconclusive }}
          INCONCLUSIVE_CPUS: ${{ steps.compare.outputs.inconclusive_cpus }}
        run: |
          {
            if [ "$INCONCLUSIVE" = "true" ]; then
              echo "## ⚠️ Bench Gate — INCONCLUSIVE (heterogeneous runner CPUs)"
            elif [ "$REGRESSION" = "true" ]; then
              echo "## ❌ Bench Gate — REGRESSION DETECTED"
            else
              echo "## ✅ Bench Gate — no statistically significant regression"
            fi
            echo ""
            echo "Compared PR HEAD (\`${{ github.event.pull_request.head.sha }}\`)"
            echo "against merge-base (\`${{ needs.preflight.outputs.merge_base_sha }}\`)."
            echo "Gate threshold: **p < 0.01 AND |Δ| ≥ 5%** (statistical significance via \`benchstat -alpha=0.01\` + magnitude floor for free-tier-runner noise resistance)."
            echo "Metric scope: **deterministic per-op metrics only** (\`sec/op\`, \`B/op\`, \`allocs/op\`) via \`benchstat -filter\`. Non-deterministic process-level metrics (\`MB-sys\`, \`MB-heap-after-gc\`, \`goroutines\`) are excluded — they are GC/runtime high-water noise, not per-op work (#608)."
            echo "Topology: **single-runner sequential** (base bench → drop_caches → pr bench → benchstat) — eliminates CPU heterogeneity by construction."
            echo ""
            if [ "$INCONCLUSIVE" = "true" ]; then
              echo "### ⚠️ Inconclusive — heterogeneous CPUs (unexpected)"
              echo ""
              echo "Single-runner topology should make this structurally impossible."
              echo "If you see this, investigate runner provisioning. CPUs observed:"
              echo '```'
              echo "$INCONCLUSIVE_CPUS"
              echo '```'
              echo ""
            fi
            echo "### Full benchstat output"
            echo '```'
            cat "$RUNNER_TEMP/bench-out/benchstat.txt"
            echo '```'
            if [ "$REGRESSION" = "true" ]; then
              echo ""
              echo "### Regressions flagged"
              echo '```'
              echo "$REGRESSIONS_LIST"
              echo '```'
              echo ""
              echo "If this regression is a deliberate correctness/safety trade-off,"
              echo "request a maintainer to apply the label \`override: bench-regress-ok\`."
              echo "The PR will re-run CI on label application (handled via this"
              echo "workflow's \`types: [labeled]\` trigger) and be skipped with an"
              echo "audit-trail annotation."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail gate on regression or inconclusive
        if: steps.compare.outputs.regression == 'true' || steps.compare.outputs.inconclusive == 'true'
        run: |
          if [ "${{ steps.compare.outputs.inconclusive }}" = "true" ]; then
            echo "::error::Gate run INCONCLUSIVE — heterogeneous runner CPUs in a single-runner job. Investigate runner provisioning."
          else
            echo "::error::Statistically significant perf regression detected vs merge-base."
            echo "::error::See benchstat output in the step summary."
            echo "::error::Override via maintainer-applied label 'override: bench-regress-ok'."
          fi
          exit 1
