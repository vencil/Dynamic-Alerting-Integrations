name: Bench Gate (PR-time, Tier 1)

# Phase 2 — Tier 1 of bench gating redesign (issue #433, supersedes #67).
#
# Purpose: catch performance regression introduced BY THIS PR vs its merge-base.
# This is the "blame attribution correct" tier — answers the question
# "did this specific diff make things slower?" rather than "is main slower
# than the last release?" (that's Tier 2's job; release-time-only).
#
# Wall-time + reliability history:
#   - v1 (PR #435): parallel base+pr matrix → ~11 min wall, 2 runners.
#     Worked but found later to be inconsistent due to heterogeneous CPU
#     pool (AMD EPYC / Intel Xeon randomly assigned).
#   - v2 (PR #437): sharded base+pr into 3 shards × 2 sides = 6 runners.
#     Wall dropped to ~4-5 min but INCONCLUSIVE rate spiked to ~98%
#     because P(6 runners same CPU) ≈ 1.7% with the observed 3-CPU pool.
#   - v3/v4 (PR #440): added Ghost-Green race + Blanket-Immunity defenses
#     + INCONCLUSIVE enforcement on hetero CPU (closed silent false-neg).
#     Correct gate behavior surfaced the structural sharding problem.
#   - v5 (PR #444): single-runner SEQUENTIAL bench (all base, then all pr).
#     P(homogeneous CPU) = 100% (same VM). Eliminated INCONCLUSIVE from CPU
#     heterogeneity, but introduced a subtler killer: because base and pr ran
#     in two separate time blocks, any mid-run runner drift (thermal throttle /
#     frequency scaling / noisy neighbour) biased the pr block systematically.
#     benchstat assumes independent samples, so it misread that time-correlated
#     bias as a "significant regression" — the recurring false-RED (#502/#608/
#     #611/#695; #695 had ZERO Go changes yet still went red).
#   - v6 (this file): single-runner INTERLEAVED bench + control canary.
#     Runs base,pr,base,pr,… one round at a time (via bench_interleave.sh) so
#     drift hits BOTH sides within each round and cancels → benchstat's
#     independent-samples assumption holds again. Two refinements that matter:
#     (a) binaries are PRE-COMPILED (`go test -c`) so the Go compiler's CPU
#     spike never lands between measurements; (b) the mid-run drop_caches is
#     GONE — in an interleaved loop it would be asymmetric (base warm / pr cold)
#     and re-introduce the very bias we're killing. A version-independent
#     control canary (benchcanary module) runs each round; if it drifts the run
#     is judged INCONCLUSIVE (re-run) instead of emitting a false regression.
#
# Why this is the right design on free-tier runners:
#   - GH-hosted ubuntu-latest pool is heterogeneous AND each VM drifts mid-run.
#     Interleaving on ONE runner gives perfect CPU homogeneity AND cancels
#     time-correlated drift — the two failure modes v1-v2 and v5 hit respectively.
#   - The control canary turns "the runner was unstable this run" from an
#     invisible source of false regressions into an explicit INCONCLUSIVE verdict.
#   - Wall-time stays ~20-25 min (same total benchtime as v5's count=6; the
#     extra cost is process starts + tiny canaries, offset by pre-compiling once).
#     (2026-07 stage C slimming: BENCHTIME 3s→1s later cut nominal wall to
#     ~8-10 min — see the Run step and the timeout-minutes budget note.)
#
# Governance (Phase 2 — INFORMATIONAL):
#   - The gate no longer blocks merge. A real regression posts a PR comment and
#     applies the `perf-regression` label; an INCONCLUSIVE run posts a re-run
#     note. The job exits 0 in all cases (infra errors aside).
#   - Because nothing is blocked, the old `override: bench-regress-ok` label and
#     its companion `bench-override-audit.yaml` (role check + stale-label strip)
#     are REMOVED — there is no gate to override.
#   - Fork PRs get a read-only token (`pull_request`), so comment/label calls
#     would fail; they degrade gracefully to a `::warning::` + step summary. We
#     deliberately do NOT use `pull_request_target` (pwn-request risk).
#
# Regression detection (alpha + magnitude UNCHANGED from v4; metric scope
# added in #608):
#   - benchstat `-alpha=0.01` (NOT `-confidence` — that's the geomean CI
#     width knob, not the per-bench significance threshold).
#   - Plus magnitude floor: only fail on `|Δ| ≥ 5%`. Free-tier within-run
#     noise is ~1-3% — pure statistical significance is too sensitive
#     when noise exceeds the effect size.
#   - The 5% floor is tightenable to 3% when Larger Runners are adopted
#     (Tier 1 hardware-floor escalation path per bench-gate-rollout.md).
#   - Metric scope (#608): `-filter` restricts detection to deterministic
#     per-op metrics (sec/op, B/op, allocs/op). Non-deterministic process-
#     level custom metrics (MB-sys, MB-heap-after-gc) are GC high-water
#     noise that false-RED real Go PRs — excluded. See bench_gate_compare.sh
#     (the verdict logic moved there in the stage-B shared-core extraction).
#   - INCONCLUSIVE (v6): the CPU control canary (BenchmarkControlCanaryCPU)
#     runs identical work on both sides; a ≥4% significant base-vs-pr delta on
#     it means the runner drifted this run → judged INCONCLUSIVE (re-run, NOT a
#     regression). The Sleep canary is informational-only (µs-scale scheduler
#     jitter would flap the gate). Both canaries are excluded from the
#     regression grep.
#
# See: issue #433, issue #67 (closed/superseded), bench-record.yaml (nightly),
#      memory feedback `feedback_github_actions_workflow_gotchas.md`
#      (Traps 7-12 codify the SRE defenses learned across v1-v5).
#
# ── Two-stage trigger rollout (C→B, 2026-07) ─────────────────────────────────
# Stage C (now, this file): the PR-time auto-run STAYS but is slimmed —
#   BENCHTIME 3s→1s (main loop ~12min→~4min) and the `rule-packs/**` path
#   filter is removed (structurally zero-signal for recipe-only PRs; see the
#   paths comment below).
# Stage B (bench-attrib-main.yaml): the SAME interleaved harness runs
#   post-merge on main (HEAD vs HEAD^; squash-merge policy ⇒ 1 commit = 1 PR,
#   so attribution stays exact) and auto-files a `perf-regression` issue naming
#   the offending commit.
# FLIP (owner decision AFTER B has soaked 2-4 weeks — deliberately NOT in the
#   commit that introduced B, to stage risk): once bench-attrib-main has proven
#   itself, PRs stop auto-running the bench — delete this workflow's
#   `pull_request` trigger block below. On-demand PR benching then lives in
#   bench-on-demand.yaml (`/bench` comment, OWNER/MEMBER only), which already
#   carries the full harness, so the flip is a one-block deletion here.
# SOAK CHECKLIST (what "proven itself" means, before the flip):
#   - attrib runs green on real merges; issue open/dedupe/auto-close behaves.
#   - INCONCLUSIVE rate at 1s comparable to the historical 3s rate.
#   - Noise floor at 1s: compare the benchstat "± N%" widths of 1s runs
#     against historical 3s runs — if ± is commonly >5%, the 5% magnitude
#     floor is effectively undetectable (noise ≥ signal) and BENCHTIME must
#     go back up (external-review soak item).

on:
  pull_request:
    # No `labeled` trigger: Phase 2 made the gate INFORMATIONAL (a regression
    # posts a comment + `perf-regression` label, never blocks merge), so the
    # `override: bench-regress-ok` label + its `labeled`-event honoring are gone.
    types: [opened, synchronize, reopened]
    paths:
      # Scope to benchmarkable changes only (issue #433 W3). Watching the
      # whole app dir fired the gate on PRs with no benchmarkable Go delta —
      # e.g. a `.dockerignore` change (#597) or a `*_test.go` deflake (#532),
      # both pure noise that a maintainer had to override. Limit to non-test
      # Go + module files, keeping this workflow's own edits.
      # ORDER-SENSITIVE: GitHub Actions includes a path when a positive
      # pattern matches AND no *later* `!` pattern excludes it, so the
      # `*_test.go` exclusion must follow the `**/*.go` include. `**/*.go`
      # is globstar (zero-or-more dirs), so it also matches non-test `.go`
      # files directly in app/ root (config_parse.go, collector.go, …) —
      # real-perf-PR coverage (e.g. #502) is preserved.
      - 'components/threshold-exporter/app/**/*.go'
      - '!components/threshold-exporter/app/**/*_test.go'
      - 'components/threshold-exporter/app/go.mod'
      - 'components/threshold-exporter/app/go.sum'
      # 'rule-packs/**' REMOVED (2026-07 stage C, owner-verified): all 4 bench
      # files (threshold-exporter app + pkg/config) reference ZERO rule-packs
      # fixtures, so a recipe-only PR triggering a bench run was structurally
      # zero-signal — nothing it changes sits on the measured path. If a future
      # benchmark starts loading rule-packs fixtures, ADD THIS BACK:
      #   - 'rule-packs/**'
      # Harness scripts (stage B extraction): the verdict logic used to live
      # inline in this yaml (covered by the self-path entry below); now that it
      # lives in scripts/, edits to it must still re-exercise the gate. Keep
      # this list in sync with bench-attrib-main.yaml's paths.
      - 'scripts/tools/ops/bench_interleave.sh'
      - 'scripts/tools/ops/bench_gate_compare.sh'
      - 'scripts/tools/ops/bench_render_summary.sh'
      - 'scripts/tools/ops/bench_report_pr.sh'
      - 'scripts/tools/ops/bench-canary/**'
      - '.github/workflows/bench-gate-pr.yaml'

concurrency:
  # Cancel in-flight runs for the same PR (rapid pushes shouldn't queue
  # bench runs; only the latest commit matters).
  group: bench-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # post the informational result comment
  issues: write         # add/remove the `perf-regression` label (PRs are issues underneath)

jobs:
  # Job 1: cheap preflight — compute the true merge-base (PR divergence point).
  # Phase 2 removed the override-label check, so this job is now just merge-base.
  preflight:
    name: Preflight (merge-base)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      merge_base_sha: ${{ steps.merge_base.outputs.sha }}
    steps:
      # CRITICAL: fetch-depth: 0 required for `git merge-base`. See
      # comments on the bench-job checkout for the same gotcha.
      # persist-credentials: false — this job only runs LOCAL git reads
      # (merge-base over already-fetched history), so the token has no
      # reason to live on in .git/config. See the bench-job checkout for
      # the threat-model note.
      - name: Checkout with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # CRITICAL: compute merge-base ourselves. Two distinct gotchas:
      #
      # (1) Do NOT use origin/<base> HEAD as the base directly — that
      #     would mix in commits that landed on main AFTER the PR
      #     branched, attributing other authors' code to this PR.
      #
      # (2) Do NOT pass `HEAD` to `git merge-base` either. On the
      #     `pull_request` event, actions/checkout checks out a virtual
      #     merge commit (refs/pull/<num>/merge) whose two parents are
      #     (PR_HEAD, origin/<base> CURRENT). Calling `git merge-base
      #     HEAD origin/<base>` returns origin/<base> itself, because
      #     origin/<base> is a direct parent of the virtual merge ←
      #     defeats the Scapegoat Trap defense (Gemini round-3 catch).
      #
      # Correct: pass `${{ github.event.pull_request.head.sha }}`
      # explicitly — the ACTUAL PR head, not the virtual merge node —
      # so `git merge-base` walks back through the PR's commit ancestry
      # to find the true branching point.
      - name: Compute merge-base
        id: merge_base
        # Bind base ref + PR head SHA via env, NOT raw ${{ }} interpolation
        # into the run: script (#1021 class house rule: zero raw
        # ${{ github.event.* }} / ${{ github.base_ref }} inside run:).
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          base_ref="origin/$BASE_REF"
          pr_head="$PR_HEAD_SHA"
          base_sha=$(git merge-base "$pr_head" "$base_ref")
          if [ -z "$base_sha" ]; then
            echo "::error::Could not compute merge-base between $pr_head and $base_ref"
            exit 2
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "Merge-base (true PR divergence point): $base_sha"
          echo "  vs $base_ref"
          echo "  vs PR HEAD ($pr_head)"

  # Job 2: single-runner INTERLEAVED bench (base,pr,base,pr,…) + control canary
  # + compare. See top-of-file comment for the v6 design rationale — the
  # structural answer to BOTH runner-pool heterogeneity AND mid-run drift.
  bench:
    name: Bench + Compare (single-runner interleaved + canary)
    needs: preflight
    runs-on: ubuntu-latest
    # Budget: ~6 interleaved rounds × (base+pr full set @1s) + pre-compile once +
    # tiny canaries + benchstat = ~8-10 min nominal (was ~20-25 min @3s before
    # the 2026-07 stage-C slimming; cap lowered 40→20 keeping the same ~2×
    # headroom ratio). The cap must cover slow runners + Go module download
    # flakes + Azure pool variance, AND leave enough buffer for the step
    # summary + fail-gate steps to actually render before a hard-kill — a cap
    # that hard-kills mid-output leaves the dev with a red check and no
    # diagnostic. [Gemini round-12 timeout-tightrope catch.]
    timeout-minutes: 20
    steps:
      # persist-credentials: false (same hardening bench-on-demand.yaml
      # carries): this job EXECUTES the PR's test binaries (a malicious
      # TestMain is arbitrary code) and the bench worktrees share this
      # checkout's .git — don't leave the job token sitting in .git/config
      # for it to read. Residual risk was low anyway (fork PRs get a
      # read-only token; same-repo PR authors already have write), but no
      # later step needs persisted credentials: the compare step is pure
      # local git (rev-parse/worktree over the full-history fetch) and the
      # reporter step authenticates via its own explicit GH_TOKEN env.
      - name: Checkout repo (full history for both base + pr commits)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need history to walk to merge-base
          persist-credentials: false

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # Cache BOTH Go module cache AND build cache. The latter ($HOME/.cache/
      # go-build) stores compiled package objects — restoring it saves the
      # 20–40s compile phase of the first `go test -bench`. The second bench
      # (pr) reuses what the first bench (base) added, so its compile is
      # near-instant. Go's build cache is content-addressed; safe across
      # PRs and across the base→pr checkout.
      - name: Cache Go modules + build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-
            ${{ runner.os }}-go-

      # Interleaved bench + benchstat verdict, all in the shared core script
      # (stage-B extraction — the exact logic that used to live inline here:
      # install benchstat → stash harness/canary → base+pr worktrees →
      # bench_interleave.sh → benchstat -alpha/-filter → #611 shape asserts →
      # regression + canary-INCONCLUSIVE verdict). Shared verbatim with
      # bench-attrib-main.yaml and bench-on-demand.yaml so the three
      # consumers cannot drift; all design commentary moved into the script.
      - name: Run interleaved bench + verdict (shared core)
        id: compare
        # PR head SHA bound via env (#1021 class house rule); the merge-base
        # SHA is a needs.* output — derived context, a different class.
        #
        # ROUNDS=6 — do NOT lower. benchstat's Mann-Whitney U per-side sample
        # count IS ROUNDS; two-sided min p = 2/C(2n,n): n=6 → ≈0.0022 < α=0.01
        # ✓; n=4 → ≈0.029 ✗; n=2 → ≈0.33 ✗. ROUNDS<5 makes the α=0.01 gate
        # MATHEMATICALLY unreachable — a permanently-green ornament. Tune
        # BENCHTIME for wall-time instead (full note in the script header).
        # BENCHTIME=1s (3s→1s, 2026-07 stage C): main loop ~12min→~4min.
        env:
          BASE_SHA: ${{ needs.preflight.outputs.merge_base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ROUNDS: "6"
          BENCHTIME: "1s"
        run: bash scripts/tools/ops/bench_gate_compare.sh

      # Summary + PR report both delegate to the shared scripts (stage-B
      # extraction); only the consumer-specific wording stays here.
      - name: Render step summary
        if: always()
        env:
          REGRESSION: ${{ steps.compare.outputs.regression }}
          REGRESSIONS_LIST: ${{ steps.compare.outputs.regressions }}
          INCONCLUSIVE: ${{ steps.compare.outputs.inconclusive }}
          INCONCLUSIVE_REASON: ${{ steps.compare.outputs.inconclusive_reason }}
          INCONCLUSIVE_CPUS: ${{ steps.compare.outputs.inconclusive_cpus }}
          INCONCLUSIVE_CANARY: ${{ steps.compare.outputs.inconclusive_canary }}
          BENCHSTAT_TXT: ${{ steps.compare.outputs.benchstat_txt }}
          # PR head SHA bound via env (#1021 class house rule).
          COMPARE_DESC: |
            Compared PR HEAD (`${{ github.event.pull_request.head.sha }}`)
            against merge-base (`${{ needs.preflight.outputs.merge_base_sha }}`).
          REGRESSION_NOTE: |
            **Informational only — this does NOT block merge.** A `perf-regression` label
            and a PR comment were applied. If the slowdown is a deliberate correctness/safety
            trade-off, just note it in the PR; otherwise fix the perf and push again (the
            label is removed automatically once the regression clears). The nightly
            `bench-record` trend watchdog independently watches main for sustained drift.
        run: bash scripts/tools/ops/bench_render_summary.sh

      # INFORMATIONAL report (Phase 2) — comment + `perf-regression` label,
      # never blocks merge; fork-PR read-only tokens degrade to a warning.
      # Full policy commentary in the shared script.
      - name: Report regression (informational — comment + label, never blocks)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REGRESSION: ${{ steps.compare.outputs.regression }}
          INCONCLUSIVE: ${{ steps.compare.outputs.inconclusive }}
          REGRESSIONS_LIST: ${{ steps.compare.outputs.regressions }}
        run: bash scripts/tools/ops/bench_report_pr.sh
