name: Bench Gate (PR-time, Tier 1)

# Phase 2 — Tier 1 of bench gating redesign (issue #433, supersedes #67).
#
# Purpose: catch performance regression introduced BY THIS PR vs its merge-base.
# This is the "blame attribution correct" tier — answers the question
# "did this specific diff make things slower?" rather than "is main slower
# than the last release?" (that's Tier 2's job; release-time-only).
#
# Wall-time history:
#   - Sequential design (concept): ~10 min (5 min/bench × 2 sides).
#   - 2026-05-12 v1: parallel base+pr matrix → ~11 min wall (decomposition
#     showed `make benchmark-report` itself is ~10 min for 19 benchmarks;
#     plumbing only ~1 min — original "5 min/bench" estimate was based on
#     the 13-benchmark count before #128 added mixed-mode).
#   - 2026-05-12 v2 (this file): shard benchmarks across N runners per side.
#     N=3 → 6 parallel bench jobs (3 shards × 2 sides).
#     Expected wall: ~4-5 min (limited by slowest shard).
#     CI cost: ~24 bench-minutes vs ~20 before (+20% for ~55% wall savings).
#
# Sharding rationale:
#   - Each benchmark still runs COUNT=6 samples on a single runner (no
#     statistical effect — sharding partitions BENCHMARKS, not COUNTS).
#   - Modulo partition (bench[i] → shard (i mod N)) is deterministic and
#     auto-balances when new benches are added. No manual list to maintain.
#   - Source-grep enumeration is ~0.1s (vs ~30-60s if we used `go test
#     -bench -benchtime=1ns` for enumeration — that still runs each
#     bench's heavy setup phase before the 1ns timed portion).
#   - Tail-variance amplification: 6 runners vs 2 means more chance of
#     hitting a slow noisy-neighbor runner. Acceptable trade for the
#     wall-time win; if FP rate climbs, escalation path is Larger Runners.
#
#   - 2026-05-12 v3 (this revision): close "Ghost Green" race vs the
#     companion bench-override-audit.yaml. Both workflows fire on the
#     same `labeled` event; preflight is much faster than audit (~5s
#     vs ~20s). Without the change, preflight could mark skip=true
#     based on label presence ALONE before audit gets a chance to
#     revert. Fix: preflight queries the timeline API for who LAST
#     applied this specific label, then verifies their repo role —
#     only honors skip when applier is admin or maintain.
#
# See: issue #433, issue #67 (closed/superseded), bench-record.yaml (nightly),
#      memory feedback `feedback_github_actions_workflow_gotchas.md`.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'components/threshold-exporter/app/**'
      - 'rule-packs/**'
      - '.github/workflows/bench-gate-pr.yaml'

concurrency:
  # Cancel in-flight runs for the same PR (rapid pushes shouldn't queue
  # bench runs; only the latest commit matters).
  group: bench-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # for posting the result comment

env:
  # Number of bench shards per side. 3 shards × 2 sides = 6 parallel bench
  # jobs. Increasing this further reduces wall time but raises CI cost
  # (each shard pays ~30s setup-go + cache-restore overhead independently)
  # and tail-variance risk (more runners = higher P(at least one slow)).
  # 3 chosen empirically for the current ~19-benchmark suite — gives
  # ~6-7 benchmarks/shard, balancing wall time vs runner count.
  # Master bench filter: kept in sync with Makefile `benchmark-report`
  # target. Update both together when bench scope changes.
  SHARDS_TOTAL: 3
  BENCH_MASTER_FILTER: '_1000(_|$)|MixedMode|Simulate_DeepChain'

jobs:
  # Job 1: cheap preflight. Computes merge-base, checks override label.
  # Outputs feed the matrix + compare jobs.
  preflight:
    name: Preflight (override check + merge-base)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check_override.outputs.skip }}
      merge_base_sha: ${{ steps.merge_base.outputs.sha }}
    steps:
      # Override label early-exit + authorization re-check.
      #
      # Why re-check authorization here even though `bench-override-audit.yaml`
      # already enforces it: defense-in-depth against the "Ghost Green" race.
      # Both workflows fire on the same `labeled` event:
      #   - bench-gate-pr.yaml preflight runs in ~5s
      #   - bench-override-audit.yaml runs in ~20s (API call + label removal)
      # If the audit hasn't finished by the time preflight checks for the
      # label, preflight would see it present, mark skip=true, and the whole
      # workflow would short-circuit GREEN. The audit's red check would still
      # fire, but if branch protection isn't set to require the audit, the PR
      # could merge with the bypass intact.
      # Solution: bench-gate validates the LABEL APPLIER's role itself via
      # the timeline API. Even if the unauthorized label is still on the PR
      # when preflight runs, preflight won't honor it.
      #
      # [Gemini round-7 race-condition catch.]
      - name: Check for override label and verify applier authorization
        id: check_override
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          # Step 1: label presence. Fast path — if not labeled, exit early.
          if ! echo "$LABELS" | grep -q '"override: bench-regress-ok"'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No override label present — bench gate will run normally."
            exit 0
          fi

          # Step 2: who LAST applied this specific label? Use timeline API
          # rather than github.event.sender — sender is the actor of the
          # CURRENT event (could be a `synchronize` push, not the labeler).
          # `--paginate` defensive for PRs with many label events; filter by
          # event=="labeled" AND label.name match; pick the last one
          # (chronologically most recent applier).
          last_applier=$(gh api "repos/$REPO/issues/$PR_NUMBER/timeline" --paginate \
            --jq '[.[] | select(.event == "labeled" and .label.name == "override: bench-regress-ok")] | last | .actor.login // empty')

          if [ -z "$last_applier" ]; then
            # Label is present but no labeled event found — shouldn't happen
            # normally. Treat as unauthorized for safety.
            echo "::warning::Override label present but no labeled event in timeline. Treating as unauthorized."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Step 3: applier's effective repo role.
          if permission=$(gh api "repos/$REPO/collaborators/$last_applier/permission" \
                            --jq '.permission' 2>/dev/null); then
            echo "Most recent labeler: $last_applier ($permission)"
          else
            echo "::warning::Could not fetch role for $last_applier (404 / API error). Treating as unauthorized."
            permission="none"
          fi

          # Step 4: only honor skip if admin or maintain.
          if [ "$permission" = "admin" ] || [ "$permission" = "maintain" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Bench gate skipped — label applied by $last_applier ($permission)"
            {
              echo "## Bench Gate — SKIPPED via override label"
              echo ""
              echo "Label applied by \`$last_applier\` (role: \`$permission\`)."
              echo "Performance regression accepted as a documented trade-off."
              echo "Audit trail: this skip is permanently logged on the merge commit."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Override label present but applied by $last_applier ($permission) — not authorized. Running benches normally; bench-override-audit.yaml should auto-revert this label."
            {
              echo "## Bench Gate — UNAUTHORIZED override ignored"
              echo ""
              echo "Label \`override: bench-regress-ok\` was applied by \`$last_applier\` (role: \`$permission\`),"
              echo "but only \`admin\` or \`maintain\` roles can authorize override. **Label is being ignored**"
              echo "and benches will run normally. The companion \`bench-override-audit.yaml\` workflow"
              echo "should auto-revert this label and post a comment with the proper request flow."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # CRITICAL: fetch-depth: 0 is required for `git merge-base` to find
      # the true PR divergence point. Default depth=1 only fetches HEAD,
      # which makes merge-base fail or return the wrong commit.
      - name: Checkout with full history
        if: steps.check_override.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # CRITICAL: compute merge-base ourselves. Two distinct gotchas:
      #
      # (1) Do NOT use origin/<base> HEAD as the base directly — that
      #     would mix in commits that landed on main AFTER the PR
      #     branched, attributing other authors' code to this PR.
      #
      # (2) Do NOT pass `HEAD` to `git merge-base` either. On the
      #     `pull_request` event, actions/checkout checks out a virtual
      #     merge commit (refs/pull/<num>/merge) whose two parents are
      #     (PR_HEAD, origin/<base> CURRENT). Calling `git merge-base
      #     HEAD origin/<base>` returns origin/<base> itself, because
      #     origin/<base> is a direct parent of the virtual merge ←
      #     defeats the Scapegoat Trap defense (Gemini round-3 catch).
      #
      # Correct: pass `${{ github.event.pull_request.head.sha }}`
      # explicitly — the ACTUAL PR head, not the virtual merge node —
      # so `git merge-base` walks back through the PR's commit ancestry
      # to find the true branching point.
      - name: Compute merge-base
        if: steps.check_override.outputs.skip != 'true'
        id: merge_base
        run: |
          base_ref="origin/${{ github.base_ref }}"
          pr_head="${{ github.event.pull_request.head.sha }}"
          base_sha=$(git merge-base "$pr_head" "$base_ref")
          if [ -z "$base_sha" ]; then
            echo "::error::Could not compute merge-base between $pr_head and $base_ref"
            exit 2
          fi
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "Merge-base (true PR divergence point): $base_sha"
          echo "  vs $base_ref"
          echo "  vs PR HEAD ($pr_head)"

  # Job 2: parallel matrix. Runs bench sharded across 3 shards × 2 sides
  # = 6 jobs concurrently. Wall-time win: ~4-5 min vs ~11 min unsharded.
  bench:
    name: Bench (${{ matrix.side }} shard ${{ matrix.shard }})
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    # Reduced from 20 min: each shard runs ~1/3 of benches, expected ~4 min
    # actual + ~2 min setup overhead. 15 min gives generous headroom.
    timeout-minutes: 15
    strategy:
      fail-fast: false  # if one shard fails, we still want the others
      matrix:
        side: [base, pr]
        # NOTE: keep length in sync with env.SHARDS_TOTAL. Hardcoded here
        # because GitHub Actions matrix doesn't read env vars directly.
        # If SHARDS_TOTAL changes, update both.
        shard: [0, 1, 2]
    steps:
      - name: Resolve checkout ref for ${{ matrix.side }}
        id: ref
        env:
          MERGE_BASE: ${{ needs.preflight.outputs.merge_base_sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ matrix.side }}" = "base" ]; then
            echo "sha=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$PR_HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout ${{ matrix.side }} (${{ steps.ref.outputs.sha }})
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.sha }}
          # No fetch-depth needed here — we have an explicit ref. Default
          # shallow is faster than full history.

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # Cache BOTH Go module cache AND build cache. The latter ($HOME/.cache/
      # go-build) stores compiled package objects — restoring it saves the
      # 20–40s compile phase of `go test -bench`. Go's build cache is
      # content-addressed internally, so stale entries are silently ignored
      # rather than producing wrong binaries. Safe to share across PRs.
      - name: Cache Go modules + build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-
            ${{ runner.os }}-go-

      # Enumerate benchmarks via source grep (NOT via `go test -bench
      # -benchtime=1ns` — that approach still runs every bench's heavy
      # setup phase, e.g. FullDirLoad_1000 creates 1000 YAML files
      # before timing). Source-grep is ~0.1s and exact for our naming
      # convention (`func Benchmark<Name>(b *testing.B)`).
      #
      # Partition: bench[i] → shard (i mod SHARDS_TOTAL). Deterministic,
      # auto-balances new benches, identical regex on base+pr sides
      # (assuming source order is identical — true unless PR adds/removes
      # benches, in which case benchstat correctly reports "missing on
      # base" / "missing on pr" for those).
      - name: Enumerate + partition benchmarks (shard ${{ matrix.shard }} / ${{ env.SHARDS_TOTAL }})
        id: partition
        env:
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ env.SHARDS_TOTAL }}
          MASTER_FILTER: ${{ env.BENCH_MASTER_FILTER }}
        run: |
          set -euo pipefail
          # Find all `func Benchmark<Name>(...)` in the exporter app + subpkgs.
          # `grep -rh` reads files recursively, stripping filename prefix.
          # `sed` extracts the bench name token. `grep -E "$MASTER_FILTER"`
          # applies the same regex Go's `-bench` flag would.
          all_benches=$(grep -rh "^func Benchmark" components/threshold-exporter/app \
                       | sed -n 's/^func \(Benchmark[A-Za-z0-9_]*\).*/\1/p' \
                       | grep -E "$MASTER_FILTER" \
                       | sort -u)

          if [ -z "$all_benches" ]; then
            echo "::error::Source-grep found 0 benchmarks matching '$MASTER_FILTER' — check filter regex"
            exit 1
          fi

          total_count=$(echo "$all_benches" | wc -l)

          # Partition: awk NR is 1-indexed; ((NR-1) % TOTAL) gives 0-indexed
          # shard ID matching matrix.shard.
          shard_benches=$(echo "$all_benches" | awk -v shard="$SHARD" -v total="$TOTAL" \
                                                    '((NR-1) % total) == shard {print}')

          if [ -z "$shard_benches" ]; then
            # Defensive: only triggers if SHARDS_TOTAL > total benchmark
            # count (impossible with 3 shards × 19 benches, but possible
            # if filter is narrowed without reducing SHARDS_TOTAL).
            echo "::warning::Shard $SHARD got 0 benchmarks (total=$total_count, shards=$TOTAL)"
            regex='^__SHARD_EMPTY__$'  # impossible match → skips cleanly
          else
            # Build regex: ^(NameA|NameB|...)$ for exact-match shard.
            # paste -sd '|' joins lines with `|`. Anchors prevent prefix
            # matches (e.g. without ^...$, `Benchmark_1000` would match
            # `Benchmark_1000_NoChange` and pull it into the wrong shard).
            regex="^($(echo "$shard_benches" | paste -sd '|' -))$"
          fi

          echo "shard_filter=$regex" >> "$GITHUB_OUTPUT"
          shard_count=$(echo "$shard_benches" | grep -c . || echo 0)
          {
            echo "## Bench partition — ${{ matrix.side }} shard $SHARD / $TOTAL"
            echo ""
            echo "Total benchmarks (master filter): **$total_count**"
            echo "Benchmarks in this shard: **$shard_count**"
            echo ""
            echo "Filter regex:"
            echo '```'
            echo "$regex"
            echo '```'
            echo ""
            echo "Benchmarks assigned to this shard:"
            echo "$shard_benches" | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

      # Direct bench_wrapper.sh invocation rather than `make benchmark-report`:
      # Makefile hardcodes the master `-bench` filter; sharding needs a
      # per-shard override. Plumbing a BENCH= override through Makefile
      # works but requires fragile bash-quoting of the default value
      # (special chars `(`, `|`, `$` in the regex). Direct invocation is
      # cleaner and CI is the right place to know wrapper-script details.
      - name: Run benchmark suite (shard ${{ matrix.shard }})
        env:
          BENCH_FILTER: ${{ steps.partition.outputs.shard_filter }}
        run: |
          set -euo pipefail
          mkdir -p .build
          echo "[bench-shard ${{ matrix.shard }}] running with filter: $BENCH_FILTER"
          echo "[bench-shard ${{ matrix.shard }}] count=6 benchtime=3s timeout=15m"
          cd components/threshold-exporter/app
          BENCH_OUT_DIR="$GITHUB_WORKSPACE/.build" \
            bash "$GITHUB_WORKSPACE/scripts/tools/ops/bench_wrapper.sh" \
            -bench="$BENCH_FILTER" \
            -benchmem \
            -count=6 \
            -run='^$' \
            -timeout=15m \
            -benchtime=3s \
            ./...
          cp "$GITHUB_WORKSPACE/.build/bench.out.txt" \
             "$GITHUB_WORKSPACE/.build/bench-baseline.txt"
          line_count=$(wc -l < "$GITHUB_WORKSPACE/.build/bench-baseline.txt")
          echo "[bench-shard ${{ matrix.shard }}] wrote bench-baseline.txt ($line_count lines)"

      - name: Upload bench artifact
        uses: actions/upload-artifact@v7
        with:
          name: bench-${{ matrix.side }}-shard${{ matrix.shard }}
          path: .build/bench-baseline.txt
          retention-days: 7
          if-no-files-found: error

  # Job 3: sequential — pull all shard artifacts, concat per side, benchstat.
  compare:
    name: Compare (benchstat)
    needs: [preflight, bench]
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up Go 1.26 (for benchstat)
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install benchstat
        run: |
          # @latest is acceptable: benchstat's output format has been
          # stable for ~2 years. Pin to a specific module version IF
          # output parsing in the next step starts mis-classifying.
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat -h 2>&1 | head -5 || true

      - name: Download bench artifacts (all shards both sides)
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/bench

      # Concat per-side: benchstat accepts the standard Go bench output
      # format which is line-oriented (header lines + `Benchmark... N ns/op`
      # rows). Concatenating multiple shards' files just gives benchstat
      # more rows per side, which is exactly what it expects. The duplicate
      # "goos:/goarch:/pkg:" header lines per shard don't confuse benchstat
      # — it treats them as section breaks.
      #
      # CRITICAL: enumerate shards explicitly via `seq 0..N-1` rather than
      # globbing `bench-base-shard*`. Two distinct gotchas:
      #
      # (1) Glob order is LEXICOGRAPHIC — at SHARDS_TOTAL >= 10 this gives
      #     shard0, shard1, shard10, shard2, ..., shard9 — benchstat output
      #     row order becomes non-deterministic (cosmetic issue in step
      #     summary; statistical pairing by name is unaffected, but
      #     reviewers expecting consistent layout get confused).
      #     [Gemini round-5 SRE catch.]
      #
      # (2) MORE IMPORTANTLY: glob silently accepts PARTIAL shards. If one
      #     bench job hits the 15-min timeout or hits a runner flake, its
      #     artifact never uploads; the glob just skips it; benchstat
      #     compares an incomplete bench set; the gate passes despite a
      #     chunk of the suite never running. Hidden gate-failure mode.
      #     Explicit `seq` loop with existence check fails fast instead.
      - name: Merge shard artifacts
        id: merge
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bench-merged"

          base_files=()
          pr_files=()
          missing=()

          # SHARDS_TOTAL is workflow-level env var; exported to step shell.
          for i in $(seq 0 $((SHARDS_TOTAL - 1))); do
            base_f="$RUNNER_TEMP/bench/bench-base-shard$i/bench-baseline.txt"
            pr_f="$RUNNER_TEMP/bench/bench-pr-shard$i/bench-baseline.txt"

            if [ -f "$base_f" ]; then
              base_files+=("$base_f")
            else
              missing+=("base shard $i ($base_f)")
            fi

            if [ -f "$pr_f" ]; then
              pr_files+=("$pr_f")
            else
              missing+=("pr shard $i ($pr_f)")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing shard artifacts — partial bench data would silently weaken the gate."
            echo "::error::Hard-failing here so the regression isn't hidden."
            for m in "${missing[@]}"; do
              echo "::error::  - missing: $m"
            done
            echo "Available artifacts:"
            ls -la "$RUNNER_TEMP/bench/" || true
            exit 2
          fi

          # base_files / pr_files are now numerically-ordered shard0..shardN-1.
          cat "${base_files[@]}" > "$RUNNER_TEMP/bench-merged/base.txt"
          cat "${pr_files[@]}"   > "$RUNNER_TEMP/bench-merged/pr.txt"

          echo "Merged base ($SHARDS_TOTAL shards, ordered 0..$((SHARDS_TOTAL - 1))): $(wc -l < "$RUNNER_TEMP/bench-merged/base.txt") lines"
          echo "Merged pr   ($SHARDS_TOTAL shards, ordered 0..$((SHARDS_TOTAL - 1))): $(wc -l < "$RUNNER_TEMP/bench-merged/pr.txt") lines"

      - name: Compare with benchstat
        id: compare
        # IMPORTANT — benchstat has TWO distinct flags that look similar
        # but do entirely different things:
        #
        #   -alpha α       (default 0.05)  → significance threshold for
        #                                    the +/-/~ markers per-bench
        #   -confidence c  (default 0.95)  → width of the displayed
        #                                    geomean ± confidence interval
        #
        # Previous version of this workflow used `-confidence=0.99`
        # believing it tightened regression flagging — IT DID NOT. With
        # default α=0.05, p-values up to 0.05 were still being flagged
        # with `+` (e.g. PR #437 self-test showed `+1.14% (p=0.026)`
        # marked significant despite our intent of "99% confidence"). The
        # gate has been enforcing 0.95 the entire time. Use `-alpha=0.01`
        # to actually tighten significance.
        #
        # Additionally: free-tier GH runners exhibit ~1-5% within-bench
        # variance on YAML-only diffs (i.e. zero code change). Pure
        # statistical significance is too sensitive when within-run noise
        # is wider than the effect size — even α=0.01 still flagged
        # several +1.5-3% deltas on the PR #437 self-test. Industry
        # standard for CI perf gates: combine α AND |Δ| floor. We require
        # both p < 0.01 AND |Δ| ≥ 5% to fail the gate. The 5% floor is
        # tightenable to 3% once Larger Runners are adopted (per the
        # rollout doc's hardware-floor escalation trigger).
        run: |
          set -euo pipefail
          benchstat -alpha=0.01 \
            "$RUNNER_TEMP/bench-merged/base.txt" \
            "$RUNNER_TEMP/bench-merged/pr.txt" \
            | tee "$RUNNER_TEMP/bench-merged/benchstat.txt"

          # Two-tier regression detection:
          # (1) benchstat already filters by α=0.01 (only `+` rows are
          #     statistically significant slowdowns).
          # (2) We additionally require |Δ| ≥ MAGNITUDE_FLOOR_PCT to
          #     filter out noise-floor false positives on free-tier
          #     runners (well-documented in bench-gate-rollout.md as the
          #     "Noisy Neighbor Illusion").
          # POSIX awk syntax (2-arg match()) for portability across
          # gawk / mawk / BSD awk. We find the "+X.XX%" token via match
          # (returns position+length), substr the number out (strip the
          # leading + and trailing %), and compare.
          MAGNITUDE_FLOOR_PCT=5.0
          regressions=$(grep -E '[[:space:]]\+[0-9]+\.[0-9]+%[[:space:]]*\(p=' \
                          "$RUNNER_TEMP/bench-merged/benchstat.txt" \
                        | grep -v geomean \
                        | awk -v floor="$MAGNITUDE_FLOOR_PCT" '{
                            if (match($0, /\+[0-9]+\.[0-9]+%/)) {
                              # RSTART points at "+", RLENGTH covers "+X.XX%"
                              # Strip leading + (offset by 1) and trailing %
                              # (length-2). RSTART/RLENGTH set by match().
                              num = substr($0, RSTART + 1, RLENGTH - 2) + 0
                              if (num >= floor) print
                            }
                          }')

          if [ -n "$regressions" ]; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
            {
              echo "regressions<<__EOF__"
              echo "$regressions"
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render step summary
        if: always()
        env:
          REGRESSION: ${{ steps.compare.outputs.regression }}
          REGRESSIONS_LIST: ${{ steps.compare.outputs.regressions }}
        run: |
          {
            if [ "$REGRESSION" = "true" ]; then
              echo "## ❌ Bench Gate — REGRESSION DETECTED"
            else
              echo "## ✅ Bench Gate — no statistically significant regression"
            fi
            echo ""
            echo "Compared PR HEAD (\`${{ github.event.pull_request.head.sha }}\`)"
            echo "against merge-base (\`${{ needs.preflight.outputs.merge_base_sha }}\`)."
            echo "Gate threshold: **p < 0.01 AND |Δ| ≥ 5%** (statistical significance via \`benchstat -alpha=0.01\` + magnitude floor for free-tier-runner noise resistance)."
            echo "Sharding: ${{ env.SHARDS_TOTAL }} shards × 2 sides = $((${{ env.SHARDS_TOTAL }} * 2)) parallel bench jobs."
            echo ""
            echo "### Full benchstat output"
            echo '```'
            cat "$RUNNER_TEMP/bench-merged/benchstat.txt"
            echo '```'
            if [ "$REGRESSION" = "true" ]; then
              echo ""
              echo "### Regressions flagged"
              echo '```'
              echo "$REGRESSIONS_LIST"
              echo '```'
              echo ""
              echo "If this regression is a deliberate correctness/safety trade-off,"
              echo "request a maintainer to apply the label \`override: bench-regress-ok\`."
              echo "The PR will re-run CI on label application (handled via this"
              echo "workflow's \`types: [labeled]\` trigger) and be skipped with an"
              echo "audit-trail annotation."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail gate on regression
        if: steps.compare.outputs.regression == 'true'
        run: |
          echo "::error::Statistically significant perf regression detected vs merge-base."
          echo "::error::See benchstat output in the step summary."
          echo "::error::Override via maintainer-applied label 'override: bench-regress-ok'."
          exit 1
