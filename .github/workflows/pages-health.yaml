name: Pages Health

# Guard against the "deploy is green but the live site is broken" class of
# failure that 404'd the docs site root (Pages was serving legacy main:/docs
# while CI published a correct site elsewhere; no lint/CI ever exercised the
# served artifact, and nothing asserted the Pages source setting).
#
# Two independent signals, each of which would have caught that outage:
#   1. assert-source — the Pages serving source is the expected build type
#      (catches a UI/API setting drift that triggers NO deploy at all).
#   2. live-health   — the production root + /en/ actually return HTTP 200
#      AND render the real MkDocs home (catches a broken/partial deploy).
#
# Runs on a daily schedule (steady-state drift), on demand, and after a
# SUCCESSFUL "Deploy Documentation" run. The conclusion gate (job-level `if`)
# keeps a health-red meaning "deploy reported success but the site doesn't
# actually serve" — distinct from "the deploy itself failed", which is already
# its own red. First-cycle note: workflow_run only fires once this file is on
# the default branch, so the very first post-merge deploy may not chain here —
# the daily schedule + manual dispatch cover that gap.

on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC — steady-state drift detection
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Documentation"]
    types: [completed]

permissions:
  contents: read
  pages: read

env:
  # Expected GitHub Pages serving source. We deploy via the GitHub Actions
  # Pages pipeline (mkdocs-deploy.yaml), so the build type must be "workflow".
  # If we ever revert to a branch source, change this to match.
  EXPECTED_BUILD_TYPE: workflow

jobs:
  assert-source:
    name: Assert Pages serving source
    # schedule/dispatch always run; workflow_run only after a successful deploy.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check Pages build_type matches expectation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          build_type=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.build_type')
          echo "Pages build_type: ${build_type} (expected: ${EXPECTED_BUILD_TYPE})"
          if [ "${build_type}" != "${EXPECTED_BUILD_TYPE}" ]; then
            src=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.source | "\(.branch):\(.path)"' 2>/dev/null || echo "n/a")
            echo "::error::Pages serving source drifted to build_type='${build_type}' (source=${src}). Expected '${EXPECTED_BUILD_TYPE}'. The site is being served from the wrong place — set Settings -> Pages -> Source = 'GitHub Actions' (or: gh api -X PUT repos/${GITHUB_REPOSITORY}/pages -f build_type=workflow), then re-run 'Deploy Documentation'."
            exit 1
          fi
          echo "Pages source OK."

  live-health:
    name: Live site health (HTTP 200 + content)
    # schedule/dispatch always run; workflow_run only after a successful deploy.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Probe production root and /en/
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Single source of truth for the live URL: GitHub's own Pages record.
          base=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.html_url')
          base="${base%/}"   # strip trailing slash for clean joins
          echo "Probing site: ${base}"

          # Content sentinel: mkdocs.yml site_name. Confirms the response is
          # the rendered MkDocs home, not a stray static file or placeholder
          # (the prior outage served odd 200s for static files while the root
          # 404'd — a status-only check could be fooled by the inverse).
          sentinel="Dynamic Alerting Platform"

          probe() {
            # $1 = url. Echoes the HTTP status; sets BODY to the response body.
            local url="$1" code
            # --compressed: REQUIRED. GitHub Pages sends `Vary: Accept-Encoding`
            # and the CI runner's curl requests gzip, so WITHOUT this the body
            # arrives as gzip bytes and the content grep below never matches
            # (200-but-"sentinel missing" — the #864 false-red). --compressed
            # makes curl decompress, so BODY is always plaintext HTML. (The bug
            # was masked when reproduced with a bare local `curl` that sends no
            # Accept-Encoding and thus gets identity.)
            # No -f: keep the real status code (and body) on 4xx/5xx for
            # diagnostics. A non-zero exit = transport error (DNS/timeout),
            # which falls through to BODY="" / code="".
            BODY=$(curl -sS --compressed --max-time 20 -w '\n%{http_code}' "$url" 2>/dev/null) || BODY=""
            code="${BODY##*$'\n'}"
            BODY="${BODY%$'\n'*}"
            echo "$code"
          }

          # Shared retry window across BOTH URLs (one budget, not one per URL),
          # a modest cushion for genuine transient post-deploy unavailability —
          # the workflow_run fires the moment deploy-pages reports success.
          # NOTE: the #864 false-red was NOT a propagation/timing issue — it was
          # the missing `--compressed` above (gzip body → unsearchable sentinel).
          # Retries never fixed it; don't inflate this budget chasing a ghost.
          ATTEMPTS=8
          SLEEP=20
          ok=0
          root_status=""; en_status=""; root_ok=0
          for attempt in $(seq 1 "$ATTEMPTS"); do
            root_status=$(probe "${base}/"); root_body="$BODY"
            en_status=$(probe "${base}/en/")
            root_ok=0; en_ok=0
            # Root: status 200 AND rendered-home content — guards the "200 but
            # wrong content" inverse (a stray static file 200 while the real
            # root is broken, the shape the original outage could have taken).
            if [ "$root_status" = "200" ] && grep -qiF "$sentinel" <<<"$root_body"; then root_ok=1; fi
            # /en/: status-only. Its <title> also carries the sentinel, but a
            # 200 is enough to prove the i18n locale tree built and serves.
            if [ "$en_status" = "200" ]; then en_ok=1; fi
            if [ "$root_ok" = 1 ] && [ "$en_ok" = 1 ]; then
              echo "✅ attempt ${attempt}/${ATTEMPTS}: / -> 200 (content OK), /en/ -> 200"
              ok=1; break
            fi
            if [ "$root_ok" = 1 ]; then root_note=ok; else root_note="bad(${root_status:-no-response})"; fi
            if [ "$en_ok" = 1 ]; then en_note=ok; else en_note="bad(${en_status:-no-response})"; fi
            echo "attempt ${attempt}/${ATTEMPTS}: root=${root_note} /en/=${en_note} — waiting for propagation"
            if [ "$attempt" -lt "$ATTEMPTS" ]; then sleep "$SLEEP"; fi
          done
          if [ "$ok" != 1 ]; then
            root_content=$([ "$root_ok" = 1 ] && echo ok || echo missing)
            echo "::error::Live docs site unhealthy after ${ATTEMPTS} attempts (~$((ATTEMPTS * SLEEP / 60)) min). Last: root status=${root_status:-no-response} content=${root_content}, /en/ status=${en_status:-no-response}. Either the deploy didn't actually serve, or propagation is abnormally slow."
            exit 1
          fi
