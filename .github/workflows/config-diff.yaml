# config-diff.yaml — Blast Radius Report on Config PRs
#
# Automatically posts a config diff report as a PR comment when tenant
# configs are modified. Part of the Data-Driven Threshold Review pipeline:
#   1. config-diff (this workflow) — blast radius preview
#   2. backtest (manual / on-demand) — historical threshold replay
#
# Exit codes from config_diff.py:
#   0 = no changes (skip comment)
#   1 = changes detected (post report)
#   2 = error

name: Config Diff

on:
  pull_request:
    branches: [main]
    paths:
      - "components/threshold-exporter/config/conf.d/**"

permissions:
  pull-requests: write

jobs:
  blast-radius:
    name: Blast Radius Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full history for base branch comparison

      - name: Extract base branch configs
        run: |
          mkdir -p /tmp/old-conf.d
          git show origin/${{ github.base_ref }}:components/threshold-exporter/config/conf.d/ > /dev/null 2>&1 || exit 0
          for f in $(git ls-tree --name-only origin/${{ github.base_ref }} components/threshold-exporter/config/conf.d/); do
            fname=$(basename "$f")
            git show "origin/${{ github.base_ref }}:$f" > "/tmp/old-conf.d/$fname" 2>/dev/null || true
          done

      - name: Run config diff
        id: diff
        run: |
          docker run --rm \
            -v /tmp/old-conf.d:/data/old:ro \
            -v ${{ github.workspace }}/components/threshold-exporter/config/conf.d:/data/new:ro \
            ghcr.io/vencil/da-tools:v2.7.0 \
            config-diff --old-dir /data/old --new-dir /data/new \
            > /tmp/diff-report.md || true
          # config-diff exits 1 when changes exist (expected)
          if [ -s /tmp/diff-report.md ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/diff-report.md', 'utf8');
            const marker = '<!-- config-diff-bot -->';
            const body = `${marker}\n## 🔍 Config Diff — Blast Radius Report\n\n${report}\n\n---\n*Generated by [da-tools config-diff](../blob/main/scripts/tools/ops/config_diff.py) • Data-Driven Threshold Review*`;

            // Find and update existing comment, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
