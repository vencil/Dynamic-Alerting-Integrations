name: Secret Scan (L2 server-side)

# L2 of the L0/L1/L2/L3 secret-scan multi-layer (#445 AC ii).
#
#   L0  GitHub native push-protection           (#470, repo setting)
#   L1  pre-commit hook, local, bypassable       (#445 AC i, secrets-scan-staged)
#   L2  THIS — server-side, unbypassable         (#445 AC ii)
#   L3  release-time image digest verification   (#445 AC iii)
#
# L1 can be skipped with `git commit --no-verify`; L2 cannot — it runs on
# GitHub's infrastructure on every PR and nightly, regardless of any
# contributor's local tooling.
#
# Two scan modes:
#   - pull_request → diff-only scan (commits in base..head). Target ≤ 1 min.
#   - schedule (nightly 02:00 UTC) / workflow_dispatch → full git-history scan.
#
# Verified/unverified policy is owned by scripts/tools/lint/trufflehog_to_sarif.py
# (trufflehog has no native SARIF output; the converter also classifies):
#   - VERIFIED finding (credential confirmed live) → SARIF `error` + the
#     converter exits 1 → this workflow fails → PR merge blocked / nightly
#     emails the maintainer. Triggers the SOP (rotate first).
#   - unverified/unknown finding → SARIF `warning`, converter exits 0 →
#     surfaced in Code Scanning, does NOT block.
#
# Forked-PR handling: a PR from a fork gets a read-only GITHUB_TOKEN and
# CANNOT write security-events. The diff scan still RUNS; the SARIF is
# uploaded as a plain artifact instead of to Code Scanning. The nightly
# full scan (which runs on the main repo with a write token) backfills the
# Security tab. We deliberately do NOT use `pull_request_target` — that
# would run fork-authored code with a privileged token (RCE-to-secrets).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # 02:00 UTC daily — full git-history scan.
    - cron: "0 2 * * *"
  workflow_dispatch: {}

# Explicit, least-privilege. NOT inherited from repo defaults.
permissions:
  contents: read            # checkout
  security-events: write    # upload-sarif → Code Scanning
  pull-requests: read       # read PR base/head metadata

concurrency:
  # Supersede stale PR runs when a new commit lands (avoids the Ghost-Green
  # race where an older run's result attaches to a newer commit). Each
  # scheduled run has a distinct ref so they don't cancel each other.
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned trufflehog version — verified real (CLI release v3.95.3).
  TRUFFLEHOG_VERSION: "3.95.3"
  # trufflehog's `git` mode does an INTERNAL `git clone` of the repo.
  # This repo uses Git LFS for visual-regression PNG snapshots; the
  # clone's checkout invokes the LFS smudge filter, which fails when an
  # LFS object is missing from remote storage ("remote missing object"
  # → smudge filter failed → checkout aborts → whole scan dies).
  # Secret scanning never needs PNG binary content — skip LFS smudge so
  # trufflehog's clone checks out LFS *pointer* files (tiny text) and
  # proceeds. Inherited by trufflehog's `git clone` subprocess.
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  secret-scan:
    name: Scan for secrets (trufflehog → SARIF)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: PR diff scan needs base..head reachable; nightly
          # scans the whole history. fetch-depth:1 would make both useless.
          fetch-depth: 0
          # For PR events, check out the PR head SHA explicitly (not the
          # auto-generated merge ref) so the scanned commit set matches
          # what the contributor actually pushed.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Determine scan mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=pr" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Install trufflehog
        run: |
          set -euo pipefail
          # Official install.sh, pinned to an explicit release tag. install.sh
          # resolves the correct release asset for the runner OS/arch — this
          # avoids guessing a container-image tag string (`v3.95.3` vs
          # `3.95.3`), which would be a fabricated-pin risk.
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin "v${TRUFFLEHOG_VERSION}"
          trufflehog --version

      - name: Run trufflehog (diff scan)
        if: steps.mode.outputs.mode == 'pr'
        run: |
          set -euo pipefail
          # Scan from the MERGE BASE (common ancestor), NOT the base
          # branch's current tip. `pull_request.base.sha` is the base
          # branch HEAD at event time — if `main` advanced after the PR
          # branched, that SHA is NOT in the PR branch's ancestry.
          # trufflehog --since-commit with a non-ancestor SHA can't bound
          # the walk and falls back to scanning the FULL history (slow +
          # surfaces years-old unrelated findings as noise). The merge
          # base is the actual fork point, so the range is exactly the
          # PR's own commits. (Gemini review of PR #496 — Git Ancestry Trap.)
          #
          # actions/checkout fetch-depth:0 fetches commits but not
          # necessarily the base-branch ref — fetch it so merge-base
          # resolves (same pattern as planning-status-sync.yaml).
          git fetch --no-tags --quiet origin "${{ github.event.pull_request.base.ref }}"
          MERGE_BASE=$(git merge-base HEAD "origin/${{ github.event.pull_request.base.ref }}")
          echo "Diff scan from merge-base: ${MERGE_BASE}"
          # No --fail: trufflehog exits 0 on findings by default; the
          # converter owns the block/warn policy. --json → NDJSON on stdout.
          trufflehog git "file://${PWD}" \
            --since-commit "${MERGE_BASE}" \
            --json \
            > findings.json
          echo "trufflehog diff scan complete: $(wc -l < findings.json) finding line(s)"

      - name: Run trufflehog (full git-history scan)
        if: steps.mode.outputs.mode == 'full'
        run: |
          set -euo pipefail
          trufflehog git "file://${PWD}" \
            --json \
            > findings.json
          echo "trufflehog full scan complete: $(wc -l < findings.json) finding line(s)"

      - name: Convert to SARIF + apply verified-finding policy
        id: convert
        run: |
          python3 -X utf8 scripts/tools/lint/trufflehog_to_sarif.py \
            --input findings.json \
            --output results.sarif \
            --tool-version "${TRUFFLEHOG_VERSION}" \
            --scan-mode "${{ steps.mode.outputs.mode }}"

      # --- Surface results. Both upload steps use `if: always()` so a
      #     VERIFIED finding (convert step exited 1) still lands in Code
      #     Scanning / artifacts before the job's failure propagates.
      #     The `convert.outcome != 'skipped'` guard avoids a confusing
      #     "results.sarif not found" secondary failure when an earlier
      #     step (trufflehog install/scan) failed and convert never ran. ---

      - name: Upload SARIF to Code Scanning
        # Skip for forked PRs — their read-only token cannot write
        # security-events; the artifact-fallback step below handles them.
        if: >-
          always() &&
          steps.convert.outcome != 'skipped' &&
          !(github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.fork)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          # Distinct category so this doesn't clobber CodeQL's own
          # Code Scanning results.
          category: secret-scan

      - name: Upload SARIF as artifact (forked-PR fallback)
        # Forked PRs only: no security-events write. The nightly full scan
        # (main repo, write token) backfills the Security tab.
        if: >-
          always() &&
          steps.convert.outcome != 'skipped' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-sarif
          path: results.sarif
          retention-days: 14
