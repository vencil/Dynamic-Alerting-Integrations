# docs-ci.yaml — Documentation CI/CD Pipeline
#
# Validates and renders documentation on every PR that touches docs/**/*.md
# or rule-packs/**/*.md.
#
# Jobs:
#   1. validate-mermaid: Syntax check + optional mmdc render of Mermaid diagrams
#   2. check-links: Cross-reference validation (internal links, anchors, files)
#   3. check-frontmatter: YAML front matter consistency check
#   4. check-coverage: Documentation coverage thresholds (80% minimum)
#
# Uses caching (npm + pip) for speed.

name: Documentation CI

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "docs/**/*.jsx"
      - "docs/**/*.html"
      - "rule-packs/**/*.md"
      - "README.md"
      - "README.en.md"
      - "CLAUDE.md"
      - "mkdocs.yml"
      - "scripts/tools/**/*.py"
      - ".github/workflows/docs-ci.yaml"
      - ".pre-commit-config.yaml"
  # head-blob-hygiene also runs on every push so historical drift is caught
  # without waiting for a PR that touches docs/.
  push:
    branches: [main]

jobs:
  validate-mermaid:
    name: Validate Mermaid Diagrams
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          # NOTE: cache: "npm" is intentionally omitted — this repo has no
          # root-level package-lock.json (only docs/interactive/ has one).
          # Enabling cache without a lockfile makes setup-node fail with
          # "Dependencies lock file is not found".

      - name: Cache npm global dir (mermaid-cli, puppeteer)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-mermaid-cli
          restore-keys: |
            ${{ runner.os }}-npm-mermaid-

      - name: Install mermaid-cli
        run: |
          npm install -g @mermaid-js/mermaid-cli puppeteer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Validate and render Mermaid diagrams
        run: |
          # validate_mermaid.py takes a single positional path (nargs='?').
          # Run it twice — once for docs/, once for rule-packs/ — so both
          # trees are covered. Both must pass.
          python scripts/tools/lint/validate_mermaid.py docs/ --ci --render
          python scripts/tools/lint/validate_mermaid.py rule-packs/ --ci --render

  check-links:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Check document links and cross-references (Markdown)
        run: |
          # check_doc_links.py scans the whole repo from --repo-root (default
          # ".") and does not accept positional path arguments. Passing
          # `docs/ rule-packs/` here used to fail with
          # `unrecognized arguments: docs/ rule-packs/`.
          python scripts/tools/lint/check_doc_links.py --ci

      - name: Check raw HTML doc-links (MkDocs-aware)
        run: |
          python scripts/tools/lint/lint_html_doc_links.py --ci

  head-blob-hygiene:
    name: HEAD Blob Hygiene
    # Scans every committed blob in HEAD for corruption the staged-file
    # hygiene hook cannot retroactively fix:
    #   - NUL bytes (e.g. the architecture-quiz.jsx regression) — always fatal
    #   - Truncated YAML/JSON (e.g. mkdocs.yml ending in 'CHANGELOG.m') — always fatal
    #   - Missing EOF newlines — detected but NOT failed (~40 pre-existing
    #     drift files as of the harness-hardening PR; needs a separate
    #     cleanup pass before we can enable --strict in CI).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Scan HEAD blobs
        run: |
          # --strict is intentionally omitted until the pre-existing EOF
          # drift is cleaned up. NUL + TRUNC defects still fail the build.
          python scripts/tools/lint/check_head_blob_hygiene.py --ci

  check-frontmatter:
    name: Check Documentation Front Matter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Validate documentation YAML front matter
        run: |
          # add_frontmatter.py scans a single base directory via --base-dir
          # and does not accept positional paths. Run it twice so both
          # docs/ and rule-packs/ are covered; both must pass.
          python scripts/tools/dx/add_frontmatter.py --check --base-dir docs/
          python scripts/tools/dx/add_frontmatter.py --check --base-dir rule-packs/

  check-coverage:
    name: Check Documentation Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Check documentation coverage (80% minimum)
        run: |
          # doc_coverage.py scans the whole repo from --repo-root (default
          # ".") and does not accept positional paths. Passing
          # `docs/ rule-packs/` here used to fail with
          # `unrecognized arguments: docs/ rule-packs/`.
          python scripts/tools/dx/doc_coverage.py --ci

      - name: Update coverage badge JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python scripts/tools/dx/doc_coverage.py --badge --json > docs/assets/doc-coverage-badge.json || true

      - name: Sync glossary abbreviations
        run: |
          python scripts/tools/dx/sync_glossary_abbr.py --check

      - name: Commit badge update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/doc-coverage-badge.json
          git diff --staged --quiet || git commit -m "docs: update coverage badge [skip ci]"
          git push || true

  mkdocs-build:
    name: MkDocs Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-${{ hashFiles('mkdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-mkdocs-

      - name: Install MkDocs and plugins
        run: |
          pip install mkdocs-material mkdocs-static-i18n pymdown-extensions

      - name: Build site (strict mode)
        run: |
          # Build with strict mode, filtering known acceptable warnings:
          #   - mkdocs_static_i18n navigation.instant compat (known limitation)
          #   - README.md excluded by index.md conflict (expected)
          mkdocs build 2>&1 | tee mkdocs-build.log
          # Filter known warnings and fail on any remaining
          REAL_WARNS=$(grep "^WARNING" mkdocs-build.log \
            | grep -v "mkdocs_static_i18n.*navigation.instant" \
            | grep -v "Excluding.*README.md.*conflicts with.*index.md" \
            | wc -l)
          echo "::notice::Actionable MkDocs warnings: $REAL_WARNS"
          if [ "$REAL_WARNS" -gt 0 ]; then
            grep "^WARNING" mkdocs-build.log \
              | grep -v "mkdocs_static_i18n.*navigation.instant" \
              | grep -v "Excluding.*README.md.*conflicts with.*index.md"
            echo "::error::MkDocs build has $REAL_WARNS actionable warnings. Fix broken links."
            exit 1
          fi

  doc-line-count:
    name: Documentation Line Count Monitor
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Compare doc line counts
        run: |
          PR_LINES=$(find docs rule-packs -name '*.md' -exec cat {} + | wc -l)
          BASE_LINES=$(find base/docs base/rule-packs -name '*.md' -exec cat {} + 2>/dev/null | wc -l)
          DIFF=$((PR_LINES - BASE_LINES))
          echo "Base: $BASE_LINES lines | PR: $PR_LINES lines | Delta: $DIFF lines"
          if [ "$DIFF" -gt 200 ]; then
            echo "::warning::Doc line count increased by $DIFF lines (threshold: 200). Consider trimming redundant content."
          elif [ "$DIFF" -lt -50 ]; then
            echo "::notice::Doc line count decreased by ${DIFF#-} lines. Good job trimming!"
          fi

  drift-checks:
    name: Drift Detection (validate_all.py)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Run drift checks (versions, tool-map, doc-map, rule-pack-stats)
        run: |
          python scripts/tools/validate_all.py \
            --only versions,tool_map,doc_map,rule_pack_stats,changelog,glossary,includes,repo_name \
            --ci

  all-checks:
    name: All Documentation Checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate-mermaid
      - check-links
      - head-blob-hygiene
      - check-frontmatter
      - check-coverage
      - mkdocs-build
      - drift-checks
    steps:
      - name: Check results
        run: |
          echo "validate-mermaid: ${{ needs.validate-mermaid.result }}"
          echo "check-links: ${{ needs.check-links.result }}"
          echo "head-blob-hygiene: ${{ needs.head-blob-hygiene.result }}"
          echo "check-frontmatter: ${{ needs.check-frontmatter.result }}"
          echo "check-coverage: ${{ needs.check-coverage.result }}"
          echo "mkdocs-build: ${{ needs.mkdocs-build.result }}"
          echo "drift-checks: ${{ needs.drift-checks.result }}"
          if [[ "${{ needs.validate-mermaid.result }}" == "failure" || \
                "${{ needs.check-links.result }}" == "failure" || \
                "${{ needs.head-blob-hygiene.result }}" == "failure" || \
                "${{ needs.check-frontmatter.result }}" == "failure" || \
                "${{ needs.check-coverage.result }}" == "failure" || \
                "${{ needs.mkdocs-build.result }}" == "failure" || \
                "${{ needs.drift-checks.result }}" == "failure" ]]; then
            echo "::error::One or more documentation checks failed"
            exit 1
          fi
          echo "All documentation checks passed"
