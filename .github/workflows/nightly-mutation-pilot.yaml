name: Nightly Mutation Pilot

# P1-7 (testing-quality follow-on): nightly run of the mutation pilot scripts
# (`tests/shared/_mutation_pilot.py` for Python, `tests/shared/_go_mutation_pilot.py`
# for Go) so the mutation score has continuous observability instead of being
# a one-shot snapshot.
#
# Why nightly + actionable-red (fail-open removed, ROI refactor round 3):
#   - Mutation pilots are slow (each mutation = re-run a focused pytest scope
#     or `go test`); running on every PR multiplies CI time and offers low
#     marginal value because the pilots don't change shape between PRs.
#   - The pilots exit non-zero ONLY on a real signal: a NEW (non-equivalent)
#     surviving mutation, or a SETUP-FAIL (catalog rot that slipped past the
#     PR-time gate in tests/shared/test_mutation_catalog.py). Known
#     equivalent survivors are marked known_equivalent=True in the catalogs
#     and keep the job green.
#   - A red run is therefore always worth investigating — GitHub notifies
#     the owner automatically when a scheduled workflow fails. The Step
#     Summary + uploaded log artifact carry the survivor / rot list.
#   - Workflow still does NOT block any PR (schedule/dispatch only).
#
# Floor scores (re-verified 2026-07-16 after re-anchoring 6 rotted Python
# catalog entries that had been silently reported as SETUP-FAIL):
#   - Python:  67 / 70 mutations caught (~96%), 0 setup-failures;
#              3 known equivalent-mutation survivors
#   - Go:      14 / 15 mutations caught (~93%); 1 known equivalent survivor
# These are the BASELINE — drift below this should prompt investigation.
# Catalog rot (old_string no longer matching refactored source) is caught
# at PR time by tests/shared/test_mutation_catalog.py, not just here.

on:
  schedule:
    # 17:00 UTC = 01:00 Asia/Taipei. Runs once daily, after the nightly
    # race detector window so the two don't pile on the runner pool.
    - cron: "0 17 * * *"
  workflow_dispatch:
    # Manual trigger lets a reviewer re-run the pilot before merging
    # a coverage-impacting PR.

permissions:
  contents: read

concurrency:
  # Multiple schedule + dispatch invocations on the same ref serialize
  # rather than parallelize — mutation pilots are expensive and we don't
  # need two concurrent runs.
  group: nightly-mutation-pilot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  python-pilot:
    name: Python Mutation Pilot
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        # No requirements.txt at repo root — this project uses pyproject.toml +
        # inline workflow deps. Mirror the canonical Python test dep set from
        # ci.yml (the python-tests job) since the pilot re-runs the same
        # hypothesis-backed property tests under pytest.
        run: |
          python -m pip install --upgrade pip
          # pathspec: check_iac_vibe_rules.py (Container SAST L1, #448/TRK-311)
          # imports it; tests/lint/ unit tests need it. Sync with ci.yml +
          # validate.yaml.
          pip install pyyaml croniter pytest pytest-cov pytest-timeout pytest-xdist promql-parser hypothesis pathspec

      - name: Run Python mutation pilot
        # The pilot exits non-zero only on a real signal (NEW survivor or
        # catalog rot — see the header comment). Let that rc fail the job:
        # pipefail is required because `| tee` would otherwise mask the
        # pilot's exit code with tee's (the old `rc=$?` capture actually
        # recorded tee's rc, always 0).
        run: |
          set -o pipefail
          python tests/shared/_mutation_pilot.py 2>&1 | tee mutation-python.log

      - name: Extract summary
        id: summary
        if: always()
        run: |
          # Last 50 lines should include the SUMMARY block + survivor list.
          tail -n 50 mutation-python.log > mutation-python-summary.log
          {
            echo "## Python Mutation Pilot — $(date -u +%Y-%m-%d)"
            echo ""
            echo '```'
            tail -n 30 mutation-python.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-python-${{ github.run_id }}
          path: mutation-python.log
          retention-days: 30

  go-pilot:
    name: Go Mutation Pilot
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-

      - name: Run Go mutation pilot
        # Same exit contract as the Python job — non-zero rc means a NEW
        # survivor or catalog rot, and the job goes red so the scheduled-run
        # failure notification reaches the owner.
        run: |
          set -o pipefail
          python tests/shared/_go_mutation_pilot.py 2>&1 | tee mutation-go.log

      - name: Extract summary
        if: always()
        run: |
          tail -n 50 mutation-go.log > mutation-go-summary.log
          {
            echo "## Go Mutation Pilot — $(date -u +%Y-%m-%d)"
            echo ""
            echo '```'
            tail -n 30 mutation-go.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-go-${{ github.run_id }}
          path: mutation-go.log
          retention-days: 30
