name: Bench Record (nightly)

# Release-baseline source — produces the `bench-baseline.txt` artifact that
# `release-attach-bench-baseline.yaml` attaches to each GitHub Release as
# `bench-baseline-<tag>.txt`.
#
# Origin: Phase 1 of the pre-tag benchmark gate (issue #60, CLOSED). The
# original goal was "~28 nightly data points / 4 weeks to characterize
# variance on GitHub Actions runners" so Phase 2 could pick a sensible
# threshold. That goal is met: 33 schedule data points over 4.7 weeks
# (2026-04-26 → 2026-05-28, 33/33 green). Phase 2 now lives in
# `bench-gate-pr.yaml` (#435, Tier 1 PR-time) and
# `bench-gate-release.yaml` (#458, Tier 2 release-time); this workflow no
# longer drives the variance-characterization mission and is NOT a gate.
#
# Why keep it running: `release-attach-bench-baseline.yaml` needs a recent
# 03:00-UTC artifact (the schedule deliberately picks a low-contention
# window) so each release ships with a representative baseline. Retiring
# this workflow → releases lose their `bench-baseline-<tag>.txt` asset.
#
# Scope:
#   - Runs only on main (cron + workflow_dispatch from main).
#   - Bench artifacts retained 90 days for cross-quarter trend review.
#   - Go version pinned to match ci.yml.

on:
  schedule:
    # 03:00 UTC nightly — runner contention typically lowest in this window.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench-record:
    name: 1000-tenant baseline (informational)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-
            ${{ runner.os }}-go-

      - name: Run benchmark-report
        run: make benchmark-report

      # Append the control canary to the nightly baseline so the trend watchdog
      # can derive a per-night NOISE FLOOR from BenchmarkControlCanaryCPU's
      # own night-to-night variance — it never alerts on movement smaller than
      # the runner's intrinsic noise. Same canary module the PR gate uses
      # (scripts/tools/ops/bench-canary), so the floor is apples-to-apples.
      - name: Append control canary to baseline
        run: |
          set -euo pipefail
          ( cd scripts/tools/ops/bench-canary && \
            go test -bench='ControlCanary' -benchmem -run='^$' -count=6 -benchtime=1s . ) \
            >> .build/bench-baseline.txt 2>>.build/bench.err.log || \
            echo "::warning::canary append failed — trend watchdog will fall back to the fixed floor"

      - name: Summarize results
        if: always()
        run: |
          echo "### Bench Record — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f .build/bench-baseline.txt ]; then
            cat .build/bench-baseline.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "(no bench output produced)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-baseline-${{ github.run_id }}
          path: |
            .build/bench-baseline.txt
            .build/bench.raw.jsonl
            .build/bench.err.log
          retention-days: 90
          if-no-files-found: warn

  # Sustained-trend watchdog (Phase 2 of the bench-gate redesign). Runs AFTER
  # the nightly baseline is recorded + uploaded, pulls the last N nights'
  # artifacts, and opens / updates / auto-closes a `perf-trend` issue when main
  # shows a SUSTAINED regression (not a single-night blip). Detection +
  # closed-loop logic live in analyze_bench_history.py --trend-watch (R1
  # sustained-vs-anchored-baseline + R2 creep-vs-best-night, floored by the
  # control canary's own night-to-night CV). This run's own artifact isn't
  # "success" yet so it isn't in the window — a one-night lag, which is fine for
  # a multi-night trend detector.
  trend-watch:
    name: Nightly sustained-trend watchdog
    needs: bench-record
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read   # gh run list / gh run download (prior nights' artifacts)
      issues: write   # open / comment / close the perf-trend issue
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run trend watchdog (open/update/close perf-trend issue)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/tools/dx/analyze_bench_history.py --trend-watch --trend-limit 14
