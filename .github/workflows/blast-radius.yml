# blast-radius.yml — Blast Radius Report (v2.7.0+) for hierarchical conf.d/
#
# Evolution of config-diff.yaml for hierarchical conf.d/ with _defaults.yaml
# inheritance (ADR-017/018). Uses describe-tenant --all to compute effective
# configs on both base and PR, then blast_radius.py to diff and classify.
#
# Tiers:
#   A = threshold / routing receiver changes (highlight)
#   B = other alerting field changes (list)
#   C = format-only changes (don't list)

name: Blast Radius

on:
  pull_request:
    branches: [main]
    paths:
      - "components/threshold-exporter/config/conf.d/**"
      - "conf.d/**"

permissions:
  pull-requests: write

jobs:
  blast-radius:
    name: Blast Radius Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Detect conf.d path
        id: detect
        run: |
          # Support both repo-root conf.d/ and exporter conf.d/
          if [ -d "conf.d" ]; then
            echo "conf_d=conf.d" >> $GITHUB_OUTPUT
          elif [ -d "components/threshold-exporter/config/conf.d" ]; then
            echo "conf_d=components/threshold-exporter/config/conf.d" >> $GITHUB_OUTPUT
          else
            echo "conf_d=" >> $GITHUB_OUTPUT
            echo "::warning::No conf.d/ directory found, skipping blast radius"
          fi

      - name: Generate PR effective configs
        if: steps.detect.outputs.conf_d != ''
        run: |
          python3 scripts/tools/dx/describe_tenant.py \
            --all \
            --conf-d "${{ steps.detect.outputs.conf_d }}" \
            --output /tmp/pr-effective.json

      - name: Generate base effective configs
        if: steps.detect.outputs.conf_d != ''
        run: |
          git stash --include-untracked || true
          git checkout "origin/${{ github.base_ref }}" -- . 2>/dev/null || true

          # Base branch may not have describe-tenant yet (pre-v2.7.0)
          if [ -f "scripts/tools/dx/describe_tenant.py" ]; then
            python3 scripts/tools/dx/describe_tenant.py \
              --all \
              --conf-d "${{ steps.detect.outputs.conf_d }}" \
              --output /tmp/base-effective.json || echo "{}" > /tmp/base-effective.json
          else
            echo "{}" > /tmp/base-effective.json
          fi

          # Restore PR state
          git checkout - -- . 2>/dev/null || true
          git stash pop 2>/dev/null || true

      - name: Compute blast radius
        if: steps.detect.outputs.conf_d != ''
        id: blast
        run: |
          # Find changed conf.d files for header
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- "${{ steps.detect.outputs.conf_d }}" | head -5 | tr '\n' ', ' | sed 's/,$//')

          python3 scripts/tools/ops/blast_radius.py \
            --base /tmp/base-effective.json \
            --pr /tmp/pr-effective.json \
            --format json \
            --output /tmp/blast-radius-report.json

          python3 scripts/tools/ops/blast_radius.py \
            --base /tmp/base-effective.json \
            --pr /tmp/pr-effective.json \
            --format markdown \
            --changed-files "$CHANGED_FILES" \
            --output /tmp/blast-radius-comment.md

          if [ -s /tmp/blast-radius-comment.md ]; then
            echo "has_report=true" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        if: steps.blast.outputs.has_report == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/blast-radius-comment.md', 'utf8');
            const marker = '<!-- blast-radius-bot -->';
            const body = `${marker}\n${report}\n\n---\n*Generated by [blast_radius.py](../blob/main/scripts/tools/ops/blast_radius.py) • v2.7.0 Hierarchical Config Blast Radius*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload report artifact
        if: steps.blast.outputs.has_report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: blast-radius-report
          path: /tmp/blast-radius-report.json
          retention-days: 30
