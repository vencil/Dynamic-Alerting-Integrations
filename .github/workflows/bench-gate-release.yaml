name: Bench Gate (release-time, Tier 2)

# Phase 2 — Tier 2 of bench gating redesign (issue #433 W4).
#
# Purpose: surface CUMULATIVE perf drift between consecutive platform
# releases. Complements Tier 1 (PR-time, blame per-PR) by catching the
# slow-drift case Tier 1 cannot see — 50 PRs each individually below the
# 5% threshold can sum to a 50% release-over-release regression.
#
# Differences from Tier 1:
#   - Triggers on `release: published` for the `v*` platform line (not on
#     PR events). Also supports `workflow_dispatch` for pre-tag review.
#   - Compares CURRENT release tag vs PRIOR `v*` release tag (not merge-
#     base). Auto-discovers prior tag via `git describe`.
#   - INFORMATIONAL only — never blocks a release. Posts a comment to the
#     release and a step summary; maintainer reads, decides if any drift
#     warrants follow-up action (revert, optimize, accept).
#   - Threshold looser than Tier 1: `-alpha=0.05` + `|Δ| ≥ 10%` magnitude
#     floor. Per-PR gate is intentionally strict (catch what each PR
#     introduces); release gate is intentionally looser (only loudly flag
#     drifts large enough to be user-visible).
#   - No override label mechanism — maintainer's "override" is to simply
#     acknowledge the drift in release notes (free-form, not enforced).
#
# Topology: single-runner sequential, identical pattern to Tier 1 v5
# (closes Trap 12 — heterogeneous runner pool sharding). Checkout prior
# tag → bench → drop_caches → checkout current → bench → benchstat.
#
# Resilience: this workflow gracefully handles "no prior baseline":
#   - If `git describe` finds no prior `v*` tag (e.g., first-ever release),
#     log a warning and exit 0 with an "informational baseline only"
#     comment. This is expected for v2.8.0 — v2.7.0 (the only prior `v*`
#     release at time of design) was created BEFORE PR #117 shipped the
#     auto-attach workflow, so it has no comparable baseline format.
#     First meaningful Tier 2 exercise will be v2.9.0 (vs v2.8.0).
#
# See: issue #433, bench-gate-pr.yaml (Tier 1), release-attach-bench-
#      baseline.yaml (nightly→release asset pipeline),
#      bench-gate-rollout.md (design).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      prior_ref:
        description: 'Prior release tag to compare against (e.g., v2.7.0). Leave blank for auto-discovery.'
        type: string
        required: false
      current_ref:
        description: 'Current ref to bench (commit SHA or tag). Defaults to current branch HEAD.'
        type: string
        required: false

permissions:
  # Read-only is sufficient: we don't mutate release notes (would clobber
  # maintainer text), don't commit, don't download cross-workflow artifacts.
  # `gh release view` and `git checkout` both work with contents: read.
  contents: read

jobs:
  tier2:
    name: Tier 2 release-vs-release drift report
    # Filter to platform `v*` releases only — other release lines
    # (exporter/v*, tools/v*, portal/v*, tenant-api/v*) have their own
    # cadence and aren't in scope for the platform cumulative-drift
    # metric. workflow_dispatch always runs (for manual review).
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '/'))
    runs-on: ubuntu-latest
    # Same generous timeout as Tier 1 v5 (round-12 catch — preserve
    # diagnostic output even on slow runs).
    timeout-minutes: 40
    steps:
      - name: Checkout repo (full history for both tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need all tags + history

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Cache Go modules + build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-
            ${{ runner.os }}-go-

      - name: Install benchstat
        run: |
          # @latest acceptable (output format stable ~2 years). Pin a version
          # if a future release breaks the regression grep/awk OR the
          # `-filter` benchfilter unit syntax `.unit:(... OR ...)` (#608) — the
          # #611 shape-assertion in the Compare step fails loud and points here.
          # golang.org/x/perf has NO semver tags (only pseudo-versions), so pin
          # to the last known-good pseudo-version, e.g.:
          #   go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260512194132-3cf34090a3db
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat -h 2>&1 | head -5 || true

      # Stash bench harness outside the checkout — same Trap 13a defense
      # as Tier 1 v5. We git-checkout between two tags; harness must be
      # the SAME on both sides regardless of which tag's code is in tree.
      - name: Stash bench harness (use same version on both sides)
        run: |
          mkdir -p "$RUNNER_TEMP/bench-harness"
          cp scripts/tools/ops/bench_wrapper.sh "$RUNNER_TEMP/bench-harness/"
          cp scripts/tools/ops/bench_filter.go "$RUNNER_TEMP/bench-harness/"

      # Resolve current + prior refs. Three input modes:
      # 1. `release: published` event → current = release tag, prior = auto-discovered
      # 2. `workflow_dispatch` with both inputs → use them directly
      # 3. `workflow_dispatch` with only current_ref (or neither) → auto-discover prior from current
      - name: Resolve current + prior refs
        id: refs
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_PRIOR: ${{ inputs.prior_ref }}
          DISPATCH_CURRENT: ${{ inputs.current_ref }}
        run: |
          set -euo pipefail

          # Determine CURRENT ref.
          if [ "$EVENT_NAME" = "release" ]; then
            current_ref="$RELEASE_TAG"
          elif [ -n "$DISPATCH_CURRENT" ]; then
            current_ref="$DISPATCH_CURRENT"
          else
            current_ref=$(git rev-parse HEAD)
          fi
          echo "Resolved current ref: $current_ref"

          # Resolve to a stable commit SHA (so subsequent steps don't get
          # confused if a tag moves).
          current_sha=$(git rev-parse "$current_ref^{commit}")

          # Determine PRIOR ref. Use explicit input if provided; otherwise
          # find the most-recent `v*` tag that is NOT the current one.
          # `git describe --tags --abbrev=0 --match='v*' <ref>^` walks
          # back from <ref>'s first parent and returns the closest `v*`
          # tag. Skip non-platform tags (those with `/` like `exporter/v*`).
          if [ -n "$DISPATCH_PRIOR" ]; then
            prior_ref="$DISPATCH_PRIOR"
            echo "Using explicit prior_ref: $prior_ref"
          else
            # Auto-discover. Use --exclude to skip non-platform tags.
            prior_ref=$(git describe --tags --abbrev=0 \
                          --match='v*' --exclude='*/*' \
                          "$current_sha^" 2>/dev/null || true)
            if [ -z "$prior_ref" ]; then
              echo "::warning::No prior 'v*' tag found before $current_ref. Tier 2 needs a baseline to compare against — will emit informational summary only."
              echo "no_prior=true" >> "$GITHUB_OUTPUT"
              echo "current_sha=$current_sha" >> "$GITHUB_OUTPUT"
              echo "current_ref=$current_ref" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Auto-discovered prior_ref: $prior_ref"
          fi

          prior_sha=$(git rev-parse "$prior_ref^{commit}")

          echo "no_prior=false" >> "$GITHUB_OUTPUT"
          echo "current_ref=$current_ref" >> "$GITHUB_OUTPUT"
          echo "current_sha=$current_sha" >> "$GITHUB_OUTPUT"
          echo "prior_ref=$prior_ref" >> "$GITHUB_OUTPUT"
          echo "prior_sha=$prior_sha" >> "$GITHUB_OUTPUT"

      # Early exit for first-ever release case.
      - name: Render no-prior step summary
        if: steps.refs.outputs.no_prior == 'true'
        env:
          CURRENT_REF: ${{ steps.refs.outputs.current_ref }}
          CURRENT_SHA: ${{ steps.refs.outputs.current_sha }}
        run: |
          {
            echo "## ℹ️ Tier 2 — No prior baseline to compare against"
            echo ""
            echo "Current release: \`$CURRENT_REF\` (\`$CURRENT_SHA\`)."
            echo ""
            echo "No prior \`v*\` tag found in history. This is expected for the"
            echo "first platform release after Tier 2 went live. Subsequent releases"
            echo "will compare against this one."
            echo ""
            echo "(Tier 2 is informational and never blocks a release.)"
          } >> "$GITHUB_STEP_SUMMARY"

      # The bench phase only runs when we have a prior baseline.
      - name: Checkout prior tag for prior bench
        if: steps.refs.outputs.no_prior == 'false'
        run: git checkout ${{ steps.refs.outputs.prior_sha }}

      - name: Run prior benchmark
        if: steps.refs.outputs.no_prior == 'false'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bench-out"
          echo "[bench-prior] running on commit $(git rev-parse HEAD) (ref=${{ steps.refs.outputs.prior_ref }})"
          cd components/threshold-exporter/app
          BENCH_OUT_DIR="$RUNNER_TEMP/bench-out" \
            bash "$RUNNER_TEMP/bench-harness/bench_wrapper.sh" \
            -bench='_1000(_|$)|MixedMode|Simulate_DeepChain' \
            -benchmem \
            -count=6 \
            -run='^$' \
            -timeout=15m \
            -benchtime=3s \
            ./...
          cp "$RUNNER_TEMP/bench-out/bench.out.txt" \
             "$RUNNER_TEMP/bench-out/bench-prior.txt"

      # Same Trap 13b defense — drop OS page cache between the two
      # benches to eliminate ~1-3% systematic cache-warmth bias.
      - name: Drop OS caches between prior and current benches
        if: steps.refs.outputs.no_prior == 'false'
        run: |
          sudo sh -c "sync; echo 3 > /proc/sys/vm/drop_caches" \
            && echo "::notice::OS page cache dropped between prior and current benches" \
            || echo "::warning::drop_caches failed — current bench may show ~1-3% cache-warmth bias"

      # Trap 13a defense — clean workspace before second checkout to
      # prevent "your local changes would be overwritten by checkout".
      - name: Clean workspace between prior and current bench
        if: steps.refs.outputs.no_prior == 'false'
        run: |
          git reset --hard HEAD
          git clean -fd
          git status --short || true

      - name: Checkout current ref for current bench
        if: steps.refs.outputs.no_prior == 'false'
        run: git checkout ${{ steps.refs.outputs.current_sha }}

      - name: Run current benchmark
        if: steps.refs.outputs.no_prior == 'false'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bench-out"
          echo "[bench-current] running on commit $(git rev-parse HEAD) (ref=${{ steps.refs.outputs.current_ref }})"
          cd components/threshold-exporter/app
          BENCH_OUT_DIR="$RUNNER_TEMP/bench-out" \
            bash "$RUNNER_TEMP/bench-harness/bench_wrapper.sh" \
            -bench='_1000(_|$)|MixedMode|Simulate_DeepChain' \
            -benchmem \
            -count=6 \
            -run='^$' \
            -timeout=15m \
            -benchtime=3s \
            ./...
          cp "$RUNNER_TEMP/bench-out/bench.out.txt" \
             "$RUNNER_TEMP/bench-out/bench-current.txt"

      - name: Compare with benchstat (Tier 2 thresholds)
        id: compare
        if: steps.refs.outputs.no_prior == 'false'
        # Tier 2 uses LOOSER thresholds than Tier 1 on purpose:
        #   - Tier 1: α=0.01 + |Δ|≥5%   (catch what each PR introduces)
        #   - Tier 2: α=0.05 + |Δ|≥10%  (catch only user-visible drift)
        # Rationale: Tier 1 already gates per-PR strictness; Tier 2's job
        # is to LOUDLY flag drift large enough to be customer-noticeable
        # (e.g., "v2.9.0 is 15% slower than v2.8.0 on FullDirLoad_1000"),
        # not to nag about cumulative ±5% jitter that probably reflects
        # runner variance across many months.
        #
        # METRIC SCOPE — `-filter '.unit:(sec/op OR B/op OR allocs/op)'` [#608].
        # IDENTICAL fix to Tier 1: the detector greps the WHOLE benchstat
        # output for `+N% (p<α)` rows, so it must not see non-deterministic
        # process-level custom metrics. The bench emits MB-sys / MB-heap-
        # after-gc (runtime/GC high-water) via b.ReportMetric; these drift
        # randomly between processes and would false-flag drift here — ESPE-
        # CIALLY dangerous at Tier 2's looser α=0.05 / 10% on the first real
        # v2.9.0-vs-v2.8.0 exercise, where #459/#606 documented sys_bytes
        # GC-pacing creep under sustained reload. benchstat normalizes
        # ns/op → sec/op; the OR-separated allowlist keeps only deterministic
        # per-op work and auto-excludes goroutines / affected-tenants / any
        # future custom metric. The excluded metrics stay visible in the
        # nightly bench-record artifact (informational), just not gated.
        run: |
          set -euo pipefail
          benchstat -alpha=0.05 \
            -filter '.unit:(sec/op OR B/op OR allocs/op)' \
            "$RUNNER_TEMP/bench-out/bench-prior.txt" \
            "$RUNNER_TEMP/bench-out/bench-current.txt" \
            | tee "$RUNNER_TEMP/bench-out/benchstat.txt"

          # Fail-loud shape assertion (#611): the detector below greps for
          # `+N% (p=...)` rows AND relies on the `-filter` unit names. benchstat
          # is `@latest`, reinstalled every run — a future release that renames
          # a unit or changes the row format would make every grep miss →
          # regression=false → a GREEN gate that silently masks ALL regressions.
          # The `^cpu:` INCONCLUSIVE check can't catch this (cpu headers survive).
          # Require the filtered comparison to have produced recognizable output:
          # ≥1 metric-section header AND ≥1 per-bench result row, else fail loud.
          if ! grep -Eq 'sec/op|B/op|allocs/op' "$RUNNER_TEMP/bench-out/benchstat.txt"; then
            echo "::error::benchstat output shape changed — no metric-section header (sec/op / B/op / allocs/op) in the filtered comparison. The regression detector may be silently passing; pin benchstat to a known-good version (see the Install benchstat step)."
            exit 1
          fi
          if ! grep -Eq '±[[:space:]]*[0-9]+%' "$RUNNER_TEMP/bench-out/benchstat.txt"; then
            echo "::error::benchstat output shape changed — no per-bench result row (matching '± N%') in the filtered comparison. The regression detector may be silently passing; pin benchstat to a known-good version (see the Install benchstat step)."
            exit 1
          fi

          # Tier 2 magnitude floor: 10% (metric scope already applied above
          # via benchstat -filter — the grep only sees deterministic rows).
          MAGNITUDE_FLOOR_PCT=10.0
          regressions=$(grep -E '[[:space:]]\+[0-9]+\.[0-9]+%[[:space:]]*\(p=' \
                          "$RUNNER_TEMP/bench-out/benchstat.txt" \
                        | grep -v geomean \
                        | awk -v floor="$MAGNITUDE_FLOOR_PCT" '{
                            if (match($0, /\+[0-9]+\.[0-9]+%/)) {
                              num = substr($0, RSTART + 1, RLENGTH - 2) + 0
                              if (num >= floor) print
                            }
                          }' || true)

          if [ -n "$regressions" ]; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
            {
              echo "regressions<<__EOF__"
              echo "$regressions"
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi

          # Defensive INCONCLUSIVE check — Tier 2 is single-runner sequential
          # so heterogeneous CPU should be STRUCTURALLY impossible (same VM
          # for both benches). But: if runner provisioning ever changes
          # (e.g., GH migrates to a different runner image, or some bizarre
          # mid-job VM swap), benchstat could silently produce split per-CPU
          # tables with no delta rows → grep finds no `+X%` matches →
          # regression=false → workflow exits 0 → silent system (Trap 14
          # recurrence). Add the same defense-in-depth as Tier 1 v5.
          cpu_lines=$(grep -E '^cpu:' "$RUNNER_TEMP/bench-out/benchstat.txt" 2>/dev/null | sort -u || true)
          inconclusive=false
          if [ -n "$cpu_lines" ] && [ "$(echo "$cpu_lines" | wc -l)" -gt 1 ]; then
            inconclusive=true
            cpu_count=$(echo "$cpu_lines" | wc -l)
            echo "::error::Heterogeneous CPUs detected ($cpu_count distinct) IN A SINGLE-RUNNER JOB. This shouldn't be possible in Tier 2's single-runner topology — investigate runner provisioning. CPUs observed:"
            echo "$cpu_lines"
            {
              echo "inconclusive_cpus<<__CPUEOF__"
              echo "$cpu_lines"
              echo "__CPUEOF__"
            } >> "$GITHUB_OUTPUT"
          fi
          echo "inconclusive=$inconclusive" >> "$GITHUB_OUTPUT"

      - name: Render comparison step summary
        if: steps.refs.outputs.no_prior == 'false'
        env:
          REGRESSION: ${{ steps.compare.outputs.regression }}
          REGRESSIONS_LIST: ${{ steps.compare.outputs.regressions }}
          INCONCLUSIVE: ${{ steps.compare.outputs.inconclusive }}
          INCONCLUSIVE_CPUS: ${{ steps.compare.outputs.inconclusive_cpus }}
          PRIOR_REF: ${{ steps.refs.outputs.prior_ref }}
          PRIOR_SHA: ${{ steps.refs.outputs.prior_sha }}
          CURRENT_REF: ${{ steps.refs.outputs.current_ref }}
          CURRENT_SHA: ${{ steps.refs.outputs.current_sha }}
        run: |
          {
            # INCONCLUSIVE takes precedence — when CPUs differ, "no regression"
            # is a LIE because the comparison didn't actually happen.
            if [ "$INCONCLUSIVE" = "true" ]; then
              echo "## ⚠️ Tier 2 — INCONCLUSIVE (unexpected heterogeneous CPUs)"
            elif [ "$REGRESSION" = "true" ]; then
              echo "## ⚠️ Tier 2 — Cumulative drift flagged (informational)"
            else
              echo "## ✅ Tier 2 — No notable cumulative drift between releases"
            fi
            echo ""
            echo "Compared **current** \`$CURRENT_REF\` (\`$CURRENT_SHA\`)"
            echo "against **prior** \`$PRIOR_REF\` (\`$PRIOR_SHA\`)."
            echo ""
            echo "Thresholds: \`benchstat -alpha=0.05\` + \`|Δ| ≥ 10%\` magnitude floor (looser than Tier 1's 0.01 / 5% — release-level catches only user-visible drift, not per-PR strictness)."
            echo "Metric scope: **deterministic per-op metrics only** (\`sec/op\`, \`B/op\`, \`allocs/op\`) via \`benchstat -filter\`. Non-deterministic process-level metrics (\`MB-sys\`, \`MB-heap-after-gc\`, \`goroutines\`) are excluded — GC/runtime high-water noise, not per-op work (#608)."
            echo "Topology: single-runner sequential (Trap 12 defense — same CPU on both benches)."
            echo ""
            echo "**Tier 2 is INFORMATIONAL** — this report does NOT block the release."
            echo "(The release was already published before this workflow ran. Tier 2 only INFORMS.)"
            echo ""
            echo "**Note on workflow status**: this workflow **deliberately fails (red X)** when"
            echo "drift is flagged. GitHub only sends maintainer-email notifications on workflow"
            echo "FAILURE — a green ✅ would mean nobody ever reads this report. The red X here"
            echo "is the alerting mechanism, NOT a release-blocker."
            echo ""
            echo "Maintainer reviews flagged drift (if any) and decides whether to:"
            echo "- Accept (document acknowledgment in release notes)"
            echo "- Investigate (open a perf issue, target a follow-up release)"
            echo "- Revert/hotfix (only for severe drift the release shouldn't carry)"
            echo ""
            echo "### Full benchstat output"
            echo '```'
            cat "$RUNNER_TEMP/bench-out/benchstat.txt"
            echo '```'
            if [ "$INCONCLUSIVE" = "true" ]; then
              echo ""
              echo "### ⚠️ Inconclusive — unexpected heterogeneous CPUs"
              echo ""
              echo "Tier 2's single-runner sequential topology should make this structurally"
              echo "impossible (same VM for both benches → same CPU). If you're seeing this,"
              echo "investigate runner provisioning (GH image change? mid-job VM swap?). CPUs observed:"
              echo '```'
              echo "$INCONCLUSIVE_CPUS"
              echo '```'
            fi
            if [ "$REGRESSION" = "true" ]; then
              echo ""
              echo "### Drift flagged (≥10% slowdown at p<0.05)"
              echo '```'
              echo "$REGRESSIONS_LIST"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Note on delivery: Tier 2 results live in the workflow's step
      # summary (rendered above). We deliberately do NOT mutate release
      # notes:
      #   - GitHub Releases don't have native comment threads.
      #   - `gh release edit --notes` would OVERWRITE maintainer-authored
      #     release notes, which is unacceptable.
      #   - Linking the workflow run to release-page checks panel is the
      #     standard GH UX — maintainer sees the run status next to the
      #     release and clicks through for the report.
      # If we ever need persistent annotation on the release itself,
      # the right primitive is a GitHub Discussion linked to the release
      # (separate feature, future enhancement).
      - name: Log workflow run location for maintainer reference
        if: steps.refs.outputs.no_prior == 'false'
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "::notice::Tier 2 report rendered to step summary."
          echo "::notice::View at: https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          echo "::notice::Maintainer: read step summary; acknowledge any flagged drift in release notes or open a perf follow-up issue."

      # CRITICAL alerting design — "Fail to inform", not "Fail to block".
      # [Gemini round-1 Tier-2 catch / Trap 14.]
      #
      # Earlier draft of this workflow had no fail step because "Tier 2 is
      # informational, doesn't block releases". That's a UX trap: GitHub
      # only emails the repo maintainer when a workflow FAILS (red X).
      # Green workflows produce zero notifications — no human ever
      # proactively opens a green check to read a step summary.
      #
      # If Tier 2 finds a 20% release-over-release regression but exits 0,
      # the maintainer never sees the report. The whole gate is invisible.
      #
      # The fix preserves "not blocking" semantics by exploiting the
      # event-timing: Tier 2 fires AFTER `release: published`, so the
      # release is already public. The workflow failing AFTER cannot
      # un-publish anything. "Failure" here means ONLY "notify the
      # maintainer", not "block release publication".
      #
      # workflow_dispatch (pre-tag manual review) also benefits: maintainer
      # sees a red check → reads step summary → decides whether to tag.
      - name: Fail workflow on regression or inconclusive — alerting via email-on-failure
        if: steps.compare.outputs.regression == 'true' || steps.compare.outputs.inconclusive == 'true'
        run: |
          if [ "${{ steps.compare.outputs.inconclusive }}" = "true" ]; then
            echo "::error::Tier 2 run INCONCLUSIVE — heterogeneous CPUs detected in single-runner job (shouldn't be possible). Investigate runner provisioning."
            echo "::error::This workflow is failing INTENTIONALLY to trigger GitHub's email-on-failure notification."
            echo "::error::The release itself is NOT blocked — it is already published. Read step summary to debug."
          else
            echo "::error::Cumulative perf drift (≥10% at p<0.05) detected between releases."
            echo "::error::This workflow is failing INTENTIONALLY to trigger GitHub's email-on-failure notification."
            echo "::error::The release itself is NOT blocked — it is already published. Tier 2 only INFORMS; the maintainer decides whether to:"
            echo "::error::  - Acknowledge the drift in release notes (free-form)"
            echo "::error::  - Open a perf follow-up issue for the next release"
            echo "::error::  - Revert / hotfix for severe user-visible regression"
            echo "::error::Read the step summary for the full benchstat report."
          fi
          exit 1
