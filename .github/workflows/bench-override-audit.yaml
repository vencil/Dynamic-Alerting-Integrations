name: Bench Override Audit

# Soft enforcement of "maintainer-only" semantics on the
# `override: bench-regress-ok` label (W2 milestone of issue #433).
#
# Why a workflow rather than a branch-protection rule:
#   GitHub branch-protection rules do NOT support per-label permission
#   restrictions. Any repo collaborator with Triage role or higher can
#   apply any label. Since bench-gate-pr.yaml treats the override label
#   as a CI-skip signal (skipping a 4-5 min bench run + the regression
#   verdict), unrestricted application = anyone with Triage could merge
#   a regression by labelling.
#
# What this workflow does — TWO jobs covering the override label lifecycle:
#
#   Job `audit`: on `labeled` event, if the override label was just applied,
#     check whether the sender has Admin or Maintain role. If not, revert
#     + comment + fail the workflow.
#
#   Job `strip-stale`: on `synchronize` event (new code pushed to PR), if
#     the override label is still on the PR, strip it. Closes the "Blanket
#     Immunity Trap" — without this, a maintainer's earlier approval of an
#     old commit's perf trade-off would transfer to a subsequent commit
#     that may introduce a new (uninspected) regression. Per-event override
#     semantics: maintainer must re-apply the label after each push that
#     should remain overridden.
#
# Self-bootstrap safety:
#   The audit's allowlist is "admin/maintain". The only role that can
#   grant Admin is Admin. So an attacker cannot escalate via this
#   workflow — they would already need Admin to grant themselves Admin.
#
# Future tightening:
#   - When we have a real maintainers team, switch to team-membership
#     check (`gh api orgs/<org>/teams/maintainers/members`) instead of
#     blanket "any admin/maintain role". Requires org-level repo.

on:
  # Use `pull_request_target` (not `pull_request`) so the GITHUB_TOKEN has
  # write permission even when the PR comes from a fork. With plain
  # `pull_request`, fork PRs get a read-only token and we couldn't actually
  # remove an unauthorized label.
  #
  # Security analysis: `pull_request_target` is normally dangerous because
  # it runs the workflow with full write access against UNTRUSTED PR code.
  # That's safe here because (a) this workflow does NOT check out the PR
  # head — we only read `github.event.*` metadata which is supplied by
  # GitHub itself, not the PR; (b) the workflow file used is always the
  # one from `main`, so a malicious PR can't modify the audit logic
  # before it merges. The standard `pull_request_target` security advice
  # ("don't checkout PR head; don't run PR scripts") is satisfied because
  # there is no checkout step at all.
  pull_request_target:
    types: [labeled, synchronize]

permissions:
  pull-requests: write  # remove label + post comment
  issues: write         # PRs are issues underneath; some gh APIs use issues scope

jobs:
  audit:
    name: Audit override label sender role
    # Only run when THIS specific label was just added — other labels
    # are unaffected (e.g. triage labels, bug, etc.).
    # Whole expression must be double-quoted because the label literal
    # contains a colon, which YAML otherwise tries to parse as a mapping.
    if: "github.event.label.name == 'override: bench-regress-ok'"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check sender role and revert if unauthorized
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENDER: ${{ github.event.sender.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Query the sender's effective permission on this repo.
          # Endpoint returns: admin / maintain / write / triage / read / none.
          # `gh api` exits non-zero on 404 (sender not a collaborator at all);
          # treat that as "no permission" — though if they applied the label
          # they must have at least Triage, so 404 is theoretical.
          if permission=$(gh api "repos/$REPO/collaborators/$SENDER/permission" \
                            --jq '.permission' 2>/dev/null); then
            echo "Sender $SENDER has effective role: $permission"
          else
            echo "::warning::Sender $SENDER not found in /collaborators (404). Treating as unauthorized."
            permission="none"
          fi

          # Allowlist is admin OR maintain only.
          # Rationale: Write/Triage CAN apply labels per GitHub's model,
          # but for this specific override-the-perf-gate label we require
          # the higher bar. Admin only grants Admin, so escalation-safe.
          if [ "$permission" = "admin" ] || [ "$permission" = "maintain" ]; then
            echo "::notice::Override authorized — $SENDER ($permission)"
            {
              echo "## Bench Override Audit — AUTHORIZED"
              echo ""
              echo "User \`$SENDER\` has role \`$permission\` — authorized to apply"
              echo "\`override: bench-regress-ok\`. Bench gate will skip on this PR;"
              echo "this skip is permanently audit-logged on the merge commit."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Unauthorized: revert + notify + fail visibly.
          echo "::warning::Unauthorized override application by $SENDER ($permission) — reverting"

          gh pr edit "$PR_NUMBER" --repo "$REPO" \
            --remove-label "override: bench-regress-ok"

          # Build comment body via heredoc + awk dedent. YAML literal-block
          # scalars force common indentation on all lines, so heredoc content
          # always inherits a leading whitespace prefix. awk auto-strips the
          # leading whitespace of the first non-empty line from every line
          # so the rendered Markdown isn't accidentally a code block (which
          # happens when content has 4+ leading spaces).
          body=$(awk 'NR==1 {match($0, /[^ ]/); pad = RSTART - 1} {if (length($0) >= pad) print substr($0, pad + 1); else print ""}' <<EOF
          ⚠️ **Unauthorized override label reverted**

          The \`override: bench-regress-ok\` label is restricted to repository **admin** or **maintain** roles. \`@$SENDER\` has role \`$permission\`.

          This label bypasses the bench-gate regression check, so applying it requires explicit maintainer review of the perf trade-off (not just a label flip).

          If you believe this regression is a deliberate correctness / safety trade-off worth accepting:

          1. **Document the rationale in this PR's description**:
             - Which benchmark(s) regressed and by how much (paste benchstat output).
             - Why the regression is acceptable (correctness fix? security patch? algorithmic constraint?).
             - Any planned follow-up to recover the perf later.
          2. **Request maintainer review** via PR comment. A maintainer will read the rationale and apply the label themselves if accepted.

          — Bench Override Audit (\`.github/workflows/bench-override-audit.yaml\`)
          EOF
          )
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"

          {
            echo "## Bench Override Audit — REVERTED"
            echo ""
            echo "User \`$SENDER\` has role \`$permission\` — **not authorized** to apply"
            echo "\`override: bench-regress-ok\`."
            echo ""
            echo "Label was removed automatically. PR comment posted with the maintainer-request flow."
          } >> "$GITHUB_STEP_SUMMARY"

          # Exit 1 so the workflow shows as a FAILED check on the PR. This
          # gives a visible signal even if bench-gate-pr.yaml runs concurrently
          # and (incorrectly) decided to skip during the brief window when
          # the label was present.
          exit 1

  # Round-8 "Blanket Immunity Trap" defense (Gemini round-8 catch).
  # Override should be tied to a specific code state, not the PR as a whole.
  # On every push (`synchronize` event), if the override label is still on
  # the PR, strip it — forcing the maintainer to re-review the new commits
  # and re-apply if the override should remain in effect. Without this, a
  # 6% accepted regression could grow into a 500% silent regression on the
  # next push and bench-gate's per-event check (which already handles this
  # for the gate decision) wouldn't surface the staleness visibly.
  strip-stale:
    name: Strip stale override label after new commits
    # Conditions: (a) event is synchronize, AND (b) the override label is
    # currently on the PR. Both checks needed — synchronize-without-label
    # is a normal push and shouldn't do anything.
    if: |
      github.event.action == 'synchronize'
      && contains(github.event.pull_request.labels.*.name, 'override: bench-regress-ok')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Remove stale override label and notify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          NEW_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSHER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail

          # Remove the label. On fork PRs this might fail if token is read-only,
          # but `pull_request_target` ensures we have write perms regardless of
          # fork status. The `|| true` is defensive for the unlikely case where
          # the label was removed by something else between the event firing
          # and us getting here.
          gh pr edit "$PR_NUMBER" --repo "$REPO" \
            --remove-label "override: bench-regress-ok" || true

          # Same awk-dedent trick as the audit step; YAML literal block forces
          # leading whitespace on heredoc body, awk strips the common prefix.
          body=$(awk 'NR==1 {match($0, /[^ ]/); pad = RSTART - 1} {if (length($0) >= pad) print substr($0, pad + 1); else print ""}' <<EOF
          ⚠️ **Override label auto-stripped after new commit**

          The \`override: bench-regress-ok\` label was previously applied but has been
          automatically removed because new commits were pushed to this PR by \`@$PUSHER\`.

          New HEAD: \`$NEW_HEAD_SHA\`

          Override is **per-commit-state**, not per-PR. The earlier maintainer approval
          was tied to a specific set of commits whose perf trade-off was reviewed; new
          commits may introduce additional regressions not covered by that approval.

          If the override should remain in effect after these new commits:

          1. A **maintainer** must review the new commits' perf impact.
          2. If still acceptable, re-apply \`override: bench-regress-ok\` (the audit
             will re-verify the role and \`bench-gate-pr.yaml\` will honor it for that
             specific labeled event only).

          — Bench Override Audit / strip-stale job
          EOF
          )
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"

          {
            echo "## Override label STRIPPED (stale after new commit)"
            echo ""
            echo "Pusher: \`$PUSHER\` — new HEAD: \`$NEW_HEAD_SHA\`."
            echo ""
            echo "Bench gate will now re-evaluate this commit normally. Maintainer must"
            echo "re-apply the override label if the perf trade-off remains acceptable"
            echo "after reviewing the new commits."
          } >> "$GITHUB_STEP_SUMMARY"
