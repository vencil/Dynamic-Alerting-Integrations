name: Commitlint

on:
  pull_request:
    # `edited` lets PR title amendments re-trigger commitlint without close/reopen.
    # See dev-rules.md §S6 / v2.8.0-planning.md Trap #12.
    types: [opened, synchronize, reopened, edited]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - name: Validate PR title (for squash-merge)
        if: github.event_name == 'pull_request'
        # Route the PR title through env, NOT raw ${{ }} interpolation into the
        # run: script. GHA substitutes ${{ }} as literal TEXT before bash parses,
        # so a title with a `"` breaks the here-string (commitlint dies "Unknown
        # argument: ..."), and a title containing `...` or $(...) would EXECUTE on
        # the runner - a classic GHA script-injection. An env-var expansion is not
        # re-parsed by bash, so quotes/backticks/$() stay literal and inert.
        # (Recurring gotcha before this fix: PR #501, #1019.)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          npx commitlint --config .commitlintrc.yaml <<< "$PR_TITLE"

      - name: Validate commits on PR
        if: github.event_name == 'pull_request'
        # SHAs are not user-controlled (40 hex chars, un-injectable), but bind them
        # via env too so this workflow has ZERO raw ${{ github.event.* }} inside a
        # run: script - the general rule, so nobody copies a raw-interpolation line.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          npx commitlint --config .commitlintrc.yaml \
            --from "$BASE_SHA" \
            --to "$HEAD_SHA"
