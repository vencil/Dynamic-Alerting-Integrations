# release-please.yaml — Automate platform release PRs using conventional commits
#
# Purpose:
#   - Monitors main branch for conventional commits (feat:, fix:, etc.)
#   - Creates release PRs that bump platform version (v1.x.y)
#   - On merge of release PR, publishes GitHub Release and runs bump_docs.py
#
# Three-Line Version Strategy:
#   - Platform (v1.x.y):    Automatic via release-please on main
#   - Exporter (exporter/v1.x.y):  Manual via `git tag`, no release-please
#   - Tools (tools/v1.x.y):  Manual via `git tag`, no release-please
#
# Note: Exporter and tools have independent release flows via release.yaml
#
# Setup:
#   - GitHub token with contents:write, pull-requests:write scopes
#   - Existing release-please-config.json at repo root
#   - Conventional Commits enforced via .commitlintrc.yaml

name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Create Release PR
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------
  # On release (merge of release PR), update version refs
  # -------------------------------------------------------
  bump-docs:
    name: Bump version in docs on release
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: release') || startsWith(github.event.head_commit.message, 'chore(main): release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract platform version from tag
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "v1.12.0")
          PLATFORM_VERSION=${LATEST_TAG#v}
          echo "PLATFORM_VERSION=$PLATFORM_VERSION" >> "$GITHUB_OUTPUT"
          echo "Platform version: $PLATFORM_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run bump_docs.py
        run: |
          python scripts/tools/dx/bump_docs.py \
            --platform "${{ steps.version.outputs.PLATFORM_VERSION }}" \
            --check
        continue-on-error: true

      - name: Commit version updates (if changed)
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if git diff --quiet; then
            echo "No version updates needed"
          else
            git add CLAUDE.md README.md README.en.md CHANGELOG.md
            git commit -m "chore: sync version references (${{ steps.version.outputs.PLATFORM_VERSION }})" || true
            git push origin main
          fi
