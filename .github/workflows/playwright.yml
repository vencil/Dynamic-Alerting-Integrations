name: Playwright E2E Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      # TD-042: portal source moved to tools/portal/src/. Watch the
      # whole portal package (source + build config + manifest) so any
      # change that affects bundle output triggers smoke. Also watch
      # docs/interactive/index.html which is the runtime entry loader.
      - 'tools/portal/**'
      - 'docs/interactive/index.html'
      - 'tests/e2e/**'
      - 'package.json'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tools/portal/**'
      - 'docs/interactive/index.html'
      - 'tests/e2e/**'
      - 'package.json'
      - '.github/workflows/playwright.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    # TD-033: 10-min cap restored. The TD-032e investigation traced
    # the workers=N failures to a stale TD-031 build hack — `define:
    # { React: 'globalThis.__bundledReact' }` paired with a side-
    # effect entry import. The destructure pattern `const { useState }
    # = React;` in 11 component files (rewritten to read the global)
    # raced against the chunk that set the global, causing ~20 specs
    # to fail under workers=N>1.
    #
    # Real fix in this commit: components use explicit ESM React
    # imports (`import { useState } from 'react'`); the build-time
    # alias is gone. Local benchmarks at workers=4 + ThreadingHTTP-
    # Server: 192 / 192 pass in 1.5 min (vs ~12 min broken state /
    # 5.2 min workers=1 / 3.5 min workers=2). 10-min cap is now
    # generous (~6x headroom).
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tests/e2e/package.json'

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      # Cache Playwright browser binaries (~150 MB chromium download).
      # `npx playwright install` is idempotent: re-running with cache hit
      # is a fast no-op. Key includes the playwright version derived from
      # tests/e2e/package-lock.json so cache invalidates on bump.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install chromium

      - name: Start Portal server
        working-directory: tests/e2e
        run: |
          npm run serve:portal &
          SERVER_PID=$!
          echo "Portal server started with PID: $SERVER_PID"

          # Retry loop: wait up to 30 seconds for Portal readiness
          RETRY_COUNT=0
          MAX_RETRIES=30
          RETRY_INTERVAL=1

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Checking Portal readiness (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)..."
            if curl -sf http://localhost:8080/interactive/ > /dev/null 2>&1; then
              echo "✓ Portal is ready (HTTP 200)"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              sleep $RETRY_INTERVAL
            fi
          done

          echo "✗ Portal failed to start within 30 seconds"
          echo "Final curl attempt for debug info:"
          curl -v http://localhost:8080/interactive/ 2>&1 || true
          exit 1
        timeout-minutes: 2

      - name: Run Playwright smoke tests
        working-directory: tests/e2e
        # TD-033 perf settings:
        #   --workers=4    parallelize across 4 playwright workers.
        #                  ubuntu-latest runners have 4 vCPUs; the portal
        #                  server is multi-threaded (serve_threaded.py)
        #                  so concurrent JSX fetches don't bottleneck.
        #                  Local benchmark: workers=1 = 5.2 min, workers=2
        #                  = 3.5 min (1 flaky retry-pass), workers=4 =
        #                  1.5 min (192 / 192 clean). 4 wins on both axes.
        #   --reporter=list,html  swap dots-only progress for inline test
        #                  names so CI failures are tagged with the spec
        #                  immediately; keep html for artifact upload.
        run: npm test -- --workers=4 --reporter=list,html
        env:
          CI: 'true'
          BASE_URL: 'http://localhost:8080/interactive/'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Upload test videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-videos
          path: tests/e2e/test-results/
          retention-days: 3

      - name: Comment on PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const testReportPath = 'tests/e2e/playwright-report/index.html';
            if (fs.existsSync(testReportPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Playwright smoke tests completed. [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
              });
            }
