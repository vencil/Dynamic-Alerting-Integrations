name: Bench E2E Record (manual dispatch + monthly)

# B-1 Phase 2 e2e alert fire-through harness — manual-dispatch + monthly.
#
# Per design §8.1: cold start (compose up + healthcheck + COUNT runs ×
# 2 phases + teardown) is ~5-8 min wall-clock. Running on every PR is
# inappropriate; this workflow is invoked from the GitHub UI / CLI by
# maintainer when fresh baseline is needed, plus a monthly schedule.
#
# Why the monthly schedule (rot prevention): manual-only dispatch went
# 2.8 months without an invocation while the artifacts expired after 30
# days — leaving ZERO live synthetic-v2 baseline to compare a
# customer-anon run (or a regression investigation) against. Monthly
# cadence + 90-day retention guarantees at least one live baseline
# artifact at all times without normalizing per-PR cost.
#
# Scope:
#   - main only (workflow_dispatch + schedule both run on main).
#   - Bench artifacts retained 90 days (must exceed the monthly cadence
#     or baselines still gap between runs; synthetic-v* results lose
#     relevance after a few releases anyway; customer-anon results are
#     out-of-band so workflow doesn't store them).
#   - Default fixture_kind: synthetic-v2 (the post-PR-1 baseline).
#     Scheduled runs have empty `inputs.*` — every consumer below
#     falls back via `|| '<default>'`.
#
# Acceptance criterion check is the gate_status field in the aggregate
# JSON; this workflow uploads the artifact + surfaces the banner in
# the GitHub Actions summary, leaving go/no-go to maintainer review.
#
# TODO(baseline persistence): release-attach-bench-baseline.yaml already
# attaches the latest bench-record (micro-bench) artifact to Releases at
# `release: published`, making that baseline immune to artifact expiry.
# Extending it to also attach the latest e2e aggregate JSON would do the
# same here, but needs its own artifact-name plumbing (this workflow's
# artifact is `e2e-bench-<kind>-<run_id>`, holds per-run JSONs + logs,
# and can be red on gate) — deferred until the monthly schedule proves
# insufficient (trigger: a release lands with no live e2e-bench artifact
# to reference).

on:
  schedule:
    # Monthly baseline refresh — day 2, 04:45 UTC. Slot chosen clear of
    # the existing repo crons (nightlies at 02:00 ×3 / 03:00 / 03:23 /
    # 16:00 / 17:00 / 18:00, weeklies at 06:17 Mon / 12:00 Sun, daily
    # 06:17). GitHub-hosted jobs each run on their own VM, so this is
    # NOT about runner contention — a clear slot just stays under the
    # org-level concurrent-job cap during cron bursts and keeps
    # scheduled-run timelines easy to read (conservative convention,
    # not a hard requirement).
    - cron: '45 4 2 * *'
  workflow_dispatch:
    inputs:
      fixture_kind:
        description: 'Fixture kind: synthetic-v1, synthetic-v2, or customer-anon (latter requires sample present out of band)'
        type: choice
        options:
          - synthetic-v2
          - synthetic-v1
          - customer-anon
        default: synthetic-v2
      count:
        description: 'Run count (n+1 cycles total; first is warm-up)'
        type: string
        default: '30'
      fixture_tenant_count:
        description: 'Tenant count for synthetic fixture generation (ignored for customer-anon). Per design §9.3: 1000 + 5000 each in 30-run runs as separate workflow invocations.'
        type: choice
        options:
          - '1000'
          - '2000'
          - '5000'
        default: '1000'

permissions:
  contents: read

jobs:
  bench-e2e:
    # `inputs.*` are empty on `schedule:` — fall back to the dispatch
    # defaults everywhere they're consumed (here, env, summary, artifact).
    name: e2e harness (${{ inputs.fixture_kind || 'synthetic-v2' }} × ${{ inputs.count || '30' }} runs)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # 60 min budget: 1000-tenant typically finishes in ~5-8 min after the
    # bench-trigger sentinel fix, but 5000-tenant has not been measured
    # end-to-end on ubuntu-latest yet — could plausibly take 20-30 min
    # given (a) larger fixture generation, (b) longer per-scan time, (c)
    # higher chance of compose stack memory pressure. 30 was too tight
    # (run 24937326270 cancelled). 60 leaves slack without normalizing
    # an unbounded-cost workflow.
    timeout-minutes: 60

    steps:
      # persist-credentials: false — free hardening (bench-family sweep):
      # nothing after checkout touches git at all (docker compose + make +
      # upload-artifact, which uses the runtime token, not git creds).
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Verify Docker Compose available
        run: docker compose version

      - name: Run e2e harness
        env:
          COUNT: ${{ inputs.count || '30' }}
          E2E_FIXTURE_KIND: ${{ inputs.fixture_kind || 'synthetic-v2' }}
          FIXTURE_TENANT_COUNT: ${{ inputs.fixture_tenant_count || '1000' }}
        run: make bench-e2e

      - name: Capture compose logs (always, for diagnostics)
        if: always()
        # The driver's Tier 1 smoke fail-fast (cycle-6 RCA) catches
        # zero-anchor warm_up runs in ~90s and exits with code 2. The
        # diagnostic signal humans need next is the exporter's stderr
        # — `WARN: skip unparseable file _defaults.yaml`, `WARN: tenant
        # X: unknown key Y not in defaults`, etc. Dump compose logs into
        # the bench-results dir so they ship in the artifact alongside
        # per-run-*.json. `|| true` because compose may already be down
        # (cleanup trap fires in bench_e2e_run.sh).
        run: |
          mkdir -p tests/e2e-bench/bench-results
          (cd tests/e2e-bench && docker compose logs --no-color threshold-exporter > bench-results/exporter.log 2>&1 || true)
          (cd tests/e2e-bench && docker compose logs --no-color prometheus > bench-results/prometheus.log 2>&1 || true)
          (cd tests/e2e-bench && docker compose logs --no-color pushgateway > bench-results/pushgateway.log 2>&1 || true)
          (cd tests/e2e-bench && docker compose logs --no-color alertmanager > bench-results/alertmanager.log 2>&1 || true)
          (cd tests/e2e-bench && docker compose logs --no-color receiver > bench-results/receiver.log 2>&1 || true)
          (cd tests/e2e-bench && docker compose logs --no-color driver > bench-results/driver.log 2>&1 || true)

      - name: Surface gate banner in summary
        if: always()
        run: |
          echo "### B-1 Phase 2 e2e — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Fixture kind**: \`${{ inputs.fixture_kind || 'synthetic-v2' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          latest=$(ls -t tests/e2e-bench/bench-results/e2e-*.json 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            echo "**Aggregate**: \`$(basename "$latest")\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            python3 -c "import json,sys; d=json.load(open('$latest')); print(json.dumps({k:d[k] for k in ['fixture_kind','gate_status','gate_banner','n_runs_total']}, indent=2, ensure_ascii=False))" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "(no aggregate JSON produced)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-bench-${{ inputs.fixture_kind || 'synthetic-v2' }}-${{ github.run_id }}
          path: |
            tests/e2e-bench/bench-results/per-run-*.json
            tests/e2e-bench/bench-results/e2e-*.json
            tests/e2e-bench/bench-results/*.log
          # 90 > monthly cadence — see rot-prevention rationale in the
          # header comment (30-day retention gapped between manual runs).
          retention-days: 90
          if-no-files-found: warn
