# release.yaml — Build & push container images + Helm chart on tag
#
# 觸發條件（五線版號策略）：
#   - exporter/v*    → threshold-exporter Docker image + Helm chart
#   - tools/v*       → da-tools Docker image
#   - portal/v*      → da-portal Docker image (Interactive Tools Portal)
#   - tenant-api/v*  → tenant-api Docker image + Helm chart
#   - v*             → platform tag，僅用於 GitHub Release 錨點，不觸發 build
#
# 產出：
#   - ghcr.io/vencil/threshold-exporter:v<version>  (Docker image, v-prefixed)
#   - ghcr.io/vencil/da-tools:v<da-tools-version>    (Docker image, v-prefixed)
#   - ghcr.io/vencil/da-portal:v<version>             (Docker image, v-prefixed)
#   - ghcr.io/vencil/tenant-api:v<version>             (Docker image, v-prefixed)
#   - oci://ghcr.io/vencil/charts/threshold-exporter (Helm chart)
#   - oci://ghcr.io/vencil/charts/tenant-api         (Helm chart)
#
# 前置條件：
#   - Repository Settings → Actions → Workflow permissions → Read and write
#   - 或建立 PAT 並設為 GHCR_TOKEN secret

name: Release

on:
  push:
    tags:
      - "exporter/v*"
      - "tools/v*"
      - "portal/v*"
      - "tenant-api/v*"

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: vencil

permissions:
  contents: read
  packages: write

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build & push threshold-exporter image + Helm chart
  # ----------------------------------------------------------------
  release-exporter:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/exporter/')
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#exporter/v}" >> "$GITHUB_OUTPUT"

      - name: Verify Chart.yaml version matches tag
        run: |
          CHART_VER=$(grep '^version:' helm/threshold-exporter/Chart.yaml | awk '{print $2}')
          if [ "$CHART_VER" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "ERROR: Chart.yaml version ($CHART_VER) != tag (${{ steps.version.outputs.VERSION }})"
            echo "Run: make bump-docs EXPORTER=${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Docker image ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push threshold-exporter image
        uses: docker/build-push-action@v6
        with:
          context: components/threshold-exporter/app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/threshold-exporter:v${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/threshold-exporter:latest

      # --- Helm chart (before scan so Trivy failure doesn't block distribution) ---
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          mkdir -p .build
          helm package helm/threshold-exporter -d .build/

      - name: Push Helm chart to OCI registry
        run: |
          helm push .build/threshold-exporter-${{ steps.version.outputs.VERSION }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/charts

      # --- Security scan (post-push, informational) ---
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/threshold-exporter:v${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ----------------------------------------------------------------
  # Job 2: Build & push da-tools image + da-guard binaries (C-11)
  # ----------------------------------------------------------------
  # v2.8.0 C-11 extends this job with three customer-delivery formats
  # for the migration toolkit (tools/v* release line):
  #
  #   (a) Docker image at ghcr.io (existing path)
  #   (b) Cross-compiled da-guard binaries for direct download
  #       (linux/darwin/windows × amd64/arm64 → 6 archives + SHA256SUMS)
  #   (c) docker save of the image as gzipped tar for air-gapped
  #       environments (customers who can't pull from ghcr.io)
  #
  # Customer chooses install path at the GitHub Release page; see
  # docs/migration-toolkit-installation.md for the install matrix.
  release-da-tools:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/tools/')
    permissions:
      contents: write   # gh release create / upload
      packages: write   # ghcr push (inherited)
      # C-11 PR-3 Layer 1: id-token:write enables sigstore "keyless"
      # signing — cosign exchanges the GitHub OIDC token for an
      # ephemeral X.509 cert from Fulcio, signs the artefact, and
      # publishes the entry in the public Rekor transparency log.
      # No long-term private keys to manage. See
      # docs/internal/release-signing-runbook.md §Layer 1.
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#tools/v}" >> "$GITHUB_OUTPUT"

      # C-11: pin tools/v* tag against the in-tree VERSION file so
      # forgot-to-bump errors surface at release time, not after the
      # image is already on ghcr.io.
      - name: Verify VERSION file matches tag
        run: |
          FILE_VER=$(tr -d '[:space:]' < components/da-tools/app/VERSION)
          if [ "$FILE_VER" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "ERROR: components/da-tools/app/VERSION ($FILE_VER) != tag (${{ steps.version.outputs.VERSION }})"
            echo "Run: make bump-docs TOOLS=${{ steps.version.outputs.VERSION }} && commit before re-tagging"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Go is required for build.sh's da-guard bundling step (the
      # linux/amd64 binary baked into the image) AND for the
      # cross-compile matrix below.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: components/threshold-exporter/app/go.mod
          cache: true
          cache-dependency-path: components/threshold-exporter/app/go.sum

      # C-11 PR-3 Layer 1: install cosign + syft. cosign signs both the
      # binary archives and the Docker image with sigstore keyless
      # (no long-term private key); syft generates SPDX + CycloneDX
      # SBOM for the image. Both pinned to specific versions to
      # avoid silent supply-chain drift — bump deliberately.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: v2.4.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.17.7
        with:
          syft-version: v1.18.1

      - name: Assemble da-tools build context
        run: |
          cd components/da-tools/app
          bash build.sh --assemble-only

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push da-tools image
        uses: docker/build-push-action@v6
        with:
          context: components/da-tools/app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-tools:v${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-tools:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-tools:v${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # C-11 PR-3 Layer 1: sign the Docker image with cosign keyless.
      # We sign by digest (not tag) — tags can be moved, digests are
      # immutable. `cosign sign --yes` skips the interactive Y/N prompt
      # which doesn't work in non-tty CI.
      - name: Sign Docker image (cosign keyless)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-tools:v${VERSION}"
          # Resolve to immutable digest before signing — protects
          # against TOCTOU between push and sign.
          DIGEST=$(docker buildx imagetools inspect "$IMG" --format '{{.Manifest.Digest}}')
          echo "▸ Signing image at digest: $DIGEST"
          cosign sign --yes "${IMG}@${DIGEST}"

      # C-11 PR-3 Layer 1: generate SBOM (Software Bill of Materials)
      # for the Docker image in BOTH SPDX and CycloneDX formats.
      # Different customer security teams prefer different formats;
      # shipping both costs ~50KB and avoids "we don't accept that
      # format" rejection on first onboarding review.
      - name: Generate SBOM for Docker image
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-tools:v${VERSION}"
          mkdir -p "$RUNNER_TEMP/sbom"
          syft "$IMG" -o spdx-json="$RUNNER_TEMP/sbom/da-tools-image-v${VERSION}.spdx.json"
          syft "$IMG" -o cyclonedx-json="$RUNNER_TEMP/sbom/da-tools-image-v${VERSION}.cyclonedx.json"
          ls -la "$RUNNER_TEMP/sbom/"

      # Sign the SBOM files too — a tampered SBOM defeats the whole
      # supply-chain story. cosign sign-blob produces detached .sig
      # + .cert files that customers verify alongside the SBOM.
      - name: Sign SBOM files (cosign keyless)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/sbom"
          for f in *.spdx.json *.cyclonedx.json; do
            echo "▸ Signing $f"
            cosign sign-blob --yes \
                --output-signature "${f}.sig" \
                --output-certificate "${f}.cert" \
                "$f"
          done
          ls -la

      # ----------------------------------------------------------------
      # C-11 extras: cross-compile binaries + air-gapped tar + Release
      # ----------------------------------------------------------------

      - name: Cross-compile da-guard + da-batchpr + da-parser binaries (6 OS/ARCH each)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/da-guard-bin"
          cd components/threshold-exporter/app
          # All three Go CLIs use the same matrix + ldflags. C-10 PR-5
          # added da-batchpr alongside da-guard; C-8 PR-2 adds
          # da-parser for the Prometheus rule import path.
          for BIN in da-guard da-batchpr da-parser; do
            for OS in linux darwin windows; do
              for ARCH in amd64 arm64; do
                EXT=""
                [ "$OS" = "windows" ] && EXT=".exe"
                OUT="$RUNNER_TEMP/da-guard-bin/${BIN}-${OS}-${ARCH}${EXT}"
                echo "▸ Building ${BIN} $OS/$ARCH..."
                CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" go build \
                    -buildvcs=false \
                    -ldflags "-X main.Version=v${VERSION}" \
                    -o "$OUT" \
                    "./cmd/${BIN}"
              done
            done
          done
          ls -la "$RUNNER_TEMP/da-guard-bin/"

      - name: Package binaries (tarball / zip + SHA256SUMS)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/da-guard-bin"
          # Linux + macOS: tar.gz. Windows: zip (Windows users
          # commonly lack tar/gzip; zip is universal).
          # Globs cover all three binaries (guard / batchpr / parser).
          for f in da-guard-linux-* da-guard-darwin-* \
                   da-batchpr-linux-* da-batchpr-darwin-* \
                   da-parser-linux-* da-parser-darwin-*; do
            tar czf "${f}.tar.gz" "$f"
          done
          for f in da-guard-windows-* da-batchpr-windows-* da-parser-windows-*; do
            zip -q "${f%.exe}.zip" "$f"
          done
          # Sum every artefact reviewers can download, including the
          # raw binaries for security-team teams that prefer to verify
          # the binary directly rather than the archive.
          sha256sum da-guard-linux-* da-guard-darwin-* da-guard-windows-* \
                    da-batchpr-linux-* da-batchpr-darwin-* da-batchpr-windows-* \
                    da-parser-linux-* da-parser-darwin-* da-parser-windows-* \
                    *.tar.gz *.zip > SHA256SUMS
          echo "--- Archive listing ---"
          ls -la

      # C-11 PR-3 Layer 1: sign every distributable archive + the
      # SHA256SUMS index. Customers who can verify cosign get a
      # cryptographic guarantee that the archive came from THIS repo's
      # tools/v* release workflow run; SHA256SUMS-only customers are
      # still served (we don't break their flow). Per-archive .sig +
      # .cert files are tiny (~5KB combined) and uploaded alongside
      # the archives in the GitHub Release.
      - name: Sign archives + SHA256SUMS (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/da-guard-bin"
          # Sign each archive + the SHA256SUMS index. Customers can
          # then verify EITHER an individual archive OR the full
          # SHA256SUMS (and validate any archive against the verified
          # index — common GPG-style pattern carried across to cosign).
          for f in *.tar.gz *.zip SHA256SUMS; do
            echo "▸ Signing $f"
            cosign sign-blob --yes \
                --output-signature "${f}.sig" \
                --output-certificate "${f}.cert" \
                "$f"
          done
          echo "--- Signature listing ---"
          ls -la *.sig *.cert | head

      - name: Save image as gzipped tar (air-gapped customers)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-tools:v${VERSION}"
          OUT="$RUNNER_TEMP/da-tools-image-v${VERSION}.tar.gz"
          docker pull "$IMG"
          docker save "$IMG" | gzip > "$OUT"
          ( cd "$RUNNER_TEMP" && sha256sum "$(basename "$OUT")" > "${OUT}.sha256" )
          ls -la "$OUT" "$OUT.sha256"

      # Sign the air-gapped image tar with cosign too. Air-gapped
      # customers can't reach Rekor at verify-time, but they CAN
      # carry the .sig/.cert in alongside the tar and verify
      # offline IF they pre-sync the Sigstore TUF root (cosign
      # initialize) — see release-signing-runbook.md §Layer 1
      # air-gapped verify path.
      - name: Sign air-gapped image tar (cosign keyless)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/da-tools-image-v${VERSION}.tar.gz"
          cosign sign-blob --yes \
              --output-signature "${OUT}.sig" \
              --output-certificate "${OUT}.cert" \
              "$OUT"
          ls -la "${OUT}.sig" "${OUT}.cert"

      - name: Create or update GitHub Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Idempotent: if the maintainer pre-created the Release
          # (e.g. with hand-curated notes), skip create + just
          # upload --clobber the assets. If not, create with
          # --generate-notes for a starter changelog.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "▸ Release $TAG already exists; uploading assets with --clobber"
          else
            echo "▸ Creating Release $TAG with auto-generated notes"
            gh release create "$TAG" \
                --title "da-tools v${VERSION} — Migration Toolkit" \
                --generate-notes
          fi
          gh release upload "$TAG" --clobber \
              "$RUNNER_TEMP/da-guard-bin/"*.tar.gz \
              "$RUNNER_TEMP/da-guard-bin/"*.zip \
              "$RUNNER_TEMP/da-guard-bin/SHA256SUMS" \
              "$RUNNER_TEMP/da-tools-image-v${VERSION}.tar.gz" \
              "$RUNNER_TEMP/da-tools-image-v${VERSION}.tar.gz.sha256"
          # C-11 PR-3 Layer 1: cosign keyless signatures + SBOM. Glob
          # the *.sig and *.cert files (one pair per archive + per
          # SHA256SUMS + per SBOM file + for the air-gapped tar);
          # absent file = nothing to upload. The SBOM directory holds
          # both spdx-json and cyclonedx-json formats so customer
          # security teams can pick whichever they consume.
          gh release upload "$TAG" --clobber \
              "$RUNNER_TEMP/da-guard-bin/"*.sig \
              "$RUNNER_TEMP/da-guard-bin/"*.cert \
              "$RUNNER_TEMP/da-tools-image-v${VERSION}.tar.gz.sig" \
              "$RUNNER_TEMP/da-tools-image-v${VERSION}.tar.gz.cert" \
              "$RUNNER_TEMP/sbom/"*.json \
              "$RUNNER_TEMP/sbom/"*.sig \
              "$RUNNER_TEMP/sbom/"*.cert
          echo "✓ Release $TAG ready: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          echo "✓ Artefacts signed with cosign keyless (sigstore.dev/Rekor)"
          echo "✓ SBOM (SPDX + CycloneDX) generated by syft"
          echo "  Customer verification: see docs/migration-toolkit-installation.md §Signature Verification"

  # ----------------------------------------------------------------
  # Job 3: Build & push da-portal image (Interactive Tools Portal)
  # ----------------------------------------------------------------
  release-portal:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/portal/')
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#portal/v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download vendor files for offline mode
        run: bash scripts/tools/vendor_download.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push da-portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: components/da-portal/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-portal:v${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-portal:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/da-portal:v${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ----------------------------------------------------------------
  # Job 4: Build & push tenant-api image + Helm chart
  # ----------------------------------------------------------------
  release-tenant-api:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/tenant-api/')
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#tenant-api/v}" >> "$GITHUB_OUTPUT"

      - name: Verify Chart.yaml version matches tag
        run: |
          CHART_VER=$(grep '^version:' helm/tenant-api/Chart.yaml | awk '{print $2}')
          if [ "$CHART_VER" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "ERROR: Chart.yaml version ($CHART_VER) != tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Docker image ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push tenant-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: components/tenant-api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/tenant-api:v${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/tenant-api:latest

      # --- Helm chart ---
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          mkdir -p .build
          helm package helm/tenant-api -d .build/

      - name: Push Helm chart to OCI registry
        run: |
          helm push .build/tenant-api-${{ steps.version.outputs.VERSION }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/charts

      # --- Security scan ---
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/tenant-api:v${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
