# validate.yaml — PR validation pipeline
#
# Runs on every PR. Catches issues before merge.
#
# The workflow itself triggers on EVERY pull_request to main (no top-level
# `paths:` filter) — only individual jobs are gated, via the detect-changes
# job's `validate_changed` output. Reason: all 3 job NAMES below (Go Lint,
# Validate Tenant Config & Routes, Version Consistency) are enrolled in
# main's branch protection
# required_status_checks. A workflow suppressed entirely by a top-level
# `paths:` filter reports NO status at all for a PR that doesn't touch those
# paths, and GitHub treats a required check with no reported status as
# permanently pending — blocking merge even when every check that DID run is
# green. This is the exact same bug class docs-ci.yaml hit (see that
# workflow's banner comment): a tenant-api-only PR pre-#216, then a
# helm/**/docs/** PR surfaced by #972/GHSA-3g2h-rf85-5rrv, both "fixed" by
# adding more paths to the filter list (see the filter's own comments below)
# — which only delays the next PR shape that isn't on the list from hitting
# the same wall. A job that runs and is skipped via its own `if:`, by
# contrast, reports `skipped`, which satisfies the requirement. See
# detect-changes below.
#
# DEDUP (CI-ROI wave): the former `python-tests` ("Python Tests") and
# `go-tests` ("Go Tests") jobs of this workflow were strict SUBSETS of
# ci.yml's "Python Tests (3.13)" and "Go Tests (1.26)":
#   - python-tests ran the SAME `pytest tests/` with the SAME --ignore list
#     as ci.yml, but with fewer optional CLIs installed (no helm / vector /
#     mtail / jsonschema) → strictly MORE silent skips, zero extra coverage.
#   - go-tests ran threshold-exporter only, WITHOUT -race / -count=1 and
#     without tenant-api at all — ci.yml runs both modules with the race
#     detector.
# Every PR paid for both duplicate runs; the two jobs are REMOVED and
# ci.yml is the single source of Python/Go test coverage on PRs.
#
# ⛔ OWNER RUNBOOK — flip branch protection BEFORE merging the PR that
# carries this change (Settings → Branches → main → required status
# checks):
#   - REMOVE "Python Tests" and "Go Tests"          (this workflow's
#     deleted job names — once the jobs are gone these checks would sit
#     "Expected" forever and hard-block EVERY PR)
#   - ADD "Python Tests (3.13)" and "Go Tests (1.26)" (the ci.yml
#     equivalents; ci.yml runs unfiltered on every PR + push to main, so
#     the names are reported on every PR — verify they appear in the
#     latest CI run before enrolling, per the iac-lint-baseline checklist
#     caveat)
# Until the flip, the PR carrying THIS change is itself blocked by the old
# required checks — that is expected behavior, not a bug: flip first, then
# merge.
#
# Checks:
#   1. Go lint (golangci standard + depguard dependency-direction; both modules)
#   2. Tenant config validation (schema + routing + policy)
#   3. Custom rule linting (deny-list)
#   4. Version consistency (bump_docs --check)
# (Python/Go tests live in ci.yml — see DEDUP note above.)

name: Validate

on:
  pull_request:
    branches: [main]

# Explicit least-privilege grant (repo default is read-only; every sibling
# workflow declares this block too). pull-requests:read is specifically for
# detect-changes' dorny/paths-filter@v3 REST-API mode below.
permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Validate Path Changes
    runs-on: ubuntu-latest
    outputs:
      validate_changed: ${{ steps.filter.outputs.validate }}
    steps:
      # No actions/checkout here: dorny/paths-filter's default REST-API mode
      # for pull_request events queries the changed-files list via the
      # GitHub API and doesn't need a local clone (see its README's "For
      # pull requests it's not necessary to checkout the code").
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            validate:
              - "components/threshold-exporter/config/**"
              - "components/threshold-exporter/app/**"
              # tenant-api: branch-protection on `main` requires this
              # workflow's jobs (today: Go Lint, Validate Tenant Config &
              # Routes, Version Consistency — the Python/Go test jobs moved
              # to ci.yml, see the DEDUP banner). Pre-PR-216 the path
              # filter excluded `components/tenant-api/**`, so any tenant-api-
              # only PR couldn't satisfy the required-checks contract and
              # merging fell back to admin override / artificial cross-touch
              # in CHANGELOG. Go Lint DOES lint tenant-api; the other jobs
              # are cheap to run and the symmetry with threshold-exporter
              # PRs is the cleanest fix.
              - "components/tenant-api/**"
              - "rule-packs/**"
              - "scripts/tools/**"
              - "tests/**"
              - ".github/custom-rule-policy.yaml"
              - ".github/workflows/validate.yaml"
              # helm/** and docs/** PRs (chart hardening, governance docs) hit the SAME
              # required-checks-contract gap the tenant-api note above describes: main's
              # branch protection requires this workflow's jobs, but the path filter
              # excluded these trees, so a helm-only / docs-only PR could not satisfy the
              # contract and fell back to admin override. Included for the same reason —
              # the jobs are cheap and Version Consistency (bump_docs --check) is in fact
              # relevant to docs changes. Surfaced by GHSA-3g2h-rf85-5rrv hardening (#972).
              - "helm/**"
              - "docs/**"

  # (python-tests / go-tests jobs removed — see the DEDUP + OWNER RUNBOOK
  # banner at the top of this file. ci.yml's "Python Tests (3.13)" and
  # "Go Tests (1.26)" are the required checks now.)

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.validate_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      # golangci-lint v2.12.2 (matches the dev container). Download the pinned
      # install script and verify its SHA-256 BEFORE executing — no unverified
      # `curl | sh` — matching the hadolint download-then-verify pattern in
      # ci.yml. The verified script in turn checks the golangci-lint binary's
      # own checksum against the release.
      # Download-cache for the golangci-lint BINARY (same versioned-name +
      # always-verify cache pattern as ci.yml's pinned-binary installs; see
      # ci.yml's Lint job hadolint step for the full rationale). Unlike the
      # tarball caches, the installed binary itself is cached: the pinned,
      # SHA-verified install.sh verifies the release archive's checksum at
      # install time, and the binary lands in a VERSION-NAMED directory —
      # so a version bump with a stale cache key can never silently reuse
      # the old binary (the new versioned dir simply won't exist → clean
      # reinstall, re-downloading every run until the key is fixed). This
      # is a HARD step: an install failure fails the job, so the cache
      # post-save can't capture a partial entry.
      - name: Cache golangci-lint binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/vibe-dl-golangci
          key: ${{ runner.os }}-vibe-dl-golangci-v2.12.2

      - name: Install golangci-lint
        run: |
          GOLANGCI_VERSION=v2.12.2
          BIN="$HOME/.cache/vibe-dl-golangci/${GOLANGCI_VERSION}"
          if [ ! -x "$BIN/golangci-lint" ]; then
            GOLANGCI_INSTALL_SHA256=d32d3534af96cfd59546a084d22b213e8a47541cada5013aa8a84c4fa2589905
            curl -fsSL -o /tmp/golangci-install.sh \
              "https://raw.githubusercontent.com/golangci/golangci-lint/${GOLANGCI_VERSION}/install.sh"
            bash scripts/ops/_verify_download.sh /tmp/golangci-install.sh "$GOLANGCI_INSTALL_SHA256"
            sh /tmp/golangci-install.sh -b "$BIN" "$GOLANGCI_VERSION"
          fi
          echo "$BIN" >> "$GITHUB_PATH"
          "$BIN/golangci-lint" version
      # standard linters + depguard dependency-direction ratchet (per-module
      # .golangci.yml: domain↛handler for tenant-api, logic↛net/http for exporter).
      - name: Lint tenant-api
        working-directory: components/tenant-api
        run: golangci-lint run ./...
      - name: Lint threshold-exporter
        working-directory: components/threshold-exporter/app
        run: golangci-lint run ./...

  validate-config:
    name: Validate Tenant Config & Routes
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.validate_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pyyaml

      # Schema validation + routing validation + webhook domain allowlist
      - name: Validate alertmanager routes
        run: |
          python scripts/tools/ops/generate_alertmanager_routes.py \
            --config-dir components/threshold-exporter/config/conf.d/ \
            --validate \
            --policy .github/custom-rule-policy.yaml

      # Render the GitOps ConfigMap and validate it with Alertmanager's OWN
      # parser (amtool). The --validate step above only checks the assembled
      # config as a Python dict — it cannot catch defects AM rejects at load
      # (e.g. email `to` as a YAML seq → "unmarshal !!seq into string", or a
      # missing SMTP `from` → "no global SMTP from set"). #838.
      # The amtool image is DERIVED from the deployment manifest (single source
      # of truth) so a cluster Alertmanager version bump can't leave this guard
      # validating against a stale parser. Matches `prom/alertmanager:<tag>`
      # specifically → the configmap-reload sidecar image is ignored.
      - name: Validate rendered Alertmanager config (amtool)
        run: |
          mkdir -p /tmp/am-etc
          AM_IMAGE=$(grep -oE "prom/alertmanager:[^[:space:]\"']+" k8s/03-monitoring/deployment-alertmanager.yaml | head -1)
          if [ -z "$AM_IMAGE" ]; then
            echo "ERROR: no prom/alertmanager image found in deployment-alertmanager.yaml" >&2
            exit 1
          fi
          echo "amtool image (from deployment manifest): $AM_IMAGE"
          python -c "import yaml,pathlib;d=yaml.safe_load(open('k8s/03-monitoring/configmap-alertmanager.yaml',encoding='utf-8'));pathlib.Path('/tmp/am-base.yml').write_text(d['data']['alertmanager.yml'],encoding='utf-8')"
          python scripts/tools/ops/generate_alertmanager_routes.py \
            --config-dir components/threshold-exporter/config/conf.d/ \
            --output-configmap \
            --base-config /tmp/am-base.yml \
            -o /tmp/am-cm.yml
          python -c "import yaml,pathlib;d=yaml.safe_load(open('/tmp/am-cm.yml',encoding='utf-8'));pathlib.Path('/tmp/am-etc/alertmanager.yml').write_text(d['data']['alertmanager.yml'],encoding='utf-8')"
          docker run --rm --entrypoint amtool \
            -v /tmp/am-etc:/etc/alertmanager \
            "$AM_IMAGE" \
            check-config /etc/alertmanager/alertmanager.yml

      # Custom rule deny-list linting
      - name: Lint custom rules
        run: |
          python scripts/tools/ops/lint_custom_rules.py \
            rule-packs/ \
            --policy .github/custom-rule-policy.yaml \
            --ci

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.validate_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pyyaml
      - run: python scripts/tools/dx/bump_docs.py --check
