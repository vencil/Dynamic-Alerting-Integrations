# validate.yaml — PR validation pipeline
#
# Runs on every PR that touches tenant configs, routing, rule packs,
# or Python/Go source code. Catches issues before merge.
#
# Checks:
#   1. Python tests (450+ tests)
#   2. Go tests (threshold-exporter)
#   3. Tenant config validation (schema + routing + policy)
#   4. Custom rule linting (deny-list)
#   5. Version consistency (bump_docs --check)

name: Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "components/threshold-exporter/config/**"
      - "components/threshold-exporter/app/**"
      # tenant-api: branch-protection on `main` requires the four jobs
      # in this workflow (Python Tests, Go Tests, Validate Tenant
      # Config & Routes, Version Consistency). Pre-PR-216 the path
      # filter excluded `components/tenant-api/**`, so any tenant-api-
      # only PR couldn't satisfy the required-checks contract and
      # merging fell back to admin override / artificial cross-touch
      # in CHANGELOG. The included jobs don't actually exercise
      # tenant-api code (Python tests + threshold-exporter Go tests
      # + threshold-exporter config validation + version-bump check),
      # but they're cheap to run and the symmetry with threshold-
      # exporter PRs is the cleanest fix.
      - "components/tenant-api/**"
      - "rule-packs/**"
      - "scripts/tools/**"
      - "tests/**"
      - ".github/custom-rule-policy.yaml"
      - ".github/workflows/validate.yaml"

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Install the same deps as ci.yml's python-tests job. Previously
      # this step only installed pyyaml, which made `python -m pytest`
      # fail with "No module named pytest" on every run. The same
      # ignores are applied to match ci.yml's test collection and
      # keep the two workflows in sync.
      - run: pip install pyyaml croniter pytest pytest-cov promql-parser hypothesis
      - run: python -m pytest tests/ --ignore=tests/shared/test_property.py --ignore=tests/ops/test_benchmark.py --ignore=tests/shared/test_pipeline_integration.py -v

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/threshold-exporter/app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -v ./...

  validate-config:
    name: Validate Tenant Config & Routes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pyyaml

      # Schema validation + routing validation + webhook domain allowlist
      - name: Validate alertmanager routes
        run: |
          python scripts/tools/ops/generate_alertmanager_routes.py \
            --config-dir components/threshold-exporter/config/conf.d/ \
            --validate \
            --policy .github/custom-rule-policy.yaml

      # Custom rule deny-list linting
      - name: Lint custom rules
        run: |
          python scripts/tools/ops/lint_custom_rules.py \
            rule-packs/ \
            --policy .github/custom-rule-policy.yaml \
            --ci

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pyyaml
      - run: python scripts/tools/dx/bump_docs.py --check
