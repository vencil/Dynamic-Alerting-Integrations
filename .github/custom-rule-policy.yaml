# Custom Rule Governance Policy
# 參考: docs/custom-rule-governance.md §4
#
# 此檔案定義 CI deny-list linting 的檢查規則。
# 由 scripts/tools/lint_custom_rules.py 讀取。

denied_functions:
  - holt_winters           # CPU 密集型函式
  - predict_linear         # 大範圍回溯查詢
  - quantile_over_time     # 高記憶體消耗

denied_patterns:
  - '=~".*"'              # 全通配 regex（效能殺手）
  - 'without(tenant)'     # 破壞 tenant 隔離

required_labels:
  - tenant                 # 所有 Custom Alert Rule 必須帶 tenant label

max_range_duration: 1h     # 禁止超長 range vector (如 [7d])
max_evaluation_interval: 60s  # Custom Rule Group interval 上限

# Per-file policy overrides — 平台 COMPILED pack 豁免（v2.10.0）
# deny-list 的治理對象是「租戶手寫 raw PromQL」；平台 compiler 產出的 pack
# （recipe 經審查、成本緩解在編譯期內建）不適用部分 deny 理由。
# 安全護欄（四層）：
#   1. path 須錨在掃描樹頂層（精確 canonical 路徑，非 suffix）——巢狀
#      rule-packs/*/rule-packs/<file> 不取得豁免（防遞迴掃描繞過）。
#   2. override 僅在檔案前 10 行帶 GENERATED 標記時生效（缺標記 → ERROR），
#      且 CI 另有 compile_custom_alerts --check drift gate 防手寫冒充。
#   3. 只有 denied_functions / max_range_duration 可被放寬（lint 工具
#      OVERRIDABLE_POLICY_KEYS 白名單）；列其他 key（如清空 required_labels）
#      會被忽略並回報 ERROR，結構性檢查不可被豁免關閉。
#   4. 被覆寫以外的檢查（denied_patterns / required_labels …）照跑。
file_overrides:
  - path: rule-packs/rule-pack-custom-alerts.yaml
    require_generated_marker: true
    policy:
      # forecast recipe（ADR-024 能力 B）合法產出 predict_linear——
      # 「大範圍回溯」的 deny 理由已被編譯期緩解（lookback 平台導出、
      # cold-start 樣本 gate），不適用於 compiled pack。
      denied_functions:
        - holt_winters
        - quantile_over_time
      # forecast lookback = max(2·horizon, 1h)；horizon enum 上限 48h → 96h。
      max_range_duration: 96h

# Webhook Domain Allowlist (v1.5.0)
# generate_alertmanager_routes.py --validate --policy 時檢查 receiver URL
# 支援 fnmatch 萬用字元 (e.g., *.example.com)
# 空清單 = 不限制（向後相容）
allowed_domains:
  - "*.example.com"          # 預設企業域名
  - "hooks.slack.com"        # Slack incoming webhooks
  - "outlook.office.com"     # Microsoft Teams
  - "events.pagerduty.com"   # PagerDuty
