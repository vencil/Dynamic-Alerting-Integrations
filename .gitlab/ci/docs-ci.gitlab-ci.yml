# ⚠️  DEPRECATED — community reference only. Primary CI: .github/workflows/
#
# docs-ci.gitlab-ci.yml — Documentation CI/CD Pipeline
#
# Include in your .gitlab-ci.yml:
#   include:
#     - local: '.gitlab/ci/docs-ci.gitlab-ci.yml'
#
# Validates and renders documentation on every MR that touches docs/**/*.md
# or rule-packs/**/*.md.
#
# Jobs:
#   1. validate-mermaid: Syntax check + optional mmdc render of Mermaid diagrams
#   2. check-links: Cross-reference validation (internal links, anchors, files)
#   3. check-frontmatter: YAML front matter consistency check
#   4. check-coverage: Documentation coverage thresholds (80% minimum)

stages:
  - docs

validate-mermaid:
  stage: docs
  image: node:18
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - docs/**/*.md
        - rule-packs/**/*.md
        - README.md
        - README.en.md
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip install pyyaml
    - npm install -g @mermaid-js/mermaid-cli puppeteer
  script:
    - |
      python3 scripts/tools/lint/validate_mermaid.py \
        docs/ rule-packs/ \
        --ci --render
  allow_failure: false

check-links:
  stage: docs
  image: python:3.10
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - docs/**/*.md
        - rule-packs/**/*.md
        - README.md
        - README.en.md
  before_script:
    - pip install pyyaml
  script:
    - |
      python3 scripts/tools/lint/check_doc_links.py \
        docs/ rule-packs/ \
        --ci
  allow_failure: false

check-frontmatter:
  stage: docs
  image: python:3.10
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - docs/**/*.md
        - rule-packs/**/*.md
        - README.md
        - README.en.md
  before_script:
    - pip install pyyaml
  script:
    - |
      python3 scripts/tools/dx/add_frontmatter.py \
        docs/ rule-packs/ \
        --check
  allow_failure: false

check-coverage:
  stage: docs
  image: python:3.10
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - docs/**/*.md
        - rule-packs/**/*.md
        - README.md
        - README.en.md
  before_script:
    - pip install pyyaml
  script:
    - |
      python3 scripts/tools/dx/doc_coverage.py \
        docs/ rule-packs/ \
        --ci
  allow_failure: false
