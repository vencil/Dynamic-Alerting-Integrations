# ⚠️  DEPRECATED — community reference only. Primary CI: .github/workflows/
#
# config-diff.gitlab-ci.yml — Blast Radius Report on Config MRs
#
# Include in your .gitlab-ci.yml:
#   include:
#     - local: '.gitlab/ci/config-diff.gitlab-ci.yml'
#
# Part of the Data-Driven Threshold Review pipeline:
#   1. config-diff (this job) — blast radius preview
#   2. backtest (manual / on-demand) — historical threshold replay

config-diff:
  stage: review
  image: ghcr.io/vencil/da-tools:v2.0.0
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - components/threshold-exporter/config/conf.d/**
  variables:
    GIT_DEPTH: 0   # full clone for base branch comparison
  before_script:
    - mkdir -p /tmp/old-conf.d
    - |
      for f in $(git ls-tree --name-only "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" \
        components/threshold-exporter/config/conf.d/ 2>/dev/null); do
        fname=$(basename "$f")
        git show "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}:${f}" \
          > "/tmp/old-conf.d/${fname}" 2>/dev/null || true
      done
  script:
    - |
      config-diff \
        --old-dir /tmp/old-conf.d \
        --new-dir components/threshold-exporter/config/conf.d/ \
        | tee /tmp/diff-report.md || true
    - echo "--- Blast radius report generated ---"
  artifacts:
    paths:
      - /tmp/diff-report.md
    when: always
    expire_in: 7 days
  allow_failure: true   # config changes are expected; report is informational
