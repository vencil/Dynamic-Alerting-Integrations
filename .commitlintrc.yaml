extends:
  - '@commitlint/config-conventional'

rules:
  # Scope = 「PR 動到的產品介面 / 長期跨切關注點」。
  # Initiative / phase / 版號不進 scope（用 PR labels / branch name / chore(release) 表達）。
  # Compound scope（dx+e2e）違反 conventional 的 one-scope 原則 — 拆 commit 或選主導 scope。
  scope-enum:
    - 2
    - always
    - # Deliverable artifacts (long-lived product surfaces)
      - exporter         # threshold-exporter Go binary
      - tenant-api       # tenant-api Go service
      - portal           # da-portal (JSX 工具集 host)
      - tools            # da-tools CLI / scripts/tools/
      - rule-packs       # rule pack content
      - helm             # helm chart
      - k8s              # kubernetes manifests
      # Cross-cutting concerns
      - docs             # documentation
      - ci               # GitHub Actions / pipeline
      - e2e              # Playwright suite
      - jsx              # JSX 工具技術面（_common/, jsx-loader, 共用 hooks 等）
      - a11y             # accessibility (WCAG / axe-core)
      - dx               # developer-experience tooling
      - ops              # operational scripts / runbooks
      - lint             # linter scripts / pre-commit hooks
      # Doc sub-categories (high-frequency; warrant own scope vs. plain `docs`)
      - audit            # security / drift / health audit reports
      - playbook         # docs/internal/*-playbook.md 系列
      # Release wrap (replaces v2.7.0 / v2.8.0 version-named scopes)
      - release          # chore(release): vX.Y.Z 版本發布 commit
  # Allow sentence-case subjects (conventional default forbids it)
  subject-case:
    - 0
  # Relax body line length for Co-Authored-By and detailed descriptions
  body-max-line-length:
    - 1
    - always
    - 200
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      # chore: routine maintenance (config bumps, dep pins, housekeeping)
      # that doesn't ship a feature or user-visible fix. Standard in
      # conventional-commits; previously excluded but accepted per
      # user decision on PR #43 post-merge review.
      - chore
      # revert: standard conventional-commits type for reverting prior commits.
      - revert
