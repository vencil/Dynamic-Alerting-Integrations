extends:
  - '@commitlint/config-conventional'

rules:
  scope-enum:
    - 2
    - always
    - - exporter
      - tools
      - docs
      - rule-packs
      - ci
      - k8s
      - helm
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
