extends:
  - '@commitlint/config-conventional'

rules:
  scope-enum:
    - 2
    - always
    - - exporter
      - tools
      - docs
      - rule-packs
      - ci
      - k8s
      - helm
      # tool-map sub-categories (ops 46 / dx 22 / lint 35)
      - ops
      - dx
      - lint
      # doc sub-categories
      - audit
      - playbook
      # development phases & cross-cutting scopes
      - adr
      - e2e
      - jsx
      - a11y            # accessibility (WCAG / axe fixes, cross-cutting per v2.8.0 Phase .a PR#2)
      - phase-a
      - phase-b
      # compound scopes (multi-area changes)
      - dx+e2e
      - lint+tooling
      # component / sub-area scopes
      - scanner          # hierarchical dir scanner (exporter subsystem)
      - golden           # golden fixture parity tests
      - tooling          # generic tooling / infrastructure changes
      - blast-radius     # CI bot + scripts/tools/ops/blast_radius.py (PR comment generator)
      # planning / paperwork scopes (session-ledger / decomposition commits)
      - planning        # v*-planning.md authorship commits (DEC-K/L drafts, session ledger)
      # release-version scopes (used by release-wrap commits)
      - v2.7.0
      - v2.8.0
  # Allow sentence-case subjects (conventional default forbids it)
  subject-case:
    - 0
  # Relax body line length for Co-Authored-By and detailed descriptions
  body-max-line-length:
    - 1
    - always
    - 200
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
      - merge
