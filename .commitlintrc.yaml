extends:
  - '@commitlint/config-conventional'

rules:
  scope-enum:
    - 2
    - always
    - - exporter
      - tools
      - docs
      - rule-packs
      - ci
      - k8s
      - helm
      # tool-map sub-categories (ops 46 / dx 22 / lint 35)
      - ops
      - dx
      - lint
      # doc sub-categories
      - audit
      - playbook
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
      - merge
