apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-redis
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: redis-normalization
    interval: 15s
    rules:
    - record: tenant:redis_memory_used_bytes:max
      expr: max by(tenant) (redis_memory_used_bytes)
    - record: tenant:redis_memory_usage:ratio
      expr: 'max by(tenant) (redis_memory_used_bytes)

        / max by(tenant) (redis_memory_max_bytes > 0)

        '
    - record: tenant:redis_connected_clients:max
      expr: max by(tenant) (redis_connected_clients)
    - record: tenant:redis_evicted_keys:rate5m
      expr: sum by(tenant) (rate(redis_evicted_keys_total[5m]))
    - record: tenant:redis_keyspace_hit_ratio:avg
      expr: "sum by(tenant) (rate(redis_keyspace_hits_total[5m]))\n/ (\n  sum by(tenant)\
        \ (rate(redis_keyspace_hits_total[5m]))\n  + sum by(tenant) (rate(redis_keyspace_misses_total[5m]))\n\
        )\n"
    - record: tenant:redis_replication_lag:max
      expr: max by(tenant) (redis_connected_slave_lag_seconds)
    - record: tenant:redis_commands:rate5m
      expr: sum by(tenant) (rate(redis_commands_processed_total[5m]))
  - name: redis-threshold-normalization
    interval: 15s
    rules:
    - record: tenant:alert_threshold:redis_memory_used_bytes
      expr: sum by(tenant) (user_threshold{metric="redis_memory_used_bytes", severity="warning"})
    - record: tenant:alert_threshold:redis_connected_clients
      expr: sum by(tenant) (user_threshold{metric="redis_connected_clients", severity="warning"})
    - record: tenant:alert_threshold:redis_evicted_keys_rate
      expr: sum by(tenant) (user_threshold{metric="redis_evicted_keys_rate", severity="warning"})
    - record: tenant:alert_threshold:redis_replication_lag
      expr: sum by(tenant) (user_threshold{metric="redis_replication_lag", severity="warning"})
  - name: redis-alerts
    rules:
    - alert: RedisDown
      expr: redis_up == 0
      for: 15s
      labels:
        severity: critical
      annotations:
        summary: Redis instance {{ $labels.instance }} is DOWN
        summary_zh: Redis 實例 {{ $labels.instance }} 已停機
    - alert: RedisHighMemory
      expr: "(\n  (\n    tenant:redis_memory_used_bytes:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:redis_memory_used_bytes\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Redis high memory usage on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的 Redis 記憶體使用率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Redis memory
          threshold breached — evaluate maxmemory policy'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: Redis 記憶體閾值超過
          — 請評估 maxmemory 政策'
        description: 'Memory usage: {{ $value | humanize1024 }}B'
        description_zh: '記憶體使用量: {{ $value | humanize1024 }}B'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: RedisHighConnections
      expr: "(\n  (\n    tenant:redis_connected_clients:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:redis_connected_clients\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Redis high connection count on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的 Redis 連線數過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Redis connection
          count high — client pool review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: Redis 連線數過高
          — 請檢查客戶端連線池'
        description: '{{ $value }} connected clients'
        description_zh: '{{ $value }} 個已連線的客戶端'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: RedisHighKeyEvictions
      expr: "(\n  (\n    tenant:redis_evicted_keys:rate5m\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:redis_evicted_keys_rate\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Redis high key eviction rate on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的 Redis Key 驅逐率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: key eviction
          rate elevated — capacity review needed'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: Key 驅逐率提升
          — 需要檢查容量'
        description: '{{ $value | printf "%.1f" }} evictions/sec — consider increasing
          maxmemory'
        description_zh: '{{ $value | printf "%.1f" }} 驅逐次數/秒 — 請考慮增加 maxmemory'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: RedisReplicationLag
      expr: "(\n  (\n    tenant:redis_replication_lag:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:redis_replication_lag\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: Redis replication lag on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的 Redis 複製延遲'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Redis replication
          lag — check replica health'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: Redis 複製延遲
          — 請檢查副本狀態'
        description: 'Replication lag: {{ $value | printf "%.1f" }}s'
        description_zh: '複製延遲: {{ $value | printf "%.1f" }}s'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: RedisLowHitRatio
      expr: "(\n  tenant:redis_keyspace_hit_ratio:avg < 0.9\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: Redis low hit ratio on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 的 Redis 快取命中率過低'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: low cache hit
          ratio — cache strategy review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}: 快取命中率過低 —
          請檢查快取策略'
        description: 'Hit ratio: {{ $value | printf "%.2f" }} — check cache strategy'
        description_zh: '命中率: {{ $value | printf "%.2f" }} — 請檢查快取策略'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
