apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-clickhouse
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: clickhouse-normalization
    rules:
    - record: tenant:clickhouse_queries:rate5m
      expr: "sum by(tenant) (\n  rate(ClickHouseProfileEvents_Query{tenant!=\"\"}[5m])\n\
        )\n"
    - record: tenant:clickhouse_active_connections:max
      expr: "max by(tenant) (\n  ClickHouseMetrics_TCPConnection{tenant!=\"\"}\n)\n"
    - record: tenant:clickhouse_max_part_count:max
      expr: "max by(tenant) (\n  ClickHouseAsyncMetrics_MaxPartCountForPartition{tenant!=\"\
        \"}\n)\n"
    - record: tenant:clickhouse_replication_queue:max
      expr: "max by(tenant) (\n  ClickHouseMetrics_ReplicatedSendQueueSize{tenant!=\"\
        \"}\n  + ClickHouseMetrics_ReplicatedFetchQueueSize{tenant!=\"\"}\n)\n"
    - record: tenant:clickhouse_memory_tracking:max
      expr: "max by(tenant) (\n  ClickHouseMetrics_MemoryTracking{tenant!=\"\"}\n\
        )\n"
    - record: tenant:clickhouse_merges_rate:rate5m
      expr: "sum by(tenant) (\n  rate(ClickHouseProfileEvents_MergedRows{tenant!=\"\
        \"}[5m])\n)\n"
    - record: tenant:clickhouse_failed_queries:rate5m
      expr: "sum by(tenant) (\n  rate(ClickHouseProfileEvents_FailedQuery{tenant!=\"\
        \"}[5m])\n)\n"
  - name: clickhouse-threshold-normalization
    rules:
    - record: tenant:alert_threshold:clickhouse_queries_rate
      expr: "max by(tenant) (\n  user_threshold{metric=\"clickhouse_queries_rate\"\
        , severity=\"warning\"}\n)\n"
    - record: tenant:alert_threshold:clickhouse_active_connections
      expr: "max by(tenant) (\n  user_threshold{metric=\"clickhouse_active_connections\"\
        , severity=\"warning\"}\n)\n"
    - record: tenant:alert_threshold:clickhouse_max_part_count
      expr: "max by(tenant) (\n  user_threshold{metric=\"clickhouse_max_part_count\"\
        , severity=\"warning\"}\n)\n"
    - record: tenant:alert_threshold:clickhouse_replication_queue
      expr: "max by(tenant) (\n  user_threshold{metric=\"clickhouse_replication_queue\"\
        , severity=\"warning\"}\n)\n"
    - record: tenant:alert_threshold:clickhouse_memory_tracking_bytes
      expr: "max by(tenant) (\n  user_threshold{metric=\"clickhouse_memory_tracking_bytes\"\
        , severity=\"warning\"}\n)\n"
  - name: clickhouse-alerts
    rules:
    - alert: ClickHouseDown
      expr: up{job="clickhouse"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: ClickHouse instance is DOWN
        summary_zh: ClickHouse 實例已關閉
    - alert: ClickHouseHighQueryRate
      expr: "(\n  (\n    tenant:clickhouse_queries:rate5m\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:clickhouse_queries_rate\n  )\n  unless on(tenant)\
        \ (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: ClickHouse query rate exceeds threshold
        summary_zh: ClickHouse 查詢率超出閾值
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: ClickHouse query
          rate elevated — workload review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：ClickHouse
          查詢率升高 — 工作負載審查'
        description: '{{ $value | printf "%.1f" }} queries/sec exceeds threshold'
        description_zh: '{{ $value | printf "%.1f" }} 次查詢/秒超出閾值'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: ClickHouseHighConnections
      expr: "(\n  (\n    tenant:clickhouse_active_connections:max\n    > on(tenant)\
        \ group_left\n    tenant:alert_threshold:clickhouse_active_connections\n \
        \ )\n  unless on(tenant) (user_state_filter{filter=\"maintenance\"} == 1)\n\
        )\n* on(tenant) group_left(runbook_url, owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: ClickHouse active connections exceed threshold
        summary_zh: ClickHouse 活動連線超出閾值
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: ClickHouse connections
          exceeded — client pool review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：ClickHouse
          連線已超出 — client pool 審查'
        description: '{{ $value | printf "%.0f" }} active connections'
        description_zh: '{{ $value | printf "%.0f" }} 個活動連線'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: ClickHouseHighPartCount
      expr: "(\n  (\n    tenant:clickhouse_max_part_count:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:clickhouse_max_part_count\n  )\n  unless on(tenant)\
        \ (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: ClickHouse max part count per partition exceeds threshold (merge
          pressure)
        summary_zh: ClickHouse partition 最大 part 數超出閾值（merge 壓力）
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: ClickHouse partition
          merge pressure — part count review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：ClickHouse
          partition merge 壓力 — part 數量審查'
        description: 'Part count: {{ $value | printf "%.0f" }} exceeds threshold'
        description_zh: Part 數量：{{ $value | printf "%.0f" }} 超出閾值
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: ClickHouseReplicationLag
      expr: "(\n  (\n    tenant:clickhouse_replication_queue:max\n    > on(tenant)\
        \ group_left\n    tenant:alert_threshold:clickhouse_replication_queue\n  )\n\
        \  unless on(tenant) (user_state_filter{filter=\"maintenance\"} == 1)\n)\n\
        * on(tenant) group_left(runbook_url, owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: ClickHouse replication queue size exceeds threshold
        summary_zh: ClickHouse 複寫隊列大小超出閾值
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: ClickHouse replication
          queue high — replica health check'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：ClickHouse
          複寫隊列過高 — replica 健康檢查'
        description: 'Queue size: {{ $value | printf "%.0f" }} tasks pending'
        description_zh: 隊列大小：{{ $value | printf "%.0f" }} 個待處理任務
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: ClickHouseHighMemoryUsage
      expr: "(\n  (\n    tenant:clickhouse_memory_tracking:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:clickhouse_memory_tracking_bytes\n  )\n  unless\
        \ on(tenant) (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant)\
        \ group_left(runbook_url, owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: ClickHouse memory tracking exceeds threshold
        summary_zh: ClickHouse 記憶體追蹤超出閾值
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: ClickHouse memory
          usage high — resource sizing review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：ClickHouse
          記憶體使用率過高 — 資源大小調整審查'
        description: 'Memory tracked: {{ $value | humanize1024 }}B'
        description_zh: 追蹤的記憶體：{{ $value | humanize1024 }}B
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: ClickHouseHighFailedQueryRate
      expr: 'tenant:clickhouse_failed_queries:rate5m > 10

        '
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: ClickHouse failed query rate > 10/s
        summary_zh: ClickHouse 查詢失敗率 > 10/秒
        description: 'Failed query rate: {{ $value | printf "%.1f" }} queries/sec'
        description_zh: 查詢失敗率：{{ $value | printf "%.1f" }} 次查詢/秒
