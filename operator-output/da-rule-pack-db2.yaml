apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-db2
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: db2-normalization
    interval: 15s
    rules:
    - record: tenant:db2_connections_active:max
      expr: max by(tenant) (db2_connections_active)
    - record: tenant:db2_bufferpool_hit_ratio:min
      expr: min by(tenant) (db2_bufferpool_hit_ratio)
    - record: tenant:db2_log_usage_percent:max
      expr: max by(tenant) (db2_log_usage_percent)
    - record: tenant:db2_deadlocks:rate5m
      expr: sum by(tenant) (rate(db2_deadlocks_total[5m]))
    - record: tenant:db2_tablespace_used_percent:max
      expr: max by(tenant) (db2_tablespace_used_percent)
    - record: tenant:db2_lock_wait_time:rate5m
      expr: sum by(tenant) (rate(db2_lock_wait_time_seconds_total[5m]))
    - record: tenant:db2_sort_overflow_ratio:avg
      expr: 'sum by(tenant) (db2_sort_overflows)

        / (sum by(tenant) (db2_total_sorts) > 0)

        '
  - name: db2-threshold-normalization
    interval: 15s
    rules:
    - record: tenant:alert_threshold:db2_connections_active
      expr: max by(tenant) (user_threshold{metric="db2_connections_active", severity="warning"})
    - record: tenant:alert_threshold:db2_bufferpool_hit_ratio
      expr: max by(tenant) (user_threshold{metric="db2_bufferpool_hit_ratio", severity="warning"})
    - record: tenant:alert_threshold:db2_log_usage_percent
      expr: max by(tenant) (user_threshold{metric="db2_log_usage_percent", severity="warning"})
    - record: tenant:alert_threshold:db2_deadlock_rate
      expr: max by(tenant) (user_threshold{metric="db2_deadlock_rate", severity="warning"})
    - record: tenant:alert_threshold:db2_tablespace_used_percent
      expr: max by(tenant) (user_threshold{metric="db2_tablespace_used_percent", severity="warning"})
  - name: db2-alerts
    rules:
    - alert: DB2DatabaseDown
      expr: db2_up == 0
      for: 15s
      labels:
        severity: critical
      annotations:
        summary: DB2 instance {{ $labels.instance }} is DOWN
        summary_zh: DB2 實例 {{ $labels.instance }} 已關閉
        description: db2_up=0 for 15s on {{ $labels.instance }}
        description_zh: db2_up=0，持續 15 秒，實例：{{ $labels.instance }}
    - alert: DB2HighConnections
      expr: "(\n  (\n    tenant:db2_connections_active:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:db2_connections_active\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: DB2 high active connections on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 DB2 連線數過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 connection
          usage high — pool sizing review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 連線使用率過高
          — pool 大小調整審查'
        description: '{{ $value | printf "%.0f" }} active connections'
        description_zh: '{{ $value | printf "%.0f" }} 個活動連線'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: DB2LowBufferpoolHitRatio
      expr: "(\n  (\n    tenant:db2_bufferpool_hit_ratio:min\n    < on(tenant) group_left\n\
        \    tenant:alert_threshold:db2_bufferpool_hit_ratio\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: DB2 low bufferpool hit ratio on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 DB2 bufferpool 命中率偏低'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 bufferpool
          hit ratio low — memory tuning review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 bufferpool
          命中率偏低 — 記憶體調優審查'
        description: 'Hit ratio: {{ $value | printf "%.4f" }} — check bufferpool sizing'
        description_zh: 命中率：{{ $value | printf "%.4f" }} — 檢查 bufferpool 大小調整
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: DB2HighLogUsage
      expr: "(\n  (\n    tenant:db2_log_usage_percent:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:db2_log_usage_percent\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: DB2 high transaction log usage on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 DB2 交易日誌使用率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 transaction
          log usage high — log space review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 交易日誌使用率過高
          — 日誌空間審查'
        description: 'Log usage: {{ $value | printf "%.1f" }}%'
        description_zh: 日誌使用率：{{ $value | printf "%.1f" }}%
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: DB2HighDeadlockRate
      expr: "(\n  (\n    tenant:db2_deadlocks:rate5m\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:db2_deadlock_rate\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: DB2 high deadlock rate on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 DB2 死鎖率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 deadlock
          rate elevated — application contention review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 死鎖率升高
          — 應用程式爭用審查'
        description: '{{ $value | printf "%.1f" }} deadlocks/sec'
        description_zh: '{{ $value | printf "%.1f" }} 個死鎖/秒'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: DB2TablespaceAlmostFull
      expr: "(\n  (\n    tenant:db2_tablespace_used_percent:max\n    > on(tenant)\
        \ group_left\n    tenant:alert_threshold:db2_tablespace_used_percent\n  )\n\
        \  unless on(tenant)\n  (user_state_filter{filter=\"maintenance\"} == 1)\n\
        )\n* on(tenant) group_left(runbook_url, owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: DB2 tablespace nearing capacity on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 DB2 tablespace 即將滿容'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 tablespace
          nearing capacity — storage review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 tablespace
          即將滿容 — 儲存審查'
        description: 'Tablespace usage: {{ $value | printf "%.1f" }}%'
        description_zh: Tablespace 使用率：{{ $value | printf "%.1f" }}%
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: DB2HighSortOverflow
      expr: "(\n  tenant:db2_sort_overflow_ratio:avg > 0.05\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: DB2 high sort overflow ratio on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 DB2 sort overflow 比率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 sort overflow
          ratio high — SORTHEAP tuning review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 sort overflow
          比率過高 — SORTHEAP 調優審查'
        description: 'Sort overflow ratio: {{ $value | printf "%.2f" }} — consider
          increasing SORTHEAP'
        description_zh: Sort overflow 比率：{{ $value | printf "%.2f" }} — 考慮增加 SORTHEAP
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
