apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: da-rule-pack-oracle
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: dynamic-alerting
    prometheus: kube-prometheus
spec:
  groups:
  - name: oracle-normalization
    interval: 15s
    rules:
    - record: tenant:oracle_sessions_active:max
      expr: max by(tenant) (oracledb_sessions_active)
    - record: tenant:oracle_tablespace_used_percent:max
      expr: max by(tenant) (oracledb_tablespace_used_percent)
    - record: tenant:oracle_wait_time:rate5m
      expr: sum by(tenant) (rate(oracledb_wait_time_seconds_total[5m]))
    - record: tenant:oracle_process_count:max
      expr: max by(tenant) (oracledb_process_count)
    - record: tenant:oracle_pga_allocated_bytes:max
      expr: max by(tenant) (oracledb_pga_allocated_bytes)
    - record: tenant:oracle_session_utilization:ratio
      expr: 'max by(tenant) (oracledb_sessions_active)

        / max by(tenant) (oracledb_resource_limit{resource="sessions"} > 0)

        '
  - name: oracle-threshold-normalization
    interval: 15s
    rules:
    - record: tenant:alert_threshold:oracle_sessions_active
      expr: max by(tenant) (user_threshold{metric="oracle_sessions_active", severity="warning"})
    - record: tenant:alert_threshold:oracle_tablespace_used_percent
      expr: max by(tenant) (user_threshold{metric="oracle_tablespace_used_percent",
        severity="warning"})
    - record: tenant:alert_threshold:oracle_wait_time_rate
      expr: max by(tenant) (user_threshold{metric="oracle_wait_time_rate", severity="warning"})
    - record: tenant:alert_threshold:oracle_process_count
      expr: max by(tenant) (user_threshold{metric="oracle_process_count", severity="warning"})
    - record: tenant:alert_threshold:oracle_pga_allocated_bytes
      expr: max by(tenant) (user_threshold{metric="oracle_pga_allocated_bytes", severity="warning"})
  - name: oracle-alerts
    rules:
    - alert: OracleDatabaseDown
      expr: oracledb_up == 0
      for: 15s
      labels:
        severity: critical
      annotations:
        summary: Oracle instance {{ $labels.instance }} is DOWN
        summary_zh: Oracle 實例 {{ $labels.instance }} 已關閉
        description: oracledb_up=0 for 15s on {{ $labels.instance }}
        description_zh: oracledb_up=0，持續 15 秒，實例：{{ $labels.instance }}
    - alert: OracleHighActiveSessions
      expr: "(\n  (\n    tenant:oracle_sessions_active:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:oracle_sessions_active\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Oracle high active sessions on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 Oracle 活動 session 數過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Oracle active
          sessions elevated — connection pool review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：Oracle 活動
          session 數升高 — connection pool 審查'
        description: '{{ $value | printf "%.0f" }} active sessions'
        description_zh: '{{ $value | printf "%.0f" }} 個活動 session'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: OracleTablespaceAlmostFull
      expr: "(\n  (\n    tenant:oracle_tablespace_used_percent:max\n    > on(tenant)\
        \ group_left\n    tenant:alert_threshold:oracle_tablespace_used_percent\n\
        \  )\n  unless on(tenant)\n  (user_state_filter{filter=\"maintenance\"} ==\
        \ 1)\n)\n* on(tenant) group_left(runbook_url, owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Oracle tablespace nearing capacity on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 Oracle tablespace 即將滿容'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Oracle tablespace
          nearing capacity — storage review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：Oracle tablespace
          即將滿容 — 儲存審查'
        description: 'Tablespace usage: {{ $value | printf "%.1f" }}%'
        description_zh: Tablespace 使用率：{{ $value | printf "%.1f" }}%
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: OracleHighWaitTime
      expr: "(\n  (\n    tenant:oracle_wait_time:rate5m\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:oracle_wait_time_rate\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Oracle high wait time on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 Oracle 等待時間過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Oracle wait
          time elevated — performance bottleneck review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：Oracle 等待時間升高
          — 效能瓶頸審查'
        description: 'Wait time rate: {{ $value | printf "%.1f" }}s/s'
        description_zh: 等待時間速率：{{ $value | printf "%.1f" }}秒/秒
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: OracleHighProcessCount
      expr: "(\n  (\n    tenant:oracle_process_count:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:oracle_process_count\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Oracle high process count on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 Oracle process 數過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Oracle process
          count high — resource review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：Oracle process
          數過高 — 資源審查'
        description: '{{ $value | printf "%.0f" }} active processes'
        description_zh: '{{ $value | printf "%.0f" }} 個活動 process'
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: OracleHighPGAUsage
      expr: "(\n  (\n    tenant:oracle_pga_allocated_bytes:max\n    > on(tenant) group_left\n\
        \    tenant:alert_threshold:oracle_pga_allocated_bytes\n  )\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: Oracle high PGA usage on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 Oracle PGA 使用率過高'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Oracle PGA usage
          high — memory sizing review'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：Oracle PGA
          使用率過高 — 記憶體大小調整審查'
        description: 'PGA allocated: {{ $value | humanize1024 }}B'
        description_zh: 配置的 PGA：{{ $value | humanize1024 }}B
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
    - alert: OracleHighSessionUtilization
      expr: "(\n  tenant:oracle_session_utilization:ratio > 0.85\n  unless on(tenant)\n\
        \  (user_state_filter{filter=\"maintenance\"} == 1)\n)\n* on(tenant) group_left(runbook_url,\
        \ owner, tier)\n  tenant_metadata_info\n"
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Oracle session limit approaching on {{ $labels.tenant }}
        summary_zh: '{{ $labels.tenant }} 上 Oracle session 限制即將達到'
        platform_summary: '[{{ $labels.tier }}] {{ $labels.tenant }}: Oracle session
          limit approaching — capacity action needed'
        platform_summary_zh: '[{{ $labels.tier }}] {{ $labels.tenant }}：Oracle session
          限制即將達到 — 需採取容量擴增行動'
        description: 'Session utilization: {{ $value | printf "%.0f" }}%'
        description_zh: Session 使用率：{{ $value | printf "%.0f" }}%
        runbook_url: '{{ $labels.runbook_url }}'
        owner: '{{ $labels.owner }}'
        tier: '{{ $labels.tier }}'
