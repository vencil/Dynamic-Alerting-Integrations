# ============================================================
# Rule Pack: MariaDB / MySQL (via mysqld_exporter / Percona)
# 預設啟用 — 涵蓋連線數、CPU、複合瓶頸、重啟偵測
#
# 需要的 exporter:
#   - mysqld_exporter (https://github.com/prometheus/mysqld_exporter)
#   - 或 Percona PMM exporter
#
# 對應的 threshold-exporter defaults:
#   mysql_connections: 80
#   mysql_cpu: 80
#
# Tenant config 範例 (conf.d/db-a.yaml):
#   tenants:
#     db-a:
#       mysql_connections: "70"        # 自訂連線數警告閾值
#       mysql_connections_critical: "120"  # Critical 閾值
#       mysql_cpu: "60"               # 自訂 CPU 警告閾值
# ============================================================
groups:
  # -------------------------------------------------------
  # Normalization: MySQL metrics
  # -------------------------------------------------------
  - name: mariadb-normalization
    interval: 15s
    rules:
      # Running-threads SATURATION proxy (USE method), NOT host CPU%. Counts the
      # threads actively executing a query — a GAUGE (the prior rate() was wrong:
      # gauge dips read as counter resets → ~0, so the threshold never fired).
      # SMOOTHED over 1m (avg_over_time) BEFORE thresholding: threads_running is a
      # spiky instantaneous gauge, and alerting on the RAW value with a `for:` clause
      # has a reset-trap — a single 15s dip below threshold resets the `for` timer, so
      # a sustained-but-oscillating overload (e.g. 120/120/120/60, avg 105) NEVER fires
      # (promtool-verified). avg_over_time absorbs the dips; max by(tenant) still keeps
      # the per-tenant busiest instance (topology-aware: the saturated primary, not
      # diluted by idle replicas — which avg-across-instances would, and sum would
      # false-fire). Consumed by the `mysql_cpu` threshold key + MariaDBHighCPU alert
      # (metric-dictionary.yaml). Corroborate with host CPU% — complementary, not equal.
      - record: tenant:mysql_threads_running:avg1m
        expr: max by(tenant) (avg_over_time(mysql_global_status_threads_running[1m]))

      - record: tenant:mysql_threads_connected:max
        expr: max by(tenant) (mysql_global_status_threads_connected)

      - record: tenant:mysql_connection_usage:ratio
        expr: |
          sum by(tenant) (mysql_global_status_threads_connected)
          / sum by(tenant) (mysql_global_variables_max_connections)

      - record: tenant:mysql_uptime:hours
        expr: min by(tenant) (mysql_global_status_uptime) / 3600

      # Additional Percona-inspired normalization
      - record: tenant:mysql_slow_queries:rate5m
        expr: sum by(tenant) (rate(mysql_global_status_slow_queries[5m]))

      - record: tenant:mysql_aborted_connections:rate5m
        expr: sum by(tenant) (rate(mysql_global_status_aborted_connects[5m]))

      - record: tenant:mysql_buffer_pool_usage:ratio
        expr: |
          sum by(tenant) (mysql_global_status_innodb_buffer_pool_pages_data)
          / sum by(tenant) (mysql_global_status_innodb_buffer_pool_pages_total)

  # -------------------------------------------------------
  # Threshold normalization: MySQL
  # -------------------------------------------------------
  - name: mariadb-threshold-normalization
    interval: 15s
    rules:
      - record: tenant:alert_threshold:mysql_connections
        expr: max by(tenant) (user_threshold{component="mysql", metric="connections", severity="warning"})

      - record: tenant:alert_threshold:mysql_cpu
        expr: max by(tenant) (user_threshold{component="mysql", metric="cpu", severity="warning"})

      # Multi-tier severity (Scenario D)
      - record: tenant:alert_threshold:mysql_connections_critical
        expr: max by(tenant) (user_threshold{component="mysql", metric="connections", severity="critical"})

      - record: tenant:alert_threshold:mysql_cpu_critical
        expr: max by(tenant) (user_threshold{component="mysql", metric="cpu", severity="critical"})

  # -------------------------------------------------------
  # Alert Rules: MariaDB
  # -------------------------------------------------------
  - name: mariadb-alerts
    rules:
      # ── HA-aware liveness tiering (#875 / ADR-026) ───────────────────────
      # SCOPE (#875 review): all three rules are VALUE-based (mysql_up / read_only)
      # → they catch process-death with the pod ALIVE. A pod/replica VANISHING in an
      # HA set makes the series ABSENT (not 0), masked by surviving nodes at every
      # rule here → HA replica-COUNT degradation is out of scope here; it is the
      # K8s-layer complement TenantHAReplicasDegraded (kube_*_status_replicas_ready,
      # #888, rule-pack-kubernetes.yaml) — SHIPPED, pairs with this value-based tier.
      # Customer topology: primary-replica SEMI-SYNC (not Galera → no wsrep quorum).
      # A single replica down during failover/drain is NOT a service outage →
      # warning + maintenance opt-out. Total outage and loss-of-writable-primary
      # are caught at CRITICAL by the two rules below.
      # ENGINE-EXPANSION (defer-with-trigger, #892): only ClusterDown (max(up)==0,
      # critical total-outage backstop) is <db>_up-only. The instance Down→warning
      # DOWNGRADE is NOT — it is safe only with BOTH ClusterDown AND NoPrimary; with
      # ClusterDown alone a no-writable-primary while some nodes are up (max(up)≠0)
      # under-alerts (#884 keystone). So the downgrade is COUPLED to NoPrimary → needs
      # the engine's cluster-state metric (patroni/sentinel/wsrep). Trigger: ClusterDown
      # on first HA tenant; Down→warning + NoPrimary TOGETHER on that metric.
      - alert: MariaDBDown
        expr: |
          (mysql_up == 0)
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)
        for: 15s
        labels:
          severity: warning
          metric_group: liveness
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "MariaDB instance {{ $labels.instance }} is down (tenant {{ $labels.tenant }})"
          summary_zh: "MariaDB 實例 {{ $labels.instance }} 停機（租戶 {{ $labels.tenant }}）"
          description: "mysql_up=0 on {{ $labels.instance }} — one replica down in a primary-replica set keeps the service available (warning). Total outage escalates to MariaDBClusterDown (critical); loss of the writable primary to MariaDBNoPrimary (critical)."
          description_zh: "{{ $labels.instance }} 的 mysql_up=0。primary-replica 架構下單一 replica 停機時服務仍可用（warning）。整體中斷會升級為 MariaDBClusterDown（critical）；失去可寫 primary 則為 MariaDBNoPrimary（critical）。"

      # Cluster-survival (total outage): NO instance reports up=1 for the tenant.
      # max by(tenant)(mysql_up)==0 is topology-agnostic — fires iff EVERY instance
      # is down (1 or N). The critical backstop that makes the MariaDBDown downgrade
      # safe (catches "exporter alive, mysqld unreachable, all nodes" — which
      # TenantExporterAbsent misses). NOT quorum/primary-loss (that is
      # MariaDBNoPrimary). NO maintenance opt-out. tenant-only annotation
      # (max by(tenant) strips instance → pint alerts/template).
      # for:30s outlasts a scrape gap; total-down needs no election debounce
      # (that is MariaDBNoPrimary's for:2m) — keeps time-to-critical near the
      # pre-#875 15s rather than regressing it to 1m.
      - alert: MariaDBClusterDown
        expr: max by(tenant) (mysql_up{job="tenant-exporters"}) == 0
        for: 30s
        labels:
          severity: critical
          metric_group: liveness
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "MariaDB: ALL instances down for tenant {{ $labels.tenant }}"
          summary_zh: "MariaDB：租戶 {{ $labels.tenant }} 的所有實例皆停機"
          description: "No mysqld reports up=1 for tenant {{ $labels.tenant }} — total service outage, not a single-replica failover. For a planned single-instance drain, silence via the Alertmanager Silence API (no maintenance-window opt-out by design; a tenant's silent-critical sentinel still suppresses it)."
          description_zh: "租戶 {{ $labels.tenant }} 沒有任何 mysqld 回報 up=1 — 整體服務中斷，非單一 replica failover。若為計畫性單實例維護，請用 Alertmanager Silence API 靜音（刻意不提供維護窗 opt-out；租戶的 silent-critical sentinel 仍會壓制此告警）。"

      # Write-availability (primary-replica semi-sync): instances are reachable but
      # NONE is the writable primary. mysql_global_variables_read_only==0 means
      # read-write (the primary); replicas are read_only==1. No read-write node →
      # failover stuck / primary lost → writes rejected = service effectively down.
      # This is the case max(up)==0 MISSES (primary down, replicas up → max=1).
      #
      # read_only is emitted by the mysqld_exporter global_variables collector — the
      # SAME collector already feeding mysql_global_variables_max_connections
      # (mariadb-normalization above), so its presence is tied to a metric this pack
      # already uses. The `A unless B` shape handles the empty-primary vector — a
      # plain count(...==0)==0 would NEVER fire (an empty vector is absent, not 0).
      # for:2m absorbs the normal promotion window (old primary demoted -> new
      # promoted). NO maintenance opt-out.
      # NOTE semi-sync: a primary that loses all semi-sync replicas can STALL writes
      # (clients=0) or silently fall back to async / lose durability (status=0) while
      # read_only stays 0 → NoPrimary is structurally blind. NOW COVERED by the two
      # semi-sync rules below (MariaDBSemiSyncDegraded / MariaDBSemiSyncReplicasGone, #892).
      # ⚠ At customer rollout, verify read_only is scraped (global_variables collector on).
      - alert: MariaDBNoPrimary
        expr: |
          count by(tenant) (mysql_global_variables_read_only{job="tenant-exporters"})
          unless
          count by(tenant) (mysql_global_variables_read_only{job="tenant-exporters"} == 0)
        for: 2m
        labels:
          severity: critical
          metric_group: liveness
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "MariaDB: no writable primary for tenant {{ $labels.tenant }}"
          summary_zh: "MariaDB：租戶 {{ $labels.tenant }} 沒有可寫 primary"
          description: "All instances are read_only for tenant {{ $labels.tenant }} — no writable primary (failover stuck / primary lost) → writes rejected. Unlike MariaDBClusterDown this fires while replicas are still up."
          description_zh: "租戶 {{ $labels.tenant }} 的所有實例皆為 read_only — 沒有可寫 primary（failover 卡住／primary 遺失）→ 寫入被拒。與 MariaDBClusterDown 不同，此告警在 replica 仍存活時就會觸發。"

      # ── Semi-sync write-availability (#892; Gemini external review) ──────────
      # MariaDBNoPrimary (read_only==0) proves a WRITABLE primary exists but is blind
      # to semi-sync health: read_only stays 0 during async-fallback (durability lost)
      # AND during a write-stall. ⛔ INTENT-GATE on _enabled==1 is MANDATORY — a
      # non-semi-sync MariaDB STILL emits _status=0 / _clients=0 (MariaDB ≥10.3
      # semi-sync is built-in, NOT a loadable plugin; VERIFIED on real
      # prom/mysqld-exporter v0.18.0 + mariadb:11.8), so a bare _status==0 would STORM
      # every non-semi-sync tenant. enabled==1 = "this instance WANTS semi-sync" →
      # expected-vs-observed, same idiom as #869 TenantExporterAbsent. The gate is purely
      # INTENT (semi-sync vs not) — NOT primary-vs-replica: the tenant-exporters scrape is
      # role:service with instance=namespace → ONE series per tenant (the service-routed
      # pod); master_enabled discriminates per-pod only if the scrape moves to role:endpoints.
      # metric_group:liveness → severity-dedup (NoPrimary/ReplicasGone critical inhibits
      # this warning). Lab can't produce the EVENT (needs 2-node semi-sync) → promtool
      # synthetic only; ⛔ verify metric presence at customer rollout.
      - alert: MariaDBSemiSyncDegraded
        expr: |
          (
            max by(tenant) (
              mysql_global_variables_rpl_semi_sync_master_enabled{job="tenant-exporters"} == 1
              and on(tenant, instance)
              mysql_global_status_rpl_semi_sync_master_status{job="tenant-exporters"} == 0
            )
          )
          unless on(tenant) (user_state_filter{filter="maintenance"} == 1)
        for: 2m
        labels:
          severity: warning
          metric_group: liveness
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "MariaDB semi-sync degraded — durability guarantee lost for tenant {{ $labels.tenant }}"
          summary_zh: "MariaDB semi-sync 降級 — 租戶 {{ $labels.tenant }} 失去持久性保證"
          description: "Tenant {{ $labels.tenant }} has semi-sync enabled but it fell back to ASYNC (rpl_semi_sync_master_status=0) — writes continue but the semi-sync durability guarantee is lost (a primary failure now risks data loss). Usually a replica timed out / disconnected. read_only stays 0, so MariaDBNoPrimary cannot see this."
          description_zh: "租戶 {{ $labels.tenant }} 啟用了 semi-sync 但已 fallback 到 ASYNC（status=0）— 寫入照常，但失去 semi-sync 持久性保證（此時 primary 故障有資料遺失風險）。通常是 replica timeout／斷線。read_only 仍為 0，故 MariaDBNoPrimary 看不到。"

      # Critical sibling: ZERO semi-sync replicas connected (clients=0) — durability
      # redundancy gone, cannot self-recover until a replica reconnects. With the
      # default wait_no_slave=ON, each commit stalls up to rpl_semi_sync_master_timeout
      # (10s, VERIFIED default) before falling back to async — so this CONVERGES to
      # *Degraded (status=0) but is the earlier/structural signal. NO maintenance
      # opt-out (matches NoPrimary — a real durability outage must always page).
      - alert: MariaDBSemiSyncReplicasGone
        expr: |
          max by(tenant) (
            mysql_global_variables_rpl_semi_sync_master_enabled{job="tenant-exporters"} == 1
            and on(tenant, instance)
            mysql_global_status_rpl_semi_sync_master_clients{job="tenant-exporters"} == 0
          )
        for: 1m
        labels:
          severity: critical
          metric_group: liveness
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "MariaDB semi-sync has ZERO connected replicas for tenant {{ $labels.tenant }}"
          summary_zh: "MariaDB semi-sync 租戶 {{ $labels.tenant }} 連線的 replica 數為 0"
          description: "Tenant {{ $labels.tenant }} has semi-sync enabled but ZERO semi-sync replicas connected (rpl_semi_sync_master_clients=0) — durability redundancy is gone, no self-recovery until a replica reconnects. By the time this pages, the ~10s write-stall (wait_no_slave) has usually auto-recovered to async — the live risk is LOST DURABILITY (a primary failure now risks data loss), so the runbook's first step is to find WHY all replicas disconnected, not to chase the stall."
          description_zh: "租戶 {{ $labels.tenant }} 啟用了 semi-sync 但連線的 semi-sync replica 數為 0（clients=0）— 持久性備援歸零、replica 重連前無法自癒。此告警響起時 ~10s 寫入 stall（wait_no_slave）通常已自動 fallback async — 真正風險是失去持久性（此時 primary 故障會資料遺失），故 runbook 第一步是追查為何所有 replica 斷線、而非修 stall。"

      # DEPRECATED (#869): superseded by TenantExporterAbsent in rule-pack-liveness.yaml.
      # This GLOBAL absent() fires only when EVERY tenant's mysql_up is gone (one live
      # tenant masks another's outage) and its `tenant` label is always empty (absent()
      # returns an empty-matcher vector). Kept ONE release as a deprecation shim so
      # external Alertmanager matchers on MariaDBExporterAbsent don't break silently.
      # Removal: next release (drop this rule + update tests/ops/test_scaffold_db.py).
      - alert: MariaDBExporterAbsent
        expr: absent(mysql_up{job="tenant-exporters"})
        for: 30s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "mysqld-exporter target missing"
          summary_zh: "mysqld-exporter 目標缺失"
          description: "No mysql_up metric found for 30s"
          description_zh: "找不到 mysql_up 指標，持續 30 秒"

      - alert: MariaDBHighConnections
        expr: |
          (
            (
              (
                tenant:mysql_threads_connected:max
                > on(tenant) group_left
                tenant:alert_threshold:mysql_connections
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:mysql_threads_connected:max
                > on(tenant) group_left
                tenant:alert_threshold:mysql_connections
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 30s
        labels:
          severity: warning
          metric_group: "connections"
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High connections on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 連線數過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: connection threshold breached — review connection pool sizing"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：連線數閾值超出 — 檢查連線集區大小設定"
          description: "{{ $value }} threads connected (warning threshold exceeded)"
          description_zh: "{{ $value }} 個執行緒已連接（超過警告閾值）"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Critical tier
      - alert: MariaDBHighConnectionsCritical
        expr: |
          (
            (
              (
                tenant:mysql_threads_connected:max
                > on(tenant) group_left
                tenant:alert_threshold:mysql_connections_critical
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:mysql_threads_connected:max
                > on(tenant) group_left
                tenant:alert_threshold:mysql_connections_critical
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 30s
        labels:
          severity: critical
          metric_group: "connections"
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "Critical connections on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 連線數嚴重過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: critical connection saturation — immediate capacity action needed"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：連線數飽和 — 需立即採取容量擴增行動"
          description: "{{ $value }} threads connected (critical threshold exceeded)"
          description_zh: "{{ $value }} 個執行緒已連接（超過嚴重閾值）"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # CPU: standalone warning + critical (mirrors the connections pair above).
      # Before this, `cpu` warning was only consumed by the composite
      # MariaDBSystemBottleneck and `cpu_critical` had NO consumer at all (an
      # orphan threshold-normalization recording rule). These two alerts give
      # both CPU severity tiers a standalone firing path, symmetric with
      # connections (Scenario D multi-tier).
      - alert: MariaDBHighCPU
        expr: |
          (
            (
              (
                tenant:mysql_threads_running:avg1m
                > on(tenant) group_left
                tenant:alert_threshold:mysql_cpu
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:mysql_threads_running:avg1m
                > on(tenant) group_left
                tenant:alert_threshold:mysql_cpu
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        # for:30s: the metric is already 1m-smoothed (avg_over_time, see recording rule),
        # which removes the spiky-gauge `for` reset-trap — so a long `for:` is unnecessary
        # and a 30s debounce both suffices and responds faster than the raw+for:1m would.
        for: 30s
        labels:
          severity: warning
          metric_group: "cpu"
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High CPU on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} CPU 過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: CPU threshold breached — review running-thread load"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：CPU 閾值超出 — 檢查執行緒負載"
          description: "{{ $value | printf \"%.0f\" }} running threads (1m avg, warning threshold exceeded)"
          description_zh: "{{ $value | printf \"%.0f\" }} 個執行中執行緒（1m 平均，超過警告閾值）"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Critical tier
      - alert: MariaDBHighCPUCritical
        expr: |
          (
            (
              (
                tenant:mysql_threads_running:avg1m
                > on(tenant) group_left
                tenant:alert_threshold:mysql_cpu_critical
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:mysql_threads_running:avg1m
                > on(tenant) group_left
                tenant:alert_threshold:mysql_cpu_critical
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        # for:30s — metric is 1m-smoothed (see warning tier); 30s debounce suffices.
        for: 30s
        labels:
          severity: critical
          metric_group: "cpu"
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "Critical CPU on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} CPU 嚴重過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: critical CPU saturation — immediate investigation needed"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：CPU 飽和 — 需立即調查"
          description: "{{ $value | printf \"%.0f\" }} running threads (1m avg, critical threshold exceeded)"
          description_zh: "{{ $value | printf \"%.0f\" }} 個執行中執行緒（1m 平均，超過嚴重閾值）"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Composite alert: connections AND CPU both exceeded
      - alert: MariaDBSystemBottleneck
        expr: |
          (
            (
              (
                (
                  tenant:mysql_threads_connected:max
                  > on(tenant) group_left
                  tenant:alert_threshold:mysql_connections
                )
                and on(tenant)
                (
                  tenant:mysql_threads_running:avg1m
                  > on(tenant) group_left
                  tenant:alert_threshold:mysql_cpu
                )
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                (
                  tenant:mysql_threads_connected:max
                  > on(tenant) group_left
                  tenant:alert_threshold:mysql_connections
                )
                and on(tenant)
                (
                  tenant:mysql_threads_running:avg1m
                  > on(tenant) group_left
                  tenant:alert_threshold:mysql_cpu
                )
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "System bottleneck on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 系統瓶頸"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: CPU + connections both exceeded — multi-resource bottleneck, escalate"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：CPU 與連線皆超出 — 多資源瓶頸，需升級處理"
          description: "Both connections AND CPU thresholds exceeded simultaneously"
          description_zh: "CPU 與連線數閾值同時超出"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      - alert: MariaDBRecentRestart
        expr: mysql_global_status_uptime < 300
        for: 0s
        labels:
          severity: info
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "{{ $labels.instance }} restarted recently"
          summary_zh: "{{ $labels.instance }} 最近已重新啟動"
          description: "Uptime is only {{ $value }}s (< 5 min)"
          description_zh: "運行時間僅 {{ $value }}s（少於 5 分鐘）"

      # Percona-inspired: High slow queries rate
      - alert: MariaDBHighSlowQueries
        expr: |
          (
            (
              tenant:mysql_slow_queries:rate5m > 1
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              tenant:mysql_slow_queries:rate5m > 1
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 5m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High slow query rate on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 慢查詢率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: slow query rate elevated — query optimization review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：慢查詢率升高 — 需進行查詢最佳化檢查"
          description: "{{ $value | printf \"%.2f\" }} slow queries/sec"
          description_zh: "{{ $value | printf \"%.2f\" }} 次慢查詢／秒"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Percona-inspired: High aborted connections
      - alert: MariaDBHighAbortedConnections
        expr: |
          (
            (
              tenant:mysql_aborted_connections:rate5m > 5
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              tenant:mysql_aborted_connections:rate5m > 5
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 5m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High aborted connections on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 中止的連線數過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: aborted connection rate elevated — check client connectivity"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：中止連線率升高 — 檢查客戶端連線狀態"
          description: "{{ $value | printf \"%.2f\" }} aborted connections/sec"
          description_zh: "{{ $value | printf \"%.2f\" }} 次中止連線／秒"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
