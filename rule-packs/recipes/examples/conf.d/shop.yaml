# Custom Alerts example — TENANT-level (leaf) declarations for tenant `shop-a`.
# Demonstrates threshold / rate (with label selectors) / ratio / p99 recipes.
# A tenant-leaf recipe applies only to that tenant (vectorized on(tenant) join).
tenants:
  shop-a:
    _custom_alerts:
      # threshold: a gauge crosses a value.
      - recipe: threshold
        name: queue_depth_high
        metric: order_queue_depth
        op: ">"
        window: 5m
        threshold: "1000:warning"

      # rate: per-second rate of 5xx POSTs. Label filtering uses the safe
      # selectors map (compiler assembles `{status=~"5..", method="POST"}`) —
      # never inline PromQL, so injection is structurally impossible.
      - recipe: rate
        name: http_5xx_spike
        metric: http_requests_total
        selectors_re:
          status: "5.."
        selectors:
          method: "POST"
        op: ">"
        window: 5m
        threshold: "50:warning"

      # ratio: error ratio. Division-by-zero is guarded (`denominator > 0`) →
      # no-traffic windows yield an empty vector, never a +Inf false positive.
      - recipe: ratio
        name: error_ratio_high
        metric: http_errors_total
        denominator_metric: http_requests_total
        op: ">"
        window: 5m
        threshold: "0.05:critical"

      # p99 latency: histogram quantile over a _bucket metric.
      - recipe: p99_latency
        name: api_latency_p99
        metric: http_request_duration_seconds
        quantile: "0.99"
        op: ">"
        window: 5m
        threshold: "2:warning"

      # absence: fire (critical) when shop-a's heartbeat counter stops over 10m.
      # Self-scoped: only tenants with this recipe's user_threshold series are
      # candidates, so it cannot storm other tenants (unlike a platform-L0
      # absence — see _defaults.yaml note).
      - recipe: absence
        name: heartbeat_gone
        metric: app_heartbeat_total
        window: 10m
        threshold: "0:critical"

      # equals (#810): exact status/error-code match on a RAW gauge. `==` is
      # threshold-recipe-only — computed values (rate/ratio/quantile/forecast)
      # reject it as float-fragile. Example: MariaDB semi-sync replication
      # aborted with errno 1236 (binlog position lost).
      # `==` is ANY-MATCH (#819): each replica's raw value is compared to the code
      # before aggregating, so it fires if ANY instance equals 1236 — replicas
      # holding different codes do NOT mask each other. For tracking MANY codes,
      # prefer the label-form workaround (#810 option 1) over one `==` recipe per
      # code (each costs a shape + cap slot).
      # ⚠️ LIVENESS / exporter SHAPE: a value-match is blind to a dead exporter —
      # if the series VANISHES, nothing fires (reads as "healthy"). This is NOT
      # `==`-specific; every value-based recipe (`>` too) shares it. Whether to
      # pair an `absence` recipe depends on the exporter's shape: pair it when the
      # gauge is emitted CONTINUOUSLY (0 when healthy; see process_status_code
      # below); do NOT pair when it is emitted ONLY on error (then absence = the
      # healthy state). See docs/custom-rule-governance.md §8.
      - recipe: threshold
        name: semisync_errno_1236
        metric: mysql_semisync_master_last_errno
        op: "=="
        window: 5m
        threshold: "1236:critical"

      # ── Shape-X status-code + liveness pairing (safe-adoption demo, #832) ──
      # process_status_code is emitted CONTINUOUSLY (0 = healthy, 1 = fault) =
      # "Shape-X", so two recipes form the safe pair:
      #   (1) `==` fires when the code equals the fault value;
      #   (2) `absence` fires when the series VANISHES (dead exporter) — which (1)
      #       alone would silently read as "healthy".
      # `absence` respects maintenance mode and is tenant-aggregated: it catches
      # TOTAL absence (all replicas gone), NOT single-replica death — pin a stable
      # instance via `selectors` for per-replica liveness (works for StatefulSet
      # stable names, not Deployment random pods). See docs/custom-rule-governance.md §8.
      - recipe: threshold
        name: proc_status_fault
        metric: process_status_code
        op: "=="
        window: 5m
        threshold: "1:critical"
        for: 5m                  # §8 staleness: require the fault to persist (avoid a transient/stale read)
      - recipe: absence
        name: proc_status_exporter_gone
        metric: process_status_code
        window: 10m
        threshold: "0:critical"

      # forecast (ratio mode): predict disk EXHAUSTION. capacity_metric set →
      # headroom ratio (avail/capacity); op "<" + threshold 0.15 = "predict the
      # available fraction will drop below 15% within the horizon". The tenant
      # supplies `horizon` (NOT a window/lookback) — the platform derives
      # lookback = max(2·horizon, 1h). `for: 30m` requires the prediction to
      # persist, smoothing transient slope flips.
      # group_by: [persistentvolumeclaim] evaluates EACH PVC separately (ADR-024
      # §Addendum), so a small nearly-full volume fires even when a large empty one
      # would hide it in a by(tenant) sum. Disk-fill REQUIRES PVCs backed by a CSI
      # driver that implements NodeGetVolumeStats (most cloud CSI do; kind's default
      # local-path does not) — see the recipe catalog / BYO integration precondition.
      - recipe: forecast
        name: disk_will_fill
        metric: kubelet_volume_stats_available_bytes
        capacity_metric: kubelet_volume_stats_capacity_bytes
        op: "<"
        horizon: 4h
        threshold: "0.15:warning"
        for: 30m
        group_by: [persistentvolumeclaim]

      # slo_burn_rate (ADR-031): ONE declaration → multi-window burn-rate pair.
      # `objective` REPLACES `threshold` (severity is fixed by the recipe:
      # fast burn → critical page, slow burn → warning ticket — this single
      # declaration counts as 2 toward the own-recipe cap because it IS two
      # alert rules). The burn windows (1h/5m fast, 6h/30m slow) are recipe
      # semantics, so there is no `window`. min_events (default 10) guards
      # low traffic: a 50% error ratio on 2 requests must not page.
      # objective/slo_period ride the data plane — editing them never re-slugs.
      - recipe: slo_burn_rate
        name: checkout_availability
        metric: checkout_requests_errors_total
        denominator_metric: checkout_requests_total
        objective: "99.9"
