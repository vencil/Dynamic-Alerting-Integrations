# Recipe: threshold — platform-authored (ADR-024 Capability B, #741).
# Human governance contract for the `threshold` recipe. The executable form is
# scripts/tools/dx/custom_alerts/recipes.py (kept in sync; drift-guarded by
# tests/dx/test_compile_custom_alerts.py).
recipe: threshold
status: active   # lifecycle: active|deprecated|eol (ADR-024 #6; SSOT = shape.py RECIPE_STATUS)
summary: A gauge metric crosses a threshold value.
summary_zh: 一個 gauge 指標越過閾值。
params:
  metric:    {required: true,  desc: "bare Prometheus gauge metric name (^[a-zA-Z_][a-zA-Z0-9_]*$)"}
  op:        {required: false, default: ">", enum: [">", ">=", "<", "<=", "=="],
              desc: "`==` is threshold-recipe-only (#810): exact match for an integer status/error code on a raw gauge; computed-value recipes reject it as float-fragile"}
  window:    {required: true,  desc: "evaluation window (Go duration, e.g. 5m)"}
  threshold: {required: true,  desc: "value[:severity] — severity ∈ {warning,critical}, default warning"}
  selectors:    {required: false, desc: "exact label filters (=), assembled safely by the compiler"}
  selectors_re: {required: false, desc: "regex label filters (=~)"}
  mode:      {required: false, default: page, enum: [page, silent]}
  for:       {required: false, default: "1m", desc: "pending duration before firing; one of 0s/1m/5m/15m/30m/1h (enum-bounded, TRK-326)"}
emitted_shape: |
  max by(tenant,version)(<metric><selectors>) {op} on(tenant[,version])
    group_left(name, mode) custom:threshold:<recipe_id>{severity=<sev>}
  (version graceful-join + per-severity split + maintenance suppress + metadata enrich)
example:
  recipe: threshold
  name: queue_depth_high
  metric: order_queue_depth
  op: ">"
  window: 5m
  threshold: "1000:warning"
