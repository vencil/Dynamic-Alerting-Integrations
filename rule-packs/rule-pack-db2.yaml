# ============================================================
# Rule Pack: IBM DB2 (via ibm_db2_exporter / custom exporter)
# 選配 — 涵蓋 Connection、Bufferpool、Log Usage、Deadlock、Tablespace
#
# 需要的 exporter:
#   - ibm_db2_exporter (community) or custom Prometheus exporter
#
# 對應的 threshold-exporter defaults (加入 _defaults.yaml):
#   db2_connections_active: 200
#   db2_bufferpool_hit_ratio: 0.95
#   db2_log_usage_percent: 70
#   db2_deadlock_rate: 5
#   db2_tablespace_used_percent: 85
#   db2_lock_wait_time: 10   ← 起始建議值，須依租戶校準（推導見下）
#
# ⛔ 啟用前提（別跳過）：threshold-exporter 只對「**存在於 defaults 的 key**」
# 發射 user_threshold —— resolveBaseRows 迭代的是 c.Defaults
# （components/threshold-exporter/app/pkg/config/resolve.go:233），
# resolveCriticalRows 也要求 base key 在 defaults 才處理 _critical 覆寫（:320）。
# 換言之：**只在 conf.d 幫租戶填一個不在 defaults 的 key，永遠不會生效**
# ——那不是 dormant，是永久無法啟用。上面每個 key 都必須先進
# _defaults.yaml / Helm values，租戶才有東西可覆寫。
#
# db2_lock_wait_time 起始值 10（秒/秒，跨該租戶所有 instance 加總）的推導：
# tests/rulepacks/reference-validation/ 兩個獨立盲寫參考庫對此指標給出
# normal_level 1.5（兩者一致）、fault_level 25（real-incident）與 60（vendor-doc）。
# 10 落在「約 6.7 倍於觀測到的正常水位」與「低於兩個故障水位」之間。
# ⚠️ 這是起始點不是通用值：鎖等待累積速率在批次與 OLTP 工作負載之間差一個
# 數量級，正式採用前應以該租戶實際 baseline 校準（da-tools baseline-discovery
# 做 Day 0 粗估、threshold-recommend 做 Day N 微調）。
#
# Tenant config 範例 (conf.d/db2-prod.yaml):
#   tenants:
#     db2-prod:
#       db2_connections_active: "150"
#       db2_bufferpool_hit_ratio: "0.98"
#       # ── Regex 維度閾值 (v0.12.0 B1 feature) ──
#       # 一次性控管多個 Bufferpool 的 hit ratio：
#       "db2_bufferpool_hit_ratio{bufferpool_name=~\"IBMDEFAULT.*|BP_USER.*\"}": "0.90"
#       # 單一 Bufferpool 精確匹配：
#       "db2_bufferpool_hit_ratio{bufferpool_name=\"BP_TEMP\"}": "disable"
#       # Tablespace 維度 — 多個 Tablespace Regex 匹配：
#       "db2_tablespace_used_percent{tablespace_name=~\"USERSPACE.*|SYSTOOLSPACE\"}": "80"
# ============================================================
groups:
  # -------------------------------------------------------
  # Normalization: DB2 metrics
  # -------------------------------------------------------
  - name: db2-normalization
    interval: 15s
    rules:
      # Active connections
      - record: tenant:db2_connections_active:max
        expr: max by(tenant) (db2_connections_active)

      # Bufferpool hit ratio (key dimensional metric)
      - record: tenant:db2_bufferpool_hit_ratio:min
        expr: min by(tenant) (db2_bufferpool_hit_ratio)

      # Transaction log usage percentage
      - record: tenant:db2_log_usage_percent:max
        expr: max by(tenant) (db2_log_usage_percent)

      # Deadlock rate
      - record: tenant:db2_deadlocks:rate5m
        expr: sum by(tenant) (rate(db2_deadlocks_total[5m]))

      # Tablespace usage percentage
      - record: tenant:db2_tablespace_used_percent:max
        expr: max by(tenant) (db2_tablespace_used_percent)

      # Lock wait accrual RATE — seconds of lock wait accrued PER SECOND, averaged
      # over a 5m window. ⚠️ NOT "seconds per 5m window": rate() divides by the
      # window, so the unit is s/s (dimensionless — 1.0 means one second of waiting
      # accrues every second, i.e. one connection blocked full-time). The old comment
      # said "per 5m window", which is the same number scaled by 300 — an operator
      # who sized the threshold from it would set a value 300x too high and the alert
      # would never fire. This became load-bearing once the threshold key below made
      # it a knob operators actually fill in.
      # Aggregation note: sum by(tenant) ADDS across DB2 instances, so the threshold's
      # meaning scales with instance count (same convention as db2_deadlocks:rate5m).
      - record: tenant:db2_lock_wait_time:rate5m
        expr: sum by(tenant) (rate(db2_lock_wait_time_seconds_total[5m]))

      # Sort overflow ratio — RATE ratio, NOT lifetime-cumulative ratio (#1181).
      # db2_sort_overflows / db2_total_sorts are both CUMULATIVE counters. Dividing
      # them raw yields the all-time overflow fraction, which progressively
      # desensitises as the instance ages: on a long-running database a severe
      # recent episode (say 50% of sorts overflowing for an hour) is diluted by the
      # lifetime denominator and may never cross the threshold. Taking rate() of
      # both over a common window keeps the ratio scoped to recent behaviour.
      # The ratio itself is window-length-independent (numerator and denominator
      # scale together), so the 0.05 threshold semantics are unchanged.
      - record: tenant:db2_sort_overflow_ratio:avg
        expr: |
          sum by(tenant) (rate(db2_sort_overflows[5m]))
          / (sum by(tenant) (rate(db2_total_sorts[5m])) > 0)

  # -------------------------------------------------------
  # Threshold normalization: DB2
  # -------------------------------------------------------
  - name: db2-threshold-normalization
    interval: 15s
    rules:
      - record: tenant:alert_threshold:db2_connections_active
        expr: max by(tenant) (user_threshold{component="db2", metric="connections_active", severity="warning"})

      - record: tenant:alert_threshold:db2_bufferpool_hit_ratio
        expr: max by(tenant) (user_threshold{component="db2", metric="bufferpool_hit_ratio", severity="warning"})

      - record: tenant:alert_threshold:db2_log_usage_percent
        expr: max by(tenant) (user_threshold{component="db2", metric="log_usage_percent", severity="warning"})

      - record: tenant:alert_threshold:db2_deadlock_rate
        expr: max by(tenant) (user_threshold{component="db2", metric="deadlock_rate", severity="warning"})

      - record: tenant:alert_threshold:db2_tablespace_used_percent
        expr: max by(tenant) (user_threshold{component="db2", metric="tablespace_used_percent", severity="warning"})

      - record: tenant:alert_threshold:db2_lock_wait_time
        expr: max by(tenant) (user_threshold{component="db2", metric="lock_wait_time", severity="warning"})

  # -------------------------------------------------------
  # Alert Rules: DB2
  # -------------------------------------------------------
  - name: db2-alerts
    rules:
      - alert: DB2DatabaseDown
        expr: db2_up == 0
        for: 15s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 instance {{ $labels.instance }} is DOWN"
          summary_zh: "DB2 實例 {{ $labels.instance }} 已關閉"
          description: "db2_up=0 for 15s on {{ $labels.instance }}"
          description_zh: "db2_up=0，持續 15 秒，實例：{{ $labels.instance }}"

      - alert: DB2HighConnections
        expr: |
          (
            (
              (
                tenant:db2_connections_active:max
                > on(tenant) group_left
                tenant:alert_threshold:db2_connections_active
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:db2_connections_active:max
                > on(tenant) group_left
                tenant:alert_threshold:db2_connections_active
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 5m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 high active connections on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 上 DB2 連線數過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 connection usage high — pool sizing review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 連線使用率過高 — pool 大小調整審查"
          description: "{{ $value | printf \"%.0f\" }} active connections"
          description_zh: "{{ $value | printf \"%.0f\" }} 個活動連線"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      - alert: DB2LowBufferpoolHitRatio
        expr: |
          (
            (
              (
                tenant:db2_bufferpool_hit_ratio:min
                < on(tenant) group_left
                tenant:alert_threshold:db2_bufferpool_hit_ratio
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:db2_bufferpool_hit_ratio:min
                < on(tenant) group_left
                tenant:alert_threshold:db2_bufferpool_hit_ratio
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 10m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 low bufferpool hit ratio on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 上 DB2 bufferpool 命中率偏低"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 bufferpool hit ratio low — memory tuning review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 bufferpool 命中率偏低 — 記憶體調優審查"
          description: "Hit ratio: {{ $value | printf \"%.4f\" }} — check bufferpool sizing"
          description_zh: "命中率：{{ $value | printf \"%.4f\" }} — 檢查 bufferpool 大小調整"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      - alert: DB2HighLogUsage
        expr: |
          (
            (
              (
                tenant:db2_log_usage_percent:max
                > on(tenant) group_left
                tenant:alert_threshold:db2_log_usage_percent
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:db2_log_usage_percent:max
                > on(tenant) group_left
                tenant:alert_threshold:db2_log_usage_percent
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 5m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 high transaction log usage on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 上 DB2 交易日誌使用率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 transaction log usage high — log space review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 交易日誌使用率過高 — 日誌空間審查"
          description: "Log usage: {{ $value | printf \"%.1f\" }}%"
          description_zh: "日誌使用率：{{ $value | printf \"%.1f\" }}%"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      - alert: DB2HighDeadlockRate
        expr: |
          (
            (
              (
                tenant:db2_deadlocks:rate5m
                > on(tenant) group_left
                tenant:alert_threshold:db2_deadlock_rate
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:db2_deadlocks:rate5m
                > on(tenant) group_left
                tenant:alert_threshold:db2_deadlock_rate
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 5m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 high deadlock rate on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 上 DB2 死鎖率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 deadlock rate elevated — application contention review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 死鎖率升高 — 應用程式爭用審查"
          description: "{{ $value | printf \"%.1f\" }} deadlocks/sec"
          description_zh: "{{ $value | printf \"%.1f\" }} 個死鎖/秒"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      - alert: DB2TablespaceAlmostFull
        expr: |
          (
            (
              (
                tenant:db2_tablespace_used_percent:max
                > on(tenant) group_left
                tenant:alert_threshold:db2_tablespace_used_percent
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:db2_tablespace_used_percent:max
                > on(tenant) group_left
                tenant:alert_threshold:db2_tablespace_used_percent
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 5m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 tablespace nearing capacity on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 上 DB2 tablespace 即將滿容"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 tablespace nearing capacity — storage review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 tablespace 即將滿容 — 儲存審查"
          description: "Tablespace usage: {{ $value | printf \"%.1f\" }}%"
          description_zh: "Tablespace 使用率：{{ $value | printf \"%.1f\" }}%"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Lock wait contention. The `tenant:db2_lock_wait_time:rate5m` recording rule
      # shipped WITHOUT any consumer — no threshold normalization, no alert — so a real
      # lock-contention incident produced a populated series that paged nobody. Two
      # independent blind-written reference waveforms both reproduced the miss.
      # `for: 5m` matches DB2HighDeadlockRate: both are rate() over a cumulative
      # contention counter (as opposed to the 10m efficiency-ratio gauges), and the
      # rate5m window already absorbs short lock convoys, so 5m means ~10m of
      # sustained contention before anyone is paged.
      - alert: DB2HighLockWaitTime
        expr: |
          (
            (
              (
                tenant:db2_lock_wait_time:rate5m
                > on(tenant) group_left
                tenant:alert_threshold:db2_lock_wait_time
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                tenant:db2_lock_wait_time:rate5m
                > on(tenant) group_left
                tenant:alert_threshold:db2_lock_wait_time
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 5m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 high lock wait time on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 上 DB2 鎖等待時間過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 lock wait time high — lock contention review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 鎖等待時間過高 — 鎖爭用審查"
          description: "{{ $value | printf \"%.1f\" }}s of lock wait accrued per second"
          description_zh: "每秒累積 {{ $value | printf \"%.1f\" }} 秒的鎖等待"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      - alert: DB2HighSortOverflow
        expr: |
          (
            (
              tenant:db2_sort_overflow_ratio:avg > 0.05
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              tenant:db2_sort_overflow_ratio:avg > 0.05
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 10m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "DB2 high sort overflow ratio on {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 上 DB2 sort overflow 比率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: DB2 sort overflow ratio high — SORTHEAP tuning review"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}：DB2 sort overflow 比率過高 — SORTHEAP 調優審查"
          description: "Sort overflow ratio: {{ $value | printf \"%.2f\" }} — consider increasing SORTHEAP"
          description_zh: "Sort overflow 比率：{{ $value | printf \"%.2f\" }} — 考慮增加 SORTHEAP"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
