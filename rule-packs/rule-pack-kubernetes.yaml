# ============================================================
# Rule Pack: Kubernetes (cAdvisor + kube-state-metrics)
# 預設啟用 — 涵蓋容器 CPU/Memory 弱環節偵測 + Pod 狀態異常
#
# 需要的 exporter:
#   - kubelet cAdvisor (內建)
#   - kube-state-metrics (https://github.com/kubernetes/kube-state-metrics)
#
# 對應的 threshold-exporter defaults:
#   container_cpu: 80
#   container_memory: 85
#
# 對應的 state_filters:
#   container_crashloop:
#     reasons: ["CrashLoopBackOff"]
#     severity: "critical"
#   container_imagepull:
#     reasons: ["ImagePullBackOff", "InvalidImageName"]
#     severity: "warning"
# ============================================================
groups:
  # -------------------------------------------------------
  # Normalization: Container resource metrics
  # -------------------------------------------------------
  - name: kubernetes-container-normalization
    interval: 15s
    rules:
      # Container CPU usage as % of limit.
      # ADR-024 (0a) version injection: compute the pure percentage first, then
      # join kube_pod_labels ONCE at the outermost level to attach `version`
      # (from app.kubernetes.io/version). Joining after the division (vs on the
      # numerator/denominator separately) halves the join work and avoids a
      # rolling-update instant where numerator/denominator carry mismatched
      # versions and produce NaN. Pods without the label get no `version` (→ "")
      # which the normalize layer maps to "default".
      # ⛔ DEPLOYMENT PREREQUISITE (proven on real kind cluster, test/rulepack-e2e/):
      # kube-state-metrics emits NO `kube_pod_labels` samples by default — the
      # `app.kubernetes.io/version` label only appears as `label_app_kubernetes_io_version`
      # when KSM runs with `--metric-labels-allowlist=pods=[app.kubernetes.io/version]`
      # (see k8s/03-monitoring/deployment-kube-state-metrics.yaml). WITHOUT it this
      # join matches nothing → every pod silently resolves to version="default" and
      # version-specific thresholds never apply. The VersionAwareThresholdInert
      # sentinel (below) detects this misconfiguration at runtime.
      - record: tenant:container_cpu_percent:by_container
        expr: |
          label_replace(
            (
              (
                sum by(namespace, pod, container) (
                  rate(container_cpu_usage_seconds_total{namespace=~"db-.+", container!="", container!="POD"}[5m])
                )
                /
                sum by(namespace, pod, container) (
                  kube_pod_container_resource_limits{resource="cpu", namespace=~"db-.+"}
                )
                * 100
              )
              * on(namespace, pod) group_left(version)
                label_replace(
                  kube_pod_labels{namespace=~"db-.+"},
                  "version", "$1", "label_app_kubernetes_io_version", "(.+)"
                )
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

      # Limitless-pod CPU% via NODE-ALLOCATABLE (#944 PR-2b): a pod WITHOUT a cpu limit
      # has no %-of-limit denominator (the rule above yields NOTHING for it), so
      # PodContainerHighCPU was blind. A limitless container's REAL ceiling is the NODE it
      # runs on — so measure the pod's UNBOUNDED-container cpu usage as a % of the node's
      # allocatable cpu (USE-method saturation: "is this pod monopolising its node / starving
      # neighbours"). Reuses the `container_cpu` threshold (80) — % of the EFFECTIVE ceiling
      # (limit if set, else node). Scoped PER CONTAINER (`unless on(namespace, pod, container)`),
      # NOT per pod: a MIXED pod (limited sidecar + unlimited db) keeps %-of-limit for its
      # bounded containers AND this node-share for its unbounded ones, so the unlimited db
      # container is never dropped just because a sidecar has a limit (#961 CodeRabbit).
      # Why node-allocatable, NOT %-of-request: a cpu request is CFS *shares*
      # (a scheduling floor), not a usage ceiling — a Burstable pod is MEANT to burst above
      # its request when the node is idle, so %-of-request would false-fire on correct K8s
      # behaviour (external review). The pod→node join reuses the proven kube_pod_info{node}
      # pattern (see tenant:node_owner:info below). Pre-aggregate allocatable `max by(node)`
      # so a duplicate per-node series can't break the group_right cardinality.
      # ⛔ KSM prerequisites: kube_pod_labels allowlist (version, as above) +
      # kube_node_status_allocatable + kube_pod_info (both core KSM, not allowlist-gated).
      - record: tenant:pod_cpu_node_share:limitless
        expr: |
          label_replace(
            (
              (
                (
                  sum by(namespace, pod) (
                    sum by(namespace, pod, container) (
                      rate(container_cpu_usage_seconds_total{namespace=~"db-.+", container!="", container!="POD"}[5m])
                    )
                    unless on(namespace, pod, container)
                    sum by(namespace, pod, container) (
                      kube_pod_container_resource_limits{resource="cpu", namespace=~"db-.+"}
                    )
                  )
                )
                /
                max by(namespace, pod) (
                  max by(node) (kube_node_status_allocatable{resource="cpu"})
                  * on(node) group_right()
                    kube_pod_info{namespace=~"db-.+"}
                )
                * 100
              )
              * on(namespace, pod) group_left(version)
                label_replace(
                  kube_pod_labels{namespace=~"db-.+"},
                  "version", "$1", "label_app_kubernetes_io_version", "(.+)"
                )
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

      # Container memory usage as % of limit.
      # ADR-024 (0a) version injection: join kube_pod_labels at the outermost
      # level to attach `version` (from app.kubernetes.io/version) — mirrors the
      # CPU rule above (same KSM deployment prerequisite applies).
      - record: tenant:container_memory_percent:by_container
        expr: |
          label_replace(
            (
              (
                sum by(namespace, pod, container) (
                  container_memory_working_set_bytes{namespace=~"db-.+", container!="", container!="POD"}
                )
                /
                sum by(namespace, pod, container) (
                  kube_pod_container_resource_limits{resource="memory", namespace=~"db-.+"}
                )
                * 100
              )
              * on(namespace, pod) group_left(version)
                label_replace(
                  kube_pod_labels{namespace=~"db-.+"},
                  "version", "$1", "label_app_kubernetes_io_version", "(.+)"
                )
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

      # Weakest link: MAX across containers per pod.
      # ADR-024 (0b): `version` is carried through every aggregation layer so
      # the per-version dimension survives to the alert join (CPU and memory).
      # CPU% per pod: bounded containers → %-of-limit; unbounded containers → %-of-node-
      # allocatable (#944 PR-2b). Both are `or`-unioned then MAX'd INSIDE one aggregation, so a
      # MIXED pod contributes BOTH signals and takes its worst (a bounded container's %-of-limit
      # vs the unbounded containers' %-of-node). `max(A) or B` would instead DROP node-share for
      # any pod that already has a %-of-limit series, hiding a limitless db container behind a
      # limited sidecar (#961 CodeRabbit). Every container is covered by exactly one lens, so
      # EVERY scheduled db pod has a CPU% → PodContainerHighCPU is never blind, even for mixed
      # pods (this is what retired the ContainerCpuSignalAbsent sentinel).
      - record: tenant:pod_weakest_cpu_percent:max
        expr: |
          max by(tenant, pod, version) (
            tenant:container_cpu_percent:by_container
            or
            tenant:pod_cpu_node_share:limitless
          )

      - record: tenant:pod_weakest_memory_percent:max
        expr: max by(tenant, pod, version) (tenant:container_memory_percent:by_container)

      # CFS throttle ratio (#944 PR-2c): share of a container's ACTIVE 100ms CFS periods
      # in which the kernel throttled it — the USE-method saturation axis %-of-limit
      # utilisation cannot see (a bursty container can be choked hard at moderate avg
      # usage). NOT "share of wall time" and NOT "% of CPU time lost": rate(thr)/rate(per)
      # is DUTY-CYCLE INVARIANT (numerator and denominator share the window, dilution
      # cancels), so an always-active DB throttled 1.5s of every 15s reads ~10% while a
      # mostly-idle sidecar with the same absolute choking reads ~90%. Denominator guard
      # `> 0` is LOAD-BEARING: frozen counters (terminating pod) yield NaN and a
      # throttled-while-periods-frozen edge yields +Inf — both POISON downstream max()
      # (verified on promtool 2.53.2, #944 ledger) — the filter drops those series instead.
      # This record is the RAW per-container signal (dashboards / drill-down see
      # everything); the low-signal filtering happens one step down in pod_weakest.
      # Only containers WITH a cpu limit emit the cfs pair (scrape keep-list, #974).
      # ⚠️ Known limitation (shared with the CPU%/memory family): the kube_pod_labels
      # version join drops a pod when KSM is down/lagging → series absent, alert blind;
      # correlated with the usage family (same join), not a new failure mode.
      - record: tenant:container_cpu_throttle_percent:by_container
        expr: |
          label_replace(
            (
              (
                sum by(namespace, pod, container) (
                  rate(container_cpu_cfs_throttled_periods_total{namespace=~"db-.+", container!="", container!="POD"}[5m])
                )
                /
                (
                  sum by(namespace, pod, container) (
                    rate(container_cpu_cfs_periods_total{namespace=~"db-.+", container!="", container!="POD"}[5m])
                  ) > 0
                )
                * 100
              )
              * on(namespace, pod) group_left(version)
                label_replace(
                  kube_pod_labels{namespace=~"db-.+"},
                  "version", "$1", "label_app_kubernetes_io_version", "(.+)"
                )
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

      # Weakest-link throttle per pod, QUALIFIED by a working-hard floor: a container
      # only counts toward the pod's throttle signal if it is also using ≥20% of its
      # cpu limit. This one structural condition kills BOTH adversarial-review killers
      # (#944 ledger): (a) tiny-limit mostly-idle sidecars (Go runtime bursts on a
      # 0.1-0.5 core limit read 60-90% ratio at ~10% usage — the well-known
      # kubernetes-mixin CPUThrottlingHigh false-positive class) would otherwise
      # permanently saturate the tenant-level max and hide the real db container;
      # (b) low-denominator noise (1 throttled of 3 active periods = 33% from a single
      # GC tick, usage ≈ 0). Derivation: during a throttled period usage == quota, so an
      # always-active container with throttle ratio f has usage ≥ f% of limit — genuine
      # chronic throttling (≥25%) always clears the 20 floor. Trade-off (accepted,
      # #944 ledger): intermittent workloads (duty cycle < ~0.8) in the marginal band
      # may be filtered — revisit with soak data. The floor is a fixed structural guard
      # (an FP filter), deliberately NOT a tenant-tunable threshold key.
      - record: tenant:pod_weakest_cpu_throttle_percent:max
        expr: |
          max by(tenant, pod, version) (
            tenant:container_cpu_throttle_percent:by_container
            and on(namespace, pod, container)
            (tenant:container_cpu_percent:by_container > 20)
          )

  # -------------------------------------------------------
  # Normalization: Pod state matching (kube-state-metrics)
  # -------------------------------------------------------
  - name: kubernetes-state-matching
    interval: 15s
    rules:
      - record: tenant:container_waiting_reason:count
        expr: |
          label_replace(
            count by(namespace, reason) (
              kube_pod_container_status_waiting_reason{namespace=~"db-.+"} > 0
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

  # -------------------------------------------------------
  # Threshold normalization: Container resources
  # -------------------------------------------------------
  - name: kubernetes-threshold-normalization
    interval: 15s
    rules:
      # ADR-024 version-aware threshold (CPU pilot): keep BOTH `version` and
      # `severity` dimensions (a tenant may declare `container_cpu{version="v2"}:
      # "60:critical"`), normalize empty version → "default". `max` (not `sum`)
      # is the HA-dedup-safe aggregator (high-availability.md §4.3).
      - record: tenant_version:alert_threshold:container_cpu
        expr: |
          label_replace(
            max by(tenant, version, severity) (
              user_threshold{component="container", metric="cpu"}
            ),
            "version", "default", "version", "^$"
          )

      # App-metric side normalize: collapse to (tenant, version), empty → default.
      - record: tenant_version:pod_weakest_cpu_percent:vlabeled
        expr: |
          label_replace(
            max by(tenant, version) (tenant:pod_weakest_cpu_percent:max),
            "version", "default", "version", "^$"
          )

      # ADR-024 version-aware threshold (memory): mirrors the CPU pilot — keep
      # BOTH version and severity dimensions, normalize empty version → default.
      - record: tenant_version:alert_threshold:container_memory
        expr: |
          label_replace(
            max by(tenant, version, severity) (
              user_threshold{component="container", metric="memory"}
            ),
            "version", "default", "version", "^$"
          )

      - record: tenant_version:pod_weakest_memory_percent:vlabeled
        expr: |
          label_replace(
            max by(tenant, version) (tenant:pod_weakest_memory_percent:max),
            "version", "default", "version", "^$"
          )

      # CFS throttle (#944 PR-2c): same normalize pair as cpu/memory above. NB
      # `cpu_throttle` is NOT in the version pilot allowlist (resolve.go
      # pilotVersionMetrics = container/cpu + container/memory only) — tenants cannot
      # legally set per-version throttle thresholds; the exact-match branch below is
      # therefore inert by design and every versioned metric takes the version="default"
      # FALLBACK branch. Kept in the Route-2 shape anyway so the pack stays uniform and
      # a future pilot expansion is a one-line allowlist change, not a rule rewrite.
      - record: tenant_version:alert_threshold:container_cpu_throttle
        expr: |
          label_replace(
            max by(tenant, version, severity) (
              user_threshold{component="container", metric="cpu_throttle"}
            ),
            "version", "default", "version", "^$"
          )

      - record: tenant_version:pod_weakest_cpu_throttle_percent:vlabeled
        expr: |
          label_replace(
            max by(tenant, version) (tenant:pod_weakest_cpu_throttle_percent:max),
            "version", "default", "version", "^$"
          )

      # ADR-024 PR3-pre-3: core firing vectors (threshold-cross + maintenance
      # suppression) WITHOUT metadata enrichment. The alert rules below join
      # tenant_metadata_info via a left-outer-join (`or`/`unless`) so a tenant
      # with metrics but no metadata config (onboarding vacuum) still fires —
      # the inner-join `* tenant_metadata_info` alone would silently drop it.
      # ADR-024 Route 2: version-aware exact-or-fallback core, split PER SEVERITY.
      # Fixing severity makes the threshold RHS a per-(tenant,version) singleton →
      # the exact branch is one-to-one and the fallback is many(versions)-to-one;
      # this avoids the version×severity many-to-many cardinality crash that a
      # single `group_left(severity)` rule would hit (ADR-024 Pass-3). The
      # fallback's `group_left()` keeps the metric's REAL version (v2/v3…) for
      # on-call visibility even when it falls back to the default threshold.
      - record: rule_pack_kubernetes:pod_container_high_cpu_warning:core
        expr: |
          (
            (
              tenant_version:pod_weakest_cpu_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_cpu{severity="warning"}
            )
            or
            (
              (
                tenant_version:pod_weakest_cpu_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_cpu{severity="warning"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_cpu{version="default", severity="warning"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      - record: rule_pack_kubernetes:pod_container_high_cpu_critical:core
        expr: |
          (
            (
              tenant_version:pod_weakest_cpu_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_cpu{severity="critical"}
            )
            or
            (
              (
                tenant_version:pod_weakest_cpu_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_cpu{severity="critical"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_cpu{version="default", severity="critical"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      # ADR-024 Route 2: version-aware exact-or-fallback memory core, split per
      # severity — mirrors the CPU cores above (same many-to-many cardinality
      # avoidance + group_left() preserving the metric's REAL version on fallback).
      - record: rule_pack_kubernetes:pod_container_high_memory_warning:core
        expr: |
          (
            (
              tenant_version:pod_weakest_memory_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_memory{severity="warning"}
            )
            or
            (
              (
                tenant_version:pod_weakest_memory_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_memory{severity="warning"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_memory{version="default", severity="warning"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      - record: rule_pack_kubernetes:pod_container_high_memory_critical:core
        expr: |
          (
            (
              tenant_version:pod_weakest_memory_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_memory{severity="critical"}
            )
            or
            (
              (
                tenant_version:pod_weakest_memory_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_memory{severity="critical"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_memory{version="default", severity="critical"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      # CFS throttle cores (#944 PR-2c) — same Route-2 shape (exact-or-fallback per
      # severity + maintenance unless); see the cpu_throttle threshold record above
      # for why the exact branch is currently inert (version pilot allowlist).
      - record: rule_pack_kubernetes:pod_cpu_throttled_warning:core
        expr: |
          (
            (
              tenant_version:pod_weakest_cpu_throttle_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_cpu_throttle{severity="warning"}
            )
            or
            (
              (
                tenant_version:pod_weakest_cpu_throttle_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_cpu_throttle{severity="warning"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_cpu_throttle{version="default", severity="warning"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      - record: rule_pack_kubernetes:pod_cpu_throttled_critical:core
        expr: |
          (
            (
              tenant_version:pod_weakest_cpu_throttle_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_cpu_throttle{severity="critical"}
            )
            or
            (
              (
                tenant_version:pod_weakest_cpu_throttle_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_cpu_throttle{severity="critical"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_cpu_throttle{version="default", severity="critical"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

  # -------------------------------------------------------
  # Alert Rules: Container resources (Weakest Link)
  # -------------------------------------------------------
  - name: kubernetes-container-alerts
    rules:
      # ADR-024 Route 2 (warning) + PR3-pre-3 left-outer-join enrichment.
      # The version-aware core carries the metric's REAL `version` label, so the
      # firing alert tells on-call exactly which app version is in trouble.
      - alert: PodContainerHighCPU
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_cpu_warning:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_cpu_warning:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High container CPU in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器 CPU 使用率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container CPU pressure — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器 CPU 壓力過高 — 請評估資源限制"
          description: "Max container CPU usage: {{ $value | printf \"%.1f\" }}% (threshold exceeded)"
          description_zh: "最大容器 CPU 使用率: {{ $value | printf \"%.1f\" }}% (超過閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Critical mirror (ADR-024 Route 2: distinct alertname per severity to
      # match the platform convention; warning's alertname is preserved above).
      - alert: PodContainerHighCPUCritical
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_cpu_critical:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_cpu_critical:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "CRITICAL container CPU in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器 CPU 使用率達臨界"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container CPU CRITICAL — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器 CPU 達臨界 — 請評估資源限制"
          description: "Max container CPU usage: {{ $value | printf \"%.1f\" }}% (critical threshold exceeded)"
          description_zh: "最大容器 CPU 使用率: {{ $value | printf \"%.1f\" }}% (超過臨界閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # ADR-024 Route 2 (warning) — version-aware memory core carries the metric's
      # REAL version so on-call sees which app version is in trouble.
      - alert: PodContainerHighMemory
        # Left-outer-join enrichment (ADR-024 PR3-pre-3) — see PodContainerHighCPU.
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_memory_warning:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_memory_warning:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High container memory in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器記憶體使用率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container memory pressure — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器記憶體壓力過高 — 請評估資源限制"
          description: "Max container memory usage: {{ $value | printf \"%.1f\" }}% (threshold exceeded)"
          description_zh: "最大容器記憶體使用率: {{ $value | printf \"%.1f\" }}% (超過閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Critical mirror (ADR-024 Route 2: distinct alertname per severity).
      - alert: PodContainerHighMemoryCritical
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_memory_critical:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_memory_critical:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "CRITICAL container memory in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器記憶體使用率達臨界"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container memory CRITICAL — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器記憶體達臨界 — 請評估資源限制"
          description: "Max container memory usage: {{ $value | printf \"%.1f\" }}% (critical threshold exceeded)"
          description_zh: "最大容器記憶體使用率: {{ $value | printf \"%.1f\" }}% (超過臨界閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # CFS throttle (#944 PR-2c): the CHRONIC-choking sibling of PodContainerHighCPU —
      # different root cause (kernel quota enforcement vs high usage), different
      # remediation (raise the container's cpu limit / spread the burst), hence a
      # SEPARATE alert + threshold key instead of folding into the usage pipeline
      # (max(usage%, throttle%) against one threshold cannot serve two scales — #944
      # ledger). `for: 15m` deliberately differs from the family's 60s: the ratio is a
      # 5m-memory signal (any burst elevates it for a full window, a 60s debounce is
      # decorative) — 15m ≈ kubernetes-mixin CPUThrottlingHigh, requiring the choking
      # to persist across windows. $value = % of ACTIVE 100ms CFS periods throttled
      # (duty-cycle invariant; NOT % of CPU time lost).
      - alert: PodContainerCPUThrottled
        expr: |
          (
            rule_pack_kubernetes:pod_cpu_throttled_warning:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_cpu_throttled_warning:core
            unless on(tenant) tenant_metadata_info
          )
        for: 15m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "Chronic CPU throttling in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器 CPU 遭核心持續掐頸"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: sustained CFS throttling — raise the container cpu limit or spread the burst; drill down via tenant:container_cpu_throttle_percent:by_container"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: CFS 持續掐頸 — 請提高容器 cpu limit 或攤平突發負載；以 tenant:container_cpu_throttle_percent:by_container 定位容器"
          description: "{{ $value | printf \"%.1f\" }}% of the container's active CFS periods were throttled (sustained; usage may look fine — this is quota enforcement, see also PodContainerHighCPU)"
          description_zh: "容器活躍 CFS 週期中有 {{ $value | printf \"%.1f\" }}% 被核心限流（持續發生；平均使用率可能看似正常 — 這是配額壓制，另見 PodContainerHighCPU）"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Critical mirror (distinct alertname per severity, platform convention). The
      # critical tier is tenant-opt-in: `container_cpu_throttle_critical` in the tenant
      # YAML (no platform default; suggested starting point 50).
      - alert: PodContainerCPUThrottledCritical
        expr: |
          (
            rule_pack_kubernetes:pod_cpu_throttled_critical:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_cpu_throttled_critical:core
            unless on(tenant) tenant_metadata_info
          )
        for: 15m
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "CRITICAL CPU throttling in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器 CPU 掐頸達臨界"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: CFS throttling CRITICAL — raise the container cpu limit now; drill down via tenant:container_cpu_throttle_percent:by_container"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: CFS 掐頸達臨界 — 請立即提高容器 cpu limit；以 tenant:container_cpu_throttle_percent:by_container 定位容器"
          description: "{{ $value | printf \"%.1f\" }}% of the container's active CFS periods were throttled (critical threshold exceeded; quota enforcement, see also PodContainerHighCPU)"
          description_zh: "容器活躍 CFS 週期中有 {{ $value | printf \"%.1f\" }}% 被核心限流（超過臨界閾值；配額壓制，另見 PodContainerHighCPU）"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
  # -------------------------------------------------------
  # Alert Rules: Pod state alerts (State/String Matching)
  # -------------------------------------------------------
  - name: kubernetes-pod-state-alerts
    rules:
      - alert: ContainerCrashLoop
        expr: |
          (
            (
              (
                (
                  tenant:container_waiting_reason:count{reason="CrashLoopBackOff"}
                  * on(tenant) group_left
                  user_state_filter{filter="container_crashloop"}
                ) > 0
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                (
                  tenant:container_waiting_reason:count{reason="CrashLoopBackOff"}
                  * on(tenant) group_left
                  user_state_filter{filter="container_crashloop"}
                ) > 0
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 30s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
