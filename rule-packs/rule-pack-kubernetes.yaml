# ============================================================
# Rule Pack: Kubernetes (cAdvisor + kube-state-metrics)
# 預設啟用 — 涵蓋容器 CPU/Memory 弱環節偵測 + Pod 狀態異常
#
# 需要的 exporter:
#   - kubelet cAdvisor (內建)
#   - kube-state-metrics (https://github.com/kubernetes/kube-state-metrics)
#
# 對應的 threshold-exporter defaults:
#   container_cpu: 80
#   container_memory: 85
#
# 對應的 state_filters:
#   container_crashloop:
#     reasons: ["CrashLoopBackOff"]
#     severity: "critical"
#   container_imagepull:
#     reasons: ["ImagePullBackOff", "InvalidImageName"]
#     severity: "warning"
# ============================================================
groups:
  # -------------------------------------------------------
  # Normalization: Container resource metrics
  # -------------------------------------------------------
  - name: kubernetes-container-normalization
    interval: 15s
    rules:
      # Container CPU usage as % of limit.
      # ADR-024 (0a) version injection: compute the pure percentage first, then
      # join kube_pod_labels ONCE at the outermost level to attach `version`
      # (from app.kubernetes.io/version). Joining after the division (vs on the
      # numerator/denominator separately) halves the join work and avoids a
      # rolling-update instant where numerator/denominator carry mismatched
      # versions and produce NaN. Pods without the label get no `version` (→ "")
      # which the normalize layer maps to "default".
      # ⛔ DEPLOYMENT PREREQUISITE (proven on real kind cluster, test/rulepack-e2e/):
      # kube-state-metrics emits NO `kube_pod_labels` samples by default — the
      # `app.kubernetes.io/version` label only appears as `label_app_kubernetes_io_version`
      # when KSM runs with `--metric-labels-allowlist=pods=[app.kubernetes.io/version]`
      # (see k8s/03-monitoring/deployment-kube-state-metrics.yaml). WITHOUT it this
      # join matches nothing → every pod silently resolves to version="default" and
      # version-specific thresholds never apply. The VersionAwareThresholdInert
      # sentinel (below) detects this misconfiguration at runtime.
      - record: tenant:container_cpu_percent:by_container
        expr: |
          label_replace(
            (
              (
                sum by(namespace, pod, container) (
                  rate(container_cpu_usage_seconds_total{namespace=~"db-.+", container!="", container!="POD"}[5m])
                )
                /
                sum by(namespace, pod, container) (
                  kube_pod_container_resource_limits{resource="cpu", namespace=~"db-.+"}
                )
                * 100
              )
              * on(namespace, pod) group_left(version)
                label_replace(
                  kube_pod_labels{namespace=~"db-.+"},
                  "version", "$1", "label_app_kubernetes_io_version", "(.+)"
                )
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

      # Container memory usage as % of limit.
      # ADR-024 (0a) version injection: join kube_pod_labels at the outermost
      # level to attach `version` (from app.kubernetes.io/version) — mirrors the
      # CPU rule above (same KSM deployment prerequisite applies).
      - record: tenant:container_memory_percent:by_container
        expr: |
          label_replace(
            (
              (
                sum by(namespace, pod, container) (
                  container_memory_working_set_bytes{namespace=~"db-.+", container!="", container!="POD"}
                )
                /
                sum by(namespace, pod, container) (
                  kube_pod_container_resource_limits{resource="memory", namespace=~"db-.+"}
                )
                * 100
              )
              * on(namespace, pod) group_left(version)
                label_replace(
                  kube_pod_labels{namespace=~"db-.+"},
                  "version", "$1", "label_app_kubernetes_io_version", "(.+)"
                )
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

      # Weakest link: MAX across containers per pod.
      # ADR-024 (0b): `version` is carried through every aggregation layer so
      # the per-version dimension survives to the alert join (CPU and memory).
      - record: tenant:pod_weakest_cpu_percent:max
        expr: max by(tenant, pod, version) (tenant:container_cpu_percent:by_container)

      - record: tenant:pod_weakest_memory_percent:max
        expr: max by(tenant, pod, version) (tenant:container_memory_percent:by_container)

  # -------------------------------------------------------
  # Normalization: Pod state matching (kube-state-metrics)
  # -------------------------------------------------------
  - name: kubernetes-state-matching
    interval: 15s
    rules:
      - record: tenant:container_waiting_reason:count
        expr: |
          label_replace(
            count by(namespace, reason) (
              kube_pod_container_status_waiting_reason{namespace=~"db-.+"} > 0
            ),
            "tenant", "$1", "namespace", "(.*)"
          )

  # -------------------------------------------------------
  # Threshold normalization: Container resources
  # -------------------------------------------------------
  - name: kubernetes-threshold-normalization
    interval: 15s
    rules:
      # ADR-024 version-aware threshold (CPU pilot): keep BOTH `version` and
      # `severity` dimensions (a tenant may declare `container_cpu{version="v2"}:
      # "60:critical"`), normalize empty version → "default". `max` (not `sum`)
      # is the HA-dedup-safe aggregator (high-availability.md §4.3).
      - record: tenant_version:alert_threshold:container_cpu
        expr: |
          label_replace(
            max by(tenant, version, severity) (
              user_threshold{component="container", metric="cpu"}
            ),
            "version", "default", "version", "^$"
          )

      # App-metric side normalize: collapse to (tenant, version), empty → default.
      - record: tenant_version:pod_weakest_cpu_percent:vlabeled
        expr: |
          label_replace(
            max by(tenant, version) (tenant:pod_weakest_cpu_percent:max),
            "version", "default", "version", "^$"
          )

      # ADR-024 version-aware threshold (memory): mirrors the CPU pilot — keep
      # BOTH version and severity dimensions, normalize empty version → default.
      - record: tenant_version:alert_threshold:container_memory
        expr: |
          label_replace(
            max by(tenant, version, severity) (
              user_threshold{component="container", metric="memory"}
            ),
            "version", "default", "version", "^$"
          )

      - record: tenant_version:pod_weakest_memory_percent:vlabeled
        expr: |
          label_replace(
            max by(tenant, version) (tenant:pod_weakest_memory_percent:max),
            "version", "default", "version", "^$"
          )

      # ADR-024 PR3-pre-3: core firing vectors (threshold-cross + maintenance
      # suppression) WITHOUT metadata enrichment. The alert rules below join
      # tenant_metadata_info via a left-outer-join (`or`/`unless`) so a tenant
      # with metrics but no metadata config (onboarding vacuum) still fires —
      # the inner-join `* tenant_metadata_info` alone would silently drop it.
      # ADR-024 Route 2: version-aware exact-or-fallback core, split PER SEVERITY.
      # Fixing severity makes the threshold RHS a per-(tenant,version) singleton →
      # the exact branch is one-to-one and the fallback is many(versions)-to-one;
      # this avoids the version×severity many-to-many cardinality crash that a
      # single `group_left(severity)` rule would hit (ADR-024 Pass-3). The
      # fallback's `group_left()` keeps the metric's REAL version (v2/v3…) for
      # on-call visibility even when it falls back to the default threshold.
      - record: rule_pack_kubernetes:pod_container_high_cpu_warning:core
        expr: |
          (
            (
              tenant_version:pod_weakest_cpu_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_cpu{severity="warning"}
            )
            or
            (
              (
                tenant_version:pod_weakest_cpu_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_cpu{severity="warning"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_cpu{version="default", severity="warning"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      - record: rule_pack_kubernetes:pod_container_high_cpu_critical:core
        expr: |
          (
            (
              tenant_version:pod_weakest_cpu_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_cpu{severity="critical"}
            )
            or
            (
              (
                tenant_version:pod_weakest_cpu_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_cpu{severity="critical"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_cpu{version="default", severity="critical"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      # ADR-024 Route 2: version-aware exact-or-fallback memory core, split per
      # severity — mirrors the CPU cores above (same many-to-many cardinality
      # avoidance + group_left() preserving the metric's REAL version on fallback).
      - record: rule_pack_kubernetes:pod_container_high_memory_warning:core
        expr: |
          (
            (
              tenant_version:pod_weakest_memory_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_memory{severity="warning"}
            )
            or
            (
              (
                tenant_version:pod_weakest_memory_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_memory{severity="warning"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_memory{version="default", severity="warning"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      - record: rule_pack_kubernetes:pod_container_high_memory_critical:core
        expr: |
          (
            (
              tenant_version:pod_weakest_memory_percent:vlabeled
              > on(tenant, version) group_left()
                tenant_version:alert_threshold:container_memory{severity="critical"}
            )
            or
            (
              (
                tenant_version:pod_weakest_memory_percent:vlabeled
                unless on(tenant, version)
                  tenant_version:alert_threshold:container_memory{severity="critical"}
              )
              > on(tenant) group_left()
                tenant_version:alert_threshold:container_memory{version="default", severity="critical"}
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

  # -------------------------------------------------------
  # Alert Rules: Container resources (Weakest Link)
  # -------------------------------------------------------
  - name: kubernetes-container-alerts
    rules:
      # ADR-024 Route 2 (warning) + PR3-pre-3 left-outer-join enrichment.
      # The version-aware core carries the metric's REAL `version` label, so the
      # firing alert tells on-call exactly which app version is in trouble.
      - alert: PodContainerHighCPU
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_cpu_warning:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_cpu_warning:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High container CPU in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器 CPU 使用率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container CPU pressure — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器 CPU 壓力過高 — 請評估資源限制"
          description: "Max container CPU usage: {{ $value | printf \"%.1f\" }}% (threshold exceeded)"
          description_zh: "最大容器 CPU 使用率: {{ $value | printf \"%.1f\" }}% (超過閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Critical mirror (ADR-024 Route 2: distinct alertname per severity to
      # match the platform convention; warning's alertname is preserved above).
      - alert: PodContainerHighCPUCritical
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_cpu_critical:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_cpu_critical:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "CRITICAL container CPU in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器 CPU 使用率達臨界"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container CPU CRITICAL — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器 CPU 達臨界 — 請評估資源限制"
          description: "Max container CPU usage: {{ $value | printf \"%.1f\" }}% (critical threshold exceeded)"
          description_zh: "最大容器 CPU 使用率: {{ $value | printf \"%.1f\" }}% (超過臨界閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # ADR-024 Route 2 (warning) — version-aware memory core carries the metric's
      # REAL version so on-call sees which app version is in trouble.
      - alert: PodContainerHighMemory
        # Left-outer-join enrichment (ADR-024 PR3-pre-3) — see PodContainerHighCPU.
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_memory_warning:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_memory_warning:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "High container memory in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器記憶體使用率過高"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container memory pressure — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器記憶體壓力過高 — 請評估資源限制"
          description: "Max container memory usage: {{ $value | printf \"%.1f\" }}% (threshold exceeded)"
          description_zh: "最大容器記憶體使用率: {{ $value | printf \"%.1f\" }}% (超過閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      # Critical mirror (ADR-024 Route 2: distinct alertname per severity).
      - alert: PodContainerHighMemoryCritical
        expr: |
          (
            rule_pack_kubernetes:pod_container_high_memory_critical:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:pod_container_high_memory_critical:core
            unless on(tenant) tenant_metadata_info
          )
        for: 60s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "CRITICAL container memory in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 的容器記憶體使用率達臨界"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: container memory CRITICAL — evaluate resource limits"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 容器記憶體達臨界 — 請評估資源限制"
          description: "Max container memory usage: {{ $value | printf \"%.1f\" }}% (critical threshold exceeded)"
          description_zh: "最大容器記憶體使用率: {{ $value | printf \"%.1f\" }}% (超過臨界閾值)"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
  # -------------------------------------------------------
  # Alert Rules: Pod state alerts (State/String Matching)
  # -------------------------------------------------------
  - name: kubernetes-pod-state-alerts
    rules:
      - alert: ContainerCrashLoop
        expr: |
          (
            (
              (
                (
                  tenant:container_waiting_reason:count{reason="CrashLoopBackOff"}
                  * on(tenant) group_left
                  user_state_filter{filter="container_crashloop"}
                ) > 0
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                (
                  tenant:container_waiting_reason:count{reason="CrashLoopBackOff"}
                  * on(tenant) group_left
                  user_state_filter{filter="container_crashloop"}
                ) > 0
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 30s
        labels:
          severity: critical
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "Container crash loop detected in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 偵測到容器崩潰迴圈"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: crash loop detected — check deployment and image health"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 偵測到崩潰迴圈 — 請檢查部署和映像檔案狀態"
          description: "{{ $value }} container(s) in CrashLoopBackOff state"
          description_zh: "{{ $value }} 個容器處於 CrashLoopBackOff 狀態"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
      - alert: ContainerImagePullFailure
        expr: |
          (
            (
              (
                (
                  tenant:container_waiting_reason:count{reason=~"ImagePullBackOff|InvalidImageName"}
                  * on(tenant) group_left
                  user_state_filter{filter="container_imagepull"}
                ) > 0
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            (
              (
                (
                  tenant:container_waiting_reason:count{reason=~"ImagePullBackOff|InvalidImageName"}
                  * on(tenant) group_left
                  user_state_filter{filter="container_imagepull"}
                ) > 0
              )
              unless on(tenant)
              (user_state_filter{filter="maintenance"} == 1)
            )
            unless on(tenant) tenant_metadata_info
          )
        for: 30s
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "Image pull failure detected in {{ $labels.tenant }}"
          summary_zh: "{{ $labels.tenant }} 偵測到映像檔案拉取失敗"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: image pull failing — verify registry and image availability"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 映像檔案拉取失敗 — 請檢查 registry 和映像檔案可用性"
          description: "{{ $value }} container(s) in ImagePullBackOff/InvalidImageName state"
          description_zh: "{{ $value }} 個容器處於 ImagePullBackOff/InvalidImageName 狀態"

          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"

  # ADR-024 silent-failure sentinel — platform-scoped (no tenant label): a KSM
  # misconfiguration is a platform-team concern, not a tenant's. Detects at runtime
  # the inert state proven reachable on a real kind cluster (test/rulepack-e2e/):
  # version-specific thresholds declared BUT kube-state-metrics is not configured to
  # expose pod labels, so the (0a) join matches nothing and every version threshold
  # silently degrades to default.
  #
  # Three legs (all `or vector(0)` → scalar-safe so `and` matches on {}):
  #   1. version-specific thresholds ARE declared (someone wants version-aware), AND
  #   2. tenant pods ARE running (kube_pod_info > 0) — guards the scale-to-zero false
  #      positive: if everything is scaled to 0 there is legitimately nothing to label,
  #      AND
  #   3. KSM emits ZERO `kube_pod_labels` series cluster-wide for tenant namespaces.
  #
  # Why leg 3 counts ALL pod labels (not just version labels): empirically verified on
  # kind — with the allowlist ON, KSM emits a BASE `kube_pod_labels{ns,pod,uid}` series
  # even for pods WITHOUT a version label; with the allowlist OFF it emits NO series at
  # all. So "zero pod-label series while pods run" cleanly isolates "allowlist off" from
  # "allowlist on but no version-labelled pods currently running" (the Gemini scale-to-
  # zero edge — which leg 3 now does NOT false-fire on). KNOWN LIMITATION: an allowlist
  # set WITHOUT app.kubernetes.io/version (a different label only) won't fire this — that
  # rarer partial-misconfig is accepted; the dominant "no allowlist at all" is covered.
  - name: kubernetes-version-aware-sentinel
    rules:
      - alert: VersionAwareThresholdInert
        expr: |
          (count(max by(tenant, version, severity) (user_threshold{component="container", metric="cpu", version=~".+"})) or vector(0)) > 0
          and
          (count(kube_pod_info{namespace=~"db-.+"}) or vector(0)) > 0
          and
          (count(kube_pod_labels{namespace=~"db-.+"}) or vector(0)) == 0
        for: 10m
        labels:
          severity: warning
          # Platform-scoped: the count() expr yields no tenant, so this renders
          # empty (dropped) — same established pattern as *ExporterAbsent sentinels.
          # Present to satisfy custom-rule-policy required_labels (tenant).
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "Version-aware thresholds declared but kube-state-metrics exposes no pod labels — feature inert"
          summary_zh: "已宣告版本專屬閾值，但 kube-state-metrics 未暴露 pod 標籤 — 功能靜默失效"
          description: "{{ $value | printf \"%.0f\" }} version-specific container CPU threshold(s) declared and tenant pods are running, but kube-state-metrics emits no pod labels at all. Set KSM --metric-labels-allowlist=pods=[app.kubernetes.io/version]."
          description_zh: "已宣告 {{ $value | printf \"%.0f\" }} 個版本專屬容器 CPU 閾值且租戶 Pod 正在運行，但 kube-state-metrics 完全未暴露 pod 標籤。請為 KSM 設定 --metric-labels-allowlist=pods=[app.kubernetes.io/version]。"
          # JIT lifecycle hook (ADR-024 docs): this platform-scoped alert deep-links
          # the on-call SRE straight to the KSM-remediation section. ⚠ The anchor
          # `#for-platform-operators-ksm-allowlist-remediation` is a CONTRACT with that
          # English H2 heading in the guide — do NOT rename the heading (the link would
          # rot silently; mkdocs-strict does not validate URLs inside rule-pack YAML).
          runbook_url: "https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/scenarios/version-aware-thresholds.md#for-platform-operators-ksm-allowlist-remediation"

  # ─────────────────────────────────────────────────────────────────────
  # Custom disk-recipe inert sentinel (#692 P0③ W2 / ADR-024 §Addendum).
  # A tenant can declare a disk-fill custom alert (forecast/ratio over
  # kubelet_volume_stats_*), but those series exist only when a CSI driver
  # implements NodeGetVolumeStats AND a kubelet volume-stats scrape job
  # attributes them to `tenant`. If either is missing the recipe compiles +
  # passes promtool but SILENTLY NEVER FIRES (#731 class) — so make it loud: a
  # tenant who DECLARED a disk recipe and HAS running pods, but whose volume-stats
  # series are absent, fires CustomRecipeDiskInert.
  #
  # PER-TENANT (unlike the platform-scoped VersionAwareThresholdInert above): it
  # routes to the DECLARING tenant so they can self-serve the dominant case (their
  # workload mounts no PVC), and carries a platform_summary pair for the SRE who
  # must check the rarer infra causes (scrape relabel / CSI). Tenant-facing text
  # stays plain-language (no "metric_relabel" jargon); SRE triage lives in
  # platform_summary — dual-perspective, dev-rule #10.
  #
  # EITHER-absent: the `unless` subtrahend keeps only tenants that have BOTH
  # available AND capacity series, so a tenant missing EITHER fires (a forecast
  # ratio needs both — one missing → empty vector → silent). The pods leg counts
  # RUNNING pods (kube_pod_status_phase{phase="Running"}) — NOT bare kube_pod_info
  # (which also keeps Completed/Failed series): a tenant whose workload isn't running
  # has no disk data for a non-config reason, so we must NOT page it inert (mirrors
  # node-health's Running filter). `tenant` derived from namespace via label_replace
  # (KSM is NOT scraped through the namespace→tenant relabel). Maintenance opt-out
  # mirrors every other pack alert. The declared-signal aggregates user_threshold with
  # `max by(tenant)` (NOT count): HA-invariant (§4.3) — user_threshold doubles under
  # replicaCount=2, max dedupes; only the per-tenant PRESENCE matters here (the value is
  # unused, it just feeds the `and on(tenant)` set join). The pods/volume-stats legs use
  # `count` — those come from KSM/kubelet (single-source, not doubled by exporter HA). NOTE: deliberately NOT an expected-vs-reporting
  # per-PVC diff — a tenant with SOME volume-stats is "covered"; a single non-volume-
  # stats PVC (NFS / Pending) must not flood SRE (adversarial-review reject).
  # The declared-signal keys on the disk-fill PRIMARY metrics — available_bytes
  # (the canonical headroom signal) OR used_bytes (a usage-based fill recipe) — as
  # an `or` of EXACT `=` matchers. The #731 rulepack↔exporter contract
  # (rulepack_contract_test.go) forbids `=~` on user_threshold's metric (the
  # closed-label set must be statically checkable), but it walks selectors via the
  # PromQL AST, so an `or` of exact-matched selectors is contract-safe and is the
  # extensible idiom for the small closed set of disk-fill primaries (add a leg if a
  # future recipe class — e.g. inodes_free — becomes a fill signal). The `unless`
  # presence legs stay keyed on available/capacity: kubelet emits the whole
  # volume-stats family together, so their absence is a faithful proxy for "no
  # volume-stats arrive" regardless of which primary the recipe declared.
  # #9 NOTE: the pods leg's `namespace=~"db-.+"` deliberately SCOPES this sentinel to
  # the platform tenant-namespace convention (the same db-* keep node-health uses below
  # + the kubelet-volume-stats scrape relabel in configmap-prometheus.yaml). It is a
  # chosen scope, NOT the only db-* gate: user_threshold's `tenant` is the conf.d id
  # (collector.go emits `t.Tenant`; the monitoring-components scrape that reads the
  # exporter has no tenant relabel), so the declared leg CAN carry a non-db id. Such a
  # tenant is suppressed HERE by this filter — broadening it alone would START firing for
  # non-db tenants (whose volume-stats are dropped scrape-side anyway), so it is not a
  # free knob. A BYO deployment that renames tenant namespaces must change the
  # volume-stats relabel keep, this leg, and node-health together (#692 Option E).
  # ─────────────────────────────────────────────────────────────────────
  - name: kubernetes-custom-disk-recipe-sentinel
    rules:
      - alert: CustomRecipeDiskInert
        expr: |
          (
            max by(tenant) (
              user_threshold{component="custom", metric="kubelet_volume_stats_available_bytes"}
              or
              user_threshold{component="custom", metric="kubelet_volume_stats_used_bytes"}
            )
            and on(tenant)
            count by(tenant) (
              label_replace(kube_pod_status_phase{namespace=~"db-.+", phase="Running"} == 1, "tenant", "$1", "namespace", "(.+)")
            )
          )
          unless on(tenant)
          (
            count by(tenant) (kubelet_volume_stats_available_bytes{tenant=~".+"})
            and on(tenant)
            count by(tenant) (kubelet_volume_stats_capacity_bytes{tenant=~".+"})
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)
        for: 15m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "Disk alert declared but no disk data is visible for {{ $labels.tenant }}"
          summary_zh: "已設定磁碟告警，但偵測不到 {{ $labels.tenant }} 的磁碟資料"
          platform_summary: "[SRE] {{ $labels.tenant }} disk recipe inert — volume-stats absent. Check in order: (1) tenant mounts no PVC (most common, tenant-side); (2) kubelet volume-stats scrape job + namespace→tenant relabel; (3) CSI NodeGetVolumeStats support (kind's default local-path does not)."
          platform_summary_zh: "[SRE] 租戶 {{ $labels.tenant }} disk recipe inert — volume-stats 缺席。依序查:(1) 租戶根本沒掛 PVC(最常見、屬租戶端);(2) kubelet volume-stats scrape job 是否帶 namespace→tenant relabel;(3) CSI 是否實作 NodeGetVolumeStats(kind 預設 local-path 不實作)。"
          description: "You declared a disk-fill custom alert, but the platform sees no disk (volume) metrics for your workload, so the alert can never fire. This usually means your service mounts no PersistentVolumeClaim — check your deployment. If you DO use a PVC, contact the platform team to investigate disk-metric collection."
          description_zh: "您設定了磁碟填滿告警，但平台偵測不到您工作負載的磁碟(volume)指標，該告警永遠不會觸發。這通常表示您的服務沒有掛載 PersistentVolumeClaim — 請確認您的部署。若您確實使用 PVC，請聯繫平台團隊排查磁碟指標收集。"
          runbook_url: "https://github.com/vencil/Dynamic-Alerting-Integrations/blob/main/docs/integration/byo-prometheus-integration.md"

  # ─────────────────────────────────────────────────────────────────────
  # Node health (#809): tenant-attributed node-NotReady alerting.
  # Infra signals (kube_node_status_condition) are node-scoped — they carry
  # no `tenant`. We attribute them via a stable node→tenant mapping built
  # from kube_pod_info (which carries node + namespace), then fan a node-down
  # out to every tenant with a RUNNING pod on that node. Default-on, warning
  # severity (migration-parity, #809); opt-out via maintenance mode.
  # Records + alert share one group: rules eval sequentially within a group,
  # so the mapping and core are fresh before the alert in the same cycle.
  # ─────────────────────────────────────────────────────────────────────
  - name: kubernetes-node-health
    rules:
      # Stable low-cardinality node→tenant mapping. RUNNING-only: kube_pod_info
      # also emits Evicted/Failed/Completed pods → a dead node would otherwise
      # fan out to tenants whose pods merely *used to* live there (ghost-pod
      # false positive; adversarial review). The Running filter also gives the
      # alert auto-resolve semantics — once the control plane evicts/reschedules
      # the pod, the mapping drops and the alert clears for that tenant.
      # `tenant` is derived from namespace via label_replace because KSM is NOT
      # scraped through the namespace→tenant relabel (same idiom as the
      # container-normalization group above). The Running join keys on `uid` too
      # (not just namespace,pod): a recreated pod reuses its name, so during a
      # reschedule the OLD pod's kube_pod_info (still on the old node) would
      # otherwise borrow the NEW pod's Running phase and ghost-map the tenant to
      # the old node → a false NotReady on the old node (CodeRabbit #831).
      # ⚠ `uid` is a standard KSM pod-metric label on BOTH kube_pod_info and
      # kube_pod_status_phase (verified KSM v2.18.0, the deployed version). If KSM
      # is ever downgraded below a version that drops `uid` from one side, the
      # join goes empty and node-health silently stops firing — the same KSM-
      # contract failure class the VersionAwareThresholdInert sentinel guards.
      - record: tenant:node_owner:info
        expr: |
          max by(node, tenant) (
            label_replace(
              kube_pod_info{namespace=~"db-.+"}
              and on(namespace, pod, uid)
                (kube_pod_status_phase{phase="Running"} == 1),
              "tenant", "$1", "namespace", "(.*)"
            )
          )

      # node-down ∩ owning tenants. `and on(node)` (NOT `* group_left`): the
      # Ready=true condition gauge is 0 when NotReady, so multiplying would
      # collapse the value to 0 and a `> 0` alert would never fire; `and` keeps
      # the mapping's value (1) and its (node, tenant) labels. Maintenance
      # opt-out mirrors every other pack alert.
      # NOTE: `{condition="Ready", status="true"} == 0` is INTENTIONALLY both
      # NotReady AND Unknown — on a network partition KSM sets the Ready/true
      # gauge to 0 (and Ready/unknown to 1), so this one selector covers both
      # node-failure modes. Do not "add" a status="unknown" branch (redundant).
      - record: rule_pack_kubernetes:node_not_ready:core
        expr: |
          (
            tenant:node_owner:info
            and on(node)
              (kube_node_status_condition{condition="Ready", status="true"} == 0)
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      # left-outer-join metadata enrichment (onboarding-vacuum safe) — same
      # two-branch pattern as the container/pod-state alerts. `node` rides
      # through so on-call sees which node; Alertmanager groups by
      # [alertname, tenant], so an AZ-wide outage collapses to one notification
      # per tenant. `for: 3m` rides out kubelet↔API-server network blips
      # (transient Ready→Unknown flaps) and still fires well inside the ~5m
      # pod-eviction window (the mapping is still present).
      # Boundary: once the pod is evicted/rescheduled this alert auto-resolves
      # (the node is no longer the tenant's problem). If the pod then stays
      # Pending (no capacity), the workload-down handoff is the tenant's
      # absence-on-`up` recipe's job (#809), NOT this node alert's.
      - alert: NodeNotReady
        expr: |
          (
            rule_pack_kubernetes:node_not_ready:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:node_not_ready:core
            unless on(tenant) tenant_metadata_info
          )
        for: 3m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
          node: "{{ $labels.node }}"
        annotations:
          summary: "Kubernetes node {{ $labels.node }} NotReady — affects {{ $labels.tenant }}"
          summary_zh: "Kubernetes 節點 {{ $labels.node }} NotReady — 影響 {{ $labels.tenant }}"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: node {{ $labels.node }} NotReady — check node health / pod rescheduling"
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: 節點 {{ $labels.node }} NotReady — 請檢查節點健康 / Pod 重新調度"
          description: "A Kubernetes node hosting this tenant's running pod(s) is NotReady; the workload may be rescheduled or unavailable."
          description_zh: "承載此租戶運行中 Pod 的 Kubernetes 節點處於 NotReady 狀態；工作負載可能被重新調度或無法使用。"
          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"

  # ─────────────────────────────────────────────────────────────────────
  # HA replica-readiness (#875 follow-up; Gemini adversarial review). The
  # value-based DB liveness rules (rule-pack-mariadb/mongodb.yaml: *Down /
  # *ClusterDown / *NoPrimary, plus TenantExporterAbsent #869) all read a
  # metric VALUE (<db>_up==0 / member_state / read_only / up==1). When a
  # pod/replica VANISHES in an HA set the series goes ABSENT (not 0) and the
  # surviving replica masks it at every one of those rules → an HA DB silently
  # degrading N→N-1 (serving, but with NO redundancy) emits nothing. This is
  # the K8s-layer complement: fire when a db-* HA workload (desired ≥2) has
  # fewer ready/available replicas than desired. `tenant` is derived from
  # namespace via label_replace (KSM is NOT scraped through the namespace→
  # tenant relabel — same idiom as node-health above). Covers BOTH StatefulSet
  # (status_replicas_ready) and Deployment (status_replicas_available).
  # Single-instance (desired<2) is intentionally OUT: a 1→0 loss there is
  # total-down, already paged by #875 ClusterDown / TenantExporterAbsent.
  # severity:warning (degraded-but-serving); for:15m rides out rolling updates
  # + node-drain reschedule, fires on STUCK degradation. Maintenance opt-out +
  # metadata LOJ mirror every other pack alert. Metric names per KSM v2.18.0
  # (the deployed version, see node-health note); all kube_* are scraped by the
  # monitoring-components job with no metric_relabel keep-list.
  # Two by-design calls (#888 adversarial review): (1) NO metric_group — matches
  # the NodeNotReady sibling and keeps this a DISTINCT signal from the #875
  # liveness criticals (different detection plane: kube_* topology vs exporter
  # up/value), so during a total outage both surface (no dedup inhibit). (2)
  # `max(SS) or max(Deploy)` value-masks a tenant with BOTH a degraded SS AND
  # Deploy (keeps the SS deficit) — latent: the alert fires on PRESENCE, no
  # annotation renders $value, and tenant↔workload is 1:1 here. Restructure to
  # `max((SS) or (Deploy))` only if $value / a deficit threshold is added later.
  # ─────────────────────────────────────────────────────────────────────
  - name: kubernetes-ha-replicas
    rules:
      - record: rule_pack_kubernetes:ha_replicas_degraded:core
        expr: |
          (
            max by(tenant) (
              label_replace(
                (
                  kube_statefulset_replicas{namespace=~"db-.+"}
                  - kube_statefulset_status_replicas_ready{namespace=~"db-.+"}
                  > 0
                )
                and on(namespace, statefulset)
                  (kube_statefulset_replicas{namespace=~"db-.+"} >= 2),
                "tenant", "$1", "namespace", "(.+)"
              )
            )
            or
            max by(tenant) (
              label_replace(
                (
                  kube_deployment_spec_replicas{namespace=~"db-.+"}
                  - kube_deployment_status_replicas_available{namespace=~"db-.+"}
                  > 0
                )
                and on(namespace, deployment)
                  (kube_deployment_spec_replicas{namespace=~"db-.+"} >= 2),
                "tenant", "$1", "namespace", "(.+)"
              )
            )
          )
          unless on(tenant)
          (user_state_filter{filter="maintenance"} == 1)

      # left-outer-join metadata enrichment (onboarding-vacuum safe) — same
      # two-branch pattern as node-health and the threshold alerts: a tenant
      # with NO tenant_metadata_info still fires (the bare `*` inner-join alone
      # would silently drop it).
      - alert: TenantHAReplicasDegraded
        expr: |
          (
            rule_pack_kubernetes:ha_replicas_degraded:core
            * on(tenant) group_left(runbook_url, owner, tier)
              tenant_metadata_info
          )
          or
          (
            rule_pack_kubernetes:ha_replicas_degraded:core
            unless on(tenant) tenant_metadata_info
          )
        for: 15m
        labels:
          severity: warning
          tenant: "{{ $labels.tenant }}"
        annotations:
          summary: "HA workload for {{ $labels.tenant }} is running with reduced redundancy"
          summary_zh: "{{ $labels.tenant }} 的 HA 工作負載正以降級（失去備援）狀態運行"
          platform_summary: "[{{ $labels.tier }}] {{ $labels.tenant }}: ready replicas < desired on an HA set (≥2) — a pod/replica is MISSING (vanished, not crashed-in-place), so the value-based DB liveness rules (#875) cannot see it. Check kube_statefulset/deployment status + node health / scheduling."
          platform_summary_zh: "[{{ $labels.tier }}] {{ $labels.tenant }}: HA 工作負載（≥2）就緒副本數 < 期望數 — 有 pod/副本「消失」（非原地崩潰），value-based DB 存活規則（#875）看不到。請查 kube_statefulset/deployment 狀態 + 節點健康 / 排程。"
          description: "Your HA database has fewer ready replicas than desired — it is still serving but has lost redundancy. A node/pod failure or a stuck reschedule is the usual cause; one more failure could take the service down."
          description_zh: "您的 HA 資料庫就緒副本數少於期望值 — 服務仍可用，但已失去備援。通常成因是節點/Pod 故障或排程卡住；再壞一個就可能導致服務中斷。"
          runbook_url: "{{ $labels.runbook_url }}"
          owner: "{{ $labels.owner }}"
          tier: "{{ $labels.tier }}"
