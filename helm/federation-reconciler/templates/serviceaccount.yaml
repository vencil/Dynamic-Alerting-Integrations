apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "federation-reconciler.name" . }}
  labels:
    {{- include "federation-reconciler.labels" . | nindent 4 }}
# The reconciler makes NO Kubernetes API calls: the live revoked set is read via
# a ConfigMap VOLUME MOUNT (kubelet projection = direct source-of-truth read),
# not the API. So no RBAC (Role/Binding) and no mounted token — the reconciler
# is deliberately less privileged than a compromised tenant-api (ADR-028 G3).
automountServiceAccountToken: false
