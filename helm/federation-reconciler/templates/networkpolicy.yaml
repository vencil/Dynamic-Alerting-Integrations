{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "federation-reconciler.name" . }}
  labels:
    {{- include "federation-reconciler.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "federation-reconciler.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus scrape of /metrics from the monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.scrapeNamespaceLabel | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.metricsPort }}
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # VictoriaLogs query API (:9428) in the monitoring namespace — the only
    # off-pod dependency. Read-only queries; no other egress is granted.
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.scrapeNamespaceLabel | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9428
{{- end }}
