apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "federation-gateway.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "federation-gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "federation-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "federation-gateway.labels" . | nindent 8 }}
      annotations:
        # Roll the pods when the Envoy config, JWKS, or an audit-sidecar
        # ConfigMap changes.
        checksum/envoy: {{ include (print $.Template.BasePath "/configmap-envoy.yaml") . | sha256sum }}
        checksum/jwks: {{ include (print $.Template.BasePath "/configmap-jwks.yaml") . | sha256sum }}
        {{- if .Values.auditLog.enabled }}
        checksum/mtail: {{ include (print $.Template.BasePath "/configmap-mtail.yaml") . | sha256sum }}
        checksum/logrotate: {{ include (print $.Template.BasePath "/configmap-logrotate.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "federation-gateway.name" . }}
      # Envoy never calls the Kubernetes API — drop the token.
      automountServiceAccountToken: false
      # Must exceed preStopSleepSeconds + the 30s max federation query so an
      # in-flight query drains before SIGKILL instead of 502-ing.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Spread replicas across nodes — soft, so a small cluster still
      # schedules. The gateway is the federation entrypoint; co-locating
      # both replicas on one node makes a single node failure total.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "federation-gateway.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: envoy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}{{ with .Values.image.digest }}@{{ . }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --concurrency
            - {{ .Values.concurrency | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.listenPort }}
              protocol: TCP
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: jwks
              mountPath: /etc/jwks
              readOnly: true
            # Whole-ConfigMap mount (NOT subPath) so kubelet keeps the
            # projected revoked.txt updated — Posture B revocation depends
            # on it (subPath mounts do not receive updates).
            - name: revoked
              mountPath: /etc/revoked
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.auditLog.enabled }}
            # Audit-log emptyDir (ADR-020 IV-2f) — Envoy writes sink 2,
            # the mtail / logrotate sidecars share the same volume.
            - name: audit-log
              mountPath: /var/log/federation
            {{- end }}
          lifecycle:
            # Drain the Service endpoint before SIGTERM so no new request
            # races into a terminating pod. Native sleep needs k8s >= 1.29.
            preStop:
              sleep:
                seconds: {{ .Values.preStopSleepSeconds }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.listenPort }}
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.listenPort }}
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.auditLog.enabled }}
        # ── mtail sidecar (ADR-020 IV-2f) ────────────────────────────
        # Tails the Envoy audit access log (sink 2) and turns it into
        # tenant_federation_requests_total{tenant,status}. Prometheus
        # scrapes it via the metrics port annotated on the Service.
        - name: mtail
          image: "{{ .Values.auditLog.image.repository }}:{{ .Values.auditLog.image.tag }}"
          imagePullPolicy: {{ .Values.auditLog.image.pullPolicy }}
          command: ["/usr/local/bin/mtail"]
          args:
            - --logtostderr
            - --progs
            - /etc/mtail
            - --logs
            - {{ .Values.auditLog.path | quote }}
            - --port
            - {{ .Values.auditLog.mtail.port | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: {{ .Values.auditLog.mtail.port }}
              protocol: TCP
          volumeMounts:
            # Read-only: mtail only tails. logrotate (below) owns rotation.
            - name: audit-log
              mountPath: /var/log/federation
              readOnly: true
            - name: mtail-progs
              mountPath: /etc/mtail
              readOnly: true
          resources:
            {{- toYaml .Values.auditLog.mtail.resources | nindent 12 }}
        # ── logrotate sidecar (ADR-020 IV-2f) ────────────────────────
        # Caps the audit-log emptyDir so a high-pull tenant can never
        # grow it large enough to evict the pod. Rotation is rename +
        # Envoy admin /reopen_logs (lossless — no copytruncate gap).
        - name: logrotate
          image: "{{ .Values.auditLog.image.repository }}:{{ .Values.auditLog.image.tag }}"
          imagePullPolicy: {{ .Values.auditLog.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - >
              while true; do
              logrotate -s /var/log/federation/.logrotate.status
              /etc/logrotate.d/federation-audit.conf;
              sleep {{ .Values.auditLog.logrotate.intervalSeconds }};
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: audit-log
              mountPath: /var/log/federation
            - name: logrotate-config
              mountPath: /etc/logrotate.d
              readOnly: true
          resources:
            {{- toYaml .Values.auditLog.logrotate.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "federation-gateway.name" . }}-envoy
        - name: jwks
          configMap:
            name: {{ include "federation-gateway.name" . }}-jwks
        - name: revoked
          configMap:
            # The tenant-federation-store ConfigMap is created by tenant-api
            # (#520), not this chart. optional: true keeps the gateway
            # schedulable before that exists — the Lua then fails open
            # (nothing known-revoked; the 4h TTL still bounds exposure).
            name: {{ .Values.revokedSet.configMapName }}
            optional: true
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        {{- if .Values.auditLog.enabled }}
        # Audit-log mirror (ADR-020 IV-2f). Disk-backed (NOT medium:
        # Memory) — a ~150 MiB rotated log mirror should not cost RAM.
        # Ephemeral on purpose: the durable trail is Envoy's stdout sink.
        - name: audit-log
          emptyDir:
            sizeLimit: {{ .Values.auditLog.volumeSizeLimit }}
        - name: mtail-progs
          configMap:
            name: {{ include "federation-gateway.name" . }}-mtail
        - name: logrotate-config
          configMap:
            name: {{ include "federation-gateway.name" . }}-logrotate
        {{- end }}
