apiVersion: v1
kind: Service
metadata:
  name: {{ include "federation-gateway.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "federation-gateway.labels" . | nindent 4 }}
  {{- if .Values.auditLog.enabled }}
  annotations:
    # Scrape the mtail sidecar's federation-audit metrics (ADR-020
    # IV-2f). The monitoring-components Prometheus job discovers
    # annotated Services in the monitoring namespace — install the
    # chart there for tenant_federation_requests_total to be collected.
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.auditLog.mtail.port | quote }}
    prometheus.io/path: /metrics
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "federation-gateway.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.listenPort }}
      protocol: TCP
    {{- if .Values.auditLog.enabled }}
    - name: metrics
      port: {{ .Values.auditLog.mtail.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
