apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "federation-gateway.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "federation-gateway.labels" . | nindent 4 }}
# Envoy needs no Kubernetes API access — no Role is bound and the pod
# sets automountServiceAccountToken: false.
automountServiceAccountToken: false
