apiVersion: v2
name: federation-gateway
description: Tenant federation API gateway (ADR-020 Layer 2) — Envoy that verifies the RS256 federation JWT, checks the revoked set, and per-token / per-tenant rate-limits before forwarding to the Layer 3 proxy
type: application
# version: Helm Chart 版本（隨 Chart 結構/模板變更升級）
# 0.2.0 — ADR-020 IV-2f: audit-log dual sink + mtail / logrotate sidecars
# 0.2.1 — ADR-020 IV-2b: close /api/v1/read 403 route-bypass (path canonicalisation)
# 0.2.2 — ADR-020 IV-2b: close the residual %2F escaped-slash 403 bypass
# 0.2.3 — ADR-020 IV-2f: fix mtail regex — Envoy sorts JSON keys, audit metric never emitted
# 0.2.4 — #551: emergency global kill switch (emergencyGlobalBlock → 503)
version: 0.2.4
# appVersion: pinned Envoy release
appVersion: "v1.38.0"
# kubeVersion: the deployment uses the native preStop.sleep lifecycle
# action, beta-on-by-default since Kubernetes 1.29.
kubeVersion: ">=1.29.0-0"
keywords:
  - dynamic-alerting
  - tenant-federation
  - envoy
  - api-gateway
  - multi-tenancy
home: https://github.com/vencil/Dynamic-Alerting-Integrations
maintainers:
  - name: vencil
