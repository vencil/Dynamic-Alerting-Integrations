# federation-proxy Helm values
# Reference: ADR-020 — Tenant Federation, Layer 3 (read-path isolation)
#
# Layer 3 enforces per-tenant isolation on the federation read path.
# Two proxy engines, selected by proxy.engine — they isolate by DIFFERENT
# mechanisms, so pick by your storage backend:
#
#   prom-label-proxy — rewrites PromQL, force-injecting {<label>="<X>"}
#                      into every selector AND metadata-API call. Use for
#                      Prometheus, Thanos, or VictoriaMetrics SINGLE-NODE.
#   vmauth           — VictoriaMetrics auth router. It does NOT inject a
#                      label matcher; isolation is by routing each tenant
#                      to its cluster path /select/<accountID>/prometheus.
#                      Use ONLY for a VictoriaMetrics CLUSTER. See README.

proxy:
  # prom-label-proxy | vmauth
  engine: prom-label-proxy

replicaCount: 2

# ── prom-label-proxy engine ──────────────────────────────────────────
promLabelProxy:
  image:
    repository: quay.io/prometheuscommunity/prom-label-proxy
    tag: "v0.13.0"
    pullPolicy: IfNotPresent
  # Upstream backend — any Prometheus-HTTP-API-compatible endpoint
  # (Prometheus, Thanos Query, VictoriaMetrics single-node / vmselect).
  upstream:
    url: "http://prometheus.monitoring.svc:9090"
  # Tenant isolation. The proxy injects {<label>="<value>"} into every
  # selector. The value is read from an HTTP header set by the federation
  # API gateway (IV-2b / #507) AFTER it verifies the JWT — the proxy
  # never trusts a client-supplied tenant id. headerName must match what
  # the gateway sets, and the gateway MUST strip any inbound copy of it.
  tenant:
    label: tenant_id
    headerName: X-Tenant-Id

# ── vmauth engine (VictoriaMetrics cluster only) ─────────────────────
vmauth:
  image:
    repository: victoriametrics/vmauth
    tag: "v1.143.0"
    pullPolicy: IfNotPresent
  # vmauth -auth.config, mounted from a ConfigMap. Operator-supplied: it
  # is the routing table to per-tenant cluster paths. The src_paths regex
  # MUST stay a catch-all (/api/v1/.+) so metadata endpoints are routed
  # and isolated too — narrowing it to /api/v1/query leaks metadata
  # (#506 AC). Replace the placeholder accountID/url_prefix per tenant.
  authConfig: |
    users:
      - username: federation
        url_map:
          - src_paths:
              - "/api/v1/.+"
            url_prefix: "http://vmselect.monitoring.svc:8481/select/0/prometheus/"

# Port the proxy listens on (plain HTTP — TLS is terminated at the
# gateway; this proxy is cluster-internal behind a NetworkPolicy).
listenPort: 8080

service:
  type: ClusterIP
  port: 8080

# NetworkPolicy — SECURITY-CRITICAL, not optional. prom-label-proxy
# trusts the tenant header; vmauth trusts the routing it is handed. That
# trust only holds if traffic cannot reach the proxy except via the
# gateway. Disabled, any in-cluster pod could set the header / hit a
# tenant path directly — the 3-layer defence collapses (ADR-020).
networkPolicy:
  enabled: true
  # Pod-selector labels of the federation API gateway (IV-2b / #507) —
  # the ONLY permitted ingress source for the proxy port.
  gatewaySelector:
    app.kubernetes.io/name: federation-gateway
  # Namespace the gateway runs in. Empty = same namespace as the proxy.
  gatewayNamespace: ""

# Horizontal autoscaling. Query rewriting / routing is CPU-bound, so a
# query-heavy tenant can starve neighbours on a shared pod — scale on
# CPU (ADR-020 Gemini round-6 review).
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Resource requests/limits. A CPU limit bounds the blast radius of a
# single expensive query; the request feeds the HPA CPU calculation.
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Pod security context (non-root, unprivileged).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Extra pod annotations.
podAnnotations: {}
