apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "federation-proxy.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "federation-proxy.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "federation-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "federation-proxy.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "federation-proxy.name" . }}
      # prom-label-proxy never calls the Kubernetes API — drop the token.
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: prom-label-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - -label={{ .Values.tenant.label }}
            # Per-tenant value comes from a gateway-set header, never the
            # client — the gateway verifies the JWT first (ADR-020 Layer 3).
            - -header-name={{ .Values.tenant.headerName }}
            - -upstream={{ .Values.upstream.url }}
            - -insecure-listen-address=0.0.0.0:{{ .Values.listenPort }}
            # Hardcoded, NOT values-overridable (#506 AC): -enable-label-apis
            # extends enforcement to /api/v1/labels and /api/v1/label/<name>/
            # values; without it those leak cross-tenant topology to Grafana
            # variable dropdowns. (/api/v1/series is enforced regardless.)
            - -enable-label-apis
          ports:
            - name: http
              containerPort: {{ .Values.listenPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.listenPort }}
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.listenPort }}
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
