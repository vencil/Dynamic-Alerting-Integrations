apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "federation-proxy.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "federation-proxy.labels" . | nindent 4 }}
# prom-label-proxy needs no Kubernetes API access — no Role is bound and
# the pod sets automountServiceAccountToken: false.
automountServiceAccountToken: false
