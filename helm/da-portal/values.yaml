# da-portal Helm values
# Self-Hosted Interactive Tools Portal

replicaCount: 1

image:
  repository: ghcr.io/vencil/da-portal
  # tag 留空 → template 自動推導為 v<Chart.appVersion>（= published image）。需覆寫才設此值。
  tag: ""
  pullPolicy: IfNotPresent

# Portal application settings
portal:
  # Port nginx listens on inside container
  listenPort: 80
  # Tenant API URL for reverse proxy /api/v1/
  tenantApiUrl: "http://tenant-api.monitoring.svc.cluster.local:8080"
  # recipe-preview URL for reverse proxy /preview (#657 would-fire preview)
  recipePreviewUrl: "http://recipe-preview.monitoring.svc.cluster.local:8082"

# nginx configuration
nginx:
  # Enable custom nginx.conf from configmap-nginx.yaml
  enabled: true
  # Custom nginx.conf content (optional override)
  # Leave empty to use built-in config
  customConfig: ""

# oauth2-proxy sidecar configuration
oauth2Proxy:
  enabled: true
  image:
    # renovate: datasource=docker depName=quay.io/oauth2-proxy/oauth2-proxy
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.15.3"
    # Pinned by digest (#902 L2) — same digest as tenant-api's oauth2-proxy; the
    # drift-guard requires both charts + the scan matrix to carry it identically.
    # ⛔ Digest is AUTHORITATIVE: `--set oauth2Proxy.image.tag=…` ALONE does NOT
    #    upgrade — k8s silently keeps running THIS digest. Also set/clear
    #    oauth2Proxy.image.digest. L3/Renovate will automate both.
    digest: "sha256:10a1165743a192e1940b4708fb9647027185ce11a681a1c5519b442ff7f1f561"
    pullPolicy: IfNotPresent
  # Provider: github | google | oidc | gitlab
  provider: github
  # Redirect URL must match the registered OAuth2 app callback URL.
  # Set to your actual Ingress host.
  redirectUrl: "http://da-portal.example.com/oauth2/callback"
  # Accept all email domains — restrict further via firewall/network policies
  emailDomain: "*"
  # Cookie settings
  cookieSecure: true  # Requires HTTPS; set false only for local dev
  cookieHttpOnly: true
  cookieSameSite: "Lax"
  cookieName: "_da_portal_session"
  # Set to false to skip creating the placeholder Secret
  # (use this in production with externally managed secrets)
  createSecret: true
  # Secret name (must be pre-created; see secret-oauth2proxy.yaml template)
  secretName: oauth2-proxy-secrets

# Data volume mounts for customization (optional)
# Use these to provide custom platform-data.json, flows.json, or static content
customData:
  # Enable custom data volume
  enabled: false
  # Use ConfigMap or emptyDir
  type: configMap  # configMap | emptyDir
  configMapName: da-portal-custom
  # If type: emptyDir, you can use init container to clone/setup

# Service configuration
service:
  type: ClusterIP
  # Port 80 → oauth2-proxy (4180) — external traffic
  port: 80
  # Port 8080 → nginx directly — cluster-internal (health checks, internal access)
  internalPort: 8080

# Ingress (disabled by default — configure per-environment)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: da-portal.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits
resources:
  nginx:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  oauth2Proxy:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Pod security context (non-root, matching tenant-api)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# NetworkPolicy
# ⛔ enabled: false is FORBIDDEN and will fail `helm template`/`install`
# (GHSA-3g2h-rf85-5rrv). da-portal fronts tenant-api (header-trusting port 8080);
# this policy is a required security control, not a toggle.
networkPolicy:
  enabled: true
  # Namespaces allowed to reach the portal.
  # ⛔ SECURITY (GHSA-3g2h-rf85-5rrv): do NOT list tenant namespaces (db-a/db-b).
  # Real user traffic arrives through the ingress controller (browser → oauth2-proxy),
  # NOT directly from tenant pods — a tenant pod has no legitimate reason to reach the
  # portal, and granting it widens the blast radius of a compromised tenant workload.
  # Keep this to infrastructure sources only:
  #   • monitoring        — internal health checks / cluster tooling
  #   • ingress-nginx      — the ingress controller that fronts external browser traffic
  # Set to YOUR ingress controller's namespace (ingress-nginx | istio-system | traefik | …).
  allowedNamespaces:
    - monitoring
    - ingress-nginx

# Pod annotations
podAnnotations:
  # Portal is a static file server; no metrics to scrape
  # Leave empty or add custom annotations as needed
  {}

# Service account
serviceAccount:
  create: true
  name: ""
