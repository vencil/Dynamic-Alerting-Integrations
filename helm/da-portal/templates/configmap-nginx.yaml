apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "da-portal.name" . }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "da-portal.labels" . | nindent 4 }}
data:
  # nginx.conf - serves static Interactive Tools portal
  # Reverse proxy to tenant-api at /api/v1/
  # Security headers, health endpoint, Babel transpilation support
  default.conf: |
    # ── Portal Server Block ────────────────────────────────────────────────────
    server {
      listen {{ .Values.portal.listenPort }} default_server;
      server_name _;

      # Access logs (optional, redirect to stderr for k8s logging)
      access_log /dev/stderr combined;
      error_log /dev/stderr warn;

      # ── Security Headers ────────────────────────────────────────────────────
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'self'" always;

      # ── CORS Headers (adjust for your setup) ────────────────────────────────
      add_header Access-Control-Allow-Origin "$http_origin" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

      # Handle preflight OPTIONS requests
      if ($request_method = 'OPTIONS') {
        return 204;
      }

      # ── Health Endpoint ────────────────────────────────────────────────────
      location = /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
      }

      # ── Reverse Proxy to tenant-api for /api/v1/ ──────────────────────────
      location /api/v1/ {
        proxy_pass {{ .Values.portal.tenantApiUrl }}/api/v1/;
        proxy_http_version 1.1;

        # Forward original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        # Forward oauth2-proxy identity headers to tenant-api
        # tenant-api reads X-Forwarded-Email / X-Forwarded-Groups for RBAC
        proxy_set_header X-Forwarded-Email  $http_x_forwarded_email;
        proxy_set_header X-Forwarded-User   $http_x_forwarded_user;
        proxy_set_header X-Forwarded-Groups $http_x_forwarded_groups;
        proxy_set_header Authorization $http_authorization;

        # Connection handling
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
      }

      # ── Static Files (Interactive Tools, JSX, platform-data.json, etc.) ────
      location / {
        root /usr/share/nginx/html;
        index index.html;

        # Cache control for static assets
        # Set long TTL for versioned/hashed assets, short for index.html
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
          expires 7d;
          add_header Cache-Control "public, immutable";
        }

        location ~* \.(html|json)$ {
          expires 1h;
          add_header Cache-Control "public, must-revalidate";
        }

        # Fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;
      }

      # ── Deny access to sensitive files ──────────────────────────────────────
      location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
      }

      location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
      }
    }

    # ── Default upstream timeout values ────────────────────────────────────────
    # (tuned for interactive tool responsiveness)
    upstream default_upstream {
      server localhost:{{ .Values.portal.listenPort }};
      keepalive 16;
    }
