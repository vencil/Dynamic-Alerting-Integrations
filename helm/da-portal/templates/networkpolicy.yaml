{{- /*
  Fail-closed guard (GHSA-3g2h-rf85-5rrv). da-portal fronts tenant-api's
  header-trusting proxy path; whenever it runs in authenticated-proxy mode
  (oauth2Proxy.enabled=true) the NetworkPolicy is a REQUIRED security control and
  MUST NOT be disabled. Tier 1 static-only portals (oauth2Proxy.enabled=false,
  no tenant-api behind it) are exempt — there is no header-trust surface to guard.
*/ -}}
{{- if and .Values.oauth2Proxy.enabled (not .Values.networkPolicy.enabled) }}
{{- fail "networkPolicy.enabled=false is forbidden when oauth2Proxy.enabled=true: da-portal then fronts tenant-api's header-trusting path; the NetworkPolicy is a REQUIRED security control (GHSA-3g2h-rf85-5rrv), not an optional feature." }}
{{- end }}
{{- /*
  Open-proxy guard (GHSA-3g2h-rf85-5rrv). nginx reverse-proxies /api/v1/ ->
  tenantApiUrl, forwarding the RAW client X-Forwarded-Groups/Email headers
  (configmap-nginx.yaml). The oauth2-proxy sidecar is the ONLY thing that strips
  client-supplied identity headers before nginx sees them. With
  oauth2Proxy.enabled=false there is no stripping proxy, so a configured upstream
  turns nginx into an UNAUTHENTICATED open proxy to a header-trusting backend
  (assert X-Forwarded-Groups: platform-admins -> fleet admin). A Tier-1 static-only
  portal (no auth proxy) MUST therefore carry no reverse-proxy target. This is
  render-time and CNI-independent — it does not rely on the NetworkPolicy being
  enforced. If a deployment fronts da-portal with an EXTERNAL auth proxy that
  strips client identity headers, that is a distinct (currently unsupported)
  topology; add an explicit opt-in value before relaxing this.
*/ -}}
{{- if and (not .Values.oauth2Proxy.enabled) .Values.portal.tenantApiUrl }}
{{- fail "oauth2Proxy.enabled=false requires portal.tenantApiUrl to be empty (GHSA-3g2h-rf85-5rrv): with no auth proxy stripping client headers, nginx would forward raw X-Forwarded-Groups to a header-trusting backend = unauthenticated identity spoofing. A static-only (Tier 1) portal must not reverse-proxy to tenant-api." }}
{{- end }}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "da-portal.name" . }}-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "da-portal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "da-portal.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow oauth2-proxy port from specified namespaces and ingress
    - from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - port: 4180
          protocol: TCP

    # Allow nginx internal port from cluster (for health checks, API calls)
    - from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - port: {{ .Values.portal.listenPort }}
          protocol: TCP
{{- end }}
