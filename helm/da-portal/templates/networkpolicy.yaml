{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "da-portal.name" . }}-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "da-portal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "da-portal.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow oauth2-proxy port from specified namespaces and ingress
    - from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - port: 4180
          protocol: TCP

    # Allow nginx internal port from cluster (for health checks, API calls)
    - from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - port: {{ .Values.portal.listenPort }}
          protocol: TCP
{{- end }}
