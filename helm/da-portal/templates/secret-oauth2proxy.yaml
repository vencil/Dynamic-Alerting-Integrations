# This template creates a placeholder Secret for oauth2-proxy.
# In production, manage this Secret externally (e.g., via Sealed Secrets or External Secrets Operator)
# and set oauth2Proxy.secretName to point to it.
#
# To skip creating this Secret (recommended for production), set:
#   --set oauth2Proxy.createSecret=false
{{- if and .Values.oauth2Proxy.enabled .Values.oauth2Proxy.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.oauth2Proxy.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "da-portal.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Replace these placeholder values before deploying.
  # See: https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview/
  OAUTH2_PROXY_COOKIE_SECRET: "REPLACE_WITH_32_BYTE_BASE64_SECRET"
  OAUTH2_PROXY_CLIENT_ID: "REPLACE_WITH_CLIENT_ID"
  OAUTH2_PROXY_CLIENT_SECRET: "REPLACE_WITH_CLIENT_SECRET"
{{- end }}
