{{- if .Values.networkPolicy.enabled }}
# T2-2 mitigation (#539 red-team): VictoriaLogs has no built-in auth
# on its HTTP listener — ingest + query + DELETE all share :9428. The
# §2 hard rule guards the producer side (gateway → stdout, not direct
# push) but does not protect the store itself from compromised
# in-cluster pods. This NetworkPolicy locks the port to the five
# legitimate consumers: the Vector DaemonSet (ingest — since #1018 in its
# dedicated `vector` namespace via `allowedNamespaces`; the same-ns
# podSelector row remains for debug pods / pre-migration installs), the
# chargeback CronJob (query), Grafana (query), the federation-gateway in
# `mode: victorialogs` (tenant-scoped log query, ADR-021 #609), and
# same-pod loopback (probes). Any other pod in the cluster — including a
# freshly attacker-deployed one in the same namespace — cannot reach :9428.
#
# Building auth (`-httpAuthKey`) into the chart is the deeper fix and
# is tracked as a separate follow-up; NetworkPolicy is the minimum
# bar that closes the most-likely exploit path without forcing every
# consumer to learn a token-rotation story.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "victorialogs.name" . }}-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "victorialogs.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "victorialogs.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.listenPort }}
          protocol: TCP
      from:
        {{- /* Same-namespace pod selectors — the legitimate consumers (Vector / chargeback / Grafana / federation-gateway). */}}
        {{- range .Values.networkPolicy.allowedPodSelectors }}
        - podSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- /* Cross-namespace allowance — empty list = no cross-ns ingress. */}}
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
{{- end }}
