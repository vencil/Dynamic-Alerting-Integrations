apiVersion: v1
kind: Service
metadata:
  name: {{ include "victorialogs.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "victorialogs.labels" . | nindent 4 }}
  {{- if .Values.prometheusScrapeAnnotations.enabled }}
  annotations:
    # /metrics is served on the same HTTP port as ingestion / queries.
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.listenPort | quote }}
    prometheus.io/path: /metrics
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "victorialogs.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.listenPort }}
      protocol: TCP
