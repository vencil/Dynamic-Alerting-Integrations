# victorialogs Helm values
# Reference: #539 — Platform log aggregation (Vector + VictoriaLogs).
#
# Single-pod deployment. Per #539 §3 the operational-simplicity selection
# of VictoriaLogs (single binary, no object-storage ring / compactor /
# memcached) is the explicit rationale — do NOT shard this into a
# cluster topology without revisiting the ADR. PVC-backed storage; pod
# recycles do not lose history.
#
# Hard rule (#539 §2): producers MUST NEVER HTTP-push directly here.
# The shipper (Vector DaemonSet) tails container stdout and pushes;
# log-store downtime must not wedge the producer (the federation
# gateway, etc.). This values.yaml does not expose any direct-push
# convenience knob on purpose.

replicaCount: 1

image:
  repository: victoriametrics/victoria-logs
  tag: "v1.50.0"
  # Optional digest pin (#566 T5 — supply-chain hardening). When set,
  # the rendered image becomes `repo:tag@sha256:...` and kubelet pulls
  # by digest (immutable; upstream tag-swap cannot substitute). Get
  # the digest with:
  #   docker buildx imagetools inspect <repo>:<tag> | grep Digest
  # Empty (default) keeps `repo:tag` form — vulnerable to upstream
  # registry compromise but matches existing chart convention. Flip
  # the moment you have a supply-chain threat model that names this.
  digest: ""
  pullPolicy: IfNotPresent

# HTTP listen port for ingestion + query. VictoriaLogs default is 9428.
# The Vector sink in #539 Phase 1 hits :9428/insert/elasticsearch/ and
# Grafana queries the same port via /select/logsql/query.
listenPort: 9428

# Retention window. Per #539 §5: "Phase 1 default: TBD — typical
# ops/forensic 30–90 days. Revisit when an explicit compliance
# requirement names a window." 30d is the conservative entry point;
# operators override per environment via Helm values.
retentionPeriod: "30d"

# Extra command-line flags. VictoriaLogs has "sane defaults" for most
# knobs (per upstream); the chart only sets retention + listen + data
# path. Add overrides here without forking the deployment template.
# Example: ["-loggerLevel=WARN", "-storage.minFreeDiskSpaceBytes=10GB"]
extraArgs: []

# Persistent storage. The pod loses history without this — VictoriaLogs
# stores indexed data on disk. Default size sized for federation audit
# at ~50 RPS × 1 KB/line × 30d × 1.3 overhead ≈ 130 GB raw → ≈ 13 GB
# at VictoriaLogs's typical ~10× compression; 30Gi gives ~2× headroom
# for traffic spikes and the operational stream. Re-estimate when #552
# (chargeback query log) joins as consumer #2. Formula + worked example
# in docs/internal/platform-log-aggregation-runbook.md §5.
persistence:
  enabled: true
  size: 30Gi
  # storageClass: "" leaves the cluster default storage class to
  # provision; set explicitly to pin a class.
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# Extra environment variables — #566 Q5, mirroring helm/vector pattern
# so operators have one consistent shape across the log-aggregation
# charts. VictoriaLogs accepts a few sensitive env vars (e.g. authKeys
# for HTTP API protection beyond the NetworkPolicy perimeter); wire
# them via Secret refs here.
extraEnv: []
extraEnvFrom: []

# Pod-level security: non-root, drop all capabilities. VictoriaLogs
# binary needs only read/write under -storageDataPath.
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

service:
  type: ClusterIP
  # Same port for ingestion + Grafana queries. Splitting them would
  # require two listeners — VictoriaLogs ships one.
  port: 9428

# Optional Prometheus scrape annotations on the Service. The pod
# exposes /metrics on the same port as ingestion.
serviceMonitor:
  enabled: false
prometheusScrapeAnnotations:
  enabled: true

# NetworkPolicy — locks the :9428 HTTP API (ingest + query + DELETE,
# all unauthenticated) to the legitimate consumers. T2-2 mitigation
# from the #539 red-team: any in-cluster pod that can reach :9428 can
# wipe history (`wget DELETE`), so the producer-side §2 hard rule is
# necessary-but-not-sufficient — the store itself needs a perimeter.
#
# Defaults (same-namespace consumers, the common install topology):
#   - Vector DaemonSet (ingest)              app.kubernetes.io/name=vector
#   - chargeback-aggregator CronJob (query)  app.kubernetes.io/name=chargeback-aggregator
#   - Grafana (query)                        app=grafana  (k8s/03-monitoring label)
#
# Cross-namespace consumers go in `allowedNamespaces`. Setting
# `enabled: false` reverts to no policy (cluster-wide reachable);
# only acceptable for chart smoke-tests, never for steady-state.
networkPolicy:
  enabled: true
  allowedPodSelectors:
    - matchLabels:
        app.kubernetes.io/name: vector
    - matchLabels:
        app.kubernetes.io/name: chargeback-aggregator
    - matchLabels:
        app: grafana
  allowedNamespaces: []

# Pod placement. Single pod has no affinity rules; if scaled up the
# chart user is expected to add an anti-affinity block manually since
# the upstream design is single-binary.
nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
