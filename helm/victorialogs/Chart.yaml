apiVersion: v2
name: victorialogs
description: Single-pod VictoriaLogs — central store for the platform log-aggregation pipeline (#539 Phase 1). Consumer #1 is the federation-gateway audit log (ADR-020 IV-2f); consumer #2 is the chargeback query log (#552). Vector DaemonSet ships into this store.
type: application
# version: Helm Chart 版本（隨 Chart 結構/模板變更升級）
# 0.1.0 — #539 Phase 1: initial chart (single pod + PVC + retention flag)
# 0.1.1 — #539: default persistence.size 10Gi→30Gi to match runbook §5 capacity estimate
# 0.1.2 — #539 red-team T2-2: NetworkPolicy enabled by default, locks :9428 to vector + chargeback + grafana (HTTP API has no built-in auth, in-cluster pods could `wget DELETE`)
# 0.1.3 — #566 T5: image.digest knob (supply-chain pinning); default empty so existing deploys are no-op
# 0.1.4 — #566 Q5: extraEnv/extraEnvFrom (platform convention with helm/vector + helm/chargeback-aggregator)
# 0.2.0 — ADR-021 Phase 1 / #609: Layer-1 query guardrails (.Values.search → -search.maxQueryTimeRange / maxQueryDuration / maxConcurrentRequests / maxQueueDuration); maxQueryDuration 25s < gateway 30s (cascading-timeout)
# 0.2.1 — #902 L2 slice-2: pin the VictoriaLogs image by digest (image.digest)
version: 0.2.1
# appVersion: pinned VictoriaLogs release
appVersion: "v1.50.0"
keywords:
  - dynamic-alerting
  - log-aggregation
  - victorialogs
  - observability
home: https://github.com/vencil/Dynamic-Alerting-Integrations
maintainers:
  - name: vencil
