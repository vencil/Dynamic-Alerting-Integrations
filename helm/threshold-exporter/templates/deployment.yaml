apiVersion: apps/v1
kind: Deployment
metadata:
  name: threshold-exporter
  namespace: monitoring
  labels:
    app: threshold-exporter
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: threshold-exporter
  template:
    metadata:
      labels:
        app: threshold-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
        # Force rolling restart when config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: threshold-exporter
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: threshold-exporter
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        args:
          - "-config-dir"
          - "/etc/threshold-exporter/conf.d"
          - "-listen"
          - "{{ .Values.exporter.listenAddr }}"
          - "-reload-interval"
          - "{{ .Values.exporter.reloadInterval }}"
          {{- if .Values.exporter.freeOsMemAfterReload }}
          # #459 lever: explicit return-to-OS after each reload.
          - "-free-os-mem-after-reload"
          {{- end }}
        {{- if or .Values.exporter.goMemLimit .Values.extraEnv }}
        env:
          {{- if .Values.exporter.goMemLimit }}
          # #459: Go runtime reads GOMEMLIMIT natively (Go 1.19+) as a soft
          # heap ceiling — the primary bound on sys_bytes / heap_idle creep.
          - name: GOMEMLIMIT
            value: {{ .Values.exporter.goMemLimit | quote }}
          {{- end }}
          {{- with .Values.extraEnv }}
          # #607 escape hatch: rendered AFTER dedicated fields, so a duplicate
          # key here (e.g. GOMEMLIMIT) wins via K8s env last-one-wins.
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
        {{- with .Values.extraEnvFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/threshold-exporter/conf.d
          readOnly: true
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      {{- if eq .Values.rules.mode "configmap" }}
      - name: config
        configMap:
          name: threshold-config
      {{- else }}
      # Operator mode: threshold-exporter still reads conf.d/ for tenant thresholds.
      # Rule Packs are delivered via PrometheusRule CRD (not file-mounted).
      - name: config
        configMap:
          name: threshold-config
      {{- end }}
