# Default values for threshold-exporter
replicaCount: 2

image:
  repository: threshold-exporter
  tag: dev
  pullPolicy: Never    # Local dev: use 'kind load docker-image'

service:
  type: ClusterIP
  port: 8080
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

# Exporter runtime config
exporter:
  listenAddr: ":8080"
  reloadInterval: "30s"    # How often to check config file for changes
  # #459 memory levers (default off = unchanged Go runtime behavior).
  # Reach for these only under abnormally high reload cadence; see
  # docs/integration/deployment-sizing.md before tuning.
  #
  # goMemLimit: Go soft heap ceiling (GOMEMLIMIT env, Go 1.19+). Empty =
  # unset (effectively unlimited). When set, the runtime paces GC harder
  # near the limit and returns idle pages to the OS sooner — the primary
  # bound on go_memstats_sys_bytes / heap_idle creep. Accepts the Go suffix
  # form, e.g. "96MiB". Keep it ABOVE steady-state heap_inuse and BELOW the
  # container memory limit (a good start: ~75% of resources.limits.memory).
  goMemLimit: ""
  # freeOsMemAfterReload: call runtime/debug.FreeOSMemory() after each reload
  # (one extra STW GC per reload). Off by default; turn on only if GOMEMLIMIT
  # alone doesn't bound the creep AND reload cadence is low enough that the
  # per-reload GC cost is negligible.
  freeOsMemAfterReload: false

# Generic env injection — #607, mirroring helm/vector + helm/victorialogs +
# helm/chargeback-aggregator so operators have one consistent shape across
# platform charts. Escape hatch for env the chart does not model as a
# first-class field (HTTP_PROXY, APM agent vars, custom cert paths…); wire
# Secret refs via valueFrom / extraEnvFrom. For memory tuning prefer the
# dedicated exporter.goMemLimit above — it is discoverable, typed, and paired
# with freeOsMemAfterReload.
# COLLISION: extraEnv is rendered AFTER the dedicated fields, so a duplicate
# key here (e.g. GOMEMLIMIT) overrides the dedicated value via K8s
# last-one-wins. The escape hatch always has final say.
extraEnv: []
extraEnvFrom: []

# Threshold config (embedded in ConfigMap)
# This is the actual alerting threshold configuration.
# See config/conf.d/ directory for the reference multi-file format.
# For multi-DB examples (Redis, MongoDB, Elasticsearch), see:
#   config/conf.d/examples/ and migration-guide.md §7 (維度標籤)
thresholdConfig:
  defaults:
    # Scenario A: MySQL thresholds
    mysql_connections: 80
    mysql_cpu: 80
    # Scenario B: Container resource thresholds (% of limit)
    container_cpu: 80
    container_memory: 85

  # Scenario C: State-based monitoring filters
  # Each filter maps to kube_pod_container_status_waiting_reason values.
  # Enabled by default for all tenants; per-tenant disable via _state_<name>: "disable"
  state_filters:
    container_crashloop:
      reasons: ["CrashLoopBackOff"]
      severity: "critical"
    container_imagepull:
      reasons: ["ImagePullBackOff", "InvalidImageName"]
      severity: "warning"
    # Scenario D: Maintenance mode — unless 攔截所有常規警報
    # default_state: disable → 預設不啟用; 租戶透過 _state_maintenance: "enable" 開啟
    maintenance:
      reasons: []
      severity: "info"
      default_state: "disable"

  # Tenant overrides — 客戶依自身環境設定，chart 預設不帶任何測試租戶。
  # 透過 values-override.yaml 或 GitOps 注入，例如：
  #   tenants:
  #     db-a:
  #       mysql_connections: "70"
  #       container_cpu: "70"
  #     db-b:
  #       mysql_connections: "100"
  #       _state_container_crashloop: "disable"
  #
  # 開發/測試環境請使用 environments/local/threshold-exporter.yaml
  # 完整範例參見 config/conf.d/examples/
  tenants: {}

# Rules deployment mode: configmap (default) or operator (CRD-based)
# - configmap: Rule Packs mounted as ConfigMap via projected volume (Path A)
# - operator: Rule Packs deployed as PrometheusRule CRD (Path B)
# See ADR-008 for architecture details.
# IMPORTANT: Do NOT mix modes in the same cluster's Alertmanager.
rules:
  mode: configmap    # configmap | operator
  # Operator-mode settings (only used when mode: operator)
  operator:
    # PrometheusRule labels for Operator ruleSelector matching
    ruleLabels:
      prometheus: kube-prometheus
    # ServiceMonitor for threshold-exporter scraping
    serviceMonitor:
      enabled: true
      interval: 15s
    # AlertmanagerConfig receiver template
    # Supported: slack, pagerduty, email, teams, opsgenie, webhook
    receiverTemplate: webhook
    # K8s Secret reference for receiver credentials
    # NEVER put plaintext credentials in values.yaml
    secretRef:
      name: ""       # e.g. da-alerts-secret
      key: ""        # e.g. webhook-url

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
