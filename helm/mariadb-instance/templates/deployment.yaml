apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: {{ .Values.instance }}
  labels:
    app: mariadb
    instance: {{ .Values.instance }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
      instance: {{ .Values.instance }}
  template:
    metadata:
      labels:
        app: mariadb
        instance: {{ .Values.instance }}
    spec:
      # PSS restricted-readiness (#1018): runAsNonRoot alone is NOT enough —
      # the official mariadb image starts its entrypoint as root and drops to
      # mysql (uid 999) itself, and the mysqld-exporter image declares a
      # NON-NUMERIC `USER nobody`; in both cases kubelet cannot verify the
      # image user, so admission would fail with "cannot verify user is
      # non-root". Pinning runAsUser/runAsGroup 999 (the image's `mysql`
      # uid/gid — consistent with the pre-existing fsGroup: 999 that already
      # group-owns the PVC) runs BOTH containers as non-root from exec time:
      # mariadb's entrypoint supports arbitrary-uid startup (skips its chown
      # path), and the stock mysqld-exporter is a static Go binary —
      # UID-agnostic (no home-dir, capability, or writable-path dependency),
      # so 999 is safe. Operators substituting a CUSTOM exporter image must
      # verify it tolerates UID 999 themselves.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        # --- MariaDB ---
        - name: mariadb
          image: {{ .Values.mariadb.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3306
              name: mysql
          envFrom:
            - secretRef:
                name: mariadb-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d/custom.cnf
              subPath: my.cnf
              readOnly: true
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: mysql-auth
              mountPath: /etc/mysql/credentials
              readOnly: true
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - mariadb --defaults-file=/etc/mysql/credentials/.my.cnf -e "SELECT 1"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - mariadb --defaults-file=/etc/mysql/credentials/.my.cnf -e "SELECT 1"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: {{ .Values.mariadb.resources.requests.cpu }}
              memory: {{ .Values.mariadb.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mariadb.resources.limits.cpu }}
              memory: {{ .Values.mariadb.resources.limits.memory }}

        # --- mysqld_exporter sidecar ---
        - name: mysqld-exporter
          image: {{ .Values.exporter.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --mysqld.address=127.0.0.1:3306
            - --mysqld.username={{ .Values.mariadb.exporterUser }}
            {{- range .Values.exporter.collectors }}
            - --collect.{{ . }}
            {{- end }}
          env:
            - name: MYSQLD_EXPORTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-credentials
                  key: MARIADB_PASSWORD
          ports:
            - containerPort: 9104
              name: metrics
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: {{ .Values.exporter.resources.requests.cpu }}
              memory: {{ .Values.exporter.resources.requests.memory }}
            limits:
              cpu: {{ .Values.exporter.resources.limits.cpu }}
              memory: {{ .Values.exporter.resources.limits.memory }}

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-data
        - name: config
          configMap:
            name: mariadb-config
        - name: initdb
          configMap:
            name: mariadb-init
        - name: mysql-auth
          secret:
            secretName: mariadb-credentials
            items:
              - key: MY_CNF
                path: .my.cnf
            defaultMode: 0400
