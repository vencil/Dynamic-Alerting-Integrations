# tenant-api Helm values
# Reference: ADR-009 — Tenant Manager CRUD API Architecture

# ⛔ PR/MR write-back modes (--write-mode pr-github / pr-gitlab, ADR-011)
# require replicaCount=1. The pending-PR dedup (per-tenant "one open PR at a
# time") is enforced by an in-memory tracker + claim that is per-process — it
# does NOT coordinate across pods, so >1 replica can open duplicate PRs for the
# same tenant. The default `direct` write mode is unaffected. See #615 and
# internal/platform/tracker.go (ClaimTenant).
replicaCount: 1

image:
  repository: ghcr.io/vencil/tenant-api
  tag: "2.7.0"
  pullPolicy: IfNotPresent

# oauth2-proxy sidecar configuration
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.15.2"
    pullPolicy: IfNotPresent
  # Provider: github | google | oidc | gitlab
  provider: github
  # Redirect URL must match the registered OAuth2 app callback URL.
  # Set to your actual Ingress host.
  redirectUrl: "http://tenant-api.example.com/oauth2/callback"
  # Accept all email domains — restrict further via rbac._rbacYaml groups.
  emailDomain: "*"
  # Cookie settings
  cookieSecure: true  # Requires HTTPS; set false only for local dev
  cookieHttpOnly: true
  cookieSameSite: "Lax"
  cookieName: "_tenant_api_session"
  # Set to false to skip creating the placeholder Secret
  # (use this in production with externally managed secrets)
  createSecret: true
  # Secret name (must be pre-created; see secret-oauth2proxy.yaml template)
  secretName: oauth2-proxy-secrets

# tenant-api application settings
tenantApi:
  listenAddr: ":8080"
  reloadInterval: "30s"
  # Git committer identity for commit-on-write audit trail.
  # Author comes from X-Forwarded-Email (oauth2-proxy).
  gitCommitterName: "da-portal"
  gitCommitterEmail: "da-portal@dynamic-alerting.local"

  # git CLI per-command timeout (#630). Empty → binary default (60s). Every write
  # holds a process-wide lock while git runs; a hung `git push` (degraded on-prem
  # forge / network microcut) would otherwise freeze ALL tenant writes until it
  # returns. The binary bounds each git invocation and releases the lock on timeout.
  # Raise for a slow on-prem GitLab (Go duration string, e.g. "90s"); read as
  # TENANT_API_GIT_TIMEOUT. Emitted only when set, so a default upgrade is a no-op.
  gitTimeout: ""

  # HTTP server tuning (issue #144). Defaults match the binary's
  # hardcoded values pre-#144 so a default Helm upgrade is a no-op;
  # override only when an environment needs different headroom.
  # All four keys read by tenant-api as TA_* env vars (binary parses
  # malformed values back to the default and logs WARN at startup).
  server:
    timeouts:
      # Long-tail writes (PR-mode batch with N tenants × WritePR
      # commit latency) brushed up against 30s pre-PR-11; raise if
      # your deployment commits large batches.
      read: "15s"
      write: "30s"
      idle: "60s"
    # Request body size cap. 1 MiB fits even the largest realistic
    # tenant YAML (deeply-nested rule pack) with order-of-magnitude
    # headroom. Raise only for atypical payloads — a higher cap
    # widens the OOM blast radius of a single POST.
    maxBodyBytes: 1048576

# conf.d volume: holds tenant YAML files and the git repository.
# For production, set type=pvc and provide a storageClass.
# For Kind dev, set type=hostPath and provide path.
confDir:
  # type: emptyDir | hostPath | pvc
  type: emptyDir
  hostPath: ""        # used when type=hostPath
  pvc:
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce

# Git repository to clone on startup (optional).
# Leave empty to skip the init container (use hostPath or pre-populated PVC instead).
gitRepoUrl: ""

# RBAC configuration (_rbac.yaml content)
rbac:
  _rbacYaml: |
    groups:
      - name: platform-admins
        tenants: ["*"]
        permissions: [read, write, admin]

      - name: db-operators
        tenants: ["db-a-*", "db-b-*"]
        permissions: [read, write]

      - name: viewers
        tenants: ["*"]
        permissions: [read]

# ── Tenant federation (ADR-020 IV-2m, issue #519) ───────────────────────────
# Disabled by default. When enabled, tenant-api exposes
# /api/v1/federation/tokens so a tenant can mint short-lived RS256 JWTs and
# pull its own metric subset out to tenant-side infrastructure.
#
# Enabling on an existing deployment:
#   1. Generate the signing key — the private key never touches disk or git,
#      it streams straight from the pipe into etcd:
#        da-tools fed-key | kubectl apply -n <release-namespace> -f -
#      This creates Secret `tenant-federation-signing-key` and writes the
#      public JWKS to ./federation-jwks.json (feed that to federation-gateway).
#   2. helm upgrade <release> helm/tenant-api --set federation.enabled=true
#      The chart then pre-creates the (empty) token-store ConfigMap, adds the
#      get+update RBAC, mounts the signing-key Secret, and passes the three
#      --federation-* flags. tenant-api owns store.json at runtime; the chart
#      never templates it, so `helm upgrade` cannot wipe live tokens.
federation:
  enabled: false

  # RS256 signing key. NOT created by this chart — generate it out-of-band
  # with `da-tools fed-key` (ADR-020 IV-2l) so the private key reaches etcd
  # straight off a pipe. These two values must match that Secret.
  signingKey:
    secretName: tenant-federation-signing-key
    secretKey: federation-signing-key.pem

  # Token record store. This chart pre-creates the ConfigMap (empty);
  # tenant-api populates store.json / revoked.txt at runtime. The name must
  # match the federation-gateway chart's revoked-set source.
  store:
    configMapName: tenant-federation-store

  # Federation token lifetime, passed as --federation-token-ttl (Go duration).
  # Matches the binary default; with Posture B server-side revocation an
  # operator may safely raise this.
  tokenTTL: 4h

service:
  type: ClusterIP
  # Port 80 → oauth2-proxy (4180) — external traffic
  port: 80
  # Port 8080 → tenant-api directly — cluster-internal (Prometheus scrape)
  internalPort: 8080

# Ingress (disabled by default — configure per-environment)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tenant-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits
resources:
  tenantApi:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  oauth2Proxy:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  gitClone:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Pod security context (non-root)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# NetworkPolicy
networkPolicy:
  enabled: true
  # Namespace that Prometheus is in (allowed to scrape internal port)
  prometheusNamespace: monitoring

# Prometheus scrape annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
