# tenant-api Helm values
# Reference: ADR-009 — Tenant Manager CRUD API Architecture

# ⛔ PR/MR write-back modes (--write-mode pr-github / pr-gitlab, ADR-011)
# require replicaCount=1. The pending-PR dedup (per-tenant "one open PR at a
# time") is enforced by an in-memory tracker + claim that is per-process — it
# does NOT coordinate across pods, so >1 replica can open duplicate PRs for the
# same tenant. The default `direct` write mode is unaffected. See #615 and
# internal/platform/tracker.go (ClaimTenant).
# ⛔ replicaCount=1 alone is NOT enough: the Deployment pins `strategy: Recreate`
# so a rollout doesn't surge a second Ready pod that overlaps the old one as a
# phantom writer (see deployment.yaml + #677 / TRK-324). Raising replicaCount
# without cross-pod write coordination (K8s Lease) reintroduces the breach.
replicaCount: 1

image:
  repository: ghcr.io/vencil/tenant-api
  # tag 留空 → template 自動推導為 v<Chart.appVersion>（= published image）。需覆寫才設此值。
  tag: ""
  pullPolicy: IfNotPresent

# oauth2-proxy sidecar configuration
oauth2Proxy:
  enabled: true
  image:
    # renovate: datasource=docker depName=quay.io/oauth2-proxy/oauth2-proxy
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.15.3"
    # Pinned by digest (#902 L2) — same digest as da-portal's oauth2-proxy; the
    # drift-guard requires both charts + the scan matrix to carry it identically.
    # ⛔ Digest is AUTHORITATIVE: `--set oauth2Proxy.image.tag=…` ALONE does NOT
    #    upgrade — k8s silently keeps running THIS digest. Also set/clear
    #    oauth2Proxy.image.digest. L3/Renovate will automate both.
    digest: "sha256:10a1165743a192e1940b4708fb9647027185ce11a681a1c5519b442ff7f1f561"
    pullPolicy: IfNotPresent
  # Provider: github | google | oidc | gitlab
  provider: github
  # OIDC issuer URL — REQUIRED for `provider: oidc` and `provider: gitlab`
  # (self-hosted GitLab CE: the bare instance URL, e.g. https://gitlab.acme.internal).
  # Empty (default) → github provider, flag not rendered. See docs/integration/gitlab-ce-sso.md.
  oidcIssuerUrl: ""
  # OAuth scope. GitLab CE: "openid profile email" (groups come from /oauth/userinfo
  # under `openid`; `read_api` is only needed for --gitlab-group project filtering).
  # Empty → oauth2-proxy provider default.
  scope: ""
  # Optional GitLab group restriction (--gitlab-group, repeatable). Full paths, e.g.
  # ["acme/sre", "acme/dba"]. Empty → no group restriction at the proxy (RBAC still
  # enforced by rbac._rbacYaml). GitLab provider only.
  gitlabGroups: []
  # Session lifetime / refresh — revocation-lag guard: groups are resolved at login and
  # cached in the session cookie, so a user removed from a group keeps access until the
  # cookie expires. Shorten for tighter revocation. Empty → oauth2-proxy defaults.
  cookieExpire: ""   # e.g. "4h"
  cookieRefresh: ""  # e.g. "1h" (must be < cookieExpire)
  # Redirect URL must match the registered OAuth2 app callback URL.
  # Set to your actual Ingress host.
  redirectUrl: "http://tenant-api.example.com/oauth2/callback"
  # Accept all email domains — restrict further via rbac._rbacYaml groups.
  emailDomain: "*"
  # Cookie settings
  cookieSecure: true  # Requires HTTPS; set false only for local dev
  cookieHttpOnly: true
  cookieSameSite: "Lax"
  cookieName: "_tenant_api_session"
  # Set to false to skip creating the placeholder Secret
  # (use this in production with externally managed secrets)
  createSecret: true
  # Secret name (must be pre-created; see secret-oauth2proxy.yaml template)
  secretName: oauth2-proxy-secrets

# tenant-api application settings
tenantApi:
  listenAddr: ":8080"
  reloadInterval: "30s"
  # Git committer identity for commit-on-write audit trail.
  # Author comes from X-Forwarded-Email (oauth2-proxy).
  gitCommitterName: "da-portal"
  gitCommitterEmail: "da-portal@dynamic-alerting.local"

  # git CLI per-command timeout (#630). Empty → binary default (60s). Every write
  # holds a process-wide lock while git runs; a hung `git push` (degraded on-prem
  # forge / network microcut) would otherwise freeze ALL tenant writes until it
  # returns. The binary bounds each git invocation and releases the lock on timeout.
  # Raise for a slow on-prem GitLab (Go duration string, e.g. "90s"); read as
  # TENANT_API_GIT_TIMEOUT. Emitted only when set, so a default upgrade is a no-op.
  gitTimeout: ""

  # In-lock base fetch timeout (TRK-318 / ADR-023 §B). Empty → binary default (5s).
  # Before each PR write, tenant-api runs `git fetch --prune origin <base>` INSIDE
  # the write lock to anchor the branch on the freshest origin/<base> — otherwise a
  # long-lived pod branches from a base that went stale after a remote merge and
  # silently rolls back a shared file (_groups.yaml / _views.yaml) another tenant
  # already merged. Kept DELIBERATELY separate from (and far more aggressive than)
  # gitTimeout: the fetch holds the global lock, so a degraded forge must fast-fail
  # to 503 in seconds, not the full git timeout. Read as TA_GIT_FETCH_TIMEOUT
  # (Go duration, e.g. "5s"). Emitted only when set, so a default upgrade is a no-op.
  gitFetchTimeout: ""

  # Write-plane load-shedding queue depth (TRK-320 / ADR-023 §C). Empty → binary
  # default (5). The write plane is a single writer; this bounds how many writes
  # may QUEUE behind the one in-flight write before further writes are shed with a
  # 503 + Retry-After (instead of piling up unbounded goroutines blocked on the
  # lock and running orphan writes after the client already timed out). Total
  # admitted = 1 in-flight + this. An explicit 0 IS valid and IS emitted (shed
  # everything past the single in-flight write) — the template gates on
  # `ne (toString .) ""`, not a plain `if`, so a numeric 0 isn't dropped as falsy.
  # Read as TA_WRITE_QUEUE_DEPTH (integer). Only the empty-string default skips it.
  writeQueueDepth: ""

  # HTTP server tuning (issue #144). Defaults match the binary's
  # hardcoded values pre-#144 so a default Helm upgrade is a no-op;
  # override only when an environment needs different headroom.
  # All four keys read by tenant-api as TA_* env vars (binary parses
  # malformed values back to the default and logs WARN at startup).
  server:
    timeouts:
      # Long-tail writes (PR-mode batch with N tenants × WritePR
      # commit latency) brushed up against 30s pre-PR-11; raise if
      # your deployment commits large batches.
      read: "15s"
      write: "30s"
      idle: "60s"
    # Request body size cap. 1 MiB fits even the largest realistic
    # tenant YAML (deeply-nested rule pack) with order-of-magnitude
    # headroom. Raise only for atypical payloads — a higher cap
    # widens the OOM blast radius of a single POST.
    maxBodyBytes: 1048576
  # #143: SSE (/api/v1/events) per-client liveness. Defaults match the binary
  # built-in (heartbeat 25s / write 10s / max-lifetime disabled), so a default
  # upgrade is a no-op. Read as TA_SSE_* env (malformed → default + WARN).
  sse:
    # heartbeat MUST stay below the smallest downstream proxy/LB idle timeout
    # (commonly 30s) AND is load-bearing for stuck-client detection — setting
    # it to "0s" re-opens the idle-stuck-client goroutine leak this closes.
    heartbeat: "25s"
    # per-write deadline: a stuck/half-open client's write unblocks the serving
    # goroutine after this. "0s" disables it (not recommended).
    writeTimeout: "10s"
    # optional hard max connection lifetime cap (defense-in-depth). "0s" = off.
    maxLifetime: "0s"

# conf.d volume: holds tenant YAML files and the git repository.
# For production, set type=pvc and provide a storageClass.
# For Kind dev, set type=hostPath and provide path.
confDir:
  # type: emptyDir | hostPath | pvc
  type: emptyDir
  hostPath: ""        # used when type=hostPath
  pvc:
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce

# Git repository to clone on startup (optional).
# Leave empty to skip the init container (use hostPath or pre-populated PVC instead).
gitRepoUrl: ""

# RBAC configuration (_rbac.yaml content)
rbac:
  _rbacYaml: |
    groups:
      - name: platform-admins
        tenants: ["*"]
        permissions: [read, write, admin]

      - name: db-operators
        tenants: ["db-a-*", "db-b-*"]
        permissions: [read, write]

      - name: viewers
        tenants: ["*"]
        permissions: [read]

  # ADR-027 / LD-6 P1 — env/domain metadata scope filter fail-mode.
  # false (default) = SHADOW: a tenant with no value for a restricted rule's
  # env/domain still appears in the list (byte-identical to the legacy
  # behavior) but is counted in tenant_api_scope_would_deny_total{axis="metadata"}.
  # Flip to true = ENFORCE (hide unlabeled tenants) ONLY after that counter
  # STOPS INCREMENTING over the soak window — it is a monotonic counter, so the
  # signal is increase(...[window])==0 (a zero rate), not an absolute-zero value.
  # Pair it with a scan for still-unlabeled tenants (the counter is traffic-
  # driven: a tenant nobody LISTed never increments it). Matches the
  # machineIdentity audit→enforce discipline. Independent of
  # machineIdentity/humanSocket.
  metadataScopeEnforce: false

# ── Tenant federation (ADR-020 IV-2m, issue #519) ───────────────────────────
# Disabled by default. When enabled, tenant-api exposes
# /api/v1/federation/tokens so a tenant can mint short-lived RS256 JWTs and
# pull its own metric subset out to tenant-side infrastructure.
#
# Enabling on an existing deployment:
#   1. Generate the signing key — the private key never touches disk or git,
#      it streams straight from the pipe into etcd:
#        da-tools fed-key | kubectl apply -n <release-namespace> -f -
#      This creates Secret `tenant-federation-signing-key` and writes the
#      public JWKS to ./federation-jwks.json (feed that to federation-gateway).
#   2. helm upgrade <release> helm/tenant-api --set federation.enabled=true
#      The chart then pre-creates the (empty) token-store ConfigMap, adds the
#      get+update RBAC, mounts the signing-key Secret, and passes the three
#      --federation-* flags. tenant-api owns store.json at runtime; the chart
#      never templates it, so `helm upgrade` cannot wipe live tokens.
federation:
  enabled: false

  # RS256 signing key. NOT created by this chart — generate it out-of-band
  # with `da-tools fed-key` (ADR-020 IV-2l) so the private key reaches etcd
  # straight off a pipe. These two values must match that Secret.
  signingKey:
    secretName: tenant-federation-signing-key
    secretKey: federation-signing-key.pem

  # Token record store. This chart pre-creates the ConfigMap (empty);
  # tenant-api populates store.json / revoked.txt at runtime. The name must
  # match the federation-gateway chart's revoked-set source.
  store:
    configMapName: tenant-federation-store

  # Federation token lifetime, passed as --federation-token-ttl (Go duration).
  # Matches the binary default; with Posture B server-side revocation an
  # operator may safely raise this.
  tokenTTL: 4h

# ── Machine-identity audit baseline (ADR-027, issue #962) ───────────────────
# Disabled by default. When enabled, tenant-api verifies a machine caller's
# projected ServiceAccount token via the Kubernetes TokenReview API and AUDITs
# (structured log + `tenant_api_identity_audit_total{result}` metric) which
# workload is behind each Bearer-bearing request. This is AUDIT-ONLY — it never
# blocks authz (authz still runs on the oauth2-proxy hop headers) — it exists to
# establish the ADR-027 Phase-1 rollout baseline before any enforcement.
#
# Opt-out by default because enabling adds an apiserver coupling: the chart
# grants a `tokenreviews:create` ClusterRole (rbac-machine-identity.yaml) and
# flips automountServiceAccountToken on, so tenant-api can reach the K8s API.
#
# Enabling on an existing deployment:
#   helm upgrade <release> helm/tenant-api --set machineIdentity.enabled=true
# The chart then adds the ClusterRole/ClusterRoleBinding, enables token
# automount, and passes --machine-identity-audit + --machine-identity-audience.
#
# ⚠ PREREQUISITE: the running tenant-api image must already contain the audit
# code (the --machine-identity-* flags). The image tag derives from appVersion;
# enabling this against an image that predates the flags crash-loops on an
# unknown flag. Enable only once the deployed image supports it.
# ⚠ Do NOT enable via `helm upgrade --reuse-values`: it can carry a stale
# audience past the required-gate. Pass machineIdentity values explicitly.
machineIdentity:
  enabled: false

  # TokenReview audience — REQUIRED whenever machineIdentity.enabled=true (the
  # deployment template `required`s it, so an empty value fails the render).
  # TokenReview accepts a token only if its audience list contains this value;
  # an empty/unset audience would accept ANY ServiceAccount token, including the
  # default kube-apiserver-audience token every pod already mounts (ADR-027 G4).
  # Callers (PR-1b-ii: recipe-preview / threshold-govern) must mint their
  # projected token with `audience: tenant-api` to match.
  audience: tenant-api

# ── Identity claim headers (ADR-027 / LD-6 P2, issue #962) ──────────────────
# Named verified claims carried on the request principal. Each entry maps a
# CLAIM KEY (e.g. org — the P3 match evaluation will consume it) to the
# TRUSTED-HOP HTTP HEADER carrying its value. Which header exists is decided
# by the deployment's login entrypoint (e.g. oauth2-proxy alpha-config
# `injectRequestHeaders`); wiring that transport side is a follow-up PR.
# Rendered as a single `--identity-claim-headers=key=Header,...` arg with
# keys sorted (helm map range iterates key-sorted).
# ⚠ TRUST BOUNDARY: every header listed here MUST be injected by the trusted
# hop and MUST NOT be client-forgeable (strip-and-set at the proxy) — the
# same trust boundary as X-Forwarded-Groups. P2 is carriage-only: the
# platform does not interpret claim semantics and no authz behavior changes.
# Default {} = the seam is OFF: render and runtime behavior stay
# byte-identical to pre-P2.
identity:
  claimHeaders: {}

# ADR-027 D2-B: human-plane Unix domain socket (GHSA-3g2h-rf85-5rrv L7 root-cause
# series). When enabled, tenant-api serves the SAME router on a second listener
# bound to a pod-internal Unix socket, and the oauth2-proxy sidecar points its
# --upstream at that socket instead of http://localhost:8080. Human (browser)
# traffic then reaches tenant-api over the socket — a physically pod-internal hop
# that cannot be reached from the network — instead of the network 8080 plane.
# The listener a request arrives on is stamped into its context (connection-
# derived, unforgeable) and used to keep human traffic OUT of the machine-
# identity audit denominator, so the audit reflects the machine/relay plane only.
#
# ⚠ PREREQUISITE: the running tenant-api image must already contain the
# --human-socket flag (image tag derives from appVersion). Enabling this against
# an image that predates the flag crash-loops on an unknown flag — enable only
# once the deployed image supports it (same discipline as machineIdentity).
# ⚠ Do NOT enable via `helm upgrade --reuse-values` — pass humanSocket values
# explicitly, matching the machineIdentity guidance above.
#
# opt-in (default false) = a safe no-op: single TCP listener, oauth2-proxy
# upstream unchanged, render byte-identical to pre-D2-B.
humanSocket:
  enabled: false
  # Pod-internal socket path on a shared emptyDir mounted into both the
  # tenant-api and oauth2-proxy containers. Both run under the pod-level uid/gid
  # 65534 (podSecurityContext below), so the 0660 socket is reachable by the
  # sidecar and nothing else.
  path: /run/ta-human/human.sock

service:
  type: ClusterIP
  # Port 80 → oauth2-proxy (4180) — external traffic
  port: 80
  # Port 8080 → tenant-api directly — cluster-internal (Prometheus scrape)
  internalPort: 8080

# Ingress (disabled by default — configure per-environment)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tenant-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits
resources:
  tenantApi:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  oauth2Proxy:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  gitClone:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Pod security context (non-root)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# NetworkPolicy
# ⛔ enabled: false is FORBIDDEN and will fail `helm template`/`install`
# (GHSA-3g2h-rf85-5rrv). Port 8080 bypasses oauth2-proxy and trusts injected
# identity headers; this policy is a required security control, not a toggle.
networkPolicy:
  enabled: true
  # Namespace that Prometheus is in (allowed to scrape internal port)
  prometheusNamespace: monitoring
  # Pod-level allow-list for the internal port (8080). ns-level alone over-grants
  # every pod in prometheusNamespace to a header-trusting port — these podSelector
  # matchLabels narrow it to exactly the four legitimate 8080 clients (incl.
  # recipe-preview's GET /tenants/{id}/access authz probe, #1004, and da-portal's
  # relay of the human's /api/v1 requests with an audience-bound SA token,
  # ADR-027 D2-B O1). Change only if you relabel Prometheus / the threshold-govern
  # CronJob / recipe-preview / da-portal.
  internalPortAllow:
    prometheus:
      app: prometheus
    thresholdGovern:
      component: threshold-govern
    recipePreview:
      app.kubernetes.io/name: recipe-preview
    # da-portal (ADR-027 D2-B O1): its nginx forwards the human's oauth2-proxy
    # identity to tenant-api on 8080 with a per-request audience-bound SA token.
    # pod-scoped like the others; audits as the third kindRelay workload.
    daPortal:
      app.kubernetes.io/name: da-portal
  # Egress restriction (ADR-024 §S6). DEFAULT false = egress stays
  # UNrestricted (the policy is Ingress-only), which is the historical
  # posture and lets tenant-api reach Prometheus (metric discovery),
  # the K8s API (federation ConfigMap store), the git forge (PR mode),
  # and DNS without enumeration.
  #
  # ⛔ Blast radius: setting egress.enabled=true flips the policy to
  # DENY-by-default for ALL outbound traffic — you MUST then allow every
  # destination tenant-api needs. The block below ships DNS + the
  # Prometheus discovery port (9090); your cluster's K8s API server and
  # git-forge egress are deployment-specific, so add them via extraEgress
  # before enabling, or tenant-api writes/federation will break.
  egress:
    enabled: false
    # Port tenant-api uses to query Prometheus for metric discovery.
    prometheusPort: 9090
    # Extra egress rules merged verbatim (K8s API 443, git forge, etc.).
    # Required when egress.enabled=true in a real cluster.
    extraEgress: []

# Prometheus scrape annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
