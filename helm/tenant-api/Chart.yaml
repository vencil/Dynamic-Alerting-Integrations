apiVersion: v2
name: tenant-api
description: Tenant Management API for the Dynamic Alerting Platform (ADR-009)
type: application
# version: Helm Chart 版本（隨 Chart 結構/模板變更升級）
# 2.9.8 — #902 L2: pin oauth2-proxy sidecar by digest (oauth2Proxy.image.digest)
# 2.9.9 — #902 L2 slice-2: pin the alpine/git init-container image by digest
# 2.9.10 — PR-0: oauth2-proxy GitLab CE OIDC enablement (--oidc-issuer-url/--scope/--gitlab-group)
# 2.9.11 — PR-1b-i: machine-identity audit baseline (opt-in tokenreviews ClusterRole + --machine-identity-audit, ADR-027)
# 2.9.12 — #1004: admit recipe-preview's /access probe on the port-8080 netpol (third pod-scoped allow entry)
# 2.9.13 — ADR-027 D2-B: opt-in humanSocket (oauth2-proxy UDS upstream) + da-portal as 4th port-8080 netpol allow entry
# 2.9.14 — ADR-027 / #962: opt-in rbac.metadataScopeEnforce (env/domain scope shadow→enforce flip; default shadow = no-op)
# 2.9.15 — ADR-027 / #962: opt-in identity.claimHeaders (named trusted-hop headers → principal claims; default empty = no-op)
version: 2.9.15
# appVersion: Go binary 版本
# ⚠ appVersion pins the image tag. The --human-socket binary flag ships in a NEW
# tenant-api image; humanSocket.enabled=true REQUIRES that image (NOTES + values
# PREREQUISITE warn on this). appVersion is deliberately NOT bumped in this
# feature PR — the release owner sets it when the D2-B image (with PR-1b's
# machine-identity flags, also not yet in a published image) is cut. Until then
# humanSocket.enabled stays false (safe no-op) and appVersion tracks the last
# published binary.
appVersion: "2.7.0"
keywords:
  - dynamic-alerting
  - tenant-management
  - gitops
home: https://github.com/vencil/Dynamic-Alerting-Integrations
maintainers:
  - name: vencil
