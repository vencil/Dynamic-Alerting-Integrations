{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tenant-api.name" . }}-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tenant-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow oauth2-proxy port from anywhere in the cluster (Portal, Ingress)
    - ports:
        - port: 4180
          protocol: TCP

    # Allow Prometheus scrape on internal port (monitoring namespace only)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
      ports:
        - port: 8080
          protocol: TCP
{{- end }}
