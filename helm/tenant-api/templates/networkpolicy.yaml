{{- /*
  Fail-closed guard (GHSA-3g2h-rf85-5rrv). tenant-api ALWAYS trusts injected
  identity headers (X-Forwarded-Groups / X-Forwarded-Email) on internal port 8080,
  which deliberately bypasses oauth2-proxy. The NetworkPolicy is the ONLY control
  that stops an arbitrary pod from asserting any identity (incl. platform-admins)
  over that port — it is a REQUIRED security control, never an optional toggle.
  `--set networkPolicy.enabled=false` therefore renders a hard failure instead of
  silently dropping the policy.
*/ -}}
{{- if not .Values.networkPolicy.enabled }}
{{- fail "networkPolicy.enabled=false is forbidden: tenant-api trusts internal headers on port 8080 (X-Forwarded-Groups/Email bypass oauth2-proxy); the NetworkPolicy is a REQUIRED security control (GHSA-3g2h-rf85-5rrv), not an optional feature. Do not disable it." }}
{{- end }}
{{- /*
  Empty-selector guard (GHSA-3g2h-rf85-5rrv). internalPortAllow.prometheus /
  .thresholdGovern / .recipePreview / .daPortal feed straight into the port-8080
  podSelector.matchLabels via toYaml. An empty map renders `matchLabels: {}`,
  which Kubernetes treats as matching ALL pods in prometheusNamespace — silently
  degrading the pod-scoped allow-list back to the namespace-wide over-grant this
  policy exists to close. Reject it at render time with the same fail-closed
  intent as the enabled guard. (daPortal added by ADR-027 D2-B O1.)
*/ -}}
{{- if or (not .Values.networkPolicy.internalPortAllow.prometheus) (not .Values.networkPolicy.internalPortAllow.thresholdGovern) (not .Values.networkPolicy.internalPortAllow.recipePreview) (not .Values.networkPolicy.internalPortAllow.daPortal) }}
{{- fail "networkPolicy.internalPortAllow.prometheus/thresholdGovern/recipePreview/daPortal must be non-empty label selectors: an empty matchLabels map matches ALL pods in the monitoring namespace, reopening the port-8080 identity-header trust bypass (GHSA-3g2h-rf85-5rrv)." }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tenant-api.name" . }}-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tenant-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    # Allow oauth2-proxy port from anywhere in the cluster (Portal, Ingress)
    - ports:
        - port: 4180
          protocol: TCP

    # Allow ONLY the workloads that legitimately use internal port 8080, pod-scoped
    # (GHSA-3g2h-rf85-5rrv). Port 8080 bypasses oauth2-proxy and trusts injected
    # identity headers, so a bare namespaceSelector over-grants every pod in the
    # monitoring ns. Each `from` entry AND-s ns+pod; entries are OR-ed.
    - from:
        # Prometheus scrape (/metrics on 8080).
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.internalPortAllow.prometheus | nindent 14 }}
        # threshold-govern CronJob (#656) — opens per-tenant governance PRs.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.internalPortAllow.thresholdGovern | nindent 14 }}
        # recipe-preview PEP (#657) — /access authz probe over 8080 (#1004).
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.internalPortAllow.recipePreview | nindent 14 }}
        # da-portal relay (ADR-027 D2-B O1) — forwards the human's /api/v1 requests
        # to 8080 with an audience-bound SA token. Same pod+ns AND-scoping as the
        # others; this is the human-plane network entry that D2-B makes explicit.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.internalPortAllow.daPortal | nindent 14 }}
      ports:
        - port: 8080
          protocol: TCP
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    # DNS resolution (kube-dns / CoreDNS) — without this every outbound
    # name lookup fails the moment Egress is restricted.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Prometheus metric discovery (ADR-024 §S6) — the only egress this
    # feature strictly adds. Scoped to the Prometheus namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
      ports:
        - port: {{ .Values.networkPolicy.egress.prometheusPort }}
          protocol: TCP
    {{- with .Values.networkPolicy.egress.extraEgress }}
    # Deployment-specific allows (K8s API server, git forge, …).
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
---
# Default-deny INGRESS for the tenant-api namespace (GHSA-3g2h-rf85-5rrv, #4a).
# INGRESS-ONLY on purpose: the app policy above is pod-scoped, so any pod NOT
# matching it (a rogue/debug/second workload in this ns) would otherwise have no
# ingress policy = fully open. This blanket deny closes that. Egress is NOT denied
# here — it is opt-in via networkPolicy.egress.enabled above, because tenant-api's
# egress (git forge + OAuth provider = arbitrary external IPs) is deployment-specific
# and a ns-wide egress deny without the full allow-list would break every write.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tenant-api.name" . }}-default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-api.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
