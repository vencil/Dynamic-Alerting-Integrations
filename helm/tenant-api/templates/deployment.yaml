{{- /*
  ADR-023 single-writer invariant — LAYER 1 (static enforcement).
  The write plane is a single writer: a per-process write lock + an in-memory
  pending-PR tracker (internal/platform/tracker.go) that do NOT coordinate
  across pods. Two replicas push to the same git working tree → tree corruption
  + silent data loss; two PR-mode replicas open duplicate PRs for one tenant.
  replicaCount MUST stay 1. Horizontal write scaling needs a K8s Lease
  (leader-election) — ADR-023 Deferred option A3, not a replicaCount bump.
*/ -}}
{{- if gt (int .Values.replicaCount) 1 }}
{{- fail (printf "ADR-023 single-writer invariant violated: tenant-api replicaCount=%d but MUST be 1. The write plane has no cross-pod coordination; multi-replica writes corrupt the shared git tree. To scale writes, implement a K8s Lease (ADR-023 Deferred option A3) — do not raise replicaCount." (int .Values.replicaCount)) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate (not the default RollingUpdate) because tenant-api is a
  # single-writer by design: replicaCount=1 + an in-process write lock
  # and pending-PR tracker that do NOT coordinate across pods (see #615,
  # internal/platform/tracker.go). The default RollingUpdate surges a new
  # pod and waits for it to be Ready before terminating the old one, so a
  # rollout-restart / env-change deploy leaves two Ready pods both holding
  # their own write lock for tens of seconds — a phantom-replica window
  # where both push to the same git plane (emptyDir: dual-writer race;
  # RWO PVC: tree corruption / Multi-Attach stall). Recreate kills the old
  # pod before starting the new one, eliminating the overlap. Cost: a brief
  # deploy-time gap — not a regression, since replicaCount=1 already has no
  # read HA. Zero-downtime would need a K8s Lease (leaderelection) gating
  # /ready; deferred until a write deployment needs it (#677 / TRK-324).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "tenant-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenant-api.labels" . | nindent 8 }}
      annotations:
        # Force rolling restart when RBAC config changes
        checksum/rbac: {{ include (print $.Template.BasePath "/configmap-rbac.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "tenant-api.name" . }}
      {{- if or .Values.federation.enabled .Values.machineIdentity.enabled }}
      # Federation needs the in-cluster API client (ConfigMap token store) and
      # machineIdentity (ADR-027) needs it for the TokenReview call; the
      # ServiceAccount disables automount by default, so opt back in when either
      # feature is on.
      automountServiceAccountToken: true
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      # ── Init: clone git repository (skipped if gitRepoUrl is empty) ──────────
      {{- if .Values.gitRepoUrl }}
      initContainers:
        - name: git-clone
          image: alpine/git:v2.54.0@sha256:e043be20669db13cbcfb6190192babee4cf2dca98709bb0c2d08ca2d35a0a06a
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              if [ -d /conf.d/.git ]; then
                git -C /conf.d pull --ff-only
              else
                git clone "$GIT_REPO_URL" /conf.d
              fi
          env:
            - name: GIT_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tenant-api.name" . }}-config
                  key: GIT_REPO_URL
          volumeMounts:
            - name: conf-dir
              mountPath: /conf.d
          resources:
            {{- toYaml .Values.resources.gitClone | nindent 12 }}
      {{- end }}

      containers:
        # ── Primary: tenant-api ────────────────────────────────────────────────
        - name: tenant-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "v%s" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          args:
            - --addr={{ .Values.tenantApi.listenAddr }}
            - --config-dir=/conf.d
            - --git-dir=/conf.d
            - --rbac=/etc/rbac/_rbac.yaml
            - --reload-interval={{ .Values.tenantApi.reloadInterval }}
            {{- if .Values.federation.enabled }}
            - --federation-key=/etc/federation/{{ .Values.federation.signingKey.secretKey }}
            - --federation-store={{ .Values.federation.store.configMapName }}
            - --federation-token-ttl={{ .Values.federation.tokenTTL }}
            {{- end }}
            {{- if .Values.machineIdentity.enabled }}
            # ADR-027 machine-identity audit baseline — verify machine callers'
            # projected SA tokens via TokenReview and AUDIT (log+metric) only;
            # authz still runs on the oauth2-proxy hop headers. audit-only:
            # never blocks. The audience below is HARD-gated: TokenReview only
            # accepts a token whose audience list contains it, so an empty
            # audience would accept ANY SA token (incl. the default-audience
            # kube-apiserver token) — `required` fails the render loudly rather
            # than shipping that hole (ADR-027 G4).
            - --machine-identity-audit
            - --machine-identity-audience={{ required "machineIdentity.audience MUST be set (ADR-027 G4: empty audience = TokenReview accepts ANY SA token incl default-audience)" .Values.machineIdentity.audience }}
            {{- end }}
          env:
            - name: GIT_COMMITTER_NAME
              value: {{ .Values.tenantApi.gitCommitterName | quote }}
            - name: GIT_COMMITTER_EMAIL
              value: {{ .Values.tenantApi.gitCommitterEmail | quote }}
            {{- if .Values.tenantApi.gitTimeout }}
            # git CLI per-command timeout (#630) — bounds a hung git push so it
            # can't hold the write lock and freeze all tenant writes. Emitted only
            # when set; otherwise the binary's 60s default applies.
            - name: TENANT_API_GIT_TIMEOUT
              value: {{ .Values.tenantApi.gitTimeout | quote }}
            {{- end }}
            {{- if .Values.tenantApi.gitFetchTimeout }}
            # In-lock base fetch timeout (TRK-318) — bounds the `git fetch` that
            # anchors each PR write on the freshest origin/<base>. Separate from
            # (and more aggressive than) the regular git timeout so a degraded forge
            # fast-fails to 503 instead of pinning the write lock. Emitted only when
            # set; otherwise the binary's 5s default applies.
            - name: TA_GIT_FETCH_TIMEOUT
              value: {{ .Values.tenantApi.gitFetchTimeout | quote }}
            {{- end }}
            {{- if ne (toString .Values.tenantApi.writeQueueDepth) "" }}
            # Write-plane load-shedding queue depth (TRK-320) — bounds writes
            # queued behind the single in-flight write; past it → 503 + Retry-After
            # instead of unbounded goroutine pileup. Emitted whenever SET (incl. an
            # explicit 0 = shed everything past the single in-flight write, which
            # the binary honours); only the empty-string default skips it. NB the
            # `ne (toString …) ""` gate — a plain `if` would treat numeric 0 as
            # falsy and silently drop a deliberate 0. Otherwise the binary's
            # default (5) applies.
            - name: TA_WRITE_QUEUE_DEPTH
              value: {{ .Values.tenantApi.writeQueueDepth | quote }}
            {{- end }}
            # Server tuning (issue #144). The binary has working
            # defaults built in; emit env vars only when the chart
            # has them so a default deploy doesn't churn the env
            # block on every helm upgrade.
            {{- with .Values.tenantApi.server }}
            {{- with .timeouts }}
            {{- if .read }}
            - name: TA_READ_TIMEOUT
              value: {{ .read | quote }}
            {{- end }}
            {{- if .write }}
            - name: TA_WRITE_TIMEOUT
              value: {{ .write | quote }}
            {{- end }}
            {{- if .idle }}
            - name: TA_IDLE_TIMEOUT
              value: {{ .idle | quote }}
            {{- end }}
            {{- end }}
            {{- if .maxBodyBytes }}
            - name: TA_MAX_BODY_BYTES
              value: {{ .maxBodyBytes | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.tenantApi.sse }}
            {{- if .heartbeat }}
            - name: TA_SSE_HEARTBEAT
              value: {{ .heartbeat | quote }}
            {{- end }}
            {{- if .writeTimeout }}
            - name: TA_SSE_WRITE_TIMEOUT
              value: {{ .writeTimeout | quote }}
            {{- end }}
            {{- if .maxLifetime }}
            - name: TA_SSE_MAX_LIFETIME
              value: {{ .maxLifetime | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: conf-dir
              mountPath: /conf.d
            - name: rbac-config
              mountPath: /etc/rbac
              readOnly: true
            - name: git-tmp
              mountPath: /tmp
            {{- if .Values.federation.enabled }}
            - name: federation-signing-key
              mountPath: /etc/federation
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources.tenantApi | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

        # ── Sidecar: oauth2-proxy ──────────────────────────────────────────────
        {{- if .Values.oauth2Proxy.enabled }}
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}{{ with .Values.oauth2Proxy.image.digest }}@{{ . }}{{ end }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - --provider={{ .Values.oauth2Proxy.provider }}
            {{- with .Values.oauth2Proxy.oidcIssuerUrl }}
            - --oidc-issuer-url={{ . }}
            {{- end }}
            {{- with .Values.oauth2Proxy.scope }}
            - --scope={{ . }}
            {{- end }}
            {{- range .Values.oauth2Proxy.gitlabGroups }}
            - --gitlab-group={{ . }}
            {{- end }}
            - --upstream=http://localhost:8080
            - --http-address=0.0.0.0:4180
            - --redirect-url={{ .Values.oauth2Proxy.redirectUrl }}
            - --email-domain={{ .Values.oauth2Proxy.emailDomain }}
            - --pass-user-headers=true
            - --set-xauthrequest=true
            - --skip-auth-route=^/health$
            - --skip-auth-route=^/ready$
            - --cookie-secure={{ .Values.oauth2Proxy.cookieSecure }}
            - --cookie-httponly={{ .Values.oauth2Proxy.cookieHttpOnly }}
            - --cookie-samesite={{ .Values.oauth2Proxy.cookieSameSite }}
            - --cookie-name={{ .Values.oauth2Proxy.cookieName }}
            {{- with .Values.oauth2Proxy.cookieExpire }}
            - --cookie-expire={{ . }}
            {{- end }}
            {{- with .Values.oauth2Proxy.cookieRefresh }}
            - --cookie-refresh={{ . }}
            {{- end }}
          env:
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.secretName }}
                  key: OAUTH2_PROXY_COOKIE_SECRET
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.secretName }}
                  key: OAUTH2_PROXY_CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.secretName }}
                  key: OAUTH2_PROXY_CLIENT_SECRET
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          resources:
            {{- toYaml .Values.resources.oauth2Proxy | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5
        {{- end }}

      volumes:
        - name: conf-dir
          {{- include "tenant-api.confDirVolume" . | nindent 10 }}

        - name: rbac-config
          configMap:
            name: rbac-config

        - name: git-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi

        {{- if .Values.federation.enabled }}
        # RS256 private key for signing federation tokens. defaultMode 0440 so
        # the fsGroup (65534, matching runAsGroup) can read it; the file owner
        # is root, so an owner-only mode would lock the non-root process out.
        - name: federation-signing-key
          secret:
            secretName: {{ .Values.federation.signingKey.secretName }}
            defaultMode: 0440
        {{- end }}
