# vector Helm values
# Reference: #539 — Platform log aggregation (Vector + VictoriaLogs).
#
# Node DaemonSet. Tails container stdout/stderr via Vector's
# kubernetes_logs source, runs a VRL demux transform (parse_json on
# .message + stream-field tagging), and ships into VictoriaLogs.
#
# Phase 1 scope: federation-gateway only (extra_label_selector). When
# consumer #2 (#552 chargeback query log) lands, extend the selector or
# add a second source — do NOT widen this DaemonSet to a general
# platform log roll-up without revisiting #539 §7 (non-goals).

image:
  repository: timberio/vector
  # distroless-libc: no shell, no package manager — production tag.
  tag: "0.55.0-distroless-libc"
  # Optional digest pin (#566 T5). See helm/victorialogs/values.yaml
  # for rationale + how to fetch.
  digest: ""
  pullPolicy: IfNotPresent

# Where to ship logs. Default points at the in-cluster VictoriaLogs
# Service from the sibling helm/victorialogs chart, in the same
# namespace as Vector is installed in (override `victorialogs.host` if
# the store lives in a different namespace).
victorialogs:
  # FQDN of the VictoriaLogs Service. ".svc" form keeps it
  # namespace-agnostic.
  host: "victorialogs.monitoring.svc"
  port: 9428
  # Optional VictoriaLogs multi-tenancy. (AccountID=0, ProjectID=0) is
  # the default tenant — fine for Phase 1 single-tenant store.
  accountId: ""
  projectId: ""

# Scope of the kubernetes_logs source — which pods to tail.
# Phase 1 default: federation-gateway only (per #539 §1 trigger and §7
# non-goals — "not a general platform log roll-up"). Empty selector =
# tail every pod on the node; only use that for chart smoke-tests.
source:
  extraLabelSelector: "app.kubernetes.io/name=federation-gateway"
  extraNamespaceLabelSelector: ""
  # Glob for log file paths. Vector default is fine — left here as the
  # override seam.
  extraFieldSelector: ""

# Additional kubernetes_logs sources (#539 Phase 2 +). Each entry
# renders an independent kubernetes_logs source feeding the same demux
# transform. Use this to tail pods whose labels don't unify with the
# primary `source.extraLabelSelector` (e.g. Prometheus uses `app=
# prometheus`, gateway uses `app.kubernetes.io/name=federation-gateway`
# — no single selector matches both). Each entry MUST have a unique
# `name` (becomes the Vector source id).
#
# Phase 2 enables the prometheus entry to route per-query cost data
# into the same VictoriaLogs store; see #552 for why this is the
# correct chargeback source (gateway access-log request count cannot
# distinguish heavy vs light queries).
additionalSources: []
  # - name: prometheus_query_log
  #   extraLabelSelector: "app=prometheus"
  #   extraNamespaceLabelSelector: ""
  #   extraFieldSelector: ""

# Fan-out sinks — #539 Phase 3 compliance branch. Each entry is a
# free-form Vector sink config (passed through verbatim into the
# rendered vector.yaml under `sinks:`), wired to the same `demux`
# transform output as the primary VictoriaLogs sink. Use this to fan
# out to an external SIEM when strict compliance (tamper-evidence /
# WORM / legal hold) arrives — those guarantees live on the SIEM
# side; VictoriaLogs (like Loki) cannot provide them. The Vector
# multi-sink design is what keeps this branch reachable without
# reconfiguring the upstream pipeline.
#
# CRITICAL (#539 §2 hard rule): producer-side outages MUST NOT wedge
# the primary VictoriaLogs delivery path. Each entry's
# `_buffer_when_full` knob controls what happens when the sink's
# downstream is slow:
#   - "drop_newest" (default below): when the sink's buffer fills, NEW
#     events are dropped — primary delivery to VictoriaLogs is never
#     blocked. Acceptable for compliance branches because the primary
#     log is still in VictoriaLogs; SIEM is a fan-out, not the SoR.
#   - "block": SIEM downtime back-pressures the entire pipeline,
#     including primary delivery. DO NOT USE for fan-out — defeats
#     the §2 hard rule. Only valid when SIEM is the system of record
#     (i.e. this chart is being used in compliance-only mode and
#     VictoriaLogs is disabled).
#
# The chart wraps each entry with `buffer: {type: memory, when_full:
# <_buffer_when_full>, max_events: <_buffer_max_events>}` unless the
# entry already specifies its own `buffer:` block (advanced operators
# can opt into disk buffers etc.). Pop those two `_` keys before
# splatting the rest into the Vector config.
#
# Each entry MUST have a unique `name` (becomes the Vector sink id);
# do NOT name an entry `victorialogs` (collides with the built-in
# primary sink). Naming conflicts surface at chart lint as a duplicate
# YAML key — fail-loud.
additionalSinks: []
  # Example — splunk_hec for tamper-evident compliance trail:
  # - name: splunk_compliance
  #   type: splunk_hec_logs
  #   inputs: [demux]                  # MUST be demux for VRL-tagged events
  #   endpoint: https://splunk.example.com:8088
  #   default_token: ${SPLUNK_TOKEN}   # via envFrom secret
  #   _buffer_when_full: drop_newest
  #   _buffer_max_events: 10000
  #
  # Example — compliance-strict variant with disk buffer (#566 B-1):
  # `_buffer_type: disk` writes Vector's per-sink buffer into the
  # hostPath data dir (already mounted at /var/lib/vector) so events
  # survive Vector pod restart + OOM-kill (X-3 audit-timeline-gap fix).
  # max_size is bytes (Vector rejects max_events on disk buffers); the
  # default 1 GiB covers ~1h SIEM outage at moderate audit rate.
  # Still `drop_newest` to preserve §2 (VictoriaLogs primary unaffected
  # even when disk fills) — see runbook §7.3 for compliance-vs-§2
  # trade-off.
  # - name: splunk_durable
  #   type: splunk_hec_logs
  #   inputs: [demux]
  #   endpoint: https://splunk.example.com:8088
  #   default_token: ${SPLUNK_TOKEN}
  #   _buffer_type: disk
  #   _buffer_when_full: drop_newest
  #   _buffer_max_size: 5368709120  # 5 GiB — longer compliance window
  #
  # Example — generic syslog escape hatch:
  # - name: syslog_archive
  #   type: socket
  #   mode: tcp
  #   inputs: [demux]
  #   address: syslog-collector.security.svc:6514
  #   encoding:
  #     codec: json
  #   _buffer_when_full: drop_newest

# Defense-in-depth filter for audit-row spoofing (#566 T2-1). Vector
# only tails pods matching `source.extraLabelSelector`; if anyone with
# pod-create permission deploys a sibling pod with that label, their
# stdout becomes "audit rows" indistinguishable from real ones — pure
# label-trust failure.
#
# The mitigation here is best-effort: after demux, if a row's
# `log_type=federation_audit` but the pod's owner (ReplicaSet name)
# doesn't match the expected gateway-deployment prefix, reclassify as
# `log_type=suspicious_audit`. Sets up an alert/dashboard signal for
# active spoofing; the real fix is RBAC stopping spoofer pods from
# being created at all.
#
# Empty `prefix` disables the check (skip the VRL clause entirely);
# useful if your gateway Deployment has a non-default name.
audit:
  gatewayPodOwnerPrefix: "federation-gateway-"

# Stream fields VictoriaLogs splits on. Per #539 §3 load-bearing schema:
# bounded keys only. pod_name / token_id / query are intentionally NOT
# here — they are high-cardinality data fields, not stream fields.
# Order is preserved in the sink URL.
streamFields:
  - app
  - k8s_namespace
  - log_type
  - tenant_id
  - status

# Pod-level: kubernetes_logs needs to read hostPath
# /var/log/pods + /var/log/containers, which are typically root-owned.
# Vector runs as root to read them and drops all capabilities except
# DAC_READ_SEARCH — the minimum to read root-owned files without other
# elevated privileges.
podSecurityContext:
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser: 0
  runAsNonRoot: false
  capabilities:
    drop: ["ALL"]
    add: ["DAC_READ_SEARCH"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Extra environment variables for the Vector container — primarily for
# wiring SIEM credentials into `additionalSinks` entries that reference
# them as `${VAR}` (Vector expands env vars at config load time).
# Examples:
#   extraEnvFrom:
#     - secretRef: {name: siem-credentials}    # all keys become env vars
#   extraEnv:
#     - name: SPLUNK_TOKEN
#       valueFrom: {secretKeyRef: {name: splunk-hec, key: token}}
# Mount your Secret into the namespace this chart installs into.
extraEnv: []
extraEnvFrom: []

# Tolerations — DaemonSet pattern is to schedule everywhere, including
# tainted nodes (e.g. control-plane). Default empty for least-privilege;
# override per cluster.
tolerations: []
nodeSelector: {}
affinity: {}

# Vector exposes a Prometheus exporter on this port (internal_metrics
# source + prometheus_exporter sink). Disabled by default in Phase 1;
# enable once the cluster has Prometheus scraping in place to track
# shipper health (events_in / events_out / dropped). Enabling renders a
# headless Service (templates/service.yaml) so Prometheus can scrape by
# service name rather than pod-IP annotations.
metrics:
  enabled: false
  port: 9598

podAnnotations: {}
