apiVersion: v2
name: vector
description: Vector node DaemonSet — tails container stdout/stderr, VRL-demuxes federation-gateway audit JSON from Envoy operational text, ships into VictoriaLogs (#539 Phase 1). Sink-agnostic; the same shipper feeds the Phase 3 SIEM fan-out when needed.
type: application
# version: Helm Chart 版本（隨 Chart 結構/模板變更升級）
# 0.1.0 — #539 Phase 1: initial chart (DaemonSet + RBAC + VRL demux + VictoriaLogs sink)
# 0.1.1 — #539: add headless Service for Prometheus scrape when metrics.enabled
# 0.1.2 — #539: VRL merge() lost unnecessary `??`; set data_dir to hostPath mount (readOnlyRootFilesystem broke /var/lib/vector default)
# 0.2.0 — #539 Phase 2: additionalSources list + third VRL branch for prometheus_query_log (chargeback consumer #2, see #552)
# 0.2.1 — #539: self-review — exec_time/eval_time fields renamed _ms→_s to match Prometheus's native unit (seconds, not ms)
# 0.3.0 — #539 Phase 3: additionalSinks free-form list for SIEM fan-out (compliance branch), auto-wrapped with buffer.when_full=drop_newest so SIEM downtime cannot back-pressure VictoriaLogs (§2 hard rule)
# 0.3.1 — #539: self-review — extraEnv/extraEnvFrom knob (SIEM creds), template guard against _buffer_when_full=block (foot-gun for §2 rule)
# 0.3.2 — #539 red-team T4-4: close §2-guard bypass — operator-supplied `buffer:` block with when_full=block now also fails loud
# 0.4.0 — #566 T2-1: VRL gateway-origin filter (suspicious_audit reclassification); image.digest knob (T5); nil-safe `audit:` block lookup to survive `helm upgrade --reuse-values` from 0.3.x
# 0.5.0 — #566 batch B: additionalSinks `_buffer_type: disk` mode (X-3); fail-loud guard on unknown buffer type; VRL audit-signing schema seam reserved (X-2)
# 0.6.0 — ADR-021 Phase 1 / #609: (b) tenant-sanitized projection fan-out — log_event_id (uuid_v7) in demux; tenant_project (eligibility+enrichment+drop_fields, drop_on_error fail-closed) + tenant_route → static per-AccountID sinks (tenantProjections); demux/0:0 platform copy unchanged
# 0.6.1 — #902 L2 slice-2: pin the Vector image by digest (image.digest)
# 0.7.0 — #908 PR-2: fail-closed tenantProjections-vs-registry gate. config-dir split (vector.yaml base + 30-tenant-routing.yaml tenant-sink fragment) + projection-gate init-container that places the fragment only when the projections match the conf.d registry (degrade→0:0 / enforce→fail-pod)
# 0.8.0 — #908 PR-3a: projection-gate observability. init-container --metrics-file → gate-metrics emptyDir; metrics-exposer sidecar (serve_metrics.py) re-serves the verdict over HTTP; headless projection-gate Service for Prometheus scrape (degrade/ghost-race alerting)
# 0.9.0 — #908 PR-3 m3: least-privilege securityContext for the gate init-container + exposer sidecar (projectionGate.securityContext — non-root 65532, drop ALL caps, no DAC_READ_SEARCH; Vector container stays root for /var/log)
