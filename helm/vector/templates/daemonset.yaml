apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "vector.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "vector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vector.labels" . | nindent 8 }}
      annotations:
        # Roll the DaemonSet when the Vector config changes — VRL or
        # stream-field edits must take effect without a manual
        # `kubectl rollout restart`.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: /metrics
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "vector.name" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Schedule on every node by default; users add tolerations to
      # cover tainted nodes (e.g. control-plane).
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/vector/vector.yaml"
          env:
            # Vector enriches with k8s metadata via the API server using
            # the in-pod ServiceAccount token. VECTOR_SELF_NODE_NAME
            # scopes kubernetes_logs to "this node's pods only" —
            # without it Vector would have to list ALL pods cluster-wide
            # and filter, multiplying API server load on bigger clusters.
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VECTOR_SELF_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VECTOR_SELF_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            # Container log files. Path layout follows kubelet: symlinks
            # in /var/log/containers point into /var/log/pods, which in
            # turn may symlink into the runtime's own log dir. Mount
            # both, read-only.
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: var-lib-docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            # Vector buffer / temp state. Lives on the host so a pod
            # restart does not lose in-flight events.
            - name: data
              mountPath: /vector-data-dir
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vector.name" . }}-config
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib-docker-containers
          hostPath:
            path: /var/lib/docker/containers
        - name: data
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
