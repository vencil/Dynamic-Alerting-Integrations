apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
data:
  # Vector config (YAML form). Pipeline:
  #   kubernetes_logs(source)
  #     │
  #     └─▶ demux(transform, VRL)
  #            │ parse_json(.message)
  #            │   success → log_type=federation_audit + merge parsed fields
  #            │   fail    → log_type=gateway_operational (raw .message kept)
  #            │ stream-field promotion: app / k8s_namespace
  #            │
  #            └─▶ victorialogs(sink, elasticsearch _bulk)
  #
  # See #539 §3 for the load-bearing schema choices and the explicit
  # rejection of `exists(.tenant_id)` as a demux key.
  vector.yaml: |
    # Vector's default data_dir is /var/lib/vector, which lives on the
    # container's root filesystem — and the DaemonSet locks that down
    # with readOnlyRootFilesystem:true. Point Vector at the hostPath
    # volume the DaemonSet mounts (templates/daemonset.yaml) so it has
    # somewhere writable for source state + sink buffers across pod
    # restarts.
    data_dir: /vector-data-dir

    api:
      enabled: false

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        {{- with .Values.source.extraLabelSelector }}
        extra_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .Values.source.extraNamespaceLabelSelector }}
        extra_namespace_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .Values.source.extraFieldSelector }}
        extra_field_selector: {{ . | quote }}
        {{- end }}
        # Trust the kubelet-rotated files; do not chase opened-then-deleted
        # files past one rotation (avoids tailing into the void).
        glob_minimum_cooldown_ms: 1000
      {{- range .Values.additionalSources }}
      # Additional kubernetes_logs source — see values.yaml
      # `additionalSources` for why we need >1 (label-key heterogeneity
      # across the platform's pods).
      {{ .name }}:
        type: kubernetes_logs
        {{- with .extraLabelSelector }}
        extra_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .extraNamespaceLabelSelector }}
        extra_namespace_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .extraFieldSelector }}
        extra_field_selector: {{ . | quote }}
        {{- end }}
        glob_minimum_cooldown_ms: 1000
      {{- end }}
      {{- if .Values.metrics.enabled }}
      internal_metrics:
        type: internal_metrics
      {{- end }}

    transforms:
      demux:
        type: remap
        inputs:
          - kubernetes_logs
          {{- range .Values.additionalSources }}
          - {{ .name }}
          {{- end }}
        # VRL — see #539 §3.
        # CRITICAL: filter on parse-success, NOT on exists(.tenant_id).
        # JWT-failure requests have no tenant_id (jwt_authn rejected
        # before claim injection) but are forensically valuable.
        # CRITICAL: do NOT drop operational logs — route them to a
        # separate stream so Envoy stderr stays centrally queryable.
        #
        # ── Refactor watermark (#566 Q6) ────────────────────────────
        # This single `remap` transform now demuxes FOUR log shapes:
        #   1. federation_audit  (parse_json ok, no params.query)
        #   2. prometheus_query_log (parse_json ok, has params.query)
        #   3. gateway_operational (parse_json fail)
        #   4. suspicious_audit  (1 + pod_owner spoof guard)
        # 71+ lines, 4 branches, 1 post-filter — readable today but
        # adding a 5th shape (e.g. tenant-side audit, audit_signed)
        # justifies splitting into a Vector `route` transform fanning
        # to per-shape `remap`s. Don't refactor preemptively — wait
        # until a real 5th consumer arrives so the routing keys come
        # from concrete need, not speculation.
        source: |
          parsed, err = parse_json(.message)
          if err == null && is_object(parsed) {
            # merge(object, object, deep:true) is infallible — no `??`
            # needed (Vector 0.55+ rejects unnecessary error coalescing).
            . = merge(., object!(parsed), deep: true)
            # Discriminate the two parse-success shapes (#539 Phase 2):
            # Prometheus query log entries have `params.query` — they
            # come from the same Vector source but are a different log
            # type and need their own stream so chargeback aggregation
            # doesn't confuse a 1× heavy query with 1× audit row.
            # Federation gateway audit JSON does NOT have params.query
            # (its query field is top-level, not under params).
            if exists(.params.query) {
              .log_type = "prometheus_query_log"
              # Recover tenant_id from the post-prom-label-proxy query.
              # The data-layer label is `tenant` (NOT `tenant_id`) per
              # PR #505 / federation-label-enrichment-audit.md —
              # federation-proxy injects `{tenant="X"}` before the query
              # hits Prometheus. The JWT claim is still named `tenant_id`
              # but the metric LABEL is `tenant`; this regex matches the
              # latter (what's in params.query). Extract conservatively
              # — if no match, leave .tenant_id absent so the offline
              # aggregator buckets the row as `platform` rather than
              # mis-bill a tenant.
              q = to_string(.params.query) ?? ""
              matches = parse_regex(q, r'\btenant="(?P<tenant>[^"]+)"') ?? {}
              if exists(matches.tenant) {
                .tenant_id = matches.tenant
              }
              # Rule / alert evaluations carry a `ruleGroup` field in
              # the query log entry. They are platform-internal load
              # regardless of what selectors appear in their expression,
              # so they MUST NOT be billed to a tenant — override any
              # regex-extracted tenant_id.
              if exists(.ruleGroup) {
                del(.tenant_id)
              }
              # Hoist the cost-bearing stats fields to top-level so
              # LogsQL `stats sum(samples_scanned)` works without a
              # nested-path dance. Source field names match Prometheus
              # query log v2.45+ schema. Prometheus emits *Total*Time
              # in **seconds** (float, e.g. 0.000052 = 52μs) — keep the
              # native unit in the field name; the offline aggregator's
              # CSV column matches.
              .samples_scanned = .stats.samples.totalQueryableSamples
              .exec_time_s = .stats.timings.execTotalTime
              .eval_time_s = .stats.timings.evalTotalTime
            } else {
              .log_type = "federation_audit"
            }
          } else {
            .log_type = "gateway_operational"
          }
          {{- /* `(dict "..." .Values.audit).gatewayPodOwnerPrefix` survives
                 a missing-or-null .Values.audit map — operators on the
                 0.3.x → 0.4.0 upgrade path with `helm upgrade --reuse-values`
                 won't have the new `audit:` block in their stored values,
                 and the naive `.Values.audit.gatewayPodOwnerPrefix` form
                 nil-pointer-panics the template render. */}}
          {{- with (default dict .Values.audit).gatewayPodOwnerPrefix }}
          # Origin spoof check (#566 T2-1): a `federation_audit` row should
          # come from a pod owned by the federation-gateway Deployment's
          # ReplicaSet (kubernetes.pod_owner like "federation-gateway-xyz").
          # If the JSON shape says audit but the pod_owner doesn't match,
          # someone deployed a sibling pod with the right label and is
          # injecting forged rows. Reclassify so it's queryable + alertable
          # in its own stream rather than mixing with real audit data.
          if .log_type == "federation_audit" {
            owner = to_string(.kubernetes.pod_owner) ?? ""
            if !starts_with(owner, {{ . | quote }}) {
              .log_type = "suspicious_audit"
            }
          }
          {{- end }}
          # Stream-field promotion (bounded keys → top-level so the
          # elasticsearch sink can list them under _stream_fields).
          .app = to_string(.kubernetes.container_name) ?? "unknown"
          .k8s_namespace = to_string(.kubernetes.pod_namespace) ?? "unknown"
          # pod_name is a DATA field (HPA churn would explode a stream
          # index — see #539 §3 schema table). Keep it at top-level
          # under its own key, do NOT add it to streamFields.
          .pod_name = to_string(.kubernetes.pod_name) ?? ""
          .pod_node = to_string(.kubernetes.pod_node_name) ?? ""
          # Status is a stream field — coerce to string for stable
          # streaming (mixed string/int across the stream tree would
          # split it).
          if exists(.status) {
            .status = to_string(.status) ?? ""
          }
          # Drop the .kubernetes blob now that the keys we need are
          # promoted — keeps the per-line payload small.
          del(.kubernetes)

    sinks:
      victorialogs:
        type: elasticsearch
        inputs:
          - demux
        endpoints:
          - http://{{ .Values.victorialogs.host }}:{{ .Values.victorialogs.port }}/insert/elasticsearch/
        api_version: v8
        compression: gzip
        healthcheck:
          enabled: false
        query:
          _msg_field: message
          _time_field: timestamp
          _stream_fields: {{ join "," .Values.streamFields | quote }}
        {{- if or .Values.victorialogs.accountId .Values.victorialogs.projectId }}
        request:
          headers:
            {{- with .Values.victorialogs.accountId }}
            AccountID: {{ . | quote }}
            {{- end }}
            {{- with .Values.victorialogs.projectId }}
            ProjectID: {{ . | quote }}
            {{- end }}
        {{- end }}
      {{- range $sink := .Values.additionalSinks }}
      # ── additionalSinks (#539 Phase 3 fan-out) ───────────────────
      # Wrapped with `buffer: {when_full: <_buffer_when_full>}` so the
      # primary VictoriaLogs sink CANNOT be back-pressured by this
      # sink's downstream (the §2 hard rule). Operators who explicitly
      # want disk-backed buffering can provide their own `buffer:`
      # block — we detect that and skip the auto-wrap.
      {{- /* Fail-loud guard: when_full=block violates the §2 hard rule
             (SIEM downtime would back-pressure primary VictoriaLogs).
             Two paths to catch:
               (a) the shorthand `_buffer_when_full: block`
               (b) a self-provided `buffer:` block whose `when_full: block`
                   would have silently bypassed (a) — caught by the
                   #539 red-team review pass (T4-4). */}}
      {{- if and (hasKey $sink "_buffer_when_full") (eq (toString $sink._buffer_when_full) "block") }}
        {{- fail (printf "additionalSinks[%s]._buffer_when_full: \"block\" violates the #539 §2 hard rule (SIEM downtime would wedge primary VictoriaLogs delivery). Use drop_newest (default) or drop_oldest. If you genuinely need block semantics (SIEM is system of record), provide your own `buffer:` block explicitly." $sink.name) }}
      {{- end }}
      {{- if hasKey $sink "buffer" }}
        {{- if eq (toString (default "" $sink.buffer.when_full)) "block" }}
          {{- fail (printf "additionalSinks[%s].buffer.when_full: \"block\" violates the #539 §2 hard rule (SIEM downtime would wedge primary VictoriaLogs delivery). Even when providing your own `buffer:` block to override the chart's auto-wrap, when_full MUST NOT be `block` for fan-out sinks. If this sink is the system of record (compliance-only mode with VictoriaLogs disabled) the §2 rule does not apply — but that mode is not yet first-class in this chart." $sink.name) }}
        {{- end }}
      {{- end }}
      {{ $sink.name }}:
        {{- range $k, $v := $sink }}
        {{- if and (ne $k "name") (ne $k "_buffer_when_full") (ne $k "_buffer_max_events") }}
        {{ $k }}: {{- if kindIs "map" $v }}
          {{- toYaml $v | nindent 10 }}
        {{- else if kindIs "slice" $v }}
          {{- toYaml $v | nindent 10 }}
        {{- else }} {{ $v | toYaml }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if not (hasKey $sink "buffer") }}
        buffer:
          type: memory
          when_full: {{ default "drop_newest" $sink._buffer_when_full | quote }}
          max_events: {{ default 10000 $sink._buffer_max_events }}
        {{- end }}
      {{- end }}
      {{- if .Values.metrics.enabled }}
      # Vector self-telemetry — events_in / events_out / dropped /
      # buffer_events. Each node scrapes its local Vector via the pod
      # IP (Prometheus scrape annotations live on the DaemonSet pod).
      prometheus:
        type: prometheus_exporter
        inputs:
          - internal_metrics
        address: 0.0.0.0:{{ .Values.metrics.port }}
      {{- end }}
