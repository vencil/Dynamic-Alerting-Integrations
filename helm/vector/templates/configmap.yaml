apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
data:
  # Vector config (YAML form). Pipeline:
  #   kubernetes_logs(source)
  #     │
  #     └─▶ demux(transform, VRL)
  #            │ parse_json(.message)
  #            │   success → log_type=federation_audit + merge parsed fields
  #            │   fail    → log_type=gateway_operational (raw .message kept)
  #            │ stream-field promotion: app / k8s_namespace
  #            │
  #            └─▶ victorialogs(sink, elasticsearch _bulk)
  #
  # See #539 §3 for the load-bearing schema choices and the explicit
  # rejection of `exists(.tenant_id)` as a demux key.
  vector.yaml: |
    # Vector's default data_dir is /var/lib/vector, which lives on the
    # container's root filesystem — and the DaemonSet locks that down
    # with readOnlyRootFilesystem:true. Point Vector at the hostPath
    # volume the DaemonSet mounts (templates/daemonset.yaml) so it has
    # somewhere writable for source state + sink buffers across pod
    # restarts.
    data_dir: /vector-data-dir

    api:
      enabled: false

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        {{- with .Values.source.extraLabelSelector }}
        extra_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .Values.source.extraNamespaceLabelSelector }}
        extra_namespace_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .Values.source.extraFieldSelector }}
        extra_field_selector: {{ . | quote }}
        {{- end }}
        # Trust the kubelet-rotated files; do not chase opened-then-deleted
        # files past one rotation (avoids tailing into the void).
        glob_minimum_cooldown_ms: 1000
      {{- range .Values.additionalSources }}
      # Additional kubernetes_logs source — see values.yaml
      # `additionalSources` for why we need >1 (label-key heterogeneity
      # across the platform's pods).
      {{ .name }}:
        type: kubernetes_logs
        {{- with .extraLabelSelector }}
        extra_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .extraNamespaceLabelSelector }}
        extra_namespace_label_selector: {{ . | quote }}
        {{- end }}
        {{- with .extraFieldSelector }}
        extra_field_selector: {{ . | quote }}
        {{- end }}
        glob_minimum_cooldown_ms: 1000
      {{- end }}
      {{- if .Values.metrics.enabled }}
      internal_metrics:
        type: internal_metrics
      {{- end }}

    transforms:
      demux:
        type: remap
        inputs:
          - kubernetes_logs
          {{- range .Values.additionalSources }}
          - {{ .name }}
          {{- end }}
        # VRL — see #539 §3.
        # CRITICAL: filter on parse-success, NOT on exists(.tenant_id).
        # JWT-failure requests have no tenant_id (jwt_authn rejected
        # before claim injection) but are forensically valuable.
        # CRITICAL: do NOT drop operational logs — route them to a
        # separate stream so Envoy stderr stays centrally queryable.
        #
        # ── Refactor watermark (#566 Q6) ────────────────────────────
        # This single `remap` transform now demuxes FOUR log shapes:
        #   1. federation_audit  (parse_json ok, no params.query)
        #   2. prometheus_query_log (parse_json ok, has params.query)
        #   3. gateway_operational (parse_json fail)
        #   4. suspicious_audit  (1 + pod_owner spoof guard)
        # 71+ lines, 4 branches, 1 post-filter — readable today but
        # adding a 5th shape (e.g. tenant-side audit, audit_signed)
        # justifies splitting into a Vector `route` transform fanning
        # to per-shape `remap`s. Don't refactor preemptively — wait
        # until a real 5th consumer arrives so the routing keys come
        # from concrete need, not speculation.
        source: |
          parsed, err = parse_json(.message)
          if err == null && is_object(parsed) {
            # merge(object, object, deep:true) is infallible — no `??`
            # needed (Vector 0.55+ rejects unnecessary error coalescing).
            . = merge(., object!(parsed), deep: true)
            # Discriminate the two parse-success shapes (#539 Phase 2):
            # Prometheus query log entries have `params.query` — they
            # come from the same Vector source but are a different log
            # type and need their own stream so chargeback aggregation
            # doesn't confuse a 1× heavy query with 1× audit row.
            # Federation gateway audit JSON does NOT have params.query
            # (its query field is top-level, not under params).
            if exists(.params.query) {
              .log_type = "prometheus_query_log"
              # Recover tenant_id from the post-prom-label-proxy query.
              # The data-layer label is `tenant` (NOT `tenant_id`) per
              # PR #505 / federation-label-enrichment-audit.md —
              # federation-proxy injects `{tenant="X"}` before the query
              # hits Prometheus. The JWT claim is still named `tenant_id`
              # but the metric LABEL is `tenant`; this regex matches the
              # latter (what's in params.query). Extract conservatively
              # — if no match, leave .tenant_id absent so the offline
              # aggregator buckets the row as `platform` rather than
              # mis-bill a tenant.
              q = to_string(.params.query) ?? ""
              matches = parse_regex(q, r'\btenant="(?P<tenant>[^"]+)"') ?? {}
              if exists(matches.tenant) {
                .tenant_id = matches.tenant
              }
              # Rule / alert evaluations carry a `ruleGroup` field in
              # the query log entry. They are platform-internal load
              # regardless of what selectors appear in their expression,
              # so they MUST NOT be billed to a tenant — override any
              # regex-extracted tenant_id.
              if exists(.ruleGroup) {
                del(.tenant_id)
              }
              # Hoist the cost-bearing stats fields to top-level so
              # LogsQL `stats sum(samples_scanned)` works without a
              # nested-path dance. Source field names match Prometheus
              # query log v2.45+ schema. Prometheus emits *Total*Time
              # in **seconds** (float, e.g. 0.000052 = 52μs) — keep the
              # native unit in the field name; the offline aggregator's
              # CSV column matches.
              .samples_scanned = .stats.samples.totalQueryableSamples
              .exec_time_s = .stats.timings.execTotalTime
              .eval_time_s = .stats.timings.evalTotalTime
            } else {
              .log_type = "federation_audit"
            }
          } else {
            .log_type = "gateway_operational"
          }
          {{- /* `(dict "..." .Values.audit).gatewayPodOwnerPrefix` survives
                 a missing-or-null .Values.audit map — operators on the
                 0.3.x → 0.4.0 upgrade path with `helm upgrade --reuse-values`
                 won't have the new `audit:` block in their stored values,
                 and the naive `.Values.audit.gatewayPodOwnerPrefix` form
                 nil-pointer-panics the template render. */}}
          {{- with (default dict .Values.audit).gatewayPodOwnerPrefix }}
          # Origin spoof check (#566 T2-1): a `federation_audit` row should
          # come from a pod owned by the federation-gateway Deployment's
          # ReplicaSet (kubernetes.pod_owner like "federation-gateway-xyz").
          # If the JSON shape says audit but the pod_owner doesn't match,
          # someone deployed a sibling pod with the right label and is
          # injecting forged rows. Reclassify so it's queryable + alertable
          # in its own stream rather than mixing with real audit data.
          if .log_type == "federation_audit" {
            owner = to_string(.kubernetes.pod_owner) ?? ""
            if !starts_with(owner, {{ . | quote }}) {
              .log_type = "suspicious_audit"
            }
          }
          {{- end }}
          # Stream-field promotion (bounded keys → top-level so the
          # elasticsearch sink can list them under _stream_fields).
          .app = to_string(.kubernetes.container_name) ?? "unknown"
          .k8s_namespace = to_string(.kubernetes.pod_namespace) ?? "unknown"
          # pod_name is a DATA field (HPA churn would explode a stream
          # index — see #539 §3 schema table). Keep it at top-level
          # under its own key, do NOT add it to streamFields.
          .pod_name = to_string(.kubernetes.pod_name) ?? ""
          .pod_node = to_string(.kubernetes.pod_node_name) ?? ""
          # Status is a stream field — coerce to string for stable
          # streaming (mixed string/int across the stream tree would
          # split it).
          if exists(.status) {
            .status = to_string(.status) ?? ""
          }
          # Drop the .kubernetes blob now that the keys we need are
          # promoted — keeps the per-line payload small.
          del(.kubernetes)
          # ── Cross-partition correlation id (ADR-021 §Fork B / #609) ──────
          # Stamp a globally-unique id into EVERY line in the shared demux
          # stage so it lands in BOTH the platform full copy (0:0) AND the
          # tenant-sanitized projection (AccountID:X). The projection's
          # drop_fields strips topology (node_name/pod_ip/...) but KEEPS this
          # id, so on-call can take a tenant's redacted screenshot and join
          # the id back to the full 0:0 row for the node/pod context — i.e.
          # sanitization doesn't blow up MTTR.
          # Must be injected HERE (upstream of the projection's drop_fields),
          # never inside the tenant branch — otherwise the 0:0 copy would
          # lack the id and the join breaks.
          # Gemini fold-in: use a TIME-SORTABLE id (UUIDv7), not random
          # uuid_v4 — VictoriaLogs is time-series-optimized, so a
          # k-sortable id keeps the 0:0 global-search join cheap. uuid_v7()
          # with no arg stamps the current wall-clock into the high 48 bits
          # and is infallible (returns a String) — no `??` (Vector 0.55+
          # rejects unnecessary error coalescing on an infallible call).
          # ⚠️ UNCONDITIONAL overwrite (adversarial-review finding): the audit
          # JSON is deep-merged at the top of demux, so a producer emitting its
          # OWN `log_event_id` would otherwise control the cross-partition join
          # key (a forensic-integrity / join-poisoning channel — a tenant could
          # collide ids to corrupt on-call's 0:0 join). Until the audit-signing
          # seam below verifies producer origin, the platform OWNS this id —
          # always stamp a fresh one. When signing lands, re-introduce
          # `if !exists` gated on a verified-origin signal.
          .log_event_id = uuid_v7()
          # Audit-signing schema seam (#566 X-2 reserve). Producer-side
          # signing (federation-gateway HMACs each audit JSON line with
          # a short-lived key) lets the SIEM verify "this row really came
          # from the gateway, not from a compromised Vector forging
          # rows" — the missing chain-of-custody primitive. Not shipped
          # yet (needs key-distribution + gateway-side change), but the
          # field shape is preserved here: if `.audit_signature` /
          # `.audit_signed_at` arrive in the source JSON they're passed
          # through to sinks verbatim instead of being dropped by the
          # implicit field policy. No-op today; ready when gateway-side
          # signing lands.
      {{- if .Values.tenantProjections }}
      {{- /* ── Uniqueness guard (adversarial-review finding; fail-loud) ──────
             tenantProjections is the ENTIRE trust root of tenant isolation, yet
             a copy-paste typo could give two tenantIds the SAME accountId
             (co-mingle two tenants into ONE partition = cross-tenant data leak)
             or one tenantId TWO accountIds (mis-route to a foreign partition).
             Both render with helm exit=0 and survive `vector validate`
             (serde_yaml duplicate-key = last-wins, NOT error), so guard here.
             Helm has no native set → build seen-dicts and {{ fail }} at render
             time, mirroring the additionalSinks guards below. */}}
      {{- $seenAcct := dict }}
      {{- $seenTid := dict }}
      {{- range $p := .Values.tenantProjections }}
      {{-   $acct := toString $p.accountId }}
      {{-   $tid := toString $p.tenantId }}
      {{-   if hasKey $seenAcct $acct }}{{- fail (printf "tenantProjections: duplicate accountId %s — two tenants would co-mingle into one VictoriaLogs partition (cross-tenant leak). Each accountId must be unique." $acct) }}{{- end }}
      {{-   if hasKey $seenTid $tid }}{{- fail (printf "tenantProjections: duplicate tenantId %q — it would mis-route to a foreign AccountID. Each tenantId must be unique." $tid) }}{{- end }}
      {{-   $_ := set $seenAcct $acct true }}
      {{-   $_ := set $seenTid $tid true }}
      {{- end }}
      # ── (b) Tenant-sanitized projection — ADR-021 Phase 1 / #609 ────────
      # FAN-OUT, not a move: the platform full copy keeps flowing to the
      # `victorialogs` sink (0:0) below, UNCHANGED. This adds a SECOND,
      # net-new write of a *sanitized* subset into each tenant's native
      # VictoriaLogs (AccountID, ProjectID) partition so a tenant can read
      # the platform's operational logs ABOUT ITSELF without seeing infra
      # topology or another tenant's rows.
      #
      # Two-stage by design:
      #   tenant_project  (remap)  — eligibility gate + tenant_id→AccountID
      #                              enrichment + ALLOWLIST sanitization
      #   tenant_route    (route)  — static per-AccountID fan to N sinks
      #
      # FAIL-CLOSED is structural, not a runtime branch we hope fires:
      #   - Only `federation_audit` rows with a NON-EMPTY, KNOWN tenant_id
      #     get an `account_id` stamped. Everything else (gateway_operational,
      #     JWT-fail, suspicious_audit, prometheus_query_log, parse-error
      #     non-JSON, blank/forged/unknown tenant_id) leaves `account_id`
      #     ABSENT.
      #   - `tenant_route` matches a row to `t_<id>` ONLY on an exact numeric
      #     `account_id == <id>`. A row with no `account_id` matches no route
      #     and lands in the reserved `_unmatched` output, which nothing
      #     consumes — so it is DISCARDED from the tenant plane (it still
      #     reached 0:0 via `demux`). There is no default/catch-all tenant
      #     sink, so a mis-stamp cannot leak into another tenant.
      tenant_project:
        type: remap
        inputs:
          - demux
        # Fail-closed error handling (§Fork B / Gemini 1c): a row that aborts
        # (eligibility/enrichment miss) OR hits a runtime VRL error is DROPPED
        # from this branch — NOT sent onward, NOT rerouted to a tenant sink.
        # Both knobs are load-bearing and set EXPLICITLY:
        #   - drop_on_abort: every `abort` below (non-audit, blank/unknown
        #     tenant_id) must drop. This is the PRIMARY fail-closed path.
        #     (We don't rely on its default — the whole isolation guarantee
        #     hinges on it, so it's pinned.)
        #   - drop_on_error: a parse/coercion error must ALSO drop, never
        #     default-allow a half-processed row into a partition.
        #   - reroute_dropped:false: dropped events vanish from this branch
        #     entirely (no `.dropped` output wired to any tenant sink).
        # The 0:0 full copy is unaffected — it is fed from `demux`, upstream
        # of this transform.
        drop_on_abort: true
        drop_on_error: true
        reroute_dropped: false
        source: |
          # Eligibility gate (ADR-021 §Fork B): tenant projection is the
          # SUBSET `log_type == "federation_audit"` AND a non-empty tenant_id.
          # gateway_operational / suspicious_audit / prometheus_query_log /
          # JWT-fail rows are platform-only — abort so drop_on_abort removes
          # them from THIS branch (they remain in 0:0 via demux).
          if .log_type != "federation_audit" {
            abort
          }
          tid = to_string(.tenant_id) ?? ""
          if tid == "" {
            # Blank / missing / non-string tenant_id → fail-closed, drop.
            abort
          }
          # tenant_id(str) → AccountID(uint32) enrichment.
          # SSOT is the Git account registry (`_account_registry.yaml`,
          # PR-1 #887). For Phase 1 (b) the resolved {tenant_id: account_id}
          # rows are projected into Helm `tenantProjections` (a reviewed,
          # GitOps-versioned derivation of the registry) and templated into
          # this static map; Phase 2 (a) generates it from the registry at
          # render time (config-from-SSOT) — see ADR-021 §Ingestion.
          # We DELIBERATELY do not coerce the string tenant_id into a number
          # (ADR forbids hash/derived ids — collision = cross-tenant leak);
          # an unknown tenant simply isn't in the map → account_id stays
          # absent → _unmatched → dropped (fail-closed, never another tenant).
          account_map = {
          {{- range $p := .Values.tenantProjections }}
            {{ $p.tenantId | quote }}: {{ $p.accountId }},
          {{- end }}
          }
          # get() returns null (or errors) on a missing key; `?? null`
          # collapses both to null → the abort below. Map values are integer
          # literals, so a hit is already an integer — assign directly (no
          # int!() coercion, which the compiler could flag as unnecessary).
          aid = get(account_map, [tid]) ?? null
          if aid == null {
            # Unknown tenant_id (not yet onboarded into tenantProjections,
            # or a forged value) → fail-closed, drop from the tenant plane.
            abort
          }
          # ── Sanitize via ALLOWLIST (fail-closed; adversarial-review finding) ──
          # A denylist (del per field) is FAIL-OPEN here: demux deep-merges the
          # entire gateway audit JSON to the event root, so (a) the raw `.message`
          # string still embeds every emitted field — including `upstream` =
          # %UPSTREAM_HOST% the backend IP:port; (b) any field the gateway (or a
          # future producer / the audit-signing seam) adds, or any NESTED object,
          # rides through unless someone remembers to del() it. For a tenant-
          # facing partition the boundary must fail CLOSED: build a FRESH event
          # from an explicit safe-field allowlist, so everything not listed (raw
          # message, upstream IP, app/k8s_namespace infra naming, pod/node
          # topology, payload-injected account_id/log_type, unknown future
          # fields) is structurally ABSENT. Adding a field to
          # `tenantProjectionKeepFields` is the security-reviewed action — this
          # inverts the old "remember to drop" burden into "opt a field in".
          kept = {}
          kept.account_id = aid   # the TRUSTED GitOps map value, never the payload's
          {{- range $f := .Values.tenantProjectionKeepFields }}
          if exists(.{{ $f }}) {
            kept.{{ $f }} = .{{ $f }}
          }
          {{- end }}
          # Bound the one unbounded field — a tenant's own LogsQL/PromQL `query`
          # (Gemini #894). A 500 KB query would expand in encode_json below and
          # blow VictoriaLogs' per-line limit / spike Vector RAM. Cap it; a real
          # query is well under this. (path is already %…:2048%-capped upstream;
          # the other kept fields are bounded scalars.)
          if exists(kept.query) {
            kept.query = truncate(to_string(kept.query) ?? "", {{ .Values.tenantProjectionMaxQueryBytes | default 8192 }})
          }
          # Re-serialize a SANITIZED _msg from the allowlisted fields only — the
          # tenant sink's `_msg_field` is `message`, and the original raw audit
          # line (which carried `upstream` etc.) is intentionally discarded, so
          # synthesize a clean structured message from what survived the
          # allowlist. encode_json is infallible (no `??`).
          kept.message = encode_json(kept)
          . = kept
      tenant_route:
        type: route
        inputs:
          - tenant_project
        # reroute_unmatched defaults true → a row that matches no `t_<id>`
        # (i.e. no/foreign account_id) goes to `tenant_route._unmatched`,
        # which NOTHING consumes = discarded. This is the load-bearing
        # fail-closed sink-of-last-resort: there is no tenant catch-all.
        route:
        {{- range $p := .Values.tenantProjections }}
          t_{{ $p.accountId }}: '.account_id == {{ $p.accountId }}'
        {{- end }}
      {{- end }}

    sinks:
      victorialogs:
        type: elasticsearch
        inputs:
          - demux
        endpoints:
          - http://{{ .Values.victorialogs.host }}:{{ .Values.victorialogs.port }}/insert/elasticsearch/
        api_version: v8
        compression: gzip
        healthcheck:
          enabled: false
        query:
          _msg_field: message
          _time_field: timestamp
          _stream_fields: {{ join "," .Values.streamFields | quote }}
        {{- if or .Values.victorialogs.accountId .Values.victorialogs.projectId }}
        request:
          headers:
            {{- with .Values.victorialogs.accountId }}
            AccountID: {{ . | quote }}
            {{- end }}
            {{- with .Values.victorialogs.projectId }}
            ProjectID: {{ . | quote }}
            {{- end }}
        {{- end }}
      {{- range $sink := .Values.additionalSinks }}
      # ── additionalSinks (#539 Phase 3 fan-out) ───────────────────
      # Wrapped with `buffer: {when_full: <_buffer_when_full>}` so the
      # primary VictoriaLogs sink CANNOT be back-pressured by this
      # sink's downstream (the §2 hard rule). Operators who explicitly
      # want disk-backed buffering can provide their own `buffer:`
      # block — we detect that and skip the auto-wrap.
      {{- /* Fail-loud guard: when_full=block violates the §2 hard rule
             (SIEM downtime would back-pressure primary VictoriaLogs).
             Two paths to catch:
               (a) the shorthand `_buffer_when_full: block`
               (b) a self-provided `buffer:` block whose `when_full: block`
                   would have silently bypassed (a) — caught by the
                   #539 red-team review pass (T4-4). */}}
      {{- if and (hasKey $sink "_buffer_when_full") (eq (toString $sink._buffer_when_full) "block") }}
        {{- fail (printf "additionalSinks[%s]._buffer_when_full: \"block\" violates the #539 §2 hard rule (SIEM downtime would wedge primary VictoriaLogs delivery). Use drop_newest (default) or drop_oldest. If you genuinely need block semantics (SIEM is system of record), provide your own `buffer:` block explicitly." $sink.name) }}
      {{- end }}
      {{- if hasKey $sink "buffer" }}
        {{- if eq (toString (default "" $sink.buffer.when_full)) "block" }}
          {{- fail (printf "additionalSinks[%s].buffer.when_full: \"block\" violates the #539 §2 hard rule (SIEM downtime would wedge primary VictoriaLogs delivery). Even when providing your own `buffer:` block to override the chart's auto-wrap, when_full MUST NOT be `block` for fan-out sinks. If this sink is the system of record (compliance-only mode with VictoriaLogs disabled) the §2 rule does not apply — but that mode is not yet first-class in this chart." $sink.name) }}
        {{- end }}
      {{- end }}
      {{ $sink.name }}:
        {{- range $k, $v := $sink }}
        {{- if and (ne $k "name") (ne $k "_buffer_when_full") (ne $k "_buffer_max_events") (ne $k "_buffer_type") (ne $k "_buffer_max_size") }}
        {{ $k }}: {{- if kindIs "map" $v }}
          {{- toYaml $v | nindent 10 }}
        {{- else if kindIs "slice" $v }}
          {{- toYaml $v | nindent 10 }}
        {{- else }} {{ $v | toYaml }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if not (hasKey $sink "buffer") }}
        {{- /* Auto-wrap buffer (#566 B-1): default `memory` preserves the
               Phase 3 behavior; `disk` opt-in survives Vector pod restart +
               node OOM-kill (X-3 audit timeline gap). Disk buffer writes
               into Vector's data_dir (the hostPath /var/lib/vector mount
               from daemonset.yaml) under `<sink_id>/buffer/`; no PVC
               required, but a node failure still loses the buffer (PVC
               support is a follow-up if cluster-level durability matters).
               max_size vs max_events is determined by type — Vector
               rejects max_events on disk buffers and vice versa. */}}
        {{- $bufType := default "memory" $sink._buffer_type }}
        buffer:
          type: {{ $bufType | quote }}
          when_full: {{ default "drop_newest" $sink._buffer_when_full | quote }}
          {{- if eq $bufType "memory" }}
          max_events: {{ default 10000 $sink._buffer_max_events }}
          {{- else if eq $bufType "disk" }}
          # 1 GiB default — covers ~1h SIEM outage at moderate audit rate.
          # Tune up if your compliance window is longer or audit rate higher.
          # `| int64` forces integer rendering — without it large values
          # (>2^28-ish) round-trip through Helm as float scientific notation
          # (e.g. `2.68435488e+08`) which Vector's BufferConfig parser
          # rejects with an unhelpful "untagged enum" error.
          max_size: {{ default 1073741824 $sink._buffer_max_size | int64 }}
          {{- else }}
          {{- fail (printf "additionalSinks[%s]._buffer_type: must be \"memory\" or \"disk\", got %q" $sink.name $bufType) }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .Values.metrics.enabled }}
      # Vector self-telemetry — events_in / events_out / dropped /
      # buffer_events. Each node scrapes its local Vector via the pod
      # IP (Prometheus scrape annotations live on the DaemonSet pod).
      prometheus:
        type: prometheus_exporter
        inputs:
          - internal_metrics
        address: 0.0.0.0:{{ .Values.metrics.port }}
      {{- end }}

  30-tenant-routing.yaml: |
    # Tenant-sanitized projection SINKS — config-dir fragment (#908 PR-2).
    # The Vector init-container PLACES this file into the --config-dir only when
    # the projection gate passes; on degrade it is OMITTED and tenant_route's
    # t_<id> outputs go unconsumed (= discarded, the existing fail-closed path)
    # → platform-only 0:0. The tenant TRANSFORMS stay in the base config; the write
    # boundary is here, so gating the sinks is the security-relevant gate.
    {{- if .Values.tenantProjections }}
    sinks:
      # ── (b) Tenant-sanitized projection sinks — ADR-021 / #609 ──────────
      # One STATIC sink per tenant, each pinned to a FIXED AccountID header.
      # Why static-N and not one dynamic header-templated sink:
      # Vector's elasticsearch/http sinks set request headers PER-BATCH (one
      # batch = one request), and a batch can mix events from many tenants —
      # a per-event header template would stamp ALL events in a mixed batch
      # with ONE tenant's AccountID = cross-tenant write leak. (Upstream
      # vectordotdev/vector#21402 confirms the isomorphic per-batch header
      # failure.) Routing first, then a sink with a CONSTANT header, makes
      # each sink's batches single-tenant by construction.
      # ProjectID is fixed 0 for (b) platform-operational logs; (a) tenant
      # application logs (Phase 2) will use ProjectID 1 in the same store.
      {{- range $p := .Values.tenantProjections }}
      vl_tenant_{{ $p.accountId }}:
        type: elasticsearch
        inputs:
          # Consume ONLY this tenant's route output — a single-tenant stream,
          # so the constant AccountID header below can never mis-stamp.
          - tenant_route.t_{{ $p.accountId }}
        endpoints:
          - http://{{ $.Values.victorialogs.host }}:{{ $.Values.victorialogs.port }}/insert/elasticsearch/
        api_version: v8
        compression: gzip
        healthcheck:
          enabled: false
        # ── Fan-out resilience: a tenant sink MUST NOT block (#539 §2 hard rule
        # / Gemini #894 head-of-line-blocking). VictoriaLogs backpressure on ONE
        # tenant's partition would otherwise propagate up tenant_route → demux
        # and wedge the SHARED 0:0 write AND every other tenant. drop_newest
        # keeps the loss LOCAL to the backpressured tenant — the platform 0:0
        # copy is the source of truth, so this projection is explicitly best-
        # effort. The bounded memory buffer also caps RAM (no OOM under a noisy-
        # neighbor spike); operators needing restart-durability can raise
        # tenantProjectionBufferMaxEvents or front it with a disk buffer.
        buffer:
          max_events: {{ $.Values.tenantProjectionBufferMaxEvents | default 1000 }}
          when_full: drop_newest
        query:
          _msg_field: message
          _time_field: timestamp
          # Tenant-safe stream fields ONLY — NOT the platform `streamFields`
          # (which carries `app`/`k8s_namespace` infra naming that the allowlist
          # sanitization deliberately drops). Every entry here must also be in
          # `tenantProjectionKeepFields` or it won't exist on the projected event.
          _stream_fields: {{ join "," $.Values.tenantProjectionStreamFields | quote }}
        request:
          headers:
            # Verified, server-side-derived tenant partition. NEVER trust a
            # tenant_id carried in the payload (zero-trust ingestion, ADR-021
            # §contract) — this AccountID comes from the Git-registry-derived
            # tenantProjections map, not the log line.
            AccountID: {{ $p.accountId | quote }}
            ProjectID: {{ $.Values.tenantProjectionProjectId | quote }}
      {{- end }}
    {{- end }}
  {{- if .Values.tenantProjections }}
  # tenant-projections.json — the projections AS DATA, for the projection-gate
  # init-container (#908 PR-2) to validate against _account_registry.yaml. The init
  # reads this from the /staging mount; it is NEVER placed into Vector's
  # --config-dir (Vector would try to load it as a config). Kept in lockstep with
  # the sinks in 30-tenant-routing.yaml by the render-test (both derive from
  # .Values.tenantProjections).
  tenant-projections.json: |
    {{ .Values.tenantProjections | toJson }}
  {{- end }}
