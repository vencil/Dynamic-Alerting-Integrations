# ADR-024 PR3b kind e2e — kube-state-metrics + version-labelled pods.
# Purpose: validate against a REAL cluster the one thing promtool cannot —
# that real kube-state-metrics emits `kube_pod_labels{label_app_kubernetes_io_version="vN"}`
# (the EXACT sanitised label name the (0a) relabel in rule-pack-kubernetes.yaml
# depends on). If KSM names it differently, (0a) silently yields version="default"
# in prod and the whole feature is inert. promtool used a synthetic series; this
# proves the real KSM output shape.
#
# Apply: kubectl apply -f test/rulepack-e2e/ksm-and-versioned-pods.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: db-a
---
# ── kube-state-metrics RBAC (minimal: pods only, enough for kube_pod_labels) ──
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels: { app: kube-state-metrics }
  template:
    metadata:
      labels: { app: kube-state-metrics }
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.10.1
          # default: expose ALL label keys as label_* (kube_pod_labels carries them).
          ports:
            - { name: http-metrics, containerPort: 8080 }
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: kube-system
spec:
  selector: { app: kube-state-metrics }
  ports:
    - { name: http-metrics, port: 8080, targetPort: 8080 }
---
# ── Two versioned pods coexisting (rolling-update topology, distinct names) ──
apiVersion: v1
kind: Pod
metadata:
  name: app-v1-x
  namespace: db-a
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/version: v1
spec:
  containers:
    - name: app
      image: registry.k8s.io/pause:3.9
---
apiVersion: v1
kind: Pod
metadata:
  name: app-v2-y
  namespace: db-a
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/version: v2
spec:
  containers:
    - name: app
      image: registry.k8s.io/pause:3.9
---
# A version-LESS pod: proves that an allowlist-ON KSM still emits a BASE
# kube_pod_labels series (no version key) for it — the empirical basis for the
# VersionAwareThresholdInert sentinel's scale-to-zero discriminator (leg 3 counts
# ALL pod labels, so "zero pod-label series" cleanly means "allowlist off", not
# "no version-labelled pods running").
apiVersion: v1
kind: Pod
metadata:
  name: app-noversion
  namespace: db-a
  labels:
    app.kubernetes.io/name: app
spec:
  containers:
    - name: app
      image: registry.k8s.io/pause:3.9
